  - {type: variant, offset: 6871, length: 3, content: 賴原即, WYG: 南齊書卷二十五南齊書卷二十五考證垣崇祖傳封望蔡縣侯七百戸臣祖庚按望蔡縣屬豫章郡沈約曰漢靈帝中平中汝南上蔡民分徙此城立縣名曰上蔡晉武帝太康元年更名望蔡武帝永明二年茹法亮封望蔡縣男食邑三百戸虜軍果夷掘下蔡城崇祖自率衆渡淮與戰}
