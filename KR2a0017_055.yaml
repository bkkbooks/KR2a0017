body:
  text: 南齊書卷五十五列傳第三十六孝義崔懷慎公孫僧遠吳欣之韓係伯孫淡華寶韓靈敏封延伯吳達之王文殊朱謙之蕭睿明樂頤江泌杜栖陸絳子曰父子之道天性也君臣之義也人之含孝稟義天生所同淳薄因心非俟學至遲遇為用不謝始庶之法驕慢之性多慙水菽之享夫色養盡力行義致身甘心壠畝不求聞達斯即孟氏三樂之辭仲由負米之歎也通乎神明理緣感召情澆世薄方表孝慈故非內德者所以寄心懷仁者所以標物矣埋名韞節鮮或昭著紀夫事行以列于篇崔懷慎清河東武城人也父邪利魯郡太守宋元嘉中沒虜懷慎與妻房氏篤愛聞父陷沒即日遣妻布衣蔬食如居喪禮邪利後仕虜中書戒懷慎不許如此懷慎得書更號泣懷慎從叔模為滎陽太守亦同沈虜模子雖居處改節而不廢婚宦大明中懷慎宗人冀州刺史元孫北使虜問之曰崔邪利模並力屈歸命二家子姪出處不同義將安在元孫曰王尊驅驥王陽回車欲令忠孝並弘臣子兩泰始初淮北陷沒界上流奔者多有去就懷慎因此入北至桑乾邪利時已卒懷慎絶而後蘇載喪還青州徒跣冰雪土氣寒酷而手足不傷時人以為孝感喪畢以弟在南建元初又逃歸而弟亦已亡懷慎孤貧獨立宗黨哀之日斂給其升米永明中卒公孫僧遠會稽剡人也治父喪至孝事母及伯父甚謹節年穀飢穀貴僧遠省餐減食以供母伯弟亡無以葬身販貼與鄰里供斂送之費躬負土手種松柏兄姊未婚嫁乃自賣為之成禮名聞郡縣太祖即位遣兼散騎常侍虞炎等十二部使行天下建元三年表列僧遠等二十三人詔並表門閭蠲租稅吳欣之晉陵利城人也宋元嘉末弟尉之為武進縣戍隨王誕起義太祖初遣軍主華欽討之吏民皆散尉之獨留見執將死欣之詣欽乞代弟命辭淚哀切兄弟皆見原建元三年有詔蠲表永明初廣陵民章起之二息犯罪爭死太守劉悛表以聞韓係伯襄陽人也事父母謹孝襄陽土俗鄰居種桑樹於界上為志係伯以桑枝蔭妨他地遷堺上開數尺鄰畔隨復侵之係伯輒更改種久之鄰人慙愧還所侵地躬往謝之建元三年蠲租稅表門閭以壽終孫淡太原人也居長沙事母孝母疾不眠食以差為期母哀之後有疾不使知也豫章王領湘州辟驃騎行參軍建元三年蠲租稅表門閭卒于家華寶晉陵無錫人也父豪義熙末戍長安寶年八歲臨別謂寶曰須我還當為汝上頭長安陷虜豪歿寶年至七十不婚冠或問之者輒號慟彌日不忍答也同郡薛天生母遭艱菜食天生亦菜食母未免喪而死天生終身不食魚肉與弟有恩義又同郡劉懷胤與弟懷則年十歲遭父喪不衣絮帛不食鹽菜建元三年並表門閭韓靈敏會稽剡人也早孤與兄靈珍並有孝性尋母又亡家貧無以營凶兄弟共種苽半畝朝採苽子暮已復生以此遂辦葬事靈珍亡無子妻卓氏守節不嫁慮家人奪其志未嘗告歸靈敏事之如母晉陵吳康之妻趙氏父亡弟幼值歲飢母老病篤趙詣鄉里自賣言辭哀苦鄉里憐之人人分升米相救遂得以免及嫁康之少時夫亡家欲更嫁誓死不二義興蔣俊之妻黃氏夫亡不重嫁逼之欲赴水自殺乃止建元三年詔蠲租賦表門閭永明元年會稽永興倪翼之母丁氏少喪夫性仁愛遭年荒分衣食以飴里中飢餓者鄰里求借未嘗違同里陳穰父母死孤單無親戚丁氏收養之及長為營婚娶又同里王禮妻徐氏荒年客死山陰丁為買棺器自往斂葬元徽末大雪商旅斷行村里比屋飢餓丁自出鹽米計口分賦同里左僑家露四喪無以葬丁為辦槨有三調不登者代為輸送丁長子婦王氏守寡執志不再醮州郡上言詔表門閭蠲租稅又廣陵徐靈禮妻遭火救兒與兒俱焚死太守劉悛以聞又會稽人陳氏有三女無男祖父母年八九十老耄無所知父篤癃病母不安其室值歲飢三女相率於西湖採菱蓴更日至市貨賣未嘗虧怠鄉里稱為義門多欲取為婦長女自傷焭獨誓不肯行祖父母尋相繼卒三女自營殯葬為菴舍墓側又永興概中里王氏女年五歲得毒病兩目皆盲性至孝年二十父母死臨尸一叫眼皆血出小妹娥舐其血左目即開時人稱為孝感縣令何曇秀不以聞又諸暨東汙里屠氏女父失明母痼疾親戚相棄鄉里不容女移父母遠住紵苧羅晝樵采夜紡績以供養父母俱卒親營殯葬負土成墳忽聞空中有聲云汝至性可重山神欲相驅使汝可為人治病必得大富女謂是搸魅弗敢從遂得病積時鄰舍人有中溪蜮毒者女試治之自覺病便差遂以巫道為人治疾無不愈家産日益鄉里多欲娶之以無兄弟誓守墳墓不肯嫁為山賊劫殺縣令于琳之具言郡太守王敬則不以聞建武三年吳興乘公濟妻姚氏生二男而公濟及兄公願乾伯並卒各有一子欣之天保姚養育之賣田宅為娶婦自與二男寄止鄰家明帝詔為其二子婚表門閭復徭役吳郡范法恂妻褚氏亦勤苦執婦業宋升明中孫曇瓘謀反亡命褚謂其子僧簡曰孫越州先姑之姊子與汝父親則從母兄弟交則義重古人逃竄脫不免汝宜收之曇瓘尋伏法褚氏令僧簡往斂葬年七十餘永明中卒僧簡在都聞病馳歸未至而褚已卒將殯舉尸不起尋而僧簡至焉封延伯字仲璉渤海人也有學行不與世人交事寡嫂甚謹州辟主簿舉秀才不就後乃仕垣崇祖為豫州啓太祖用為長史帶梁郡太守以疾自免僑居東海遂不至京師三世同財為北州所宗附豫章王辟中兵不就卒建元三年大使巡行天下義興陳玄子四世一百七十口同居武陵郡邵榮興文獻叔八世同居東海徐生之武陵范安祖李聖伯范道根五世同居零陵談弘寶衡陽何弘華陽陽黑頭疏從四世同居並共衣食詔表門閭蠲租稅又蜀郡王續祖華陽郝道福並纍世同爨建武三年明帝詔表門閭蠲調役吳達之義興人也姨嫂亡無以葬自賣為十夫客以營冢槨從祖弟敬伯夫妻荒年被略賣江北達之有田十畝貨以贖之與之同財共宅郡命為主簿固以讓兄又讓世業舊田與族弟弟亦不受田遂間廢建元三年詔表門閭河南辛普明僑居會稽自少與兄共處一帳兄亡以帳施靈座夏月多蚊普明不以露寢見色兄將葬鄰人嘉其義賻助甚多普明初受後皆反之贈者甚怪普明曰本以兄墓不周故不逆來意今何忍亡者餘物以為家財後遭母喪幾至毀滅揚州刺史豫章王辟為義議曹從事年五十卒又有何伯璵弟幼璵俱厲節操養孤兄子及長為婚推家業盡與之安貧枯稿誨人不倦鄉里呼為人師郡守下車莫不修謁永明十一年伯璵卒幼璵少好佛法翦落長齋持行精苦梁初卒兄弟年並八十餘王文殊吳興故鄣人也父沒虜文殊思慕泣血蔬食山谷三十餘年太守謝𣐞板為功曹不就永明十一年太守孔琇之表曰文殊性挺五常心符三教以父沒獯庭抱終身之痛專席居銜罔極之恤服紵縞以經年餌蔬菽以俟命婚義滅於天情官序空於素抱儻降甄異之恩榜其閭里鬱林詔榜門改所居為孝行里朱謙之字處光吳郡錢唐人也父昭之以學解稱於鄉里謙之年數歲所生母亡昭之假葬田側為族人朱幼方燎火所焚同産姊密語之謙之雖小便哀戚如持喪年長不婚娶永明中手刃殺幼方詣獄自繫縣令申靈勗表上別駕孔稚圭兼記室劉璡司徒左西掾張融箋與刺史豫章王曰禮開報仇之典以申孝義之情法斷相殺之條以表權時之制謙之揮刃軒斬寃既申私禮繫頸就死又明公法今仍殺之則成當世罪人宥而活之即為盛朝孝子殺一罪人未足弘憲活一孝子實廣風德張緒陸澄是其鄉舊應具來由融等與謙之並不相識區區短見深有恨然豫章王言之世祖時吳郡太守王慈太常張緒尚書陸澄並表論其事世祖嘉其義慮相復報乃遣謙之隨曹虎西行將發幼方子惲於津陽門伺殺謙之謙之之兄選之又刺殺惲有司以聞世祖曰此皆是義事不可問悉赦之吳興沈顗聞而歎曰弟死於孝兄殉於義孝友之節萃此一門選之字處林有志節著辨相論幼時顧歡見而異之以女妻焉官至江夏王參軍蕭睿明南蘭陵人領軍將軍諶從祖兄弟也父孝孫左軍睿明初仕員外殿中將軍少有至性奉親謹篤母病躬禱夕不假寐及亡不勝哀而卒永明五年世祖詔曰龍驤將軍安西中兵參軍松滋令蕭睿明愛敬淳深色養盡禮喪過乎哀遂致毀滅雖未達聖教而一至可愍宜加榮命以矜善人可贈中書郎樂頤字文德南陽陽人世居南郡少而言行和謹仕為京府參軍父在郢州病亡頤忽思父涕泣因請假還中路果得父凶問頤便徒跣號咷出陶家後渚遇商人附載西上水漿不入口數日嘗遇病與母隔壁忍痛不言齧被至碎恐母之哀己也湘州刺史王僧虔引為主簿以同僚非人棄官去吏部郎庾杲之嘗往候頤為設食枯魚菜菹而已杲之曰我不能食此母聞之自出常膳魚羹數種杲之曰卿過於茅季偉我非郭林宗仕至郢州治中卒弟預亦孝父臨亡執其手以託郢州行事王奐預悲感悶絶吐血數升遂發病官至驃騎録事隆昌末預謂丹陽尹徐孝嗣曰外傳藉藉似有伊周之事君蒙武帝殊常之恩荷託付之重恐不得同人此舉人笑褚公至今齒冷孝嗣心甚納之建武中為永世令民懷其德卒官有一老嫗行擔斛蔌若葉將詣市聞預死棄擔號泣鴈門解仲恭亦僑居南郡家行敦睦得畕豪財利輒與兄弟平分母病經時不差入山採藥遇一老父語之曰得丁公藤病立愈此藤近在前山際高樹垂下便是也忽然不見仲恭如其言得之治病母即差至今江陵人猶有識此藤者江泌字士清濟陽考城人也父亮之員外郎泌少貧晝日斫竹巾戈夜讀書隨月光握卷升屋性行仁義衣弊恐虱飢死乃復取置衣中數日間終身無復虱母亡後以生闕供養遇鮭不忍食食菜不食心以其有生意也歷仕南中郎行參軍所給募吏去役得時病莫有舍之者吏扶杖投泌泌親自隱恤吏死泌為買棺無僮役兄弟共輿埋之領國子助教乘牽車至染烏頭見老翁步行下車載之躬自步去世祖以為南康王子琳侍讀建武中明帝害諸王後泌憂念子琳詣志公道人問其禍福志公覆香爐灰示之曰都盡無所餘及子琳被害泌往哭之淚盡繼之以血親視殯葬乃去時廣漢王侍讀嚴桓之亦哭王盡哀泌尋卒泌族人六允州治中泌黃門郎悆子也與泌同名世謂泌為孝江泌以別之杜栖字孟山吳郡錢唐人徵士京産子也同郡張融與京産相友每相造言論栖常在側融指栖曰昔陳太丘之召元方方之為劣以今方古古人何貴栖出京師從儒士劉瓛受學善清言能彈琴飲酒名儒貴遊多敬待之中書郎周顒與京産書曰賢子學業清標後來之秀嗟愛之懷豈知云已所謂人之英彥若己有之也刺史豫章王聞其名辟議曹從事仍轉西曹佐竟陵王子良數致禮接國子祭酒何胤治禮又重栖以為學士掌婚冠儀以父老歸養怡情壠畝栖肥白長壯及京産疾旬日間便皮骨自支京産亡水漿不入口七日晨夕不罷哭不食鹽菜每營買祭奠身自看視號泣不自持朔望節歲絶而復續吐血數升時何胤謝朏並隱東山遺書敦譬誡以毀滅至祥禫暮夢見其父慟哭而絶初胤兄點見栖歎曰卿風韻如此雖獲嘉譽不永年矣卒時年三十六當世咸嗟惜焉建武二年剡縣有小兒年八歲與母俱得赤班病母死家人以小兒猶惡不令其知小兒疑之問云母嘗數問我病昨來覺聲羸今不復聞何謂也因自投下牀匍匐至母尸側頓絶而死鄉鄰告之縣令宗善才求表廬事竟不行陸絳字魏卿吳郡人也父間字遐業有風概與人交不苟合少為同郡張緒所知仕至揚州別駕明帝崩間謂所親曰宮車晏駕百司將聽於冢宰主王地重才弱必不能振難將至矣乃感心疾不復預州事刺史始安王遙光反事敗間以綱佐被召至杜姥宅尚書令徐孝嗣啓間不預逆謀未及報徐世摽檦令殺之絳時隨間抱間頸乞代死遂并見殺史臣曰澆風一起人倫毀薄抑引之教徒聞圭璋之璞罕就若令事長移忠儻非行舉薑桂辛酸容遷本質而旌閭變里問餼存牢不過魚衆寡齊矜力田等勸其於扶奬名教未為多也贊曰孝為行首義實因心白華秉節寒木齊心
