body:
  text: 南齊書卷三十九梁蕭子顯撰列傳第二十劉瓛弟璡陸澄劉瓛字子珪沛國相人晉丹陽尹惔六世孫也祖𢎞之給事中父惠治書御史瓛初州辟祭酒主簿宋大明四年舉秀才兄璲亦有名先應州舉至是别駕東海王元曾與瓛父惠書曰此嵗賢子充秀州閭可謂得人除奉朝請不就少篤學博通五經聚徒教授常有數十人丹陽尹袁粲於後堂夜集瓛在座粲指庭中栁樹謂瓛曰人謂此是劉尹時樹每想髙風今復見卿清徳可謂不衰矣薦為秘書郎不見用除邵陵王郡主簿安陸王國常侍安成王撫軍行參軍公事免瓛素無宦情自此不復仕除車騎行參軍南彭城郡丞尚書祠部郎並不拜袁粲誅瓛微服往哭并致賻助太祖踐阼召瓛入華林園談語謂瓛曰吾應天革命物議以為何如瓛對曰陛下誡前軌之失加之以寛厚雖危可安若循其覆轍雖安必危矣既出帝顧謂司徒褚淵曰方直乃爾學士故自過人敕瓛使數入而瓛自非詔見未嘗到宫門上欲用瓛為中書郎使吏部尚書何戢喻㫖戢謂瓛曰上意欲以鳳池相處恨君資輕可且就前除少日當轉國子博士便即後授瓛曰平生無榮進意今聞得中書郎而拜豈本心哉後以母老闕養重拜彭城郡丞謂司徒褚淵曰自省無廊廟之才所願唯保彭城丞耳上又以瓛兼總明觀祭酒除豫章王驃騎記室參軍丞如故瓛終不就武陵王曅為㑹稽太守上欲令瓛為曅講除㑹稽郡丞學徒從之者轉衆永明初竟陵王子良請為征北司徒記室瓛與張融王思逺書曰奉教使恭召㑹當停公事但念生平素抱有乖恩顧吾性拙人間不習仕進昔嘗為行佐便以不能及公事免黜此皆眷者所共知也量已審分不敢期榮夙嬰貧困加以疎懶衣裳容髪有足駭者中以親老供養褰裳徒歩脱爾逮今二代一紀先朝使其更自修正勉厲於階級之次見其繿縷或復賜以衣裳袁褚諸公咸加勸勵終不能自反也一不復為安可重為哉昔人有以冠一免不重加於首每謂此得進止之儀古者以賢制爵或有秩滿而辭老以庸制禄或有身病而求歸者永瞻前良在已何若又上下年尊益不願居官次廢晨昏也先朝為此曲申從許故得連年不拜榮授而帶帖薄禄既習此嵗久又齒長疾侵豈宜攝齋河間之聼厠迹東平之僚本無絶俗之操亦非能偃蹇為髙此又諸賢所當深察者也近奉初教便自希得託迹於客遊之末而固辭榮級其故何耶以古之王侯大人或以此延四方之士甚美者則有輻湊燕路慕君王之義驤鑣魏闕髙公子之仁繼有追申白而入楚羡鄒枚而遊梁吾非敢叨夫曩賢庶欲從九九之遺蹤既於聞道集泮不殊而幸無職司拘礙可得奉温凊展私計志在此爾除歩兵校尉並不拜瓛姿狀纎小儒學冠於當時京師士子貴遊莫不下席受業性謙率通美不以髙名自居遊詣故人唯一門生持胡床随後主人未通便坐問答住在檀橋瓦屋數間上皆穿漏學徒敬慕不敢指斥呼為青溪焉竟陵王子良親往修謁七年表世祖為瓛立館以揚烈橋故主第給之生徒皆賀瓛曰室美為人災此華宇豈吾宅耶幸可詔作講堂猶恐見害也未及徙居遇病子良遣從瓛學者彭城劉繪順陽范縝將厨於瓛宅營齋及卒門人受學者並弔服臨送時年五十六瓛有至性祖母病疽經年手持膏藥漬指為爛母孔氏甚嚴明謂親戚曰阿稱便是今世曽子阿稱瓛小名也年四十餘未有婚對建元中太祖與司徒褚淵為瓛娶王氏女王氏椓壁挂履土落孔氏牀上孔氏不悦瓛即出其妻及居父喪不出廬足為之屈杖不能起今上天監元年下詔為瓛立碑諡曰貞簡先生所著文集皆是禮義行於世初瓛講月令畢謂學生嚴植曰江左以來隂陽律數之學廢矣吾今講此曽不得其髣髴時濟陽蔡仲熊禮學博聞謂人曰凡鐘律在南不容復得調平昔五音金石本在中土今既來南土氣偏陂音律乖爽瓛亦以為然仲熊歴安西記室尚書左丞瓛弟璡璡字子璥方軌正直宋泰豫中為明帝挽郎舉秀才建平王景素征北主簿深見禮遇邵陵王征虜安南行參軍建元初為武陵王曅冠軍征虜參軍曅與僚佐飲自割鵝炙璡曰應刄落爼膳夫之事殿下親執鸞刀下官未敢安席因起請退與友人孔澈同舟入東澈留目觀岸上女子璡舉席自隔不復同坐豫章王太尉板行佐兄瓛夜隔壁呼璡共語璡不答方下牀著衣立然後應瓛問其久璡曰向束帶未竟其立操如此文惠太子召璡入侍東宫每上事輙削草尋署中兵兼記室參軍大司馬軍事射聲校尉卒官陸澄字彦淵吳郡吳人也祖邵臨海太守父瑗州從事澄少好學博覽無所不知行坐眠食手不釋卷起家太學博士中軍衛軍府行佐太宰參軍補太常丞郡主簿北中郎行參軍宋泰始初為尚書殿中郎議皇后諱及下外皆依舊稱姓左丞徐爰案司馬孚議皇后不稱姓春秋逆王后于齊澄不引典據明而以意立議坐免官白衣領職郎官舊有坐杖有名無實澄在官積前後罰一日并受千杖轉通直郎兼中書郎尋轉兼左丞泰始六年詔皇太子朝賀服衮冕九章澄與儀曹郎丘仲起議服冕以朝實著經文秦除六冕漢明還備魏晉以來不欲令臣下服衮冕故位公者加侍官今皇太子禮絶羣后宜遵聖王盛典革近代之制尋轉著作正員郎兼官如故除安成太守轉劉韞撫軍長史加綏逺將軍襄陽太守並不拜仍轉劉秉後軍長史東海太守遷御史中丞建元元年驃騎諮議沈憲等坐家奴客為劫子弟被劾憲等晏然左丞任遐奏澄不紏請免澄官澄上表自理曰周稱舊章漢言故事爰自河雒降逮淮海朝之憲度動尚先准若乃任情違古率意專造豈謂酌諸故實擇其茂典案遐唘彈新除諮議參驃騎大將軍軍事沈憲太子庶子沈曠并弟息敕付建康而憲被使曠受假俱無歸罪事狀臣以不紏憲等為失伏尋晉宋左丞案奏不乏於時其及中丞者從來殆無王獻之習達朝章近代之宗其為左丞彈司徒屬王濛憚罰自解屬疾遊行初不及中丞桓秘不奔山陵左丞鄭襲不彈秘直彈中丞孔欣時又云别攝蘭臺檢校此徑彈中丞之謂唯左丞庾登之奏鎮北檀道濟北伐不進致虎牢陷沒蕃岳宰臣引咎謝諐而責帥之劾曽莫奏聞請收治道濟免中丞何萬嵗夫山陵情敬之極北伐專征之大秘霸季之貴道濟元勲之盛所以咎及南司事非常憲然秘事猶非及中丞也今若以此為例恐人之貴賤事之輕重物有其倫不可相方左丞江奥彈叚景文又彈裴方明左丞甄法崇彈蕭珍又彈杜驥又彈叚國又彈范文伯左丞羊𤣥保又彈蕭汪左丞殷景熙彈張仲仁兼左丞何承天彈吕萬齡並不歸罪皆為重劾凡兹十彈差是憲曠之比悉無及中丞之議左丞荀萬秋劉藏江謐彈王僧朗王雲之陶寳度不及中丞最是近例之明者謐彈在今龕􅧰之後事行聖照逺取十奏近徴二案自宜依以為體豈得捨而不遵臣竊此人乏謬奉國憲今遐所紏既行一時若黙而不言則向為來准後人被繩方當追請素飡之責貽塵千載所以備舉顯例引通國典雖有愚心不在微躬請出臣表付外詳議若所陳非謬裁由天鑒詔委外詳議尚書令褚淵奏宋世左丞荀伯子彈彭城令張道欣等坐界刼累發不禽免道欣等官中丞王淮不紏亦免官左丞羊𤣥保彈豫州刺史管義之譙梁羣盜免義之官中丞傅隆不紏亦免隆官左丞羊𤣥保又彈兖州刺史鄭從之濫上布及加課租綿免從之官中丞傅隆不紏免隆官左丞陸展彈建康令丘珍孫丹陽尹孔山士刦發不禽免珍孫山士官中丞何朂不紏亦免朂官左丞劉曚彈青州刺史劉道隆失火燒府庫免道隆官中丞蕭惠開不紏免惠開官左丞徐爰彈右衛將軍薛安都屬疾不直免安都官中丞張永結免澄謏聞膚見貽撓後昆上掩皇明下籠朝識請以見事免澄所居官詔曰澄表據多謬不足深劾可白衣領職明年轉給事中秘書監遷吏部四年復為秘書監領國子博士遷都官尚書出為輔國將軍鎮北鎮軍二府長史廷尉領驍騎將軍永明元年轉度支尚書尋領國子博士時國學置鄭王易杜服春秋何氏公羊糜氏榖梁鄭𤣥孝經澄謂尚書令王儉曰孝經小學之類不宜列在帝典乃與儉書論之曰易近取諸身逺取諸物彌天地之道通萬物之情自商瞿至田何其閒五傳年未為逺無訛雜之失秦所不焚無崩壞之弊雖有異家之學同以象數為宗數百年後乃有王弼王濟云弼所悟者多何必能頓廢前儒若謂易道盡於王弼方湏大論意者無乃仁智殊見四道異傳無體不可以一體求屢遷不可以一遷執也晉太興四年太常荀崧請置周易鄭𤣥注博士行乎前代于時政由王庾皆儁神清識能言𤣥逺捨輔嗣而用康成豈其妄然泰元立王肅易當以在𤣥弼之間元嘉建學之始𤣥弼兩立逮顔延之為祭酒黜鄭置王意在貴𤣥事成敗儒今若不大𢎞儒風則無所立學衆經皆儒惟易獨𤣥𤣥不可棄儒不可缺謂宜並存所以合無體之義且弼於注經中已舉繫辭故不復别注今若專取弼易則繫説無注左氏泰元取服䖍而兼取賈逵經服傳無經雖在注中而傳又有無經者故也今留服而去賈則經有所闕案杜預注傳王弼注易俱是晚出並貴後生杜之異古未如王之奪實祖述前儒特舉其違又釋例之作所引惟深榖梁泰元舊有糜信注顔益以范甯糜猶如故顔論閏分范注當以同我者親常謂榖梁劣公羊為注者又不盡善竟無及公羊之有何休恐不足兩立必謂范善便當除糜世有一孝經題為鄭𤣥注觀其用辭不與注書相類案𤣥自序所注衆書亦無孝經儉答曰易體微逺實貫羣籍施孟異聞周韓殊㫖豈可專據小王便為該備依舊存鄭髙同來説元凱注傳超邁前儒若不列學官其可廢矣賈氏注經世所罕習榖梁小書無俟兩注存糜略范率由舊式凡此諸義並同雅論疑孝經非鄭所注僕以此書明百行之首實人倫所先七畧藝文並陳之六藝不與蒼頡凡將之流也鄭注虛實前代不嫌意謂可安仍舊立置儉自以博聞多識讀書過澄澄曰僕年少來無事唯以讀書為業且年已倍令君令君少便鞅掌王務雖復一覽便諳然見卷軸未必多僕儉集學士何憲等盛自商略澄待儉語畢然後談所遺漏數百千條皆儉所未覩儉乃歎服儉在尚書省出巾箱几案雜服飾令學士隸事事多者與之人人各得一兩物澄後來更出諸人所不知事復各數條并奪物將去轉散騎常侍秘書監吳郡中正光禄大夫加給事中中正如故尋領國子祭酒以竟陵王子良得古器小口方腹而底平可將七八升以問澄澄曰此名服匿單于以與蘇武子良後詳視器底有字髣髴可識如澄所言隆昌元年以老疾轉光禄大夫加散騎常侍未拜卒年七十諡靖子當世稱為碩學讀易三年不解文義欲撰宋書竟不成王儉戱之曰陸公書厨也家多墳籍人所罕見撰地理書及雜傳死後乃出澄弟鮮得罪宋世當死澄於路見舎人王道隆叩頭流血以此見原揚州主簿顧測以兩奴就鮮質錢鮮死子暉誣為賣劵澄為中丞測與書相往反後又牋與太守蕭緬云澄欲遂子弟之非未近義方之訓此趨販所不為況搢紳領袖儒宗勝達乎測遂為澄所排抑世以此少之時東海王摛亦史學博聞歴尚書左丞竟陵王子良校試諸學士唯摛問無不對永明中天忽黄色照地衆莫能解摛云是榮光世祖大悦用為永陽郡史臣曰儒風在世立人之正道聖哲微言百代之通訓洙泗既往義乖七十稷下横論屈服千人自後專門之學興命氏之儒起石渠朋黨之事白虎同異之説六經五典各信師言嗣守章句期乎勿失西京儒士莫有獨擅東都學術鄭賈先行康成生炎漢之季訓義優洽一世孔門褒成並軌故老以為前修後生未之敢異而王肅依經辯理與碩相非爰興聖證據用家語外戚之尊多行晉代江左儒門參差互出雖於時不絶而罕復專家晉世以𤣥言方道宋氏以文章閒業服膺典藝斯風不純二代以來為教衰矣建元肇運戎警未夷天子少為諸生端拱以思儒業載戢干戈遽詔庠序永明纂襲克隆均校王儉為輔長於經禮朝廷仰其風胄子觀其則由是家尋孔教人誦儒書執卷欣欣此焉彌盛建武繼立因循舊緒時不好文輔相無術學校雖設前軌難追劉瓛承馬鄭之後一時學徒以為師範虎門初闢法駕親臨待問無五更之禮充庭闕蒲輪之御身終下秩道義空存斯故進賢之責也其餘儒學之士多在卑位或隠世辭榮者别見他篇云賛曰儒宗義肆紛綸子珪升堂受業事越闗西璡居闇室立操無攜彦淵書史疑問窮稽南齊書卷三十九南齊書卷三十九考證陸澄傳易體微逺實貫群籍施孟異聞周韓殊㫖豈可專據小王便為該備依舊存鄭南史無異聞殊㫖二句臣承蒼按陸澄言王弼注易異乎儒學而王儉答之如此自唐孔頴達作正義專取弼書而康成之説遂廢矣史臣賛彦淵書史疑問窮稽臣承蒼按彦淵當是王摛字齊書無摛傳南史附摛於王諶傳後不載其字有云竟陵王子良校試諸學士唯摛問無不對此云疑問窮稽想必謂摛也南齊書卷三十九考證
