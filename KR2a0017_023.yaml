body:
  text: 南齊書卷二十三列傳第四褚淵淵弟澄徐嗣王儉褚淵字彥回河南陽翟人也祖秀之宋太常父湛之驃騎將軍尚宋武帝女始安哀公主淵少有世譽復尚文帝女南郡獻公主姑姪二世相繼拜駙馬都尉除著作佐郎太子舍人太宰參軍太子洗馬祕書丞湛之卒淵推財與弟唯取書數千卷襲爵都鄉侯歷中書郎司徒右長史吏部郎宋明帝即位加領太子屯騎校尉不受遷侍中知東宮事轉吏部尚書尋領太子右衛率固辭司徒建安王休仁南討義嘉賊屯鵲尾遣淵詣軍選將帥以下勳階得自專決事平加驍騎將軍薛安都以徐州叛虜頻寇淮泗遣淵慰勞北討衆軍淵還啓帝言盱眙以西戎備單寡宜更配衣汝陰荊亭並已圍逼安豐又已不守壽春衆力止足自保若使遊騎擾壽陽則江外危迫歷陽瓜步鍾離義陽皆須實力重戍選有幹用者處之帝在藩與淵以夙風素相善及即位深相委寄事皆見從改封雩都縣伯邑五百戶轉侍中領右衛將軍尋遷散騎常侍丹陽尹出為吳興太守常侍如故增秩千石固辭增秩明帝疾甚馳使召淵付以後事帝謀誅建安王休仁淵固諫不納復為吏部尚書領常侍衛尉如故不受乃授右僕射衛尉如故淵以母年高羸疾晨昏須養固辭衛尉不許明帝崩遺詔以為中書令護軍將軍加散騎常侍與尚書令袁粲受顧命輔幼主淵同心共理庶事當奢侈之後務弘儉約百姓賴之接引賓客未嘗驕倦王道隆阮佃夫用事賂公行淵不能禁也遭庶母郭氏喪有至性數日中毀頓不可復識期年不盥櫛惟泣淚處乃見其本質焉詔斷哭禁弔客葬畢起為中軍將軍本官如故元徽二年桂陽王休範反淵與衛將軍袁粲入衛宮省鎮集衆心淵初為丹陽與從弟照同載出道逢太祖淵舉手指太祖車謂照曰此非常人也出為吳興太祖餉物別淵又謂之曰此人材貌非常將來不可測也及顧命之際引太祖豫焉太祖既平桂陽遷中領軍領南六允州增戶邑太祖固讓與淵及衛軍袁粲書曰下官常人志不及遠隨運推斥妄踐非涯才輕任重夙宵冰惕近值國危含氣同奮況在下官寧吝身命履冒鋒炭報效理而褒嘉之典偏見甄沐貴登端戎秩加爵土瞻言霄衢魂神震墜下官奉上以誠率性無矯前後忝荷未嘗固讓至若今授特深恇迫實以銜恩先旨義兼陵闕識蔽防萌宗戚構禍引誚歸咎既已靦顏乃復乘災求幸藉亂取貴斯實國家之恥非臣子所忍也且榮不可濫寵不可昧乞蠲中候請停增邑庶保止足輸效淮湄如使伐胸奴凱歸反旆以此受爵不復固辭矣淵粲答曰來告穎亮敬挹無已謙貶居心深承非飾此誠此旨久著言外況復造席舒襟迂翰緒意推情顧己信足書紳但今之所宜商榷必以輕重相推世惟多難事屬雕弊四維恇擾邊氓未安國家費廣府藏須備北狄侵邊憂虞交切𧜛內含識尚為天下危心相與共荷任寄若此當可稍修廉退不求之懷抱實謂不可了其不可理無固執且勍寇窮凶勢過原燎釁逆倉卒終古未聞常時懼惑當慮先定結壘新亭枕戈待敵斷決之策實有由然鋒鏑初交元惡送首總律制奇判於此舉裂邑萬戶登爵槐鼎亦何足少酬勳勞粗塞物聽今以近侍禁旅進升中候乘平隨牒取此非叨濟河昔所履牧鎮軍秩不逾本詳校階序愧在未優就加沖損特虧朝制奉職數載同舟無幾劉領軍峻節霜明臨危不顧音迹未晞奄成今古迷途失偶慟不及悲戎謨內寄務倍急秉操辭榮將復誰委誠惟軍柄所期自增茂圭社貫朝廷匹夫里語尚欲信厚君令必行逡巡何路凡位居物首功在衆先進退之宜當與衆共苟殉獨善何以處物受不自私彌見至公表𩹉詳究無而後可想體殊常深思然納太祖乃受命其年淵加尚書令侍中給班劒二十人固讓令三年進爵為侯增邑千戶服闋改授中書監侍中護軍如故給鼓吹一部明年淵後嫡母吳郡公主薨毀瘠如初葬畢詔攝職固辭又以期祭禮及表解職並不許蒼梧酷暴稍甚太祖與淵及袁粲言世事粲曰主上幼年微過易改伊霍之事非季代所行縱使功成亦終無全地淵默然歸心太祖及廢蒼梧羣公集議袁粲劉秉既不受任淵曰非蕭公無以了此手取書授太祖太祖曰相與不肯我安得辭事乃定順帝立改號衛將軍開府儀同三司侍中如故甲仗五十人入殿沈攸之事起袁粲懷二太祖召淵謀議淵曰西夏釁難事必無成公當先備其內耳太祖密為其備事平進中書監司空本官如故齊臺建淵白太祖引何曾自魏司徒為晉丞相求為齊官太祖謙而不許建元元年進位司徒侍中中書監如故封南康郡公邑三千戶淵固讓司徒與僕射王儉書欲依蔡謨事例儉以非所宜言勸淵受命淵終不就淵美儀貌善容止俯仰進退咸有風則每朝會百僚遠國使莫不延首目送之宋明帝嘗歎曰褚淵能遲行緩步便持此得宰相矣尋加尚書令本官如故二年重申前命為司徒又固讓是年虜動上欲發王公已下無官者為軍淵諫以為無益實用空致擾動上乃止朝廷機事多與咨謀每見從納禮遇甚重上大宴集酒後謂羣臣曰卿等並宋時公卿亦當不言我應得天子王儉等未及答淵斂板曰陛下不得言臣不早識龍顏上笑曰吾有愧文叔知公為朱祐祜久矣淵涉獵談議善彈琵琶世祖在東宮賜淵金鏤柄銀柱琵琶性和雅有器度不妄舉動宅嘗失火煙焰甚逼左右驚擾淵神色怡然索輿來徐去輕薄子頗以名節譏之以淵眼多白精謂之白虹貫日言為宋氏亡徵也太祖崩遺詔以淵為録尚書事江左以來無單拜録者有司疑立優策尚書王儉議以為見居本官別拜録推理應有策書而舊事不載中朝以來三公王侯則優策並設官品第二策而不優優者褒美策者兼明委寄尚書職居天官政化之本故尚書令品雖第三拜必有策録尚書品秩不見而總任彌重前代多與本官同拜故不別有策即事緣情不容均之凡僚宜有策書用申隆寄既異王侯不假優文從之尋增淵班劒為三十人五日一朝頃之寢疾上相星連有變淵憂之表遜位又因王儉及侍中王晏口陳於世祖世祖不許又啓曰臣顧惟凡薄福過災生未能以正情自安遠慙彥輔既內懷耿介便覺晷刻難推叨職未久首歲便嬰疾篤爾來沈痼頻經危殆彌深憂震陛下曲存遲回或謂僉議同異此出於留慈每過愛欲其榮臣年四十有八叨忝若此以疾陳遜豈駭聽察總録之任江左罕授上鄰亞台升降蓋微今受祿弗辭退絀斯願於臣名器非曰貶少萬物耳目皎然共見寧足仰延聖慮稍垂矜惜臣若內飾廉譽外循謙後此則憲書行劾刑綱是肅臣赤誠不能行亦幽明所不宥區區寸心歸啓以實自吝寸陰實願方倍堯世昔王弘固請乃於司徒為衛將軍宋氏行之不疑當時物無異議以臣方之曾何足説伏願恢闡宏猷賜開亭造則臣死之日猶生之年乃改授司空領驃騎將軍侍中録尚書如故上遣侍中王晏黃門郎王秀之問疾薨家無餘財負債至數十萬詔曰司徒奄至薨逝痛怛慟懷比雖瘵便力出臨哭給東園祕器朝服一具衣一襲錢二十萬布二百匹蠟二百斤時司空掾屬以淵未拜疑應為吏敬不王儉議依禮婦在塗聞夫家喪改服而入今掾屬雖未服勤而吏節稟於天朝宜申禮敬司徒府史又以淵既解職而未恭後授府猶應上服以不儉又議依中朝士孫德祖從樂陵遷為陳留未入境卒樂陵郡吏依見君之服陳留迎吏依娶女有吉日齊衰弔司徒府宜依居官制服又詔曰夫褒德所以紀民慎終所以歸厚前王習𡊚盛典咸必由之故侍中司徒録尚書事新除司徒空領驃騎將軍南康公淵履道秉哲鑒識弘曠爰初弱齡清風夙舉登庸應務具瞻允集孝友著於家邦忠貞彰於亮采佐命先朝經綸王化契闊屯夷綢繆終始總録機衡四門惟穆諒以同規往古式範來今謙光彌遠屢陳降挹權從高旨用虧大猷將登上列永翼聲教天不憖遺奄焉薨逝朕用震慟于厥心其贈公太宰侍中録尚書公如故給節加羽葆鼓吹增班劒為六十人葬送之禮悉依宋太保王弘故事諡曰文簡先是庶姓三公車未有定格王儉議官品第一皆加幢絡自淵始也又詔淵妻宋故巴西主埏隧暫啓宜贈南康郡公夫人長子賁字蔚先解褐祕書郎升明中為太祖太尉從事中郎司徒右長史太傅戶曹屬黃門郎領羽林監齊世子中庶子領翊軍校尉建元初仍為宮官歷侍中淵薨服闋見世祖賁流涕不自勝上甚嘉之以為侍中領步兵校尉長史左民尚書散騎常侍祕書監不拜六年上表稱疾讓封與弟蓁世以為賁恨淵失節於宋室故不復仕永明七年卒詔賜錢三萬布五十匹蓁字茂緒永明中解褐為員外郎出為義興太守八年改封巴東郡侯明年表讓封還賁子霽詔許之建武末為太子詹事度支尚書領軍將軍永元元年卒贈太常諡穆淵弟澄澄字彥道初湛之尚始安公主薨納側室郭氏生淵後尚吳郡公主生澄淵事主孝謹主愛之湛之亡主表淵為嫡澄尚宋文帝女廬江公主拜駙馬都尉歷官清顯善醫術建元中為吳郡太守豫章王感疾太祖召澄為治立愈尋遷左民尚書淵薨澄以錢萬一千就招提寺贖太祖所賜淵白貂坐褥壞作裘及纓又贖淵介幘犀導及淵常所乘黃牛永明元年為御史中丞袁彖所奏免官禁錮見原遷侍中領右軍將軍以勤謹見知其年卒澄女為東昏皇后永元元年追贈金紫光祿大夫時東陽徐嗣醫術妙有一傖父冷病積年重茵纍褥牀下設爐火猶不差嗣為作治盛冬月令傖父髁身坐石啓以百瓶水從頭自灌初與數十瓶寒戰垂死其子弟相守垂泣嗣令滿數得七八十瓶後舉體出氣如雲蒸嗣令徹牀去被明日立能起行云此大熱病也又春月出南籬門猆聞笪屋中有呻吟聲嗣曰此病甚重更二日不治必死乃往視一姥稱舉體痛而處處有爤黑無數嗣還煮升餘湯送令服之姥服竟痛愈甚跳投牀者無數須臾所爤處皆拔出長寸許乃以膏塗諸瘡口三日而復云此名釘疽也事驗甚多過於澄矣王儉字仲寶琅琊臨沂人也祖曇首宋右光祿父僧綽金紫光祿大夫儉生而僧綽遇害為叔父僧虔所養數歲襲爵豫章寧侯拜受茅土流涕嗚咽幼有神彩專心篤學手不釋卷丹陽尹袁粲聞其名言之於明帝尚陽羡公主拜駙馬都尉帝以儉嫡母武康公主同太初巫蠱事不可以為婦姑欲開離葬儉因人自陳密以死請故事不行解褐祕書郎太子舍人超遷祕書丞上表求校墳籍依七略撰七志四十卷上表獻之表辭甚典又撰定元徽四部書目母憂服闋為司徒右長史晉令公府長史著朝服宋大明以來著朱衣儉上言宜復舊時議不許蒼梧暴虐儉憂懼告袁粲求出引晉新安主壻王獻之為吳興例補義興太守還為黃門郎轉吏部郎升明二年遷長兼侍中以父終此職固讓儉察太祖雄異先於領府衣裾太祖為太尉引為右長史恩禮隆密專見任用轉左長史及太傅之授儉所唱也少有宰相之志物議咸相推許時大典將行儉為佐命禮儀詔策皆出於儉褚淵唯為禪詔文使儉參治之齊臺建遷右僕射領吏部時年二十八太祖從容謂儉曰我今日以青溪為鴻溝對曰天應民從庶無楚漢之事建元元年改封南昌縣公食邑二千戶明年轉左僕射領選如故上壞宋明帝紫極殿以材柱起宣陽門儉與褚淵及叔父僧虔連名上表諫曰臣聞德者身之基儉者德之輿春臺將立晉卿秉議北宮肇構漢臣盡規彼二君者或列國常侯或守文中主尚使諫諍在義即悅況陛下聖哲應期臣等職司隆重敢藉前誥竊乃有心陛下登庸宰物節省之教既昭龍袞琁極簡約之訓彌遠乾華外構采椽不紫極故材為宣陽門臣等未譬也夫移心疾於股肱非良醫之美畏影迹而馳騖豈靜處之方且又三農在日千畛咸事輟望歲之勤興土木之役非所以宣昭大猷光示遐邇若以門居宮南重陽所屬年月稍久漸就淪胥自可隨宜修理而合度改作之煩於是乎息所啓謬合請付外施行上手詔酬納宋世外六門設竹籬是年初有發白虎樽者言白門三重門竹籬穿不完上感其言改立都出方攴儉又諫上答曰吾欲令後世無以加也朝廷初基制度草創儉識舊事問無不答上歎曰詩云維嶽降神生甫及申今亦天為我生儉也其年儉固請解選表曰臣遠尋終古近察身事邀恩幸藉未見其倫何者子房之遇漢后公達之逢魏君史籍以為美談君子稱其高義二臣才堪王佐理非曲私兩主專杖威武有傷寬裕豈與庸流之人憑含弘之澤者同年而語哉預在有心胡寧無感如使傾宗殞元有益塵露猶當畢志驅馳仰酬萬一豈容稍在形飾以徇常事九流任要風猷所先玉石朱素由斯而定臣亦不謂文案之間都無微解至於品裁臧否特所未間雖存自勗識不副意兼竊而任彼此俱壅專情本官庶幾髣佛且前代掌選未必其在代來何為於今非臣不可傾心奉國匪復退讓之與預同休戚寧俟位任為親陛下若不以此理賜期豈仰望於殊眷頻冒嚴威分甘尤戾見許加侍中固讓復散騎常侍上曲宴羣臣數人各使效伎藝褚淵彈琵琶王僧虔彈琴沈文季歌子夜張敬兒舞王敬則拍張儉曰臣無所解唯知誦書因跪上前誦相如封禪書上笑曰此盛德之事吾何以堪之後上使陸澄誦孝經自仲尼居而起儉曰澄所謂博而寡要臣請誦之乃誦君子之事上章上曰善張子布更覺非奇也尋以本官領太子詹事加兵二百人上崩遺詔以儉為侍中尚書令左鎮軍將軍世祖即位給班劒二十人永明元年進號衛軍將軍參掌選事二年領國子祭酒丹陽尹本官如故給鼓吹一部三年領國子祭酒叔父僧虔亡儉表解職不許又領太子少傅本州中正解丹陽尹舊太子敬二傅同至是朝議接少傅以賓友之禮是歲省總明觀於儉宅開學士館悉以四部書充儉家又詔儉以家為府四年以本官領吏部儉長禮學諳究朝儀每博議證引先儒罕有其例八坐丞郎無能異者令史咨事賓客滿席儉應接銓序傍無留滯十日一還學監試諸生巾卷在庭劒衛令史儀容甚盛作解散髻斜插幘簪朝野慕之相與放效儉常謂人曰江左風流宰相唯有謝安蓋自比也世祖深委仗之士流選用奏無不可五年即本號開府儀同三司固讓六年重申前命先是詔儉三日一還朝尚書令史出外咨事上以往來煩數復詔儉還尚書下省月聽十日出外儉啓求解選不許七年乃上表曰臣比年辭選具簡天明款言彰於侍接丹誠布於朝野物議不以為非聖心未垂矜納臣聞知慧不如明時求之微躬實允斯義妄庸之人沈浮無取命偶休泰遂踐康衢秋葉辭條不假風飊之力太陽躋景無俟螢爝之暉晦往明來五德遞運聖不獨治八元亮采臣逢其時而叨其位常總端右亟管銓衡事涉兩朝歲綿一紀盛年已老孫孺巾冠人物徂遷逝者將半三考無聞九流寂寞能官之詠輟響於當時大車之刺方興於來日若夫珥貂衣衮之貴四輔六教之華誠知匪服職務差簡端揆雖重猶可勉勵至於品藻之任尤懼其阻夙宵罄竭屢試無庸歲月之久近世罕比非唯悔吝在身故乃惟塵及國方今多士盈朝羣才競爽選衆而授古亦何人冒陳微翰必希天照至敬無文不敢煩黷見許改領中書監參掌選事其年疾上親臨視薨年三十八吏部尚書王晏啓及儉喪上答曰儉年德富盛志用方隆豈意暴疾不展救護便為異世奄忽如此痛酷彌深其契闊艱運義重常懷言尋悲切不能自勝痛矣奈何往矣奈何詔衛軍文武及臺所兵仗可悉停待葬又詔曰慎終追遠列代通規褒德紀勳彌峻策故侍中中書令太子少傅領國子祭酒衛軍將軍開府儀同三司南昌公儉體道秉哲風宇淵曠肇自弱齡清猷自遠登朝應務民望斯屬草昧皇基協隆鼎祚宏謨盛烈載銘彝篆及贊朕躬徽績光茂忠圖令範造次必彰四門允穆百揆時序宗臣之重情寄兼常方正位論道永釐衮職弼茲景化以贊隆平天不憖遺奄焉薨逝朕用震慟于厥心可追贈太尉侍中中書監公如故給節加羽葆鼓吹增班劒為六十人葬禮依故太宰文簡公褚淵故事冢墓材官營辦諡文憲公儉寡嗜欲唯以經國為務車服塵素家無遺財手筆典裁為當時所重少撰古今喪服集記并文集並行於世今上受禪下詔為儉立碑降爵為侯千戶儉弟遜升明中為丹陽丞告劉秉事不蒙封賞建元初為晉陵太守有怨言儉慮為禍因褚淵啓聞中丞陸澄依事舉奏詔曰儉門世載德竭誠佐命特降刑書宥遜以遠徙永嘉郡道伏誅史臣曰褚淵袁粲俱受宋明帝顧託粲既死節於宋氏而淵逢興運世之非責淵者衆矣臣請論之夫湯武之迹異乎堯舜伊呂之心亦非稷契降此風規未足為證也自金張世族袁楊鼎貴委質服義皆由漢氏膏腴見重事起於斯魏氏君臨年祚短促服褐前代宦成後朝晉氏登庸與之從事名雖魏臣實為晉有故主位雖改臣任如初自是世祿之盛習為舊準羽儀所隆人懷羡慕君臣之節徒致虛名貴仕素資皆由門慶平流進取坐至公卿則知殉國之感無因保家之念宜切市朝亟革寵貴方來陵闕雖殊顧眄如一中行智伯未有異遇褚淵當泰始初運清塗已顯數年之間不患無位既以民望而見引亦隨民望而去之夫爵祿既輕有國常選恩非己獨責人以死斯故人主之所同謬世情之過差也贊曰猗歟褚公德素內充民譽不爽家稱克隆從容佐世貽議匪躬文憲濟濟輔相之體稱述霸王綱維典禮期寄兩朝綢繆宮陛
