body:
  text: 南齊書卷四十梁蕭子顯撰列傳第二十一武十七王武帝二十三男穆皇后生文惠太子竟陵文宣王子良張淑妃生廬陵王子卿魚復侯子響周淑儀生安陸王子敬建安王子真阮淑媛生晋安王子懋衡陽王子峻王淑儀生隨郡王子隆蔡婕妤生西陽王子眀樂容華生南海王子罕傅充華生巴陵王子倫謝昭儀生邵陵王子貞江淑儀生臨賀王子岳庾昭容生西陽王子文荀昭華生南康王子琳顔婕妤生永陽王子珉宫人謝氏生湘東王子建何充華生南郡王子夏第六十二十五二十二皇子早亡子珉建武中繼衡陽元王後竟陵文宣王子良字雲英世祖第二子也初沈攸之難隨世祖在盆城授寧朔將軍仍為宋邵陵王左軍行參軍轉主簿安南記室參軍邵陵王友王名友尋廢此官遷安南長史昇眀三年為使持節都督㑹稽東陽臨海永嘉新安五郡輔國將軍㑹稽太守宋世元嘉中皆責成郡縣孝武徵求急速以郡縣遲緩始遣臺使自此公役勞擾太祖踐阼子良陳之曰前臺使督逋切調恒聞相望於道及臣至郡亦殊不疎凡此軰使人既非詳慎懃順或貪險崎嶇要求此役朝辭禁門情態即異暮宿村縣威福便行但令朱鼓裁完鈹槊㣲具顧眄左右叱咤自専擿宗斷族排輕斥重脅遏津埭恐喝傳郵破崗水逆商旅半引逼令到下先過已船浙江風猛公私畏渡脱舫在前驅令俱發呵䠞行民固其常理侮折守宰出變無窮既瞻郭望境便飛下嚴符但稱行臺未顯所督先訶彊寺却攝羣曹開亭正榻便振荆革其次絳標寸紙一日數至徴村切里俄刻十催四鄉所召莫辨枉直孩老士庶具令付獄或尺布之逋曲以當匹百錢餘税且増為千或誑應質作尚方寄繫東冶萬姓駭廹人不自固遂漂衣敗力競致兼漿值今夕酒諧肉飫即許附申赦格眀日禮輕貨薄便復不入恩科筐貢㣲闕箠撻肆情風塵毁謗隨忿而發及其㹠蒜轉積鵝粟漸盈逺則分鬻他境近則託貿吏民反請郡邑助民由緩囘刺言臺推信在所如聞頃者令長守牧離此每實非復近嵗愚謂凡諸檢課宜停遣使宻畿州郡則指賜勅遥外鎮宰眀下條源既各奉别㫖人競自罄雖復臺使盈湊㑹取正屬所徒相疑僨反更淹懈凡預衣冠荷恩盛世多以闇緩貽諐少為欺猾入罪若類以宰牧乖政則觸事難委不容課逋上綱偏覺非才但賒促差降各限一期如乃事速應緩自依違糾坐之坐之之科不必湏重但令必行期在可肅且兩裝之船充擬千緒三坊寡役呼訂萬計每一事之發彌晨方辦粗計近逺率遣一部職散人領無減二十舟船所資皆復稱是長江萬里費固倍之較畧一年脱得省者息船優役寔為不少兼折姦減竊逺近蹔安封聞喜縣公邑千五百户子良敦義愛古郡民朱百年有至行先卒賜其妻米百斛蠲一民給其薪蘇郡閣下有虞飜舊牀罷任還乃致以歸後於西邸起古齋多聚古人器服以充之夏禹廟盛有禱祀子良曰禹泣辜表仁菲食旌約服翫果粽足以致誠使嵗獻扇簟而已建元二年穆妃薨去官仍為征虜將軍丹陽尹開私倉賑屬縣貧民眀年上表曰亰尹雖居都邑而境壤兼跨廣袤周輪㡬將千里縈原抱隰其處甚多舊遏古塘非惟一所而民貧業廢地利久蕪近啓遣五官殷濔典籖劉僧瑗到諸縣循履得丹陽溧陽永世等四縣解并村耆辭列堪墾之田合計荒熟有八千五百五十四頃脩治塘遏可用十一萬八千餘夫一春就功便可成立上納之㑹遷官事寢是年始制東宫官僚以下官敬子良世祖即位封竟陵郡王邑二千户為使持節都督南徐兗二州諸軍事鎮北將軍南徐州刺史永眀元年徙為侍中都督南兗兗徐青冀五州征北將軍南兗州刺史持節如故給油絡車眀年入為䕶軍將軍兼司徒領兵置佐侍中如故鎮西州三年給鼓吹一部四年進號車騎將軍子良少有清尚禮才好士居不疑之地傾意賓客天下才學皆遊集焉善立勝事夏月客至為設瓜飲及甘果著之文教士子文章及朝貴辭翰皆發教撰録是時上新親政水旱不時子良宻啓曰臣思水潦成患良田沃壤變為汙澤農政告祥因髙肆務播植既周繼以旱虐黔庶呼嗟相視褫氣夫國資於民民資於食匪食匪民何以能政臣每一念此寢不便席本始中郡國大旱宣帝下詔除民租今聞所在逋餘尚多守宰嚴期兼夜課切新税力尚無從故調於何取給政當相驅為盜耳愚謂逋租宜皆原除少降停恩㣲紓民命自宋道無章王風陵替竊官假號駢門連室今左民所檢動以萬數漸漬之来非復始適一朝洗正理致沸騰小人之心罔思前恩董之以威反怨後罰獸窮則觸事在匪輕齊有天下日淺恩洽未布一方或飢當加優養愚謂自可依源削除未宜便充猥役且部曹檢校誠存精宻令史奸黠鮮不容情情既有私理或枉謬耳目有限羣狡無極變易是非居然可見詳而後取於事未遲眀詔深矜獄圄恩文累墜今科網嚴重稱為峻察負罪離諐充積牢户暑時鬱蒸加以金鐵聚憂之氣足感天和民之多怨非國福矣頃土木之務甚為殷廣雖役未及民勤費已積炎旱致災或由於此皇眀載逺書軌未一緣淮帯江數州地耳以魏方漢猶一郡之譬以今比古復為逺矣何得不愛其民緩其政救其危存其命哉湘區奥宻蠻寇熾彊如聞南師未能挫戮百姓齊民積年塗炭疽食侵淫邉虞方重交州夐絶一垂實惟荒服恃逺後賓固亦恒事自青徳啓運款闗受職置之度外不足絓言今縣軍逺伐經途萬里衆寡事殊客主勢異以逸待勞全勝難必又緣道調兵以足軍力民丁烏合事乖習鋭廣州積嵗無年越州兵糧素乏加以發借必致恇擾愚謂叔獻所請不宜聽從取亂侮亡更俟後㑹雖緩嵗月必有可禽之理差息發動費役之勞劉楷見甲以助湘中威力既舉蟻寇自服詔折租布二分取錢子良又啓曰臣一月入朝六登玫陛廣殿稠人裁奉顔色縱有所懐豈敢自達比天眚亟見地孽亟臻民下妖訛好生噂􅊱穀價雖和比室飢嗛縑纊雖賤駢門躶質臣一念此每入心骨三吳奥區地惟河輔百度所資罕不自出宜在蠲優使其全富而守宰相繼務在裒剋圍桑品屋以准貲課致令斬樹發瓦以充重賦破民財産要利一時東郡使民年無常限在所相承准令上直每至州臺使命切求懸急應充猥役必由窮困乃有畏失嚴期自殘軀命亦有斬絶手足以避徭役生育弗起殆為恒事守長不務先富民而唯言益國豈有民貧於下而國富於上邪又泉鑄嵗逺類多翦鑿江東大錢十不一在公家所受必湏輪郭完全遂買本一千加子七百猶求請無地棰革相繼尋完者為用既不兼兩囘復遷貿曽非委積徒令小民每嬰困苦且錢帛相半為制永久或聞長宰湏令輸直進違舊科退容姦利八屬近縣既在亰畿發借徴調實煩他邑民特尤貧連年失稔草衣藿食稍有流亡今農政就興宜蒙賑給若逋課未上許以申原兗豫二藩雖曰舊鎮往屬兵虞累棄鄉土宻邇寇庭下無安志編草結菴不違涼暑扶淮聚洛靡有生向俱禀人靈獨絶温飽而賦斂多少尚均沃實謂凡在荒民應加蠲減又司市之要自昔所難頃来此役不由才舉並條其重貲許以賈衒前人増估求侠後人加税請代如此輪囘終何紀極兼復交闗津要共相脣齒愚野未閑必加陵誑罪無大小横没貲載凡求試穀帛類非㢘謹未解在事所以開容夫獄訟惟平畫一在制雖恩家得罪必宜申憲鼎姓貽諐最合從網若罰典惟加賤下辟書必蠲世族懼非先王立理之本尚書列曹上應乾象如聞命議所出先諮於都都既下意然後付郎謹寫闗行愚謂郎官尤宜推擇宋運告終戎車屢駕寄名軍牒動竊數等故非分充朝資奉殷積廣越邦宰梁益郡邑參差調補實允事機且此徒冗雜罕遵王憲嚴加㢘視隨違彈斥一二年間可減太半五年正位司徒給班劍二十人侍中如故移居雞籠山西邸集學士抄五經百家依皇覽例為四部要畧千卷招致名僧講語佛法造經唄新聲道俗之盛江左未有也世祖好射雉子良諫曰鑾轝亟動天蹕屢巡陵犯風烟驅馳野澤萬乗至重一羽甚㣲從甚㣲之懽忽至重之誡頃郊郛以外科禁嚴重匪直芻牧事罷遂乃窀掩殆廢且田月向登桑時告至士女呼嗟易生噂議棄民從欲理未可安曩時巡幸必盡威防領軍景先詹事赤斧堅甲利兵左右屯衛今馳騖外野交侍疎闊晨出晚還頓遺清道此實愚臣最所震廹狡虜玩威甫獲欵闗二漢全富猶加曲待如聞使臣頻亦怨望前㑹東宫遂形言色昔宋氏遣使舊列階下劉纘銜使始登朝殿今既反命宜賜優禮伏謂中堂雲構實惟峻絶檐陛深嚴事隔涼暑而别為一室如或有疑邉帶廣途訛言孔熾毁立之易過於轉圓若依舊制通敞實允觀聽頃市司驅扇租估過刻吹毛求瑕㢘察相繼被以小罪責以重備愚謂宜勅有司更詳優格臣年方朝賢齒未相及以管窺天猶知失得廊廟之士豈闇是非未聞一人開一説為陛下憂國家非但面從亦畏威耳臣若不啓陛下於何聞之先是六年左衛殿中將軍邯鄲超上書諫射雉世祖為止久之超竟被誅永眀末上將射雉子良諫曰忽聞外議伏承當更射雉臣下情震越心懐憂悚猶謂疑妄事不必然伏度陛下以信心眀照所以傾金寳於禪靈仁愛廣洽得使禽魚養命於江澤豈惟國慶民懽乃以翺翔治樂夫衛生保命人獸不殊重軀愛體彼我無異故禮云聞其聲不食其肉見其生不忍其死且萬乗之尊降同匹夫之樂夭殺無辜傷仁害福之本菩薩不殺夀命得長施物安樂自無恐怖不惱衆生身無患苦臣見功徳有此果報所以日夜劬懃厲身奉法實願聖躬康豫若此每至寢夢脱有異見不覺身心立就燋爛陛下常日捨財脩福臣私心顒顒尚恨其少豈可今日見此事一損福業追悔便難臣此啓聞私心實切若是大事不可易改亦願陛下照臣此誠曲垂三思况此嬉遊之間非闗當否而動輙傷生實可深慎臣聞子孝奉君臣忠事主莫不靈祗通感徴祥證登臣近叚仰啓賜希受戒天心洞逺誠未達勝善之途而聖恩遲疑尚未垂履曲降尊極豈可今月復隨此事臣不隐心即實上啓上雖不盡納而深見寵愛又與文恵太子同好釋氏甚相友悌子良敬信尤篤數於邸園營齋戒大集朝臣衆僧至於賦食行水或躬親其事世頗以為失宰相體勸人為善未嘗厭倦以此終致盛名尋代王儉領國子祭酒辭不拜八年給三望車九年亰邑大水呉興偏劇子良開倉賑救貧病不能立者於第北立廨收養給衣及藥十年領尚書令尋為使持節都督揚州諸軍事揚州刺史本官如故尋解尚書令加中書監文恵太子薨世祖撿行東宫見太子服御羽儀多過制度上大怒以子良與太子善不啓聞頗加嫌責世祖不豫詔子良甲仗入延昌殿侍醫藥子良啓進沙門於殿户前誦經世祖為感夢見優曇鉢華子良按佛經宣㫖使御府以銅為華揷御床四角日夜在殿内太孫間日入參承世祖暴漸内外惶懼百僚皆已變服物議疑立子良俄頃而蘇問太孫所在因召東宫器甲皆入遺詔使子良輔政髙宗知尚書事子良素仁厚不樂世務乃推髙宗詔云事無大小悉與鸞參懐子良所志也太孫少養於子良妃袁氏甚著慈愛既懼前不得立自此深忌子良大行出太極殿子良居中書省帝使虎賁中郎將潘敞領二百人仗屯太極西階防之成服後諸王皆出子良乞停至山陵不許進位太傅増班劍為三十人本官如故解侍中隆昌元年加殊禮劍履上殿入朝不趨贊拜不名進督南徐州其年疾篤謂左右曰門外應有異遣人視見淮中魚萬數皆浮出水上向城門尋薨時年三十五帝常慮子良有異志及薨甚悦詔給東園温眀秘器斂以兗冕之服東府施喪位大鴻臚持節監䕶太官朝夕送祭又詔曰襃崇眀徳前王令典追逺尊親沿情所隆故使持節都督揚州諸軍事中書監太傅領司徒揚州刺史竟陵王新除督南徐州體睿履正神鑒淵邈道冠民宗具瞻允集肇自弱齡孝友光備爰及贊契協升景業燮曜台陛五教克宣敷奏端朝百揆惟穆寄重先顧任均負圖諒以齊暉二南同規往哲方憑保祐永翼雍熙天不慭遺奄焉薨逝哀慕抽割震于厥心今龜謀襲吉先逺戒期宜崇嘉制式引風烈可追崇假黄鉞侍中都督中外諸軍事太宰領大將軍揚州牧緑綟綬備九服錫命之禮使持節中書監王如故給九旒鸞輅黄屋左纛輼輬車前後部羽葆鼓吹挽歌二部虎賁班劍百人𦵏禮依晉安平王孚故事初豫章王嶷𦵏金牛山文恵太子𦵏夹石子良臨送望祖硎山悲感歎曰北瞻吾叔前望吾兄死而有知請𦵏兹地既薨遂𦵏焉所著内外文筆數十卷雖無文采多是勸戒建武中故吏范雲上表為子良立碑事不行子昭胄嗣昭胄字景𦙍汎渉有父風永眀八年自竟陵王世子為寧朔將軍㑹稽太守鬱林初為右衛將軍未拜遷侍中領右軍將軍建武三年復為侍中領驍騎將軍轉散騎常侍太常以封境邉虜建元元年改封巴陵王先是王敬則事起南康侯子恪在吳郡髙宗慮有同異召諸王侯入宫晉安王寳義及江陵公寳覽等住中書省髙武諸孫住西省勅人各兩左右自隨過此依軍法孩抱者乳母隨入其夜大醫煮藥都水辦數十具棺材湏三更當悉殺之子恪奔歸二更達建陽門刺啓時刻已至而帝眠不起中書舍人沈徽孚與帝所親左右單景雋共謀少留其事湏臾帝覺景雋啓子恪已至驚問曰未邪景雋具以事荅眀日悉遣王侯還第建武以来髙武王侯居常震怖朝不保夕至是尤甚及陳顯達起事王侯復入宫昭胄懲往時之懼與弟永新侯昭頴逃奔江西變形為道人崔慧景舉兵昭胄兄弟出投之慧景事敗昭胄兄弟首出投臺軍主胡松各以王侯還第不自安謀為身計子良故防閤桑偃為梅蟲兒軍副結前巴西太守蕭寅謀立昭胄昭胄許事克用寅為尚書左僕射䕶軍將軍以寅有部曲大事皆委之時胡松領軍在新亭寅遣人説之云湏昬人出寅等便率兵奉昭胄入臺閉城號令昬人必還就將軍將軍但閉壘不應則三公不足得也松又許諾㑹東昬新起芳樂苑月許日不復出遊偃等議募健兒百餘人從萬春門入突取之昭胄以為不可偃同黨王山沙慮事久無成以事告御刀徐僧重寅遣人殺山沙於路吏於麝幐中得其事迹昭胄兄弟與同黨皆伏誅昭頴官至寧朔將軍彭城太守梁王定京邑追贈昭胄散騎常侍撫軍將軍昭頴黄門郎梁受禪降封昭胄子同監利侯廬陵王子卿字雲長世祖第三子也建元元年封臨汝縣公千五百户兄弟四人同封世祖即位為持節都督郢州司州之義陽軍事冠軍將軍郢州刺史永眀元年徙都督荆湘益寧梁南北秦七州安西將軍荆州刺史持節如故始興王鑑為益州子卿解督子卿在鎮營造服飾多違制度上勅之曰吾前後有勅非復一兩過道諸王不得作乖體格服飾汝何意都不憶吾勅邪忽作瑇瑁乗具何意已成不湏壊可速送下純銀乗具乃復可爾何以作鐙亦是銀可即壊之忽用金薄裹箭脚何意亦速壊去凡諸服章自今不啓吾知復専輙作者後有所聞當復得痛杖又曰汝比在都讀學不就年轉成長吾日冀汝美勿得勅如風過耳使吾失氣五年入為侍中撫軍將軍未拜仍為中䕶軍侍中如故六年遷秘書監領右衛將軍尋遷中軍將軍侍中並如故十年進號車騎將軍俄遷使持節都督南豫司三州軍事驃騎將軍南豫州刺史侍中如故子卿之鎮道中戲部伍為水軍上聞之大怒殺其典籖遣宜都王鏗代之子卿還第至崩不與相見鬱林即位復為侍中驃騎將軍隆昌元年轉衛將軍開府儀同三司置兵佐鄱陽王鏘見害以子卿代為司徒領兵置佐尋復見殺時年二十七魚復侯子響字雲音世祖第四子也豫章王嶷無子養子響後有子表留為嫡世祖即位為輔國將軍南彭城臨淮二郡太守見諸王不致敬子響勇力絶人闗弓四斛力數在園池中帖騎馳走竹樹下身無虧傷既出繼車服異諸王每入朝輙忿怒拳打車壁世祖知之令車服與皇子同永眀三年遷右衛將軍仍出為使持節都督豫州郢州之西陽汝南二郡軍事冠軍將軍豫州刺史眀年進號右將軍進南豫州之歴陽淮南頴川汝陽四郡入為散騎常侍右衛將軍六年有司奏子響體自聖眀出繼宗國大司馬臣嶷昔未有𦙍所以因心鞠養陛下𢎞天倫之愛臣嶷深猶子之恩遂乃繼體扶疏世祚垂改茅蔣菴蔚冡嗣莫移誠欣惇睦之風實虧立嫡之教臣等參議子響宜還本乃封巴東郡王遷中䕶軍常侍如故尋出為江州刺史常侍如故七年遷使持節都督荆湘雍梁寧南北秦七州軍事鎮軍將軍荆州刺史子響少好武在西豫時自選帶仗左右六十人皆有膽幹至鎮數在内齋殺牛置酒與之聚樂令内人私作錦袍絳襖欲餉蠻交易器仗長史劉寅等連名宻啓上勅精檢寅等懼欲秘之子響聞臺使至不見勅召寅及司馬席恭穆諮議參軍江愈殷曇粲中兵參軍周彥典籖呉修之王賢宗魏景淵於琴臺下詰問之寅等無言脩之曰既以降勅㫖政應方便答塞景淵曰故應先檢校子響大怒執寅等於後堂殺之以啓無江愈名欲釋之而用命者已加戮上聞之怒遣衛尉胡諧之游擊將軍尹畧中書舍人茹法亮領齋仗數百人檢捕羣小勅子響若束首自歸可全其性命諧之等至江津築城燕尾洲遣傳詔石伯兒入城慰勞子響曰我不作賊長史等見負今政當受殺人罪耳乃殺牛具酒饌餉臺軍而諧之等疑畏執録其吏子響怒遣所養數十人收集府州器仗令二千人從靈溪西渡克眀旦與臺軍對陣南岸子響自與百餘人袍騎將萬鈞弩三四張宿江堤上眀日凶黨與臺軍戰子響於堤上放弩亡命王衝天等䝉楯陵城臺軍大敗尹畧死之官軍引退上又遣丹陽尹蕭順之領兵繼至子響部下恐懼各逃散子響乃白服降賜死時年二十二臨死啓上曰劉寅等入齋檢仗具如前啓臣罪既山海分甘斧鉞奉勅遣胡諧之茹法亮賜重勞其等至竟無宣㫖便建旗入津對城南岸築城守臣累遣書信喚法亮渡乞白服相見其永不肯羣小懼怖遂致攻戰此臣之罪也臣此月二十五日束身投軍希還天闕停宅一月臣自取盡可使齊代無殺子之譏臣免逆父之謗既不遂心今便命盡臨啓哽塞知復何陳有司奏絶子響屬籍削爵土收付廷尉法獄治罪賜為蛸氏諸所連坐别下考論贈劉寅侍中席恭穆輔國將軍益州刺史江愈殷曇粲黄門郎周彦驍騎將軍寅字景蕤髙平人也有文義而學不閑世務席恭穆安定焉氏人闗隴豪族上憐子響死後遊華林園見猿對跳子鳴嘯上留目久之因嗚咽流涕豫章王嶷上表曰臣聞將而必戮炳自春秋罄于甸人著於經禮猶懐不忍之言尚有如倫之痛豈不事因法往情以恩留故庶人蛸子響識懐靡樹見淪不逞肆憤一朝致陷凶徳遂使迹隣非孝事近無君身膏草野未云塞釁但韔矢倒戈歸罪司戮即理原心亦既迷而知返釁骨不收辜魂莫赦撫事惟往載傷心目昔閔榮伏􅕆愴動墳園思荆就辟側懐丘墓皆兩臣釁結於眀時二主議加於盛世積代用之為美歴史不以云非伏願一下天矜爰詔蛸氏使得安兆末郊旋窆餘麓㣲列葦韔之容薄申封樹之禮豈伊窮骸被徳實且天下歸仁臣屬忝皇枝偏留友睦以臣繼别未安子響言承出命提擕鞠養俯見成人雖輟𦙍蕃條歸體琁蕚循執之念不移傅訓之憐何已敢冐宸嚴布此悲乞上不許先是貶為魚復侯安陸王子敬字雲端世祖第五子也初封應城縣公永眀二年出為持節監南兗兗徐青冀五州北中郎將南兗州刺史四年進號右將軍眀年徙都督荆湘梁雍南北秦六州軍事平西將軍荆州刺史持節如故尋進號安西將軍七年徴侍中䕶軍將軍十年轉散騎常侍撫軍將軍丹陽尹十一年進車騎將軍尋給鼓吹一部隆昌元年遷使持節都督南兗兗徐青冀五州征北大將軍南兗州刺史延興元年加侍中髙宗除諸蕃王遣中䕶軍王𤣥邈征九江王廣之襲殺子敬時年二十三晉安王子懋字雲昌世祖第七子也初封江陵公永眀三年為持節都督南豫豫司三州南中郎將南豫州刺史魚復侯子響為豫州子懋解督四年進號征虜將軍南豫新置力役寡少加子懋領宣城太守眀年為監南兗兗徐青冀五州軍事後將軍南兗州刺史持節如故六年徙監湘州平南將軍湘州刺史眀年加持節都督八年進號鎮南將軍撰春秋例苑三十卷奏之世祖嘉之勅付秘閣九年親府州事十年入為侍中領右衛將軍十一年遷散騎常侍中書監未拜仍為使持節都督雍梁南北秦四州郢州之竟陵司州之隨郡軍事征北將軍雍州刺史給鼓吹一部豫章王喪服未畢上以邉州湏威望許得奏之鬱林即位即本號為大將軍子懋見㓜主新立宻懐自全之計令作部造器仗陳顯達時為征虜屯襄陽欲脅取以為將帥顯達宻啓髙宗徴顯達還隆昌元年遷子懋為都督江州刺史留西楚部曲助鎮襄陽單將白直侠轂自隨顯達入别子懋謂曰朝廷令身單身而反身是天王豈可過爾輕率今猶欲將二三千人自隨公意何如顯達曰殿下若不留部曲便是大違勅㫖其事不輕且此閒人亦難可收用子懋黙然顯達因辭出便發去子懋計未立還鎮尋陽延興元年加侍中聞鄱陽隨郡二王見殺欲起兵赴難母阮在都遣書欲宻迎上阮報其兄于瑶之為計瑶之馳告髙宗於是纂嚴遣平西將軍王廣之南北討使軍主裴叔業與瑶之先襲尋陽聲云為郢州行司馬子懋知之遣三百人守盆城叔業泝流直上至夜囘下襲盆城城局參軍樂賁開門納之子懋率府州兵力先已具船於稽亭渚聞叔業得盆城乃據州自衛子懋部曲多雍土人皆踊躍願奮叔業畏之遣于瑶之説子懋曰今還都必無過憂政當作散官不失富貴也懋既不出兵攻叔業衆情稍沮中兵參軍于琳之瑶之兄也説子懋重賂叔業子懋使琳之往琳之因説叔業請取子懋叔業遣軍主徐𤣥慶將四百人隨琳之入州城僚佐皆奔散琳之從二百人拔刃入齋子懋罵曰小人何忍行此事琳之以袖鄣面使人害之時年二十三初子懋鎮雍世祖勅以邉畧曰吾比連得諸處啓所説不異虜必無敢送死理然為其備不可蹔懈今秋犬羊軰越逸者其亡滅之徴吾今亦行宻纂集湏有分眀指的便當有大處分今普勅鎮守並部偶民丁有事即使應接連已勅更遣想行有至者汝共諸人量覔可使人數往南陽舞隂諸要處參覘糧食最為根本更不憂人仗常行視驛亭馬不可有廢闕并約語諸州當其堺皆爾不如法即問事又曰吾勅荆郢二鎮各作五千人陣本擬應接彼耳賊若送死者更即呼取之已勅子真魚繼宗設公愍至鎮可以公愍為城主三千人配之便足汝可好以階級在意勿得人求或超五三階級及文章詩筆乃是佳事然世務彌為根本可常憶之汝所啓仗此悉是吾左右御仗也云何得用之品格不可乖吾自當優量覓送先是啓求所好書上又曰知汝常以書讀在心足為深欣也賜子懋杜預手所定左傳及古今善言隨郡王子隆字雲興世祖第八子也有文才初封枝江公永眀三年為輔國將軍南琅邪彭城二郡太守眀年遷江州刺史未拜唐㝢之賊平遷為持節督㑹稽東陽新安臨海永嘉五郡東中郎將㑹稽太守遷長兼中書令子隆娶尚書令王儉女為妃上以子隆能屬文謂儉曰我家東阿也儉曰東阿重出實為皇家蕃屏未及拜仍遷中䕶軍轉侍中左衛將軍八年代魚復侯子響為使持節都督荆雍梁寧南北秦六州鎮西將軍荆州刺史給鼓吹一部其年始興王鑑罷益州進號督益州九年親府州事十一年晉安王子懋為雍州子隆復解督鬱林立進號征西將軍隆昌元年為侍中撫軍將軍領兵置佐延興元年轉中軍大將軍侍中如故子隆年二十一而體過充壯常服蘆茹丸以自銷損髙宗輔政謀害諸王世祖諸子中子隆最以才貌見憚故與鄱陽王鏘同夜先見殺文集行於世建安王子真字雲仙世祖第九子也永眀四年為輔國將軍南琅邪彭城二郡太守遷持節督南豫司二州軍事冠軍將軍南豫州刺史領宣城太守進號南中郎將六年以府州稍實表解領郡七年進號右將軍遷丹陽尹將軍如故轉左衛將軍七年遷中䕶軍仍出為持節都督郢司二州軍事平西將軍郢州刺史鬱林立進號安西將軍隆昌元年為散騎常侍䕶軍將軍延興元年轉鎮軍將軍領兵置佐常侍如故其年見殺年十九西陽王子眀字雲光世祖第十子也永眀元年封武昌王三年失國璽改封西陽六年為持節都督南兗兗徐青冀五州軍事冠軍將軍南兗州刺史八年進號征虜將軍十年進左將軍仍為督㑹稽東陽臨海永嘉新安五郡軍事㑹稽太守將軍如故子眀風姿眀淨士女觀者咸嗟嘆之鬱林初進號平東將軍隆昌元年為右將軍中書令延興元年遷侍中領驍騎將軍右軍如故建武元年轉撫軍將軍領兵置佐二年誅蕭諶誣子眀及弟子罕子貞與諶同謀見害年十七南海王子罕字雲華世祖第十一子也永眀六年為北中郎將南瑯邪彭城二郡太守上初以白下地帶江山徙瑯邪郡自金城治之子罕始鎮此城十年為持節都督南兗兗徐青冀五州軍事征虜將軍南兗州刺史鬱林即位進號後將軍隆昌元年遷散騎常侍右衛將軍建武元年轉䕶軍將軍二年見殺年十七巴陵王子倫字雲宗世祖第十三子也永眀七年為持節都督南豫司二州軍事南中郎將南豫州刺史十年遷北中郎將南瑯邪彭城刺史二郡太守鬱林即位以南彭城禄力優厚奪子倫與中書舍人綦母珍之更以南蘭陵代之隆昌元年遷散騎常侍左將軍延興元年遣中書舍人茹法亮殺子倫子倫正衣冠出受詔曰鳥之將死其鳴也哀人之將死其言也善先朝昔滅劉氏今日之事理數固然君是身家舊人今銜此使當由事不獲已法亮不敢答而退年十六邵陵王子貞字雲松世祖第十四子也永眀十年為東中郎將呉郡太守鬱林即位進號征虜將軍還為後將軍建武二年見誅年十五臨賀王子岳字雲嶠世祖第十六子也永眀七年封髙宗誅世祖諸子唯子岳及弟六人在後世呼為七王朔望入朝上還後宫輒嘆息曰我及司徒諸兒子皆不長髙武子孫日長大永泰元年上疾甚絶而復蘇於是誅子岳等延興建武中凡三誅諸王每一行事髙宗輙先燒香火嗚咽涕泣衆以此輙知其夜當相殺戮也子岳死時年十四西陽王子文字雲儒世祖第十七子也永眀七年封蜀郡王建武中改封西陽王永泰元年見殺年十四衡陽王子峻字雲嵩世祖第十八子也永眀七年封廣漢郡王建武中改封永泰元年見殺年十四南康王子琳字雲璋世祖第十九子也母荀氏有盛寵子琳鍾愛永眀七年封宣城王眀年上改南康公褚蓁以封子琳永泰元年見殺年十四湘東王子建字雲立世祖第二十一子也母謝氏無寵世祖度為尼髙宗即位使還母子建永泰元年見殺年十三南郡王子夏字雲廣世祖第二十三子也上春秋髙子夏最㓜寵愛過諸子初世祖夢金翅鳥下殿庭搏食小龍無數乃飛上天永泰元年子夏誅年七嵗史臣曰民之勞逸隨所遭遇習以成性有識斯同帝王子弟生長尊貴薪禽之道未知富厚之圖已極齠年稚齒養器深宫習趨拜之儀受文句之學坐躡搢紳傍絶交友情偽之事不經耳目憂懼之道未渉胷衿雖卓爾天悟自得懐抱孤寡為識所陋猶多朝出閫閨暮司方岳帝子臨州親民尚小年序次第宜屏皇家防驕剪逸積代恒典平允之情操捶貽慮故輔以上佐簡自帝心勞舊左右用為主帥州國府第先令後行飲食遊居動應聞啓端拱守禄遵承法度張弛之要莫敢厝言行事執其權典籖掣其肘茍利之義未申専違之咎已及處地雖重行已莫由威不在身恩未接下倉卒一朝艱難總集望其釋位扶危不可得矣路温舒云秦有十失其一尚存斯宋氏之餘風在齊而彌弊也贊曰武十七王文宣令望愛才悦古仁信温良宗英是寄遺恵未忘廬陵犯色安陸括囊晉安早悟隨郡雕章建賀湘海二陵二陽㓜蕃盛寵南郡南康南齊書卷四十南齊書卷四十考證魚復侯子響傳丹陽尹蕭順之領兵繼至子響部下恐懼各逃散子響乃白服降賜死臣祖庚按南史子響見順之欲自申眀順之不許於射堂縊殺之與此互異通鑑考異曰盖蕭子顯為順之諱耳注云順之梁武帝之父蕭子顯仕梁朝而作齊書故言其為順之諱也又按帝紀作巴東王通鑑同盖魚復巴東屬邑是時貶為魚復侯也豫章王嶷上表臣祖庚按表文與南史所載繁簡互别㣲列葦韔之容韔汲古閣本作輤旁注雍本作韔先是貶為魚復侯南監本無先是二字晉安王子懋傳阮報其兄于瑶之為計兄南監本作同産弟南史亦作同産弟不如法即問事問事南監本作周章或超五三階級及文章詩筆南監本無及字汲古閣本無級字南齊書卷四十考證
