body:
  text: 南齊書卷五十梁蕭子顯撰列傳第三十一文二王明七王文惠太子四男安皇后生鬱林王昭業宮人許氏生海陵恭王昭文陳氏生巴陵王昭秀褚氏生桂陽王昭粲巴陵王昭秀字懐尚太子第三子也永明中封曲江公千五百户十年為寧朔将軍濟陽太守鬱林即位封臨海郡王二千户隆昌元年為使持節都督荆雍益寜梁南北秦七州軍事西中郎将荆州刺史延興元年徴為車騎将軍衛京師以永嘉王昭粲代之明帝建武二年通直常侍庾曇隆啓曰周定雒邑天子置畿内之民漢都咸陽三輔為社稷之衛中晉南遷事移威㢮近郡名邦多有國食宋武創業依擬古典神州部内不復别封而孝武末年分樹寵子茍申私愛有乖訓凖隆昌之元特開母弟之貴竊謂非古聖明御㝢禮舊為先畿内限斷宜遵昔制賜茅授土一出外州詔付尚書詳議其冬改封昭秀為巴陵王永泰元年見殺年十六桂陽王昭粲太子第四子也鬱林立以皇弟封永嘉郡王南徐州刺史延興元年出為使持節都督荆雍益寜梁南北秦七州軍事西中郎将荆州刺史明帝立欲以聞喜公遥欣為荆州轉昭粲為右将軍中書令建武二年改封桂陽王四年遷太常将軍如故永泰元年見殺年八嵗明帝十一男敬皇后生東昏侯寳卷江夏王寳𤣥鄱陽王寳夤和帝殷貴嬪生巴陵隠王寳義晉熙王寳嵩袁貴妃生廬陵王寳源管淑妃生邵陵王寳攸許淑媛生桂陽王寳貞餘皆早夭巴陵隠王寳義字智勇明帝長子也本名明基建武元年為持節都督揚南徐州軍事前将軍揚州刺史封晉安郡王三千户寳義少有廢疾不堪出人間故止加除授仍以始安王遥光代之轉寳義為右将軍領兵置佐鎮石頭二年出為使持節都督南徐州軍事鎮北将軍南徐州刺史東昏即位進征北大将軍開府儀同三司給仗永元元年給班劒二十人始安王遥光誅為都督揚南徐二州軍事驃騎大将軍揚州刺史持節如故東府被兵火屋宇燒殘帝方營宮殿不暇脩葺寳義鎮西州三年進位司徒和帝西臺建以為侍中司空使持節都督刺史如故梁王定京邑宣徳太后令以寳義為太尉領司徒詔云不言之化形于自逺時人皆云此實錄也梁受禪封謝沐縣公尋封巴陵郡王奉齊後天監中薨江夏王寳𤣥字智深明帝第三子也建武元年為征虜将軍領石頭戍事封江夏郡王仍出為持節都督郢司二州軍事西中郎将郢州刺史永泰元年還為前将軍領石頭戍事未拜東昏即位進號鎮軍将軍永元元年又進車騎将軍代晉安王寳義為使持節都督南徐兗二州軍事南徐兗二州刺史将軍如故寳𤣥娶尚書令徐孝嗣女為妃孝嗣被誅離絶少帝送少姬二人與之寳𤣥恨望密有異計明年崔慧景舉兵還至廣陵遣使奉寳𤣥為主寳𤣥斬其使因是發将吏防城帝遣馬軍主戚平外監黄林夫助鎮京口慧景将渡江寳𤣥密與相應殺司馬孔矜典籖呂承緒及平林夫開門納慧景使長史沈佚之諮議桞憕分部軍衆乗八掆輿手執絳麾幡隨慧景至京師住東城百姓多往投集慧景敗収得朝野投寳𤣥及慧景軍名帝令燒之曰江夏尚爾豈復可罪餘人寳𤣥逃奔數日乃出帝召入後堂以歩鄣裹之令羣小數十人鳴鼓角馳繞其外遣人謂寳𤣥曰汝近圍我亦如此少日乃殺之廬陵王寳源字智淵明帝第五子也建武元年為北中郎将鎮琅邪城封廬陵郡王遷右将軍領石頭戍事仍出為使持節都督南兗兗徐青冀五州軍事後将軍南兗州刺史王敬則伏誅徙寳源為都督會稽東陽臨海永嘉新安五郡軍事㑹稽太守将軍如故永元元年進號安東将軍和帝即位以為侍中車騎将軍開府儀同三司都督太守如故未拜中興二年薨鄱陽王寳夤字智亮明帝第六子也建武初封建安郡王二年為北中郎将鎮琅邪城明年出為持節都督江州軍事南中郎将江州刺史東昏即位為使持節都督郢司二州軍事征虜将軍郢州刺史尋進號前将軍永元二年徴為撫軍領石頭戍事未拜三年為車騎将軍開府儀同三司鎮石頭其秋雍州刺史張欣泰等謀起事於新亭殺臺内諸主帥事在欣泰傳難作之日前南譙太守王靈秀奔往石頭率城内将吏見力去車脚載寳夤向臺城百姓數千人皆空手隨後京邑騷亂寳夤至杜姥宅日已欲暗城門閉城上人射之衆棄寳夤逃走寳夤逃亡三日戎服詣草市尉尉馳以啟帝帝迎寳夤入宮問之寳夤涕泣稱爾日不知何人逼使上車仍将去制不自由帝笑乃復爵位和帝立西臺以寳夤為使持節都督南徐兗二州軍事衛将軍南徐州刺史少帝以為使持節都督荆益寧雍梁北南秦七州軍事荆州刺史将軍如故宣徳太后臨朝梁王為建安公改封寳夤為鄱陽王中興二年謀反奔魏邵陵王寳攸字智宣明帝第九子也建武元年封南平郡王二年改封三年為北中郎将鎮琅邪城永元元年為持節都督南北徐南兗青冀五州軍事南兗州刺史郎将如故未拜遷征虜将軍領石頭戍事丹陽尹戍事如故陳顯逹事平出為持節督江州軍事左将軍江州刺史以本號還京師授中将軍祕書監中興二年謀反宣徳太后令賜死晉熙王寳嵩字智靖明帝第十子也永元二年為冠軍将軍丹陽尹仍遷持節都督南徐兗二州軍事南徐州刺史将軍如故中興元年和帝以為中書令明年謀反伏誅桂陽王寳貞明帝第十一子也永元二年為中䕶軍北中郎将領石頭戍事中興二年謀反伏誅史臣曰春秋書鄭伯克段于鄢兄弟之恩離君臣之義正夫逆順有勢况親兼一體道窮數盡或容觸啄而寳𤣥自㝷干戈欣受家難曾不悟執柯所指跗萼相從以此而圖萬全未知其髣髴也贊曰文惠二王于嗟夭殤明子七國終亦衰亡南齊書卷五十
