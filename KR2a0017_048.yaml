body:
  text: 南齊書卷四十八列傳第二十九袁彖孔稚珪劉繪袁彖字偉才陳郡陽夏人也祖洵吳郡太守父覬武陵太守彖少有風氣好屬文及玄言舉秀才歷諸王府參軍不就覬臨終與兄顗書曰史公才識可嘉足懋先基矣史公彖之小字也服未闋顗在雍州起事見誅宋明帝投顗尸江中不聽歛葬彖與舊奴一人微服潛行求尸四十餘日乃得密瘞石頭後崗身自負土懷其父文集未甞離身明帝崩後乃改葬顗從叔司徒粲外舅征西將軍蔡興宗竝器之除安成王征虜參軍主簿尚書殿中郎出為廬陵內史豫州治中太祖太傅相國主簿祕書丞議駮國史檀超以天文志紀緯序位度五行志載當時祥沴二篇所記事用相懸日蝕為災宜居五行超欲立處士傳彖曰夫事關業用方得列其名行今栖遁之士排斥皇王陵轢將相此偏介之行不可長風移俗故遷書未傳班史莫編一介之善無緣頓略宜列其性姓業附出他篇遷始興王友固辭太祖使吏部尚書何戢宣旨令就遷中書郎兼太子中庶子又以中書兼御史中丞轉黃門郎兼中丞如故坐彈謝超宗簡奏依違免官尋補安西諮議南平內史除黃門未拜仍轉長史南郡內史行荊州事還為太子中庶子本州大中正出為冠軍將軍監吳興郡事彖性剛甞以微言忤世祖又與王晏不崙頁世祖在便殿用金柄刀子治瓜晏在側曰外間有金刀之言恐不宜用此物世祖愕然窮問所以晏曰袁彖為臣說之上銜怒良久彖到郡坐逆用祿錢免官付東冶世祖遊孫陵望東冶曰中有一好貴囚數日車駕與朝臣幸冶履行庫藏因宴飲賜囚徒酒肉敕見彖與語明日釋之尋白衣行南徐州事司徒諮議衞軍長史遷侍中彖形體充腴有異於衆每從車駕射雉在郊野數人推扶乃能徒步幼而母卒養於伯母王氏事之如親閨門中甚有孝義隆昌元年卒年四十八諡靖子孔稚珪字德璋會稽山陰人也祖道隆位侍中父靈產泰始中罷晉安太守有隱遁之懷於禹井山立館事道精篤吉日於靜屋四向朝拜涕泗滂東出過錢塘北郭輒於舟中遙拜杜子恭墓自此至都東向坐不敢背側元徽中為中散太中大夫頗解星文好術數太祖輔政沈攸之起兵靈產密白太祖曰攸之兵衆雖彊以天時冥數而觀無能為也太祖驗其言擢遷光祿大夫以簏盛靈產上靈臺令其占候餉靈產白羽扇素隱几曰君性好古故遺君古物稚珪少學涉有美譽太守王僧虔見而重之引為主簿州舉秀才解褐宋安成王車騎法曹行參軍轉尚書殿中郎太祖為驃騎以稚珪有文翰取為記室參軍與江淹對掌辭筆遷正員郎中書郎尚書左丞父憂去官與兄仲智還居父山舍仲智妾李氏驕妬無禮稚珪白太守王敬則殺之服闋為司徒從事中郎州治中別駕從事史本郡中正永明七年轉驍騎將軍復領左丞遷黃門郎左丞如故轉太子中庶子廷尉江左相承用晉世張杜律二十卷世祖留心法令數訊囚徒詔獄官詳正舊注先是七年尚書刪定郎王植撰定律章表奏之曰臣尋晉律文簡辭約旨通大綱事之所質取斷難釋張斐杜預同注一章而生殺永殊自晉泰始以來唯斟酌參用是則吏挾威福之勢民懷不對之怨所以溫舒獻辭於失政絳侯忼慨而興歎皇運革祚道冠前王陛下紹興光開帝業下車之痛每惻上仁滿堂之悲有矜聖思爰發德音刪正刑律敕臣集定張杜二注謹礪愚蒙盡思詳撰削其煩害錄其允衷取張注七百三十一條杜注七百九十一條或二家兩釋於義乃備者又取一百七條其注相同者取一百三條集為一書凡一千五百三十二條為二十卷請付外詳校擿其違謬從之於是公卿八座參議考正舊注有輕重處竟陵王子良下意多使從輕其中朝議不能斷者制旨平決至九年稚珪上表曰臣聞匠萬物者以繩墨為正馭大國者以法理為本是以古之聖王臨朝思理遠防邪萌深杜姦漸莫不資法理以成化明刑賞以樹功者也伏惟陛下躡曆登皇乘圖踐帝天地更築日月再張五禮裂而復縫六樂穨而爰緝乃發德音下明詔降恤刑之文申慎罰之典敕臣與公卿八座共刪注律謹奉聖旨諮審司徒臣子良稟受成規創立條緒使兼監臣宋躬兼平臣王植等抄撰同異定其去取詳議八座裁正大司馬臣嶷其中洪疑大議衆論相背者聖照玄覽斷自天筆始就成立律文二十卷錄一卷凡二十一卷今以奏聞請付外施用宣下四海臣又聞老子仲尼曰古之聽獄者求所以生之今之聽獄者求所以殺之與其殺不辜寧失有罪是則斷獄之職自古所難矣今律文雖定必須用之用失其平不異無律律書精細文約例廣疑似相傾故誤相亂一乖其綱枉濫橫起法吏無解既多謬僻監司不習無以相斷則法書徒明於帙𩹉寃魂猶結於獄中今府州郡縣千有餘獄如令一獄歲枉一人則一年之中枉死千餘矣寃毒之死上干和氣聖明所急不可不防致此之由又非但律吏之咎列邑之宰亦亂其經或以軍勳餘力或以勞吏暮齒獷猜情濁氣忍并生靈昏心狠態吞剝氓物虐理殘其命曲文被其罪寃積之興復緣斯發獄吏雖良不能為用使于公哭於邊城孝婦寃於遐外陛下雖欲宥之其已血濺九泉矣尋古之名流多有法學故釋之定國聲光漢臺元帝常文惠績映魏閣今之士子莫肯為業縱有習者世議所輕良由空懃永歲不逢一朝之賞積學當年終為閭伍所蚩將恐此書永墜下走之手矣今若弘其爵賞開其勸慕課業宦流班習冑子拔其精究使處內局簡其才良以居外仕方岳咸選其能邑長並擢其術則臯繇之謀謨指掌可致杜鄭之業鬱焉何遠然後姦邪無所逃其刑惡吏不能藏其詐如身手之相驅若絃栝之相接矣臣以疎短謬司大理陛下發自聖衷憂矜刑網御延廷奉訓遠照民瘼臣謹仰述天官伏奏雲陛所奏繆允者宜寫律上國學置律助教依五經例國子生有欲讀者策試上過高第即便擢用使處法職以勸士流詔報從納事竟不施行轉御史中丞遷驃騎長史輔國將軍建武初遷冠軍將軍平西長史南郡太守稚珪以虜連歲南侵征役不息百姓死傷乃上表曰匈奴為患自古而然雖三代智勇兩漢權奇筭略之要二塗而已一則馬風馳奮威沙漠二則輕車出使通驛虜庭搉而言之優劣可覩今之議者咸以丈夫之氣恥居物下況我天威寧可先屈吳楚勁猛帶甲百萬截彼鯨鯢何往不碎請和示弱非國計也臣以為戎狄獸性本非人倫鴟鳴狼踞不足喜怒蜂目蠆尾何關美惡唯宜勝之以深權制之以遠弘之以大度處之以蟊賊豈足肆天下之忿捐蒼生之命發雷電之怒爭蟲鳥之氣百戰百勝不足稱雄橫尸千里無益上國而蟻聚蠶攢窮誅不盡馬足毛羣難與競逐漢高橫威海表窘迫長圍孝文國富刑清事屈陵辱宣帝撫納安靜朔馬不驚光武卑辭厚禮寒山無靄是兩京四主英濟中區輸寶貨以結和遣宗女以通好長轡遠馭子孫是賴豈不欲戰惜民命也唯漢武藉五世之資承六合之富驕心奢志大事匈奴遂連兵積歲轉戰千里長驅瀚海飲馬龍城雖斬獲名王屠走凶羯而漢之棄卒甲十亡其九故衞霍出關千隊不反貳師入漢漠百旅頓降李廣敗於前鋒李陵沒於後陣其餘奔北不可勝數遂使國儲空懸戶口減半好戰之功其利安在戰不及和相去何若自西朝不綱東晉遷鼎羣胡沸亂羌狄交橫荊棘攢於陵廟豺虎咆於宮闈山淵反覆黔首塗地逼迫崩騰開闢未有是時得失略不稍陳近至元嘉多年無事末路不量復挑彊敵遂廼連城覆徙虜馬飲江青徐州之際草木為人耳建元之初胡塵犯塞永明之始復結通和十餘年間邊候且息陛下張天造曆駕日登皇聲雷𧜛宙勢壓河岳而封豕殘魂未屠劒首長蛇餘喘偷窺外甸烽亭不靜五載於斯昔歲蟻壞瘻食樊漢今茲蟲毒浸淫未已興師十萬日費千金五歲之費寧可貲計陛下何惜匹馬之驛百金之賂數行之詔誘此凶頑使河塞息肩關境全命蓄甲養民以觀彼弊我策若行則為不世之福若不從命不過如戰失一隊耳或云遣使不受則為辱命夫以天下為量者不計細恥以四海為任者寧顧小節一城之沒尚不足惜一使不反曾何取慙且我以權取貴得我略行何嫌其恥所謂尺蠖之屈以求伸也臣不言遣使必得和自有可和之理猶如欲戰不必勝而有可勝之機耳今宜早發大軍廣張兵勢徵犀甲於岷峨命樓船於浦海使自青徂豫候騎星羅沿江入漢雲陣萬里據險要以奪其魂斷糧道以折其膽多設疑兵使精悉而計亂固列金湯使神茹而慮屈然後發衷詔馳輕驛辯辭重幣陳列吉凶北虜頑而愛奇貪而好古貨畏我之威喜我之賂畏威喜賂願和必矣陛下用臣之啟行臣之計何憂玉門之下而無款塞之胡哉彼之言戰既慇懃臣之言和亦慊闊伏願察兩塗之利害檢二事之多少聖照玄省灼然可斷所表謬奏希下之朝省使同博議臣謬荷殊恩奉佐侯岳敢肆瞽直伏奏千里帝不納徵侍中不行留本任稚珪風韻清踈好文詠飲酒七八斗與外兄張融情趣相得又與琅邪王思遠廬江何點點弟胤竝款交不樂世務居宅盛營山水憑机獨酌傍無雜事門庭之內草萊不剪中有蛙鳴或問之曰欲為陳蕃乎稚珪笑曰我以此當兩部鼓吹何必期效仲舉永元元年為都官尚書遷太子詹事加散騎常侍三年稚珪疾東昏屏除以牀轝走因此疾甚遂卒年五十五贈金紫光祿大夫劉繪字士章彭城人太常悛弟也父勔宋末權貴門多人客使繪與之共語應接流暢勔喜曰汝後若束帶立朝可與賓客言矣解褐著作郎太祖太尉行參軍太祖見而歎曰劉公為不亡也豫章王嶷為江州以繪為左軍主簿隨鎮江陵轉鎮西外兵曹參軍驃騎主簿繪聰警有文義善隸書數被賞召進對華敏僚吏之中見遇莫及琅邪王詡為功曹以吏能自進嶷謂僚佐曰吾雖不能得應嗣陳蕃然閤下自有二驥也復為司空記室錄事轉太子洗馬大司馬諮議領錄事時豫章王嶷與文惠太子以年秩不同物論謂宮府有疑繪苦求外出為南康相郡事之暇專意講說上左右陳洪請假南還問繪在郡何似既而閒之曰南康是三州喉舌應須治幹豈可以年少講學處之邪徵還為安陸王護軍司馬轉中書郎掌詔誥敕助國子祭酒何胤撰治禮儀永明末京邑人士盛為文章談義皆湊竟陵王西邸繪為後進領袖機悟多能時張融周顒竝有言工融音旨緩韻顒辭致綺捷繪之言吐又頓挫有風氣時人為之語曰劉繪貼宅別開一門言在二家之中也魚復侯子響誅後豫章王嶷欲求葬之召繪言其事使為表繪求紙筆須臾便成嶷惟足八字云提攜鞠養俯見成人乃歎曰禰衡何以過此後北虜使來繪以辭辯敕接虜使事畢當撰語辭繪謂人曰無論潤色未易但得我語亦難矣事兄悛恭謹與人語呼為使君隆昌中悛坐罪將見誅繪伏闕請代兄死高宗輔政救解之引為鎮軍長史轉黃門郎高宗為驃騎以繪為輔國將軍諮議領錄事典筆翰高宗即位遷太子中庶子出為寧朔將軍撫軍長史安陸王寶晊為湘州以繪為冠軍長史長沙內史行湘州事將軍如故寶晊妃悛女也寶晊愛其侍婢繪奪取具以啟聞寶晊以為恨與繪不崙頁遭母喪去官有至性持喪墓下三年食驣糲服闋為寧朔將軍晉安王征北長史南東海太守行南徐州事繪雖豪俠常惡武事雅善博射未甞跨馬兄悛之亡朝議贈平北將軍雍州刺史詔書已出繪請尚書令徐孝嗣改之及梁王義師起朝廷以繪為持節督雍梁南北秦四州郢州之竟陵司州之隨郡諸軍事輔國將軍領寧蠻校尉雍州刺史固讓不就衆以朝廷昏亂為之寒心繪終不受東昏改用張欣泰繪轉建安王車騎長史行府國事義師圍城南六允州刺史張稷總城內軍事與繪情款異常將謀廢立閑語累夜東昏殞城內遣繪及國子博士范雲等送首詣梁王於石頭轉大司馬從事中郎中興二年卒年四十五繪撰能書人名自云善飛白言論之際頗好矜知弟瑱字士溫好文章飲酒奢逸不財物滎陽毛惠遠善畫馬瑱善畫婦人世竝為第一官至吏部郎先繪卒史臣曰刑禮相望勸戒之道淺識言治莫辯後先故宰世之堤防御民之羈絆端簡為政貴在畫一輕重屢易手足無從律令之本文約旨曠據典行罰各用情求舒慘之意既殊寬猛之利亦異辭有出沒義生增損舊尹之事政非一途後主所是即為成用張薥代積稍至遷訛故刑開二門法有兩路刀筆之態深舞弄之風起承喜怒之機隙挾千金之奸利剪韭復生寧失有罪抱木牢戶未必非寃下吏上司文簿從事辯聲察色莫用衿府申枉理讞急不在躬案法隨科幸無咎悔至於郡縣親民百務萌始以情矜過曾不待獄以律定罪無細非諐蓋由網密憲煩文理相背夫懲恥難窮盜賊長有欲求猛勝事在或然掃墓高門為利孰遠故永明定律多用優寬治物不患仁心見累於弘厚為令貴在必行而惡其舛雜也贊曰袁徇厥戚猶子為情稚珪夷遠奏諫罷兵士章機悟立行砥名
