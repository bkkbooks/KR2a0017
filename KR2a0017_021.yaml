body:
  text: 南齊書卷二十一列傳第二文惠太子文惠太子長懋字雲喬世祖長子也世祖年未弱冠而生太子為太祖所愛姿容豐潤小字白澤宋元徽末隨世祖在郢世祖還鎮盆城拒沈攸之使太子勞接將帥親侍軍旅除祕書郎不拜授輔國將軍遷晉熙王撫軍主簿事寧世祖遣太子還都太祖方創霸業心存嫡嗣謂太子曰汝還吾事辦矣處之府東齋令通文武賓客勑荀伯玉曰我出行日城中軍悉受長懋節度我雖不行內外直防乃諸門甲兵悉令長懋時時履行轉祕書丞以與宣帝諱同不就改除中書郎遷黃門侍郎未拜昇明三年太祖將受禪世祖已還京師以襄陽兵馬重鎮不欲處他族出太子為持節都督雍梁二州郢州之竟陵司州之隨郡軍事左中郎將寧蠻校尉雍州刺史建元元年封南郡王邑二千戶江左未有嫡皇孫封王始自此也進號征虜將軍先是梁州刺史范柏年誘降晉壽亡命李烏奴討平氐賊楊城蘇道熾等頗著威名沈攸之事起柏年遣將陰廣宗領軍出魏興聲援京師而候望形勢事平朝廷遣王玄邈代之烏奴勸柏年據漢中不受命柏年計未決玄邈已至柏年遲回魏興不肯下太子慮其為變乃遣說柏年許啟為府長史柏年乃進襄陽因執誅之柏年梓潼人徙居華陽世為土豪知名州里宋泰始中氐寇斷晉壽道柏年以倉部郎假節領數百人慰勞通路自益州道報命除晉壽太守討平氐賊遂為梁州柏年彊立善言事以應對為宋明帝所知既被誅巴西太守柳弘稱啟太祖勑答曰柏年幸可不爾為之恨恨時襄陽有盜發古者相傳云是楚王大獲寶物玉屐玉屏風竹簡書青絲編簡廣數分長二尺皮節如新盜以把火自照後人有得十餘簡以示撫軍王僧虔僧虔云是科斗書考工記周官所闕文也是時州遣按驗頗得遺物故有同異之論會北虜南侵上慮當出樊沔二年徵為侍中中軍將軍置府鎮石頭穆妃薨成服日車駕出臨喪朝議疑太子應出門迎左僕射王儉曰尋禮記服問君所主夫人妻太子嫡婦言國君為此三人為主喪也今鸞輿臨降自以主喪而至雖因事撫慰義不在弔南郡以下不應出門奉迎但尊極所臨禮有變革權去杖絰移立戶外足表情敬無煩止哭皇太子既一宮之主自應以車駕幸宮依常奉候既當成服之日吉凶不容相干宜以衰幘行事望拜止哭率由舊章尊駕不以臨弔奉迎則惟常體求之情禮如為可安解侍中上以太子哀疾不宜居石頭山障移鎮西州四年遷使持節都督南徐六允二州諸軍事征北將軍南徐州刺史世祖即位為皇太子初太祖好左氏春秋太子承旨諷誦以為口實既正位東儲善立名尚禮接文士畜養武人皆親近左右布在省闥永明三年於崇正殿講孝經少傅王儉以擿句令太子僕周顒撰為義疏五年冬太子臨國學親臨策試諸生於坐問少傅王儉曰曲禮云無不敬尋下之奉上可以盡禮上之接下慈而非敬今總同敬名將不為昧儉曰鄭玄云禮主於敬便當是尊卑所同太子曰若如來通則忠惠可以一名孝慈不須別稱儉曰尊卑號稱不可悉同愛敬之名有時相次忠惠之異誠以聖旨孝慈互舉竊有徵據禮云不勝喪比於不慈不孝此則其義太子曰資敬奉君資愛事親兼此二塗唯在一極今乃移敬接下豈復在三之義儉曰資敬奉君必同至極移敬逮下不慢而已太子曰敬名雖同深淺既異而文無差別彌復增疑儉曰繁文不可備設略言深淺已見傳云不忘恭敬民之主也書云奉先思孝接下思恭此又經典明文互相起發太子問金紫光祿大夫張緒緒曰愚謂恭敬是立身之本尊卑所以竝同太子曰敬雖立身之本要非接下之稱尚書云惠鮮魚眾寡何不言恭敬魚眾寡邪緒曰今別言之居然有恭惠之殊總開記首所以共同斯稱竟陵王子良曰禮者敬而已矣自上及下愚謂非嫌太子曰本不謂有嫌正欲使言與事符輕重有別耳臨川王映曰先舉必敬以明大體尊卑事數備列後章亦當不以總略而礙太子又以此義問諸學生謝幾卿等十一人竝以筆對太子問王儉曰周易乾卦本施天位而說卦云帝出乎震震本非天義豈相主儉曰乾健震動天以運動為德故言帝出震太子曰天以運動為德君自體天居位震雷為象豈體天所出儉曰主器者莫若長子故受之以震萬物出乎震故亦帝所與焉儉又諮太子曰孝經仲尼居曾子侍夫孝理弘深大賢方盡其致何故不授顏子而寄曾生太子曰曾生雖德慙體二而色養盡禮去物尚近接引非隔弘宣規教義在於此儉曰接引非隔弘宣雖易去聖轉遠其事彌輕既云人能弘道將恐人輕道廢太子曰理既有在不容以人廢言而況中賢之才弘上聖之教寧有壅塞之嫌臨川王映諮曰孝為德本常是所疑德施萬善孝由天性自然之理豈因積習太子曰不因積習而至所以可為德本映曰率由斯至不俟明德大孝榮親衆德光備以此而言豈得為本太子曰孝有深淺德有小大因其分而為本何所稍疑太子以長年臨學亦前代未有也明年上將訊丹陽所領囚及南北二百里內獄詔曰獄訟之重政化所先太子立年作貳宜時詳覽此訊事委以親決太子乃於玄圃園宣猷堂錄三署囚原宥各有差上晚年好遊宴尚書曹事亦分送太子省視太子與竟陵王子良俱好釋氏立六疾館以養窮民風韻甚和而性頗奢麗宮內殿堂皆雕飾精綺過於上宮開拓玄圃園與臺城北塹等其中樓觀塔宇多聚奇石妙極山水慮上宮望見乃傍門列脩竹內施高鄣造游牆數百閒施諸機巧宜須鄣蔽須臾成立若應毀撒撤應手遷徙善製珍玩之物織孔雀毛為裘光彩金翠過於雉頭矣以晉明帝為太子時立西池乃啟世祖引前例求東田起小苑上許之永明中二宮兵力全實太子使宮中將吏更番役築宮城苑巷制度之盛觀者傾京師上性雖嚴多布耳目太子所為無敢啟者後上幸豫章王宅還過太子東田見其彌亘華遠壯麗極目於是大怒收監作主帥太子懼皆藏匿之由是見責太子素多疾體又過壯常在宮內簡於遨遊玩弄羽儀多所僭儗雖咫尺宮禁而上終不知十年豫章王嶷薨太子見上友于既至造碑文奏之未及鐫勒十一年春正月太子有疾上自臨視有憂色疾篤上表曰臣地屬元良業微三善光道樹風於焉蓋闕晨宵忷懼有若臨淵攝生舛和構離痾疾大漸惟幾顧陰待謝守器難永視膳長違仰戀慈顏內懷感哽竊惟死生定分理不足悲伏願割無已之悼損既往之傷寶衞聖躬同休七百臣雖沒九泉無所遺恨時年三十六太子年始過立久在儲宮得參政事內外百司咸謂旦暮繼體及薨朝野驚惋焉上幸東宮臨哭盡哀詔斂以衮冕之服諡曰文惠葬崇安陵世祖履行東宮見太子服翫過制大怒勑有司隨事毀除以東田殿堂為崇虛館鬱林立追尊為文帝廟稱世宗初太子內懷惡明帝密謂竟陵王子良曰我意色中殊不悅此人當由其福德薄所致子良便苦救解後明帝立果大相誅害史臣曰上古之世父不哭子壽夭悠悠尚嗟恆事況夫正體東儲方樹年德重基累葉載茂皇家守器之君已知耕稼雖溫文具美交弘盛迹武運將終先期夙殞傳之幼少以速顛危推此而論亦有冥數矣贊曰二象垂則三星麗天樹嫡惟長義匪求賢方為守器植命不延
