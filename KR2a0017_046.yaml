body:
  text: 南齊書卷四十六列傳第二十七王秀之王慈蔡約陸慧曉顧憲之蕭惠基王秀之字伯奮琅邪臨沂人也祖裕宋左光祿大夫儀同三司父瓚之金紫光祿大夫秀之幼時裕愛其風采起家著作佐郎太子舍人父卒為菴舍於墓下持喪服闋復職吏部尚書褚淵見秀之正潔欲與結婚秀之不肯以此頻轉為兩府外兵參軍遷太子洗馬司徒左西屬桂陽王司空從事中郎秀之知休範將反辭疾不就出為晉平太守至郡朞年謂人曰此邦豐壤祿俸常充吾山資已足豈可久留以妨賢路上表請代時人謂王晉平恐富求歸還為安成王驃騎諮議轉中郎又為太祖驃騎諮議昇明二年轉左軍長史尋陽太守隨府轉鎮西長史南郡太守府主豫章王嶷既封王秀之遷為司馬河東太守辭郡不受加寧朔將軍改除黃門郎未拜仍遷豫章王驃騎長史王於荊州立學以秀之領儒林祭酒遷寧朔將軍南郡王司馬復為黃門郎領羽林監遷長沙王中軍長史世祖即位為太子中庶子吏部郎出為義興太守遷侍中祭酒轉都官尚書初秀之祖裕性貞正徐羨之傅亮當朝裕不與來往及致仕隱吳興與子瓚之書曰吾欲使汝處不競之地瓚之歷官至五兵尚書未嘗詣一朝貴江湛謂何偃曰王瓚之今便是朝隱及柳元景顏師伯令僕貴要瓚之竟不候之至秀之為尚書又不與令王儉款接三世不事權貴時人稱之轉侍中領射聲校尉出為輔國將軍隨王鎮西長史南郡內史州西曹苟遺秀之交知書秀之拒不答乃遺書曰僕聞居謙之位既刊于易不可長禮明其文是以信陵致夷門之義燕丹收荊卿之節皆以禮而然矣丈夫處世豈可寂漠恩榮空為後代一丘土足下業潤重光聲居朝右不脩高世之績將何隔於愚夫僕耿介當年不通羣品饑寒白首望物嗟來成人之美春秋所善薦我寸長開君尺短故推風期德規於相益實非碌碌有求於平原者也僕與足下同為四海國士夫盛衰迭代理之數名位參差運之通塞豈品德權行為之者哉第五之號既無易於驃騎西曹之名復何推於長史足下見答書題久之以君若此非典何宜施之於國士如其循禮禮無不答謹以相還亦何犯於逆鱗哉君子處人以德不以位相如不見屈於澠池毛遂安受辱於郢門造敵臨事僕必先於二子未知足下之貴足下之威孰若秦楚兩王僕以德為寶足下以位為寶各寶其寶於此敬宜常聞古人交絕不泄惡言僕謂之鄙無以相貽離故薦貧者之贈潁川人豫章王嶷為荊州時獻書令減損奢麗豫章王優教酬答尚書令王儉當世又與儉書曰足下建高世之名而不顯高世之迹將何以書於齊史哉至是南郡綱紀啟隨王子隆請罪上書自申秀之尋徵侍中領游擊將軍未拜仍為輔國將軍吳興太守秀之常云位至司徒左長史可以止足矣吳興郡隱業所在心願為之到郡脩治舊山移置輜重隆昌元年卒官年五十三謚曰簡子秀之宗人僧祐太尉儉從祖兄也父遠光祿勳宋世為之語曰王遠如屏風屈曲從俗能蔽風露而僧祐負氣不羣儉常候之辭不相見世祖數閱武僧祐獻講武賦儉借觀僧祐不與竟陵王子良聞僧祐善彈琴於座取琴進之不肯從命永明末為太子中舍人在直屬疾代人未至僧祐委出為有司所奏贖論官至黃門郎時衞軍掾孔逭亦抗直著三吳決錄不傳王慈字伯寶琅邪臨沂人司空僧虔子也年八歲外祖宋太宰江夏王義恭迎之內齋施寶物恣聽所取慈取素琴石研義恭善之少與從弟儉共書學除祕書郎太子舍人安成王撫軍主簿轉記室遷祕書丞司徒左西屬右長史試守新安太守黃門郎太子中庶子領射聲校尉安成王冠軍豫章王司空長史司徒左長史兼侍中出為輔國將軍豫章內史父憂去官起為建武將軍吳郡太守遷寧朔將軍大司馬長史重除侍中領步兵校尉慈以朝堂諱榜非古舊制上表曰夫帝后之德綢繆天地君人之亮蟬聯日月至於名族不著昭自方篆策號謚聿宣載伊篇籍所以魏臣據中以建議晉主依經以下詔朝堂榜誌諱字懸露義非綿古事殷中世空失資敬之情徒乖嚴配之道若乃式功鼎臣贊庸元吏或以勳崇或由姓表故孔悝見銘謂標叔舅子孟應圖稱題霍氏況以處一之重列尊名以止仁無二之貴夤冲文而止敬昔東平即世孝章巡宮而灑泣新野云終和熹見似而流涕感循舊類尚或深心矧觀徽跡能無惻隱今扃禁嶔邃動延車蓋若使鑾駕紆覽四時臨閱豈不重增聖慮用感宸衷愚謂空彪簡第無益於匪躬直日述朝堂寧虧於夕惕伏惟陛下保合萬國齊聖羣生當刪前基之弊軌啟皇齊之孝則詔付外詳議博士李撝議據周禮凡有新令必奮鐸以警衆乃退以憲之于王宮注憲表懸之也太常丞王僩之議尊極之名宜率土同諱目可得覩口不可言口不可言則知之者絕知之者絕則犯觸必衆儀曹郎任昉議撝取證明之文僩之即情惟允直班諱之典爰自漢世降及有晉歷代無爽今之諱榜兼明義訓邦之字國實為前事之徵名諱之重情敬斯極故懸諸朝堂搢紳所聚將使起伏晨昏不違耳目禁避之道昭然易從此乃敬恭之深旨何情興典之或廢尊稱霍氏理例乖方居下以名故以不名為重在上必諱故以班諱為尊因心則理無不安即事則習行已久謂宜式遵無所創革慈議不行慈患脚世祖敕王晏曰慈在職未久既有微疾不堪朝又不能騎馬聽乘車在仗後江左來少例也以疾從閑任轉冠軍將軍司徒左長史慈妻劉秉女子觀尚世祖長女吳縣公主脩婦禮姑未嘗交答江夏王鋒為南徐州妃慈女也以慈為冠軍將軍東海太守加秩中二千石行南徐州府事還為冠軍將軍廬陵王中軍長史未拜永明九年卒年四十一謝超宗嘗謂慈曰卿書何當及虔公慈曰我之不得仰及猶雞之不及鳳也時人以為名答追贈太常謚懿子蔡約字景撝濟陽考城人也祖廓宋祠部尚書父興宗征西儀同約少尚宋孝武女安吉公主拜駙馬都尉祕書郎不拜從帝車騎驃騎行參軍通直郎不就遷太祖司空東閤祭酒太尉主簿齊臺建為世子中舍人仍隨度東宮轉鄱陽王友竟陵王鎮北征北諮議領記室中書郎司徒右長史黃門郎領本州中正出為新安太守復為黃門郎領射聲校尉通直常侍領驍騎將軍太子中庶子領屯騎校尉永明八年八月合朔約脫武冠解劒於省眠至下鼓不起為有司所奏贖論太孫立領校尉如故出為宜都王冠軍長史淮南太守行府州事世祖謂約曰今用卿為近蕃上佐想副我所期約曰南豫密邇京師不治自理臣亦何人爝火不息時諸王行事多相裁割約在任主佐之間穆如也遷司徒左長史高宗為錄尚書輔政百僚屣履到席約躡屐不改帝謂江祏曰蔡氏故是禮度之門故自可悅祏曰大將軍有揖客復見於今建武元年遷侍中明年遷西陽王撫軍長史加冠軍將軍徙廬陵王右軍長史將軍如故轉都官尚書遷邵陵王師加給事中江夏王車騎長史加征虜將軍並不拜好飲酒夷淡不與世雜遷太子詹事永明元二年卒年四十四贈太常陸慧曉字叔明吳郡吳人也祖萬載侍中父子真元嘉中為海陵太守時中書舍人秋當親幸家在海陵假還葬父子真不與相聞當請發民治橋又以妨農不許彭城王義康聞而賞焉自臨海太守眼疾歸為中散大夫卒慧曉清介正立不雜交游會稽內史同郡張暢見慧曉童幼便嘉異之張緒稱之曰江東裴樂也初應州郡辟舉秀才衞尉史歷諸府行參軍以母老還家侍養十餘年不仕太祖輔政除為尚書殿中郎鄰族來相賀慧曉舉酒曰陸慧曉年踰三十婦父領選始作尚書郎卿輩乃復以為慶邪太祖表禁奢侈慧曉撰答詔草為太祖所賞引為太傅東閤祭酒建元初仍遷太子洗馬武陵王虫念守會稽上為精選僚吏以慧曉為征虜功曹與府參軍沛國劉璡同從述職行至吳璡謂人曰吾聞張融與陸慧曉竝宅其間有水此水必有異味遂往酌而飲之廬江何點薦慧曉於豫章王嶷補司空掾加以恩禮轉長沙王鎮軍諮議參軍安陸侯緬為吳郡復禮異慧曉慧曉求補緬府諮議參軍遷始興王前將軍安西諮議領冠軍錄事參軍轉司徒從事中郎遷右長史時陳郡謝朏為左長史府公竟陵王子良謂王融曰我府二上佐求之前世誰可為比融曰兩賢同時便是未有前例子良於西邸抄書令慧曉參知其事尋遷西陽王征虜巴陵王後軍臨汝公輔國三府長史行府州事復為西陽王左軍長史領會稽郡丞行郡事隆昌元年徙為晉熙王冠軍長史江夏內史行郢州事慧曉歷輔五政治身清肅僚佐以下造詣趣起送之或謂慧曉曰長史貴重不宜妄自謙屈答曰我性惡人無禮不容不以禮處人未嘗卿士大夫或問其故慧曉曰貴人不可卿而賤者可卿人生何容立輕重於懷抱終身常呼人位建武初除西中郎長史行事內史如故俄徵黃門郎未拜遷吏部郎尚書令王晏選門生補內外要局慧曉為用數人而止晏恨之送女妓一人欲與申好慧曉不納吏曹都令史歷政以來諮執選事慧曉任己獨行未嘗與語帝遣左右單景儁以事誚問慧曉謂景儁曰六十之年不復能諮都令史為吏部郎也上若謂身不堪便當拂衣而退帝甚憚之後欲用為侍中以形短小乃止出為輔國將軍晉安王鎮北司馬征北長史東海太守行府州事入為五兵尚書行揚州事崔惠景事平領右軍將軍出監南徐州少時仍遷持節督南六允阨青冀五州軍事輔國將軍南六允州刺史至鎮俄爾以疾歸卒年六十二贈太常同郡顧憲之字士思宋鎮南將軍凱之孫也性尤清直永明六年為隨王東中郎長史行會稽郡事時西陵戍主杜元懿啟吳興無秋會稽豐登商旅往來倍多常歲西陵牛埭稅官格日三千五百元懿如即所見日可一倍盈縮相兼略計年長百萬浦陽南北津及柳浦四埭乞為官領攝一年格外長四百許萬西陵戍前檢稅無妨戍事餘三埭自舉腹心世祖敕示會稽郡此詎是事宜可訪察即啟憲之議曰尋始立牛埭之意非苟逼僦以納稅也當以風濤迅險人力不捷屢致膠溺濟急利物耳既公私是樂所以輸直無怨京師航渡即其例也而後之監領者不達其本各務己功互生理外或禁遏別道或空稅江行或撲船倍價或力周而猶責凡如此類不經埭煩牛者上詳被報格外十條竝蒙停寢從來諠訴始得暫弭案吳興頻歲失稔今茲尤饉去之從豐良由饑棘或徵貨貿粒還拯親累或提攜老弱陳力餬口埭司責稅依格弗降舊格新減尚未議登格外加倍將以何術皇慈恤隱振廩蠲調而元懿幸災搉利重增困瘼人而不仁古今共疾且比見加格置市者前後相屬非惟新加無贏竝皆舊格猶闕愚恐元懿今啟亦當不殊若事不副言懼貽譴詰便百方侵苦為公賈怨元懿禀性苛刻已彰往効任以物土譬以狼將羊其所欲舉腹心亦當虎而冠耳書云與其有聚歛之臣寧有盜臣此言盜公為損蓋微歛民所害乃大也今雍熙在運草木含澤其非事宜仰如聖旨然掌斯任者應簡廉平廉則不竊於公平則無害於民矣愚又以便宜者蓋謂便於公宜於民也竊見頃之言便宜者非能於民力之外用天分地者也率皆即日不宜於民方來不便於公名與實反有乖政體凡如此等誠宜深察山陰一縣課戶二萬其民貲不滿三千者殆將居半刻又刻之猶且三分餘一凡有貲者多是土士人復除其貧極者悉皆露戶役民三五屬官蓋惟分定百端輸調又則常然比衆局檢校首尾尋續橫相質累者亦復不少一人被攝十人相追一緒裁萌千蘖互起蠶事薥而農業廢賤取庸而貴舉責應公贍私日不暇給欲無為非其可得乎死且不憚矧伊刑罰身且不愛何況妻子是以前檢未窮後巧復滋網辟徒峻猶不能悛竊尋民之多偽實由宋季軍旅繁興役賦殷重不堪勤劇倚巧祈優積習生常遂迷忘反四海之大黎庶之衆心用參差難卒澄一化宜以漸不可疾責誠存不擾藏疾納汙實增崇曠務詳寬簡則稍自歸淳又被符簡病前後年月久遠具事不存符旨既嚴不敢闇信縣簡送郡郡簡呈使殊形詭狀千變萬源聞者忽不經懷見者實足傷駭兼親屬里伍流離道路時轉寒涸事方未已其士人婦女彌難厝衷不簡則疑其有巧欲簡復未知所安愚謂此條宜委縣簡保舉其綱領略其毛目乃囊漏不出貯中庶嬰疾沈痼者重荷生造之恩也又永興諸暨離唐𧜛之寇擾公私殘盡彌復特彌甚儻值水旱實不易念俗諺云會稽打鼓送卹吳興步檐令史會稽舊稱沃壤今猶若此吳興本是塉土事在可知因循餘弊誠宜改張沿元懿今啟敢陳管見世祖竝從之由是深以方直見委仍行南豫南六允二州事籤典咨事未嘗與色動遵法制歷黃門郎吏部郎永元中為豫章內史蕭惠基南蘭陵蘭陵人也祖源之宋前將軍父思話征西將軍儀同三司惠基幼以外戚見江夏王義恭歎其詳審以女結婚解褐著作佐郎征北行參軍尚書水部左民郎出為湘東內史除奉車都尉撫軍車騎主簿泰始初兄益州刺史惠開拒命明帝遣惠基奉使至蜀宣旨慰勞惠開降而益州土人反引氐賊圍州城惠基於外宣示朝廷威賞於是氐人邵虎郝天賜等斬賊帥馬興懷以降還為太子中舍人惠基西使千餘部曲竝欲論功惠基毀除勳簿競無所用或問其此意惠基曰我若論其此勞則驅馳無已豈吾素懷之本邪出為武陵內史中書黃門郎惠基善隸書及弈太祖與之情好相得早相器遇桂陽之役惠基姊為休範妃太祖謂之曰卿家桂陽遂復作賊太祖頓新亭壘以惠基為軍副惠基弟惠朗親為休範攻戰惠基在城內了不自疑出為豫章太守還為吏部郎遷長兼侍中袁粲劉秉起兵之夕太祖以秉是惠基妹夫時直在侍中省遣王敬則觀其指趣見惠基安靜不與秉相知由是益加恩信討沈攸之加惠基輔國將軍徙頓新亭事寧解軍號領長水校尉母憂去官太祖即位為征虜將軍衞尉惠基就職少時累表陳解見許服闋為征虜將軍東陽太守加秩中二千石凡歷四郡無所蓄聚還為都官尚書轉掌吏部永明三年以久疾徙為侍中領驍騎將軍尚書令王儉朝宗貴望惠基同在禮閤非公事不私覿焉五年遷太常加給事中自宋大明以來聲伎所尚多鄭衞淫俗雅樂正聲鮮有好者惠基解音律尤好魏三祖曲及相和歌每奏輒賞悅不能已當時能人琅邪王抗第一品吳郡褚思莊會稽夏赤松竝第二品赤松思速善於大行思莊思遲巧於鬬宋文帝世羊玄保為會稽太守帝遣思莊入東與玄保戲因製局圖還於帝前覆之太祖使思莊與王抗交賭自食時至日暮一局始竟上倦遣還省至五更方决抗睡於局後思莊達曉不寐世或云思莊所以品第致高緣其用思深久人不能對也抗思莊竝至給事中永明中敕抗品竟陵王子良使惠基掌其事初思話先於曲阿起宅有閑曠之致惠基常謂所親曰須婚嫁畢當歸老舊廬立身退素朝廷稱為善士明年卒年五十九追贈金紫光祿大夫弟惠休永明四年為廣州刺史罷任獻奉傾資上敕中書舍人茹法亮曰可問蕭惠休吾先使卿宣敕答其勿以私祿足充獻奉今段殊覺其下情厚於前後人問之故當不侵私邪吾欲分受之也十一年自輔國將軍南海太守為徐州刺史鬱林即位進號冠軍將軍建武二年虜圍鍾離惠休拒守虜遣使仲長文真謂城中曰聖上方脩文德何故完城拒命參軍羊倫答曰獫狁孔熾我是用急虜攻城惠休拒戰破之遷侍中領步兵校尉封建安縣子五百戶永元元年徙吳興太守徵為右僕射吳興郡項羽神舊酷烈世人云惠休事神謹欲得美遷二年卒贈金紫光祿大夫惠休弟惠朗善騎馬同桂陽賊叛太祖赦之復加序用永明九年為西陽王征虜長史行南六允州事典籤何益孫贓罪百萬棄市惠朗坐免官史臣曰長揖上宰廷折公卿古稱遺直希之未過若夫根孤地危峻情不屈則其道雖行其身永廢故多借路求容遜辭自貶高流世業不待旁通直轡揚鑣莫能夭閼王秀之世守家風不降節於權輔美矣哉贊曰秀處邦朝清心直己伯寶世族榮家為美約守先業觀進知止慧曉貞亮斯焉君子惠基惠和時之選士
