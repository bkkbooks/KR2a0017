  - {type: variant, offset: 6218, length: 0, content: '', WYG: 南齊書卷二十八南齊書卷二十八考證崔祖思傳與刺史劉懷珍於堯廟祀神廟有蘇侯像刺史劉懷珍南史作刺史垣䕶之蘇侯崔祖思以為蘇峻臣承蒼按建康亦有蘇侯像宋元凶劭嘗迎入宫中拜為驃騎將軍此自是當時滛祀未必果為蘇峻峻之入臺窮凶極暴殘酷無道建康之人豈有奉為神明而祀之者乎寧失不經靡愧周書臣承蒼按寧失不經乃虞書文非周書也南齊書卷二十八考證}
