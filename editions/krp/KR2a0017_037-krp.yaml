body:
  text: 南齊書卷三十七梁蕭子顯撰列傳第十八到撝劉悛虞悰胡諧之到撝字茂謙彭城武原人也祖彦之宋驃騎將軍父仲度驃騎從事中郎撝襲爵建昌公起家為太學博士除奉車都尉試守延陵令非所樂去官除新安王北中郎行參軍坐公事免除新安王撫軍參軍未拜新安王子鸞被殺仍除長兼尚書左民郎中明帝立欲收物情以撝功臣後擢為太子洗馬除王景文安南諮議參軍撝資籍豪富厚自奉養宅宇山池京師第一妓妾姿藝皆窮上品才調流贍善納交遊庖厨豐腆多致賔客愛妓陳玉珠明帝遣求不與逼奪之撝頗怨望帝令有司誣奏撝罪付廷尉將殺之撝入獄數宿鬚鬢皆白免死繫尚方奪封與弟賁撝由是屏斥聲玩更以貶素自立帝除撝為羊希恭寧朔府參軍徙劉韞輔國王景文鎮南參軍竝辭疾不就尋板假明威將軍仍除桂陽王征南參軍轉通直郎解職帝崩後弟賁表讓封還撝朝議許之遷司徒左西屬又不拜居家累年弟遁元徽中為寧逺將軍輔國長史南海太守在廣州昇明元年沈攸之反刺史陳顯達起兵以應朝廷遁以猶預見殺遁家人在都從野夜歸見兩三人持堊刷其家門湏臾滅明日而遁死問至撝惶懼詣太祖謝即板為世祖中軍諮議參軍建元初遷司徒右長史出為永嘉太守為黄門郎解職世祖即位遷太子中庶子不拜又除長沙王中軍長史司徒左長史宋世上數遊㑹撝家同從明帝射雉郊野渴倦撝得早青𤓰與上對剖食之上懐其舊徳意眄良厚至是一嵗三遷永明元年加輔國將軍轉御史中丞車駕幸丹陽郡宴飲撝恃舊酒後狎侮同列言笑過度為左丞庾杲之所紏贖論三年復為司徒左長史轉左衛將軍随王子隆帶彭城郡撝問訊不修民敬為有司所舉免官久之白衣兼御史中丞轉臨川王驃騎長史司徒左長史遷五兵尚書出為輔國將軍廬陵王中軍長史母憂去官服未終八年卒年五十八弟賁初為衛尉主簿奉車都尉昇明初為中書郎太祖驃騎諮議建元中為征虜司馬卒賁弟坦解褐本州西曹昇明二年亦為太祖驃騎參軍歴豫章王鎮西驃騎二府諮議坦美鬚髯與世祖豫章王有舊坦仍随府轉司空太尉參軍出為晉安内史還又為大司馬諮議中書郎卒劉悛字士操彭城安上里人也彭城劉同出楚元王分為三里以别宋氏帝族祖穎之汝南新蔡二郡太守父勔司空劉延孫為南徐州初辟悛從事随父勔征竟陵王誕於廣陵以功拜駙馬都尉轉宗慤寧蠻府主簿建安王司徒騎兵參軍復随父勔征殷琰於夀春於横塘死虎累戰皆勝歴遷員外郎太尉司徒二府參軍代世祖為尚書庫部郎遷振武將軍蜀郡太守未之任復從父勔征討假寧朔將軍拜鄱陽縣侯世子轉桂陽王征北中兵參軍與世祖同直殿内為明帝所親待由是與世祖欵好遷通直散騎侍郎出為安逺䕶軍武陵内史郡南江古堤久廢不緝悛修治未畢而江水忽至百姓棄役奔走悛親率厲之於是乃立漢夀人邵榮興六世同㸑表其門閭悛强濟有世調善於流俗蠻王田僮在山中年垂百餘嵗南譙王義宣為荆州僮出謁至是又出謁悛明帝崩表奔赴敕帶郡還都吏民送者數千人悛人人執手係以涕泣百姓感之贈送甚厚仍除散騎侍郎桂陽難加寧朔將軍助守石頭父勔於大桁戰死悛時疾病扶伏路次號哭求勔屍勔屍項後傷缺悛割髮補之持哭墓側冬月不衣絮太祖代勔為領軍素與勔善書譬悛曰承至性毁瘵轉之危慮深以酸怛終哀全生先王明軌豈有去縑纊撤温席以此悲號得終其孝性邪當深顧往㫖少自抑勉建平王景素反太祖摠衆軍出頓𤣥武湖悛初免喪太祖欲使領支軍召見悛兄弟皆羸削改貌於是乃止除中書郎行宋南陽八王事轉南陽王南中郎司馬長沙内史行湘州事未發覇業初建悛先致誠節沈攸之事起加輔國将軍世祖鎮盆城上表西討求悛自代世祖既不行悛除黄門郎行吳郡事尋轉晉熙王撫軍中軍二府長史行揚州事出為持節督廣州廣州刺史將軍如故襲爵鄱陽縣侯世祖自尋陽還遇悛於舟渚間歡宴叙舊停十餘日乃下遣文惠太子及竟陵王子良攝衣履修父友之敬太祖受禪國除進號冠軍將軍平西記室參軍夏侯恭叔上書以栁元景中興功臣劉勔殞身王事宜存封爵詔曰與運隆替自古有之朝議已定不容復厝意也初蒼梧廢太祖集議中華門見悛謂之曰君昨直耶悛答曰僕昨乃正直而言之在外至是上謂悛曰功名之際人所不忘卿昔於中華門答我何其欲謝世事悛曰臣世受宋恩門荷齊眷非常之勲非臣所及進不逺怨前代退不孤負聖明敢不以實仰答遷太子中庶子領越騎校尉時世祖在東宫每幸悛坊閒言至夕賜屏風帷帳世祖即位改領前軍將軍中庶子如故征北竟陵王子良帶南兖州以悛為長史加冠軍將軍廣陵太守轉持節都督司州諸軍事司州刺史將軍如故悛父勔討殷琰平夀陽無所犯害百姓徳之為立碑祀悛歩道從夀陽之鎮過勔碑拜敬泣涕初義陽人夏伯宜殺剛陵戍主叛渡淮虜以為義陽太守悛設計購誘之虜缺州刺史謝景殺伯宜兄弟北襄城太守李榮公歸降悛於州治下立學校得古禮器銅罍銅甑山罍罇銅豆鍾各二口獻之遷長兼侍中車駕數幸悛宅宅盛治山池造甕牖世祖著鹿皮冠被悛菟皮衾於牖中宴樂以冠賜悛至夜乃去後悛從駕登蒋山上數歎曰貧賤之交不可忘糟糠之妻不下堂顧謂悛曰此况卿也世言富貴好改其素情吾雖有四海今日與卿盡布衣之適悛起拜謝遷冠軍将軍司徒左長史尋以本官行北兖州緣淮諸軍事徙始興王前軍長史平蠻校尉蜀郡太守將軍如故行益州府州事郡尋改為内史随府轉安西悛治事嚴辦以是㑹㫖宋代太祖輔政有意欲鑄錢以禪讓之際未及施行建元四年奉朝請孔顗上鑄錢均貨議辭證甚博其畧以為食貨相通理勢自然李悝曰糴甚貴傷民甚賤傷農民傷則離散農傷則國貧甚賤與甚貴其傷一也三吳國之闗閫比嵗被水潦而糴不貴是天下錢少非榖穰賤此不可不察也鑄錢之弊在輕重屢變重錢患難用而難用為累輕輕錢弊盗鑄而盗鑄為禍深民所盗鑄嚴法不禁者由上鑄錢惜銅愛工也惜銅愛工者謂錢無用之器以通交易務欲令輕而數多使省工而易成不詳慮其為患也自漢鑄五銖錢至宋文帝歴五百餘年制度世有廢興而不變五銖錢者明其輕重可法得貨之宜以為宜開置泉府方牧貢金大興鎔鑄錢重五銖一依漢法府庫已實國用有儲乃量奉禄薄賦税則家給民足頃盗鑄新錢者皆効作翦鑿不鑄大錢也摩澤淄染始皆類故交易之後渝變還新良民弗售淄染不復行矣所鬻賣者皆徒失其物盗鑄者復賤買新錢淄染更用反覆生詐循環起姦此明主尤所宜禁而不可長也若官鑄已布於民使嚴斷翦鑿小輕破缺無周郭者悉不得行官錢細小者稱合銖兩銷以為大利貧良之民塞姦巧之路錢貨既均逺近若一百姓樂業市道無争衣食滋殖矣時議者多以錢貨轉少宜更廣鑄重其銖兩以防民姦太祖使諸州郡大市銅炭㑹宴駕事寢永明八年悛啟世祖曰南廣郡界蒙山下有城名蒙城可二頃地有燒鑪四所髙一丈廣一丈五尺從蒙城渡水南百許歩平地掘土深二尺得銅又有古掘銅坑深二丈并居宅處猶存鄧通南安人漢文帝賜嚴道縣銅山鑄錢今蒙山近青衣水南青衣在側竝是故秦之嚴道地青衣縣又改名漢嘉且蒙山去南安二百里案此必是通所鑄近喚蒙山獠出云甚可經畧此議若立潤利無極并獻蒙山銅一片又銅石一片平州鐵刀一口上從之遣使入蜀鑄錢得千餘萬功費多乃止悛仍代始興王鑑為持節監益寧二州諸軍事益州刺史將軍如故悛既藉舊恩尤能悦附人主承迎權貴賔客閨房供費奢廣罷廣司二州傾資貢獻家無留儲在蜀作金浴盆餘金物稱是罷任以本號還都欲獻之而世祖宴駕鬱林新立悛奉獻減少鬱林知之諷有司收悛付廷尉將加誅戮髙宗啟救之見原禁錮終身雖見廢黜而賔客日至悛婦弟王法顯同宋桂陽事遂啟别居終身不復見之海陵王即位以白衣除兼左民尚書尋除正髙宗立加領驍騎將軍復故官駙馬都尉建武二年虜主侵壽陽詔悛以本官假節出鎮漅湖遷散騎常侍右衛將軍虜冦既盛悛又以本官出屯新亭悛歴朝皆見恩遇太祖為鄱陽王鏘納悛妹為妃髙宗又為晉安王寳義納悛女為妃自此連姻帝室王敬則反悛出守琅邪城轉五兵尚書領太子左衛率未拜明帝崩東昏即位改授散騎常侍領驍騎將軍尚書如故衛送山陵卒年六十一贈太常常侍都尉如故謚曰敬虞悰字景豫㑹稽餘姚人也祖嘯父晉左民尚書父秀之黄門郎悰少而謹敕有至性秀之於都亡悰東出奔喪水漿不入口州辟主簿建平王參軍尚書儀曹郎太子洗馬領軍長史正員郎累至州治中别駕黄門郎初世祖始從官家尚貧薄悰推國士之眷數相分與每行必呼上同載上甚徳之昇明中世祖為中書引悰為諮議參軍遣吏部郎江謐持手書謂悰曰今因江吏郎有白以君情顧意欲相屈建元初轉太子中庶子遷後軍長史領歩兵校尉鎮北長史寧朔將軍南東海太守尋為豫章内史將軍如故悰治家富殖奴婢無游手雖在南土而㑹稽海味無不畢致焉遷輔國將軍始興王長史平蠻校尉蜀郡太守轉司徒司馬將軍如故悰善為滋味和齊皆有方法豫章王嶷盛饌享賔謂悰曰今日肴羞寧有所遺不悰曰恨無黄頷􅌜何曽食䟽所載也遷散騎常侍太子右率永明八年大水百官戎服救太廟悰朱衣乗車鹵簿於宣陽門外行馬内驅打人為有司所奏見原上以悰布衣之舊從容謂悰曰我當令卿復祖業轉侍中朝廷咸驚其美拜遷祠部尚書世祖幸芳林園就悰求扁米粣悰獻粣及雜肴數十轝太官鼎味不及也上就悰求諸飲食方悰秘不肯出上醉後體不快悰乃獻醒酒鯖鮓一方而已出為冠軍將軍車騎長史轉度支尚書領歩兵校尉鬱林立改領右軍將軍揚州大中正兼大匠卿起休安陵於陵所受局下牛酒坐免官隆昌元年以白衣領職鬱林廢悰竊歎曰王徐遂縛袴廢天子天下豈有此理邪延興元年復領右軍明帝立悰稱疾不陪位帝使尚書令王宴賫廢立事示悰以悰舊人引參佐命悰謂宴曰主上聖明公卿勠力寧假朽老以匡賛惟新乎不敢聞命朝議欲糾之僕射徐孝嗣曰此亦古之遺直衆議乃止悰稱疾篤還東上表曰臣族陋海區身微稽土猥屬興運荷竊稠私徒越星紀終慙報答衛養乖方抱疾嬰固寢瘵以來倐踰旬朔頻加醫治曽未瘳損惟此朽頓理難振復乞解所職盡療餘辰詔賜假百日轉給事中光禄大夫尋加正員常侍永元元年卒時年六十五悰性敦實與人知識必相存訪親疎皆有終始世以此稱之從弟袤矢志不仕王敬則反取袤監㑹稽郡而軍事悉付寒人張靈寳郡人攻郡殺靈寳袤以不豫事得全胡諧之豫章南昌人也祖亷之治書侍御史父翼之州辟不就諧之初辟州從事主簿臨賀王國常侍員外郎撫軍行參軍晉熙王安西中兵參軍南梁郡太守以器局見稱徙邵陵王南中郎中兵領汝南太守不拜除射聲校尉州别駕除左軍將軍不拜仍除邵陵王左軍諮議世祖頓盆城使諧之守尋陽城及為江州復以諧之為别駕委以事任文惠太子鎮襄陽世祖以諧之心腹出為北中郎征虜司馬扶風太守爵闗内侯在鎮毗賛甚有心力建元二年還為給事中驍騎將軍本州中正轉黄門郎領羽林監永明元年轉守衛尉中正如故明年加給事中三年遷散騎常侍太子右率五年遷左衛將軍加給事中中正如故諧之風形瓌潤善自居處兼以舊恩見遇朝士多與交遊六年遷都官尚書上欲遷諧之嘗從容謂諧之曰江州有㡬侍中邪諧之答曰近世唯有程道惠一人而已上曰當令有二後以語尚書令王儉儉意更異乃以為太子中庶子領左衛率諧之兄謨之亡諧之上表曰臣私門罪釁早備荼苦兄弟三人共相撫鞠嬰孩抱疾得及成人長兄臣諶之復早殞没與亡第二兄臣謨之衘戚家庭得蒙訓長情同極廕何圖一旦奄見棄放吉凶分違不獲臨奉乞解所職詔不許改衛尉中庶子如故八年上遣諧之率禁兵討巴東王子響於江陵兼長史行事臺軍為子響所敗有司奏免官權行軍事如故復為衛尉領中庶子本州中正諧之有識計每朝廷官缺及應遷代密量上所用人皆如其言虞悰以此稱服之十年轉度支尚書領衛尉明年卒年五十一贈右将軍豫州刺史諡曰肅史臣曰送錢贏兩言此無忘一笥之懐報以都尉千金可失貴在人心夫謹而信汎愛衆其為利也博矣況乎先覺潜龍結厚於布素随才致位理固然也賛曰到藉豪華晚懐虛素虞生富厚侈不違度劉實朝交胡乃蕃故頡頏亮采康衢騁歩南齊書卷三十七南齊書卷三十七考證劉悛傳劉悛臣祖庚按南史云悛本名忱宋明帝多忌反語劉忱為臨讐改名悛焉傳不載桂陽難加寧朔將軍諸本同南史陽下有之字持哭墓側哭南監本作喪於義較長永明八年罷廣司二州臣祖庚按通鑑考異曰悛出督廣州世祖自尋陽東下遇悛舟於渚間是時齊未受禪也罷廣州計當在世祖居東宫時據此則非永明八年事通鑑列于永明十一年互有不同南齊書卷三十七考證
