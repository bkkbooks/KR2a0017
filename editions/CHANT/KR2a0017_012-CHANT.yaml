body:
  text: 卷十二志第四天文上易曰聖人仰觀象於天俯觀法於地天文之事其來已久太祖革命受終膺集期連宋昇明三年太史令將作匠陳文建陳天文奏曰自孝建元年至昇明三年日蝕有十虧上有七占曰有亡國失君之象一曰國命絕主危亡孝建元年至昇明三年太白經天五占曰天下革民更王異姓興孝建元年至昇明三年月犯房心四太白犯房心五占曰其國有喪宋當之孝建元年至永光元年奔星出入紫宮有四占曰國去其君有空國徙王大明二年至元徽四年天再裂占曰陽不足白虹貫日人君惡之孝建二年至大明五年月入太微泰豫元年至昇明三年月又入太微孝建元年至元微二年太白入太微各八熒惑入太微六占曰七耀行不軌道危亡之象貴人失權勢主亦衰當有王入為主孝建二年至昇明二年太白熒惑經羽林各三占曰國殘更世孝建二年四月十三日熒惑守南斗成勾己占曰天下易正更元孝建三年十二月一日填星熒惑辰星合於南斗占曰改立王公大明二年十二月二十六日太白犯填星於斗六年十一月十五日太白填星合於危占曰天子失土景和元年十月八日熒惑太微成勾己占曰王者惡之主命無期有徙主若主王天下更紀泰始三年正月十七日白氣見西南東西半天名曰長庚六年九月二十七日白氣又見東南長二丈並形狀長大猛過彗星占曰除舊布新易主之象遠期一紀至昇明三年一紀訖泰始四年四月二十四日太白犯填星于胃占曰主命惡之泰始七年六月十七日太白歲星填星合於東井占曰改立王公元徽四年至昇明二年三月日有頻食占曰社稷將亡王者惡之元徽四年十月十日填星守太微宮逆從行歷四年占曰有亡君之戒易世立王元徽五年七月一日熒惑太白辰星合於翼占曰改立王公昇明二年六月二十日歲星守斗建陰陽終始之門大赦昇平之所起律歷七政之本源德星守之天下更年五禮更興多暴貴者昇明二年十月一日熒惑守輿鬼三年正月七日熒惑守兩戒間成勾己占曰尊者失朝必有亡國去王昇明三年正月十八日辰星孟效西方占曰天下更王昇明三年四月歲星在虛危徘徊玄枵之野則齊國有福厚為受慶之符令所記三辰七曜之變起建元訖於隆昌以續宋史建武世太史奏事明帝不欲使天變外傳並祕而不出自此闕焉日蝕建元二年九月甲午朔日蝕三年七月己未朔日蝕永明元年十二月乙巳朔日蝕十年十月二日癸未朔加時在午之半度到未初見日始蝕虧起西北角蝕十分之四申時光色復還隆昌元年五月甲戌合朔巳時日蝕三分之一午時光復還月蝕建元四年七月戊辰月在危宿蝕永明二年四月丁巳月在南斗宿蝕三年十一月戊寅月入東井曠中因蝕三分之一五年三月庚子月在氐宿蝕九月戊戌月在胃宿蝕六年九月癸巳月蝕在婁宿九度加時在寅之少弱虧起東北角蝕十五分之十一十五日子時蝕從東北始至子時末都既到丑時光色還復七年八月丁亥月在奎宿蝕十月庚辰月奄蝕熒惑八年六月庚寅月奄蝕畢左股第一星十年十二月丁酉月蝕在柳度加時在酉之少弱到亥時月蝕起東角七分之二至子時光色還復永泰元年四月癸亥月蝕色赤如血三日而大司馬王敬則舉兵眾以為敬則祲烈所感永元元年八月己未月蝕盡色皆赤是夜始安王遙光伏誅史臣曰日月代照實重天行上交下蝕同度相掩案舊說曰日有五蝕謂起上下左右中央是也交會舊術日蝕不從東始以月從其西東行及日於交中交從外入內者先會後交虧西南角先交後會虧西北角交從內出者先會後交虧西北角先交後會虧西南角日正在交中者則虧於西故不嘗蝕東也若日中有虧名為黑子不名為蝕也漢尚書令黃香曰日蝕皆從西月蝕皆從東無上下中央者春秋魯桓三年日蝕貫中下上竟黑疑者以為日月正等月何得小而見日中鄭玄云月正掩日日光從四邊出故言從中起也王逸以為月若掩日當蝕日西月行既疾須臾應過西崖既復次食東崖今察日蝕西崖缺而光已復過東崖而獨不掩逸之此意實為巨疑先儒難月以望蝕去日極遠誰蝕月乎說者稱日有暗氣天有虛道常與日衡相對月行在虛道中則為氣所弇故月為蝕也雖時加夜半日月當子午正隔於地猶為暗氣所蝕以天體大而地形小故也暗虛之氣如以鏡在日下其光耀魄乃見於陰中常與日衡相對故當星星亡當月月蝕今問之曰星月同體俱兆日耀當月之蝕星不必亡若更有所當星未嘗蝕同稟異虧其故何也答曰日為陰主以當陽位體敵勢交自招盈損星雖同類而精景陋狹小毀皆亡無有受蝕之地纖縱光可滿亦不與弦望同形又難曰日之夜蝕驗於夜星之亡晝蝕既盡晝星何故反不見答之曰夫言光有所衝則有不衝之光矣言有所當亦有所不當矣夜食度遠與所當而同沒晝食度近由非衝而得明又問太白經天實緣遠日今度近更明於何取喻答曰向論二蝕之體周衝不同經與不經自由星遲疾難蝕引經恐未得也日光色建元四年十一月午時日色赤黃無光至暮在箕宿二年閏正月乙酉日黃赤無光至暮永明五年十一月丁亥日出高三竿朱色赤黃日暈虹抱珥直背建元元年十二月未時日暈帀黃白色至申乃消散永明二年正月丁酉日交暈再重三年二月丁卯日有半暈暈上生一珥四年五月丙午日暈再重仍白虹貫日在東井度六年三月甲申日於蘭雲中薄半暈須臾過帀日東南暈外有一直並黃色壬辰日暈須臾日西北生虹貫日中八年十一月己亥日半暈南面不帀日東西帶暈各生珥長三尺白色珥各長十丈許正衝日久久消散背因成重暈並青絳色九年正月甲午日半暈南面不帀北帶暈生一抱東西各生一珥抱北又有半暈抱珥並黃色北又生白虹貫日久久消散建元元年六月甲申日南北兩珥西有抱黃白色永明二年十一月辛巳日東北有一背三年十一月庚寅日西北有一背四年正月辛巳日南北各生一珥又生一背十二月辛未日西北生一直黃白色戊寅日北生一背青絳色五年八月己卯日東南生一珥並青絳色六年二月丁巳日東北生黃色北有一珥黃赤色久久並散庚申日西有一背赤青色東西生一直南北各生一珥並黃白色七年十月癸未日東北生一背青赤色須臾消八年六月戊寅日於蒼白雲中南北各生一珥青黃絳雜色澤潤並長三尺許至巳午消隆昌元年正月壬戌日於蘭雲中暈南北帶暈各生一直同長一丈須臾消永元元年十二月乙酉日中有三黑子月暈犯建元四年十月庚寅月暈五車及參頭永明元年正月壬辰是日至十五日月三暈太微及熒惑三月庚申至十三日月三暈太微及熒惑五年二月乙未自九日至是日月三暈太微六年二月壬戌甲夜十三日甲夜十五日甲夜月並暈太微永明元年十一月己未月南北各生一珥又有一抱月犯列星建元元年七月丁未月犯心大星北一寸丁卯月入軒轅中犯第二星十月丙申月在心大星西北七寸十一月壬戌月在氐東南星五寸十二月乙酉月犯太微西蕃南頭第一星庚寅月行房道中無所犯癸巳月入南斗魁中無所犯二年三月癸卯月犯心大星又犯後星五月庚戌月入南斗七月己巳月入南斗三年二月癸巳月犯太微上將四年二月乙亥月犯輿鬼西北星丙子月犯南斗魁第二星辛未月犯心大星又犯後星四月壬辰月犯軒轅左民星庚子月犯箕東北星五月丙寅月犯心後星戊寅月掩昴西北星六月乙未月犯箕東北星七月癸亥月行南斗魁中無所犯庚辰月犯軒轅女主八月庚子月犯昴西南星壬寅月犯五車東南星壬申月犯軒轅少民星九月丁巳月犯箕東北星壬辰月在營室度入羽林中二十日月入輿鬼犯積尸十一月甲戌月犯五車南星十二月丁酉月犯軒轅女主星又掩女御永元元年正月己亥月犯心後星三月乙未月犯軒轅女主星六月癸酉月犯輿鬼西南星八月乙丑月犯南斗第四星又犯輿鬼星九月庚辰月犯太白左蕃度癸巳月犯東井北轅西頭第一星十二月丁卯月犯心前星又犯大星己巳月犯南斗第五星二年二月甲子月犯南斗第四星又犯第三星三月丁丑月犯東井北轅北頭第一星四月戊申月犯軒轅右角六月丙寅月犯東井轅頭第一星八月丙午月掩心大星戊申月犯南斗第三星戊子月犯東井北轅西頭第一星十一月庚辰月犯昴星丙戌月犯軒轅左角十二月壬戌月犯心前星又犯大星三年二月己未月犯南斗第五星三月壬申月在東井無所犯六月丙午月掩心前星八月丙辰月犯東井北轅第二星九月癸未月犯東井南轅西頭第一星四年正月癸酉月入東井無所犯乙亥月犯輿鬼閏月辛亥月犯房二月丁卯月犯東井鉞三月乙未月入東井無所犯七月辛亥月犯東井八月戊寅月犯東井九月辛卯月與太白於尾合宿丙午月入東井十一月辛丑月入東井曠中辛亥月犯房北頭第二星十二月己巳月犯東井北轅東頭第二星辛巳月犯南斗第六星五年正月丙午月犯房鉤鈐二月癸亥月犯東井南轅西頭第二星三月癸卯月犯南斗第二星六月乙丑月犯南斗第六星在南斗七寸丙寅月犯西建星北一尺史臣曰月令昏明中星皆二十八宿箕斗之閒微為疏闊故仲春之與孟秋建星再用與宿度並列亟經陵犯災之所主未有舊占石氏星經云斗主爵祿襃賢進士故置建星以為輔若犯建之異不與斗同則據文求義亦宰相之占也七月丁未月行入東井曠中無所犯八月壬申月在畢犯左股第二星西北三寸九月戊子月在填星北二尺八寸為合宿十月戊寅月入氐犯東南星西北一尺餘十一月戊寅月入氐十二月戊午月在東壁度在熒惑北相去二尺七寸為合宿甲子月在東壁度東南九寸為犯癸酉月在歲星南七寸為犯六年正月戊戌月在角星南相去三寸二月丁卯月在氐西南六寸三月乙未月入氐中在歲星南一尺一寸為合宿四月癸丑月犯東井南轅西頭第二星壬戌月在氐西南星東南五寸為犯漸入氐中與歲星同在氐度為合宿癸亥月行在房北頭第一星西南一尺為犯六月乙卯月在角星東一寸為犯丁巳月行入氐無所犯在歲星東三寸為合宿七月乙酉月入房北頭第二次相星西北八寸為犯庚寅月在牽牛中星南二寸為犯庚子月行在畢左股第一星七寸為犯又進入畢八月壬子月行在歲星東二尺五寸同在氐中為合宿九月庚辰月在房北頭第一上相星東北一尺為犯又掩犯關楗閉星丁酉月行入東井甲辰月在左角星西北九寸為犯又在熒惑西南一尺六寸為合宿十月癸酉月入氐中在西南星東北三寸為犯閏月壬辰月行入東井十一月丙戌月行入羽林中無所犯乙未月行在東井南轅西頭第二星南一尺為犯丙寅月在左角北八寸為犯辛未月行在太白東北一尺五寸同在箕度為合宿十二月甲申月行在畢左股第二星北七寸為犯乙未月行入氐西南星東北一尺為犯丙申月在房北頭上相星北一尺為犯七年正月甲寅月入東井曠中無所犯戊辰月掩犯牽牛中星二月辛巳月掩犯東井北轅東頭第一星三月庚申月在歲星西北三尺同在箕度為合宿四月乙酉月入氐中無所犯丙戌月犯房星北頭第一上相星北一尺在楗閉西北四寸為犯六月乙酉月犯牽牛中星乙未月入畢在左股第二星東八寸為犯七月丁未月入氐中無所犯戊申在楗閉星東北一尺為犯八月甲戌月入氐在西南星東北一尺為犯庚寅月在畢右股第一星東北一尺為犯九月丁巳月掩犯畢右股第一星庚申月在東井北轅東頭第一星西北八寸為犯十月甲申月行掩畢左股第三星丁酉