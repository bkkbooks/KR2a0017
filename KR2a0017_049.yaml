body:
  text: 南齊書卷四十九列傳第三十王奐從弟繢張沖王奐字彥孫琅邪臨沂人也祖僧朗宋左光祿儀同父粹黃門郎奐出從祖中書令球故字彥孫解褐著作佐郎太子舍人安陸王冠軍主簿太子洗馬本州別駕中書郎桂陽王司空咨議黃門郎元徽元年為晉熙王征虜長史江夏內史遷侍中領步兵校尉復出為晉熙王鎮西長史加冠軍將軍江夏武昌太守徵祠部尚書轉掌吏部升明初遷冠軍將軍丹陽尹初王晏父普曜為沈攸之長史常慮攸之舉事不得還時奐為吏部轉普曜為內職晏深德之及晏仕世祖府奐從弟蘊反世祖謂晏曰王奐宋家外戚王蘊親同逆黨既其羣從豈能無異意我欲具以啓聞晏叩頭曰王奐修謹保無異志晏父母在都請以為質世祖乃止出為吳興太守秩中二千石將軍如故尋進號征虜將軍建元元年進號左將軍明年遷太常領鄱陽王師仍轉侍中祕書監領驍騎將軍又遷征虜將軍臨川王鎮西長史領南蠻校尉南郡內史奐一歲三遷上表固讓南蠻曰今天地初闢萬物載新荊蠻來威巴濮不擾但使邊民樂業有司修務本府舊州日就殷阜臣昔遊西土較見盈虛兼日者戎燼之後痍毀難復雖復緝以善政未及來蘇今復割撤大府制置偏校崇望不足以助強語實安能以相弊且資力既分職司增廣衆勞務倍文案滋煩非獨臣見其難竊以為國計非允見許於是罷南蠻校尉官進號前將軍世祖即位徵右僕射仍轉使持節監湘州軍事前將軍湘州刺史永明二年徙為散騎常侍江州刺史初省江州軍府四年遷右僕射本州中正奐無學術以事幹見處遷尚書僕射中正如故校籍郎王植屬吏部郎孔琇之以校籍令史俞公喜求進署矯稱奐意植坐免官六年遷散騎常侍領軍將軍奐欲請車駕幸府上晚信佛法御膳不宰牲使王晏謂奐曰吾前去年為斷殺事不復幸詣大臣已判無容欻爾也王儉卒上用奐為尚書令以問王晏晏位遇已重與奐不能相推答上曰柳世隆有重望恐不宜在奐後乃轉為左僕射加給事中出為使持節散騎常侍都督雍梁南北秦四州郢州之竟陵司州之隨郡軍事鎮北將軍雍州刺史上謂王晏曰奐於釋氏實自專至其在鎮或以此妨務卿相見言次及之勿道吾意也上以行北諸戍士卒多縷送袴褶三千具令奐分賦之十一年奐輒殺寧蠻長史劉興祖上大怒使御史中丞孔稚圭奏其事曰雍州刺史王奐啓録小府長史劉興祖虛稱興祖扇動山蠻規生逆謀誑言誹謗言辭不遜敕使送興祖下都奐慮所啓欺妄於獄打殺興祖詐啓稱自經死止今體傷楗蒼爤事暴聞聽攝興祖門生劉倪到臺辨問列興祖與奐共事不能相和自去年朱公恩領軍征蠻失利興祖啓聞以啓呈奐奐因此便相嫌恨若云興祖有罪便應事在民間民間恬然都無事迹去十年九月十八日奐使仗身三十人來稱敕録興祖付獄安定郡蠻先在郡贓私興祖既知其取與即牒啓奐不問興祖後執録奐仍令蠻領仗身於獄守視興祖未死之前於獄以物畫漆柈子中出密報家道無罪令啓乞出都一辨萬死無恨又云奐駐興祖嚴禁信使欲作方便殺以除口舌又云奐意乃可奐第三息彪隨奐在州凡事是非皆干豫扇構密除興祖又云興祖家餉糜中下藥食兩口便覺回乞獄子食者皆大利興祖大叫道糜中有藥近獄之家無人不聞又云奐治著興祖日急判無濟理十一月二十一日奐使獄吏來報興祖家道興祖於獄自經死尸出家人共洗浴之見興祖頸下有傷肩胛烏爤陰下破碎實非興祖自經死家人及門義共見非是一人重攝檢雍州都留田文喜列與倪符同狀興祖在獄嗛苦望下既蒙降旨欣願始遂豈容於此方復自經敕以十九日至興祖以二十一日死推理檢迹灼然矯假尋敕使送下奐輒拒詔所謗諸條悉出奐意毀故丞相若陳顯達誹訕朝事莫此之深彪私隨父之鎮敢亂王法罪並合窮戮上遣中書舍人呂文顯直閣將軍曹道剛領齋仗五百人收奐敕鎮西司馬曹虎從江陵步道會襄陽奐子彪素凶剽奐不能制女壻殷睿懼禍謂奐曰曹呂今來既不見真敕恐為姦變政宜録取馳啓聞耳奐納之彪輒令率州內得千餘人開鎮庫取仗配衣甲出南堂陳兵閉門拒守奐門生鄭羽叩頭啓奐乞出城迎臺使奐曰我不作賊欲先遣啓自申政恐曹呂輩小人相陵藉故且閉門自守耳彪遂出與虎軍戰其黨范虎領二百人降臺軍彪敗走歸土人起義攻州西門彪登門拒戰却之奐司馬黃瑤起寧蠻長史裴叔業於城內起兵攻奐奐聞兵入還內禮佛未及起軍人遂斬之年五十九執彪及弟爽弼殷睿皆伏誅詔曰逆賊王奐險詖之性自少及長外飾廉勤內懷凶慝貽戾鄉伍取棄衣冠拔其文筆之用擢以顯任出牧樊阿政刑薥亂第三息彪矯弄威權父子均勢故寧蠻長史劉興祖忠於奉國每事匡執奐忿其異己誣以訕謗肆怒囚録然後奏聞朕察奐愚詐詔送興祖還都乃懼姦謀發露潛加殺害欺罔既彰中使辨核遂授兵登陴逆捍王命天威電掃義夫咸奮曾未浹辰罪人斯獲方隅克殄漢南肅清自非犯官兼預同逆謀為一時所驅逼者悉無所問奐長子太子中庶子融融弟司徒從事中郎琛於都棄市餘孫皆原宥殷睿字文子陳郡人晉太常融七世孫也宋元嘉末祖元素坐染太初事誅睿遺腹亦當從戮外曾祖王僧朗啓孝武救之得免睿解文義有口才司徒褚淵甚重之謂之曰諸殷自荊州以來無出卿右者睿斂容答曰殷族衰悴誠不如昔若此旨為虛故不足降此旨為實彌不可聞奐為雍州啓睿為府長史睿族父字昭度與睿同承融後宋司空景仁孫也及父道矜並有古風以是見蚩於世其事非一宋泰始初為度支尚書坐屬父疾及身疾多為有司所奏明帝詔曰殷道矜有生便病比更無橫病因愚習惰久妨清左遷散騎常侍領校尉歷官清顯至金紫光祿大夫建武中卒奐弟胄女為長沙王晃妃世祖詔曰奐自陷逆節長沙王妃男女並長且奐又出繼前代或當有準可特不離絶奐從弟繢繢字叔素宋車騎將軍景文子也弱冠為祕書郎太子舍人轉中書舍人景文以此授超階令繢經年乃受景文封江安侯繢襲其本爵為始平縣五等男遷祕書丞司徒右長史元徽末除寧朔將軍建平王征北長史南東海太守黃門郎寧朔將軍東陽太守世祖為撫軍吏部尚書張岱選繢為長史呈選牒太祖笑謂岱曰此可謂素望遷散騎常侍驍騎將軍出補義興太守輒録郡吏陳伯喜付陽羡獄欲殺之縣令孔逭不知何罪不受繢教為有司所奏繢坐白衣領職遷太子中庶子領驍騎轉長史兼侍中世祖出射雉繢信佛法稱疾不從駕轉左民尚書以母老乞解職改授寧朔將軍大司馬長史淮陵太守出為宣城太守秩中二千石隆昌元年遷輔國將軍太傅長史不拜仍為冠軍將軍豫章內史進號征虜又坐事免官除冠軍將軍司徒左長史散騎常侍隨王師除征虜將軍驃騎長史遷散騎常侍太常永元元年卒年五十三諡靖子繢女適安陸王子敬世祖寵子永明三年納妃修外舅姑之敬世祖遣文惠太子相隨往繢家置酒設樂公卿皆冠冕而至當榮之張沖字思約吳郡吳人父柬通直郎沖出繼從伯侍中景胤小名查父邵小名梨宋文帝戲景胤曰查何如梨景胤答曰梨是百果之宗查何敢及沖亦少有至性辟州主簿隨從叔永為將帥除綏遠將軍盱眙太守永征彭城遇寒雪軍人足脛凍斷者十七八沖足指皆墮除尚書駕部郎桂陽王征南中兵振威將軍歷驃騎太尉南中郎參軍不拜遷征西從事中郎通直郎武陵王北中郎直兵參軍長水校尉除寧朔將軍本官如故遷左軍將軍加寧朔將軍輔國將軍沖少從戎事朝廷以幹力相待故歷處軍校之官出為馬頭太守徙盱眙太守輔國將軍如故永明六年遷西陽王冠軍司馬八年為假節監青冀二州刺史事將軍如故沖父初卒遺命曰祭我必以鄉土所産無用牲物沖在鎮四時還吳園中取果菜流涕薦焉仍轉刺史鬱林即位進號冠軍將軍明帝即位以晉壽太守王洪軌範代沖除黃門郎加征虜將軍建武二年虜寇淮泗假沖節都督青冀二州北討諸軍事本官如故虜并兵攻司州詔除青徐右出軍分其兵勢沖遣軍主桑係祖由渣口攻拔虜建陵驛馬厚丘三城多所殺獲又與洪軌範遣軍主崔季延襲虜紀城據之沖又遣軍主杜僧護攻拔虜虎坑馮時即丘三城驅生口輜重還至溘溝虜救兵至緣道要擊僧護力戰大破之其年遷廬陵王北中郎司馬加冠軍將軍未拜豐城公遙昌為豫州上慮寇難未已徙沖為征虜長史南梁郡太守永泰元年除江夏王前軍長史東昏即位出為建安王征虜長史輔國將軍江夏內史行郢州府州事永元元年遷持節督豫州軍事豫州刺史代裴叔業竟不行明年遷督南六允厄青冀五州輔國將軍南六允州刺史持節如故會司州刺史申希祖卒以沖為督司州軍事冠軍將軍司州刺史裴叔業以壽春降虜又遷沖為督南六允厄青冀五州南六允州刺史持節將軍如故並未拜崔慧景事平徵建安王寶夤還都以沖為督郢司二州郢州刺史持節將軍如故一歲之中頻授四州至此受任其冬進征虜將軍封定襄侯食邑千戶梁王義師起東昏遣驍騎將軍薛元嗣制局監暨榮伯領兵及糧運百四十餘船送沖使拒西師元嗣等懲劉山陽之敗疑沖不敢進停住夏口浦聞義師將至元嗣榮伯相率入郢城時竟陵太守房僧寄被代還至郢東昏敕僧寄留守魯山除驍騎將軍僧寄謂沖曰臣雖未荷朝廷深恩實蒙先帝厚澤蔭其樹者不折其枝實欲微立塵效沖深相許諾共結盟誓乃分部拒守遣軍主孫樂祖數千人助僧寄據魯山岸立城壘明年二月梁王出沔口圍魯山城遣軍主曹景宗等過江攻郢城未及盡濟沖遣中兵參軍陳光靜等開門出擊為義師所破光靜戰死沖固守不出景宗於是據石橋浦連軍相續下至加湖東昏遣軍主巴西梓潼二郡太守吳子陽光子李文釗陳虎牙等十三軍援郢至加湖不得進乃築城舉烽城內亦舉火應之而內外各自保不能相救沖病死元嗣榮伯與沖子孜及長史江夏內史程茂固守東昏詔贈沖散騎常侍護軍將軍假元嗣子陽節江水暴長加湖城淹漬義師乘高艦攻之子陽等大敗散魯山城乏糧軍人於磯頭捕細魚供食密治輕船將奔夏口梁王命偏軍斷其取路防備越逸房僧寄病死孫樂祖窘以城降郢城被圍二百餘日士庶病死者七八百家魯山既敗程茂及元嗣等議降使孜為書與梁王沖故吏青州治中房長瑜謂孜曰前使君忠貫昊天操逾松竹郎君但當端坐畫一以荷析薪若天運不與幅巾待命以下從使君今若隨諸人之計非唯郢州士女失高山之望亦恐彼所不取也魯山陷後二日元嗣等以郢城降東昏以程茂為督郢司二州輔國將軍郢州刺史元嗣為督雍梁南北秦四州郢州之竟陵司州之隨郡冠軍將軍雍州刺史並持節時郢魯二城以已降死者相積竟無叛散時以沖及房僧寄比臧洪之被圍也贈僧寄益州刺史時新蔡太守席謙永明中為中書郎王融所薦父恭穆鎮西司馬為魚復侯所害至是謙鎮盆城聞義師東下曰我家世忠貞殞死不二為陳伯之所殺史臣曰石碏棄子弘滅親之戒鮑永晚降知事新之節王奐誠在靡二迹允嚴科張沖未達天心守迷義運致危之理異為亡之事一也贊曰王居北牧子未克家終成干紀覆此胄華張壘窮守死如亂麻為悟既晚辨見方賒除青右疑
