body:
  text: 南齊書卷十六志第八百官建官設職興自炎昊方乎隆周之冊表乎盛漢之書存改回沿備於歷代先賢往學以之雕篆者衆矣若夫胡廣舊儀事惟簡撮應劭官典殆無遺恨王朗奏議屬霸國之初基陳矯增曹由軍事而補闕今則有魏氏官儀魚豢中外官也山濤以意辨人不荀勗欲去事煩唯論并省定制成文本之晉令後代承業案為前准肇域官品區別階資蔚宗選簿梗概欽明階次詳悉虞通劉寅因荀氏之作矯舊增新今古相校齊受宋禪事遵常典既有司存無所偏廢其餘散在史注多已筌拾覽者易知不重述也諸臺府郎令史職吏以下具見長水校尉王圭之職儀國相相國蕭曹以來為人臣極位宋孝建用南譙王義宣至齊不用人以為贈不列官太宰宋大明用江夏王義恭以後無人齊以為贈太傅太師太保太傅周舊官漢末董卓為太師晉惠帝初衛瓘為太保自後無太師而太保為贈齊唯置太傅大司馬大將軍宋元嘉用彭城王義康後無人齊以為贈太尉司徒司空三公舊為通官司徒府領天下州郡名數戶口簿籍雖無常置左右長史左西曹掾屬主簿祭酒令史以下晉世王導為司徒右長史干寶撰立官府職儀已具特進位從公諸開府儀同三司驃騎將軍車騎將軍衛將軍鎮軍將軍中軍將軍撫軍將軍四征將軍東西南北四鎮將軍凡諸將軍加大字位從公開府儀同如公凡公督府置佐長史司馬各一人咨議參軍二人諸曹有録事功曹記室戶曹倉曹中直兵外兵騎兵長流賊曹城局法曹田曹水曹鎧曹集曹右戶十八曹城局曹以上署正參軍法曹以下署行參軍各一人其行參軍無署者為長兼員其府佐史則從事中郎二人倉曹掾戶曹屬東西閣祭酒各一人主簿舍人御屬二人加崇者則左右長史四人中郎掾屬竝增數其未及開府則置府亦有佐史其數有減小府無長流置禁防參軍四安將軍四平將軍左右前後將軍征虜將軍四中郎將晉世荀羡王胡之竝居此官宋齊以來唯處諸王素族無為者冠軍將軍輔國將軍寧朔將軍寧遠將軍龍驤將軍凡諸小號亦有置府者太常府置丞一人五官功曹主簿九府九史皆然領官如左博士謂之太學博士國子祭酒一人博士二人助教十人建元四年有司奏置國學祭酒准諸曹尚書博士准中書郎助教准南臺御史選經學為先若其人難備給事中以還明經者以本位領其下典學二人三品准太常主簿戶曹儀曹各二人五品白簿治禮吏八人六品保學醫二人威儀二人其夏國諱廢學有司奏省助教以下永明三年立學尚書令王儉領祭酒八年國子博士何胤單為祭酒疑所服陸澄等皆不能據遂以玄服臨試月餘日博議定乃服朱衣總明觀祭酒一人右太始六年以國學廢初置總明觀玄儒文史四科科置學士各十人正令史一人書令史二人幹一人門吏一人典觀吏二人建元中掌治五禮永明三年國學建省太廟令一人丞一人明堂令一人丞一人太祝令一人丞一人太史令一人丞一人廩犧令一人丞一人置令丞以下皆有職吏太樂令一人丞一人諸陵令永明末置用二品三品勳置主簿戶曹各一人六品保舉光祿勳府置丞一人領官如左左右光祿大夫位從公開府置佐史如公光祿大夫皆銀章青綬詔加金章紫綬者為金紫光祿大夫樂安任遐為光祿就王晏乞一片金晏乃啓轉為金紫不行太中大夫中散大夫諸大夫官皆處舊齒老年重者加親信二十人衛尉府置丞一人掌宮城管籥張衡西京賦曰衛尉八屯警夜巡晝宮城諸却敵樓上本施鼓持夜者以應更唱太祖以鼓多驚眠改以鐵磬云廷尉府置丞一人正一人監一人評一人律博士一人大司農府置丞一人領官如左太倉令一人丞一人導官令一人丞一人藉田令一人丞一人少府府置丞一人領官如左左右尚方令各一人丞一人鍛署丞一人永明三年省四年復置御府令一人丞一人東冶令一人丞一人南冶令一人丞一人平准令一人丞一人上林令一人丞一人亦屬尚書殿中曹將作大匠太僕大鴻臚三卿不常置將作掌宮廟土木太僕掌郊禮執轡鴻臚掌導護贊拜有事權置兼官畢乃省乘黃令一人掌五輅安車大行凶器轀輬車客館令掌四方賓客宣德衛尉少府太僕鬱林王立文安太后即尊號以宮名置之大長秋鬱林立皇后置録尚書尚書令總領尚書臺二十曹為內臺主行遇諸王以下皆禁駐左右僕射分道無令左僕射為臺主與令同左僕射領殿中主客二曹事諸曹郊廟園陵車駕行幸朝儀臺內非違文官舉補滿疾假事其諸吉慶瑞應衆賀災異賊發衆變臨軒崇拜改號格制蒞官銓選凡諸除署功論封爵貶黜八議疑讞通關案則左僕射主右僕射次經維是黃案左僕射右僕射署朱符見字經都丞竟右僕射橫畫成目左僕射畫令畫右官闕則以次并畫若無左右則直置僕射在其中閒總左右事吏部尚書領吏部刪定三公比部四曹度支尚書領度支金部倉部起部四曹左民尚書領左民駕部二曹都官尚書領都官水部庫部功論四曹五兵尚書領中兵外兵二曹祠部尚書右僕射通職不俱置起部尚書興立宮廟權置事畢省左丞一人掌宗廟郊祠吉慶瑞應災異立作格制諸案彈選用除置吏補滿除遣注職右丞一人掌兵士百工補役死叛考代年老疾病解遣其內外諸庫藏穀帛刑罪創業諍訟田地船乘稟拘兵工死叛考剔討補差分百役兵器諸營署人領州郡租布人民戶移徙州郡縣併帖城邑民戶割屬刺史二千石令長丞尉被收及免贈文武諸犯削官事白案右丞上署左丞次署黃案左丞上署右丞次署諸立格制及詳讞大事宗廟朝廷儀體左丞上署右丞次署自令僕以下五尚書八座二十曹各置郎中令史以下又置都令史分領之僕射掌朝軌尚書掌讞奏都丞任碎在彈違諸曹緣常及外詳讞事應須命議相值者皆郎先立意應奏黃案及關事以立意官為議主凡辭訴有漫命者曹緣咨如舊若命有咨則以立意者為議主武庫令一人屬庫部車將府令一人丞一人屬駕部公車令一人大官令一人丞一人大醫令一人丞一人內外殿中監各一人內外驊騮丞各一人材官將軍一人司馬一人屬起部亦屬領軍侍中祭酒高功者稱之侍中漢世為親近之職魏晉選用稍增華重而大意不異宋文帝元嘉中王華王曇首殷景仁等並為侍中情在親密與帝接膝共語貂拂帝手拔貂置案上語畢復手插之孝武時侍中何偃南郊陪乘鑾輅過白門閫偃將匐帝乃接之曰朕乃陪卿齊世朝會多以美姿容者兼官永元三年東昏南郊不欲親朝士以主璽陪乘前代未嘗有也侍中呼為門下亦置令史領官如左給事黃門侍郎亦管知詔令世呼為小門下散騎常侍通直散騎常侍員外散騎常侍郎舊與侍中通官其通直員外用衰老人士故其官漸替宋大明雖華選比侍中而人情久習終不見重尋復如初散騎侍郎通直散騎侍郎員外散騎侍郎給事中奉朝請駙馬都尉集書省職置正書令史朝散用衣冠之餘人數猥積永明中奉朝請至六百餘人中書監一人令一人侍郎四人通事舍人無員中書省職置主書令史正書以下祕書監一人丞一人郎著作佐郎晉祕書閣有令史掌衆書見晉令令亦置令史正書及弟子皆典教書畫御史中丞一人晉江左中丞司隸分督百僚傅咸所云行馬內外是也今中丞則職無不察專道而行騶輻禁呵加以聲色武將相逢輒致侵犯若有鹵簿至相驅擊宋孝建二年制中丞與尚書令分道雖丞郎下朝相值亦得斷之餘內外衆官皆受停駐治書侍御史二人侍御史十人蘭臺置諸曹內外督令以下謁者僕射一人謁者十人謁者臺掌朝覲賓饗領軍將軍中領軍護軍將軍中護軍凡為中小輕同一官也諸為將軍官皆敬領護諸王為將軍道相逢則領護讓道置長史司馬五官功曹主簿左右二衛將軍驍騎將軍游擊將軍晉世以來謂領護至驍游為六軍二衛置司馬次官功曹主簿以下左右二中郎將前軍將軍後軍將軍左軍將軍右軍將軍號四軍屯騎步兵射聲越騎長水五校尉虎賁中郎將從僕射羽林監積射將軍彊弩將軍殿中將軍員外殿中將軍殿中司馬督武衛將軍武騎常侍自二衛四軍五校已下謂之西省而散騎為東省丹陽尹位次九卿下太子太傅少傅府置丞功曹五官主簿太子詹事府置丞一人以下太子率更令太子家令置丞太子僕太子門大夫太子中庶子太子中舍人太子洗馬太子舍人太子左右衛率各一太子翊軍步兵屯騎三校尉太子旅賁中郎將一人太子左右積弩將軍太子殿中將軍員外殿中將軍太子倉官令太子常從虎賁督右東宮職僚州牧刺史魏晉世州牧隆重刺史任重者為使持節都督輕者為持節督起漢從帝時御史中丞馮赦討九江賊督揚徐二州軍事而何徐宋志云起魏武遣諸州將督軍王圭之職儀云起光武並非也晉太康中都督知軍事刺史治民各用人惠帝末乃并任非要州則單為刺史州朝置別駕治中議曹文學祭酒諸曹部從事史護南蠻校尉府置佐史隸荊州晉宋末省建元元年復置三年省延興元年置建武省護三巴校尉宋置建元二年改為刺史寧蠻校尉府亦置佐史隸雍州平蠻校尉永明三年置隸益州鎮蠻校尉隸寧州護西戎校尉護羌校尉右四校尉亦置四夷平越中郎將府置佐史隸廣州郡太守內史縣令相郡縣為國者為內史相鎮蠻護軍安遠護軍晉世雜號多為郡領之諸王師友文學各一人國官郎中令中尉大農為三卿左右常侍侍郎上軍中軍下軍三軍典書典祠學官典衛四令食官廄牧長謁者以下公侯置郎中令一卿贊曰百司分置惟皇命職雲師鳥紀各有其式
