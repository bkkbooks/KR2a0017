body:
  text: 南齊書卷十七志第九輿服昔三皇乘祇車出谷口夏氏以奚仲為車正殷有瑞車山車垂句是也周禮匠人為輿以象天地漢武天漢四年朝諸侯甘泉宮定輿服制班于天下光武建武十三年得公孫述葆車輿輦始具蔡雍創立此志馬彪勒成漢典晉摯虞治禮亦議五輅制度江左之始車服多闕但有金戎省充庭之儀太興中太子臨學無高蓋車元帝詔乘安車元明時屬車唯九乘永和中石虎死後舊工人奔叛歸國稍造車輿太元中苻堅敗後又得偽車輦於是屬車增為十二乘義熙中宋武平關洛得姚興偽車輦宋大明改修輦輅妙盡時華始備偽氐復設充庭之制永明中更增藻飾盛於前矣案周禮以檢漢志名器不同晉宋改革稍與世異今記時事而已玉輅漢金根也漆畫輪金塗縱容後路受福輠兩廂上望板前優遊通緣金塗鏤鍱碧絞罽鑿鏤金薄帖兩廂外織成衣兩廂𩹉上施金塗鏤面釘瑁帖望板廂上金薄帖金博山登仙紐松精優遊上和鸞鳥立花扶趺銜鈴銀帶瑁筒瓦金塗鏤鍱刀格織成手匡金花鈿錦衣優遊下隱膝𩹉施金塗鏤面釘織成衣優遊橫前施瑁帖金塗花釘優遊前金塗倒龍後梢鑿銀瑁龜甲金塗花沓望板金塗受福望龍諸校飾抗及諸末皆螭龍首龍汗板在車前銀帶花獸金塗受福緣𩹉邊鏤鍱瑁織成衣𩹉金塗鏤面花釘外金塗博山辟邪虎鳳皇銜花諸校飾斗蓋金塗鏤鍱二十八爪支子花黃錦斗衣復碧絹柒布緣油頂絳系終絡織成顏芼芚赭舌孔雀毛復錦緑絞隨陰懸珠蚌佩金塗鈴雲朱結仙人綬雜色真孔雀毦一轅漆畫車衡銀花帶衡上金塗博山四和鸞鳥立花扶趺銜鈴所謂鸞鳥立衡也又龍首銜軛叉髦插翟尾上下花沓絳緑系的望繩八枚旆旗十二旒畫升龍竿首金塗龍銜火焰幡真毦棨織成衣金塗沓駐及受福金塗鴈鏤鍱漆案立牀在車中錦復黃絞為案立衣錦復黃絞鄣泥八幅長九尺緣紅錦芼芚帶織成花芼芚的五輅江左相承駕四馬左右騑為六施絳系遊御繩其重轂二轄飛絡軨幡用赤油令有紫真毦左纛置左騑馬軛上金鍐金加冠狀如玉華汗形在馬鍐上方釳鐵廣數寸有三孔插翟尾其中繁纓金塗紫皮紫真毦橫在馬膺前鏤鍚刻金為馬面當顱皆如古制世祖永明初加玉輅為重蓋又作麒麟頭采畫以馬首戴之竟陵王子良啓曰臣聞車旗有章載自前史器必依禮服無舛法凡蓋員象天軫方法地上無二天之儀下設兩蓋之飾求之志録恐為乖衷又假為麟首加乎馬頭事不師古鮮或可施建武中明帝乃省重蓋等金輅制度校飾如玉輅而稍減少亦以金塗象輅如金輅而制飾又減木輅制飾如象輅而尤減革輅如大輅建大麾赤旗也首施火焰幡宋升明三年錫齊王木輅戎輅各一乘黃五輅無大輅戎輅左丞王逡之議大輅殷之祭車故不登周輅之名而明堂位云大輅殷輅也注云大輅木輅也月令中央土乘大輅注云殷輅也禮器大輅繁纓一就注云大輅殷之祭天車也周禮五路玉路金路象路革路木路則周之木輅殷之大路也周革路建大白以即戎此則戎路也意謂國之大事在祀與戎故錫以殷祭天之車與周之即戎之路祀則以殷戎必以周者明郊天義遠建前代之禮即戎事近故以今世之制明堂位云魯君孟春乘大路載十有二旒日月之章祀帝于帝郊夫必以大輅以錫諸侯良有以也今木路即大路也太尉左長史王儉議宜用金輅九旒時乘黃無副借用五輅大朝臨軒權列三輅玉金輅建碧旗象木輅建赤旗永明初太子步兵校尉伏曼容議以為齊德尚青五路五牛及五色幡旗並宜以先青為次軍容戎事之所乘犧牲繭握之所薦並宜悉依尚色三代服色以姓音為尚漢不識音故還尚其行運之色今既無善律則大齊所尚亦宜依漢道若有善吹律者便應還取姓尚太子僕周顒議三代姓音古無前記裁音配尚起自曼容則是曼容善識姓聲不復方假吹律何故能識遠代之宮商而更迷皇朝之律呂而云當今無知吹律以定所尚宜附漢以從闕邪皇朝本以行運為所尚非關不定於音氏如此設有善律之知音不宜遵聲以為尚散騎常侍劉朗之等十五人並議駮之事不行皇太子象輅校飾如御旗九旒降龍皇太后皇后重翟車金塗校具白地人馬錦帖廂隱膝後戶白牙的帖金塗面釘漆畫輪鐵鐺金塗縱容後路輠師子轄抗簷皆施金塗螭頭及神龍雀等諸飾軛衡上施金博山又有金塗長角巴首蓋金塗爪支子花二十八青油俠碧絹黃絞蓋漆布𩹉紫顏芼芚黃絞紫絞隨陰碧毛芚外上施絳紫系絡碧旗九旒棨戟宋元嘉東宮儀記云中宮僕御重翟金根車未詳得稱為金根也皇太子妃厭翟車如重翟飾微減指南車四周廂上施屋指南人衣裙襦天衣在廂中上四角皆施龍子干竿縣雜色真孔雀毦烏布皂復幔漆畫輪駕牛皆銅校飾記里鼓車制如指南上施華蓋子衣漆畫鼓機皆在內輦車如犢車竹蓬廂外鑿鏤金薄碧紗衣織成芼芚錦衣廂𩹉及仰項頂隱膝後戶金塗鏤面釘瑁帖金塗松精登仙花紐緑四緣四望紗萌子上下前後眉鏤鍱轅枕長角龍白牙蘭瑁金塗校飾漆鄣塵板在蘭前金銀花獸玃天龍師子鏤面榆花細鈿指子摩尼炎金龍虎扶轅銀口帶龍板頭龍轅軛上金鳳皇鈴璅録銀口帶星後梢瑁帖金塗香沓銀星花獸慢幔竿杖金塗龍牽縱橫長石背花香柒床副自輦以下二官宮御車皆緑油幢絳系絡御所乘雙棟其公主則碧油幢云司馬法曰夏后氏輦曰金車殷曰胡奴車周曰轖輜車皆輦也漢書叔孫通傳云皇帝輦出房成帝輦過後宮此朝宴並用也輿服志云輦車具金銀丹青采雘雕畫蒲陶之文乘人以行信陽侯陰就見井丹左右人進輦是為臣下亦得乘之晉武帝給安平獻王孚雲母輦晉中朝又有香衣輦江左唯御所乘臥輦校飾如坐輦不甚服用漆畫輪車金塗校飾如輦微有減降金塗鐺縱容後輠師子副也御為羣公舉哀臨哭所乘皇后太子妃亦乘之漆畫牽車小形如輿車金塗縱容後路師子輠鐵鐺錦衣廂𩹉隱膝後戶牙蘭轅枕梢幰竿戍棟梁皆金塗校飾御及皇太子所乘即古之羊車也晉泰始中中護軍羊琇乘羊車為司隸校尉劉毅所奏武帝詔曰羊車雖無制非素者所服免官衛玠傳云總角乘羊車市人聚觀今不駕羊猶呼牽此車者為羊車云輿車形如軺車柒畫金校飾錦衣兩廂後戶隱膝牙蘭皆瑁帖刀格鏤面花釘幰竿成校棟梁下施八棡金塗沓兆床副人舉之一曰小輿小行幸乘之皇太子亦得於宮內乘之衣畫書十二乘楤榆轂輪箕子壁緑油衣廂外緑紗萌油幢絡通幰竿刺代棟梁柮檽真形龍牽支子花轅後伏神抗承泥沓金塗校具古副車之象也今亦曰五時副車青萌車是謂幔車油絡畫安車公主王妃三公特進夫人所乘漢制皇后貴人紫罽軿車晉皇后乘雲母油畫安車駕六以兩轅安車駕五為副公主畫安車駕六以兩轅安車駕三為副公主畫安車駕三三夫人青交絡安車駕三皆以紫絳罽軿車駕三為副九嬪世婦軿車駕二王公妃特進夫人皂交絡為副漢賤軺車而貴軿車晉賤輜軿而貴軺車皆行禮所乘黃屋車建碧旗九旒九旒鸞輅也漢輿服志云金根車蓋黃繒為𩹉謂之黃屋今金玉輅皆以黃地錦唯此車以黃繒皆金塗校具黃隱隨陰青毛羽二十八爪支子花絳系絡九命上公所乘青蓋安車朱轓漆班輪駕一左右騑通幰車為副諸王禮行所乘凡車有轓者謂之軒皂蓋安車朱轓漆班輪駕一通幰牛車為副三公禮行所乘安車黑耳皂蓋馬車朱轓駕一牛車為副國公列侯禮行所乘馬車駕一九卿領護二衛驍遊四軍五校從郊陵所乘晉制三公下至九卿又各安車黑耳一乘公駕三特進駕二卿駕一復各軺車施黑耳後戶皂輪一乘油絡軺車尚書令僕射中書監令尚書侍中常侍中黃門中書散騎侍郎皆駕一牛朝直所乘晉制尚書令施黑耳後戶皂輪僕射中書監令直施後戶皂輪尚書無後戶皆漆輪轂今猶然安車赤屏駕一又軺車施後戶為副太子二傅禮行所乘四望車通幰油幢絡班柒輪轂亦曰皂輪以加禮貴臣晉武詔給魏舒陽燧四望小車三望車制度如四望或謂之夾望亦以加禮貴臣次四望油幢絡車制似三望而減王公加禮者之為常乘次三望平乘車竹箕子壁仰楤榆為輪通幰竿刺代棟梁柮檽真形龍牽金塗支子花紐轅頭後梢沓伏神承泥庶人亦然但不通幰三公諸王所乘自四望至平乘皆銅校飾轀輬車四輪飾如金根四角龍首施組銜璧垂五采析羽葆流蘇前後雲氣錯畫帷裳以素為池而黼黻駕四白駱馬太僕執轡貴臣薨亦如之羽飾駕御微有減降虞書曰豫欲觀古人之象日月星辰山龍華蟲作繢宗彝藻火粉米黼黻絺繡以五采章施于五色天子服備日月以下公山龍以下侯伯華蟲以下子男藻火以下卿大夫粉米以下天子六冕王后六服著在周官公侯以下咸有名則佩玉組綬並具禮文後代沿革見漢志晉服制令其冠十三品見蔡雍獨斷並不復具詳宋明帝泰始四年更制五輅議修五冕朝會饗獵各有所服事見宋注舊相承三公以下冕七旒青玉珠卿大夫以下五旒黑玉珠永明六年太常丞何諲之議案周禮命數改三公八旒卿六旒尚書令王儉議依漢三公服山龍九章卿華蟲七章從之平冕黑介幘今謂平天冠皂表朱緣𩹉廣七尺長尺二寸垂珠十二旒以朱組為纓如其綬色衣皂上絳下裳前三幅後四幅衣畫而裳繡為日月星辰山龍華蟲藻火粉米黼黻十二章素帶廣四寸朱𩹉以朱緑裨飾其側要中以朱垂以緑垂三尺中衣以絳緣其領袖赤皮韍絳袴襪赤舄郊廟臨朝所服也漢世冕用白玉珠為旒魏明帝好婦人飾改以珊瑚珠晉初仍舊後乃改江左以美玉難得遂用琫珠世謂之白琁珠衮衣漢世出陳留襄邑所織宋末用繡及織成建武中明帝以織成重乃采畫為之加飾金銀薄世亦謂為天衣史臣曰黼黻之設經緯為用故五色六章十二衣還相為質也歷代龍衮織以成文今體不勝衣變易舊法豈致美黻冕之謂乎通天冠黑介幘金博山顏絳紗袍皂緣中衣乘輿常朝所服舊用駮犀簪導東昏改用玉其朝服臣下皆同黑介幘單衣無定色乘輿拜陵所服其白帢單衣謂之素服以舉哀臨喪遠遊冠太子諸王所冠太子朱纓翠羽緌珠節諸王玄纓公侯皆同平冕各以組為纓王公八旒衣山龍九章卿七旒衣華蟲七章並助祭所服皆畫皂絳繒為之進賢冠諸開國公侯鄉亭侯卿大夫尚書關內侯二千石博士中書郎丞郎祕書監丞郎太子中舍人洗馬舍人諸府長史卿尹丞下至六百石令長小吏以三梁二梁一梁為差事見晉令武冠侍臣加貂蟬餘軍校武職黃門散騎太子中庶子二率朝散都尉皆冠之唯武騎虎賁服文衣插雉尾於武冠上史臣曰應劭漢官釋附蟬及司馬彪志並不見侍中與常侍有異唯言左右珥貂而已案項氏説云漢侍中蟬刻為蟬像常侍但為璫而不蟬未詳何代所改也法冠廷尉等諸執法者冠之高山冠謁者冠之樊噲冠殿門衛士冠之黑介幘冠文冠平幘冠武冠尚書令僕射尚書納言幘後飾為異童子空頂幘施假髻貴賤同服救日蝕文武官皆免冠著赤介幘對朝服赤幘示威武也袴褶車駕親戎中外纂嚴所服黑冠帽綴紫褾以絡帶代鞶帶中官紫褾外官絳褾其纂嚴戎服不綴褾行留悉同校獵巡幸從官戎服革帶鞶帶文官不纓武官脫冠袿王老大衣謂之褘衣皇后謁廟所服公主會見大首髻其燕服則施嚴雜寶為佩瑞袿王老用繡為衣裳加五色宀元攴金銀校飾綬乘輿黃赤綬黃赤縹緑紺五采太子朱綬諸王纁朱綬皆赤黃縹紺四采妃亦同相國緑綟綬三采緑紫紺郡公玄朱侯伯青朱子男素朱皆三采公世子紫侯世子青鄉亭關內侯墨綬皆二采郡國太守內史青尚書令僕中書監令祕書監皆黑丞皆黃諸府丞亦黃皇后與乘輿同赤貴嬪夫人貴人紫王太妃長公主封君亦紫綬六宮青綬青白紅郡公侯夫人青綬乘輿傳國璽秦璽也晉中原亂沒胡江左初無之北方人呼晉家為白板天子冉閔敗璽還南別有行信等六璽皆金為之亦秦漢之制也皇后金璽太子諸王金璽皆龜鈕公侯五等金章公世子金印侯銀印貴嬪夫人金章公主王太妃封君金印六宮以下公侯太夫人夫人銀印其公將軍金章光祿大夫卿尹太子傅諸領護將軍中郎將校書尉郡國太守內史四品五品將軍皆銀章尚書令僕中書監令祕書監丞太子二率諸府長史卿尹丞尉中丞都水使者諸州刺史皆銅印三臺五省二品文官皆簪白筆王公五等及武官不簪加內侍乃簪百官執手板尚書令僕尚書手板頭復有白筆以紫皮裹之名曰笏漢末仲長統謂百司皆宜執之其肩上紫夾囊名曰契囊世呼為紫荷佩玉自乘輿以下與晉宋制同建元四年制王公侯卿尹珠水精其餘用牙太官宰人服離支衣後定贊曰文物煌煌儀品穆穆分別禮數莫過輿服漆畫牽車注戍棟梁一本戍作戈輿車注成校棟梁一本成校作戈杖衣書車注刺代棟梁平乘車注刺代棟梁並疑
