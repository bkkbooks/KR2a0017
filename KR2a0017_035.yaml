body:
  text: 南齊書卷三十五列傳第十六高祖十二王高帝十九男昭皇后生武帝豫章文獻王嶷謝貴嬪生臨川獻王映長沙威王晃羅太妃生武陵昭王虫念任太妃生安成恭王暠陸脩儀生鄱陽王鏘晉熙王銶袁脩容生桂陽王鑠何太妃生始興簡王鑑宜都王鏗區貴人生衡陽王鈞張淑妃生江夏王鋒河東王鉉李美人生南平王銳第九第十三第十四第十七皇子早亡衡陽王鈞出繼元王後臨川獻王映字宣光太祖第三子也宋元徽四年解褐著作佐郎遷撫軍行參軍南陽王文學沈攸之事難太祖時領南徐州以映為寧朔將軍鎮京口事寧除中軍諮議從事中郎輔國將軍淮南宣城二郡太守並不拜仍為假節都督南六允阨青冀五州諸軍事行南六允州刺史將軍如故尋除給事黃門侍郎領前軍將軍仍復為冠軍將軍南六允州刺史假節都督復為監軍督五州如故齊臺建宋帝詔封映及弟晃虫念暠鏘鑠鑑並為開國縣公各千五百戶未及定土宇而太祖踐阼以映為使持節都督荊湘雍益梁寧南北秦八州諸軍事平西將軍荊州刺史封臨川王食邑例二千戶又領湘州刺史豫章王嶷既留鎮陝西映亦不行改授散騎常侍都督揚南徐二州諸軍事前將軍揚州刺史持節如故國家初創映以年少臨神州吏治聰敏府州曹局皆重足以奉禁令自宋彭城王義康以後未之有也出為都督荊湘雍益梁巴寧南北秦九州諸軍事鎮西將軍荊州刺史持節常侍如故給鼓吹一部以國憂解散騎常侍進號征西永興明元年入為侍中驃騎將軍二年給油絡車五年即本號開府儀同三司七年薨映善騎射解聲律工左右書左右射應接賓客風韻韶美朝野莫不惋惜焉時年三十二詔賜東園祕器朝服一具衣一襲贈司空九子皆封侯長子子晉歷東陽吳興二郡太守祕書監領後軍將軍永元初為侍中遷左民尚書坐從妹祖日不拜為有司所奏事留中子晉遂不復拜梁王定京邑猶服侍中服入梁為輔國將軍高平太守第二子子游州陵侯解褐員外郎太子洗馬歷琅邪晉陵二郡太守黃門侍郎好音樂解絲竹雜藝梁初坐閨門淫穢及殺人為有司所奏請議禁錮子晉謀反兄弟並伏誅長沙威王晃字宣明太祖第四子也少有武力為太祖所愛宋世解褐祕書郎邵陵王友不拜昇明二年代兄映為寧朔將軍淮南宣城二郡太守初沈攸之事起晃便弓馬多從武容燻赫都街時人為之語曰煥煥蕭四繖其年遷為持節監豫司二州郢州之西陽諸軍事西中郎將豫州刺史太祖踐祚晃欲用政事輒為典籤所裁晃執殺之上大怒手詔賜杖尋遷使持節都督南徐六允二州諸軍事後將軍南徐州刺史世祖為皇太子拜武進陵於曲阿後湖鬬隊使晃御馬軍上聞之又不悅入為侍中護軍將軍以國憂解侍中加中軍將軍太祖臨崩以晃屬世祖處以輦轂近蕃勿令遠出永明元年上遷南徐州刺史竟陵王子良為南六允州以晃為使持節都督南徐六允二州諸軍事鎮軍將軍南徐州刺史入為散騎常侍中書監諸王在京都唯置捉刀左右四十人晃愛武飾罷徐州還私載數百人仗還都為禁司所覺投之江水世祖禁諸王畜私仗聞之大怒將糾以法豫章王嶷於御前稽首流涕曰晃罪誠不足宥陛下當憶先朝念白象白象晃小字也上亦垂泣太祖大漸時誡世祖曰宋氏若不骨肉相圖他族豈得乘其衰弊汝深戒之故世祖終無異意然晃亦不見親寵當時論者以世祖優於魏文減於漢明尋加晃鎮軍將軍轉丹陽尹常侍將軍如故又為侍中護軍將軍鎮軍如故尋進號車騎將軍侍中如故給油絡車鼓吹一部八年薨年三十一賜東園祕器朝服一具衣一襲即本號贈開府儀同三司世祖嘗幸鍾山晃從駕以馬矟刺道邊枯蘗上令左右數人引之銀纏皆卷聚而矟不出乃令晃復馳馬拔之應手便去每遠州獻駿馬上輒令晃於華林中調試之太祖常曰此我家任城也世祖緣此意故諡曰威武陵昭王虫念字宣照太祖第五子也母羅氏從太祖在淮陰以罪誅虫念年四歲思慕不異成人故虫念見愛初除冠軍將軍轉征虜將軍虫念剛穎儁出工弈與諸王共作短句詩學謝靈運體以呈上報曰見汝二十字諸兒作中最為優者但康樂放蕩作體不辨有首尾安仁士衡深可宗尚顏延之抑其次也建元三年出為持節都督會稽東陽新安永嘉臨海五郡軍事會稽太守將軍如故上遣儒士劉瓛往郡為虫念講五經世祖即位進號左將軍入為中書令將軍如故轉散騎常侍太常卿又為中書令遷祠部尚書常侍並如故虫念無寵於世祖未嘗處方嶽數以語言忤旨世祖幸豫章王嶷東田宴諸王獨不召虫念嶷曰風景殊美令今日甚憶武陵上乃呼之虫念善射屢發命中顧謂四坐曰手何如上神色甚怪嶷曰阿五常日不爾今可謂仰藉天威帝意乃釋後於華林賭射上敕虫念疊破凡放六箭五破一皮賜錢五萬又於御席上舉酒勸虫念虫念曰陛下嘗不以此處許臣上回面不答久之出為江州刺史常侍如故上以虫念方出外鎮求虫念宅給諸皇子虫念曰先帝賜臣此宅使臣歌哭有所陛下欲以州易宅臣請不以宅易州至鎮百餘日典籤趙渥之啟虫念得失於是徵還為左民尚書俄轉前將軍太常卿累不得志冬節問訊諸王皆出虫念獨後來上已還便殿聞虫念至引見問之虫念稱牛羸不能取路上敕車府給副御牛一頭敕主客自今諸王來不隨例者不得復為通以公事還過竟陵王子良宅冬月道逢乞人脫襦與之子良見虫念衣單薦襦於虫念虫念曰我與向人亦復何異尚書令王儉詣虫念虫念留儉設食柈中菘菜魚而已又名後堂山為首陽蓋怨貧薄也尋為丹陽尹常侍將軍如故始不復置行事得自親政轉侍中護軍將軍給油絡車又給扶二人世祖臨崩遺詔為衞將軍開府儀同三司給鼓吹一部大行在殯竟陵王子良在殿內太孫未立衆論喧疑虫念衆中言曰若立長則應在我立嫡則應在太孫鬱林既立甚見憑賴隆昌元年年二十八薨賜東園祕器朝服贈司空侍中如故給節班劒二十人安成恭王暠字宣曜太祖第六子也建元二年除冠軍將軍鎮石頭戍領軍事四年出為使持節督江州豫州之晉熙諸軍事南中郎將江州刺史永明元年進號征虜將軍明年為左衞將軍尋遷侍中領步兵校尉轉中書令五年遷祠部尚書領驍騎將軍六年出為南徐州刺史九年遷散騎常侍祕書監領石頭戍事暠性清和多疾其夏薨年二十四贈撫軍將軍常侍如故鄱陽王鏘字宣韶太祖第七子也建元四年世祖即位以鏘為使持節督雍梁南北秦四州郢州之竟陵司州之隨郡軍事北中郎將寧蠻校尉雍州刺史永明二年進號征虜將軍四年為左衞將軍遷侍中領步兵校尉七年轉征虜將軍丹陽尹尋加散騎常侍進號撫軍出為江州刺史常侍如故九年始親府州事加使持節督江州諸軍事安南將軍置佐史常侍如故先是二年省江州府至是乃復十一年為領軍常侍如故鏘和悌美令有寵於世祖領軍之授齊室諸王所未為鏘在官理事無壅當時稱之車駕遊幸常甲仗衞從恩待次豫章王嶷其年給油絡車隆昌元年轉尚書右僕射常侍如故俄遷侍中驃騎將軍開府儀同三司領兵置佐鏘雍容得物情為鬱林王所依信鬱林心疑高宗諸王問訊獨留鏘謂之曰公聞鸞於法身何如鏘曰臣鸞於宗戚最長且受寄先帝臣等年皆尚少朝廷之幹唯鸞一人願陛下無以為慮鬱林退謂徐龍駒曰我欲與公共計取鸞公既不同我不能獨辦且復小聽及鬱林廢鏘竟不知延興元年進位司徒侍中驃騎如故高宗鎮東府權勢稍異鏘每往高宗常屣履至車迎鏘語及家國言淚俱下鏘以此推信之而宮臺內皆屬意於鏘勸鏘入宮發兵輔政制局監謝粲說鏘及隨王子隆曰殿下但乘油壁車入宮出天子置朝堂二王夾輔號令粲等閉城門上仗誰敢不同東城人政共縛送蕭令耳子隆欲定計鏘以上臺兵力既悉度東府且慮事難捷意甚猶豫馬隊主劉巨世祖時舊人詣鏘請閒叩頭勸鏘立事鏘命駕將入復回還內與母陸太妃別日暮不成行數日高宗遣二千人圍鏘宅害鏘謝粲等皆見殺鏘時年二十六凡諸王被害皆以夜遣兵圍宅或斧關排牆叫噪而入家財皆見封籍焉桂陽王鑠字宣朗太祖第八子也永明二年出為南徐州刺史鎮京口歷代鎮府鑠出蕃始省軍府四年加散騎常侍六年遷中書令度支尚書七年轉中書令加散騎常侍時鄱陽王鏘好文章鑠好名理時人稱為鄱桂十年遷太常常侍如故鑠清羸有冷疾常枕臥世祖臨視賜床帳衾褥隆昌元年加前將軍給油絡車並給扶侍二人海陵立轉侍中撫軍將軍領兵置佐鄱陽王見害鑠遷中軍將軍開府儀同三司鑠不自安至東府詣高宗還謂左右曰向錄公見接慇懃流連不能已而貌有慙色此必欲殺我三更中兵至見害時年二十五始興簡王鑑字宣徹太祖第十子也初封廣興王後國隨郡改名永明二年世祖始以鑑為持節都督益寧二州軍事前將軍益州刺史廣漢什邡民段祖以錞于獻鑑古禮器也高三尺六寸六分圍二尺四寸圓如筩銅色黑如漆甚薄上有銅馬以繩縣馬令去地尺餘灌之以水又以器盛水於下以芒莖當心跪注錞于以手振芒則其聲如雷清響良久乃絕古所以節樂也五年鑑獻龍角一枚長九尺三寸色紅有文八年進號安西將軍明年為散騎常侍祕書監領石頭戍事上以與鑑久別車駕幸石頭宴會賞賜尋遷左衞將軍未拜遇疾上為南康王子琳起青陽巷第新成車駕與後宮幸第樂飲其日鑑疾甚上遣騎問疾相繼為之詔止樂薨年二十一遣贈中軍將軍本官新除悉如故江夏王鋒字宣穎太祖第十二子永明五年為輔國將軍南彭城平昌二郡太守轉散騎常侍七年遷左衞將軍仍轉侍中領石頭戍事九年出為徐州刺史鬱林即位加散騎常侍隆昌元年入為侍中領驍騎將軍尋加祕書監鋒好琴書有武力高宗殺諸王鋒遺書誚責左右不為通高宗深憚之不敢於第收鋒使兼祠官於太廟夜遣兵廟中收之鋒出登車兵人欲上車防勒鋒以手擊却數人皆應時倒地於是敢近者遂逼害之時年二十南平王銳字宣毅太祖第十五子也永明七年為散騎常侍尋領驍騎將軍明年為左民尚書朝直勤謹未嘗屬疾上嘉之十年出為持節都督湘州諸軍事南中郎將湘州刺史以此賞銳鬱林即位進號前將軍延興元年害諸王遣裴叔業平尋陽仍進湘州銳防閤周伯玉勸銳拒叔業而府州力弱不敢動銳見害年十九伯玉下獄誅宜都王鏗字宣嚴太祖第十六子也初除遊擊將軍永明十年遷左民尚書十一年為持節都督南豫司二州軍事冠軍將軍南豫州刺史鎮姑熟時有盜發晉大司馬桓溫女得金蠶銀繭及珪璧等物鏗使長史蔡約自往修復纖毫不犯鬱林即位進號征虜將軍延興元年見年十八晉熙王銶字宣攸太祖第十八子也永明十一年除驍騎將軍隆昌元年出為持節督郢司二州軍事冠軍將軍郢州刺史延興元年進號征虜將軍尋見害年十六河東王鉉字宣胤太祖第十九子也隆昌元年為驍騎將軍出為徐州刺史遷中書令高宗誅諸王以鉉年少才弱故未加害建武元年轉為散騎常侍鎮軍將軍置兵佐建武之世高武子孫憂危鉉每朝見常鞠躬俯僂不敢平行直視尋遷侍中衞將軍鉉年稍長四年誅王晏以謀立鉉為名免鉉官以王還第禁不得與外人交通永泰元年上疾暴甚遂害鉉時年十九二子在孩抱亦見殺太祖諸王鉉獨無後衆竊寃之乃使揚州刺史始安王遙光臨川王子晉竟陵王昭冑太尉陳顯達尚書令徐孝嗣右僕射沈文季尚書沈淵沈約王亮奏論鉉帝答不許再奏乃從之史臣曰陳思王表云權之所存雖疎必重勢之所去雖親必輕若夫六代之興亡曹冏論之當矣分珪命社實寄宗城就國之典既隨世革卿士入朝作貴蕃輔皇王託體同禀尊極仕無常資秩有恆數禮地兼隆易生推擬猜疑世祖顧命情深尊嫡淵圖遠算意在無遺豈不以羣王少弱未更多難高宗清謹同起布衣故韜末命於近親寄重權於疎戚子弟布列外有強大之勢疎親中立可息覬覦之謀表𩹉相維足固家國曾不慮機能運衡寡以制衆宗族殲滅一至於斯曹植之言信之矣贊曰高十二王始建封植獻昭機警威江才力恭簡恬和鄱桂清識四王少盛同規謹敕
