  - {type: variant, offset: 5131, length: 0, content: '', WYG: 南齊書卷十八南齊書卷十八考證祥瑞志黄門郎蘇偘撰聖皇瑞應記臣承蒼按蘇偘事齊太祖最久嘗撰蕭太尉記侈陳征伐之功及太祖即位又撰瑞應記一卷上之此特一時獻䛕之書而蕭子顯因之遂創立祥瑞一志殊屬不經史筆至此鄙穢甚矣此齊者黄公之化氣也諸本同臣承蒼按南史齊髙帝紀黄下有石字李斯刻秦望之封也南史齊髙帝紀封作風南齊書卷十八考證}
