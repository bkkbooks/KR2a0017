body:
  text: 南齊書卷六梁蕭子顯撰夲紀第六眀帝髙宗眀皇帝諱鸞字景栖始安貞王道生子也小諱𤣥度少孤太祖撫育㤙過諸子宋泰豫元年為安吉令有嚴能之名補武陵王左常侍不拜元徽二年為永世令昇眀二年為邵陵王安南記室參軍未拜仍遷寧朔将軍淮南宣城二郡太守尋進號輔國将軍太祖踐阼遷侍中封西昌侯邑千戸建元二年為持節督郢州司州之義陽諸軍事冠軍将軍郢州刺史進號征虜将軍世祖即位轉度支尚書領右軍将軍永眀元年遷侍中領驍騎将軍王子侯舊乗纒帷車髙宗獨乗下帷儀従如素士公事混撓販食人擔火誤燒牛鼻豫章王白世祖世祖笑焉轉為散騎常侍左衛将軍清道而行上甚恱二年出為征虜将軍呉興太守四年遷中領軍常侍竝如故五年為持節監豫州郢州之西陽司州之汝南二郡軍事右将軍豫州刺史七年為尚書右僕射八年加領衛尉十年轉左僕射十二年領右衛将軍世祖遺詔為侍中尚書令尋加鎮軍将軍給班劍二十人隆昌元年即本號為大将軍給鼓吹一部親兵五百人尋又加中書監開府儀同三司鬱林王廢海陵王立為使持節都督揚南徐二州軍事驃騎大将軍録尚書事揚州刺史開府如故増班劍為三十人封宣城郡公二千戸鎮東府城給兵五千人錢二百萬布千匹九江作難假黄鉞事寧表送之尋加黄鉞都督中外諸軍事太傅領大将軍揚州牧増班劍為四十人給幢絡三望車前後部羽葆鼔吹劍履上殿入朝不趨賛拜不名置左右長史司馬従事中郎掾属各四人封宣城王邑五千戸持節侍中中書監録尚書竝如故未拜太后令廢海陵王以上入纂太祖為第三子羣臣三請乃受命建武元年冬十月癸亥即皇帝位詔曰皇齊受終建極握鏡臨宸神武重輝欽眀懿鑠七百攸長盤石斯固而王度中蹇天階荐阻嗣命多違蕃舋孔棘宏圖景厯将墜諸淵宣徳皇后逺鑒崇替憲章舊典疇咨台揆允定靈䇿用集寳命扵予一人猥以虚薄纉承大業仰繋鴻丕顧臨兆民永懐先構若履春氷寅憂夕惕罔識攸濟思與萬國播此惟新大赦天下改元宿衛身普轉一階其餘文武賜位二等逋租宿責換負官物在建武元年以前悉原除刼賊餘口在臺府者可悉原放負舋流徙竝還夲鄉太尉王敬則為大司馬司空陳顯達為太尉尚書令王晏加驃騎大将軍中領軍蕭諶為領軍将軍南徐州刺史皇子寳義為揚州刺史中䕶軍王𤣥邈為南兖州刺史新除右将軍張􅅛為右光禄大夫平北将軍王廣之為江州刺史乙丑詔斷逺近上禮丁夘詔自今彫文篆刻嵗時光新可悉停省蕃牧守宰㦯有薦獻事非任土嚴加禁斷追贈安陸昭侯緬為安陸王己巳以安陸侯子寳晊為湘州刺史詔曰頃守職之吏多違舊典存私害公實興民蠧今商旅稅石頭後渚及夫鹵借倩一皆停息所在凡厥公宜可即符斷主曺詳為其制憲司眀加聴察十一月癸酉以西中郎長史始安王遥光為揚州刺史晉夀太守王洪範為青冀二州刺史尚書令王晏領太子少傅甲戌大司馬尋陽公王敬則等十三人進爵邑各有差詔省新林苑先是民地悉以還主原責本直庚辰立皇子寳義為晉安王寳𤣥為江夏王寳源為廬陵王寳寅為建安王寳融為随郡王寳攸為南平王甲申詔曰邑宰禄薄俸微不足代耕雖任土恒貢亦為勞費自今悉斷又詔宣城國五品以上悉與滿叙自此以下皆聽解遣其欲仕適所樂乙酉追尊始安貞王為景皇妃為懿后丙戌以輔國将軍聞喜公遥欣為荆州刺史寧朔将軍豐城公遥昌為豫州刺史丁亥詔細作中署材官車府凡諸工可悉開番假逓令休息戊子立皇太子寳卷賜天下為父後者爵一級孝子順孫義夫節婦普加甄賜眀揚表其衡閭賚以束帛己丑詔東宫肇建逺近或有慶禮可悉斷之壬辰以新除征虜将軍江夏王寳𤣥為郢州刺史永眀中御史中丞沈淵表百官年登七十皆令致仕竝窮困私門庚子詔曰日者百司耆齒許以自陳東西二省猶沾微俸辭事私庭榮禄兼謝興言愛老實有矜懐自縉紳年及可一遵永眀七年以前銓叙之科上輔政所誅諸王是月復屬籍各封子為侯十二月壬子詔曰上覽易遺下情難達是以甘棠見羙肺石流詠自月一視黄辭如有含枉不申懐直未舉者莅民之司竝任厥失二年春正月辛未詔京師繋囚殊死可降為五嵗刑三署見徒五嵗以下悉原赦王公以下各舉所知随王公卿士内外羣僚各舉朕違肆心極諌索虜冦司豫徐梁四州壬申遣鎮南将軍王廣之督司州征討右衛将軍蕭坦之督徐州征討尚書右僕射沈文季督豫州征討己夘詔京師二縣有毁彂墳壠随宜修理又詔曰食惟民天義髙姬載􅅙實生本教重軒經前哲盛範後王茂則布令審端咸必由之朕肅扆巖廊思引風訓深務八政永鑒在勤静言日昃無忘寢興守宰親民之主牧伯調俗之司宜嚴課農桑罔令㳺惰揆景肆力必窮地利固修堤防考校殿最若耕蠺殊衆具以名聞㳺怠害業即便列奏主者詳為條格乙未虜攻鍾離徐州刺史蕭恵休破之丙申加太尉陳顯達使持節都督西北征討諸軍事丁酉内外纂嚴三月戊申詔南徐州僑舊民丁多充戎旅蠲今年三課己未司州刺史蕭誕與衆軍撃虜破之詔雍豫司南兖徐五州遇冦之家悉停今年稅調其與虜交通不問往罪丙寅停青州麥租虜自夀春退走甲申解嚴夏四月己亥朔三百里内獄訟同集京師克日聽覽此以外委州郡訊察三署徒𨽻原遣有差索虜圍漢中梁州刺史蕭懿拒退之己未以新除黄門郎裴叔業為徐州刺史五月甲午寢廟成詔監作長帥可賜位一等役身遣假一年非役者蠲租同假限六月壬戌誅領軍将軍蕭諶西陽王子眀南海王子罕邵陵王子貞乙丑以右衛将軍蕭坦之為領軍将軍秋七月辛未以右将軍晉安王寳義為南徐州刺史壬申以冠軍将軍梁王為司州刺史辛夘以氐楊馥之為北秦州刺史仇池公八月丁未以右衛将軍廬陵王寳源為南兖州刺史庚戌以新除輔國将軍申希祖為兖州刺史九月己丑改封南平王寳攸為邵陵王蜀郡王子文為西陽王廣漢王子峻為衡陽王臨海王昭秀為巴陵王永嘉王昭粲為桂陽王冬十月丁夘詔曰軌世去奢事殷哲后訓物以儉理鏡前王朕属流弊之末襲澆浮之季雖恭己𢎞化刻意隆平而禮譲未興侈華猶競永覽𤣥風兢言集愧思所以還淳改俗反古移民可罷東田毁興光樓并詔水衡量省御乘乙夘納皇太子妃褚氏大赦王公已下班賜各有差斷四方上禮十二月丁酉詔曰舊國都邑望之悵然况乃自經南面負扆宸居或功濟當時徳覃一世而塋壠櫕穢封樹不修豈直嗟深牧竪悲甚信陵而已哉昔中京淪覆鼎玉東遷晉元締構之始簡文遺詠在民而松門夷替埏路榛蕪雖年代殊往撫事興懐晉帝諸陵悉加修理并増守衛吴晉陵二郡失稔之鄉蠲三調有差三年春正月丁酉以陰平王楊炅子崇祖為沙州刺史封陰平王北中郎将建安王寳寅為江州刺史己巳詔申眀守長六周之制乙酉詔去嵗索虜冦邉縁邉諸州郡将士有臨陣及疾病死亡者竝送還本土三月壬午詔車府乗輿有金銀飾校者皆剔除夏四月虜冦司州戍兵撃破之五月己巳以征虜将軍蕭懿為益州刺史前軍将軍陰廣宗為梁南秦二州刺史前新除寧州刺史李慶宗為寧州刺史秋九月辛酉以冠軍将軍徐𤣥慶為兖州刺史冬十月以輔國将軍申希祖為司州刺史閏十二月戊寅皇太子冠賜王公以下帛各有差為父後者賜爵一級斷逺近上禮又詔今嵗不須光新可以見錢為百官供給四年春正月庚午大赦詔曰嘉肴停爼定方㫖扵必甘良玉在攻表珪璋扵既就是以陶鈞萬品務夲為先經緯九區學斆為大往因時康崇建庠序屯虞荐有權従省廢謳誦􅄫寥倐移年稔永言古昔無忘旰昃今華夏乂安要荒慕嚮締修東序實允適時便可式依舊章廣延國胄𢎞敷景業光被後昆壬寅詔民産子者蠲其父母調役一年又賜米十斛新婚者蠲夫役一年丙辰尚書令王晏伏誅二月甲子以左僕射徐孝嗣為尚書令征虜将軍蕭季敞為廣州刺史三月乙未右僕射沈文季領䕶軍将軍秋八月追尊景皇所生王氏為恭太后索虜冦沔北冬十月又冦司州甲戍遣太子中庶子梁王右軍司馬張稷討之十一月丙辰以氐楊靈珍為北秦州刺史仇池公武都王丁亥詔所在結課屋宅田桑可詳減舊價十二月甲子以冠軍将軍裴叔業為豫州刺史冠軍将軍徐𤣥慶為徐州刺史寧朔将軍左興盛為兖州刺史丁丑遣度支尚書崔慧景率衆救雍州永泰元年春正月癸未朔大赦逋租宿債在四年之前皆悉原除中軍大将軍徐孝嗣即夲號開府儀同三司沔北諸郡為虜所侵相繼敗沒乙巳遣太尉陳顯達持節救雍州丁未誅河東王鉉臨賀王子岳西陽王子文衡陽王子峻南康王子琳永陽王子珉湘東王子建南郡王子夏桂陽王昭粲巴陵王昭秀二月癸丑遣左衛将軍蕭恵休假節援夀陽辛未豫州刺史裴叔業撃虜扵淮北破之辛巳平西将軍蕭遥欣領雍州刺史三月丙午蠲雍州遇虜之縣租布戊申詔曰仲尼眀聖在躬允光上哲𢎞厥雅道大訓生民師範百王軌儀千載立人斯仰忠孝攸出𤣥功潛被至徳彌闡雖反袂遐曠而祧薦靡闕時祭舊品秩比諸侯頃嵗以来祀典陵替爼豆􅄫寥牲奠莫舉豈所以克昭盛烈永隆風教者㦲可式循舊典詳復祭秩使牢餼備禮欽饗兼申夏四月甲寅改元赦三署囚繋原除各有差文武賜位二等丙戍以鎮軍将軍蕭坦之為侍中中領軍己未立武陵昭王子子坦為衡陽王丙寅以西中郎長史劉暄為郢州刺史丁夘大司馬㑹稽太守王敬則舉兵反五月壬午遣輔國将軍劉山陽率軍東討乙酉斬敬則傳首曲赦浙東呉晉陵七郡以後軍長史蕭頴胄為南兖州刺史丁酉以北中郎将司馬元和為兖州刺史秋七月以輔國将軍王珍國為青冀二州刺史癸夘以太子中庶子梁王為雍州刺史太尉陳顯達為江州刺史己酉帝崩正福殿年四十七遺詔曰徐令可重申八命中書監夲官悉如故沈文季可左僕射常侍䕶軍如故江祏可右僕射江祀可侍中劉暄可衛尉軍政大事委陳太尉内外衆事無大小委徐孝嗣遥光坦之江祏其大事與沈文季江祀劉暄參懐心膂之任可委劉悛蕭恵休崔慧景葬興安陵帝眀審有吏才持法無所借制御親幸臣下肅清驅使寒人不得用四幅繖大存儉約罷世祖所起新林苑以地還百姓廢文帝所起太子東田斥賣之永眀中輿輦舟乗悉剔取金銀還主衣庫太官進御食有裹蒸帝曰我食此不盡可四片破之餘充晚食而世祖掖庭中宫殿服御一無所改性猜忌多慮故亟行誅戮潛信道術用計數出行幸先占利害南出則唱云西行東逰則唱云北幸簡扵出入竟不南郊上初有疾無輟聴覽祕而不傳及寢疾甚久勑臺省府署文簿求白魚以為治外始知之身衣絳衣服飾皆赤以為厭勝巫覡云後湖水頭經過宫内致帝有疾帝乃自至太官行水溝左右唘太官若無此水則不立帝决意塞之欲南引淮流會崩事寢史臣曰髙宗以支庶纂厯據猶子而為論一朝到此誠非素心遺寄所當諒不獲免夫戕夷之事懐抱多端或出自雄忍或生乎畏懾令同財之親在我而先棄進引之愛量物其必逺疑怯既深猜似外入流涕行誅非云義舉事茍求安能無内愧既而自樹夲根枝𦙍孤弱貽厥不昌終覆宗社若令􅐦鈕之徴必委天命盤庚之祀亦繼陽甲杖運推公夫何譏爾賛曰髙宗傍起宗國之慶慕名儉徳垂文法令兢兢小心察察吏政沔陽失土南風不競南齊書卷六南齊書卷六考證眀帝夲紀三年春正月丁酉通鑑考異曰案長厯是月乙丑朔無丁酉下有己巳當作丁夘四年春正月庚午通鑑考異曰案長厯是月己丑朔無庚午通鑑所以不日永泰元年七月以太尉陳顯達為江州刺史臣祖庚按陳顯達傳顯達敗扵馬圈表解職不許求降號又不許乃除江州又云東昏立顯達彌不樂還京師得此授甚喜据此則刺史江州在東昏立後馬圏之敗亦在永元元年情事適合况眀帝末顯達方以三公撃魏不容無故除江州也南齊書卷六考證
