body:
  text: 南齊書卷五十八梁蕭子顯撰列傳第三十九蠻東南夷蠻種類繁多言語不一咸依山谷布荆湘雍郢司等五州界宋世封西陽蠻梅蟲生為高山侯田治生為威山侯梅加羊為扞山侯太祖即位有司奏蠻封應在觧例參議以戎夷疏爵理章列代酋豪世襲事炳前葉今宸歴改物舊冊杓降而梅生等保落奉政事須䋲總恩命升贊有異常品謂宜存名以訓殊俗詔特留以治生為輔國將軍虎賁中郎轉建寧郡太守將軍侯如故建元二年虜侵豫司蠻中傳虜已近又聞官盡發民丁南襄城蠻秦遠以郡縣無備冦潼陽縣令焦文度戰死司州蠻引虜攻平昌戍戍主茍元賔撃破之秦逺又出破臨沮百方砦殺畧百餘人北上黄蠻文勉徳冦汶陽太守戴元孫孤城力弱慮不自保棄戍歸江陵荆州刺史豫章王遣中兵參軍劉伾緒領千人討勉徳至當陽勉徳請降收其部落使戍汶陽所治城子令保持商旅付其清通遠遂逃竄汶陽本臨沮西界二百里中水陸迂狹魚貫而行有數處不通騎而水白田甚肥腴桓温時割以為郡西北接梁州新城東北接南襄城南接巴巫二邊竝山蠻㓙盛據險為冦賊宋泰始以來巴建蠻向宗頭反刺史沈攸之斷其鹽米連討不剋晉天興三年建平夷王向𢎞向瓂等詣臺求拜除尚書郎張亮議夷貊不可假以軍號元帝詔特以𢎞為折衝將軍當平鄉侯竝親晉王賜以朝服宗頭其後也太祖置巴州以威靜之其武陵酉溪蠻田思飃冦抄内史王文和討之引軍深入蠻自後斷其糧豫章王遣中兵參軍荘明五百人將湘州鎮兵合千人救之思飃與文和拒戰中弩矢死蠻衆以城降永明初向宗頭與黔陽蠻田豆渠等五千人為冦巴東太守王圖南遣府司馬劉僧夀等斬山開道攻其砦宗頭夜燒砦退走三年湘州蠻陳雙李答冦掠郡縣刺史呂安國討之不克四年刺史桞世隆督衆征討乃平五年雍司州蠻與虜通助荒人桓天生為亂六年除督䕶北遂安左郡太守田駟路為試守北遂安左郡太守前寧朔將軍田驢王為試守新平左郡太守皆郢州蠻也九年安隆内史王僧旭發民丁遣寛城戍主萬民和助八百丁村蠻伐千二百丁村蠻為蠻所敗民和被傷失馬及噐仗有司奏免官西陽蠻田益宗沈攸之時以功勞得將領遂為臨川王防閣叛投虜虜以為東豫州刺史建武三年虜遣益宗攻司州龍城戍為戍主朱僧起所破蠻俗衣布徒跣或椎髻或翦髪兵噐以金銀為飾虎皮衣楯便弩射皆暴悍好冦賊焉東夷高麗國西與魏虜接界宋末高麗王樂浪公高璉為使持節散騎常侍都督營平二州諸軍事車騎大將軍開府儀同三司太祖建元元年進號驃騎大將軍三年遣使貢獻乗舶汎海使驛常通亦使魏虜然彊盛不受制虜置諸國使邸齊使第一高麗次之永明七年平南參軍顏㓜明冗從僕射劉思斆使虜虜元㑹與高麗使相次㓜明謂偽主客郎裴叔令曰我等銜命上華來造卿國所為抗敵在乎一魏自餘外夷理不得望我鑣塵況東夷小貊臣屬朝廷今日乃敢與我躡踵思斆謂偽南部尚書李思沖曰我聖朝處魏使未嘗與小國列卿亦應知思沖曰實如此但主副不得升殿耳此間坐起甚高足以相報思斆曰李道固昔使正以衣冠致隔耳魏國必纓冕而至豈容見黜㓜明又謂虜主曰二國相亞唯齊與魏邉境小狄敢躡臣蹤高麗俗服窮袴冠析風一梁謂之幘知讀五經使人在京師中書郎王融戱之曰服之不𠂻身之災也頭上定是何物答曰此即古弁之遺像也高璉年百餘歳卒隆昌元年以高麗王樂浪公高雲為使持節散騎常侍都督營平二州諸軍事征東大將軍高麗王樂浪公建武三年此下缺文報功勞勤實存名烈假行寧朔將軍臣姐瑾等四人振竭忠効攘除國難志勇果毅等威名將可謂扞城固蕃社稷論功料勤宜在甄顯今依例輙假行職伏願恩愍聽除所假寧朔將軍面中王姐瑾歴贊時務武功竝列今假行冠軍將軍都將軍都漢王建威將軍八中侯餘古弱冠輔佐忠効夙著今假行寧朔將軍阿錯王建威將軍餘歴忠款有素文武烈顯今假行龍驤將軍邁盧王廣武將軍餘固忠効時務光宣國政今假行建威將軍弗斯侯牟大又表曰臣所遣行建威將軍廣陽太守兼長史臣高逹行建威將軍朝鮮太守兼司馬臣楊茂行宣威將軍兼參軍臣㑹邁等三人志行清亮忠款夙著徃太始中比使宋朝今任臣使冐渉波險尋其至効宜在進爵謹依先例各假行職且𤣥澤靈休萬里所企况親趾天庭乃不䝉頼伏願天監特愍除正逹邊効夙著勤勞公務今假行龍驤將軍帶方太守茂志行清壹公務不廢今假行建威將軍廣陵太守邁執志周密屢致勤効今假行廣武將軍清河太守詔可竝賜軍號除太守為使持節都督百濟諸軍事鎮東大將軍使兼謁者僕射孫副䇿命大襲亡祖父牟都為百濟王曰於戯惟爾世襲忠懃誠著遐表滄路肅澄要貢無替式循彛典用纂顯命徃欽哉其敬膺休業可不慎歟制詔行都督百濟諸軍事鎮東大將軍百濟王牟大今以大襲祖父牟都為百濟王即位章綬等五銅虎竹符四王其拜受不亦休乎是歳魏虜又發騎數十萬攻百濟入其界牟大遣將沙法名贊首流觧禮昆木干那率衆襲撃虜軍大破之建武二年牟大遣使上表曰臣自昔受封世被朝榮忝荷節鉞剋攘列辟徃姐瑾等竝蒙光除臣庶咸泰去庚午年獫狁弗悛舉兵深逼臣遣沙法名等領軍逆討宵襲霆擊匃犁張惶崩若海蕩乗奔追斬僵屍丹野由是摧其鋭氣鯨暴韜㓙今邦宇謐靜實名等之畧尋其功勲宜在襃顯今假沙法名行征虜將軍邁羅王贊首流為行安國將軍辟中王觧禮昆為行武威將軍弗中侯木干那前有軍功又拔臺舫為行廣威將軍面中侯伏願天恩特愍聽除又表曰臣所遣行龍驤將軍樂浪太守兼長史臣慕遺行建武將軍城陽太守兼司馬臣王茂兼參軍行振武將軍朝鮮太守臣張塞行揚武將軍陳明在官忘私唯公是務見危授命蹈難弗顧今任臣使冐渉波險盡其至誠實宜進爵各假行署伏願聖朝特賜除正詔可竝賜軍號加羅國三韓種也建元元年國王荷知使來獻詔曰量廣始登遠夷洽化加羅王荷知款關海外奉贄東遐可授輔國將軍本國王倭國在帶方東南大海島中漢末以來立女王土俗已見前史建元元年進新除使持節都督倭新羅任那加羅秦韓六國諸軍事安東大將軍倭王武號為鎮東大將軍南夷林邑國在交州南海行三千里此連九徳秦時故林邑縣也漢末稱王晉太康五年始貢獻宋永初元年林邑王范楊邁初産母夢人以金席藉之光色奇麗中國謂紫磨金夷人謂之楊邁故以為名楊邁死子咄立慕其父復改名楊邁林邑有金山金汁流出於浦事尼乾道鑄金銀人像大十圍元嘉二十二年交州刺史檀和之伐林邑楊邁欲輸金萬斤銀十萬斤銅三十萬斤還日南地大臣䓯僧逹諌不聽和之進兵破其北界犬戎區栗城獲金寶無笇毁其金人得黄金數萬斤餘物稱是和之後病死見胡神為祟孝建二年始以林邑長史范龍跋為揚武將軍楊邁子孫相傳為王未有位號夷人范當根純攻奪其國簒立為王永明九年遣使貢獻金簟等物詔曰林邑蠢爾介在遐外世服王化當根純乃誠懇款到率其僚職逺績克宣良有可嘉宜沾爵號以𢎞休澤可持節都督緣海諸軍事安南將軍林邑王范楊邁子孫范諸農率種人攻當根純復得本國十年以諸農為持節都督緣海諸軍事安南將軍林邑王建武二年進號鎮南將軍永泰元年諸農入朝海中遭風溺死以其子文款為假節都督緣海軍事安南將軍林邑王晉建興中日南夷帥范稚奴文數商賈見上國制度教林邑王范逸起城池樓殿王服天冠如佛冠身被香纓絡國人㐫悍習山川善鬭吹海蠡為角人皆裸露四時暄暖無霜雪貴女賤男謂師君為婆羅門羣從相姻通婦先遣聘求婿女嫁者迦藍衣横幅合縫如井闌首戴花寶婆羅門牽婿與婦握手相付呪願吉利居喪剪髮謂之孝燔屍中野以為葬逺界有靈鷲鳥知人將死集其家食死人肉盡飛去乃取骨燒灰投海中水葬人色以黒為美南方諸國皆然區栗城建八尺表日影度南八寸自林邑西南三千餘里至扶南扶南國在日南之南大海西灣中廣袤三千餘里有大江水西流入海其先有女人為王名桞葉又有激國人混填夢神賜弓二張教乘舶入海混填晨起於神廟樹下得弓即乘舶向扶南桞葉見舶率衆欲禦之混填舉弓遥射貫船一面通中人桞葉怖遂降混填遂以為妻惡其躶露形體乃疊布貫其首遂治其國子孫相傳至王槃況死國人立其大將范師蔓蔓病姊子旃慕立殺蔓子金生十餘年蔓少子長襲殺旃以刃鑱旃腹曰汝昔殺我兄今為父兄報汝旃大將范尋又殺長國人立以為王是吳晉時也晉宋世通職貢宋末扶南王姓僑陳如名闍耶跋摩遣商貨至廣州天竺道人那伽仙附載欲歸國遭風至林邑掠其財物皆盡那伽仙間道得逹扶南具説中國有聖主受命永明二年闍邪跋摩遣天竺道人釋那伽仙上表稱扶南國王臣僑陳如闍耶跋摩叩頭啓曰天化撫育感動靈祗四氣調適伏願聖主尊體起居康御皇太子萬福六宫清休諸王妃主内外朝臣普同和睦隣境士庶萬國歸心五榖豐熟災害不生土清民泰一切安穩臣及人民國土豐樂四氣調和道俗濟濟竝䝉陛下光化所被咸荷安泰又曰臣前遣使齎雜物行廣州貨易天竺道人釋那伽仙於廣州因附臣舶欲來扶南海中風漂到林邑國王奪臣貨易并那伽仙私財具陳其從中國來此仰序陛下聖徳仁治詳議風化佛法興顯衆僧殷集法事日盛王威嚴整朝望國軌慈愍蒼生八方六合莫不歸伏如聽其所説則化隣諸天非可為喻臣聞之下情踊悦若蹔奉見尊足仰慕慈恩澤流小國天垂所感率土之民竝得皆蒙恩祐是以臣今遣此道人釋那伽仙為使上表問訊奉貢微獻呈臣等赤心并别陳下情但所獻輕陋愧懼唯深伏願天慈曲照鑒其丹欵賜不垂責又曰臣有奴名鳩酬羅委臣逸走别在餘處構結㐫逆遂破林邑仍自立為王永不恭從違恩負義叛主之諐天不容載伏尋林邑昔為檀和之所破久已歸化天威所被四海彌伏而今鳩酬羅守執奴㐫自專狼彊且林邑扶南隣界相接親人是臣奴猶尚逆去朝廷遥遠豈復遵舉此國屬陛下故謹具上啓伏聞林邑頃年表獻簡絶便欲永隔朝廷豈有師子坐而安大鼠伏願遣軍將伐㐫逆臣亦自効微誠助朝廷剪撲使邊海諸國一時歸伏陛下若欲别立餘人為彼王者伏聽勑㫖脱未欲灼然興兵伐林邑者伏願特賜勑在所隨宜以少軍助臣乘天之威殄滅小賊伐惡從善平蕩之日上表獻金五婆羅今輕此使送臣丹誠表所陳啓不盡下情謹附那伽仙并其伴口具啓聞伏願愍所啓并獻金鏤龍王坐像一軀白檀像一軀牙塔二軀古貝二雙瑠璃蘇鉝二口瑇瑁㯽榔柈一枚那伽仙詣京師言其國俗事摩䤈首羅天神神常降於摩躭山土氣恒暖草木不落其上書曰吉祥利世間感攝於羣生所以其然者天感化緣明仙山名摩躭吉樹敷嘉榮摩䤈首羅天依此降尊靈國王悉䝉祐人民皆安寧由斯恩被故是以臣歸情菩薩行忍慈本迹起凡基一發菩提心二乘非所期歴生積功業六度行大悲勇猛超劫數財命捨無遺生死不為猒六道化有緣具脩於十地遺果度人天功業既已定行滿登正覺萬善智圓備惠日照塵俗衆生感緣應隨機授法藥佛化遍十方無不䝉濟擢皇帝聖𢎞道興隆於三寶垂心覽萬機感恩振八表國土及城邑仁風化清皎亦如釋提洹衆天中最超陛下臨萬民四海共歸心聖慈流無疆被臣小國深詔報曰其摩䤈降靈流施彼土雖殊俗異化遥深欣讚知鳩酬羅於彼背叛竊據林邑聚㐫肆掠殊宜剪討彼雖介遐陬舊脩蕃貢自宋季多難海譯致壅皇化惟新習迷未革朕方以文徳來逺人未欲便興干戈王既欵列忠到遠請軍威今詔交部隨宜應接伐叛柔服實惟國典勉立殊效以副所期那伽仙屢銜邊譯頗悉中土闊狹令其具宣上報以絳紫地黄碧綠紋綾各五匹扶南人黠惠知巧攻畧傍邑不賔之民為奴婢貨易金銀綵帛大家男子截錦為横幅女為貫頭貧者以布自蔽鍛金鐶鏆銀食噐伐木起屋國王居重閣以木柵為城海邊生大箬葉長八九尺編其葉以覆屋人民亦為閣居為船八九丈廣裁六七尺頭尾似魚國王行乘象婦人亦能乘象鬬雞及狶為樂無牢獄有訟者則以金指鐶若雞子投沸湯中令探之又燒鎻令赤著手上捧行七歩有罪者手皆燋爛無罪者不傷又令没水直者入即不沈不直者即沈也有甘蔗諸蔗安石榴及橘多㯽榔鳥獸如中國人性善不便戰常為林邑所侵撃不得與交州道故其使罕至交州斗絶海島控帶外國故恃險數不賔宋泰始初刺史張牧卒交趾人李長仁殺牧北來部曲據交州叛數年病死從弟叔獻嗣事號令未行遣使求刺史宋朝以南海太守沈煥為交州刺史以叔獻為煥寧逺司馬武平新昌二郡太守叔獻得朝命人情服從遂發兵守險不納煥煥停鬱林病卒太祖建元元年仍以叔獻為交州刺史就安慰之叔獻受命既而斷割外國貢獻寡少世祖欲討之永明元年以司農劉楷為交州刺史發南康廬陵始興郡兵征交州叔獻聞之遣使願更申數年獻十二隊純銀兠鍪及孔雀毦世祖不許叔獻懼為楷所襲間道自湘川還朝六年以始興太守房法乗代楷法乘至鎮屬病不理事專好讀書長史伏登之因此擅權改易將吏不令法乘知錄事房季文白之法乘大怒繋登之於獄十餘日登之厚賂法乘妹夫崔景叔得出將部曲襲州執法乘謂之曰使君既有疾不宜勞囚之别室法乘無事復就登之求書讀登之曰使君靜處猶恐動疾豈可看書遂不與乃啓法乘心疾動不任視事世祖仍以登之為交州刺史法乘還至嶺而卒法乘清河人昇明中為太祖驃騎中兵至左中郎將性方簡身長八尺三寸行出人上常自俯屈青州刺史明慶符亦長與法乘等朝廷唯此二人史臣曰書稱蠻夷猾夏蓋總而為言矣至於南夷雜種分嶼建國四方珍怪莫此為先藏山隱海瓌寶溢目商舶遠届委輸南州故交廣富實牣積王府充斥之事差微聲教之道可被若夫用徳以懷逺其在此乎贊曰司雍分壃荆及衡陽參錯州部地有蠻方東夷海外碣石扶桑南域憬逺極泛溟滄非要乃貢竝亦來王南齊書卷五十八
