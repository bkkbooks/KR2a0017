body:
  text: 南齊書卷三本紀第三武帝世祖武皇帝諱賾字宣遠太祖長子也小諱龍兒生於建康青溪宅其夜陳孝后劉昭后同夢龍據屋上故字上焉初為尋陽國侍郎辟州西曹書佐出為贛令江州刺史晉安王子勛反上不從命南康相沈肅之縶上於郡獄族人蕭欣祖門客桓康等破郡迎出上肅之率將吏數百人追擊上與左右拒戰生獲肅之斬首百餘級遂率部曲百餘人舉義兵始興相殷孚將萬兵赴子勛於尋陽或勸上擊之上以衆寡不敵避屯揭陽山中聚衆至三千人子勛遣其將戴凱之為南康相及軍主張宗之千餘人助之上引兵向郡擊凱之別軍主程超數百人於南康口又進擊宗之破斬之遂圍郡城凱之以數千人固守上親率將士盡日攻之城陷凱之奔走殺僞贛令陶沖之上即據郡城遣軍主張應期鄧惠真三千人襲豫章子勛遣軍主談秀之等七千人與應期相拒於西昌築營壘交戰不能決聞上將自下秀之等退散事平徵為尚書庫部郎征北中兵參軍西陽縣子帶南東莞太守越騎校尉正員郎劉韞撫軍長史襄陽太守別封贛縣子邑三百戶固辭不受轉寧朔將軍廣興相桂陽王休範反上遣軍襲尋陽至北嶠事平除晉熙王安西咨議不拜復還郡轉司右長史黃門郎沈攸之在荊楚宋朝密為之備元徽四年以上為晉熙王鎮西長史江夏內史行郢州事從帝立徵晉熙王燮為撫軍揚州刺史以上為左衛將軍輔燮俱下沈攸之事起未得朝廷處分上以中流可以待敵即據盆口城為戰守之備太祖聞之喜曰此真我子也上表求西討不許乃遣偏軍援郢平西將軍黃回等皆受上節度加上冠軍將軍持節升明二年事平轉散騎常侍都督江州豫州之新蔡晉熙二郡軍事征虜將軍江州刺史持節如故封聞喜縣侯邑二千戶其年徵侍中領軍將軍給鼓吹一部府置佐史領石頭戍軍事尋又加持節督京畿諸軍事三年轉散騎常侍尚書僕射中軍大將軍開府儀同三司進爵為公持節都督領軍如故給班劒二十人齊國建為齊公世子改加侍中南豫州刺史給油絡車羽葆鼓吹增班劒為四十人以石頭為世子宮官置二率以下坊省服章一如東宮進爵王太子太祖即位為皇太子建元四年三月壬戌太祖崩上即位大赦征鎮州郡令長軍屯營部各行喪三日不得離任都邑城守防備幢隊一不得還乙丑稱先帝遺詔以司徒褚淵録尚書事尚書左僕射王儉為尚書令車騎將軍張敬兒為開府儀同三司詔曰喪禮雖有定制先旨每存簡約內官可三日一還臨外官閒一日還臨後有大喪皆如之丁卯以右衛將軍呂安國為司州刺史庚午以司空豫章王嶷為太尉癸酉詔曰城直之制歷代宜同頃歲逋薥遂以萬計雖在憲宜懲而原心可亮積年逋城可悉原蕩自茲以後申明舊科有違糾裁庚辰詔曰比歲未稔貧窮不少京師二岸多有其弊遣中書舍人優量賑夏四月丙午以輔國將軍張倪為六允州刺史辛卯追尊穆妃為皇后五月乙丑以丹陽尹聞喜公子良為南徐州刺史甲戌以新除左衛將軍垣崇祖為豫州刺史癸未詔曰頃水雨頻降潮流荐滿二岸居民多所淹漬遣中書舍人與兩縣官長優量賑六月甲申立皇太子長懋詔申壬戌赦恩百日乙酉以鄱陽王鏘為雍州刺史臨汝公子卿為郢州刺史甲午以寧朔將軍臧靈智為越州刺史丙申立皇太子妃王氏進封聞喜公子良為竟陵王臨汝公子卿為廬陵王應城公子敬為安陸王江陵公子懋為晉安王枝江公子隆為隨郡王皇子子真為建安王皇孫昭業為南郡王戊戌詔曰水潦為患星緯乖序京都囚繫可剋日訊決諸遠獄委刺史以時察判建康秣陵二縣貧民加賑賜必令周悉吳興義興遭水縣蠲除租調癸卯以司徒褚淵為司空驃騎將軍秋七月庚申以衛尉蕭順之為豫州刺史壬戌以冠軍將軍垣榮祖為青冀二州刺史八月癸卯司徒褚淵薨九月丁巳以國哀故罷國子學己巳以前軍將軍姜伯起為秦州刺史辛未以征南將軍王僧虔為左光祿大夫開府儀同三司尚書右僕射王奐為湘州刺史冬十二月己丑詔曰緣淮戍將久處邊勞三元行始宜沾恩慶可遣中書舍人宣旨臨會後每歲皆如之庚子以太子左衛率戴僧靜為徐州刺史永明元年春正月辛亥車駕祠南郊大赦改元壬子詔內外羣僚各舉朕違肆心規諫又詔王公卿士各舉所知隨方登詔曰經邦之寄實資蒞民守宰祿俸蓋有恆准往以邊虞告警故沿時損益今區𧜛寧晏庶績咸熙念勤簡能宜加優奬郡縣丞尉可還田秩太尉豫章王嶷領太子太傅護軍將軍長沙王晃為南徐州刺史鎮北將軍竟陵王子良為南六允州刺史庚申以侍中蕭景先為中領軍壬戌立皇弟鋭為南平王鏗為宜都王皇子子明為武昌王子罕為南海王甲子為築青溪舊宮詔槊仗瞻履二月辛巳以征虜將軍楊炅為沙州刺史辛丑以隴西公宕昌王梁彌機為河涼二州刺史東羌王像舒彭為西涼州刺史三月癸丑詔曰宋德將季風軌陵遲列宰庶邦彌失其序遷謝遄速公私凋弊泰運初基草昧惟始思述先範永隆治根蒞民之職一以小滿為限其有聲績剋舉厚加甄異理務無庸隨時代黜丙辰詔曰朕自丁荼毒奄便周忌瞻言負荷若墜淵壑而遠圖尚蔽政刑未理星緯失序陰陽愆度思播先澤兼酬天眚可申辛亥赦恩五十日以期訖為始京師囚繫悉皆原宥三署軍徒優量降遣都邑魚衆寡尤貧詳加賑戊寅詔四方見囚罪無輕重及劫賊餘口長徒勑繫悉原赦逋負督贓建元四年三月以前皆特除夏四月壬午詔曰魏矜袁紹恩洽丘墓晉亮兩王榮覃餘裔二代弘義前載美談袁粲劉秉與先朝同奬宋室沈攸之於景和之世特有乃心雖末節不終而始誠可録歲月彌往宜特優降粲秉前年改葬塋兆未修材槨可為經理令粗足周禮攸之及其諸子喪柩在西者可符荊州送反舊墓在所為營葬事五月丁酉車騎將軍張敬兒伏誅六月丙寅詔凡坐事應覆治者在建元四年三月已前皆原宥秋七月戊戌新除左光祿大夫王僧虔加特進九月己卯以荊州刺史臨川王映為驃騎將軍冠軍將軍廬陵王子卿為荊州刺史吳郡太守安陸侯緬為郢州刺史二年春正月乙亥以司州刺史呂安國為南六允州刺史征北將軍竟陵王子良為護軍將軍兼司徒征北長史劉悛為司州刺史丙子以右光祿大夫王延之為特進三月乙亥以吳興太守張岱為南六允州刺史前將軍王奐為江州刺史平北將軍呂安國為湘州刺史戊寅以少府趙景翼為廣州刺史夏四月甲辰詔揚南徐南六允徐六允五州統內諸獄并豫江三州府州見囚江州尋陽新蔡兩郡繫獄竝部送還臺須候克日斷枉直緣江遠郡及諸州委刺史詳察訊己巳以寧朔將軍程法勤為寧州刺史六月癸卯車駕幸中堂聽訟乙巳以安陸王子敬為南六允州刺史戊申以黃門侍郎崔平仲為青冀二州刺史秋七月癸未詔曰夫樂所自生先哲垂誥禮不忘本積代同風是以漢光遲回於南陽魏文殷勤於譙國青溪宮體天含暉則地栖寶光定靈源允集符命在昔期運初開經綸方遠繕築之勞我則未暇時流事往永惟哽咽朕以寡薄嗣奉鴻基思存締構式表王迹考星創制揆日興功子來告畢規摹昭備宜申釁落之禮以暢感尉之懷可克日小會甲申立皇子子倫為巴陵王八月丙午車駕幸舊宮小會設金石樂在位者賦詩詔申京師獄及三署見徒量所降宥領宮職司詳賜幣帛戊申車駕幸玄武湖講武甲子詔曰窆枯掩骼義重前誥老哀癃實惟令典朕永思民瘼弗忘鑒寐聲憓未敷物多乖所京師二縣或有久墳毀發可隨宜掩埋遺骸未櫬竝加斂瘞疾病窮困不能自存者詳為條格竝加沾賚冬十月丁巳以桂陽王鑠為南徐州刺史十一月丁亥以始興王鑑為益州刺史三年春正月丙辰以大司農劉楷為交州刺史安西咨議參軍崔慶緒為梁南秦二州刺史甲申以晉安王子懋為南豫州刺史辛卯車駕祠南郊大赦都邑三百里內罪應入重者降一等餘依赦制劾繫之身降遣有差賑二縣貧民又詔曰春秋國語云生民之有學斆猶樹木之有枝葉果行育德咸必由茲在昔開運光宅華夏方弘典謨克隆教思命彼有司崇建庠孰甫就經始仍離屯故仰瞻徽猷歲月彌遠今遐邇一體車軌同文宜高選學官廣延胄子又詔守宰親民之要刺史案部所先宜嚴課農桑相土揆時必窮地利若耕蠶殊衆足厲浮墮者所在即便列奏其違方驕矜佚事妨農亦以名聞將明賞罰以勸勤怠校核殿最歲竟考課以申黜陟二月辛丑車駕祠北郊夏四月戊戌以新除右衛將軍豫章王世子子響為豫州刺史輔國將軍桓敬為六允州刺史五月乙未詔曰氓俗凋弊于茲永久雖年穀時登而歉乏比室凡單丁之身及煢獨而秩養養孤者竝蠲今年田租是月省總明觀六月庚戌進河南王度易侯為車騎將軍秋七月辛丑詔丹陽所領及餘二百里內見囚同集京師自此以外委州郡決斷甲戌左光祿大夫開府儀同三司王僧虔薨丁亥以驃騎中兵參軍董仲舒為寧州刺史八月乙未車駕幸中堂聽訟丁巳以行宕昌王梁彌頡為河涼二州刺史戊午以尚書令王儉領太子少傅太子詹事蕭順之為領軍將軍冬十月壬戌詔曰皇太子長懋講畢當釋奠王公以下可悉往觀禮十一月乙丑以冠軍將軍王文仲為青冀二州刺史十二月丁酉詔曰九穀之重八材為末是故潔粢豐盛祝史無愧於辭不籍千畝周宣所以貽諫昔期運初啓庶政草昧三推之典我則未暇朕嗣奉鴻基思隆先軌載耒躬親率由舊式可以開春發歲敬簡元辰鳴青鸞於東郊冕朱紘而蒞事仰薦宗禋俯勗黔皂將使囷庾內充遺秉外牣既富而教茲焉攸在是夏琅邪郡旱百姓芟除枯苗至秋擢穎大熟四年春正月甲子以南琅邪彭城二郡太守隨郡王子隆為江州刺史征虜長史張瓌為雍州刺史征虜將軍薛淵為徐州刺史護軍將軍兼司徒竟陵王子良進號車騎將軍富陽人唐𧜛之反聚衆桐廬破富陽錢塘等縣害東陽太守蕭崇之遣宿衛兵出討伏誅丁酉冠軍將軍馬軍主陳天福坐討唐𧜛之燒掠百姓棄市辛卯車駕幸中堂策秀才閏月癸巳立皇子子貞為邵陵王皇孫昭文為臨汝公丁未以武都王楊集始為北秦州刺史辛亥車駕藉田詔曰夫耕藉所以表敬親載所以率民朕景行前規躬執良耜千畛咸事六仞稔可期教義克宣誠感兼暢重以天符靈貺歲月鱗萃寶鼎開玉匣之祥嘉禾發同穗之穎甘露凝暉於坰牧神爵騫翥於蘭囿斯乃宗稷之慶豈寡薄所臻思俾休和覃茲黔皂見刑罪殊死以下悉原宥諸逋負在三年以前尤窮弊者一皆蠲除孝悌力田詳授爵位孤老貧窮賜穀十石凡欲附農而糧種闕乏者竝加給貸務在優厚癸丑以始興內史劉勑為廣州刺史甲寅以藉田禮畢車駕幸閲武堂勞酒小會詔賜王公以下在位者帛有差戊午車駕幸宣武堂講武詔曰今親閲六師少長有禮領馭羣帥可量班賜二月己未立皇弟銶為晉熙王鉉為河東王庚寅以光祿大夫王玄載為六允州刺史三月辛亥國子講孝經車駕幸學賜國子祭酒博士助教絹各有差夏四月丁亥以尚書左僕射柳世隆為湘州刺史臨沂縣麥不登刈為馬芻至夏更苗秀五月癸巳詔揚南徐二州今年戶租三分二取見布一分取錢來歲以後遠近諸州輸錢處竝減布直匹准四百依舊折半以為永制丙午以吳興太守西昌侯鸞為中領軍秋八月辛酉以鎮南長史蕭惠休為廣州刺史九月甲寅以征虜將軍王廣之為徐州刺史冬十二月乙亥以東中郎司馬崔惠景為司州刺史五年春正月戊子以太尉豫章王嶷為大司馬車騎將軍竟陵王子良為司徒驃騎將軍臨川王映衛將軍王儉中軍將軍王敬則竝本號開府儀同三司都官尚書沈文季為郢州刺史左將軍安陸王子敬為荊州刺史征虜將軍晉安王子懋為南六允州刺史輔國將軍建安王子真為南豫州刺史辛卯詔曰朕昧爽丕顯思康民瘼雖年穀亟登而飢饉代有今履端肇運陽和告始宜協時休覃茲黎庶諸孤老貧病竝賜糧餼遣使親賦每存均普雍司二州蠻虜屢動丁酉遣丹陽尹蕭景先出平陽護軍將軍陳顯達出宛葉三月戊子車駕幸芳林園禊宴丁未以護軍將軍陳顯達為雍州刺史夏四月庚午車駕殷祠太廟詔繫囚見徒四歲刑以下悉原遣五年減為三歲京邑罪身應入重降一等六月辛酉詔曰比霖雨過度水潦洊溢京師居民多離其弊遣中書舍人二縣官長隨宜賑賜秋七月戊申詔丹陽屬縣建元四年以來至永明三年所逋田租殊為不少京甸之內宜加優貸其非中資者可悉原停八月乙亥詔今夏雨水吳興義興二郡田農多傷詳蠲租調九月己丑詔曰九日出商飆館登高宴羣臣辛卯車駕幸商飆館館上所立在孫陵岡世呼為九日臺者也丙午詔曰善為國者使民無傷而農益勸是以十一而稅周道克隆開建常平漢載惟穆岱畎絲枲浮汶來貢嵵梓皮革必緣楚往自水德將謝喪亂彌多師旅歲興饑饉代有貧室盡於課調泉貝傾於絶域軍國器用動資四表不因厥産咸用九賦雖有交貿之名而無潤私之實民咨塗炭實此之由昔在開運星紀未周餘弊尚重農桑不殷於曩日粟帛輕賤於當年工商罕兼金之儲匹夫多飢寒之患良由圜法久廢上幣稍寡所謂民失其資能無匱乎凡下貧之家可蠲三調二年京師及四方出錢億萬糴米穀絲綿之屬其和價以優黔首遠邦嘗市雜物非土俗所産者皆悉停之必是歲賦攸宜都邑所乏可見直和市勿使逋刻冬十月甲申以中領軍西昌侯鸞為豫州刺史侍中安陸侯緬為中領軍初起新林苑六年春正月壬午以祠部尚書安成王皓為南徐州刺史詔二百里內獄同集京師克日聽覽自此以外委州郡訊察三署徒隸詳所原釋三月己亥以豫章王世子子響為巴東王癸卯以光祿大夫周盤龍為行六允州刺史五月甲午以宕昌王梁彌承為河涼二州刺史六月甲寅以散騎常侍沈景德為徐州刺史丙子以始興太守房法乘為交州刺史秋七月乙巳都官尚書呂安國為領軍將軍八月乙卯詔吳興義興水潦被水之鄉賜痼疾篤口二斛老落疾一斛小口五斗九月壬寅車駕幸琅邪城講武習水步軍冬十月庚申立冬初臨太極殿讀時令辛酉以祠部尚書武陵王蟲念為江州刺史閏月乙卯詔曰北六允北徐豫司青冀八州邊接疆埸民多懸罄原永明以前所逋租調辛卯以尚書僕射王奐為領軍將軍十一月乙卯以羽林監費延宗為越州刺史庚申以後將軍晉安王子懋為湘州刺史西陽王子明為南六允州刺史七年春正月丙午以中軍將軍王敬則為豫州刺史中軍將軍陰智伯為梁南秦二州刺史戊申詔曰雍州頻歲戎役兼水旱為弊原四年以前逋租辛亥車駕祠南郊大赦京邑貧民普加賑賜又詔曰春頒秋斂萬邦所以惟懷柔遠能邇兆民所以允殖鄭渾宰邑因姓立名王濬剖符戶口殷盛今産子不育雖炳常禁比聞所在猶或有之誠復禮以貧殺抑亦情由俗淡宜節以嚴威敦以惠澤主者尋舊制詳量附定蠲恤之宜務存優厚壬戌驃騎將軍開府儀同三司臨川王映薨戊辰詔曰諸大夫年秩隆重祿力殊薄豈所謂下車惟舊趨橋敬老可增俸詳給見役二月丙子以左衛將軍巴東王子響為中護軍己丑詔曰宣尼誕敷文德峻極自天發輝七代陶鈞萬品英風獨舉素王誰匹功隱於當年道深於日月感麟厭世緬邈千祀川竭谷虛丘夷淵塞非但洙泗湮淪至乃饗嘗乏主前王敬仰崇修寢廟歲月亟流鞠為茂草今學斆興立實禀洪規撫事懷人彌增欽屬可改築宗祊務在爽塏量給祭秩禮同諸侯奉聖之爵以時紹繼壬寅以丹陽尹王晏為江州刺史癸卯以巴陵王子倫為豫州刺史三月丁未以太子右衛率王玄邈為六允州刺史庚戌以中護軍巴東王子響為江州刺史中書令隨郡王子隆為中護軍甲寅立皇子子嶽為臨賀王子峻為廣漢王子琳為宣城王子珉為義安王夏四月戊寅詔曰婚禮下達人倫攸始周官設媒氏之職國風興及時之詠四爵內陳義不期侈三鼎外列事豈存奢晚俗浮麗歷茲永久每思懲革而民未知禁乃聞同牢之費華泰尤甚膳羞方丈有過王侯富者扇其驕風貧者恥躬不逮或以供帳未具動致推遷年不再來盛時忽往宜為節文頒之士庶竝可擬則公朝方樏供設合卺之禮無虧寧儉之義斯在如故有違繩之以法五月乙巳尚書令衛將軍開府儀同三司王儉薨甲子以新除尚書左僕射柳世隆為尚書令六月丁亥車駕幸琅邪秋八月庚子以左衛將軍建安王子真為中護軍冬十月己丑詔曰三季澆浮舊章陵替吉凶奢靡動違矩則或裂錦繡以競車服之飾塗金鏤石以窮塋域之麗至班白不婚露棺纍葉苟相姱衒罔顧大典可明為條制嚴勒所在悉使畫一如復違犯依事糾奏十二月己亥以中護軍建安王子真為郢州刺史江州刺史巴東王子響為荊州刺史前安西司馬垣榮祖為六允州刺史八年春正月庚子征西大將軍王敬則進號驃騎大將軍左將軍沈文季為領軍將軍丹陽尹鄱陽王鏘為江州刺史詔放遣隔城虜俘聽還其本二月壬辰零陵王司馬藥師薨夏四月戊辰詔公卿已下各舉所知隨才授職進得其人受登賢之賞薦非其才獲濫舉之罰秋七月辛丑以會稽太守安陸侯緬為雍州刺史癸卯詔曰陰陽舛和緯象愆度儲胤嬰患淹歷旬晷思仰袛天戒俯紓民瘼可大赦天下癸亥詔司雍二州比歲不稔雍州八年以前司州七年以前逋租悉原汝南一郡復限更申五年八月丙寅詔京邑霖雨既過居民泛濫遣中書舍人二縣官長賑恤乙酉以行河南王世子休留成為秦河二州刺史壬辰以左衛將軍隨郡王子隆為荊州刺史巴東王子響有罪遣丹陽尹蕭順之率軍討之子響伏誅冬十月丁丑詔吳興水淹過度開所在倉賑賜癸巳原建元以前逋租十一月乙卯以建武將軍伏登之為交州刺史十二月乙丑以振威將軍陳僧授為越州刺史戊寅詔尚書丞郎職事繁劇恤俸未優可量增賜祿己卯皇子子建為湘東王癸巳以監青冀二州軍行刺史事張沖為青冀二州刺史九年春正月甲午以侍中江夏王鋒為南徐州刺史冠軍將軍劉悛為益州刺史辛丑車駕祠南郊詔京師見囚繫詳量原遣三月乙卯以南中郎司馬劉楷為司州刺史辛丑以太子左衛率劉纘為廣州刺史夏四月乙亥有司奏舊格一年兩過行陵三月十五日曹郎以下小行九月十五日司空以下大行今長停小行唯二州一大行詔曰可六月甲戌以尚書左僕射王奐為雍州刺史秋九月戊辰車駕幸琅邪城講武觀者傾都普頒酒肉十年春正月戊午詔諸責負衆逋七年以前悉原除高資不在例孤老六疾人穀五斛內外有務衆官增祿俸以左民尚書南平王鋭為湘州刺史司徒竟陵王子良領尚書令右衛將軍王玄邈為北徐州刺史中軍將軍廬陵王子卿進號車騎將軍北中郎將南海王子罕為六允州刺史輔國將軍臨汝公昭文為南豫州刺史冠軍將軍王文和為北六允州刺史二月壬寅鎮軍將軍陳顯達領中領軍夏四月辛丑大司馬豫章王嶷薨五月己巳司徒竟陵王子良為揚州刺史秋八月丙申以新城太守郭安明為寧州刺史冬十月乙丑車駕幸玄武湖講武甲午車駕殷祠太廟十一月戊午詔曰頃者霖雨樵糧稍貴京邑居民多離其弊遣中書舍人二縣官長賑賜十一年春正月癸丑詔京師見繫囚詳所原遣以驃騎大將軍王敬則為司空江州刺史鄱陽王鏘為領軍將軍鎮軍大將軍陳顯達為江州刺史右衛將軍崔慧景為豫州刺史丙子皇太子長懋薨二月壬午以車騎將軍廬陵王子卿為驃騎將軍南豫州刺史撫軍將軍安陸王子敬進號車騎將軍己丑輔國將軍曹虎為梁南秦二州刺史癸卯以新除中書監晉安王子懋為雍州刺史丙午以冠軍將軍王文和為益州刺史三月乙亥雍州刺史王奐伏誅夏四月壬午詔東宮文武臣僚可悉度為太孫官屬甲午立皇太孫昭業太孫妃何氏詔賜天下為父後者爵一級孝子順孫義夫節婦粟帛各有差癸卯以驍騎將軍劉靈哲為六允州刺史五月戊辰詔曰水旱成災穀稼傷弊凡三調衆逋可同申至秋登京師二縣朱方姑熟可權斷酒庚午以輔國將軍蕭惠休為徐州刺史丙子以左民尚書宜都王鏗為南豫州刺史六月壬午詔霖雨既過遣中書舍人二縣官長賑賜京邑居民秋七月丁巳詔曰頃風水為災二岸居民多離其患加以貧病六疾孤老稚弱彌足矜念遣中書舍人履行沾恤又詔曰水旱為災實傷農稼江淮之閒倉廩既虛遂草竊充斥互相侵奪依阻山湖成此逋逃曲赦南六允芊豫司徐五州南豫州之歷陽譙臨江廬江四郡三調衆逋宿債並同原除其緣淮及青冀新附僑民復除已訖更申五年是月上不豫徙御延昌殿乘輿始登階而殿屋鳴咤上惡之虜侵邊戊辰遣江州刺史陳顯達鎮雍州樊城上慮朝野憂惶乃力疾召樂府奏正聲伎戊寅大漸詔曰始終大期賢聖不免吾行年六十亦復何恨但皇業艱難萬機事重不能無遺慮耳太孫進德日茂社禝有寄子良善相毗輔思弘治道內外衆事無大小悉與鸞參懷共下意尚書中是職務根本悉委王晏徐孝嗣軍旅捍邊之略委王敬則陳顯達王廣之王玄邈沈文季張瓌薛淵等百辟庶僚各奉爾職謹事太孫勿有懈怠知復何言又詔曰我識滅之後身上著夏衣畫天衣純烏犀導應諸器悉不得用寶物及織成等唯裝復夾衣各一本通常所服身刀長短二口鐵環者隨我入梓宮祭敬之典本在因心東鄰殺牛不如西家禴祭我靈上慎勿以牲為祭唯設餅茶飲干飯酒脯而已天下貴賤咸同此制未山陵前朔望設菜食陵墓萬世所宅意嘗恨休安陵未稱今可用東三處地最東邊以葬我名為景安陵喪禮每存省約不須煩民百官停六時入臨朔望祖日可依舊諸主六宮竝不須從山陵內殿鳳華壽昌耀靈三處是吾所治製夫貴有天下富兼四海宴處寢息不容乃陋謂此為奢儉之中慎勿壞去顯陽殿玉像諸佛及供養具如別牒可盡心禮拜供養之應有功德事可專在中自今公私皆不得出家為道及起立塔寺以宅為精舍竝嚴斷之唯年六十必有道心聽朝賢選序已有別詔諸小小賜乞及閣內處分亦有別牒內外禁衛勞舊主帥左右悉付蕭諶優量驅使之勿負吾遺意也是日上崩年五十四上剛毅有斷為治總大體以富國為先頗不喜遊宴雕綺之事言常恨之未能頓遣臨崩又詔凡諸遊費宜從休息自今遠近薦獻務存節儉不得出界營求相高奢麗金粟繒纊弊民已多珠玉玩好傷工尤重嚴加禁絶不得有違准繩九月丙寅葬景安陵史臣曰世祖南面嗣業功參寶命雖為繼體事實艱難御袞垂旒深存政典文武授任不革舊章明罰厚恩皆由上出義兼長遠莫不肅然外表無塵內朝多豫機事平理職貢有恆府藏內充民鮮勞役宮室苑囿未足以傷財安樂延年衆庶所同幸若夫割愛懷抱同彼甸人太祖羣昭位後諸穆昔漢武留情晚悟追恨戾園魏文侯克中山不以封弟英賢心迹臣所未詳也贊曰武帝丕顯徽號止戈韶嶺歇祲彭派澄波威承景曆肅御金科北懷戎款南獻夷歌市朝晏逸中外寧和
