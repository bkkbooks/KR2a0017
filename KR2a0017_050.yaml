body:
  text: 南齊書卷五十列傳第三十一文二王明七王文惠太子四男安皇后生鬱林王昭業宮人許氏生海陵恭王昭文陳氏生巴陵王昭秀褚氏生桂陽王昭粲巴陵王昭秀字懷尚太子第三子也永明中封曲江公千五百戶十年為寧朔將軍濟陽太守鬱林即位封臨海郡王二千戶隆昌元年為使持節都督荊雍益寧梁南北秦七州軍事西中郎將荊州刺史延興元年徵為車騎將車衛京師以永嘉王昭粲代之明帝建武二年通直常侍庾曇隆啓曰周定邑天子置畿內之民漢都咸陽三輔為社稷之衛中晉南遷事移威薥近郡名邦多有國食宋武創業依擬古典神州部內不復別封而孝武末年分樹寵子苟申私愛有乖訓準隆昌之元特開母弟之貴竊謂非古聖明御𧜛禮舊為先畿內限斷宜遵昔制賜茅授土一出外州詔付尚書詳議其冬改封昭秀為巴陵王永泰元年見殺年十六桂陽王昭粲太子第四子也鬱林立以皇弟封永嘉郡王南徐州刺史延興元年出為使持節都督荊雍益寧梁南北秦七州軍事西中郎將荊州刺史明帝立欲以聞喜公遙欣為荊州轉昭粲為右將軍中書令建武二年改封桂陽王四年遷太常將軍如故永泰元年見殺年八歲明帝十一男敬皇后生東昏侯寶卷江夏王寶玄鄱陽王寶寅和帝殷貴嬪生巴陵隱王寶義晉熙王寶嵩袁貴妃生廬陵王寶源管淑妃生邵陵王寶攸許淑媛生桂陽王寶貞餘皆早夭巴陵隱王寶義字智勇明帝長子也本名明基建武元年為持節都督揚南徐州軍事前將軍揚州刺史封晉安郡王三千戶寶義少有廢疾不堪出人間故止加除授仍以始安王遙光代之轉寶義為右將軍領兵置佐鎮石頭二年出為使持節都督南徐州軍事鎮北將軍南徐州刺史東昏即位進征北大將軍開府儀同三司給仗扶永元元年給班劒二十人始安王遙光誅為都督揚南徐二州軍事驃騎大將軍揚州刺史持節如故東府被兵火屋宇燒殘帝方營宮殿不暇修葺寶義鎮西州三年進位司徒和帝西臺建以為侍中司空使持節都督刺史如故梁王定京邑宣德太后令以寶義為太尉領司徒詔云不言之化形于自遠時人皆云此實録也梁受禪封謝沐縣公尋封巴陵郡王奉齊後天監中薨江夏王寶玄字智深明帝第三子也建武元年為征虜將軍領石頭戍事封江夏郡王仍出為持節都督郢司二州軍事西中郎將郢州刺史永泰元年還為前將軍領石頭戍事未拜東昏即位進號鎮軍將軍永元元年又進車騎將軍代晉安王寶義為使持節都督南徐六允二州軍事南徐六允二州刺史將軍如故寶玄娶尚書令徐孝嗣女為妃孝嗣被誅離絶少帝送少姬二人與之寶玄恨望密有異計明年崔慧景舉兵還至廣陵遣使奉寶玄為主寶玄斬其使因是發將吏防城帝遣馬軍主戚平外監黃林夫助鎮京口慧景將渡江寶玄密與相應殺司馬孔矜典籤呂承緒及平林夫開門納慧景使長史沈佚之咨議柳憕分部軍衆乘八掆輿手執絳麾幡隨慧景至京師住東城百姓多往投集慧景敗收得朝野投寶玄及慧景軍名帝令燒之曰江夏尚爾豈復可罪餘人寶玄逃奔數日乃出帝召入後堂以步鄣裹之令羣小數十人鳴鼓角馳繞其外遣人謂寶玄曰汝近圍我亦如此少日乃殺之廬陵王寶源字智淵明帝第五子也建武元年為北中郎將鎮琅邪城封廬陵郡王遷右將軍領石頭戍事仍出為使持節都督南六允厄青冀五州軍事後將軍南六允州刺史王敬則伏誅徙寶源為都督會稽東陽臨海永嘉新安五郡軍事會稽太守將軍如故永元元年進號安東將軍和帝即位以為侍中車騎將軍開府儀同三司都督太守如故未拜中興二年薨鄱陽王寶夤字智亮明帝第六子也建武初封建安郡王二年為北中郎將鎮琅邪城明年出為持節都督江州軍事南中郎將江州刺史東昏即位為使持節都督郢司二州軍事征虜將軍郢州刺史尋進號前將軍永元二年徵為撫軍領石頭戍事未拜三年為車騎將軍開府儀同三司鎮石頭其秋雍州刺史張欣泰等謀起事於新亭殺臺內諸主帥事在欣泰傳難作之日前南譙太守王靈秀奔往石頭率城內將吏見力去車腳載寶夤向臺城百姓數千人皆空手隨後京邑騷亂寶夤至杜姥宅日已欲暗城門閉城上人射之衆棄寶夤逃走寶夤逃亡三日戎服詣草市尉尉馳以啓帝帝迎寶寅入宮問之寶夤涕泣稱爾日不知何人逼使上車仍將去制不自由帝笑乃復爵位和帝立西臺以寶夤為使持節都督南徐六允二州軍事衛將軍南徐州刺史少帝以為使持節都督荊益寧雍梁南北秦七州軍事荊州刺史將軍如故宣德太后臨朝梁王為建安公改封寶夤為鄱陽王中興二年謀反誅邵陵王寶攸字智宣明帝第九子也建武元年封南平郡王二年改封三年為北中郎將鎮琅邪城永元元年為持節都督南北徐南六允青冀五州軍事南六允州刺史郎將如故未拜遷征虜將軍領石頭戍事丹楊尹戍事如故陳顯達事平出為持節督江州軍事左將軍江州刺史以本號還京師授中軍將軍祕書監中興二年謀反宣德太后令賜死晉熙王寶嵩字智靖明帝第十子也永元二年為冠軍將軍丹楊尹仍遷持節都督南徐六允二州軍事南徐州刺史將軍如故中興元年和帝以為中書令明年謀反伏誅桂陽王寶貞明帝第十一子也永元二年為中護軍北中郎將領石頭戍事中興二年謀反伏誅史臣曰春秋書鄭伯克段于鄢兄弟之恩離君臣之義正夫逆從有勢況親兼一體道窮數盡或容觸啄而寶玄自尋干戈欣受家難曾不悟執柯所指跗草口咢相從以此而圖萬全未知其髣佛也贊曰文惠二王于嗟夭殤明子七國終亦衰亡
