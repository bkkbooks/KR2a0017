body:
  text: 南齊書卷五十二列傳第三十三文學丘靈鞠檀超卞彬丘巨源王智深陸厥崔慰祖王逡之祖沖之賈淵丘靈鞠吳興烏程人也祖系祕書監靈鞠少好學善屬文與上計仕郡為吏州辟從事詣領軍沈演之演之曰身昔為州職詣領軍謝晦賓主坐處政如今日卿將來或復如此也舉秀才為州主簿纍遷員外郎宋孝武殷貴妃亡靈鞠獻挽歌詩三首云雲橫廣階暗霜深高殿寒帝擲句嗟賞除新安王北中郎參軍出為剡烏程令不得志泰始初坐東賊黨錮數年褚淵為吳興謂人曰此郡才士唯有丘靈鞠及沈勃耳乃啓申之明帝使著大駕南討紀論久之除太尉參軍轉安北記室帶扶風太守不就為尚書三公郎建康令轉通直郎兼中書郎升明中遷正員郎領本郡中正兼中書郎如故時方禪讓太祖使靈鞠參掌詔策建元元年轉中書郎中正如故敕知東宮手筆尋又掌知國史明年出為鎮南長史尋陽相遷尚書左丞世祖即位轉通直常侍尋領東觀祭酒靈鞠曰久居官不願數遷使我終身為祭酒不恨也永明二年領驍騎將軍靈鞠不樂武位謂人曰我應還東掘顧榮冢江南地方數千里士子風流皆出此中顧榮忽引諸傖渡妨我輩塗轍死有餘罪改正員常侍靈鞠好飲酒臧否人物在沈淵座見王儉詩淵曰王令文章大進靈鞠曰何如我未進時此言達儉靈鞠宋世文名甚盛入齊頗減蓬髮薥縱無形儀不治家業王儉謂人曰丘公仕宦不進才亦退矣遷長沙王車騎長史太中大夫卒著江左文章録序起太興訖元熙文集行於世檀超字悅祖高平金鄉人也祖弘宗宋南琅邪太守超少好文學放誕任氣解褐州西曹嘗與別駕蕭惠開共事不為之下謂惠開曰我與卿俱起一老姥何足相誇蕭太后惠開之祖姑長沙王道憐妃超祖姑也舉秀才孝建初坐事徙梁州板宣威府參軍孝武聞超有文章敕還直東宮除驃騎參軍寧蠻主簿鎮北咨議超纍佐蕃職不得志轉尚書度支郎車騎功曹桂陽內史入為殿中郎兼中書郎零陵內史征北驃騎記室國子博士兼左丞超嗜酒好言詠舉止和靡自比晉郗超為高平二超謂人曰猶覺我為優也太祖賞愛之遷驍騎將軍常侍司徒右長史建元二年初置史官以超與驃騎記室江淹掌史職上表立條例開元紀號不取宋年封爵各詳本傳無假年表立十志律曆禮樂天文五行郊祀刑法藝文依班固朝會輿服依蔡雍司馬彪州郡依徐爰百官依范曄合州郡班固五星載天文日蝕載五行改日蝕入天文志以建元為始帝女體自皇宗立傳以備甥舅之重又立處士列女傳詔內外詳議左僕射王儉議金粟之重八政所先食貨通則國富民實宜加編録以崇務本朝會志前史不書蔡雍稱先師胡廣説漢舊儀此乃伯喈一家之意曲碎小儀氍煩録宜立食貨省朝會洪範九疇一曰五行五行之本先乎水火之精是為日月五行之宗也今宜憲章前軌無所改革又立帝女傳亦非淺識所安若有高德異行自當載在列女若止於常美則仍舊不書詔日月災隸天文餘如儉議超史功未就卒官江淹撰成之猶不備也時豫章熊襄著齊典上起十代其序云尚書堯典謂之虞書則附所述故通謂之齊名為河洛金匱卞彬字士蔚濟陰寃句人也祖嗣之中領軍父延之有剛氣為上虞令彬才操不羣文多指刺州辟西曹主簿奉朝請員外郎宋元徽末四貴輔政彬謂太祖曰外間有童謠云可憐可念尸著服孝子不在日代哭列管暫鳴死滅族公頗聞不時王蘊居父憂與袁粲同死故云尸著服也服者衣也褚字邊衣也孝除子以日代者謂褚淵也列管蕭也彬退太祖笑曰彬自作此齊臺初建彬又曰誰謂宋遠跂豫望之太祖聞之不加罪也除右軍參軍家貧出為南康郡丞彬頗飲酒擯棄形骸作蚤虱賦序曰余居貧布衣十年不制一袍之縕有生所託資其寒暑無與易之為人多病起居甚疏縈寢敗絮不能自釋兼攝性懈惰懶事皮膚澡刷不謹浣沐失時四體悠悠加以臭穢故葦席蓬纓之間蚤虱猥流淫癢渭濩無時恕肉探揣擭撮日不替手虱有諺言朝生暮孫若吾之虱者無湯沐之慮絶相弔之憂宴聚乎久襟爛布之裳服無改換搯齧不能加脫略緩懶復不勤於捕討孫孫息息三十五歲焉其略言皆實録也除南海王國郎中令尚書比部郎安吉令車騎記室彬性好飲酒以瓠壺瓢勺杬皮為肴著帛冠十二年不改易以大瓠為火籠什物多諸詭異自稱卞田居婦為傅蠶室或諫曰卿都不持操名器何由得升彬曰擲五木子十擲輒鞬豈復是擲子之拙吾好擲政極此耳永元中為平越長史綏建太守卒官彬又目禽獸云羊性淫而狠豬性卑而率鵝性頑而傲狗性險而出皆指斥貴勢其蝦蟆賦云紆青拖紫名為蛤魚世謂比令僕也又云科斗唯唯羣浮暗水維朝繼夕聿役如鬼比令史咨事也文章傳於閭巷永明中琅邪諸葛勗為國子生作雲中賦賦指祭酒以下皆有形似之目坐繫東冶作東冶徒賦世祖見赦之又有陳郡袁嘏自重其文謂人云我詩應須大材迮之不爾飛去建武末為諸暨令被王敬則所殺丘巨源蘭陵蘭陵人也宋初土斷屬丹陽後屬蘭陵巨源少舉丹陽郡孝廉為宋孝武所知大明五人敕助徐爰撰國史帝崩江夏王義恭取為掌書記明帝即位使參詔誥引在左右自南臺御史為王景文鎮軍參軍寧喪還家元徽初桂陽王休範在尋陽以巨源有筆翰遣船迎之餉以錢物巨源因太祖自啓敕板起巨源使留京都桂陽事起使於中書省撰符檄事平除奉朝請巨源望有封賞既而不獲乃與尚書令袁粲書曰民信理推心暗於量事庶謂丹誠感達賞報孱期豈虞寂寥忽焉三稔議者必云筆記賤伎非殺活所待開勸小説非否判所寄然則先聲後實軍國舊章七德九功將名當世仰觀天緯則右將而左相俯察人序則西武而東文固非胥祝之倫伍巫匠之流匹矣去昔奇兵變起呼吸雖凶渠即勦而人情更迷茅恬開城千齡出叛當此之時心膂胡越奉迎新亭者士庶填路投名朱雀者愚智空閨人惑而民不惑人畏而民不畏其一可論也臨機新亭獨能抽刃斬賊者唯有張敬兒而中書省獨能奮筆弗顧者唯有丘巨源文武相方誠有優劣就其死亡以決成敗當崩天之敵抗不測之禍請問海內此膽何如其二可論也又爾時顛沛普喚文士黃門中書靡不畢集摛翰振藻非為乏人朝廷洪筆何故假手凡賤若以此賊強盛勝負難測羣賢怯不染豪者則民宜以勇獲賞若云羽檄之難必須筆傑羣賢推能見委者則民宜以才賜外列其三可論也竊見桂陽賊賞不赦之條凡二十五人而李鍾爽同在此例戰敗後出罪並釋然而吳邁遠族誅之罰則操筆大禍而操戈尤害論以賞科則武人超越而文人埋沒其四可論也且邁遠置辭無乃侵慢民作符檄肆言詈辱放筆出手即就粉若使桂陽得志民若不轘裂軍門則應腰斬都市嬰孩脯膾伊可熟念其五可論也往年戎旅萬有餘甲十分之中九分冗隸可謂衆矣攀龍附驎翻焉雲翔至若民狂夫可謂寡矣徒關敕旨空然泥沈詎其荷瞂塵末皆是白起操牘事始必非魯連邪民傎國算迅足馳烽斾之機帝擇逸翰赴枤羅之會既能陵敵不殿爭先無負宜其微賜存在少沾飲齕遂乃棄之溝間如蜉如蟻擲之言外如土如灰絓隸帖戰無拳無勇並隨資峻級矣凡豫臺內不文不武已坐拱清階矣撫骸如此瞻例如彼既非草木何能弭聲巨源竟不被申歷佐諸王府轉羽林監建元元年為尚書主客郎領軍司馬越騎校尉除武昌太守拜竟不樂江外行世祖問之巨源曰古人云寧飲建業水不食武昌魚臣年已老寧死於建業以為餘杭令沈攸之事太祖使巨源為尚書符荊州巨源以此又望賞異自此意常不滿高宗為吳興巨源作秋胡詩有譏刺語以事見殺王智深字雲才琅邪臨沂人也少從陳郡謝超宗學屬文好飲酒拙澀乏風儀宋建平王景素為南徐州作觀法篇智深和之見賞辟為西曹書佐貧無衣未到職而景素敗後解褐為州祭酒太祖為鎮軍時丘巨源薦之於太祖板為府行參軍除豫章王國常侍遷太學博士豫章王大司馬參軍兼記室世祖使太子家令沈約撰宋書擬立袁粲傳以審世祖世祖曰袁粲自是宋家忠臣約又多載孝武明帝諸鄙瀆事上遣左右謂約曰孝武事迹不容頓爾我昔經事宋明帝卿可思諱惡之義於是多所省除又敕智深撰宋紀召見芙蓉堂賜衣服給宅智深告貧於豫章王王曰須卿書成當相論以祿書成三十卷世祖後召見智深於璿明殿令拜表奏上表未奏而世祖崩隆昌元年敕索其書智深遷為竟陵王司徒參軍坐事免江夏王鋒衡陽王鈞並善待之初智深為司徒袁粲所接及撰宋紀意常依依粲幼孤祖母名其為愍孫後慕荀粲自改名會稽賀喬譏之智深於是著論家貧無人事嘗餓五日不得食掘莧根食之司空王僧虔及子志分其衣食卒於家先是陳郡袁炳字叔明有文學亦為袁粲所知著晉書未成卒潁川庾銑善屬文見賞豫章王引至大司馬記室參軍卒陸厥字韓卿吳郡吳人揚州別駕間子也厥少有風概好屬文五言詩體甚新變永明九年詔百官舉士同郡司徒左西掾顧皓之表薦焉州舉秀才王晏少傅主簿遷後軍行參軍永明末盛為文章吳興沈約陳郡謝朓琅邪王融以氣類相推轂汝南周顒善識聲韻約等文皆用宮商以平上去入為四聲以此制韻不可增減世呼為永明體沈約宋書謝靈運傳後又論宮商厥與約書曰范詹事自序性別宮商識清濁特能適輕重濟艱難古今文人多不全了斯處縱有會此者不必從根本中來沈尚書亦云自靈均以來此祕未覩或暗與理合匪由思至張蔡曹王曾無先覺潘陸顏謝去之彌遠大旨鈞使宮羽相變低昂舛節若前有浮聲則後須切響一簡之內音韻盡殊兩句之中輕重悉異辭既美矣理又善焉但觀歷代衆賢似不都暗此處而云此祕未覩近於誣乎案范云不從根本中來尚書云匪由思至斯可謂揣情謬於玄黃擲句差其音律也范又云時有會此者尚書云或暗與理合則美詠清謳有辭章調韻者雖有差謬亦有會合推此以往可得而言夫思有合離前哲同所不免文有開塞即事不得無之子建所以好人譏彈士衡所以遺恨終篇既曰遺恨非盡美之作理可詆訶君子執其詆訶便謂合理為暗豈如指其合理而寄詆訶為遺恨邪自魏文屬論深以清濁為言劉楨奏書大明體勢之致岨峿妥怗之談操末續顛之説興玄黃於律呂比五色之相宣苟此祕未覩茲論為何所指邪故愚謂前英已早識宮徵但未屈曲指的若今論所申至於掩瑕藏疾合少謬多則臨淄所云人之著述不能無病者也非知之而不改謂不改則不知斯曹陸又稱竭情多悔不可力強者也今許以有病有悔為言則必自知無悔無病之地引其不了不合為暗何獨誣其一合一了之明乎意者亦質文時異古今好殊將急在情物而緩於章句情物文之所急美惡猶且相半章句意之所緩故合少而謬多義兼於斯必非不知明矣長門上林殆非一家之賦洛神池鴈便成二體之作孟堅精正詠史無虧於東主平子恢富羽獵不纍於憑虛王粲初征他文未能稱是楊修敏捷暑賦彌日不獻率意寡尤則事促乎一日翳翳愈伏而理賒於七步一人之思遲速天懸一家之文工拙壤隔何獨宮商律呂必責其如一邪論者乃可言未窮其致不得言曾無先覺也約答曰宮商之聲有五文字之別纍萬以纍萬之繁配五聲之約高下低昂非思力所舉又非止若斯而已也十字之文顛倒相配字不過十巧歷已不能盡何況復過於此者乎靈均以來未經用之於懷抱固無從得其髣佛矣若斯之妙而聖人不尚何邪此蓋曲折聲韻之巧無當於訓義非聖哲立言之所急也是以子雲譬之雕蟲篆刻云壯夫不為自古辭人豈不知宮羽之殊商徵之別雖知五音之異而其中參差變動所昧實多故鄙意所謂此祕未覩者也以此而推則知前世文士便未悟此處若以文章之音韻同弦管之聲曲則美惡妍蚩不得頓相乖反譬由子野操曲安得忽有闡緩失調之聲以洛神比陳思他賦有似異手之作故知天機啓則律呂自調六情滯則音律頓舛也士衡雖云炳若縟錦寧有濯色江波其中復有一片是衛文之服此則陸生之言即復不盡者矣韻與不韻復有精粗輪扁不能言老夫亦不盡辨此永元元年始安王遙光反厥父間被誅厥坐繫尚方尋有赦令厥恨父不及感慟而卒年二十八文集行於世會稽虞炎永明中以文學與沈約俱為文惠太子所遇意眄殊常官至驃驍騎將軍崔慰祖字悅宗清河東武城人也父慶緒永明中為梁州刺史慰祖解褐奉朝請父喪不食鹽母曰汝既無兄弟又未有子胤毀不滅性政當不進肴羞耳如何絶鹽吾今亦不食矣慰祖不得已從之父梁州之資家財千萬散與宗族漆器題為日字日字之器流乎遠近料得父時假貰文疏謂族子紘曰彼有自當見還彼無吾何言哉悉火焚之好學聚書至萬卷鄰里年少好事者來從假借日數十帙慰祖親自取與未常為辭為始安王撫軍墨曹行參軍轉刑獄兼記室遙光好數召慰祖對戲慰祖輒辭拙非朔望不見也建武中詔舉士從兄慧景舉慰祖及平原劉孝標並碩學帝欲試以百里慰祖辭不就國子祭酒沈約吏部郎謝朓嘗於吏部省中賓友俱集各問慰祖地理中所不悉十餘事慰祖口吃無華辭而酬據精悉一座稱服之朓歎曰假使班馬復生無以過此慰祖賣宅四十五萬買者云寧有減不答曰誠慚韓伯休何容二價買者又曰君但責四十六萬一萬見與慰祖曰是即同君欺人豈是我心乎少與侍中江祀款及祀貴常來候之而慰祖不往也與丹陽丞劉渢素善遙光據東府反慰祖在城內城未潰一日渢謂之曰卿有老母宜其出矣命門者出之慰祖詣闕自首繫尚方病卒慰祖著海岱志起太公迄西晉人物為四十卷半未成臨卒與從弟緯書云常欲更注遷固二史採史漢所泥漏二百餘事在廚簏可檢寫之以存大意海岱志良未周悉可寫數本付護軍諸從事人一通及友人任昉徐夤劉洋裴揆又令以棺親土不須磚勿設靈座時年三十五王逡之字宣約琅邪臨沂人也父祖皆為郡守逡之少禮學博聞起家江夏王國常侍大司馬行參軍章安令纍至始安內史不之官除山陽王驃騎參軍兼治書御史安成國郎中吳令升明末右僕射王儉重儒術逡之以著作郎兼尚書左丞參定齊國儀禮初儉撰古今喪服集記逡之難儉十一條更撰世行五卷轉國子博士國學久廢建元二年逡之先上表立學又兼著作撰永明起居注轉通直常侍驍騎將軍領博士著作如故出為寧朔將軍南康相太中光祿大夫加侍中逡之率素衣裘不浣機案塵黑年老手不釋卷建武二年卒從弟圭之有史學撰齊職儀永明九年其子中軍參軍皓上啓曰臣亡父故長水校尉圭之藉素為基依儒習性以宋元徽二年被敕使纂集古設官歷代分職凡在墳策必盡詳究是以等級掌司咸加編録黜陟遷補悉該研記述章服之差兼冠佩之飾屬值啓運軌度惟新故太宰臣淵奉宣敕旨使速洗正刊定未畢臣私門凶禍不揆庸微謹冒啓上凡五十卷謂之齊職儀仰希永升天閣長銘祕府詔付祕閣祖沖之字文遠范陽薊人也祖昌宋大匠卿父朔之奉朝請沖之少稽古有機思宋孝武使直華林學省賜宅宇車服解褐南徐州迎從事公府參軍宋元嘉中用何承天所制歷比古十一家為密沖之以為尚疏乃更造新法上表曰臣博訪前墳遠稽昔典五帝次三王交分春秋朔氣紀年薄蝕談遷載述彪固列志魏世注歷晉代起居探異今古觀要華戎書契以降二千餘稔日月離會之徵星度疏密之驗專功耽思咸可得而言也加以親量圭尺躬察儀漏目盡毫氂心窮籌策考課推移又曲備其詳矣然而古曆疏舛類不精密羣氏糾紛莫審其會尋何承天所上意存改革而置法簡略今已乖遠以臣校之三覩厥謬日月所在差覺三度二至晷景幾失一日五星見伏至差四旬留逆進退或移兩宿分至失實則節閏非正宿度違天則伺察無準臣生屬聖辰詢逮在運敢率愚瞽更創新曆謹立改易之意有二設法之情有三改易者一以舊法一章十九歲有七閏閏數為多經二百年輒差一日節閏既移則應改法曆紀屢遷實由此條今改章法三百九十一年有一百四十四閏令却合周漢則將來永用無復差動其二以堯典云日短星昴以正仲冬以此推之唐世冬至日在今宿之左五十許度漢伐代之初即用秦曆冬至日在牽牛六度漢武改立太初曆冬至日在牛初後漢四分法冬至日在斗二十二晉世薑岌以月蝕檢日知冬至在斗十七今參以中星課以蝕望冬至之日在斗十一通而計之未盈百載所差二度舊法並令冬至日有定處天數既差則七曜宿度漸與舛訛乖謬既著輒應改易僅合一時莫能通遠遷革不已又由此條今令冬至所在歲歲微差却檢漢注並皆審密將來久用無煩屢改又設法者其一以子為辰首位在正北爻應初九升氣之端虛為北方列宿之中元氣肇初宜在此次前儒虞喜備論其義今曆上元日度發自虛一其二以日辰之號甲子為先曆法設元應在此歲而黃帝以來世代所用凡十一曆上元之歲莫值此名今曆上元歲在甲子其三以上元之歲曆中衆條並應以此為始而景初曆交會遲疾元首有差又承天法日月五星各自有元交會遲疾亦並置差裁得朔氣合而已條序紛錯不及古意今設法日月五緯交會遲疾悉以上元歲首為始羣流共源庶無乖誤若夫測以定形據以實效懸象著明尺表之驗可推動氣幽微寸管之候不忒今臣所立易以取信但綜核始終大存緩密革新變舊有約有繁用約之條理不自懼用繁之意顧非謬然何者夫紀閏參差數各有分分之為體非不細密臣是用深惜毫釐以全求妙之準不辭積纍以成永定之製非為思而莫知悟而弗改也若所上萬一可採伏願頒宣羣司賜垂詳究事奏孝武令朝士善曆者難之不能屈會帝崩不施行出為婁縣令謁者僕射初宋武平關中得姚興指南車有外形而無機巧每行使人於內轉之升明中太祖輔政使沖之追修古法沖之改造銅機圓轉不窮而司方如一馬均以來未有也時有北人索馭驎者亦云能造指南車太祖使與沖之各造使於樂遊苑對共校試而頗有差僻乃毀焚之永明中竟陵王子良好古沖之造欹器獻之文惠太子在東宮見沖之曆法啓世祖施行文惠尋薨事又寢轉長水校尉領本職沖之造安邊論欲開屯田廣農殖建武中明帝使沖之巡行四方興造大業可以利百姓者會連有軍事事竟不行沖之解鍾律博塞當時獨絶莫能對者以諸葛亮有木牛流馬乃造一器不因風水施機自運不勞人力又造千里船於新亭江試之日行百餘里於樂遊苑造水碓磨世祖親自臨視又特善永元二年沖之卒年七十二著易老莊義釋論語孝經注九章造綴述數十篇賈淵字希鏡平陽襄陵人也祖弼之晉員外郎父匪之驃騎參軍世傳譜學孝武世青州人發古冢銘云青州世子東海女郎帝問學士鮑照徐爰蘇寶生並不能悉淵對曰此是司馬越女嫁苟晞兒檢訪果然由是見遇敕淵注郭子泰始初辟丹陽郡主簿奉朝請太學博士安成王撫軍行參軍出為丹徒令升明中太祖嘉淵世學取為驃騎參軍武陵王國郎中令補餘姚令未行仍為義興郡丞永明初轉尚書外兵郎歷大司馬司徒府參軍竟陵王子良使淵撰見客譜出為句容令先是譜學未有名家淵祖弼之廣集百氏譜記專心治業晉太元中朝廷給弼之令史書吏撰定繕寫藏祕閣乃及遷左民曹淵父及淵三世傳學凡十八州士族譜合百帙七百餘卷該究精悉當世莫比永明中衛軍王儉抄次百家譜與淵參懷撰定建武初淵遷長水校尉荒傖人王泰寶買襲琅邪譜尚書令王晏以啓高宗淵坐被求收當極法子棲長謝罪稽顙流血朝廷哀之免淵罪數年始安王遙光板撫軍咨議不就仍為北中郎參軍中興元年卒年六十二撰氏族要狀及人名書並行於世史臣曰文章者蓋情性之風標神明之律呂也蘊思含毫遊心內運放言落紙氣韻天成莫不稟以生靈遷乎愛嗜機見殊門賞悟紛雜若子桓之品藻人才仲治之區判文體陸機辨於文賦李充論於翰林張視擲句褒貶顏延圖寫情興各任懷抱共為權衡屬文之道事出神思感召無象變化不窮俱五聲之音響而出言異句等萬物之情狀而下筆殊形吟詠規範本之雅什流分條散各以言區若陳思代馬羣章王粲飛鸞諸製四言之美前超後絶少卿離辭五言才骨難與爭鶩桂林湘水平子之華篇飛館玉池魏文之麗篆七言之作非此誰先卿雲巨麗升堂冠冕張左恢廓登高不繼賦貴披陳未或加矣顯宗之述傅毅簡文之摛彥伯分言制句多得頌體裴頠內侍元規鳳池子章以來章表之選孫綽之碑嗣伯喈之後謝莊之誄起安仁之塵顏延楊瓚自比馬督以多稱貴歸莊為允王褒僮約束發蒙滑稽之流亦可奇瑋五言之製獨秀衆品習玩為理事久則瀆在乎文章彌患凡舊若無新變不能代雄建安一體典論短長互出潘陸齊名機嶽之文永異江左風味盛道家之言郭璞舉其靈變許詢極其名理仲文玄氣猶不盡除謝混情新得名未盛顏謝並起乃各擅奇休鮑後出咸亦標世朱藍共妍不相祖述今之文章作者雖衆總而為論略有三體一則啓心間繹託辭華曠雖存巧綺終致迂回宜登公宴本非準的而疏慢闡緩膏肓之病典正可採酷不入情此體之源出靈運而成也次則緝事比類非對不發博物可嘉職成拘制或全借古語用申今情崎嶇牽引直為偶説唯覩事例頓失清采此則傅咸五經應璩指事雖不全似可以類從次則發唱驚挺操調險急雕藻淫豔傾炫心魂亦猶五色之有紅紫八音之有鄭衛斯鮑照之遺烈也三體之外請試妄談若夫委自天機參之史傳應思悱來勿先構聚言尚易了文憎過意吐石含金滋潤婉切雜以風謠輕脣利吻不雅不俗獨中胸懷輪扁輪言之未盡文人談士罕或兼工非唯識有不周道實相妨談家所習理勝其辭就此求文終然翳奪故兼之者鮮矣贊曰學亞生知多識前仁文成筆下芬藻麗春
