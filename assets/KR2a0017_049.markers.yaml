  - {type: variant, offset: 3870, length: 5, content: 賒除青右疑, WYG: 賖南齊書卷四十九南齊書卷四十九考證王奐傳上遣中書舍人吕文顯直閤将軍曹道剛領齋仗五百人收奐臣祖庚按通鑑注云齋仗齋庫精仗以給禁衛勇力之士曹吕今來既不見真勅恐為奸變政宜録取馳啓聞耳臣承蒼按南史載叡諫奐當白服接臺使又勸奐仰藥自全與此傳不同奐長子太子中庶子融融弟司徒從事中郎琛於都棄市臣祖庚按琛弟肅此不載以其入魏也又按南史奐弟份自拘請罪帝宥之肅屢引魏人至邊帝謂份曰比有北信不份曰肅近忘墳柏寧逺憶有臣此亦不載通鑑考異曰奐以三月死帝以七月殂是冬肅始見魏主於鄴南史誤也張沖傳沖在鎮四時還吳園中諸本同吳園中南史作吳國停住夏口浦夏口南史作夏首士庶病死者七八百家臣祖庚按梁髙祖紀及韋叡傳作死者什七八通鑑考異曰按死者不可以家數也南齊書卷四十九考證}
