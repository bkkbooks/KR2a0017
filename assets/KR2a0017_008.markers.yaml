  - {type: variant, offset: 1528, length: 0, content: '', WYG: 南齊書卷八南齊書卷八考證和帝本紀有司奏封庶人寳卷為零陽侯零陽南史作零陵中興二年二月壬戌湘東王寳晊伏誅臣祖庚按明帝十一男湘東無傳南史王亮傳云張稷等議立湘東嗣王寳晊領軍王瑩曰城閉已久人情離解征東在近何不諮問紀不載其事通鑑考異云和帝已立稷等知建康不可守故弑東昬豈敢復議立寳晊據此則議立湘東之説南史誤矣是時衍已有異志諸王無不見害湘東獨能自存乎南齊書卷八考證}
