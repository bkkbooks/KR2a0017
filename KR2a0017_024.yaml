body:
  text: 南齊書卷二十四列傳第五柳世隆張瓌柳世隆字彥緒河東解人也祖憑馮翊太守父叔宗早卒世隆少有風器伯父元景宋大明中為尚書令獨賞愛之異於諸子言於孝武帝得召見帝曰三公一人是將來事也海陵王休茂為雍州辟世隆為迎主簿除西陽王撫軍法曹行參軍出為虎威將軍上庸太守帝謂元景曰卿昔以虎威之號為隨郡今復以授世隆使卿門世不絕公也元景為景和所殺世隆以在遠得免泰始初諸州反叛世隆以門禍獲申事由明帝乃據郡起兵遣使應朝廷弘農人劉僧驎亦聚衆應之收合萬人奄至襄陽萬山為孔道存所破衆皆奔散僅以身免逃藏民閒事平乃出還為尚書儀曹郎明帝嘉其義心發詔擢為太子洗馬出為寧遠將軍巴西梓潼太守還為越騎校尉轉建平王鎮北諮議參軍領南泰山太守轉司馬東海太守入為通直散騎常侍尋為晉熙王安西司馬加寧朔將軍時世祖為長史與世隆相遇甚懽太祖之謀渡廣陵也令世祖率衆下同會京邑世隆與長流蕭景先等戒嚴待期事不行是時朝廷疑憚沈攸之密為之防府州器械皆有素蓄世祖將下都劉懷珍白太祖曰夏口是兵衝要地宜得其人太祖納之與世祖書曰汝既入朝當須文武兼資人與汝意合者委以後事世隆其人也世祖舉世隆自代轉為武陵王前軍長史江夏內史行郢州事昇明元年冬攸之反遣輔國將軍中兵參軍孫同寧朔將軍中兵參軍武寶龍驤將軍騎兵參軍朱君拔寧朔將軍沈惠真龍驤將軍騎兵參軍王道起三萬人為前驅又遣司馬冠軍劉攘兵領寧朔將軍外兵參軍公孫方平龍驤將軍騎兵參軍朱靈真沈僧敬龍驤將軍高茂二萬人次之又遣輔國將軍王靈秀丁珍東寧朔將軍中兵參軍王彌之寧朔將軍外兵參軍楊景穆二千匹騎分兵出夏口據魯山攸之乘輕舸從數百人先大軍下住白螺洲坐胡床以望其軍有自驕色既至郢以郢城弱小不足攻遣人告世隆曰被太后令當蹔還都卿既相與奉國想得此意世隆使人答曰東下之師久承聲問郢城小鎮自守而已攸之將去世隆遣軍於西渚挑戰攸之果怒令諸軍登岸燒郭邑築長圍攻道顧謂人曰以此攻城何城不剋晝夜攻戰世隆隨宜拒應衆皆披却世祖初下與世隆別曰攸之一旦為變焚夏口舟艦沿流而東則坐守空城不可制也雖留攻城不可卒拔卿為其內我為其外乃無憂耳至是世祖遣軍主桓敬陳胤叔苟元賓等八軍據西塞令堅壁以待賊疲慮世隆危急遣腹心胡元直潛使入郢城通援軍消息內外並喜尚書符曰沈攸之出自壠畝寂寥累世故司空沈公以從父宗廕愛之若子羽翼吹噓得昇官次景和昏悖猜畏柱臣而攸之凶忍趣利樂禍請銜詔旨躬行反噬又攸之與譚金童泰壹等暴寵狂朝並為心膂同功共體世號三侯當時親昵情過管鮑仰遭革運凶黨懼戮攸之反善圖全用得自免既殺從父又虐良朋雖呂布販君酈寄賣友方之斯人未足為酷泰始開闢網漏吞舟略其凶險取其搏噬故階亂獲全因禍興福攸之稟性空淺躁而無謀濃湖土崩本非己力彭城下邳望旗宵遁再紹棄王師久應肆法值先帝宥其回溪之恥冀有封崤之捷故得幸會推遷頻煩顯授內端戎禁外綏萬里聖去鼎湖遠頒顧命託寄崇深義感金石而攸之始奉國諱喜形于顏普天同哀己以為慶累登蕃岳自郢遷荊晉熙王以皇弟代鎮地尊望重攸之斷割候迎肆意陵略料擇士馬簡算器械權撥精銳並取自隨郢城所留十不遺一專恣鹵奪罔顧國典踐荊已來恆用姦數既懷異志興造無端乃蹙迫羣蠻騷擾山谷揚聲討伐盡戶上丁蟻聚郭邑伺國衰盛從來積年求不解甲遂四野百縣路無男人耕田載租皆驅女弱自古酷虐未聞於此昔歲桂陽內奰宗廟阽危攸之任官上流兵彊地廣勤王之舉寔宜悉行裁遣羸弱不滿三千至郢州稟受節度欲令判否之日委罪晉熙招誘劒客羈絆行侶竄叛入境輒加擁護逋亡出界必遣窮追視吏若讎遇民如草峻太半之賦暴參夷之刑鞭箠國士全用虜法一人逃亡闔宗捕逮皇朝赦令初不遵奉曠蕩之澤長隔彼州人懷怨望十室而九今乃舉兵內侮姦回外熾斯寔惡熟罪成之辰決癰潰疽之日幕府過荷朝寄義百常憤董御元戎龔行天罰今遣新除使持節郢州司州之義陽諸軍事平西將軍郢州刺史聞喜縣開國侯黃回員外散騎常侍輔國將軍驍騎將軍重安縣開國子軍主王敬則屯騎校尉長壽縣開國男軍主王宜與屯騎校尉陳承叔右軍將軍葛陽縣開國男彭文之驃騎行參軍振武將軍邰宰精甲二萬衝其首旆又遣散騎常侍游擊將軍臨湘南縣開國男呂安國持節寧朔將軍越州刺史孫曇瓘屯騎校尉寧朔將軍崔慧景寧朔將軍左軍將軍新亭侯任候伯龍驤將軍虎賁中郎將尹略屯騎尉南城令曹虎頭輔國將軍驍騎將軍蕭順之新除寧朔將軍游擊將軍下邳縣開國子垣崇祖等舳艫二萬駱驛繼邁又遣屯騎校尉苟元賓撫軍參軍郭文考撫軍中兵參軍程隱儁奉朝請諸襲光等輕艓一萬截其精津要驍騎將軍周盤龍後將軍成買輔國將軍王勑勤屯騎校尉王洪範等騎五千步道繼進先據陸路斷其走伏持節督雍梁二州郢州之竟陵司州之隨郡諸軍事征虜將軍寧蠻校尉雍州刺史襄陽縣開國侯新除鎮軍將軍張敬兒志節慷慨卷甲樊鄧水步俱馳破其巢窟持節督司州諸軍事征虜將軍司州刺史領義陽太守范陽縣侯姚道和義烈梗㮣投袂方隅風馳電掩襲其輜重萬里建旍四方飛旆莫不總率衆師雲翔雷動人神同憤遠邇并心今皇上聖明將相仁愛約法三章寬刑緩賦年登歲阜家給人足上有惠民之澤下無樂亂之心攸之不識天時妄圖大逆舉無名之師驅讎怨之衆是以朝野審其易取含識判其成禽彼土士民罹毒日久今復相逼迫投赴鋒刃交戰之日蘭艾難分去就在機望思先曉無使一人迷疑而九族就禍也弘宥之典有如皎日郢城既不可攻而平西將軍黃回軍至西陽乘三層艦作羌胡伎泝流而進攸之素失人情本逼以威力初發江陵已有叛者至是稍多攸之日夕乘馬歷營撫慰而去者不息攸之大怒召諸軍主曰我被太后令建義下都大事若剋白紗帽共著耳如其不振朝廷自誅我百口不關餘人比軍人叛散皆卿等不以為意我亦不能問叛身自今軍中有叛者軍主任其罪於是一人叛遣十人追竝去不反莫敢發覺咸有異計劉攘兵射書與世隆許降世隆開門納之攘兵燒營而去火起乃覺攸之怒銜鬚咀之收攘兵兄子天賜女壻張平虜斬之軍旅大散攸之渡魯山岸猶有數十匹騎自隨宣令軍中曰荊州城中大有錢可相與還取以為資糧郢城未有追軍而散軍畏蠻抄更相聚結可二万人隨攸之將至江陵乃散世隆乃遣軍副劉僧驎道追之攸之已死徵為侍中仍遷尚書右僕射封貞陽縣侯邑二千戶出為左將軍吳郡太守加秩中二千石丁母憂太祖踐阼起為使持節都督南豫司二州諸軍事平南將軍南豫州刺史進爵為公上手詔與司徒褚淵曰向見世隆毀瘠過甚殆欲不可復識非直使人惻然實亦世珍國寶也淵答曰世隆至性純深哀過乎禮事陛下在危盡忠喪親居憂杖而後起立人之本二理同極加榮增寵足以厲俗敦風建元二年進號安南將軍是時虜寇壽陽上敕世隆曰歷陽城大恐不可卒治正宜斷隔之深為保固處分百姓若不將家守城單身亦難可委信也尋又敕曰吾更歷陽外城若有賊至即勒百姓守之故應勝割棄也垣崇祖既破虜上欲罷併二豫敕世隆曰比思江西蕭索二豫兩辦為難議者多云省一足一於事為便吾謂非乃乖謬卿以為云何可具以聞尋授後將軍尚書右僕射不拜世隆性愛涉獵啟太祖借祕閣書上給二千卷三年出為使持節督南六允阨青冀五州軍事安北將軍南六允州刺史江北畏虜寇搔動不安上敕世隆曰比有北信賊猶治兵在彭城年已垂盡或當未必送死然豺狼不可以理推為備或不可懈彼郭既無關要用宜開除使去金城三十丈政佳耳發民治之無嫌若作三千人食者已有幾米可指牒付信還民閒若有丁多而細口少者悉令戍非疑也又敕曰昨夜得北使啟鍾離閒賊已渡淮既審送死便當制加剿撲卿好參候之有急令諸小戍還鎮不可賊至不覺也賊既過淮不容邇退散要應有處送死者定攻壽陽吾當遣援軍也又遣軍助世隆并給軍糧虜退上欲土斷江北又敕世隆曰呂安國近在西土斷郢司二境上雜民大佳民殆無驚恐近又令垣豫州斷其州內商得崇祖啟事已行竟近無云云殊稱前代舊意卿視六允部中可行此事不若無所擾春便就手也其見親委如此世祖即位加散騎常侍世隆善卜別龜甲價至一萬永明建號世隆題州齋壁曰永明十一年謂典籤李黨曰我不見也入為侍中護軍將軍遷尚書右僕射領太子右率雍州大中正不拜改授散騎常侍尚書左僕射中正如故湘州蠻動遣世隆以本官總督伐蠻衆軍仍為使持節都督湘州諸軍事鎮南將軍湘州刺史常侍如故世隆至鎮以方略討平之在州立邸治生為中丞庾杲之所奏詔原不問復入為尚書左僕射領衞尉不拜仍轉尚書令世隆少立功名晚專以談義自業善彈琴世稱柳公雙璅為士品第一常自云馬矟第一清談第二彈琴第三在朝不干世務垂簾鼓琴風韻清遠甚獲世譽以疾遜位改授侍中衞將軍不拜轉左光祿大夫侍中如故九年卒時年五十詔給東園祕器朝服一具衣一襲錢一十万布三百匹蠟三百斤又詔曰故侍中左光祿大夫貞陽公世隆秉德居業才兼經緯少播清徽長弘美譽入參內禁出贊西牧專寄郢郊剋挫巨猾超越前勳功著一代及總任方州民頌寬德翼教崇闥朝稱元正忠謨嘉猷簡于朕心雅志素履邈不可踰將登鉉味用燮鴻化奄至薨殞震慟良深贈司空班劒三十人鼓吹一部侍中如故諡曰忠武上又敕吏部尚書王晏曰世隆雖抱疾積歲志氣未衰冀醫藥有効痊差可期不謂一旦便為異世痛怛之深此何可言其昔在郢誠心夙閒悃全保一蕃勳業克著尋准契闊增泣悲咽卿同在情亦當無已已耶世隆曉數術於倪塘創墓與賓客踐履十往五往常坐一處及卒墓正取其坐處焉著龜經祕要二卷行於世長子悅早卒張瓌字祖逸吳郡吳人也祖裕宋金紫光祿大夫父永右光祿大夫曉音律宋孝武問永以太極殿前鍾聲嘶永答鍾有銅滓乃扣鍾求其處鑿而去之聲遂清越瓌解褐江夏王太尉行參軍署外兵隨府轉為太傅五官為義恭所遇遷太子舍人中書郎驃騎從事中郎司徒右長史初永拒桂陽賊於白下潰散阮佃夫等欲加罪太祖固申明之瓌由此感恩自結轉通直散騎常侍驍騎將軍遭父喪還吳持服昇明元年劉秉有異圖弟遐為吳郡潛相影響因沈攸之事難聚衆三千人治攻具太祖密遣殿中將軍卞白龍令瓌取遐諸張世有豪氣瓌宅中常有父時舊部曲數百遐召瓌瓌偽受旨與叔恕領兵十八人入郡與防郡隊主彊弩將軍郭羅雲進中齋取遐遐踰窻而走瓌部曲顧憲子手斬之郡內莫敢動者獻捷太祖以告領軍張沖沖曰瓌以百口一擲出手得盧矣即授輔國將軍吳郡太守封瓌義成縣侯邑千戶太祖故以嘉名錫之除冠軍將軍東海東莞二郡太守不拜建元元年增邑為二百戶尋改封平都遷侍中加領步兵校尉二年遷都官尚書領校尉如故出為征虜將軍吳興太守三年烏程令顧昌玄有罪瓌坐不糾免官明年為度支尚書世祖即位為冠軍將軍鄱陽王北中郎長史襄陽相行雍州府州事隨府轉征虜長史四年仍為持節督雍梁南北秦四州郢州之竟陵司州之隨郡軍事輔國將軍雍州刺史尋領寧蠻校尉還為左民尚書領右軍將軍遷冠軍將軍大司馬長史十年轉太常自陳衰疾願從閑養明年轉散騎常侍光祿大夫頃之上欲復用瓌乃以為後將軍南東海太守秩中二千石行南徐州府州事又行河東王國事到官復稱疾還為散騎常侍光祿大夫酼林即位加金章紫綬隆昌元年給親信二十人酼林廢朝臣到宮門參承高宗瓌託脚疾不下海陵立加右將軍高宗疑外蕃起兵以瓌鎮石頭督衆軍事瓌見朝廷多難遂恆臥疾建武元年轉給事中光祿大夫親信如故月加給錢二萬二年虜盛詔瓌以本官假節督廣陵諸軍事行南六允州事虜退乃還瓌居室豪富伎妾盈房有子十餘人常云其中要應有好者建武末屢啟高宗還吳見許優游自樂或有譏瓌衰暮畜伎瓌曰我少好音律老而方解平生嗜欲無復一存唯未能遣此處耳高宗疾甚防疑大司馬王敬則以瓌素著幹略授平東將軍吳郡太守以為之備及敬則反瓌遣將吏三千人迎拒於松江聞敬則軍鼓聲一時散走瓌棄郡逃民閒事平瓌復還郡為有司所奏免官削爵永元初為光祿大夫尋加前將軍金章紫綬三年義師下東昏假瓌節戍石頭義師至新亭瓌棄城走還宮梁初復為光祿天監四年卒史臣曰文以附衆武以立威元帥之才稱為國輔沈攸之十年治兵白首舉事荊楚上流方江東下斯驅除之巨難帝王之大敵柳世隆勢居中夏年淺位輕首抗全師孤城挑攻臨埤授策曾無汗馬勍寇乖沮力屈於高墉亂轍爭先降奔郢路陸遜之破玄德不是過也及世道清寧出牧內佐體之以風素居之以雅德固興家之盛美也贊曰忠武匡贊實號兼資廟堂析理高壘搴旗游藝善術安絃拂龜義成祚土功立帝基
