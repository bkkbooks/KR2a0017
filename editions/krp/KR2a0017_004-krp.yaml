body:
  text: 南齊書卷四梁蕭子顯撰本紀第四鬱林王鬱林王昭業字元尚文恵太子長子也小名法身世祖即位封南郡王二千戸永眀五年十一月戊子冠扵東宫崇政殿其日小會賜王公以下帛各有差給昭業扶二人七年有司奏給班劍二十人鼓吹一部髙選友學十一年給皁輪三望車詔髙選國官文恵太子薨立昭業為皇太孫居東宫世祖崩太孫即位八月壬午詔稱先帝遺詔以䕶軍将軍武陵王曄為衛将軍征南大将軍陳顯達即夲號竝開府儀同三司尚書左僕射西昌侯鸞為尚書令太孫詹事沈文季為䕶軍将軍癸未以司徒竟陵王子良為太傅詔曰朕以寡薄嗣膺寳政對越靈命欽若前圖思所以敬守成規拱揖羣后哀荒在日有懵大猷宜育徳振民光昭睿範凡逋三調及衆債在今年七月三十日前悉同蠲除其備償封籍貨鬻未售亦皆還主御府諸署池田邸冶興廢㳂事本施一時扵今無用者詳所罷省公宜權禁一以還民關市征賦務従優減丙戌詔曰近北掠餘口悉充軍實刑故無小罔或攸赦撫辜興仁事深睿範宜従蕩宥許以自新可一同放遣還復民籍已賞賜者亦皆為贖辛丑詔曰往嵗蠻虜協謀志擾邉服羣帥授略大殲凶醜革城克㨗及舞隂固守二處勞人未有沾爵賞者可分遣選部往彼序用九月癸丑詔東西二省府國長屯所積財單禄寡良以矜懐選部可甄才品能推校年月邦守邑丞随宜量處以貧為先辛酉追尊文恵皇太子為世宗文皇帝冬十月壬寅尊皇太孫太妃為皇太后立皇后何氏十一月辛亥立臨汝公昭文為新安王曲江公昭秀為臨海王皇弟昭粲為永嘉王隆昌元年春正月丁未改元大赦加太傅竟陵王子良殊禮驍騎将軍晉熙王銶為郢州刺史丹陽尹安陸王子敬為南兗州刺史征北大将軍晉安王子懋為江州刺史臨海王昭秀為荆州刺史永嘉王昭粲為南徐州刺史征南大将軍陳顯達進號車騎大将軍郢州刺史建安王子真為䕶軍将軍詔百僚極陳得失又詔王公以下各舉所知戊申以䕶軍将軍沈文季為領軍将軍己酉以前将軍曺虎為雍州刺史右衛将軍薛淵為司州刺史庚戌以寧朔将軍蕭懿為梁南秦二州刺史輔國長史申希祖為交州刺史辛亥車駕祀南郊詔曰執耜暫忘懸磬比室秉機或惰無褐終年非怠非荒雖由王道不稂不莠實賴民和頃嵗多稼無爽遺秉如積而三登之善未臻萬斯之基尚逺且風土異宜百民舛務刑章治緒未必同源妨夲害政事非一揆冕旒属念無忘夙興可嚴下州郡務滋耕殖相畆闢疇廣開地利深樹國本克阜民天又詢訪獄市博聴謡俗傷風損化各以條聞主者詳為條格戊午車駕拜景安陵己巳以新除黄門侍郎周奉叔為青州刺史二月辛夘車駕祀眀堂夏四月辛巳衛将軍開府儀同三司武陵王曄薨戊子太傅竟陵王子良薨戊戌以前沙州刺史楊炅為沙州刺史丁酉以驃騎将軍廬陵王子卿為衛将軍尚書右僕射鄱陽王鏘為驃騎将軍竝開府儀同三司閏月乙丑以南東海太守蕭頴胄為青冀二州刺史丁夘鎮軍大将軍鸞即本號開府儀同三司戊辰以中軍将軍新安王昭文為揚州刺史六月丙寅以黄門侍郎王思逺為廣州刺史秋七月庚戌以中書郎蕭遥欣為兗州刺史東莞太守臧靈智為交州刺史癸巳皇太后令曰鎮軍車騎左僕射前将軍領軍左衛衛尉八座自我皇厯唘基受終扵宋睿聖繼軌三葉重光太祖以神武創業草昧區夏武皇以英眀提極經緯天人文帝以上哲之資體元良之重雖功未被物而徳已在民三靈之眷方永七百之基已固嗣主特鍾沴氣爰表弱齡險戾著扵緑車愚固彰扵崇正狗馬是好酒色方湎所務惟鄙事所疾惟善人世祖慈愛曲深每加容掩冀年志稍改立守神器自入纂鴻業長惡滋甚居喪無一日之哀縗絰為歡宴之服昬酣長夜萬幾斯壅發號施令莫知所従閹竪徐龍駒専總樞密奉叔珍之互執權柄自以為任得其人表裏緝穆邁蕭曺而愈信布倚太山而坐平原扵是恣情肆意罔顧天顯二帝姬嬪竝充寵御二宫遺服皆納玩府内外混漫男女無别丹屏之北為酤鬻之所青蒲之上開桑中之肆又微服潛行信次忘反端委以朝虚位交㦸而守空宫積旬矣宰輔忠賢盡誠奉主誅鋤羣小兾能悛革曽無克己更深怨憾公卿股肱以異已寘戮文武昭穆以徳譽見猜放肆醜言将行屠膾社稷危殆有過綴旒昔太宗克光扵漢世簡文代興扵晉氏前事之不忘後人之師也鎮軍居正體道家國是賴伊霍之舉實寄淵謨便可詳依舊典以禮廢黜中軍将軍新安王體自文皇睿哲天秀宜入嗣鴻業永寧四海外即以禮奉迎未亡人屬此多難投筆増慨昭業少羙容止好𨽻書世祖勑皇孫手書不得妄出以貴重之進對音吐甚有令譽王侯五日一問訊世祖常獨呼昭業至幄座别加撫問呼為法身鍾愛甚重文恵皇太子薨昭業每臨哭輒號咷不自勝俄爾還内歡笑極樂在世祖喪哭泣竟入後宫嘗列胡妓二部夾閣迎奏為南郡王時文恵太子禁其起居節其用度昭業謂豫章王妃庾氏曰阿婆佛法言有福徳生帝王家今日見作天王便是大罪左右主帥動見拘執不如作市邉屠酤富兒百倍矣及即位極意賞賜動百數十萬每見錢輒曰我昔時思汝一文不得今得用汝未期年之間世祖齋庫儲錢數億垂盡開主衣庫與皇后寵姬觀之給閹人竪子各數人随其所欲恣意輦取取諸寳器以相剖撃破碎之以為笑樂居嘗躶袒著紅縠褌雜采袒服好鬪雞密買雞至數千價世祖御物甘草杖宫人寸斷用之毁世祖招婉殿乞閹人徐龍駒為齋龍駒尤親幸為後閣舍人日夜在六宫房内昭業與文帝幸姬霍氏滛通龍駒勸長留宫内聲云度霍氏為尼以餘人代之嘗以邪諂自進每謂人曰古時亦有監作三公者皇后亦淫亂齋閣通夜洞開内外淆雜無復分别中書舍人綦母珍之朱隆之直閣将軍曺道剛周奉叔竝為帝羽翼髙宗屢諌不納先唘誅龍駒次誅奉叔及珍之帝竝不能違既而尼媪外入頗傳異語乃疑髙宗有異志中書令何𦙍以皇后従叔見親使直殿省嘗随后呼𦙍為三父與𦙍謀誅髙宗令𦙍受事𦙍不敢當依違杜諌帝意復止乃謀出髙宗扵西州中勑用事不復關諮髙宗慮變定謀廢帝二十二日壬辰使蕭諶坦之等扵省誅曺道剛朱隆之等率兵自尚書入雲龍門戎服加朱衣扵上比入門三失履王晏徐孝嗣蕭坦之陳顯達王廣之沈文季係進帝在夀昌殿聞外有變使閉内殿諸房閣令閹人登興光樓望還報云見一人戎服従數百人急装在西鍾樓下須臾蕭諶領兵先入宫截夀昌閣帝赱向愛姬徐氏房拔劍自刺不中以帛纒頸輿接出延徳殿諶初入殿宿衛将士皆􅋵弓楯欲拒戰諶謂之曰所取自有人卿䒭不須動宿衛信之及見帝出各欲自奮帝竟無一言出西弄殺之時年二十一輿尸出徐龍駒宅殯葬以王禮餘黨亦見誅史臣曰鬱林王風華外羙衆所同惑伏情隠詐難以貌求立嫡以長未知瑕舋世祖之心不變周道既而諐鄙内作兆自宫闈雖為害未逺足傾社稷春秋書梁伯之過言其自取亡也賛曰十諐有一無國不失鬱林負荷棄禮亡律南齊書卷四南齊書卷四考證鬱林王夲紀出西弄臣祖庚按通鑑注云此延徳殿之西弄也集韻曰弄厦也屏也亦作􅕆南齊書卷四考證
