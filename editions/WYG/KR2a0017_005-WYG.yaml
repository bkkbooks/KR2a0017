front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0017_WYG_005-1a, image: WYG0259/WYG0259-0055c.png}
body:
  text: 南齊書卷五梁蕭子顯撰本紀第五海陵王海陵恭王昭文字季尚文恵太子第二子也永明四年封臨汝公邑千五百戸初為輔國将軍濟陽太守十年轉持節督南豫州諸軍事南豫州刺史将軍如故十一年進號冠軍将軍文恵太子薨還都鬱林王即位為中軍将軍領兵置佐封新安王邑二千戸隆昌元年為使持節都督揚南徐二州諸軍事揚州刺史将軍如故其年鬱林王廢尚書令西昌侯鸞議立昭文為帝延興元年秋七月丁酉即皇帝位以尚書令鎮軍大将軍西昌侯鸞為驃騎大将軍録尚書事揚州刺史宣城郡公詔曰太祖髙皇帝英謀光大受命作齊世祖武皇帝宏猷冠世繼暉下武世宗文皇帝清眀懿鑠四海宅心竝徳漏下泉功昭上象聲教所覃無思不洽洪基式固景祚方融而天歩多阻運鍾否剥嗣君昬忍暴戾滋多棄侮天經悖滅人紀朝野重足遐邇側視民怨神恫宗祧如綴賴忠謨肅舉霄漢廓清俾三后之業絶而更紐七百之慶危而復安猥以沖人入纂乾緒載懐馭朽若墜諸淵思與黎元共綏戩福大赦改元文武賜位二等八月甲辰以新除衛尉蕭諶為中領軍司空王敬則進位太尉新除車騎大将軍陳顯達為司空尚書左僕射王晏為尚書令左衛将軍王廣之為豫州刺史驃騎大将軍鄱陽王鏘為司徒詔遣大使巡行風俗丁未詔曰新安國五品以上悉與滿叙自此以下皆聽解遣其欲仕者適其所樂以驍騎将軍河東王鉉為南徐州刺史西中郎将臨海王昭秀為車騎将軍南徐州刺史永嘉王昭粲為荆州刺史戊申以輔國将軍王詡為廣州刺史中書郎蕭遥欣為兖州刺史庚戌以車騎板行參軍李慶綜為寧州刺史辛亥以安西将軍王𤣥邈為中䕶軍新除後軍司馬蕭誕為徐州刺史壬子以冠軍司馬臧靈智為交州刺史乙夘申眀織成金薄綵花錦綉履之禁九月癸酉詔曰頃者以淮關徭戍勤瘁扵行役故覃以榮階薄酬厥勞勲状淹留未集王府非所以急舍爵之典趣報功之㫖便可分遣使部往彼銓用辛巳以前九真太守宋慈眀為交州刺史癸未誅新除司徒鄱陽王鏘中軍大将軍随郡王子隆遣平西将軍王廣之誅南兖州刺史安陸王子敬扵是江州刺史晉安王子懋起兵遣中䕶軍王𤣥邈討之乙未驃騎大将軍鸞假黄鉞内外纂嚴又誅湘州刺史南平王銳郢州刺史晉熙王銶南豫州刺史宜都王鏗丁亥以衛将軍廬陵王子卿為司徒撫軍将軍桂陽王鑠為中軍将軍開府儀同三司冬十月癸巳詔曰周設媒官趣及時之制漢務輕徭在休息之典所以布徳𢎞敎寛俗阜民朕君制八紘志敷九徳而習俗之風為弊未改静言多愠無忘昬昃督勸婚嫁宜嚴更申眀必使禽幣以時摽梅息怨正厨諸役舊出州郡徴吏民以應其數公獲二旬私累數朔又廣陵年常逓出千人以助淮戍勞擾為煩抑亦苞苴是育今竝可長停别量所出諸縣使村長路都防城直縣為劇尤深亦宜禁斷丁酉解嚴進驃騎大将軍揚州刺史宣城公鸞為太傅領大将軍揚州牧加殊禮進爵為王戊戌誅新除中軍将軍桂陽王鑠撫軍将軍衡陽王鈞侍中祕書監江夏王鋒鎮軍将軍建安王子真左将軍巴陵王子倫癸夘以寧朔将軍蕭遥欣為豫州刺史新除黄門郎蕭遥昌為郢州刺史輔國将軍蕭誕為司州刺史宣城王輔政帝起居皆諮而後行思食蒸魚菜太官令答無録公命竟不與辛亥皇太后令曰司空後将軍丹陽尹右僕射中領軍八座夫眀晦迭來屯平代有上靈所以睠命億兆所以歸懐自皇家淳耀列聖繼軌諸侯官方百神受職而殷憂時唘多難薦臻隆昌失徳特紊人鬼非徒四海解體乃亦九鼎将移賴天縦英輔大匡社稷崩基重造墜典再興嗣主㓜沖庶政多昧且早嬰尫疾弗克負荷所以宗正内侮戚藩外叛覘天視地人各有心雖三祖之徳在民而七廟之危行及自非樹以長君鎮以淵器未允天人之望寧息奸宄之謀太傅宣城王𦙍體宣皇鍾慈太祖識冠生民功髙造物符表夙著謳頌有在宜入承寳命式寧宗祏帝可降封海陵王吾當歸老别館昔宣帝中興漢室簡文重延晉祀庶我鴻基扵茲永固言念家國感慶載懐建武元年詔海陵王依漢東海王彊故事給虎賁旄頭畫輪車設鍾虡宫縣供奉所須每存隆厚十一月稱王有疾數遣御師占視乃殞之給温眀祕器衣一襲斂以衮冕之服大鴻臚監䕶喪事葬給輼輬車九旒大輅黄屋左纛前後部羽葆鼓吹挽歌二部依東海王故事謚曰恭王年十五史臣曰郭璞稱永昌之名有二日之象而隆昌之號亦同焉案漢中平六年獻帝即位便改元為光熹張譲段珪誅後改元為昭寧董卓輔政改元為永漢一嵗四號也晉恵帝太安二年長沙王乂事敗成都王頴改元為永安頴自鄴奪河間王顒復改元為永興一嵗三號也隆昌延興建武亦三改年號故知喪亂之軌迹雖千載而必同矣賛曰穆穆海陵因亡代興不先不後遭命是膺南齊書卷五南齊書卷五考證海陵王本紀延興元年是年即隆昌元年以廢立随改元耳八月丁未詔曰新安國五品以上悉與滿叙南史不載海陵以新安入纂故云南齊書卷五考證
