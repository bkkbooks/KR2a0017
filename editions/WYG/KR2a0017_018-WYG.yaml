body:
  text: 南齊書卷十八梁蕭子顯撰志第十祥瑞天符瑞命遐哉邈矣靈篇祕圖固以藴金匱而充石室炳契决陳緯候者方䇿未書啓覺天人之期扶奬帝王之運三五聖業神眀大寳二謀協贊罔不由兹夫流火赤雀實紀周祚雕雲素靈發祥漢氏光武中興皇符為盛魏膺當塗之䜟晉有石瑞之文史筆所詳亦唯舊矣齊氏受命事殷前典黄門郎蘇偘撰聖皇瑞應記永眀中庾温撰瑞應圖其餘衆品史注所載今詳録去取以為志云老子河洛䜟曰年歴七七水滅緒風雲俱起龍鱗舉宋水徳王義熙十四年元熙二年永初三年景平一年元嘉三十年孝建三年大眀八年永光一年泰始七年泰豫元年元徽四年昇眀三年凡七十七年故曰七七也易曰雲從龍風從虎闗尹云龍不知其乘風雲而上天也䜟又曰肅草成道徳懐書備出身形法治呉出南京上即姓諱也南京南徐州治京口也䜟又曰墥堨河梁塞龍淵消除水災泄山川墥堨河梁為路也路即道也淵塞者譬路成也即太祖諱也消水災言除宋氏患難也䜟又曰上參南斗第一星下立草屋為紫庭神龍之岡梧桐生鳳鳥舒翼翔且鳴南斗第一星吳分也草屋蕭字也又簫管之器像鳯鳥翼也䜟又曰蕭為二士天下大樂二士主字也䜟又曰天子何在草中宿宿肅也尚書中候儀眀篇曰仁人傑出握表之象曰角姓合音之于蘇偘云蕭角姓也又八音之器有簫管也史臣曰案晉光禄大夫何禎解音之于為曹字謂魏氏也王隐晉書云卯金音于亦為魏也候書章句本無銓序二家所稱既有前釋未詳偘言為何推據孝經鉤命决曰誰者起視名將君者羣也理物為䧺優劣相次以期興將太祖小諱也征西將軍蕭思話見之曰此我家諱也王子年歌曰金刀治世後遂苦帝王昬亂天神怒災異屢見戒人主三分二叛失州土三王九江一在呉餘悉稚小早少孤一國二主天所驅金刀劉也三分二叛宋眀帝世也三王九江者孝武於九江興晉安王子勛雖不終亦稱大號後世祖又於九江基霸迹此三王也一在吳謂齊氏桑梓亦寄治南吳也一國二主謂太祖符運潛興為宋氏驅除寇難歌又曰三禾摻摻林茂孶金刀利刃齊刈之刈剪也詩云實始翦商歌又曰欲知其姓草肅肅穀中最細低頭熟鱗身甲體永興福榖道熟成又諱也太祖體有龍鱗斑駮成文始謂是黒歴治之甚至而文愈眀伏羲亦鱗身也金䧺記曰鑠金作刀在龍里占睡上人相湏起又云當復有作肅入草蕭字也易云聖人作之記又云草門可憐乃當悴建號不成易運沸詩云不時時也不成成也建號建元號也易運革命也䜟曰周文王受命千五百嵗河雒出聖人受命於己未至丙子為十八周旅布六郡東南隅四國安定可久留案周滅殷後七百八十年秦四十九年漢四百二十五年魏四十五年晉百五十年宋六十年至建元元年千五百九年也武進縣彭山舊塋在焉其山岡阜相屬數百里上有五色雲氣有龍出焉宋眀帝惡之遣相墓工髙靈文占視靈文先與世祖善還詭荅云不過方伯退謂世祖曰貴不可言帝意不已遣人於墓左右校獵以大鐵釘長五六尺釘墓四維以為厭勝太祖後改樹表柱柱忽龍鳴響震山谷父老咸志之云㑹稽剡縣刻石山相傳為名不知文字所在昇眀末縣民兒襲祖行獵忽見石上有文凡三處苔生其上字不可識刋苔去之大石文曰此齊者黄公之化氣也立石文曰黄天星姓蕭字某甲得賢帥天下太平小石文曰刻石者誰㑹稽南山李斯刻秦望之封也益州齊后山父老相傳其名亦不知所起昇眀三年有沙門𤣥暢於山丘立精舍其日太祖受禪日也嵩髙山昇眀三年四月滎陽人尹午於山東南澗見天雨石墜地石開有璽在其中方三寸其文曰戊丁之人與道俱肅然入草應天符又曰皇帝興運午奉璽詣雍州刺史蕭赤斧赤斧表獻之史臣案昔大人見臨洮而銅人鑄臨洮生董卓而銅人毁有卓而世亂世亂而卓亡如有似也晉末嵩髙山出玉璧三十二宋氏以為受命之祥今此山出璽而水徳云謝終始之徴亦有領也元徽四年太祖從南郊望氣者陳安寳見太祖身上黄紫氣屬天安寳謂親人王洪範曰我少来未嘗見軍上有如此氣也太祖年十七夢乗青龍西行逐日日將薄山乃止覺而恐懼家人問占者云至貴之象也蘇偘云青木色日暮者宋氏末運也泰始七年眀帝遣前淮南太守孫奉伯往淮隂監元㑹奉伯與太祖同寢夢上乗龍上天於下捉龍脚不得覺謂太祖曰兖州當大庇生民弟不見也奉伯卒於宋清河崔靈運為上府參軍夢天帝謂己曰蕭道成是我第十九子我去年已授其天子位自三皇五帝至齊受命君凡十九人也宋泰始中童謡云東城出天子故眀帝殺建安王休仁蘇偘云後順帝自東城即位論者謂應之乃是武進縣上所居東城里也熊襄云上舊鄉有大道相傳云秦始皇所經呼為天子路後遂為帝鄉焉案順帝實當援立猶如晉之懐愍亦有徴符齊運既無巡幸路名或是秦舊疑不能詳世祖年十三夢舉體生毛髪生至足又夢人指上所踐地曰周文王之田又夢虚空中飛又夢著孔雀羽衣庾温云雀爵位也又夢鳳皇從天飛下青溪宅齋前兩翅相去十餘丈翼下有紫雲氣及在襄陽夢著桑屐行度太極殿階庾温云屐者運應木也臣案桑字為四十而二㸃世祖年過此即帝位謂著屐而木行也屐有兩齒有聲是為眀兩之齒至四十二而行即真矣及在郢州夢人從天飛下頭插筆来畫上衣兩邉不言而去庾温釋云畫者山龍華蟲也世祖宋元嘉十七年六月己未夜生無火婢吹灰而火自燃世祖於南康郡内作伎有絃無管於是空中有箎聲調節相應世祖為廣興相嶺下積旱水涸不通船上部伍至水忽暴長庾温云易利渉大川之義也世祖頓盆城城内無水欲鑿引江流試掘井得伏泉九處皆湧出建元元年四月有司奏延陵令戴景度稱所領季子廟舊有涌井二所廟祝列云舊井北忽聞金石聲即掘深三尺得沸泉其東忽有聲錚錚又掘得泉沸湧若浪泉中得一根木簡長一尺廣二寸隐起文曰廬山道人張陵再拜謁詣起居簡木堅白而字色黄謹案瑞應圖浪井不鑿自成王者清静則仙人主之孔氏世録云叶精帝道孔書眀巧當在張陵宋均注云張陵佐封禪一云陵仙人也元徽三年太祖在青溪宅齋前池中忽揚波起浪湧水如山有金石響湏臾有青龍從池中出左右皆見之昇眀元年青龍見齊郡建元四年青龍見順陽郡清水縣平泉湖中永眀七年黄龍見曲江縣黄池中一宿二日中興二年山上雲障四塞頃有𤣥黄五色如龍長十餘丈從西北升天宋泰始末武進舊塋有獸見一角羊頭龍翼馬足父老咸見莫之識也永眀十年鄱陽郡獻一角獸麟首鹿形龍鸞共色瑞應圖云天子萬福允集則一角獸至十一年白象九頭見武昌史臣曰記云升中於天麟鳳至而龜龍格則鳯皇巢乎阿閣麒麟在乎郊藪豈非馴之在庭擾以成畜其為瑞也如此今觀魏晉已来世稱靈物不少而亂多治少史不絶書故知来儀在沼逺非前事見而不至未辨其為祥也昇眀三年三月白虎見歴陽龍亢縣新昌村新昌村嘉名也瑞應圖云王者不暴白虎仁建元四年三月白虎見安蠻䖍化縣中興二年二月白虎見東平夀張安樂村昇眀二年騶虞見安東縣五界山師子頭虎身龍脚詩傳云騶虞義獸白虎黒文不食生物至徳則出昇眀三年太祖為齊王白毛龜見東府城池中建元二年休安陵獲𤣥龜一頭永眀五年武騎常侍唐潛上青毛神龜一頭七年六月彭城郡田中獲青毛龜一頭八年延陵縣前澤畔獲毫龜一枚八年四月長山縣王恵獲六目龜一頭腹下有萬歡字并有卦兆六月建城縣昌城田獲四目龜一頭下有萬齊字九年五月長山縣獲神龜一頭腹下有巽兑卦中興二年正月邏將潘道盖於山石宂中獲毛龜一頭昇眀三年世祖遣人詣宫亭湖廟還福船泊渚有白魚雙躍入船永眀五年南豫州刺史建安王子真表獻金色魚一頭建元元年八月男子王約獲白雀一頭九月秣陵縣獲白雀一頭二年四月白雀集郢州府舘五月白雀見㑹稽永興縣永眀元年五月郢州丁坡屯獲白雀一頭三年七月安城王暠第獲白雀一頭九月南郡江陵縣獲白雀一頭四月七日白雀見臨汝縣七年六月鹽官縣獲白雀一頭八年天門臨灃縣獲白雀一頭九年七月呉郡錢塘縣獲白雀一頭八月豫州獲白雀一頭十年五月齊郡獲白雀一頭建元元年五月白烏見巴郡永眀四年三月三足烏巢南安中陶縣庭八年四月陽羨縣獲白烏一頭隆昌元年四月陽羨縣獲白烏一頭建元二年江陵縣獲白鼠一頭永眀六年白鼠見芳林園十年九月義陽郡獲白鼠一頭永眀四年丹陽縣獲白兎一頭昇眀元年六月慶雲見益都建元元年世祖拜皇太子日有慶雲在日邉三年華林園醴泉堂東忽有瑞雲周圓十許丈髙下與景雲樓平五色藻密光彩映山徘徊良久行轉南行過長船入華池昇眀二年宣城臨成縣於藉山獲紫芝一枝永眀八年三月陽城縣獲紫芝一株隆昌元年正月襄陽縣獲紫芝一莖昇眀二年四月昌國縣徐萬年門下棠樹連理九月豫州萬嵗澗廣數丈有樹連理隔澗騰枝相通越壑跨水為一榦建元二年九月有司奏上虞縣楓樹連理兩根相去九尺雙株均聳去地九尺合成一榦故鄣縣楓樹連理兩株相去七尺大八圍去地一丈仍相合為樹泯如一木山陽縣界若邪村有一槻木合為連理淮隂縣建業寺梨樹連理建康縣梨樹耀榱一本作耀欀五圍連理六枝永眀元年五月木連理生安成新喻縣又生南梁陳縣閏月璿眀殿外閣南槐樹連理八月鹽官縣内樂村木連理二年七月烏程縣陳文則家槿樹連理七月新冶縣槐栗二木合生異根連理去地數尺中央小開上復為一三年正月安城縣榆樹二株連理二月安陽縣梓樹連理九月句陽縣之穀山槿樹連理異根雙挺共杪為一十二月永寧左郡樠木連理四年二月秣陵縣髙天眀園中李樹連理生髙三尺五寸兩枝别生復髙三尺合為一榦五年正月秣陵縣華僧秀園中四樹連理六年四月江寧縣北界賴鄉齊平里三成邏門外路東太常蕭恵基園楥樹二株連理其髙相去二尺南大北小小者傾柯南附合為一樹枝葉繁茂圓宻如盖七年江寧縣李樹二株連理兩根相去一丈五尺八年巴陵郡樹連理四株三月武陵白沙戍槻木連理相去五尺俱髙三尺東西二枝合而通柯十二月柴桑縣陶委天家樹連理永眀五年山隂縣孔廣家園檉樹十二層㑹稽太守隨王子隆獻之種芳林園鳯光殿西九年秣陵縣鬬場里安眀寺有古樹衆僧改架屋宇伐以為薪剖樹木裏自然有法大徳三字始興郡本無欓樹調味有闕世祖在郡堂屋後忽生一株昇眀二年十月甘露降建康縣十一月甘露降長山縣十二月甘露降彭山松樹至九日止建元元年九月甘露降淮南郡桃石榴二樹有司奏甘露降新汲縣王安世園樹永眀二年四月甘露降南郡桐樹四年二月甘露降臨湘縣李樹三月甘露降南郡桐樹四月甘露降睢陽縣桃樹五年四月甘露降荆州府中閣外桐樹六年甘露降芳林園故山堂桐樹九年八月甘露降上定林寺佛堂庭中天如雨遍地如雪其氣芳其味甘耀日舞風至晡乃止爾後頻降鍾山松樹四十餘日乃止十月甘露降大安陵樹中興二年三月甘露降茅山彌漫數里元徽四年三月醴泉出昌國白鹿山其味甚甘永眀元年正月新蔡郡固始縣獲嘉禾一莖五穗八月新蔡縣獲嘉禾二莖九穗一莖七穗十一月固始縣獲嘉禾一莖九穗二年八月梁郡雎陽縣界野田中獲嘉禾一莖二十三穗五年九月莒縣獲嘉禾一株十年六月海陵齊昌縣獲嘉禾一莖六穗十一年九月雎陽縣田中獲嘉禾一株昇眀二年九月建寧縣建昌村民採藥於萬