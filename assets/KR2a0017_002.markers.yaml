  - {type: variant, offset: 3696, length: 0, content: '', WYG: 南齊書卷二南齊書卷二考證髙帝夲紀下建元元年夏四月丙寅追尊皇考曰宣皇帝皇妣為孝皇后臣祖庚按通鑑同南史在甲午二年正月以司空尚書令褚淵為司徒臣祖庚按十二月以司空褚淵為司徒其事複見其月互異又淵傳三年為司徒又固讓四年寢疾遜位改授司空據此則淵以三年為司徒四年為司空而紀又云四年八月癸夘司徒褚淵薨紀傳前後各不相顧二月丁夘虜冦夀陽臣祖庚按通鑑作己酉攷異曰是月辛夘朔無丁夘五月立六都門墻臣宗萬按通鑑云自晉以来建康宫之外城惟設竹籬而有六門會有彂白虎樽者命改立都墻又白虎樽即白獸樽晉書避唐諱故曰獸也河南王世子吐谷渾易度侯易度侯諸夲皆作度易侯今従氐𦍑傳改正南齊書卷二考證}
