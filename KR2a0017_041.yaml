body:
  text: 南齊書卷四十一列傳第二十二張融周顒張融字思光吳郡吳人也祖褘晉琅邪王國郎中令父暢宋會稽太守融年弱冠道士同郡陸修靜以白鷺羽麈尾扇遺融曰此既異物以奉異人宋孝武聞融有早譽解褐為新安王北中郎參軍孝武起新安寺僚佐多襯錢帛融獨襯百錢帝曰融殊貧當序以佳祿出為封溪令從叔永出後渚送之曰似聞朝旨汝尋當還融曰不患不還政恐還而復去廣越嶂嶮獠賊執融將殺食之融神色不動方作洛生詠賊異之而不害也浮海至交州於海中作海賦曰蓋言之用也情矣形乎使天形寅內敷情敷外寅者言之業也吾遠職荒官將海得地行關入浪宿渚經波傅懷樹觀長滿朝夕東西無里南北如天反覆懸烏表𩹉菟色壯哉水之奇也奇哉水之壯也故古人以之頌其所見吾問翰而賦之焉當其濟興絶感豈覺人在我外木生之作君自君矣分渾始地判氣初天作成萬物為山為川總川振會導海飛門爾其海之狀也之相也則窮區沒渚萬里藏岸控會河濟朝總江漢回混浩潰巔倒發濤浮天振遠灌日飛高摐粗江撞則八紘摧隤鼓怒則九紐折裂斚於活長風以舉波漷音郭天地而為勢摕音澤于及涾音沓洽音合來往相粗合汨于突湥音突呭於渤渤夏紆狀石成窟西衝虞淵之曲東振湯谷之阿若木於是乎倒覆折扶桑而為渣在牙濩𥧾音藥𣶯音門渾涫於官於和碨於磊雍渤非勃淬音卒淪音崙啓音尊灡淺壟于拱湍轉則日月似驚浪動而星河如覆既烈太山與崑崙相壓而共潰又盛雷車震漢破天以折轂𢗞於員漣涴於卵瀨於懶輾轉縱橫揚珠起玉流鏡飛明是其回堆曲浦欹關弱渚之形勢也沙嶼相接洲島相連東西南北如滿于天梁禽楚獸胡木漢草之所生焉長風動路深雲暗道之所經焉苕苕蒂蒂窅窅翳翳晨烏宿音秀於東隅落河浪其西界茫沆于剛汴河汨于突磈于磊漫無官桓旁踞委嶽橫竦危巒重彰岌岌攢嶺聚立嵂呂兀愸音窟廣穴人夕呂今嶔欽架石相陰文彡彑𡙢徒罪橫出旁入嵬嵬支罪磊磊若相追而下及峯勢縱橫岫形參錯或如前而未進乍非遷而已却天抗暉於東曲日倒麗於西阿嶺集雪以懷鏡巖照春而自華江洚許江廟廟許百漈于曷巖拍芬百嶺觸山石汙湂于各𢀿音寒況于朗碨於磊泱於朗山微䨾音阿流柴磹五感反屬五窟頓浪低波苦降𤳦苦交娻苦江折嶺挫峯窂浪硠音郎拉掊崩山相𥔽苦合萬里藹藹極路天外電戰雷奔倒地相獸門象逸魚路鯨奔水遽龍魄陸振虎𡘽却瞻無後向望行何前長尋高眺唯水與天若乃山橫蹴浪風倒摧波磊若驚山竭嶺以竦石鬱若飛煙奔雲以振霞連瑤光而交綵接玉繩以通華爾乎夜滿深霧晝密長雲高河滅景萬里無文山門幽暖岫戶葐土爰九天相掩玉地交氛汪汪橫橫音皇沆沆于剛浩浩音害淬粗貴潰大人之表泱於朗蕩君子之外風沫相排日閉雲開浪散波合嶽起山隤若乃漉沙構白熬波出素積雪中春飛霜暑路爾其奇名出録詭物無書高岸乳鳥橫門産魚則何傼音羅音容鮨音詣垎音非𡋙音人凃音果𠘭音滑哄日吐霞吞河漱月氣開地震聲動天發噴灑噦於月噫於戒流雨而揚雲喬壯脊架嶽而飛墳冨音挺動崩五山之勢瞷矣簡睔矣儧煥七之文僼蠵瑁蛑綺貝繡螺玄珠互綵緑紫相華遊風秋瀨泳景登春伏鱗漬綵升魵洗文若乃春代秋緒歲去冬歸柔風麗景晴雲積暉起龍塗於靈步翔螭道之神飛浮微雲之如瞢落輕雨之依依觸巧塗而叟去紺遠抵欒木以激揚浪相傍各而起千狀波獨湧乎驚萬容蘋藻留映荷芰提陰扶容曼綵秀遠華深明藕移玉清蓮代金眄芬芳於遙渚泛灼爍於長潯浮艫雜軸遊舶交艘帷軒帳席方遠連高入驚波而箭絶振排天之雄飆越湯谷以逐景渡虞淵以追月遍萬里而無時浹天地於揮忽雕隼飛而未半鯤龍趠貪教而不逮舟人未及復其喘已周流宇宙之外矣陰鳥陽禽春毛秋羽遠翅風遊高翮雲舉翔歸棲去連陰日路瀾漲波渚陶玄浴素長紘四斷平表九絶雉翥成霞鴻飛起雪合聲鳴侶並翰翻羣飛關溢繡流浦照文爾夫人微亮氣小白如淋凉空澄遠增漢無陰照天容於渚鏡河色於鯊潯括蓋餘以進廣浸夏洲以洞深形每驚而義維靜跡有事而道無心於是乎山海藏陰雲塵入岫天英遍華日色盈秀則若士神中琴高道外袖輕羽以衣風逸玄裾於雲帶筵秋月於源潮帳春霞於秀瀨曬蓬萊之靈岫望方壺之妙闕樹遏日以飛柯嶺回峯以蹴月空居無俗素館何塵谷門風道林路雲真若乃幽崖人妾於夾衆倉夾隈隩之窮駿波虎浪之氣激勢之所不攻有卉有木為灌為叢絡糅網雜結葉相籠通雲交拂連韻共風蕩洲礉去角岸而千里若崩衝崖沃其萬國如戰振駿氣以擺雷飛雄光以倒電若夫增雲不氣流風斂聲瀾文復動波色還驚明月何遠沙𩹉分星至其積珍全遠架寶諭深瓊池玉壑珠岫集岑合日開夜舒月解陰珊瑚開繢琉璃竦華丹文鏡色雜照冰霞洪洪潰潰浴干日月淹漢星墟滲河天界風何本而自生雲無從而空滅籠麗色以拂烟鏡懸暉以照雪爾乃方員去我混然落情氣暄而濁化靜自清心無終故不滯志不敗而無成既覆舟而載舟固以死而以生弘芻狗於人獸導至本以充形雖萬物之日用諒何緯其何經道湛天初機茂形外亡有所以而有非膠有於生末亡無所以而無信無心以入太不動動是使山嶽相崩不聲聲故能天地交泰行藏虛於用舍應感亮於圓會仁者見之謂之仁達者見之謂之達咶者幾於上善吾信哉其為大矣融文辭詭激獨與衆異後還京師以示鎮國軍將軍顧覬之覬之曰卿此賦實超玄虛但悵恨不道鹽耳融即求筆注之曰漉沙構白熬波出素積雪中春飛霜暑路此四句後所足也覬之與融兄有恩好覬之卒融身負墳土在南與交址太守卞展有舊展於嶺南為人所殺融挺身奔赴舉秀才對策中第為尚書殿中郎不就為儀曹郎泰始五年明帝取荊郢湘雍四州射手叛者斬亡身及家長者家口沒奚官元徽初郢州射手有叛者融議家人家長罪所不及亡身刑五年尋請假奔叔父喪道中罰幹錢敬道鞭杖五十寄繫延陵獄大明五年制二品清官行僮幹杖不得出十為左丞孫緬所奏免官尋復位攝祠倉部二曹領事軍劉勔戰死祠曹議上應哭勔不融議宜哭於是始舉哀倉曹又以正月俗人所忌太倉為可開不融議不宜拘束小忌尋兼掌正融見宰殺回車徑去自表解職為安成王撫軍倉曹參軍轉南陽王友融父暢先為丞相長史義宣事難暢為王玄謨所録將殺之玄謨子瞻為南陽王前軍長史融啓求去官不許融家貧願祿初與從叔征北將軍永書曰融昔稱幼學早訓家風雖則不敏率以成性布衣葦席弱年所安簞食瓢飲不覺不樂但世業清貧民生多待榛栗棗修女贄既長束帛禽鳥男禮已大勉身就官十年七仕不欲代耕何至此事昔求三吳一丞雖屢舛錯今聞南康缺守願得為之融不知階級階級亦可不知融政以求丞不得所以求郡求郡不得亦可復求丞又與吏部尚書王僧虔書曰融天地之逸民也進不辨貴退不知賤兀然造化忽如草木實以家貧纍積孤寡傷心八姪俱孤二弟頗弱撫之而感古人以悲豈能山海陋祿申融情纍阮籍愛東平土風融亦欣晉平間外時議以融非治民才竟不果辟太祖太傅掾歷驃騎豫章王司空咨議參軍遷中書郎非所好乞為中散大夫不許融風止詭越坐常危膝行則曳步翹身仰首意制甚多隨例同行常稽遲不進太祖素奇愛融為太尉時時與融款接見融常笑曰此人不可無一不可有二即位後手詔賜融衣曰見卿衣服粗故誠乃素懷有本交爾藍縷亦朝望今送一通故衣意謂雖故乃勝新也是吾所著已令裁減稱卿之體并履一量融與吏部尚書何戢善往詣戢誤通尚書劉澄融下車入門乃曰非是至戶外望澄又曰非是既造席視澄曰都自非是乃去其為異如此又為長沙王鎮軍竟陵王征北咨議並領記室司徒從事中郎永明二年總明觀講勑朝臣集聽融扶入就榻私索酒飲之難問既畢乃長嘆曰嗚呼仲尼獨何人哉為御史中丞到撝所奏免官尋復融形貌短醜精神清徹王敬則見融革帶垂寬殆將至骼謂之曰革帶太急融曰既非步吏急帶何為融假東出世祖問融住在何處融答曰臣陸處無屋舟居非水後日上以問融從兄緒緒曰融近東出未有居止權牽小船於岸上住上大笑虜中聞融名上使融接北使李道固就席道固顧之而言曰張融是宋彭城長史張暢子不融嚬蹙久之曰先君不幸名達六夷豫章王大會賓僚融食炙始行畢行炙人便去融欲求鹽蒜口終不言方搖食指半日乃息出入朝廷皆拭目驚觀之八年朝臣賀衆瑞公事融扶入拜起復為有司所奏見原遷司徒右長史竟陵張欣時為諸暨令坐罪當死欣時父興世宋世討南譙王義宣官軍欲殺融父暢興世以袍覆暢而坐之以此得免興世卒融著高履負土成墳至是融啓竟陵王子良乞代欣時死子良答曰此乃是長史美事恐朝有常典不得如長史所懷遷黃門郎太子中庶子司徒左長史融有孝義忌月三旬不聽樂事嫂甚謹宋丞相義宣起事父暢以不同將見殺司馬竺超民諫免之暢臨終謂諸子曰昔丞相事難吾緣竺司馬得活爾等必報其子弟後超民孫微冬月遭母喪居貧融往弔之悉脫衣以為賻披牛被而反常以兄事微豫章王嶷竟陵王子良薨自以身經佐吏哭輒盡慟建武四年病卒年五十四遺令建白旌無旒不設祭令人捉麈尾登屋復魂曰吾生平所善自當凌雲一笑三千買棺無製新衾左手執孝經老子右手執小品法華經妾二人哀事畢各遣還家又曰以吾平生之風調何至使婦人行哭失聲不須暫停閨閣融玄義無師法而神解過人白黑談論鮮能抗拒永明中遇疾為問門律自序曰吾文章之體多為世人所驚汝可師耳以心不可使耳為心師也夫文豈有常體但以有體為常政當使常有其體丈夫當刪詩書制禮樂何至因循寄人籬下且中代之文道體闕變尺寸相資彌縫舊物吾之文章體亦何異何嘗顛溫凉而錯寒暑綜哀樂而橫歌哭哉政以屬辭多出比事不羈不阡不陌非途非路耳然其傳音振逸鳴節竦韻或當未極亦已極其所矣汝若復別得體者吾不拘也吾義亦如文造次乘我顛沛非物吾無師無友不文不句頗有孤神獨逸耳義之為用將使性入清波塵洗猶沐無得釣聲同利舉價如高俾是道場險成軍路吾昔嗜僧言多肆法辨此盡遊乎言笑而汝等無幸又云人生之口正可論道說義惟飲與食此外如樹銅為網焉吾每以不爾為恨爾曹當振綱也臨卒又戒其子曰手澤存焉父書不讀況父音情婉在其韻吾意不然別遺爾音吾文體英絶變而屢奇既不能遠至漢魏故無取嗟晉宋豈吾天挺蓋不隤家聲汝若不看父祖之意欲汝見也可號哭而看之融自名集為玉海司徒褚淵問玉海名融答玉以比德海崇上善文集數十卷行於世張氏知名前有敷演鏡暢後有充融卷稷周顒字彥倫汝南安城人晉左光祿大夫顗七世孫也祖虎頭員外常侍父恂歸鄉相顒少為族祖朗所知解褐海陵國侍郎益州刺史蕭惠開賞異顒入蜀為厲鋒將軍帶肥鄉成都二縣令轉惠開輔國府參軍將軍令如故仍為府主簿常謂惠開性太險峻每致諫惠開不悅答顒曰天險地險王公設險但問用險何如耳隨惠開還都宋明帝頗好言理以顒有辭義引入殿內親近宿直帝所為慘毒之事顒不敢顯諫輒誦經中因緣罪福事帝亦為之小止轉安成王撫軍行參軍元徽初出為剡令有恩惠百姓思之還歷邵陵王南中郎三府參軍太祖輔政引接顒顒善尺牘沈攸之送絶交書太祖口授令顒裁答轉齊臺殿中郎建元初為長沙王參軍後軍參軍山陰令縣舊訂滂民以供雜使顒言之於太守聞喜公子良曰竊見滂民之困困實極矣役命有常祗應轉竭蹙迫驅催莫安其所險者或竄避山湖困者自經溝瀆爾亦有摧臂斫手苟自殘落販傭貼子權赴急難每至滂使發動遵赴常促輒有柤杖被録稽顙階垂泣涕告哀不知所振下官未嘗不臨食罷筯當書偃筆為之久之愴不能已交事不濟不得不就加捶罰見此辛酸時不可過山陰邦治事倍餘城然略聞諸縣亦處處皆躓唯上虞以百戶一滂大為優足過此列城不無凋罄宜應有以普救倒懸設流開便則轉患為功得之何遠還為文惠太子中軍録事參軍隨府轉征北文惠在東宮顒還正員郎始興王前軍咨議直侍殿省復見賞遇顒音辭辨麗出言不窮宮商朱紫發口成句泛涉百家長於佛理著三宗論立空假名立不空假名設不空假名難空假名設空假名難不空假名假名空難二宗又立假名空西涼州智林道人遺顒書曰此義旨趣似非始開妙聲中絶六七十載貧道年二十時便得此義竊每歡喜無與共之年少見長安耆老多云關中高勝乃舊有此義當法集盛時能深得斯趣者本無多人過江東略是無一貧道捉麈尾來四十餘年東西講說謬重一時餘義頗見宗録唯有此塗白黑無一人得者為之發病非意此音猥來入耳始是真實行道第一功德其論見重如此顒於鍾山西立隱舍休沐則歸之轉太子僕兼著作撰起居注遷中書郎兼著作如故常遊侍東宮少從外氏車騎將軍臧質家得衛散隸書法學之甚工文惠太子使顒書玄圃茅齊壁國子祭酒何胤以倒薤書求就顒換之顒笑而答曰天下有道丘不與易也每賓友會同顒虛席晤語辭韻如流聽者忘倦兼善老易與張融相遇輒以玄言相滯彌日不解清貧寡欲終日長蔬食雖有妻子獨處山舍衛將軍王儉謂顒曰卿山中何所食顒曰赤米白鹽緑葵紫蓼文惠太子問顒菜食何味最勝顒曰春初早韭秋末晚菘時何胤亦精信佛法無妻妾太子又問顒卿精進何如何胤顒曰三塗八難共所未免然各有其纍太子曰所纍伊何對曰周妻何肉其言辭應變皆如此也轉國子博士兼著作如故太學諸生慕其風爭事華辨後何胤言斷食生猶欲食肉白魚幵脯糖蟹以為非見生物疑食蚶蠣使學生議之學生鍾岏曰幵之就脯驟於屈伸蟹之將糖躁擾彌甚仁人用意深懷如怛至於車螯蚶蠣眉目內闕慙渾沌之奇礦殼外緘非金人之慎不悴不榮曾草木之不若無馨無臭與瓦礫其何算故宜長充庖廚永為口實竟陵王子良見岏議大怒胤兄點亦遁節清信顒與書勸令菜食曰丈人之所以未極遐蹈或在不近全菜邪脫灑離析之討鼎俎網罟之興載之簡策其來實遠誰敢干議觀聖人之設膳修仍復為之品節蓋以茹毛飲血與生民共始縱而勿裁將無崖畔善為士者豈不以恕己為懷是以各靜封疆罔相陵軼況乃變之大者莫過死生生之所重無踰性命性命之於彼極切滋味之在我可賒而終身朝晡資之以永歲彼就寃殘莫能自列我業久長吁哉可畏且區區微卵脆薄易矝歂彼弱麑顧步宜糖觀其飲喙飛沈使人物憐悼況可心心撲褫加復恣忍吞嚼至乃野牧盛羣閉豢重圈量肉揣毛以俟枝剝如土委地僉謂常理可為愴息事豈一塗若云三世理誣則幸矣良快如使此道果然而受形未息則一往一來一生一死輪回是常事雜報如家人天如客遇客日鮮在家日多吾儕信業未足長免則傷心之慘行亦息念自及丈人於血氣之類雖無身踐至於晨夜鯉不能不取備屠門財貝之經盜手猶為廉士所棄生性之一啓鸞刀寧復慈心所忍騶虞雖飢非自死之草不食聞其風豈不使人多愧衆生之稟此形質以畜肌膋皆由其積壅癡迷沈流莫反報受穢濁歷苦酸長此甘與肥皆無明之報聚也何至復引此滋腴自汙腸胃丈人得此有素聊復寸言發起耳顒卒官時會王儉講孝經未畢舉曇濟自代學者榮之官為給事中史臣曰弘毅存容至仁表貌汲黯剛戇崔琰聲姿然後能不憚雄桀亟成譏犯張融標心託旨全等塵外吐納風雲不論人物而干君會友敦義納忠誕不越檢常在名教若夫奇偉之稱則虞翻陸績不得獨擅於前也贊曰思光矯矯萬里千仞升同應諧黜同解擯務在連衡不謀銷印彥倫辭辨苦節清韻白馬橫擒雲梯獨振張融海賦文多脫誤諸本同
