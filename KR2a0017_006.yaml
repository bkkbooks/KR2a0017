body:
  text: 南齊書卷六本紀第六明帝高宗明皇帝諱鸞字景栖始安貞王道生子也小諱玄度少孤太祖撫育恩過諸子宋泰豫元年為安吉令有嚴能之名補武陵王左常侍不拜元徽二年為永世令升明二年為邵陵王安南記室參軍未拜仍遷寧朔將軍淮南宣城二郡太守尋進號輔國將軍太祖踐阼遷侍中封西昌侯邑千戶建元二年為持節督郢州司州之義陽諸軍事冠軍將軍郢州刺史進號征虜將軍世祖即位轉度支尚書領右軍將軍永明元年遷侍中領驍騎將軍王子侯舊乘纏帷車高宗獨乘下帷儀從如素士公事混撓販食人擔火誤燒牛鼻豫章王白世祖世祖笑焉轉為散騎常侍左衛將軍清道而行上甚悅二年出為征虜將軍吳興太守四年遷中領軍常侍竝如故五年為持節監豫州郢州之西陽司州之汝南二郡軍事右將軍豫州刺史七年為尚書右僕射八年加領衛尉十年轉左僕射十一年領右衛將軍世祖遺詔為侍中尚書令尋加鎮軍將軍給班劒二十人隆昌元年即本號為大將軍給鼓吹一部親兵五百人尋又加中書監開府儀同三司鬱林王廢海陵王立為使持節都督揚南徐二州軍事驃騎大將軍録尚書事揚州刺史開府如故增班劒為三十人封宣城郡公二千戶鎮東府城給兵五千人錢二百萬布千匹九江作難假黃鉞事寧表送之尋加黃鉞都督中外諸軍事太傅領大將軍揚州牧增班劒為四十人給幢絡三望車前後部羽葆鼓吹劒履上殿入朝不趨贊拜不名置左右長史司馬從事中郎掾屬各四人封宣城王邑五千戶持節侍中中書監録尚書竝如故未拜太后令廢海陵王以上入纂太祖為第三子羣臣三請乃受命建武元年冬十月癸亥即皇帝位詔曰皇齊受終建極握鏡臨宸神武重輝欽明懿鑠七百攸長盤石斯固而王度中蹇天階荐阻嗣命多違蕃釁孔棘宏圖景曆將墜諸淵宣德皇后遠鑒崇替憲章舊典疇咨台揆允定靈策用集寶命于豫一人猥以虛薄纘戎大業仰繫鴻丕顧臨兆民永懷先構若履春冰寅憂夕惕罔識攸濟思與萬國播此惟新大赦天下改元宿衛身普轉一階其餘文武賜位二等逋租宿責換負官物在建武元年以前悉原除劫賊餘口在臺府者可悉原放負釁流徙竝還本鄉太尉王敬則為大司馬司空陳顯達為太尉尚書令王晏加驃騎大將軍中領軍蕭諶為領軍將軍南徐州刺史皇子寶義為揚州刺史中護軍王玄邈為南六允州刺史新除右將軍張瓌為右光祿大夫平北將軍王廣之為江州刺史乙丑詔斷遠近上禮丁卯詔自今雕文篆刻歲時光新可悉停省蕃牧守宰或有薦獻事非任土嚴加禁斷追贈安陸昭侯緬為安陸王己巳以安陸侯子寶晊為湘州刺史詔曰頃守職之吏多違舊典存私害公實興民蠹今商旅稅石頭後渚及夫鹵借倩一皆停息所在凡厥公宜可即符斷主曹詳為其制憲司明加聽察十一月癸酉以西中郎長史始安王遙光為揚州刺史晉壽太守王洪範為青冀二州刺史尚書令王晏領太子少傅甲戌大司馬尋陽公王敬則等十三人進爵邑各有差詔省新林苑先是民地悉以還主原責本直庚辰立皇子寶義為晉安王寶玄為江夏王寶源為廬陵王寶夤為建安王寶融為隨郡王寶攸為南平王甲申詔曰邑宰祿薄俸微不足代耕雖任土貢亦為勞費自今悉斷又詔宣城國五品以上悉與滿自此以下皆聽解遣其欲仕適所樂乙酉追尊始安貞王為景皇妃為懿后丙戌以輔國將軍聞喜公遙欣為荊州刺史寧朔將軍豐城公遙昌為豫州刺史丁亥詔細作中署材官車府凡諸工可悉開番假遞令休息戊子立皇太子寶卷賜天下為父後者爵一級孝子從孫義夫節婦普加甄賜明揚表其衡閭賚以束帛己丑詔東宮肇建遠近或有慶禮可悉斷之壬辰以新除征虜將軍江夏王寶玄為郢州刺史永明中御史中丞沈淵表百官年登七十皆令致仕竝窮困私門庚子詔曰日者百司耆齒許以自陳東西二省猶沾微俸辭事私庭榮祿兼謝興言愛老實有矜懷自縉紳年及可一遵永明七年以前銓之科上輔政所誅諸王是月復屬籍各封子為侯十二月壬子詔曰上覽易遺下情難達是以甘棠見美肺石流詠自月一視黃辭如有含枉不申懷直未舉者蒞民之司竝任厥失二年春正月辛未詔京師繫囚殊死可降為五歲刑三署見徒五歲以下悉原散王公以下各舉所知隨王公卿士內外羣僚各舉朕違肆心極諫索虜寇司豫徐梁四州壬申遣鎮南將軍王廣之督司州征討右衛將軍蕭坦之督徐州征討尚書右僕射沈文季督豫州征討己卯詔京師二縣有毀發墳壠隨宜修理又詔曰食惟民天義高姬載蠶實生本教重軒經前哲盛範後王茂則布令審端咸必由之朕肅扆巖廊思弘風訓深務八政永鑒在勤靜言日昃無忘寢興守宰親民之主牧伯調俗之司宜嚴課農桑罔令游隋揆景肆力必窮地利固修堤防考校殿最若耕蠶殊衆具以名聞游怠害業即便列奏主者詳為條格乙未虜攻鍾離徐州刺史蕭惠休破之丙申加太尉陳顯達使持節都督西北征討諸軍事丁酉內外纂嚴三月戊申詔南徐州僑舊民丁多充戎旅蠲今年三課己未司州刺史蕭誕與衆軍擊虜破之詔雍豫司南六允徐五州遇寇之家悉停今年稅調其與虜交通不問往罪丙寅停青州麥租虜自壽春退走甲申解嚴夏四月己亥朔詔三百里內獄訟同集京師克日聽覽此以外委州郡訊察三署徒隸原遣有差索虜圍漢中梁州刺史蕭懿拒退之己未以新除黃門郎裴叔業為徐州刺史五月甲午寢廟成詔監作長帥可賜位一等役身遣假一年非役者蠲租同假限六月壬戌誅領軍將軍蕭諶西陽王子明南海王子罕邵陵王子貞乙丑以右衛將軍蕭坦之為領軍將軍秋七月辛未以右將軍晉安王寶義為南徐州刺史壬申以冠軍將軍梁王為司州刺史辛卯以氐楊馥之為北秦州刺史仇池公八月丁未以右衛將軍廬陵王寶源為南六允州刺史庚戌以新除輔國將軍申希祖為六允州刺史九月己丑改封南平王寶攸為邵陵王蜀郡王子文為西陽王廣漢王子峻為衡陽王臨海王昭秀為巴陵王永嘉王昭粲為桂陽王冬十月丁癸卯詔曰軌世去奢事殷哲后訓物以儉理鏡前王朕屬流弊之末襲澆浮之季雖恭已弘化刻意隆平而禮讓未興侈華猶競永覽玄風兢言集愧思所以還淳改俗反古移民可罷東田毀興光樓并詔水衡量省御乘乙卯納皇太子妃褚氏大赦王公已下班賜各有差斷四方上禮十二月丁酉詔曰舊國都邑望之悵然況乃自經南面負扆宸居或功濟當時德覃一世而塋壠欑穢封樹不修豈直嗟深牧竪悲甚信陵而已哉昔中京淪覆鼎玉東遷晉元締構之始簡文遺詠在民而松門夷替埏路榛蕪雖年代殊往撫事興懷晉帝諸陵悉加修理并增守衛吳晉陵二郡失稔之鄉蠲三調有差三年春正月丁酉卯以陰平王楊炅子崇祖為沙州刺史封陰平王北中郎將建安王寶夤為江州刺史己巳詔申明守長六周之制乙酉詔去歲索虜寇邊緣邊諸州郡將士有臨陳及疾病死亡者竝送還本土三月壬午詔車府乘輿有金銀飾校者皆剔除夏四月虜寇司州戍兵擊破之五月己巳以征虜將軍蕭懿為益州刺史前軍將軍陰廣宗為梁南秦二州刺史前新除寧州刺史李慶宗為寧州刺史秋九月辛酉以冠軍將軍徐玄慶為六允州刺史冬十月以輔國將軍申希祖為司州刺史閏十二月戊寅皇太子冠賜王公以下帛各有差為父後者賜爵一級斷遠近上禮又詔今歲不須光新可以見錢為百官供給四年春正月庚午大赦詔曰嘉肴停俎定方旨於必甘良玉在攻表圭璋於既就是以陶鈞萬品務本為先經緯九區學為大往因時康崇建庠序屯虞荐有權從省廢謳誦寂寥移年稔永言古昔無忘旰昃今華夏安要荒慕嚮締修東序實允適時便可式依舊章廣延國胄弘敷景業光被後昆壬寅詔民産子者蠲其父母調役一年又賜米十斛新婚者蠲夫役一年丙辰尚書令王晏伏誅二月甲子以左僕射徐孝嗣為尚書令征虜將軍蕭季敞為廣州刺史三月乙未右僕射沈文季領護軍將軍秋八月追尊景皇所生王氏為恭太后索虜寇沔北冬十月又寇司州甲戌遣太子中庶子梁王右軍司馬張稷討之十一月丙辰以氐楊靈珍為北秦州刺史仇池公武都公丁亥詔所在結課屋宅田桑可詳減舊價十二月甲子以冠軍將軍裴叔業為豫州刺史冠軍將軍徐玄慶為徐州刺史寧朔將軍左興盛為六允州刺史丁丑遣度支尚書崔慧景率衆救雍州永泰元年春正月癸未朔大赦逋租宿債在四年之前皆悉原除中軍大將軍徐孝嗣即本號開府儀同三司沔北諸郡為虜所侵相繼敗沒乙巳遣太尉陳顯達持節救雍州丁未誅河東王鉉臨賀王子嶽西陽王子文衡陽王子峻南康王子琳永陽王子珉湘東王子建南郡王子夏桂楊王昭粲巴陵王昭秀二月癸丑遣左衛將軍蕭惠休假節援壽陽辛未豫州刺史裴叔業擊虜於淮北破之辛巳平西將軍蕭遙欣領雍州刺史三月丙午蠲雍州遇虜之縣租布戊申詔曰仲尼明聖在躬允光上哲弘厥雅道大訓生民師範百王軌儀千載立人斯仰忠孝攸出玄功潛被至德彌闡雖反袂遐曠而祧薦靡闕時祭舊品秩比諸侯頃歲以來祀典陵替俎豆寂寥牲奠莫舉豈所以克昭盛烈永隆風教者哉可式循舊典詳復祭秩使牢餼備禮欽饗兼申夏四月甲寅改元赦三署囚繫原除各有差文武賜位二等丙戌以鎮軍將軍蕭坦之為侍中中領軍己未立武陵昭王子子坦為衡陽王丙寅以西中郎長史劉暄為郢州刺史丁卯大司馬會稽太守王敬則舉兵反五月壬午遣輔國將軍劉山陽率軍東討乙酉斬敬則傳首曲赦浙東吳晉陵七郡以後軍長史蕭穎胄為南六允州刺史丁酉以北中郎將司馬元和為六允州刺史秋七月以輔國將軍王珍國為青冀二州刺史癸卯以太子中庶子梁王為雍州刺史太尉陳顯達為江州刺史己酉帝崩于正福殿年四十七遺詔曰徐令可重申八命中書監本官悉如故沈文季可左僕射常侍護軍如故江祐可右僕射江祀可侍中劉暄可衛尉軍政大事委陳太尉內外衆事無大小委徐孝嗣遙光坦之江祏其大事與沈文季江祀劉暄參懷心膂之任可委劉悛蕭惠休崔惠景葬興安陵帝明審有吏才持法無所借制御親幸臣下肅清驅使寒人不得用四幅繖大存儉約罷世祖所起新林苑以地還百姓廢文帝所起太子東田斥賣之永明中輿輦舟乘悉剔取金銀還主衣庫太官進御食有裹蒸帝曰我食此不盡可四片破之餘充晚食而世祖掖庭中宮殿服御一無所改性猜忌多慮故亟行誅戮潛信道術用計數出行幸先占利害南出則唱云西行東遊則唱云北幸簡於出入竟不南郊上初有疾無輟聽覽祕而不傳及寢疾甚久勑臺省府署文簿求白魚以為治外始知之身衣絳衣服飾皆赤以為厭勝巫覡云後湖水頭經過宮內致帝有疾帝乃自至太官行水溝左右啓太官若無此水則不立帝決意塞之欲南引淮流會崩事寢史臣曰高宗以支庶纂曆據猶子而為論一朝到此誠非素心遺寄所當諒不獲免夫戕夷之事懷抱多端或出自雄忍或生乎畏懾令同財之親在我而先棄進引之愛量物其必違疑怯既深猜似外人流涕行誅非云義舉事苟求安能無內愧既而自樹本根枝胤孤弱貽厥不昌終覆宗社若令壓鈕紐之徵必委天命盤庚之祀亦繼陽甲杖運推公夫何譏爾贊曰高宗傍起宗國之慶慕名儉德垂文法令兢兢小心察察吏政沔陽失土南風不競
