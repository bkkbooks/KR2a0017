body:
  text: 南齊書卷三梁蕭子顯撰夲紀第三武帝世祖武皇帝諱賾字宣逺太祖長子也小諱龍兒生扵建康青溪宅其夜陳孝后劉昭后同夢龍據屋上故字上焉初為尋陽國侍郎辟州西曺書佐出為贑令江州刺史晉安王子勛反上不従命南康相沈肅之縶上扵郡獄族人蕭欣祖門客桓康等破郡迎出上肅之率将吏數百人追撃上與左右拒戰生獲肅之斬首百餘級遂率部曲百餘人舉義兵始興相殷孚将萬兵赴子勛扵尋陽㦯勸上擊之上以衆寡不敵避屯揭陽山中聚衆至三千人子勛遣其将戴凱之為南康相及軍主張宗之千餘人助之上引兵向郡撃凱之别軍主程超數百人扵南康口又進撃宗之破斬之遂圍郡城凱之以數千人固守上親率将士盡日攻之城陷凱之奔走殺偽贑令陶沖之上即據郡城遣軍主張應期鄧恵真三千人襲豫章子勛遣軍主談秀之等七千人與應期相拒扵西昌築營壘交戰不能決聞上将自下秀之等退散事平徴為尚書庫部郎征北中兵𠫭軍西陽縣子帶南東莞太守越騎校尉正員郎劉韞撫軍長史襄陽太守别封贑縣子邑三百戸固辭不受轉寧朔将軍廣興相桂陽王休範反上遣軍襲尋陽至北嶠事平除晉熙王安西諮議不拜復還郡轉司徒右長史黄門郎沈攸之在荆椘宋朝密為之備元徽四年以上為晉熙王鎮西長史江夏内史行郢州事順帝立徴晉熙王燮為撫軍揚州刺史以上為左衛将軍輔燮俱下沈攸之事起未得朝廷䖏分上以中流可以待敵即據盆口城為戰守之備太祖聞之喜曰此真我子也上表求西討不許乃遣偏軍援郢平西将軍黄回䓁皆受上節度加上冠軍将軍持節昇眀二年事平轉散騎常侍都督江州豫州之新蔡晉熙二郡軍事征虜将軍江州刺史持節如故封聞喜縣侯邑二千戸其年徴侍中領軍将軍給鼓吹一部府置佐史領石頭戍軍事尋又加持節督京畿諸軍事三年轉散騎常侍尚書僕射中軍大将軍開府儀同三司進爵為公持節都督領軍如故給班劍二十人齊國建為齊公世子改加侍中南豫州刺史給油絡車羽葆鼓吹増班劍為四十人以石頭為世子宫官置二率以下坊省服章一如東宫進爵王太子太祖即位為皇太子建元四年三月壬戌太祖崩上即位大赦征鎮州郡令長軍屯營部各行喪三日不得擅離任都邑城守防備幢隊一不得還乙丑稱先帝遺詔以司徒褚淵録尚書事尚書左僕射王儉為尚書令車騎将軍張敬兒為開府儀同三司詔曰喪禮雖有定制先旨每存簡約内官可三日一還臨外官間一日還臨後有大喪皆如之丁夘以右衛将軍呂安國為司州刺史庚午以司空豫章王嶷為太尉癸酉詔曰城直之制厯代宜同頃嵗逋弛遂以萬計雖在憲冝懲而原心可亮積年逋城可悉原蕩自兹以後申眀舊科有違糾裁庚辰詔曰比嵗未稔貧窮不少京師二岸多離其弊遣中書舎人優量賑䘏夏四月丙午以輔國将軍張倪為兖州刺史辛夘追尊穆妃為皇后五月乙丑以丹陽尹聞喜公子良為南徐州刺史甲戌以新除左衛将軍垣崇祖為豫州刺史癸未詔曰頃水雨頻降潮流荐滿二㟁居民多所淹漬遣中書舍人與兩縣官長優量賑䘏六月甲申立皇太子長懋詔申壬戍赦恩百日乙酉以鄱陽王鏘為雍州刺史臨汝公子卿為郢州刺史甲午以寧朔将軍臧靈智為越州刺史丙申立皇太子妃王氏進封聞喜公子良為竟陵王臨汝公子卿為廬陵王應城公子敬為安陸王江陵公子懋為晉安王枝江公子隆為随郡王皇子子真為建安王皇孫昭業為南郡王戊戌詔曰水潦為患星緯乖序京都囚繋可剋日訊決諸逺獄委刺史以時察判建康秣陵二縣貧民加賑賜必令周悉呉興義興遭水縣蠲除租調癸夘以司徒褚淵為司空驃騎将軍秋七月庚申以衛尉蕭順之為豫州刺史壬戌以冠軍将軍垣榮祖為青冀二州刺史八月癸夘司徒褚淵薨九月丁巳以國哀故罷國子學己巳以前軍将軍姜伯起為秦州刺史辛未以征南将軍王僧䖍為左光禄大夫開府儀同三司尚書右僕射王奐為湘州刺史冬十二月己丑詔曰縁淮戍将久䖏邉勞三元行始宜沾恩慶可遣中書舍人宣㫖臨會後每嵗皆如之庚子以太子左衛率戴僧静為徐州刺史永明元年春正月辛亥車駕祀南郊大赦改元壬子詔内外羣僚各舉朕違肆心規諌又詔王公卿士各舉所知随方登叙詔曰經邦之寄寔資莅民守宰禄俸盖有恒凖往以邉虞告警故㳂時損益今區㝢寧晏庶績咸熙念勤簡能宜加優奨郡縣丞尉可還田秩太尉豫章王嶷領太子太傅䕶軍将軍長沙王晃為南徐州刺史鎮北将軍竟陵王子良為南兖州刺史庚申以侍中蕭景先為中領軍壬戍立皇弟鋭為南平王鏗為宜都王皇子子明為武昌王子罕為南海王甲子為築青溪舊宫詔槊仗瞻履二月辛巳以征虜将軍楊炅為沙州刺史辛丑以隴西公宕昌王梁彌機為河凉二州刺史東羌王像舒彭為西凉州刺史三月癸丑詔曰宋徳将季風軌陵遲列宰庶邦彌失其序遷謝遄速公私凋弊泰運初基草昧惟始思述先範永隆治根莅民之職一以小滿為限其有聲績剋舉厚加甄異理務無庸随時代黜丙辰詔曰朕自丁荼毒奄便周忌瞻言負荷若墜淵壑而逺圖尚蔽政刑未理星緯失序隂陽愆度思播先澤兼酬天𤯝可申辛亥赦恩五十日以期訖為始京師囚繋悉皆原宥三署軍徒優量降遣都邑鰥寡尤貧詳加賑䘏戊寅詔四方見囚罪無輕重及刼賊餘口長徒勑繋悉原赦逋負督贓建元四年三月以前皆特除夏四月壬午詔曰魏矜袁紹恩洽丘墓晉亮兩王榮覃餘裔二代𢎞義前載美談袁粲劉秉與先朝同奨宋室沈攸之扵景和之世特有迺心雖末節不終而始誠可録嵗月彌往宜特優降粲秉前年改葬塋兆未修材槨可為經理令粗足周禮攸之及其諸子喪柩在西者可符荆州送反舊墓在所為營𦵏事五月丁酉車騎将軍張敬兒伏誅六月丙寅詔凡坐事應覆治者在建元四年三月以前皆原宥秋七月戊戌新除左光禄大夫王僧䖍加特進九月己夘以荆州刺史臨川王映為驃騎将軍冠軍将軍廬陵王子卿為荆州刺史呉郡太守安陸侯緬為郢州刺史二年春正月乙亥以司州刺史呂安國為南兖州刺史征北将軍竟陵王子良為䕶軍将軍兼司徒征北長史劉悛為司州刺史丙子以右光禄大夫王延之為特進三月乙亥以呉興太守張岱為南兖州刺史前将軍王奐為江州刺史平北将軍呂安國為湘州刺史戊寅以少府趙景翼為廣州刺史夏四月甲辰詔揚南徐南兖徐兖五州統内諸獄并豫江三州府州見囚江州尋陽新蔡兩郡繋獄竝部送還臺湏候克日斷枉直縁江逺郡及諸州委刺史詳察訊己巳以寧朔将軍程法勤為寧州刺史六月癸夘車駕幸中堂聽訟乙巳以安陸王子敬為南兖州刺史戊申以黄門侍郎崔平仲為青冀二州刺史秋七月癸未詔曰夫樂所自生先哲垂誥禮不忘夲積代同風是以漢光遲回扵南陽魏文殷勤扵譙國青溪宫體天含暉則地栖寳光定靈源允集符命在昔期運初開經綸方逺繕築之勞我則未暇時流事往永惟哽咽朕以寡薄嗣奉鴻基思存締構式表王跡考星創制揆日興功子来告畢規摹昭備宜申釁落之禮以暢感慰之懐可克日小會甲申立皇子子倫為巴陵王八月丙午車駕幸舊宫小會設金石樂在位者賦詩詔申京師獄及三署見徒量所降宥領宫職司詳賜幣帛戊申車駕幸𤣥武湖講武甲子詔曰窆枯掩骼義重前誥䘏老哀癃寔惟令典朕求思民瘼弗忘鑒寐聲憓未敷物多乖所京師二縣或有久墳毁彂可随宜掩埋遺骸未櫬竝加斂瘞疾病窮困不能自存者詳為條格竝加沾賚冬十月丁巳以桂陽王鑠為南徐州刺史十一月丁亥以始興王鏗為益州刺史三年春正月丙辰以大司農劉楷為交州刺史安西諮議𠫭軍崔慶緒為南梁秦二州刺史甲申以晉安王子懋為南豫州刺史辛夘車駕祀南郊大赦都邑三百里内罪應入重者降一䓁餘依赦制劾繋之身降遣有差賑䘏二縣貧民又詔曰春秋國語云生民之有學斆猶樹木之有枝葉果行育徳咸必由茲在昔開運光宅華夏方𢎞典謨克隆教思命彼有司崇建庠塾甫就經始仍離屯故仰瞻徽猷嵗月彌逺今遐邇一體車軌同文宜髙選學官廣延冑子又詔守宰親民之要刺史案部所先宜嚴課農桑相土揆時必窮地利若耕蠶殊衆足厲浮惰者所在即便列奏其違方驕矜佚事妨農亦以名聞将眀賞罰以勸勤怠校覈殿最嵗竟攷課以申黜陟二月辛丑車駕祀北郊夏四月戊戌以新除右衞将軍豫章王世子子響為豫州刺史輔國将軍桓敬為兖州刺史五月乙未詔曰氓俗凋弊扵茲永久雖年穀時登而歉乏比室凡單丁之身及煢獨而秩養養孤者竝蠲今年田租是月省總眀觀六月庚戌進河南王易度侯為車騎将軍秋七月辛丑詔丹陽所領及餘二百里内見囚同集京師自此以外委州郡決斷甲戌左光禄大夫開府儀同三司王僧䖍薨丁亥以驃騎中兵㕘軍董仲舒為寧州刺史八月乙未車駕幸中堂聽訟丁巳以行宕昌王梁彌頡為河涼二州刺史戊午以尚書令王儉領太子少傅太子詹事蕭順之為領軍将軍冬十月壬戌詔曰皇太子長懋講畢當釋奠王公以下可悉往觀禮十一月乙丑以冠軍将軍王文仲為青冀二州刺史十二月丁酉詔曰九榖之重八材為末是故潔粢豐盛祝史無愧扵辭不籍千畆周宣所以貽諌昔期運初唘庶政草昧三推之典我則未暇朕嗣奉鴻基思隆先軌載耒躬親率由舊式可以開春彂嵗敬簡元辰鳴青鸞扵東郊冕朱紘而莅事仰薦宗禋俯朂黔皁将使囷庾内充遺秉外牣既富而教茲焉攸在是夏琅邪郡旱百姓芟除枯苗至秋擢穎大熟四年春正月甲子以南琅邪彭城二郡太守随郡王子隆為江州刺史征虜長史張瓌為雍州刺史征虜将軍薛淵為徐州刺史䕶軍将軍兼司徒竟陵王子良進號車騎将軍富陽人唐㝢之反聚衆桐廬破富陽錢塘等縣害東陽太守蕭崇之遣宿衞兵出討伏誅丁酉冠軍将軍馬軍主陳天福坐討唐㝢之燒掠百姓棄市辛夘車駕幸中堂䇿秀才閏月癸巳立皇子子貞為邵陵王皇孫昭文為臨汝公丁未以武都王楊集始為北秦州刺史辛亥車駕籍田詔曰夫耕籍所以表敬親載所以率民朕景行前規躬執良耜千畛咸事六稔可期教義克宣誠感兼暢重以天符靈貺嵗月鱗萃寳鼎開玉匣之祥嘉禾彂同穂之頴甘露凝暉扵坰牧神爵騫翥扵蘭囿斯乃宗稷之慶豈寡薄所臻思俾休和覃茲黔皁見刑罪殊死以下悉原宥諸逋負在三年以前尤窮弊者一皆蠲除孝悌力田詳授爵位孤老貧窮賜榖十石凡欲附農而糧種闕乏者竝加給貸務在優厚癸丑以始興内史劉勑為廣州刺史甲寅以籍田禮畢車駕幸閱武堂勞酒小會詔賜王公以下在位者帛有差戊午車駕幸宣武堂講武詔曰今親閱六師少長有禮領馭羣帥可量班賜二月己未立皇弟銶為晉熙王鉉為河東王庚寅以光禄大夫王𤣥載為兖州刺史三月辛亥國子講孝經車駕幸學賜國子祭酒博士助教絹各有差夏四月丁亥以尚書左僕射栁世隆為湘州刺史臨沂縣麥不登刈為馬芻至夏更苗秀五月癸巳詔楊南徐二州今年戸租三分二取見布一分取錢来嵗以後逺近諸州輸錢䖏竝減布直匹准四百依舊折半以為永制丙午以呉興太守西昌侯鸞為中領軍秋八月辛酉以鎮南長史蕭恵休為廣州刺史九月甲寅以征虜将軍王廣之為徐州刺史冬十二月乙亥以東中郎司馬崔慧景為司州刺史五年春正月戊子以太尉豫章王嶷為大司馬車騎将軍竟陵王子良為司徒驃騎将軍臨川王映衞将軍王儉中軍将軍王敬則竝夲號開府儀同三司都官尚書沈文季為郢州刺史左