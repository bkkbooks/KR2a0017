body:
  text: 南齊書卷十九志第十一五行木傳曰東方易經地上之木為觀故木於人威儀容貌也木者春生氣之始農之本也無奪農時使民歲不過三日行什一之稅無貪欲之謀則木氣從如人君失威儀逆木行田獵馳騁不反宮室飲食沈湎不顧禮制出入無度多發繇役以奪民時作為姦詐以奪民財則木失其性矣蓋以工匠之為輪矢者多傷敗故曰木不曲直宋泰豫元年京師祗垣寺皂莢樹枯死升明末忽更生花葉京房易傳曰樹枯冬生不出二年國喪君子亡其占同宋氏禪位建元元年朱爵耳臼兒華表柱生枝葉建元初李子生毛二年武陵沅頭都尉治有桑樹方冬生葉京房易傳曰木冬生花天下有喪其占同後二年宮車晏駕四年巴州城西古樓腳柏柱數百年忽生花永明六年后石子岡柏木長二尺四寸廣四寸半化為石時車駕數遊幸應本傳木失其性也永明中大耳臼兒一舶無故自沈艚中無水隆昌元年廬陵王子卿齋屋梁柱際無故出血建武初始安王遙光治廟截東安寺屋以直廟垣截梁水出如淚貌傳曰失威儀之制怠慢驕恣謂之狂則不肅矣下不敬則上無威天下既不敬又肆其驕恣肆之則不從夫不敬其君不從其政則陰氣勝故曰厥罰常雨永明八年四月己巳起陰雨晝或暫晴夜時見星月連雨積霖至十七日乃止十一年四月辛巳朔去三月戊寅起而其間暫時晴從四月一日又陰雨晝或見日夜乍見月回復陰雨至七月乃止永泰元年十二月二十九日雨至永元元年五月二十一日乃晴京房占曰冬雨天下飢春雨有小兵時虜寇雍州餘應本傳傳曰大雨雪猶庶徵之常雨也然有甚焉雨陰大雨雪者陰之畜積甚也一曰與大水同象曰攻為雪耳建元二年閏月己丑雨雪三年十一月雨雪或陰或晦八十餘日至四年二月乃止傳曰雷於天地為長子以其首長萬物與之出入故雷出萬物出雷入萬物入夫雷者人君之象入則除害出則興利雷之微氣以正月出其有聲者以二月出以八月入其餘微者以九月入冬三月雷無出者若是陽不閉陰則出涉危難而害萬物也建元元年十月壬午夜電光因雷鳴十一月庚戌電光有頃雷鳴久而止永明五年正月戊申夜西北雷聲六年十月甲申夜陰細雨始聞雷鳴於西北上七年正月甲子夜陰雷鳴西南坤宮隆隆一聲而止八年正月庚戌夜雷起坎宮水門其音隆隆一聲而止九年二月丙子西北有電光因聞雷聲隆隆仍續十聲而止十年二月庚戌夜南方有電光因聞雷聲隆隆相續丁亥止十月庚子電雷起西北十一月丁丑西南有光因聞雷聲隱隱再聲而止西南坤宮十二月甲申陰雨有電光因聞西南及西北上雷鳴頻續三聲丙申夜聞西北上雷頻續二聲辛亥雷雨傳曰雨雹君臣之象也陽之氣專為雹陰之氣專為霰陽專而陰脅之陰盛而陽薄之雹者陰薄陽之象也霰者陽脅陰之符也春秋不書霰者猶月蝕也建元四年五月戊午朔雹永明元年九月乙丑雹落大如蒜子須臾乃止十一年四月辛亥雹落大如蒜子須臾滅貌傳又曰上失節而狂下怠慢而不敬上下失道輕法侵制不顧君上因以荐飢貌氣毀故有雞一曰水歲雞多死及為怪亦是也上下不相信大臣姦宄民為寇盜故曰厥極惡一曰民多被刑或形貌醜惡風俗狂慢變節易度則為輕剽奇怪之服故曰時則有服妖永明中宮內服用射獵錦文為騎射兵戈之象至建武初虜大為寇永明中蕭諶開博風帽後之製為破後帽世祖崩後諶建廢立誅滅諸王永明末民間制倚勸帽及海陵廢明帝之立勸進之事倚立可待也建武中帽覆頂東昏時以為應在下而今在上不祥斷之羣下反上之象也永元中東昏侯自造遊宴之服綴以花采錦繡難得詳也羣小又造四種帽帽因勢為名一曰山鵲歸林者詩云鵲巢夫人之德東昏寵嬖淫亂故鵲歸其林藪二曰兔子度坑天意言天下將有逐兔之事也三曰反縛黃離嘍黃口小鳥也反縛面縛之應也四曰鳳皇度三橋鳳皇者嘉瑞三橋梁王宅處也貌傳又曰危亂端見則天地之異生木者青故曰青眚為惡祥凡貌傷者金沴木木沴金衝氣相通延興元年海陵王初立文惠太子冢上有物如人長數丈青色直上天有聲如雷火南方揚光輝出炎爚為明者也人君向明而治蓋取其象以知人為分讒佞既遠羣賢在位則為明而火氣從矣人君疑惑棄法律不誅讒邪則讒口行內間骨肉外疏忠臣至殺世子逐功臣以妾為妻則火失其性上災宗廟下災府榭內熯本朝外熯闕觀雖興師衆不能救也永明三年正月甲夜西北有野火光上生精西北有四東北有一並長七八尺黃赤色三月庚午丙夜北面有野火光上生精長六尺戊夜又有一枚長五尺並黃赤色四年正月丁亥夜有火精三處閏月丁巳夜有火精四所十二月辛酉夜東南有野火精二枚五年十二月丙寅夜西北有野火火上生精一枚長三尺黃白色六年十一月戊申夜西南及北三面有野火火上生精九枚並長二尺黃赤色九年二月丙寅甲夜北面有野火火生精二枚西北又一枚並長三尺須臾消永元二年八月宮內火燒西齋璿儀殿及昭陽顯陽等殿北至華林牆西及祕閣凡屋三千餘間京房易傳曰君不思道厥妖火燒宮祕閣與春秋宣榭火同天意若曰既無紀綱何用典文為也二年冬京師民間相驚云當行火災南岸人家往往於籬間得布火纏者云公家以此禳之三年正月豫章郡天火燒三千餘家京房易占曰天火下燒民屋是謂亂治殺兵作是年臺軍與義師偏衆相攻於南江諸郡三年二月乾和殿西廂火燒屋三十間是時西齋既火帝徙居東齋高宗所住殿也與燒宮占同傳又曰犯上者不誅則草犯霜而不死或殺不以時事在殺生失柄故曰草妖也一曰草妖者失衆之象也永元中御刀黃文濟家齋前種昌蒲忽生花光影照壁成五采其兒見之餘人不見也少時文濟被殺劉歆視傳有羽蟲之孽謂雞禍也班固案易雞屬巽今以羽蟲之孽類是也依歆説附視傳云建武二年有大鳥集建安形如水犢子其年郡大水三年大鳥集東陽郡太守沈約表云鳥身備五采赤色居多案樂緯叶圖徵云焦明鳥質赤至則水之感也永明二年四月烏巢內殿東鴟尾三年大鳥集會稽上虞其年縣大水傳曰維水沴火又曰赤眚赤祥建武四年王晏子德元所居帷屏無故有血灑之少日而散晏尋被誅思心傳曰心者土之象也思心不睿其過在瞀亂失紀風於陽則為君於陰則為大臣之象專恣而氣盛故罰常風心為五事主猶土為五行主也一曰陰陽相薄偏氣陽多為風其甚也常風陰氣多者陰而不雨其甚也常陰一曰風宵起而晝晦以應常陰同象也建元元年十一月庚戌風夜暴起雲雷合冥從戌亥上來四年十一月甲寅酉時風起小駃至二更雪落風轉浪津永明四年二月丙寅巳時風迅急十一月己丑戌時風迅急從西北戌亥上來五年五月乙酉子時風迅急從西北戌亥上來七年正月丁卯陽徵陰賊之日時加子風起迅急從北方子丑上來暴疾浪津寅時止八年六月乙酉時加子時風起迅急暴疾浪津發屋折木塵沙從西南未上來因雷雨須臾風微雨止九年七月甲寅陽羽廉貞之日時加亥風起迅急從東方來暴疾彭勃浪津至乙卯陰賊時漸微名羽動羽九月乙丑時加未雷驟雨風起迅急暴疾浪津從西北戌上來十月壬辰陽羽姦邪之日時加丑風起從北方子丑上來暴疾浪津迅急塵埃五日寅時漸微名羽動宮十年正月辛巳陽商寬大之日時加寅風從西北上來暴疾浪津迅急揚沙折木酉時止二月甲辰陽徵姦邪之日時加辰風起迅急從西北亥上來暴疾彭勃浪津至酉時止三月丁酉陽徵廉貞之日時加未風從北方子丑上來迅急暴疾浪津戌時止七月庚申陰角貪狼之日時加午風從東北丑上來迅急浪津至辛酉巳時漸微十一年二月庚寅陽角廉貞之日時加亥風從西北亥上來迅疾浪津丑時漸微為角動角七月甲寅陽羽廉貞之日時加巳風從東北寅上來迅疾浪津發屋折木戊夜漸微為羽動徵己巳陽角寬大之日時加未風從戌上來暴疾良久止為角動商及宮凡時無專恣疑是陰陽相薄建昌武元年三月乙酉未時風起浪津暴急從北方上來應本傳瞀亂建武二年三年四年每秋七月八月輒大風三吳尤甚發屋折木殺人京房占獄吏暴風害人時帝嚴刻永元元年七月十二日大風京師十圍樹及官府居民屋皆拔倒應本傳傳又曰山之於地君之象也山崩者君權損京陵易處世將變也陵轉為澤貴將為賤也建元二年夏廬陵石陽縣長溪水衝激山麓崩長六七丈下得柱千餘口皆十圍長者一丈短者八九尺頭題有古文字不可識江淹以問王儉儉云江東不間隸書此秦漢時柱也後年宮車晏駕世變之象也永明二年秋始興曲江縣山崩壅底溪水成陂京房占山崩人主惡之傳又曰雷電所擊蓋所感也皆思心有尤之所致也建元二年閏六月丙戌戊夜震電四年五月五日雲雹暗都雷震于樂遊安昌殿電火焚蕩盡永明八年四月六日雷震會稽山陰山保林寺剎上四破電火燒塔下佛面窗戶不異也永明中雷震東宮南門無所傷毀殺食官一人十一年三月震于東齋棟崩左右密欲治繕竟陵王子良曰此豈可治留之志吾過且旌天之愛我也明年子良薨傳又曰土氣亂者木金水火亂之建武二年二月丁巳地震永元元年七月地日夜十八震九月十九日地五震金者西方萬物既成殺氣之始也其於王事兵戎戰伐之道也王者興師動衆建立旗鼓仗旄把鉞以誅殘賊止暴亂殺伐應義則金氣從工冶鑄化革形成器也人君樂侵陵好攻戰貪城邑輕百姓之命人民不安內外騷動則金失其性蓋冶鑄不化水冰滯固堅故曰金不從革又曰維木沴金建武四年明帝出舊宮送豫章王第二女綏安主降嬪還上輦輦上金翅無故自折落地言傳曰言易之道西方曰兌為口人君過差無度刑法不一斂從其重或有師旅炕陽之節若動衆勞民是言不從人君既失衆政令不從孤陽持治下畏君之重刑陽氣勝則旱象至故曰厥罰常陽也建元三年大旱時有虜寇永明三年大旱明年唐𧜛之起建武二年大旱時虜寇方盛皆動衆之應也言傳曰下既悲苦君上之行又畏嚴刑而不敢正言則必先發於歌謠歌謠口事也口氣逆則惡言或有怪謠焉宋泰始既失彭城江南始傳種消梨先時所無百姓爭欲種植識者曰當有姓蕭而來者十餘年齊受禪元徽中童謠曰襄陽白銅蹄郎殺荊州兒後沈攸之反雍州刺史張敬兒襲江陵殺沈攸之子元琰等永明元年元日有小人發白虎樽既醉與筆扎不知所道直云憶高帝敕原其罪世祖起青溪舊宮時人反之曰舊宮者窮廄也及上崩後宮人出居之永明初百姓歌曰白馬向城啼欲得城邊草後句間云陶郎來白者金色馬者兵事三年妖賊唐𧜛之起言唐來勞也世祖起禪靈寺初成百姓縱觀或曰禪者授也靈非美名所授必不得其人後太孫立見廢也永明中宮內坐起御食之外皆為客食世祖以客非家人名改呼為別食時人以為分別之象少時上晏駕文惠太子在東宮作兩頭畕畕詩後句云磊磊落落玉山崩自此長王宰相相繼薨徂二宮晏駕文惠太子作七言詩後句輒云愁和諦後果有和帝禪位永明中虜中童謠云黑水流北赤火入齊尋而京師人家忽生火赤於常火熱小微貴賤爭取以治病法以此火灸桃板七炷七日皆差敕禁之不能斷京師有病癭者以火灸數日而差鄰人笑曰病偶自差豈火能為此人便覺頤間癢明日癭還如故後梁以火德興文惠太子起東田時人反云後必有癲童果由太孫失位齊宋以來民間語云擾攘建武上明帝初誅害蕃戚京師危駭永元元年童謠曰洋洋千里流流翣東城頭烏馬烏皮袴三更相告訴腳跛不得起誤殺老姥子千里流者江祏也東城遙光也遙光夜舉事垣歷生者烏皮袴褶往奔之跛腳亦遙光老姥子孝字之象徐孝嗣也永元中童謠云野豬雖嗃嗃馬子空閭渠不知龍與虎飲食江南墟七九六十三廣莫人無餘烏集傳舍頭今汝得寬休但看三八後摧折景陽樓識者解云陳顯達屬豬崔慧景屬馬非也東昏侯屬豬馬子未詳梁王屬龍蕭穎胄屬虎崔慧景攻臺頓廣莫門死時年六十三烏集傳舍即所謂瞻烏爰止于誰之屋三八二十四起建元元年至中興二年二十四年也摧折景陽樓亦高臺傾之意也言天下將去乃得休息也齊宋之際民間語云和起言以和顏而為變起也後和帝立崔慧景圍臺城有一五色幡飛翔在雲中半日乃不見衆皆驚怪相謂曰幡者事尋當翻覆也數日而慧景敗言傳曰言氣傷則民多口舌故有口舌之痾金者白故有白眚若有白為惡祥宋升明二年飊風起建康縣南塘里吹帛一匹入雲風止下御路紀僧真啓太祖當宋氏禪者其有匹夫居之水北方冬藏萬物氣至陰也宗廟祭祀之象死者精神放越不反者故為之廟以收其散為之貌以收其魂神而孝子得盡禮焉敬之至則神歆之此則至陰之氣從則水氣從溝瀆隨而流去不為民害矣人君不禱祀簡宗廟廢祭祀逆天時則霧水暴出川水逆溢壞邑軼鄉沈溺民人故曰水不潤下建元二年吳吳興義興三郡大水二年夏丹陽吳二郡大水四年大水永明五年夏吳興義興水雨傷稼六年吳興義興二郡大水建武二年冬吳晉陵二郡水雨傷稼永元元年七月濤入石頭漂殺緣淮居民應本傳荊州城內有沙池常漏水蕭穎胄為長史水乃不漏及穎胄亡乃復竭傳曰極陰氣動故有魚孽魚孽者常寒罰之符也永明九年鹽官縣石浦有海魚乘潮來水退不得去長三十餘丈黑色無鱗未死有聲如牛土人呼為海燕取其肉食之永元元年四月有大魚十二頭入會稽上虞江大者近二十餘丈小者十餘丈一入山陰稱浦一入永興江皆暍岸側百姓取食之聽傳曰不聰之象見則妖生於耳以類相動故曰有鼓妖也一曰聲屬鼓妖永明元年十一月癸卯夜天東北有聲至戊夜傳曰皇之不極是謂不建其咎在霿亂失聽故厥咎霿思心之咎亦霧天者正萬物之始王者正萬事之始失中則害天氣類相動也天者轉於下而運於上雲者起於山而彌於天天氣動則其象應故厥罰常陰王者失中臣下盛強而蔽君明則雲陰亦衆多而蔽天光也建元四年十月丙午日入後土霧勃勃如火煙永明二年十一月己亥四面土霧入人眼鼻至辛丑止二年十一月丙子日出後及日入後四面土霧勃勃如火煙六年十一月庚戌丙夜土霧竟天昏塞濃厚至六日未時小開到甲夜仍後仍濃密勃勃如火煙辛慘入人眼鼻八年十月壬申夜土霧竟天濃厚勃勃如火煙氣入人眼鼻至九日辰時開除九年十月丙辰晝夜恆昏霧勃勃如火煙其氣辛慘入人眼鼻兼日色赤黃至四日甲夜開除十年正月辛酉酉初四面土霧勃勃如火煙其氣辛慘入人眼鼻傳曰易曰乾為馬逆天氣馬多死故曰有馬禍一曰馬者兵象也將有寇戎之事故馬為怪建昌武四年王晏出至草市馬驚走鼓步從車而歸十餘日晏誅建武中南岸有一蘭馬走逐路上女子女子窘急走入人家牀下避之馬終不置發牀食女子股腳間肉都盡禁司以聞敕殺此馬是後頻有寇賊京房易傳曰生子二以上民謀其主三手以上臣謀其主二口已上國見驚以兵三耳已上是謂多聽國事無定二鼻以上國主久病三足三臂已上天下有兵其類甚多蓋以象占之永明五年吳興東遷民吳休之家女人雙生二兒以下齊以上合京房易傳曰野獸入邑其邑大虛又曰野獸無故入邑朝廷門及宮府中者邑逆且虛永明中南海王子罕為南六允州刺史有麞入廣陵城投井而死又有象至廣陵是後刺史安陸王子敬於鎮被害建武四年春當郊治丘圓丘宿設已畢夜虎攫傷人建武中有鹿入景皇寢廟皆為上崩及禪代也凡無占者皆為不應本傳贊曰木怪夔魍火為水妃土實載物金作明威形聲異迹影響同歸皆由象應莫不類推
