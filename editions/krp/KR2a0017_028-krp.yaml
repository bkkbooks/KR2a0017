body:
  text: 南齊書卷二十八梁蕭子顯撰列傳第九崔祖思劉善明蘇侃垣榮祖崔祖思字敬元清河東武城人崔琰七世孫也祖諲宋冀州刺史父僧護州秀才祖思少有志氣好讀書史初州辟主簿與刺史劉懐珍於堯廟祀神廟有蘇侯像懐珍曰堯聖人而與雜神為列欲去之何如祖思曰蘇峻今日可謂四凶之五也懷珍遂令除諸雜神太祖在淮陰祖思聞風自結為上輔國主簿甚見親待參豫謀議除奉朝請安成王撫軍行參軍員外正員郎冀州中正宋朝初議封太祖為梁公祖思啟太祖曰䜟書云金刀利刃齊刈之今宜稱齊實應天命從之轉為相國從事中郎遷齊國内史建元元年轉長兼給事黄門侍郎上初即位祖思啟陳政事曰禮誥者人倫之襟冕帝王之樞柄自古開物成務必以敎學為先世不習學民罔志義悖競因斯而興禍亂是焉而作故篤俗昌治莫先道敎不得以夷禍革慮儉泰移業今無員之官空受祿力三載無考績之効九年闕登黜之序國儲以之虛匱民力為之凋散能否無章涇渭混流宜太廟之南引修文序司農以北廣開武校臺州列國限外之職問其所樂依方課習各盡其能月供僮幹如先充給若有廢墮遣還故郡殊經奇藝待以不次士修其業必有異等民識其利能無勉勵又曰漢文集上書囊以為殿帷身衣弋綈以韋帶劒慎夫人衣不曵地惜中民十家之產不為露臺蜀主取帳鈎銅鑄錢以充國用魏武遣女皁帳婢十人東阿婦以繡衣賜死王景興以淅米見誚宋武節儉過人張妃房帷碧綃蚊幬三齊苮席五盞盤桃花米飯殷仲文勸令畜伎答云我不解聲仲文曰但畜自解又答畏解故不畜歴觀帝王未嘗不以約素興侈麗亡也伏惟陛下體唐成儉踵虞為樸寢殿則素木卑構饍噐則陶瓢充御瓊簪玉筯碎以為塵珍裘繡服焚之如草斯實風高上代民偃下世矣然敎信雖孚氓染未革宜加甄明以速歸厚詳察朝士有柴車蓬館高以殊等雕墻華輪卑其稱謂馳禽荒色長違清編嗜音酣酒守官不徙物識義方且懼且勸則調風變俗不俟終日又曰憲律之重由來尚矣故曹參去齊唯以獄市為寄餘無所言路温舒言秦有十失其一尚在治獄之吏是也實宜清置廷尉茂簡三官寺丞獄主彌重其選研習律令刪除繁苛詔獄及兩縣一月三訊觀貎察情欺枉必達使明愼用刑無忝大易寧失不經靡愧周書漢來治律有家子孫竝世其業聚徒講授至數百人故張于二氏絜譽文宣之世陳郭兩族流稱武明之朝決獄無寃慶昌枝裔槐衮相襲蟬紫傳輝今廷尉律生乃令史門戸族非咸𢎞庭缺于訓刑之不措抑此之由如詳擇篤厚之士使習律令試簡有徴擢為廷尉僚屬茍官世其家而不美其績鮮矣廢其職而欲善其事未之有也若劉累傳守其業庖人不乏龍肝之饌斷可知矣又曰樂者動天地感鬼神正情性立人倫其義大矣按前漢編戸千萬太樂伶官方八百二十九人孔光等奏罷不合經法者四百四十一人正樂定員唯置三百八十八人今戸口不能百萬而太樂雅鄭元徽時校試千有餘人後堂雜伎不在其數糜廢力役傷敗風俗今欲撥邪歸道莫若罷雜伎王庭唯置鍾簴羽戚登歌而已如此則官充給養國反淳風矣又曰論儒者以德化為本談法者以刻削為體道敎治世之梁肉刑憲亂世之藥石故以敎化比雨露名法方風霜是以有恥且格敬讓之樞紐令行禁止為國之關楗然則天下治者賞罰而已矣賞不事豐所病於不均罰不在重所困於不當如令甲勳少乙功多賞甲而捨乙天下必有不勸矣丙罪重丁𤯝輕罰丁而赦丙天下必有不悛矣是賞罰空行無當乎勸沮將令見罰者寵習之臣受賞者仇讐之士戮一人而萬國懼賞匹夫而四海悦又曰籍税以厚國國虚民貧廣田以實廪國富民瞻堯資用天之儲實拯懷山之數湯憑分地之積以勝流金之運近代魏置典農而中都足食晉開汝潁而汴河委儲今將掃闢咸華題鏤龍漠宜簡役敦農開田廣稼時罷山池之威禁深抑豪右之兼擅則兵民優贍可以出師又曰古者左史記言右史記事故君舉必書盡直筆而不汚上無妄動知如絲之成綸今者著作之官起居而已述事之徒襃䛕為體世無董狐書法必隠時闕南史直筆未聞又廢諫官聼納靡依雖課勵朝僚徴訪芻輿莫若推舉質直職思其憂夫越任于事在言為難當官而行處辭或易物議既以無言望己已亦當以吞黙慙人中丞雖謝咸𤣥未有全廢劾簡廷尉誠非釋之寧容都無訊牒故知與其謬人寧不廢職目前之明効也漢徴貢禹為諫大夫矢言先策夏侯勝狂直拘繫出補諷職伐柯非遐行之即善又曰天地無心賦氣自均寧得誕秀徃古而獨寂寥一代將在知與不知用與不用耳夫有賢而不知知賢而不用用賢而不委委賢而不信此四者古今之通患也今誠重郭隗而招劇辛任鮑叔以求夷吾則天下之士不待召而自至矣上優詔報答尋遷寧朔將軍冠軍司馬領齊郡太守本官如故是冬虜動遷冠軍將軍軍主屯淮上二年進號征虜將軍軍主如故仍遷假節督青冀二州刺史將軍如故少時卒上歎曰我方欲用祖思不幸可惜詔賻錢三萬布五十匹祖思宗人文仲初辟州從事泰始初為薛安都平北主簿拔難歸國元徽初從太祖於新亭拒桂陽賊著誠効除游擊將軍沈攸之事起助豫章王鎭東府歴驃騎諮議出為徐州刺史建元初封建陽縣子三百戸二年虜攻鍾離文仲擊破之又遣軍主崔孝伯等過淮攻拔虜茬眉戍殺戍主龍得侯及偽陽平太守郭杜羝館陶令張徳濮陽令王明時虜攻殺馬頭太守劉從上曰破茬眉足相補文仲又遣軍主陳靖攻虜竹邑戍主白仲都又遣軍主崔延叔攻偽淮陽太守梁惡竝殺之三年淮北義民桓磊磈於抱犢固與虜戰大破之仲文馳啟上敇曰北間起義者衆深恐良㑹不再至卿善奬沛中人若能一時攘袂當遣一佳將直入也文仲在政為百姓所憚除黄門郎領越騎校尉改封隨縣嘗獻太祖纒鬚䋲一枚上為納受永明元年為太子左率累至征虜將軍冠軍司馬汝陰太守四年卒贈後將軍徐州刺史諡襄子劉善明平原人鎮北將軍懷珍族弟也父懷民宋世為齊北海二郡太守元嘉末青州饑荒人相食善明家有積粟躬食饘粥開倉以救鄉里多獲全濟百姓呼其家田為續命田少而靜處讀書刺史杜驥聞名候之辭不相見年四十刺史劉道隆辟為治中從事父懷民謂善明曰我已知汝立身復欲見汝立官也善明應辟仍舉秀才宋孝武見其對策强直甚異之泰始初徐州刺史薛安都反青州刺史沈文秀應之時州治東陽城善明家在郭内不能自拔伯父彌之詭說文秀求自効文秀使領軍主張靈慶等五千援安都彌之出門密謂部曲曰始免禍坑矣行至下邳起義背文秀善明從伯懷恭為北海太守據郡相應善明密契收集門宗部曲得三千人夜斬關奔北海族兄乗民又聚衆渤海以應朝廷而彌之尋為薛安都所殺明帝贈輔國將軍青州刺史以乗民為寧朔將軍冀州刺史善明為寧朔長史北海太守除尚書金部郎乗民病卒仍以善明為綏遠將軍冀州刺史文秀既降除善明為屯騎校尉出為海陵太守郡境邉海無樹木善明課民種榆檟雜菓遂獲其利還為後軍將軍直閤五年青州没虜善明母䧟北虜移置桑乾善明布衣蔬食哀戚如持喪明帝每見為之歎息時人稱之轉寕朔將軍巴西梓潼二郡太守善明以母在虜中不願西行涕泣固請見許朝廷多哀善明心事元徽初遣北使朝議令善明舉人善明舉州鄉北平田惠紹使虜贖得母還幼主新立羣公秉政善明獨結事太祖委身歸誠二年出為輔國將軍西海太守行青冀二州刺史至鎭表請北伐朝議不同善明從弟僧副與善明俱知名於州里泰始初虜㬥淮北僧副將部曲二千人東依海島太祖在淮隂壯其所為召與相見引為安成王撫軍叅軍蒼梧肆㬥太祖憂恐常令僧副微行伺察聲論使僧副密告善明及東海太守垣崇祖曰多人見勸北固廣陵恐一旦動足非為長算今秋風行起卿若能與垣東海微共動虜則我諸計可立善明曰宋氏將亡愚智所辨故胡虜若動反為公患公神武世出唯當静以待之因機奮發功業自定不可逺去根本自貽猖獗遣部曲健兒數十人隨僧副還詣領府太祖納之蒼梧廢徴善明為冠軍將軍太祖驃騎諮議南東海太守行南徐州事沈攸之反太祖深以為憂善明獻計曰沈攸之控引八州縱情蓄歛收衆聚騎營造舟仗苞藏賊志於焉十年性既險躁才非持重而起逆累旬遲回不進豈應有所待也一則闇於兵機二則人情離怨三則有掣肘之患四則天奪其魄本慮其剽勇長於一戰疑其輕速掩襲未備今六師齊奮諸侯同舉昔謝晦失理不鬬自潰盧龍乖道雖衆何施且袁粲劉秉賊之根本根本既滅枝葉豈久此是已籠之鳥耳事平太祖召善明還都謂之曰卿策沈攸之雖復張良陳平適如此耳仍遷散騎常侍領長水校尉黄門郎領後軍將軍太尉右司馬齊臺建為右衛將軍辭疾不拜司空褚淵謂善明曰高尚之事乃卿從來素意今朝廷方相委待詎得便學松喬邪善明曰我本無宦情既逢知己所以戮力驅馳願在申志今天地廓清朝盈濟濟鄙懷既申不敢昧於富貴矣太祖踐祚以善明勲誠欲與善明祿召謂之曰淮南近畿國之形勢自非親賢不使居之卿為我臥治也代高宗為征虜將軍淮南宣城二郡太守遣使拜授封新塗伯邑五百戸善明至郡上表陳事曰周以三聖相資再駕乃就漢值海内無主累敗方登魏挾主行令實踰二紀晉廢立持權遂歴四世景祚攸集如此之難者也陛下凝暉自天照湛神極睿周萬品道洽無垠故能高嘯閑軒鯨鯢自翦垂拱雲帟九服載晏靡一戰之勞無半辰之棘苞池江海籠苑嵩岱神祗樂推普天歸奉二三年間允膺寶命胄臨皇歴正位宸居開闢以來未有若斯之盛者也夫常勝者無憂恒成者好怠故雖休勿休姬旦作誥安不忘危尼父垂範今皇運草創萬化始基乘宋季葉政多澆苛億兆倒懸仰齊蘇振臣早䝉殊養志輸肝血徒有其誠曽闕埃露夙宵慙戰如墜淵谷不識忌諱謹陳愚管瞽言蒭議伏待斧鉞所陳事凡十一條其一以為天地開創人神慶仰宜存問逺方宣廣慈澤其二以為京師浩大逺近所歸宜遣醫藥問其疾苦年九十以上及六疾不能自存者隨宜量賜其三以為宋氏赦令䝉原者寡愚謂今下赦書宜令事實相副其四以為匃奴未滅劉昶猶存秋風揚塵容能送死境上諸城宜應嚴備特簡雄畧以待事機資實所須皆宜豫辦其五以為宜除宋氏大明泰始以來諸苛政細制以崇簡易其六以為凡諸土木之費且可權停其七以為帝子王姬宜崇儉約其八以為宜詔百官及府州郡縣各貢讜言以𢎞唐虞之美其九以為忠貞孝悌宜擢以殊階清儉苦節應授以民政其十以為革命惟始天地大慶宜時擇才辯北使匃奴其十一以為交州險夐要荒之表宋末政苛遂至怨叛今大化創始宜懷以恩徳未應逺勞將士揺動邊氓且彼土所出唯有珠寶實非聖朝所須之急討伐之事謂宜且停又撰賢聖雜語奏之託以諷諫上答曰省所獻雜語竝列聖之明規衆智之深軌卿能憲章先範纂鏤情識忠款既昭淵誠肅著當以周旋無忘聽覽也又諫起宣陽門表陳宜明守宰賞罰立學校制齊禮廣開賓館以接荒民上又答曰具卿忠讜之懷夫賞罰以懲守宰飾館以待遐荒皆古之善政吾所宜勉更撰新禮或非易制國學之美已敇公卿宣陽門今敇停寡徳多闕思復有聞善明身長七尺九寸質素不好聲色所居茅齋斧木而已牀榻几案不加剗削少與崔祖思友善祖思出為青冀二州善明遺書曰昔時之遊于今邈矣或攜手春林或負杖秋澗逐清風於林杪追素月於園垂如何故人徂落殆盡足下方擁旄北服吾剖竹南甸相去千里間以江山人生如寄來㑹何時嘗覽書史數千年來畧在眼中矣歴代參差萬里同異夫龍虎風雲之契亂極必夷之幾古今豈殊此實一揆日者沈攸之擁長蛇於外粲秉復為異識所推唯有京鎮創為聖基遂乃擢吾為首佐授吾以大郡付吾關中委吾留任既不辦有抽劒兩城之用横槊搴旗之能徒以挈瓶小智名參佐命常恐朝露一下深恩不酬憂深責重轉不可據還視生世倍無次緒藿羮布被猶篤鄙好惡色憎聲暮齡尤甚出蕃不與台輔别入國不與公卿遊孤立天地之間無猜無託唯知奉主以忠事親以孝臨民以潔居家以儉足下今鳴笳舊鄉衣繡故國宋季荼毒之悲已䝉蘇泰河朔倒懸之苦方須救㧞遣遊辯之士為鄉導之使輕装啓行經營舊壤令泗上歸業稷下還風君欲誰讓邪聊送諸心敬申貧贈建元二年卒年四十九遺命薄殯贈錢三萬布五十匹又詔曰善明忠誠夙亮幹力兼宣豫經夷嶮勤績昭著不幸殞喪痛悼于懷贈左將軍豫州刺史諡烈伯子滌嗣善明家無遺儲唯有書八千卷太祖聞其清貧賜滌家葛塘屯榖五百斛善明從弟僧副官至前將軍封豐陽男三百戸永明四年為巴西梓潼二郡太守卒蘇侃字休烈武邑人也祖䕶本郡大守父端州治中侃渉獵書傳出身正員將軍補長城令薛安都反引侃為其府參軍使掌書記安都降虜侃自拔南歸除積射將軍遇太祖在淮上便自委結上鎮淮隂以侃詳密取為冠軍錄事參軍是時張永沈攸之敗後新失淮北始遣上北戍不滿千人每歳秋冬間邊淮騷動恒恐虜至上廣遣偵候安集荒餘又營繕城府上在兵中久見疑於時乃作塞客吟以喻志曰寶緯紊宗神經越序徳晦河晉力宣江楚雲雷兆壯天山繇武直髮指秦關凝精越漢渚秋風起塞草衰鵰鴻思邊馬悲平原千里顧但見轉蓬飛星嚴海淨月澈河明清輝映幕素液凝庭金笳夜厲羽轊晨征斡晴潭而悵泗枻松洲而悼情蘭涵風而瀉豔菊籠泉而散英曲繞首燕之歎吹軫絶越之聲欷園琴之孤弄想庭藿之餘馨青關望斷白日西斜恬源靚霧壟首暉霞戒旋鷁躍還波情綿綿而方逺思裊裊而遂多粤擊秦中之筑因為塞上之歌歌曰朝發兮江泉日夕兮陵山驚飇兮瀄汨淮流兮潺湲胡埃兮雲聚楚斾兮星懸愁墉兮思宇惻愴兮何言定寰中之逸鑒審雕陵之迷泉悟樊籠之或累悵遐心以棲𤣥侃逹上此㫖更自勤勵委以府事深見知待元徽初巴西人李承明作亂太祖議遣侃銜使慰勞還除羽林監加建武將軍桂陽之難上復以侃為平南錄事領軍主從頓新亭使分金銀賦賜諸將事寧除歩兵校尉出為綏虜將軍山陽太守清修有治理百姓懷之進號龍驤將軍除前軍將軍沈攸之事起除侃游擊將軍遷太祖驃騎諮議領錄事除黄門郎復為太祖太尉諮議侃事上既久備悉起居乃與丘巨源撰蕭太尉記載上征伐之功以功封新建縣侯五百戸齊臺建為黄門郎領射聲校尉任以心膂上即位侃撰聖皇瑞命記一卷奏之建元元年卒年五十三上惜之甚至追贈輔國將軍梁南秦二州刺史諡質侯弟烈字休文初為東莞令張永鎮軍中兵累至山陽太守寧朔將軍游擊將軍袁粲起事太祖先遣烈助防城仍隨諸將平石頭封吉陽縣男建元中為假節督巴州軍事巴州刺史巴東太守寧朔將軍如故永明中至平西司馬陳留太守卒官垣榮祖字華先下邳人五兵尚書崇祖從父兄也父諒之宋北中郎府參軍榮祖少學騎馬及射或謂之曰武事可畏何不學書榮祖曰昔曹操曹丕上馬横槊下馬談論此於天下可不負飲食矣君軰無自全之伎何異犬羊乎宋孝建中州辟主簿為後軍參軍伯父豫州刺史䕶之子襲祖為淮陽太守宋孝武以事徙之嶺南䕶之不食而死帝疾篤又遣使殺襲祖襲祖臨死與榮祖誓曰弟常勸我危行言遜今果敗矣明帝初即位四方反除榮祖冗從僕射遣還徐州説刺史薛安都曰天之所廢誰能興之使君今不同八百諸侯如民所見非計中也安都曰天命有在今京都無百里地莫論攻圍取勝自可拍手笑殺且我不欲負孝武榮祖曰孝武之行足致餘殃今雖天下雷同正是速死無能為也安都曰不知諸人云何我不畏此大蹄馬在近急便作計榮祖被拘不得還因收集部曲為安都將領假署冠軍將軍安都引虜入彭城榮祖擕家屬南奔朐山虜遣騎追之不及榮祖懼得罪乃逃遁淮上太祖在淮隂榮祖歸附上保持之及明帝崩太祖書送榮祖詣僕射褚淵除寧朔將軍東海太守淵謂之曰蕭公稱卿幹畧故以此郡相處榮祖善彈彈鳥毛盡而鳥不死海鵠羣翔榮祖登城西樓彈之無不折翅而下除晉熙王征虜安成王車騎中兵左軍將軍元徽末太祖欲奔廣陵榮祖諌曰領府去臺百歩公走人豈不知若單行輕騎廣陵人一旦閉門不相受公欲何之公今動足下牀便恐即有扣臺門者公事去矣及蒼梧廢除寧朔將軍淮南太守進輔國將軍除游擊將軍太祖驃騎諮議輔國將軍西中郎司馬汝隂太守除冠軍將軍給事中驍騎將軍預佐命勲封將樂縣子三百戸以其祖舊封封之出為持節督青冀二州刺史冠軍如故遷黄門郎永明二年為冠軍將軍尋陽相南新蔡太守作大形棺材盛仗使鄉人田天生王道期載渡江北監奴有罪告之有司奏免官削爵付東冶案驗無實見原為安陸王平西諮議帶江陵令仍遷司馬河東内史遷持節督緣淮諸軍事冠軍將軍兗州刺史領東平太守兗州大中正巴東王子響事方鎮皆啓稱子響為逆榮祖曰此非所宜言政應云劉寅等孤負恩奬逼迫巴東使至於此時諸啓皆不得通事平後上乃省視以榮祖為知言九年卒年五十七從父閎宋孝建初為威逺將軍汝南新蔡太守據梁山拒丞相義宣賊以功封西都縣子累遷龍驤將軍司州刺史義嘉事起明帝使閎出守盱眙領兵北討薛道摽破之封樂鄉縣男三百戸昇明初為散騎常侍領長水校尉與豫章王對直殿省遷右衛將軍太祖即位以心誠封爵如舊加給事中領驍騎將軍累遷金紫光禄大夫年七十六永明五年卒諡定子榮祖從弟歴生亦為驍騎將軍宋泰始初薛安都反以女婿裴祖隆為下邳太守歴生時請假還北謀殺祖隆舉城應朝廷事發奔走歴官太子右率性苛暴好行鞭捶與始安王遥光同反伏誅史臣曰太祖作牧淮兗始基霸業恩威北被感動三齊青冀豪右崔劉望族先覩人雄希風結義夫諫江都之畧似任光之言雖議不獨興理成合契蓋帷幙之臣也贊曰淮鎮北州獲在崔劉獻書上議帝念忠謀侃奉濳躍皇瑞是鳩垣方帶礪削免虛尤南齊書卷二十八南齊書卷二十八考證崔祖思傳與刺史劉懷珍於堯廟祀神廟有蘇侯像刺史劉懷珍南史作刺史垣䕶之蘇侯崔祖思以為蘇峻臣承蒼按建康亦有蘇侯像宋元凶劭嘗迎入宫中拜為驃騎將軍此自是當時滛祀未必果為蘇峻峻之入臺窮凶極暴殘酷無道建康之人豈有奉為神明而祀之者乎寧失不經靡愧周書臣承蒼按寧失不經乃虞書文非周書也南齊書卷二十八考證
