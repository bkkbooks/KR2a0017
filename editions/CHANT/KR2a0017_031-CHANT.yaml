body:
  text: 卷三十一列傳第十二江謐江謐字令和濟陽考城人也祖秉之臨海太守宋世清吏父徽尚書都官郎吳令為太初所殺謐繫尚方孝武平京邑乃得出解褐奉朝請輔國行參軍于湖令強濟稱職宋明帝為南豫州謐傾身奉之為帝所親待即位以為驃騎參軍弟蒙貌醜帝常召見狎侮之謐轉尚書度支郎俄遷右丞兼比部郎泰始四年江夏王義恭第十五女卒年十九未笄禮官議從成人郎諸王服大功左丞孫敻重奏禮記女子十五而笄鄭云應年許嫁者也其未許嫁者則二十而笄射慈云十九猶為殤禮官違越經典於禮無據博士太常以下結免贖論謐坐杖督五十奪勞百日謐又奏敻先不研辨混同謬議准以事例亦宜及咎敻又結免贖論詔可出為建平王景素冠軍長史長沙內史行湘州事政治苛刻僧遵道人與謐情款隨謐莅郡犯小事餓繫郡獄僧遵裂三衣食之既盡而死為有司所奏徵還明帝崩遇赦得免為正員郎右軍將軍太祖領南兗州謐為鎮軍長史廣陵太守入為游擊將軍性流俗善趨勢利元徽末朝野咸屬意建平王景素謐深自委結景素事敗僅得免禍蒼梧王廢後物情尚懷疑惑謐獨竭誠歸事太祖以本官領尚書左丞昇明元年遷黃門侍郎左丞如故沈攸之事起議加太祖黃鉞謐所建也事平遷吏部郎稍被親待遷太尉諮議領錄事參軍齊臺建為右衛將軍建元元年遷侍中出為臨川王平西長史冠軍將軍長沙內史行湘州留事先遣之鎮既而驃騎豫章王嶷領湘州以謐為長史將軍內史知州留事如故封永新縣伯四百戶三年為左民尚書諸皇子出閤用文武主帥皆以委謐尋敕曰江謐寒士誠當不得競等華儕然甚有才幹堪為委遇可遷掌吏部謐才長刀筆所在事辦太祖崩謐稱疾不入眾頗疑其怨不豫顧命也世祖即位謐又不遷官以此怨望時世祖不豫謐詣豫章王嶷請間曰至尊非起疾東宮又非才公今欲作何計世祖知之出謐為征虜將軍鎮北長史南東海太守未發上使御史中丞沈沖奏謐前後罪曰謐少懷輕躁長習諂薄交無義合行必利動特以奕世更局見擢宋朝而阿諛內外貨賂公行咎盈憲簡戾彰朝聽輿金輦寶取容近習以沈攸之地勝兵強終當得志委心託身歲暮相結以劉景素親屬望重物應樂推獻誠薦子窺窬非望時艱網漏得全首領太祖匡飭天地方弘遠圖薄其難洗之瑕許其革音之效加以非分之寵推以不次之榮列迹勳良比肩朝德以往者微勤刀筆小用賞廁河山任忝出入輕險之性在貴彌彰貪昧之情雖富無滿重莅湘部顯行斷盜及居銓衡肆意受納連席同乘皆詖黷舊侶密筵閑讌必貨賄常客理合升進者以為己惠事宜貶退者並稱中旨謂販鬻威權姦自不露欺主罔上謗議可掩先帝寢疾彌留人神憂震謐託病私舍曾無變容國諱經旬甫蹔入殿參訪遺詔覘忖時旨以身列朝流宜蒙兼帶先顧不逮舊位無加遂崇飾惡言肆醜縱悖譏誹朝政訕毀皇猷遍蚩忠賢歷詆台相至於蕃岳入授列代恆規勳戚出撫前王彝則而謐妄發樞機坐構囂論復敢貶謗儲后不顧辭端毀折宗王每窮舌杪皆云誥誓乖禮崇樹失宜仰指天俯畫地希幸災故以申積憤犯上之跡既彰反噬之情已著請免官削爵土收送廷尉獄治罪詔賜死時年五十二子介建武中為吳令治亦深切民間榜死人髑髏為謐首介棄官而去荀伯玉荀伯玉字弄璋廣陵人也祖永南譙太守父闡之給事中伯玉少為柳元景撫軍板行參軍南徐州祭酒晉安王子勛鎮軍行參軍泰始初子勛舉事伯玉友人孫沖為將帥伯玉隸其驅使封新亭侯事敗伯玉還都賣卜自業建平王景素聞而招之伯玉不往太祖鎮淮陰伯玉歸身結事為太祖冠軍刑獄參軍太祖為明帝所疑及徵為黃門郎深懷憂慮伯玉勸太祖遣數十騎入虜界安置標榜於是虜游騎數百履行界上太祖以聞猶懼不得留令伯玉卜伯玉斷卦不成行而明帝詔果復太祖本任由是見親待從太祖還都除奉朝請令伯玉看宅知家事世祖罷廣興還立別宅遣人於大宅掘樹數株伯玉不與馳以聞太祖曰卿執之是也轉大祖平南府晉熙王府參軍太祖為南兗州伯玉轉為上鎮軍中兵參軍帶廣陵令除羽林監不拜初太祖在淮南伯玉假還廣陵夢上廣陵城南樓上有二青衣小兒語伯玉云草中肅九五相追逐伯玉視城下人頭上皆有草泰始七年伯玉又夢太祖乘船在廣陵北渚見上兩腋下有翅不舒伯玉問何當舒上曰卻後三年伯玉夢中自謂是呪師向上唾呪之凡六呪有六龍出兩腋下翅皆舒還而復斂元徽二年而太祖破桂陽威名大震五年而廢蒼梧太祖謂伯玉曰卿時乘之夢今且效矣昇明初仍為太祖驃騎中兵參軍除步兵校尉不拜仍帶濟陽太守中兵如故霸業既建伯玉忠勤盡心常衛左右加前軍將軍隨太祖太尉府轉中兵將軍太守如故建元元年封南豐縣子四百戶轉輔國將軍武陵王征虜司馬太守如故徙為安成王冠軍司馬轉豫章王司空諮議太守如故世祖在東宮專斷用事頗不如法任左右張景真使領東宮主衣食官穀帛賞賜什物皆御所服用景真於南澗寺捨身齋有元徽紫皮袴褶餘物稱是於樂遊設會伎人皆著御衣又度絲錦與崑崙舶營貨輒使傳令防送過南州津世祖拜陵還景真白服乘畫舴艋坐胡床觀者咸疑是太子內外祗畏莫敢有言伯玉謂親人曰太子所為官終不知豈得顧死蔽官耳目我不啟聞誰應啟者因世祖拜陵後密啟之上大怒檢校東宮世祖還至方山日暮將泊豫章王於東府乘飛燕東迎具白上怒之意世祖夜歸上亦停門籥待之二更盡方入宮上明日遣文惠太子聞喜公子良宣敕以景真罪狀示世祖稱太子令收景真殺之世祖憂懼稱疾月餘日上怒不解晝臥太陽殿王敬則直入叩頭啟上曰官有天下日淺太子無事被責人情恐懼願官往東宮解釋之太祖乃幸宮召諸王以下於玄圃園為家宴致醉乃還上嘉伯玉盡心愈見親信軍國密事多委使之時人為之語曰十敕五令不如荀伯玉命世祖深怨伯玉上臨崩指伯玉謂世祖曰此人事我忠我身後人必為其作口過汝勿信也可令往東宮長侍白澤小卻以南兗州處之伯玉遭父憂除冠軍將軍南濮陽太守未拜除黃門郎本官如故世祖轉為豫章王太尉諮議太守如故俄遷散騎常侍太守如故伯玉憂懼無計上聞之以其與垣崇祖善慮相扇為亂加意撫之伯玉乃安永明元年垣崇祖誅伯玉并伏法初善相墓者見伯玉家墓謂其父曰當出暴貴而不久也伯玉後聞之曰朝聞道夕死可矣死時年五十史臣曰君老不事太子義烈之遺訓也欲夫專心所奉在節無貳雖人子之親尚宜自別則偏黨為論豈或傍啟察江荀之行也雖異術而同亡以古道而居今世難乎免矣贊曰謐口禍門荀言亟盡時清主異并合同殞
