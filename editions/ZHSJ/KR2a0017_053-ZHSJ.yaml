body:
  text: 南齊書卷五十三列傳第三十四良政傅琰虞愿劉懷慰裴昭明沈憲李珪之孔琇之太祖承宋氏奢縱風移百城輔立幼主思振民瘼為政未朞擢山陰令傅琰為益州刺史乃捐華反樸恭己南面導民以躬意存勿擾以山陰大邑獄訟繁滋建元三年別置獄丞與建康為比永明繼運垂心治術杖威善斷猶多漏網長吏犯法封刃行誅郡縣居職以三周為小滿水旱之災輒加賑卹明帝自在布衣曉達吏事君臨億兆專務刀筆未甞枉法申恩守宰以之肅震永明之世十許年中百姓無雞鳴犬吠之警都邑之盛士女富逸歌聲舞節袨服華塟桃花綠水之間秋月春風之下蓋以百數及建武之興虜難猋急征役連歲不遑啟居軍國糜耗從此衰矣齊世善政著名表績無幾焉位次遷升非直止乎城邑今取其清察有迹者餘則隨以附焉傅琰字季珪北地靈州人也祖邵員外郎父僧祐安東錄事參軍琰美姿儀解褐寧蠻參軍本州主簿寧蠻功曹宋永光元年補諸暨武康令廣威將軍除書左民郎又為武康令將軍如故除吳興郡丞泰始六年遷山陰令山陰東土大縣難為長官僧祐在縣有稱琰尤明察又著能名其年爵新亭侯元徽初遷尚書右丞遭母喪居南岸隣家失火延燒琰屋琰抱柩不動隣人競來赴救乃得俱全琰股髀之閒已被煙焰服闋除邵陵王左軍諮議江夏王錄事參軍太祖輔政以山陰獄訟煩積復以琰為山陰令賣針賣糖老姥爭團絲來詣琰琰不辨覈縳團絲於柱鞭之密視有鐵屑乃罰賣糖者二野父爭鷄琰各問何以食鷄一人云粟一人云豆乃破鷄得粟罪言豆者縣內稱神明無敢復為偷盜琰父子並著奇績江左鮮有世云諸傅有治縣譜子孫相傳不以示人昇明二年太祖擢為假節督益寧二州軍事建威將軍益州刺史宋寧太守建元元年進號寧朔將軍四年徵驍騎將軍黃門郎永明二年遷建威將軍安陸王北中郎長史改寧朔將軍明年徙廬陵王安西長史南郡內史行荊州事五年卒琰喪西還有詔出臨臨淮劉玄明亦有吏能為山陰令大著名績琰子翽問之玄明曰我臨去當告卿將別謂之曰作縣唯日食一升而莫飲酒虞愿字士恭會稽餘姚人也祖賚給事中監利侯父望之早卒賚中庭橘樹冬熟子孫競來取之愿年數歲獨不取賚及家人皆異之元嘉末為國子生再遷湘東王國常侍轉潯陽王府墨曹參軍明帝立以愿儒吏學涉兼蕃國舊恩意遇甚厚除太常丞尚書祠部郎通直散騎侍郎領五郡中正祠部郎如故帝性猜忌體肥憎風夏月常著皮小衣拜左右二人為司風令史風起方面輒先啟聞星文災變不信太史不聽外奏勑靈臺知星二人給愿常直內省有異先啟以相檢察帝以故宅起湘宮寺費極奢侈以孝武莊嚴刹七層帝欲起十層不可立分為兩剎各五層新安太守巢向尚之罷郡還見帝曰卿至湘宮寺未我起此寺是大功德愿在側曰陛下起此寺皆是百姓賣兒貼婦錢佛若有知當悲哭哀愍罪高佛圖有何功德尚書令袁粲在坐為之失色帝乃怒使人驅下殿愿徐去無異容以舊恩少日中已復召入帝好圍甚拙去格七八道物議共欺為第三品與第一品王抗圍依品賭戲抗每饒借之曰皇帝飛臣抗不能斷帝終不覺以為信然好之愈篤愿又曰堯以此教丹朱非人主所宜好也雖數忤旨而蒙賞賜猶異餘人遷兼中書郎帝寢疾愿常侍醫藥帝素能食尤好逐夷以銀鉢盛蜜漬之一食數鉢謂揚州刺史王景文曰此是奇味卿頗足不景文曰臣夙好此物貧素致之甚難帝甚悅食逐夷積多腹痞脹氣將絕左右啟飲數升酢酒乃消疾大困一食汁滓猶至三升水患積久藥不復効大漸日正坐呼道人合掌便絕愿以侍疾久轉正員郎出為晉平太守在郡不治生產前政與民交關質錄其兒婦愿遣人於道奪取將還在郡立學堂教授郡舊出髯膽可為藥有餉愿者愿不忍殺放二十里外山中一夜還床下復送四十里外山經宿復還故處愿更令遠乃不復歸論者以為仁心所致也海邊有越王石常隱雲霧相傳云清廉太守乃得見愿往觀視清徹無隱蔽後琅邪王秀之為郡與朝士書曰此郡承虞公之後善政猶存遺風易遵差得無事以母老解職除後軍將軍褚淵常詣愿不在見其眠床上積塵埃有書數袠淵歎曰虞君之清一至於此令人掃地拂床而去遷中書郎領東觀祭酒兄季為上虞令卒愿從省步還家不待詔便歸東除驍騎將軍遷廷尉祭酒如故愿甞事宋明帝齊初宋神主遷汝陰廟愿拜辭流涕建元元年卒年五十四愿著五經論問撰會稽記文翰數十篇劉懷慰字彥泰平原平原人也祖奉伯元嘉中為冠軍長史父乘民冀州刺史懷慰初為桂陽王征北板行參軍乘民死於義嘉事難懷慰持喪不食醬冬月不絮衣養孤弟妹事寡叔母皆有恩義復除邵陵王南中郎參軍廣德令尚書駕部郎懷慰宗從善明等太祖心腹懷慰亦豫焉沈攸之有舊令為書戒喻攸之太祖省之稱善除步兵校尉齊國建上欲置齊郡於京邑議者以江右土沃流民所歸乃治瓜步以懷慰為輔國將軍齊郡太守上謂懷慰曰齊邦是王業所基吾方以為顯任經理之事一以委卿又手勑曰有文事者必有武備今賜卿玉環刀一口懷慰至郡修治城郭安集居民墾廢田二百頃決沈湖灌溉不受禮謁民有餉其新米一斛者懷慰出所食麥飯示之曰旦食有餘幸不煩此因著廉吏論以達其意太祖聞之手勑襃賞進督秦沛二郡妻子在都賜米三百斛六允州刺史柳世隆與懷慰書曰膠東淵化潁川致美以今方古曾何足云在郡二年遷正員郎領青冀二州中正懷慰本名聞慰世祖即位以與舅氏名同勑改之出監東陽郡為吏民所安還兼安陸王北中郎司馬永明九年卒年四十五明帝即位謂僕射徐孝嗣曰劉懷慰若在朝廷不憂無清吏也懷慰與濟陽江淹陳郡袁彖善亦著文翰永明初獻皇德論云裴昭明河東聞喜人宋太中大夫松之孫也父駰南中郎參軍昭明少傳儒史之業泰始中為太學博士有司奏太子婚納徵用玉璧虎皮未詳何所准據昭明議禮納徵儷皮為庭實鹿皮也晉太子納妃注以虎皮二太元中公主納徵虎豹皮各一豈其謂婚禮不詳王公之差故取虎豹文蔚以尊其事虎豹雖文而徵禮所不言熊羆雖古而婚禮所不及珪璋雖美或為用各異今宜准的經誥凡諸僻謬一皆詳正於是有司參議加珪璋豹熊羆皮各二元徽中出為長沙郡丞罷任刺史王蘊謂之曰卿清貧必無還資湘中人士有須一禮之命者我不愛也昭明曰下官忝為邦佐不能光益上府豈以鴻都之事仰累清風歷祠部通直郎永明三年使虜世祖謂之曰以卿有將命之才使還當以一郡相賞還為始安內史郡民龔玄宣云神人與其玉印玉板書不須筆吹紙便成字自稱龔聖人以此惑衆前後郡守敬事之昭明付獄治罪及還甚貧罄世祖曰裴昭明罷郡還遂無宅我不諳書不知古人中誰比遷射聲校尉九年復遣北使建武初為王玄邈安北長史廣陵太守明帝以其在事無所啟奏代還責之昭明曰臣不欲競執關楗故耳昭明歷郡皆有勤績常謂人曰人生何事須聚蓄一身之外亦復何須子孫若不才我聚彼散若能自立則不如一經故終身不治產業中興二年卒從祖弟顗字彥齊少有異操泰始中於總明觀聽講不讓劉秉席秉用為參軍昇明末為奉朝請齊臺建世子裴妃須外戚譜顗不與遂分籍太祖受禪上表誹謗掛冠去伏誅沈憲字彥璋吳興武康人也祖說道巴西梓潼二郡太守父璞之北中郎行參軍憲初應州辟為主簿少有幹局歷臨首餘杭令巴陵王府佐帶襄令除駕部郎宋明帝與憲謂憲曰卿廣州刺史才也補烏程令甚著政績太守褚淵歎之曰此人方員可施除通直郎都水使者長於吏事居官有績除正員郎補吳令尚書左丞昇明二年西中郎將晃為豫州太祖擢憲為晃長史南梁太守行州事遷豫章王諮議未拜坐事免官復除安成王冠軍武陵王征虜參軍遷少府卿少府管掌市易與民交關有吏能者皆更此職遷王儉鎮軍長史武陵王曄為會稽以憲為左軍司馬太祖以山陰戶衆難治欲分為兩縣世祖啟曰縣豈不可治但用不得其人耳乃以憲帶山陰令政聲大著孔稚珪請假東歸謂人曰沈令料事特有天才加寧朔將軍王敬則為會稽憲仍留為鎮軍長史令如故遷為冠軍長史行南豫州事晉安王後軍長史廣陵太守西陽王子明代為南六允州憲仍留為冠軍長史太守如故頻行州府事永明八年子明典籤劉道濟取府州五十人役自給又役子明左右及船仗贓私百萬為有司所奏世祖怒賜道濟死憲坐不糾免官尋復為長史輔國將軍以疾去官除散騎常侍未拜卒當世稱為良吏憲同郡丘仲起先是為晉平郡清廉自立褚淵歎曰見可欲心能不亂此楊公所以遺子孫也仲起字子震少為憲從伯領軍寅之所知宋元徽中為太子領軍長史官至廷尉卒李珪之字孔璋江夏鍾武人也父祖皆為縣令珪之少辟州從事宋泰始初蔡興宗為郢州以珪之為安西府佐委以職事清治見知遷鎮西中郎諮議右軍將軍兼都水使者珪之歷職稱為清能除游擊將軍兼使者如故轉兼少府卒先是四年滎陽毛惠素為少府卿吏才強而治事清刻勑市銅官碧青一千二百斤供御畫用錢六十萬有讒惠素納利者世祖怒勑尚書評賈貴二十八萬餘有司奏之伏誅死後家徒四壁上甚悔恨孔琇之會稽山陰人也祖季恭光祿大夫父靈運著作郎琇之初為國子生舉孝廉除衞軍行參軍員外郎尚書三公郎出為烏程令有吏能還遷通直郎補吳令有小兒年十歲偷刈隣家稻一束琇之付獄治罪或諫之琇之曰十歲便能為盜長大何所不為縣中皆震肅遷尚書左丞又以職事知名轉前軍將軍兼少府遷驍騎將軍少府如故出為寧朔將軍高宗冠軍征虜長史江夏內史還為正員常侍兼左民尚書廷尉卿出為臨海太守在任清約罷郡還獻乾薑二十斤世祖嫌少及知琇之清乃歎息除武陵王前軍長史未拜仍出為輔國將軍監吳興郡尋拜太守治稱清嚴高宗輔政防制諸蕃致密旨於上佐隆昌元年遷琇之為寧朔將軍晉熙王冠軍長史行郢州事江夏內史琇之辭不許未拜卒史臣曰琴瑟不調必解而更張也魏晉為吏稍與漢乖苛猛之風雖衰而仁愛之情亦減局以峻法限以常條以必世之仁未及宣理而朞月之望已求治術先公後私在己未易割民奉國於物非難期之救過所利苟免且目見可欲嗜好方流貪以敗官取與違義吏之不臧罔非由此擿姦辯偽誠俟異識垂名著績唯有廉平今世之治民未有出於此也贊曰蒸蒸小民吏職長親棼亂須理隱歸仁枉直交瞀寬猛代陳伊何導物貴在清身
