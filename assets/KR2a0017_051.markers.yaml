  - {type: variant, offset: 6806, length: 0, content: '', WYG: 南齊書卷五十一南齊書卷五十一考證崔慧景傳四月回軍廣陵臣祖庚按此有月不日東昏紀四月癸酉慧景棄衆走通鑑考異曰按長厯是嵗四月庚午朔癸酉乃四月四日據此則四月四日慧景已棄衆走矣而傳云四月回軍恭祖納之又云十二日恭祖復攻之城陷紀傳前後各不相顧又按紀云夏四月丁未慧景於廣陵襲京師通鑑考異曰是嵗三月辛丑朔丁未三月七日當作三月以此考之則回軍廣陵亦當在三月紀傳作四月誤也司馬崔恭祖守廣陵城開門納之臣承蒼按南史云俄而慧景至恭祖閉門不敢出慧景知其異已泣數行而去與此互異單馬至蠏浦為漁父所斬臣祖庚按南史云慧景單馬至蠏浦投漁人太叔榮之榮之為慧景門人時為蠏浦戍斬慧景首送都與此小異然既云漁人又云為戍未免矛盾南史固未可據也張欣泰傳時年四十六南史作三十六南齊書卷五十一考證}
