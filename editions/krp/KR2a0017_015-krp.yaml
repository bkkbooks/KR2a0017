body:
  text: 南齊書卷十五梁蕭子顯撰志第七州郡下荆巴郢司雍湘梁秦益寕荆州漢靈帝中平末刺史王睿始治江陵吴時西陵督鎮之晉太康元年平吴以為刺史治愍帝建興元年刺史周顗避杜弢賊奔建康陶侃為刺史治沌口王敦治武昌其後或還江陵或在夏口桓温平蜀治江陵以臨沮西界水陸紆險行逕裁通南通巴巫東南出州治道帯蠻蜑田土肥美立為汶陽郡以處流民屬氐陷襄陽桓冲避居上明頓陸遜樂鄉城上四十餘里以田地肥良可以為軍民資實又接近三峡無西疆之虞故重戍江南輕戍江北苻堅敗後復得襄陽太元十四年王忱還江陵江陵去襄陽歩道五百勢同脣齒無襄陽則江陵受敵不立故也自忱以来不復動移境域之内含𢃄蠻蜑土地遼落稱為殷曠江左大鎮莫過荆揚𢎞農郡陜縣周世二伯總諸侯周公主陜東召公主陜西故稱荆州為陜西也領郡如左南郡江陵華容枝江臨沮編當陽南平郡孱陵作唐江安安南天門郡零陽澧陽臨澧漊中宜都郡夷道佷山夷陵宜昌南義陽郡平氏厥西河東郡聞喜松滋譙永安汶陽郡僮陽沮陽高安新興郡定襄新豐廣牧此下闕文漢平涪陵漢玫郢州鎮夏口舊要害也吴置督将為魯口屯對魯山岸因為名也晉永嘉中荆州刺史都督山簡自襄陽避賊奔夏口庾翼為荆州治夏口並依地嶮也泰元中荆州刺史桓冲移鎮上明上表言氐賊送死之日舊郢以北堅壁相望待以不戰江州刺史桓嗣宜進屯夏口據上下之中于事為便義熙元年冠軍将軍劉毅以為夏口二州之中地居形要控接湘川邉帶溳沔請并州刺史劉道規鎮夏口夏口城據黄鵠磯世傳仙人子安乘黄鵠過此上也邉江峻險樓櫓髙危瞰臨沔漢應接司部宋孝武置州於此以分荆楚之勢領郡如左江夏郡沙陽蒲圻灄陽汝南沌陽恵懐竟陵郡竟陵雲杜霄城萇夀新市新陽武陵郡沅陵臨沅零陵辰陽酉陽沅南漢夀龍陽㵲陽黚陽巴陵郡下雋州陵巴陵監利武昌郡武昌鄂陽新義寕寄治鄂真陽永明三年户口簿無西陽郡西陵蘄陽西陽孝寕期思永明三年户口簿無義安左縣希水左縣東安左縣蘄水左縣齊興郡永明三年置綏懐齊康葺波綏平齊寕上蔡永明三年户口簿無東䍧牱郡永明三年户口簿云新置無属縣宜南平陽西新市南新市西平陽東新市方城左郡城陽歸義北新陽郡西新陽安吉長寕義安左郡綏安南新陽左郡南新陽新興北新陽角陵新安北遂安左郡永明三年簿云五縣皆缺東城綏化富城南城新安新平左郡平陽新市安城建安左郡霄城司州鎮義陽宋景平初失河南地元嘉宋僑立州於汝南縣瓠尋罷泰始中立州於義陽郡有三闗之隘北接陳汝控帶許洛自此以来常為邉鎮泰始既遷領義陽僑立汝南領三郡元徽四年又領安陸随安蠻三郡領郡如左南義陽郡孝昌平輿義昌平陽南安平春北義陽郡平陽義陽保城鄳鍾武環水隨郡隨永陽闕西安化安陸郡寄州治安陸應城新市新陽宣化汝南郡寄州治平輿北新息真陽安城南新息安陽臨汝汝南上蔡齊安郡齊安始安義城南安義昌義安淮南郡閣口平氏宋安左郡仰澤樂寕襄城安蠻左郡木蘭新化懐中聶陽南聶陽安蠻永寕左郡中曲陵曲陵孝懐安徳東義陽左郡永寕革音威清永平東新安左郡第五南平林始平始安平林義昌固城新化西平新城左郡孝懐中曲南曲陵懐昌圍山左郡及刺章平北曲洛陽圍山曲陵建寕左郡建寕陽城北淮安左郡髙邑南淮安左郡慕化栢源北随安左郡濟山油潘東随安左郡西随髙城牢山雍州鎮襄陽晉中朝荆州都督所治也元帝以魏該為雍州鎮酇城襄陽别有重戍庾翼為荆州謀北伐鎮襄陽自永嘉亂襄陽民户流荒咸康八年尚書殷融言襄陽石城疆場之地對接荒冦諸荒殘寄治郡縣民户寡少可并合之朱序為雍州于襄陽立僑郡縣没苻氐氐敗復還南復用朱序襄陽左右田土肥良桑梓野澤處處而有郗恢為雍州于時舊民甚少新户稍多宋元嘉中割荆州五郡属遂為大鎮疆蠻帯沔阻以重山北接宛洛平塗直至跨對樊沔為鄢郢北門部領蠻左故别置蠻府焉領郡如左襄陽郡襄陽中廬邔建昌南陽郡宛涅陽冠軍舞隂酈云陽許昌新野郡新野山都池陽穰交木恵懐始平郡武當武陽始平平陽廣平郡酇比陽廣平陽京兆郡鄧新豐杜魏扶風郡筑陽郿汎陽馮翊郡鄀蓮勺髙陸河南郡河南新城棘陽襄鄉河隂南天水郡畧陽華隂西義成郡萬年義成建昌郡永興安寕華山郡藍田華山上黄南上洛郡建武中此以下郡皆没虜上洛商北河南郡新蔡汝隂上蔡緱氏洛陽新安固始苞信𢎞農郡邯鄲圉盧氏順陽郡南鄉槐里清水丹水鄭順陽西汝南郡北上洛郡齊安郡齊康郡招義郡右五郡不見属縣寕蠻府領郡如左西新安郡新安汎陽安化南安義寕郡筑義寕汎陽武當南陽南襄郡新安武昌建武武平北建武郡東萇秋霸北郡髙羅西萇秋平丘蔡陽郡樂安東蔡陽西蔡陽新化楊子新安永安郡東安樂新安西安樂勞泉安定郡思歸歸化臯亭新安士漢士頃懐化郡懐化編遂城精陽新化遂寕新陽武寕郡新安武寕懐寕新城永寕新陽郡東平林頭章新安朗城新市新陽武安西林義安郡郊鄉東里永明山都義寕西里義安南錫義清髙安郡髙安新集左義陽郡南襄城郡廣昌郡東襄城郡北襄城郡懐安郡北𢎞農郡西𢎞農郡析陽郡北義陽郡漢廣郡中襄城郡右十二郡没虜湘州鎮長沙郡湘川之奥民豐土閒晉永嘉元年分荆州置茍晞為刺史此後三省輒復置元嘉十八年置至今為舊鎮南通嶺表脣齒荆區領郡如左長沙郡臨湘羅湘隂醴陵瀏陽建寕吴昌桂陽郡郴臨武南平耒陽晉寕汝城零陵郡泉陵洮陽零陵祁陽觀陽永昌應陽衡陽郡湘西益陽湘鄉新康衡山營陽郡營道泠道營浦舂陵湘東郡茶陵新寕攸臨蒸重安隂山邵陵郡都梁邵陵髙平武剛建興邵陽扶始興郡曲江桂陽仁化陽山令階含洭靈溪中宿貞陽始興臨賀郡臨賀馮乗富川封陽謝沐興安寕新開建撫寕始安郡本名始建齊改始安荔浦建陵左郡熙平永豐平樂齊熙郡梁州鎮南鄭魏景元四年平蜀所置也晉永嘉元年蜀賊沒漢中刺史張光治魏興三年還漢中建興元年又為氐楊難敵所没桓温平蜀復舊土後為譙縱所没縱平復舊毎失漢中刺史輒鎮魏興漢中為巴蜀扞蔽故劉備得漢中云曺公雖来無能為也是以蜀有難漢中輒没雖時還復而户口殘耗宋元嘉中甄法䕶為氐所攻失守蕭思話復還漢中後氐虜数相攻撃闗隴流民多避難歸化于是民户稍寔州境與氐胡相隣亦為威御之鎮領郡如左漢中郡南鄭城固沔陽西鄉西上庸魏興郡西城旬陽興晉廣昌南廣城永元志無廣城新興郡永元二年志無吉陽東闗南新城郡房陵綏陽昌魏祁鄉閬陽樂平上庸郡上庸武陵齊安北巫上亷㣲陽新豐新安吉陽晉夀郡晉夀邵歡興安白水華陽郡宕渠華陽興宋嘉昌新巴郡新巴晉城晉安北巴西郡閬中安漢宋夀南國西國平周漢昌巴渠郡宣漢晉興始興巴渠東闗始安下蒲懐安郡懐安義存宋熙郡興平宋安陽安元夀嘉昌永元志無白水郡晉夀新巴漢徳益昌興安平周南上洛郡上洛商流民北豐陽渠陽義陽北上洛郡上洛商豐陽永元志無流民秬陽陽亭齊化西豐陽東鄴陽齊寕永元志無京兆新寕永元志無新附安康郡安康寕都南宕渠郡宕渠漢安宣漢宋康懐漢郡永豐綏成預徳北隂平郡隂平平武南隂平郡隂平懐舊齊興郡齊興永元志無安昌永元志無鄖鄉錫安富畧陽晉昌郡安晉宣漢吉陽萇夀東闗新興延夀安樂東晉夀郡右一郡縣邑事亡𢎞農郡東昌魏郡畧陽郡北梓潼郡廣長郡三水郡思安郡宋昌郡建寕郡南泉郡三巴郡江陵郡懐化郡歸寕郡東楗郡北宕渠郡宋康郡南漢郡南梓潼郡始寕郡江陽郡南部郡南安郡建安郡夀陽郡南陽郡宋寕郡歸化郡始安郡平南郡懐寕郡新興郡南平郡齊兆郡齊昌郡新化郡寕章郡隣溪郡京兆郡義陽郡歸復郡安寕郡東宕渠郡宋安郡齊安郡凡四十五郡荒或無民户秦州晉武帝泰始五年置舊土有秦之富跨帯壠坂太康省恵帝元康七年復置中原亂没胡穆帝永和八年胡偽秦州刺史王擢降仍以為刺史尋為苻健所破十一年桓温以氐王楊國為秦州刺史未有民土至泰元十四年雍州刺史朱序始督秦州則孝武所置也寄治襄陽未有刺史是後雍州刺史常督之隆安二年郭銓始為梁南秦州刺史州寄治漢中四年桓𤣥督七州但云秦州元興元年以苻堅子宏為北秦州刺史自此荆州都督常督秦州梁州當帯南秦州刺史義熙三年以氐王楊國為北秦州刺史十四年置東秦州劉義真為刺史郭恭為梁州刺史尹雅為秦州刺史宋文帝為荆州都督督秦州又進督北秦州州名雜岀省置不見永明郡國志秦州寄治漢中南鄭不曰南北元嘉計偕亦云秦州而荆州都督常督二秦梁南秦一刺史是則志所載秦州為南秦氐為北秦領郡如左武都郡下辯上禄陳倉畧陽郡畧陽臨漢安固郡安固南桓陵西扶風郡郿武功京兆郡杜藍田鄠南太原郡平陶始平郡始平槐里宋熙天水郡新陽河陽安定郡宋興朝那南安郡桓道中陶金城郡金城榆中臨洮襄馮翊郡蓮勺頻陽下邽萬年髙陵隴西郡河闗狄道首陽大夏仇池郡上辯倉泉白石夷安東寕郡西安北地南漢益州鎮成都起魏景元四年所治也開拓夷荒稍成郡縣如漢之永昌晉之雲山之類是也蜀侯煇杜以来四為偏據故諸葛亮云益州險塞沃野天府劉頌亦謂成都宜處親子弟以為王國故立成都王穎竟不之國三峡險阻蠻夷孔熾西通芮芮河南亦如漢武威張掖為西域之道也方面疆鎮塗岀萬里晉世以處武臣宋世亦以險逺諸王不牧泰始中成都市橋忽生小洲始康人邵碩有術數見之曰洲生近市當有貴王臨境永明二年而始興王鎮為刺史州土壊富西方之一都焉領夷齊諸郡如左巴涪陵二郡見巴州蜀郡成都郫牛鞞繁永昌廣漢郡雒什方新都郪伍城陽泉晉康郡江原臨卭樅陽晉樂漢嘉寕蜀郡廣漢升遷廣都墊江汶山郡都安齊基晏官南隂平郡隂平綿竹南鄭南長樂東遂寕郡巴興小漢晉興徳陽始康郡康晉談新永寕郡欣平永安宜昌安興郡南漢建昌犍為郡僰道南安資中冶官武陽江陽郡江陽常安漢安綿安固郡桓陵臨渭興固南苞清水沔陽南城固懐寕郡萬年西平懐道始平巴西郡閬中安漢西充國南充國漢昌平州益昌晉興東闗梓潼郡涪梓潼漢徳新興萬安西浦東江陽郡漢安安樂綿水南晉夀郡南晉夀泉南興西宕渠郡宕渠宣漢漢初東闗天水郡西上邽兾宋興南新巴郡永元志寄治隂平新巴晉熙桓陵北隂平郡隂平南陽北桓陵扶風慎陽京兆綏歸新城郡下辯畧陽漢陽安定扶風郡見永元三年志武江華隂茂陵南安郡見永元三年志南安華陽白水樂安桓道東宕渠獠郡宕渠平州漢初北部都尉越雋獠郡沈黎獠郡蚕陵令無户數甘松獠郡始平獠郡齊開左郡齊通左郡右二左郡建武三年置寕州鎮建寕郡本益州南中諸葛亮所謂不毛之地也道逺土瘠蠻夷衆多齊民甚少諸爨氐彊族恃逺擅命故數有土反之虞領郡如左建平郡同樂同瀬牧麻新興新定味同並萬安昆澤漏江談槀母單存䣖南廣郡南廣常遷晉昌新興南朱提郡朱提漢陽堂狼南秦南䍧牱郡且蘭萬夀母歛晉樂綏寕丹南梁水郡梁水西随母掇勝休新豐建安驃封建寕郡新安永豐綏雲遂安麻雅臨江晉寕郡建伶連然滇池俞元榖昌秦臧雙栢雲南郡東古復西古復雲平邪龍西平郡西平暖江都陽西寕晉綏新城夜郎郡夜郎談栢談樂廣談東河陽郡東河陽楪榆西河陽郡比蘓建安成昌平蠻