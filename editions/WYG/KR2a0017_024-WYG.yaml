body:
  text: 南齊書卷二十四梁蕭子顯撰列傳第五栁世隆張瓌栁世隆字彦緒河東解人也祖憑馮翊太守父叔宗早卒世隆少有風器伯父元景宋大眀中為尚書令獨賞愛之異於諸子言於孝武帝得召見帝曰三公一人是將来事也海陵王休茂為雍州辟世隆為迎主簿除西陽王撫軍法曹行叅軍出為虎威將軍上庸太守帝謂元景曰卿昔以虎威之號為隨郡今復以授世隆使卿門世不絶公也元景為景和所殺世隆以在逺得免泰始初諸州反叛世隆以門禍獲申事由眀帝乃據郡起兵遣使應朝廷𢎞農人劉僧驎亦聚衆應之收合萬人奄至襄陽萬山為孔道存所破衆皆奔散僅以身免逃蔵民間事平乃出還為尚書儀曹郎眀帝嘉其義心發詔擢為太子洗馬出為寧逺將軍巴西梓潼太守還為越騎校尉轉建平王鎮北諮議叅軍領南泰山太守轉司馬東海太守入為通直散騎常侍尋為晉熙王安西司馬加寧朔將軍時世祖為長史與世隆相遇甚懽太祖之謀渡廣陵也令世祖率衆下同㑹京邑世隆與長流蕭景先等戒嚴待期事不行是時朝廷疑憚沈攸之宻為之防府州器械皆有素蓄世祖將下都劉懐珍白太祖曰夏口是兵衝要地宜得其人太祖納之與世祖書曰汝既入朝當湏文武兼資人與汝意合者委以後事世隆其人也世祖舉世隆自代轉為武陵王前軍長史江夏内史行郢州事昇眀元年冬攸之反遣輔國將軍中兵參軍孫司寧朔將軍中兵參軍武寳龍驤將軍騎兵參軍朱君拔寧朔將軍沈恵真龍驤将軍騎兵參軍王道起三萬人為前驅又遣司馬冠軍劉攘兵領寧朔將軍外兵參軍公孫方平龍驤将軍騎兵參軍朱靈真沈僧敬龍驤将軍髙茂二萬人次之又遣輔國將軍王靈秀丁珍東寧朔将軍中兵參軍王彌之寧朔将軍外兵參軍楊景穆二千匹騎分兵出夏口據魯山攸之乗輕舸從數百人先大軍下住白螺洲坐胡床以望其軍有自驕色既至郢以郢城弱小不足攻遣人告世隆曰被太后令當蹔還都卿既相與奉國想得此意世隆使人答曰東下之師久承聲問郢城小鎮自守而已攸之將去世隆遣軍於西渚挑戰攸之果怒令諸軍登岸燒郭邑築長圍攻道顧謂人曰以此攻城何城不剋晝夜攻戰世隆隨宜拒應衆皆披却世祖初下與世隆别曰攸之一旦為變焚夏口舟艦沿流而東則坐守空城不可制也雖留攻城不可卒拔卿為其内我為其外乃無憂耳至是世祖遣軍主桓敬陳𦙍叔茍元賓等八軍據西塞令堅壁以待賊疲慮世隆危急遣腹心胡元直潛使入郢城通援軍消息内外並喜尚書符曰沈攸之出自壠畝寂寥累世故司空沈公以從父宗廕愛之若子羽翼吹嘘得昇官次景和昏悖猜畏柱臣而攸之㐫忍趣利樂禍請衘詔㫖躬行反噬又攸之與譚金童泰壹等暴寵狂朝並為心膂同功共體世號三侯當時親昵情過管鮑仰遭革運㓙黨懼戮攸之反善圖全用得自免既殺從父又虐良朋雖吕布販君酈寄賣友方之斯人未足為酷泰始開闢網漏吞舟畧其㓙險取其搏噬故階亂獲全因禍興福攸之禀性空淺躁而無謀濃湖土崩本非已力彭城下邳望旗宵遁再棄王師久應肆法值先帝宥其囘溪之耻冀有封崤之㨗故得幸㑹推遷頻煩顯授内端戎禁外綏萬里聖去鼎湖逺頒顧命託寄崇深義感金石而攸之始奉國諱喜形于顔普天同哀己以為慶累登蕃岳自郢遷荆晉熙王以皇弟代鎮地尊望重攸之斷割候迎肆意陵畧料擇士馬簡算器械權撥精銳並取自隨郢城所留十不遺一専恣鹵奪罔顧國典踐荆已来恒用姦數既懐異志興造無端乃蹙廹羣蠻騷擾山谷揚聲討伐盡户發丁蟻聚郭邑伺國衰盛從来積年求不解甲遂四野百縣路無男人耕田載租皆驅女弱自古酷虐未聞於此昔嵗桂陽内奰宗廟阽危攸之任官上流兵彊地廣勤王之舉寔宜悉行裁遣羸弱不滿三千至郢州禀受節度欲令判否之日委罪晉熙招誘劔客覊絆行侣竄叛入境輙加擁䕶逋亡出界必遣窮追視吏若讎遇民如草峻太半之賦暴參夷之刑鞭箠國士全用虜法一人逃亡闔宗捕逮皇朝赦令初不遵奉曠蕩之澤長隔彼州人懐怨望十室而九今乃舉兵内侮姦囘外熾斯實惡熟罪成之辰決癰潰疽之日幕府過荷朝寄義百常憤董御元戎龔行天罰今遣新除使持節郢州司州之義陽諸軍事平西將軍郢州刺史聞喜縣開國侯黄囘員外散騎常侍輔國將軍驍騎將軍重安縣開國子軍主王敬則屯騎校尉長夀縣開國男軍主王宜與屯騎校尉陳承叔右軍將軍葛陽縣開國男彭文之驃騎行參軍振武將軍邵宰精甲二萬衝其首斾又遣散騎常侍游擊將軍臨湘縣開國男吕安國持節寧朔将軍越州刺史孫曇瓘屯騎校尉寧朔將軍崔慧景寧朔將軍左軍将軍新亭侯任候伯龍驤將軍虎賁中郎將尹畧屯騎尉南城令曹虎頭輔國將軍驍騎將軍蕭鸞新除寧朔将軍游擊將軍下邳縣開國子垣崇祖等舳艫二萬駱驛繼邁又遣屯騎校尉茍元賓撫軍參軍郭文考撫軍中兵參軍程隐儁奉朝請諸襲光等輕艓一萬截其津要驍騎將軍周盤龍後將軍成買輔國將軍王勅勤屯騎校尉王洪範等䥫騎五千歩道繼進先據陸路斷其走伏持節督雍梁二州郢州之竟陵司州之隨郡諸軍事征虜將軍寧蠻校尉雍州刺史襄陽縣開國侯新除鎮軍將軍張敬兒志節慷慨卷甲樊鄧水歩俱馳破其巢窟持節督司州諸軍事征虜將軍司州刺史領義陽太守范陽縣侯姚道和義烈梗槩投袂方隅風馳電掩襲其輜重萬里建於四方飛斾莫不總率衆師雲翔雷動人神同憤逺邇并心今皇上聖眀將相仁愛約法三章寛刑緩賦年登嵗阜家給人足上有恵民之澤下無樂亂之心攸之不識天時妄圖大逆舉無名之師驅讎怨之衆是以朝野審其易取含識判其成禽彼土士民罹毒日久今復相逼廹投赴鋒刄交戰之日蘭艾難分去就在機望思先曉無使一人迷疑而九族就禍也𢎞宥之典有如皎日郢城既不可攻而平西將軍黄囘軍至西陽乗三層艦作羌胡伎泝流而進攸之素失人情本逼以威力初發江陵已有叛者至是稍多攸之日夕乗馬歴營撫慰而去者不息攸之大怒召諸軍主曰我被太后令建義下都大事若剋白紗帽共著耳如其不振朝廷自誅我百口不闗餘人比軍人叛散皆卿等不以為意我亦不能問叛身自今軍中有叛者軍主任其罪於是一人叛遣十人追並去不反莫敢發覺咸有異計劉攘兵射書與世隆請降世隆開門納之攘兵燒營而去火起乃覺攸之怒銜鬚咀之收攘兵兄子天賜女壻張平慮斬之軍旅大散攸之渡魯山岸猶有數十匹騎自隨宣令軍中曰荆州城中大有錢可相與還取以為資糧郢城未有追軍而散軍畏蠻抄更相聚結可二萬人隨攸之將至江陵乃散世隆乃遣軍副劉僧驎縁道追之攸之已死徴為侍中仍遷尚書右僕射封貞陽縣矦邑二千户出為左將軍吳郡太守加秩中二千石丁母憂太祖踐阼起為使持節都督南豫司二州諸軍事平南將軍南豫州刺史進爵為公上手詔與司徒褚淵曰向見世隆毁瘠過甚殆欲不可復識非直使人惻然實亦世珍國寳也淵答曰世隆至性純深哀過乎禮事陛下在危盡忠喪親居憂杖而後起立人之本二理同極加榮増寵足以厲俗敦風建元二年進號安南將軍是時虜寇夀陽上敕世隆曰歴陽城大恐不可卒治正宜斷隔之深為保固處分百姓若不将家守城單身亦難可委信也尋又敕曰吾更歴陽外城若有賊至即勒百姓守之故應勝割棄也垣崇祖既破虜上欲罷併二豫敕世隆曰比思江西蕭索二豫兩辦為難議者多云省一足一於事為便吾謂非乃乖謬卿以為云何可具以聞尋授後將軍尚書右僕射不拜世隆性愛渉獵啟太祖借祕閣書上給二千卷三年出為使持節督南兗兗徐青冀五州軍事安北將軍南兗州刺史江北畏虜寇搔動不安上敕世隆曰比有北信賊猶治兵在彭城年已垂盡或當未必送死然犲狼不可以理推為備或不可懈彼郭既無闗要用宜開除使去金城三十丈政佳耳發民治之無嫌若作三千人食者已有㡬米可指牒付信還民間若有丁多而細口少者悉令戍非疑也又敕曰昨夜得北使啓鍾離間賊已渡淮既審送死便當制加剿撲卿好參候之有急令諸小戍還鎮不可賊至不覺也賊既過淮不容邇退散要應有處送死者定攻夀陽吾當遣援軍也又遣軍助世隆并給軍糧虜退上欲土斷江北又敕世隆曰吕安國近在西土斷郢司二境上雜民大佳民始無驚恐近又令垣豫州斷其州内商得崇祖啟事已行竟近無云云殊稱前代舊意卿視兖部中可行此事不若無所擾春便就手也其見親委如此世祖即位加散騎常侍世隆善卜别龜甲價至一萬永眀建號世隆題州齋壁曰永眀十一年謂典籖李黨曰我不見也入為侍中䕶軍將軍遷尚書右僕射領太子右率雍州大中正不拜改授散騎常侍尚書左僕射中正如故湘州蠻動遣世隆以本官總督伐蠻衆軍仍為使持節都督湘州諸軍事鎮南將軍湘州刺史常侍如故世隆至鎮以方畧討平之在州立邸治生為中丞庾杲之所奏詔原不問復入為尚書左僕射領衛尉不拜仍轉尚書令世隆少立功名晚専以談義自業善彈琴世稱栁公雙璅為士品第一常自云馬矟第一清談第二彈琴第三在朝不干世務垂簾鼓琴風韻清逺甚獲世譽以疾遜位改授侍中衛將軍不拜轉左光祿大夫侍中如故九年卒時年五十詔給東園祕器朝服一具衣一襲錢一十萬布三百匹蠟三百斤又詔曰故侍中左光祿大夫貞陽公世隆秉徳居業才兼經緯少播清徽長𢎞美譽入參内禁出贊西牧専寄郢郊剋挫巨猾超越前勲功著一代及總任方州民頌寛徳翼教崇闥朝稱元正忠謨嘉猷簡于朕心雅志素履邈不可踰將登鉉味用變鴻化奄至薨殞震慟良深贈司空班劒三十人鼓吹一部侍中如故諡曰忠武上又敕吏部尚書王晏曰世隆雖抱疾積嵗志氣未衰冀醫藥有効痊差可期不謂一旦便為異世痛怛之深此何可言其昔在郢誠心夙悃全保一蕃勲業克著尋准契濶増泣悲咽卿同在情亦當無已已耶世隆曉數術於倪塘創墓與賓客踐履十往五往常坐一處及卒墓正取其坐處焉著龜經祕要二卷行於世長子悦早卒張瓌字祖逸吳郡吳人也祖裕宋金紫光禄大夫父永右光禄大夫曉音律宋孝武問永以太極殿前鍾聲嘶永荅鍾有銅滓乃扣鍾求其處鑿而去之聲遂清越瓌解褐江夏王太尉行參軍署外兵隨府轉為太傅五官為義恭所遇遷太子舍人中書郎驃騎從事中郎司徒右長史初永拒桂陽賊於白下潰散阮佃夫等欲加罪太祖固申眀之瓌由此感恩自結轉通直散騎常侍驍騎将軍遭父喪還吳持服昇眀元年劉秉有異圖弟遐為吳郡潛相影響因沈攸之事起聚衆三千人治攻具太祖宻遣殿中將軍卞白龍令瓌取遐諸張世有豪氣瓌宅中常有父時舊部曲數百遐召瓌瓌偽受㫖與叔恕領兵十八人入郡與防郡隊主彊弩將軍郭羅雲進中齋取遐遐踰窻而走瓌部曲顧憲子手斬之郡内莫敢動者獻㨗太祖以告領軍張沖沖曰瓌以百口一擲出手得盧矣即授輔國將軍吳郡太守封瓌義成縣侯邑千户太祖故以嘉名錫之除冠軍將軍東海東莞二郡太守不拜建元元年増邑為二百户尋改封平都遷侍中加領歩兵校尉二年遷都官尚書領校尉如故出為征虜將軍吳興太守三年烏程令顧昌𤣥有罪瓌坐不糾免官眀年為度支尚書世祖即位為冠軍將軍鄱陽王北中郎長史襄陽相行雍州府州事隨府轉征虜長史四年仍為持節督雍梁南北秦四州郢州之竟陵司州之隨郡軍事輔國將軍雍州刺史尋領寧蠻校尉還為左民尚書領右軍將軍遷冠軍將軍大司馬長史十年轉太常自陳衰疾願從閑養眀年轉散騎常侍光祿大夫頃之上欲復用瓌乃以為後將軍南東海太守秩中二千石行南徐州府州事又行河東王國事到官復稱疾還為散騎常侍光禄大夫鬱林即位加金章紫綬隆昌元年給親信二十人鬱林廢朝臣到宫門參承髙宗瓌託脚疾不至海陵立加右將軍髙宗疑外藩起兵以瓌鎮石頭督衆軍事瓌見朝廷多難遂恒卧疾建武元年轉給事中光禄大夫親信如故月加給錢二萬二年虜盛詔瓌以本官假節督廣陵諸軍事行南兗州事虜退乃還瓌居室豪富伎妾盈房有子十餘人常云其中要應有好者建武末屢啟髙宗還吳見許優游自樂或有譏瓌衰暮畜伎瓌曰我少好音律老而方解平生嗜欲無復一存惟未能遣此處耳髙宗疾甚防疑大司馬王敬則以瓌素著幹畧授平東將軍吳郡太守以為之備及敬則反瓌遣將吏三千人迎拒於松江聞敬則軍鼓聲一時散走瓌棄郡逃民間事平瓌復還郡為有司所奏免官削爵永元初為光禄大夫尋加前將軍金章紫綬三年義師下東昏假瓌節戍石頭義師至新亭瓌棄城走還宫梁初復為光禄天監四年卒史臣曰文以附衆武以立威元帥之才稱為國輔沈攸之十年治兵白首舉事荆楚上流方江東下斯驅除之巨難帝王之大敵栁世隆勢居中夏年淺位輕首抗全師孤城挑攻臨埤授䇿曽無汗馬勍寇乖沮力屈於髙墉亂轍爭先降奔郢路陸遜之破𤣥徳不是過也及世道清寧出牧内佐體之以風素居之以雅徳固興家之盛美也贊曰忠武匡贊實號兼資廟堂析理髙壘搴旗游藝善術安絃拂龜義成祚土功立帝基南齊書卷二十四南齊書卷二十四考證栁世隆傳帝曰三公一人是將来事也臣祖庚按南史云帝謂元景曰此児將来復是三公一人盖言世隆將来是三公中一人也若如傳言似未明晰當南史為優及卒墓正取其坐處焉臣祖庚按南史云墓工圖墓正取其坐處焉文義較眀此省墓工圖三字未合南齊書卷二十四考證
