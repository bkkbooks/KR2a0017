body:
  text: 南齊書卷十七梁蕭子顯撰志第九輿服昔三皇乗祗車出谷口夏氏以奚仲為車正殷有瑞車山車垂句是也周禮匠人為輿以象天地漢武天漢四年朝諸侯甘泉宫定輿服制班於天下光武建武十三年得公孫述葆車輿輦始具蔡邕創立此志馬彪勒成漢典晉摯虞治禮亦議五輅制度江左之始車服多闕但有金戎省充庭之儀太興中太子臨學無髙盖車元帝詔乗安車元眀時屬車唯九乗永和中石虎死後舊工人奔叛歸國稍造車輿太元中苻堅敗後又得偽車輦於是屬車増為十二乗義熙中宋武平闗洛得姚興偽車輦宋大眀改修輦輅妙盡時華始備偽氐復設充庭之制永眀中更増藻飾盛於前矣案周禮以檢漢志名器不同晉宋改革稍與世異今記時事而已玉輅漢金根也漆畫輪金塗縱容後路受福輠兩廂上望板前優遊通緑金塗鏤鍱碧紋罽鑿鏤金薄帖兩廂外織成衣兩廂裏上施金塗鏤面釘瑇瑁帖望板廂上金薄帖金博山登仙紐松精優遊上和鸞鳥立花趺衘鈴銀帶瑇瑁筒瓦金塗鏤鍱刀格織成手匡金花細錦衣優遊下隐膝裏施金塗鏤面釘織成文優遊横前施瑇瑁帖金塗花釘優遊前金塗倒龍後梢鑿銀瑇瑁龜甲金塗花㳫望板金塗受福望龍諸校飾抗及諸末皆螭龍首龍形板在車前銀帶花獸金塗受福緣裏邉鏤鍱瑇瑁織成衣裏金塗鏤面花釘外金塗博山辟邪虎鳯皇銜花諸校飾斗盖金塗鏤鍱二十八𤓰支子花黄錦斗衣複碧絹染布緣油頂絳絲絡織成顔芼赭舌孔雀毛複錦緑紋隨隂懸珠蚌佩金塗鈴雲朱結仙人綬雜色真孔雀眊一轅漆畫車衡銀花帶衡上金塗博山四和鸞鳥立花趺衘鈴所謂鸞鳥立衡也又龍首衘軛义髦插翟尾上下花㳫絳緑絲的望繩八枚旂十二旒畫升龍竿首金塗龍衘火燄幡真眊棨㦸織成衣金塗㳫駐及受福金塗鴈鏤鍱漆案立牀在車中錦複黄紋為案立衣錦複黄紋鄣泥八幅長九尺緣紅錦芼帶織成花芼的五輅江左相承駕四馬左右騑為六施絳絲游御繩其重轂貳轄飛絡幡用赤油金有紫真眊左纛置左騑馬軛上金鑁金加冠狀如三華形在馬鑁上方釳鐵廣數寸有三孔插翟尾其中繁纓金塗紫皮紫真眊横在馬膺前鏤鍚刻金為馬面當顱皆如古制世祖永眀初加玉輅為重盖又作麒麟頭采畫以馬首戴之竟陵王子良啓曰臣聞車旗有章載自前史器必依禮服無舛法凡盖員象天軫方法地上無二天之儀下設兩盖之飾求之志錄恐為乖衷又假為麟首加乎馬頭事不師古鮮或可施建武中眀帝乃省重盖等金輅制度校飾如玉輅而稍減少亦以金塗象輅如金輅而制飾又減木輅制飾如象輅而尤減革輅如大輅建大麾赤旗也首施火燄幡宋昇眀三年錫齊王大輅戎輅各一乗黄五輅無大輅戎輅左丞王逡之議大輅殷之祭車故不登周輅之名而眀堂位云大輅殷輅也注云大輅木輅也月令中央土乗大輅注云殷輅也禮器大輅繁纓一就注云大輅殷之祭天車也周禮五路玉路金路象路革路木路則周之木路殷之大輅也周革路建大白以即戎此則戎輅也意謂國之大事在祀與戎故錫以殷祭天之車與周之即戎之路祀則以殷戎必以周者眀郊天義逺建前代之禮即戎事近故以今世之制眀堂位云魯君孟春乗大路載十有二旒日月之章祀帝於郊天子以大輅以錫諸侯良有以也今木路即大路也太尉左長史王儉議宜用金輅九旒時乗黄無副借用五輅大朝臨軒權列三輅玉金輅建碧旂象木輅建赤旂永眀初太子歩兵校尉伏曼容議以為齊徳尚青五路五牛及五色幡旗並宜以先青為次軍容戎事之所乗犧牲繭握之所薦並宜悉依尚色三代服色以姓音為尚漢不識音故還尚其行運之色今既無善律則大齊所尚亦宜依漢道若有善吹律者便應還取姓尚太子僕周顒議三代姓音古無前記裁音配尚起自曼容則是曼容善識姓聲不復旁假吹律何故能識逺代之宫商而更迷皇朝之律吕而云當今無知吹律以定所尚宜附漢以從闕邪皇朝本以行運為所尚非闗不定於音氏如此設有善律之知音不宜遵聲以為尚散騎常侍劉朗之等十五人並議駮之事不行皇太子象輅校飾如御旂九旒降龍皇太后皇后重翟車金塗校具白地人馬錦帖廂隐膝後户白牙的帖金塗面釘漆畫輪鐵鐺金塗縱容後路輠師子轄抗檐皆施金塗螭頭及神龍雀等諸飾軛衡上施金博山又有金塗長角巴首蓋金塗𤓰支子花二十八青油侠碧絹黄絞蓋漆布裏紫顔芼黄絞紫絞隨隂碧毛外上施絳紫系絡碧旂九旒棨㦸宋元嘉東宫儀記云中宫僕御重翟金根車未詳得稱為金根也皇太子妃厭翟車如重翟飾㣲減指南車四周廂上施屋指南人衣裙襦天衣在廂中上四角皆施龍子竿縣雜色真孔雀眊烏布皁複幔漆畫輪駕牛皆銅校飾記里鼓車制如指南上施華盖子䌝衣漆畫鼓機皆在内輦車如犢車竹蓬廂外鑿鏤金薄碧紗衣織成芼錦衣廂裏及仰頂隐漆後户金塗鏤面瑇瑁帖金塗松精登仙花紐綠四緣四望紗萌子上下前後眉鏤鍱轅枕長角龍白牙蘭瑇瑁金塗校飾漆鄣塵板在蘭前金銀花獸玃天龍師子鏤面榆花細指子摩尼炎金龍虎扶轅銀口帶龍板頭龍轅軛上金鳯皇鈴璅銀口𢃄星後梢瑇瑁帖金塗香㳫銀星花獸慢竿杖金塗龍牽縱横長􅀈背花香染兆床副自輦以下二官御車皆緑油幢絳絲絡御所乗雙棟其公主則碧油幢云司馬法曰夏后氏輦曰金車殷曰胡奴車周曰輜車皆輦也漢書叔孫通傳云皇帝輦出房成帝輦過後宫此朝宴並用也輿服志云輦車具金銀丹青采雘雕畫蒲陶之文乗人以行信陽侯隂就見井丹左右人進輦是為臣下亦得乗之晉武帝給安平獻王孚雲母輦晉中朝又有香衣輦江左唯御所乗卧輦校飾如坐輦不甚服用漆畫輪車金塗校飾如輦微有減降金塗鐺縦容後輠師子副也御為羣公舉哀臨哭所乗皇后太子妃亦乗之漆畫牽車小形如輿車金塗縱容後路師子輠鐵鐺錦衣廂裏隐膝後户牙蘭轅枕梢幰竿戍棟梁皆金塗校飾御及皇太子所乗即古之羊車也晉泰始中中護軍羊琇乗羊車為司𨽻校尉劉毅所奏武帝詔曰羊車雖無制非素者所服免官衛玠傳云總角乗羊車市人聚觀今不駕羊猶呼牽此車者為羊車云輿車形如軺車漆畫金校飾錦衣兩廂後户隐膝牙蘭皆瑇瑁帖刀格鏤面花釘幰竿戍校棟梁下施八棡金塗沓兆床副人舉之一曰小輿小行幸乗之皇太子亦得於宫内乗之衣畫十二乗􅀈榆轂輪箕子壁綠油衣廂外緑紗萌油幢絡通幰竿刺代棟梁柮檽真形龍牽支子花轅後伏神抗承泥沓金塗校具古副車之象也今亦曰五時副車青萌車是謂㯓幔車油絡畫安車公主王妃三公特進夫人所乗漢制皇后貴人紫罽軿車晉皇后乗雲母油畫安車駕六以兩轅安車駕五為副公主畫安車駕六以兩轅安車駕三為副公主畫安車駕三三夫人青交絡安車駕三皆以紫絳罽軿車駕三為副九嬪世婦軿車駕二王公妃特進夫人皁交絡為副漢賤軺車而貴軿車晉賤輜軿而貴軺車皆行禮所乗黄屋車建碧旂九旒九旒鸞輅也漢輿服志云金根車盖黄繒為裏謂之黄屋今金玉輅皆以黄地錦唯此車以黄繒皆金塗校具黄隐隨隂青毛羽二十八𤓰支子花綘絲絡九命上公所乗青盖安車朱轓漆班輪駕一左右騑通幰車為副諸王禮行所乗凡車有轓者謂之軒皁盖安車朱轓漆班輪駕一通幰牛車為副三公禮行所乗安車黑耳皁盖馬車朱轓駕一牛車為副國公列侯禮行所乗馬車駕一九卿領護二衛驍游四軍五校從郊陵所乗晉制三公下至九卿又各安車黒耳一乗公駕三特進駕二卿駕一復各軺車施黒耳後户皁輪一乗油絡軺車尚書令僕射中書監令尚書侍中常侍中黄門中書散騎侍郎皆駕一牛朝直所乗晉制尚書令施黑耳後户皁輪僕射中書監令直施後户皁輪尚書無後户皆漆輪轂今猶然安車赤屏駕一又輅車施後户為副太子二傅禮行所乗四望車通幰油幢絡班漆輪轂亦曰皁輪以加禮貴臣晉武詔給魏舒陽燧四望小車三望車制度如四望或謂之夹望亦以加禮貴臣次四望油幢絡車制似三望而減王公加禮者之常乗次三望平乗車竹箕子壁仰􅀈榆為輪通幰竿刺代棟梁柮檽真形龍牽金塗支子花紐轅頭後梢沓伏神承泥庶人亦然但不通幰三公諸王所乗自四望至平乗皆銅校飾轀輬車四輪飾如金根四角龍首施組銜璧垂五采析羽葆流蘇前後雲氣錯畫帷裳以素為地而黼黻駕四白駱馬太僕執轡貴臣薨亦如之羽飾駕御㣲有減降虞書曰予欲觀古人之象日月星辰山龍華蟲作㑹宗彝藻火粉米黼黻絺繡以五采彰施於五色天子服備日月以下公山龍以下侯伯華蟲以下子男藻火以下卿大夫粉米以下天子六冕王后六服著在周官公侯以下咸有名則佩玉組綬並具禮文後代㳂革見漢志晉服制令其冠十三品見蔡邕獨斷並不復具詳宋眀帝太始四年更制五輅議修五冕朝㑹饗獵各有所服事見宋注舊相承三公以下冕七旒青玉珠卿大夫以下五旒黒玉珠永眀六年太常丞何諲之議案周禮命數改三公八旒卿六旒尚書令王儉議依漢三公服山龍九章卿華蟲七章從之平冕黑介幘今謂平天冠皁表朱縁裏廣七寸長尺二寸垂珠十二旒以朱組為纓如其綬色衣皁上絳下裳前三幅後四幅衣畫而裳繡為日月星辰山龍華蟲藻火粉米黼黻十二章素帶廣四寸朱裏以朱緑裨飾其側要中以朱垂以緑垂三尺中衣以絳縁其領袖赤皮韍絳袴袜赤舄郊廟臨朝所服也漢世冕用白玉珠為旒魏眀帝好婦人飾改以珊瑚珠晉初仍舊後乃改江左以美玉難得遂用琫珠世謂之白琁珠衮衣漢世出陳留襄邑所織宋末用繡及織成建武中眀帝以織成重乃采畫為之加飾金銀薄世亦謂為天衣史臣曰黼黻之設經緯為用故五色六章十二衣還相為質也歴代龍衮織以成文今體不勝衣變易舊法豈致美黻冕之謂乎通天冠黒介幘金博山顔絳紗袍皁緣中衣乗輿常朝所服舊用駮犀簮導東昏改用玉其朝服臣下皆同黒介幘單衣無定色乗輿拜陵所服其白帢單衣謂之素服以舉哀臨喪遠游冠太子諸王所冠太子朱纓翠羽緌珠節諸王𤣥纓公侯皆同平冕各以組為纓王公八旒衣山龍九章卿七旒衣華蟲七章並助祭所服皆畫皁絳繒為之進賢冠諸開國公侯鄉亭侯卿大夫尚書闗内侯二千石博士中書郎丞郎祕書監丞郎太子中舍人洗馬舍人諸府長史卿尹丞下至六百石令長小吏以三梁二梁一梁為差事見晉令武冠侍臣加貂蟬餘軍校武職黄門散騎太子中庶子二率朝散都尉皆冠之唯武騎虎賁服文衣插雉尾於武冠上史臣曰應劭漢官釋附蟬及司馬彪志並不見侍中與常侍有異唯言左右珥貂而已案項氏説云漢侍中蟬刻為蟬像常侍但為璫而不蟬未詳何代所改也法冠廷尉等諸執法者冠之髙山冠謁者冠之樊噲冠殿門衛士冠之黑介幘冠文冠平幘冠武冠尚書令僕射尚書納言幘後飾為異童子空頂幘施假髻貴賤同服救日蝕文武官皆免冠著赤介幘對朝服赤幘示威武也袴褶車駕親戎中外纂嚴所服黑冠帽綴紫褾以絡帶代鞶帶中官紫褾外官絳褾其纂嚴戎服不綴褾行留悉同校獵巡幸從官戎服革帯鞶帶文官不纓武官脱冠袿䙱大衣謂之褘衣皇后謁廟所服公主㑹見大首髻其燕服則施嚴雜寳為佩瑞袿䙱用繡為衣裳加五色鏁金銀校飾綬乗輿黄赤綬黄赤縹緑紺五采太子朱綬諸王纁朱綬皆赤黄縹紺四采妃亦同相國綠綟綬三采綠紫紺郡公𤣥朱侯伯青朱子男素朱皆三采公世子紫侯世子青鄉亭闗内侯墨綬皆二采郡國太守内史青尚書令僕中書監令祕書監皆黒丞皆黄諸府丞亦黄皇后與乗輿同赤貴嬪夫人貴人紫王太妃長公主封君亦紫綬六宫青綬青白紅郡公侯夫人青綬乗輿傳國璽秦璽也晉中原亂没胡江左初無之北方人呼晉家為白板天子冉閔敗璽還南别有行信等六璽皆金為之亦秦漢之制也皇后金璽太子諸王金璽皆龜鈕公侯五等金章公世子金印侯銀印貴嬪夫人金章公主王太妃封君金印六宫以下公侯太夫人夫人銀印其公將軍金章光禄大夫卿尹太子傅諸領䕶將軍中郎將校書郡國太守内史四品五品將軍皆銀章尚書令僕中書監令祕書丞太子二率諸府長史卿尹丞尉中丞都水使者諸州刺史皆銅印三臺五省二品文官皆簮白筆王公五等及武官不簮加内侍乃簮百官執手板尚書令僕尚書手板頭復有白筆以紫皮裹之名曰笏漢末仲長統謂百司皆宜執之其肩上紫袷囊名曰契囊世呼為紫荷佩玉自乘輿以下與晉宋制同建元四年制王公侯卿尹珠水精其餘用牙蜯太官宰人服離支衣後定贊曰文物煌煌儀品穆穆分别禮數莫過輿服漆畫牽車注戌棟梁一本戌作戈輿車注戌校棟梁一本戌校作戈杖衣畫車注刺代棟梁平乘車注刺代棟梁並疑南齊書卷十七南齊書卷十七考證輿服志五輅臣宗萬按隋書舊制五輅於轅上起廂天子與參乘同在廂内何稠曰君臣同所過為相逼乃廣為盤輿别搆闌楯侍臣立於其中於内復起湏彌平坐天子獨居其上據此則五輅之制至隋始變此猶承古也皇太子象輅臣祖庚按此即五輅之一注云旂九旒降龍盖以别天子十二旒升龍也苐按周禮象輅以朝異姓以封而皇太子用之未知何取皇太后皇后重翟車臣祖庚按周禮此王后五輅之一錫面朱總兹則踵事増華去古逺矣指南車臣祖庚按崔豹古今注云黄帝與蚩尤戰大霧軍士皆迷路帝作指南車以示四方又曰指南車者周公所作又曰漢末䘮亂其法中絶馬鈞悟而作焉今指南車馬先生之遺法也記里鼓車注䌝衣漆畫臣承蒼按字書䌝俗紺字顔氏家訓吳人呼紺為禁故以絲旁作䌝代紺字據此則南監本改䌝為襟非是輦車臣祖庚按説文曰輦輓車也六書故曰輦車用人挽者也六典注曰古謂人牽為輦後漢有乗輿六輦也輿車注形如軺車臣祖庚按輿即車古無並稱者魏志太祖給張遼母輿車其名昉此説文曰軺車小車也晉書輿服志曰一馬曰軺車四望車亦曰皁輪臣祖庚按東宫舊事曰太子納妃用四望車又軺車釋名曰軺遥也逺也四向逺望之車也據此則四望車亦軺車之類通典曰三公有勲徳者特加皁輪故志云以加禮貴臣也平冕今謂平天冠臣宗萬按世本曰黄帝作旃冕説文曰冕大夫以上冠昔者黄帝始用布帛作冕應劭漢官儀曰周加垂旒天子前後垂真白珠各十二又按冕古無専名通典曰宋更名平天冕即此冠也通天冠臣祖庚按劉昭曰通天冠髙九寸正豎頂少邪乃直下為鐵卷梁前有山屐筩述乗輿所常服也杜佑曰通天冠其狀遺失漢因秦名制之據此則劉昭所云非秦舊制矣此盖承漢制耳進賢冠臣宗萬按漢輿服志曰古緇布冠儒者之服也人主五梁大官令兩梁親省御膳為重也博士兩梁崇儒也據此則漢時天子亦服之特於梁别崇卑耳魏晉以來為公卿大夫之服矣武冠臣祖庚按漢書昌邑王賀短衣大袴冠恵文冠服䖍曰武冠也趙恵文所服故號恵文又武帝賜南單于常侍恵文冠即此袴褶臣祖庚按通考曰袴褶魏晉以来以為車駕親戎中外戒嚴之服晉志雖有其説而不言其制然既曰戒嚴之服必戎服也至隋煬帝時詔百官從行服袴褶不便遂令改服戎衣則所謂袴褶者又似非鞍馬征行所便者與戒嚴之説不類唐時以袴褶為朝見之服韻書訓褶為袴又為祫也然袴裳也祫衣之交領也則不知所謂袴褶者一物乎二物乎唐輿服志羣臣服條内有裶褶大口袴則似是二物然不知所謂裶褶者衣乎裳乎又按宋史輿服志云范質與禮官議袴褶制度先儒無説惟開元雜禮有五品以上用細綾及羅六品以下用小綾之制注褶衣複衣也又令文三品以上紫褶五品以上裶褶七品以上綠褶九品以上碧褶並大口袴今請造袴褶如令文之制奏可又按説文曰袴脛衣也釋名曰褶襲也覆上之言也據此則袴褶自是兩物意晉制不傳齊去晉未遠猶不失其法隋特仍其名所以不便于從行唐盖因隋制以為朝服其晉之創制則為戎服無疑漆畫牽車注臣承蒼按以下四十五字大抵是史館校讐者所記宋書北魏書皆有之宋嘉祐中以七史訛闕尤甚特命館職讐校其梁齊陳三書皆屬之曽鞏此豈即鞏之筆歟南齊書卷十七考證
