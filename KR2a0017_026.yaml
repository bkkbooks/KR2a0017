body:
  text: 南齊書卷二十六列傳第七王敬則陳顯達王敬則晉陵南沙人也母為女巫生敬則而胞衣紫色謂人曰此兒有鼓角相敬則年長兩腋下生乳各長數寸夢騎五色師子年二十餘善拍張補刀左右景和使敬則跳刀高與白虎幢等如此五六接無不中補俠轂隊主領細鎧左右與壽寂之同斃景和明帝即位以為直閣將軍坐捉刀入殿啓事繫尚方十餘日乃復直閣除奮武將軍封重安縣子邑三百五十戶敬則少時於草中射獵有蟲如烏豆集其身擲去乃脫其處皆流血敬則惡之詣道士卜道士曰不須憂此封侯之瑞也敬則聞之喜故出都自效至是如言泰始初以敬則為龍驤將軍軍主隨寧朔將軍劉懷珍征壽春殷琰遣將劉從築四壘於死虎懷珍遣敬則以千人繞後直出橫塘賊衆驚退除奉朝請出補東武暨陽令敬則初出都至陸主山下宗侶十餘船同發敬則船獨不進乃令弟入水推之見一烏漆棺敬則曰爾非凡器若是吉善使船速進吾富貴當改葬爾船須臾去敬則既入縣收此棺葬之軍荒之後縣有一部劫逃紫山中為民患敬則遣人致意劫帥可悉出首當相申論治下廟神甚酷烈百姓信之敬則引神為誓必不相負劫帥既出敬則於廟中設會於座收縛曰吾先啓神若負誓還神十牛今不違誓即殺十牛解神並斬諸劫百姓悅之遷員外郎元徽二年隨太祖拒桂陽賊於新亭敬則與羽林監陳顯達寧朔將軍高道慶乘舸煛於江中迎戰大破賊水軍焚其舟艦事寧帶南泰山太守右俠轂主轉越騎校尉安成王車騎參軍蒼梧王狂虐左右不自保敬則以太祖有威名歸誠奉事每下直輒往領府夜著青衣扶匐道路為太祖聽察蒼梧去來太祖命敬則於殿內伺機未有定日既而楊玉夫等危急殞帝敬則時在家玉夫將首投敬則敬則馳詣太祖太祖慮蒼梧所誑不開門敬則於門外大呼曰是敬則耳門猶不開乃於牆上投進其首太祖索水洗視視竟乃戎服出敬則從入宮至承明門門郎疑非蒼梧還敬則慮人覘見以刀環塞窐孔呼開門甚急衛尉丞顏靈寶窺見太祖乘馬在外竊謂親人曰今若不開內領軍天下會是亂耳門開敬則隨太祖入殿明旦四貴集議敬則拔白刃在床側跳躍曰官應處分誰敢作同異者升明元年遷員外散騎常侍輔國將軍驍騎將軍領臨淮太守增封為千三百戶知殿內宿衛兵事沈攸之事起進敬則號冠軍將軍太祖入守朝堂袁粲起兵夕領軍劉韞直閣將軍卜伯興等於宮內相應戒嚴將發敬則開關掩襲皆殺之殿內竊發盡平敬則之力也遷右衛將軍常侍如故增封為二千五百戶尋又加五百戶又封敬則子元遷為東鄉侯邑三百七十戶齊臺建為中領軍太祖將受禪材官薦易太極殿柱從帝欲避土不肯出宮遜位明日當臨軒帝又逃宮內敬則將輿入迎帝啓譬令出帝拍敬則手曰必無過慮當餉輔國十萬錢建元元年出為使持節散騎常侍都督南六允厄青冀五州軍事平北將軍南六允州刺史封尋陽郡公邑三千戶加敬則妻懷氏爵為尋陽國夫人二年進號安北將軍虜寇淮泗敬則恐委鎮還都百姓皆驚散奔走上以其功臣不問以為都官尚書撫軍尋遷使持節散騎常侍安東將軍吳興太守郡舊多剽掠有十數歲小兒於路取遺物殺之以徇自此道不拾遺郡無劫盜又録得一偷召其親屬於前鞭之令偷身長掃街路久之乃令偷舉舊偷自代諸偷恐為其所識皆逃走境內以清出行從市過見屠肉枅歎曰吳興昔無此枅是我少時在此所作也遷護軍將軍常侍如故以家為府三年以改葬去職詔贈敬則母尋陽公國太夫人改授侍中撫軍將軍太祖遺詔敬則以本官領丹陽尹尋遷為使持節散騎常侍都督會稽東陽新安臨海永嘉五郡軍事鎮東將軍會稽太守永明二年給鼓吹一部會土邊帶湖海民丁無士庶皆保塘役敬則以功力有餘悉評斂為錢送臺庫以為便宜上許之竟陵王子良啓曰伏尋三吳內地國之關輔百度所資民庶雕流日有困殆蠶農罕獲飢寒尤甚富者稍增其饒貧者轉鍾其弊可為痛心難以辭盡頃錢貴物賤殆欲兼倍凡在觸類莫不如茲稼穡難劬斛直數十今機杼勤苦匹裁三百所以然者實亦有由年常歲調既有定期僮恤所上咸是見直東間錢多剪鑿鮮復完者公家所受必須員大以兩代一困於所貿鞭捶質繫益致無聊臣昔忝會稽粗間物俗塘丁所上本不入官良由陂湖宜壅橋路須通均夫訂直民自為用若甲分毀壞則年一修改若乙限堅完則終歲無役今郡通課此直悉以還臺租賦之外更生一調致令塘路崩蕪湖源泄散害民損政實此為劇建元初狡虜遊魂軍用殷廣浙東五郡丁稅一千乃有質賣妻兒以充此限道路愁窮不可聞見所逋尚多收上事絶臣登具啓聞即蒙蠲原而此年租課三分逋一明知徒足擾民實自弊國愚謂塘丁一條宜還復舊在所逋優量原除凡應受錢不限大小仍令在所折市布帛若民有雜物是軍國所須者聽隨價準直不必其一應送錢於公不虧其用在私實荷其渥昔晉氏初遷江左草創絹布所直十倍於今賦調多少因時增減永初中官布一匹直錢一千而民間所輸聽為九百漸及元嘉物價轉賤私貨則束直六千官受則匹準五百所以每欲優民必為降落今入官好布匹堪百餘其四民所送猶依舊制昔為刻上今為刻下氓庶空儉豈不由之救民拯弊莫過減賦時和歲稔尚爾虛乏儻值水旱寧可熟念且西京熾強實基三輔東都全固實賴三河歷代所同古今一揆石頭以外裁足自供府州方山以東深關朝廷根本夫股肱要重不可不宜蒙寬政少加優養略其目前小利取其長久大益無患民資不殷國財不阜也宗臣重寄咸云利國竊如愚管未見可安上不納三年進號征東將軍宋廣州刺史王翼之子妾路氏剛暴數殺婢翼之子法明告敬則敬則付山陰獄殺之路氏家訴為有司所奏山陰令劉岱坐棄市刑敬則入朝上謂敬則曰人命至重是誰下意殺之都不啓聞敬則曰是臣愚意臣知何物科法見背後有節便言應得殺人劉岱亦引罪上乃赦之敬則免官以公領郡明年遷侍中中軍將軍尋與王儉俱即本號開府儀同三司儉既固讓敬則亦不即受七年出為使持節散騎常侍都督豫州郢州之西陽司州之汝南二郡軍事征西大將軍豫州刺史開府如故進號驃騎十一年遷司空常侍如故世祖崩遺詔改加侍中高宗輔政密有廢立意隆昌元年出敬則為使持節都督會稽東陽臨海永嘉新安五郡軍事會稽太守本官如故海陵王立進位太尉敬則名位雖達不以富貴自遇危拱傍遑略不嘗坐接士庶皆吳語而殷勤周悉初為散騎使虜於北館種楊柳後員外郎虞長耀北使還敬則問我昔種楊柳樹今若大小長耀曰虜中以為甘棠敬則笑而不答世祖御座賦詩敬則執紙曰臣幾落此奴度內世祖問此何言敬則曰臣若知書不過作尚書都令史耳那得今日敬則雖不大識書而性甚警黠臨州郡令省事讀辭下教判決皆不失理明帝即位進大司馬增邑千戶臺使拜授日雨大洪注敬則文武皆失色一客在傍曰公由來如此昔拜丹陽吳興時亦然敬則大悅曰我宿命應得雨乃列羽儀備朝服道引出聽事拜受意猶不自得吐舌久之至事竟帝既多殺害敬則自以高武舊臣心懷憂恐帝雖外厚其禮而內相疑備數訪問敬則飲食體幹堪宜聞其衰老且以居內地故得少安三年中遣蕭坦之將齋仗五百人行武進陵敬則諸子在都憂怖無計上知之遣敬則世子仲雄入東安慰之仲雄善彈琴當時新絶江左有蔡雍焦尾琴在主衣庫上敕五日一給仲雄仲雄於御前鼓琴作懊儂曲歌曰常歎負情儂郎今果行許帝愈猜愧永泰元年帝疾屢經危殆以張瓌為平東將軍吳郡太守置兵佐密防敬則內外傳言當有異處分敬則聞之竊曰東今有誰秖是欲平我耳諸子怖懼第五子幼隆遣正員將軍徐嶽密以情告徐州行事謝朓為計若同者當往報敬則朓執嶽馳啓之敬則城局參軍徐庶家在京口其子密以報庶庶以告敬則五官王公林公林敬則族子常所委信公林勸敬則急送啓賜兒死單舟星夜還都敬則令司馬張思祖草啓既而曰若爾諸郎在都要應有信且忍一夕其夜呼僚佐文武樗蒲賭錢謂衆曰卿諸人欲令我作何計莫敢先答防閣丁興懷曰官秖應作耳敬則不作聲明旦召山陰令王詢臺侍傳御史鍾離祖願敬則橫刀跂坐問詢等發丁可得幾人傳庫見有幾錢物詢答縣丁卒不可上祖願稱傳物多未輸入敬則怒將出斬之王公林又諫敬則曰官是事皆可悔惟此事不可悔官詎不更思敬則唾其面曰小子我作事何關汝小子乃起兵上詔曰謝朓啓事騰徐嶽列如右王敬則稟質凶猾本謝人綱直以宋季多艱頗有膂力之用驅奬所至遂升榮顯皇運肇基預聞末議功非匡國賞實震主爵冠執圭身登衣衮固以風雅作刺縉紳側目而溪谷易盈鴟梟難改猜心內駭醜辭外布永明之朝履霜有漸隆昌之世堅冰將著從容附會朕有力焉及景歷惟新推誠盡禮中使相望軒冕成陰乃嫌迹愈興禍圖茲構收合亡命結黨聚羣外候邊警內伺國隙元遷兄弟中萃淵藪姦契潛通將謀竊發朓即姻家嶽又邑子取據匪他昭然以信方邵之美未聞韓彭之釁已積此而可容孰寄刑典便可即遣收掩肅明國憲大辟所加其父子而已凡諸詿誤一從蕩滌收敬則子員外郎世雄記室參軍季哲太子洗馬幼隆太子舍人少安等於宅殺之長子黃門郎元遷為寧朔將軍領千人於徐州擊虜敕徐州刺史徐玄慶殺之敬則招集配衣二三日便發欲劫前中書令何胤還為尚書令長史王弄璋司馬張思祖止之乃率實甲萬人過浙江謂思祖曰應須作檄思祖曰公今自還朝何用作此敬則乃止朝廷遣輔國將軍前軍司馬左興盛後軍將軍直閣將軍崔恭祖輔國將軍劉山陽龍驤將軍直閣將軍馬軍主胡松三千餘人築壘於曲阿長岡右僕射沈文季為持節都督屯湖頭備京口路敬則以舊將舉事百姓簷篙荷鍤隨逐之十餘万衆至晉陵南沙人范修化殺縣令公上延孫以應之敬則至武進陵口慟哭乘肩輿而前遇興盛山陽二寨盡力攻之興盛使軍人遙告敬則曰公兒死已盡公持許底作官軍不敵欲退而圍不開各死戰胡松領馬軍突其後白丁無器仗皆驚散敬則軍大敗敬則索馬再上不得上興盛軍客容袁文曠斬之傳首是時上疾已篤敬則倉卒東起朝廷震懼東昏侯在東宮議欲叛使人上屋望見征虜亭失火謂敬則至急裝欲走有告敬則者敬則曰檀公三十六策走是上計汝父子唯應急走耳敬則之來聲勢甚盛裁少日而敗時年七十餘封左興盛新吳縣男崔恭祖遂興縣男劉山陽湘陰縣男胡松沙陽縣男各四百戶賞平敬則也又贈公上延孫為射聲校尉陳顯達南彭城人也宋孝武世為張永前軍幢主景和中以勞歷驅使泰始初以軍主隸徐州刺史劉懷珍北征纍至東海王板行參軍員外郎泰始四年封彭澤縣子邑三百戶歷馬頭義陽二郡太守羽林監濮陽太守隸太祖討桂陽賊於新亭壘劉勔大桁敗賊進杜姥宅及休範死太祖欲還衛宮城或諫太祖曰桂陽雖死賊黨猶熾人情難固不可輕動太祖乃止遣顯達率司空參軍高敬祖自查浦渡淮緣石頭北道入承明門屯東堂宮中恐動得顯達乃至乃稍定顯達出杜姥宅大戰破賊矢中左眼拔箭而鏃不出地黃村潘嫗善禁先以釘釘柱嫗禹步作氣釘即時出乃禁顯達目中鏃出之封豐城縣侯邑千戶轉遊擊將軍尋為使持節督廣交越三州湘州之廣興軍事輔國將軍平越中郎將廣州刺史進號冠軍沈攸之事起顯達遣軍援臺長史到遁司馬諸葛導謂顯達曰沈攸之擁衆百万勝負之勢未可知不如保境蓄衆分遣信驛密通彼此顯達於座手斬之遣表疏歸心太祖進使持節左將軍軍至巴丘而沈攸之平除散騎常侍左衛將軍轉前將軍太祖太尉左司馬齊臺建為散騎常侍左衛將軍領衛尉太祖即位遷中護軍增邑千六百戶轉護軍將軍顯達啓讓上答曰朝廷爵人以序卿忠發萬里信誓如期雖屠城殄國之勳無以相加此而不賞典章何在若必未宜爾吾終不妄授於卿數士意同家人豈止於君臣邪過明與王李俱祗召也上即位後御膳不宰牲顯達上熊蒸一盤上即以充飯建元二年虜寇壽陽淮南江北百姓搔動上以顯達為使持節散騎常侍都督南六允徐青冀五州諸軍事平北將軍南六允州刺史之鎮虜退上敕顯達曰虜經破散後當無復犯關理但國家邊防自應過存備豫宋元嘉二十七年後江夏王作南六允徙鎮盱眙沈司空亦以孝建初鎮彼政當以淮上要於廣陵耳卿謂前代此處分云何今僉議皆云卿應據彼地吾未能決乃當以擾動文武為勞若是公計不得憚之事竟不行遷都督益寧二州軍事安西將軍益州刺史領宋寧太守持節常侍如故世祖即位進號鎮西益部山險多不賓服大度村獠前後刺史不能制顯達遣使責其租賧獠帥曰兩眼刺史尚不敢調我遂殺其使顯達分部將吏聲將出獵夜往襲之男女無少長皆斬之自此山夷震服廣漢賊司馬龍駒據郡反顯達又討平之永明二年徵為侍中護軍將軍顯達纍任在外經太祖之憂及見世祖流涕悲咽上亦泣心甚嘉之五年荒人桓天生自稱桓玄宗族與雍司二州界蠻虜相扇動據南陽故城上遣顯達假節率征虜將軍戴僧靜等水軍向宛葉雍司衆軍受顯達節度天生率虜衆萬餘人攻舞陰舞陰戍主輔國將軍殷公愍擊殺其副張麒麟天生被瘡退走仍以顯達為使持節散騎常侍都督雍梁南北秦郢州之竟陵司州之隨郡軍事鎮北將軍領寧蠻校尉雍州刺史顯達進據舞陽城遣僧靜等先進與天生及虜再戰大破之官軍還數月天生復出攻舞陰殷公愍破之天生還竄荒中遂城平氏白土三城賊稍稍降散八年進號征北將軍其年仍遷侍中鎮軍將軍尋加中領軍出為使持節散騎常侍都督江州諸軍事征南大將軍江州刺史給鼓吹一部顯達謙厚有智計自以人微位重每遷官常有愧懼之色有子十餘人誡之曰我本志不及此汝等勿以富貴陵人家既豪富諸子與王敬則諸兒並精車牛麗服飾當世快牛稱陳世子青王三郎烏呂文顯折角江瞿曇白鼻顯達謂其子曰麈尾扇是王謝家許物汝不須捉此自逐十一年秋虜動詔屯樊城世祖遺詔即本號開府儀同三司隆昌元年遷侍中車騎將軍開府如故置兵佐豫廢鬱林之勳延興元年為司空進爵公增邑千戶甲仗五十人入殿高宗即位進太尉侍中如故改封鄱陽郡公邑三千戶加兵二百人給油絡車建武二年虜攻徐司詔顯達出頓往來新亭白下以為聲勢上欲悉除高武諸孫微言問顯達答曰此等豈足介慮上乃止顯達建武世心懷不安深自貶匿車乘朽故導從鹵簿皆用羸小不過十數人侍宴酒後啓上曰臣年已老富貴已足唯少枕枕死特就陛下乞之上失色曰公醉矣以年禮告退不許是時虜頻寇雍州衆軍不捷失沔北五郡永泰元年乃遣顯達北討詔曰晉氏中微宋德將謝蕃臣外叛要荒內侮天未悔禍左衽亂華巢穴神州逆移年載朕嗣膺景業踵武前王靜言隆替思乂區夏但多難甫夷恩化肇洽興師擾衆非政所先用戢遠圖權緩北略冀戎夷知義懷我好音而凶醜剽狡專事侵掠驅扇異類蟻聚西偏乘彼自來之資撫其天亡之會軍無再駕民不重勞傳檄以定三秦一麾而臣禹迹在此舉矣且中原士庶久望皇威乞師請援結軌馳道信不可失時豈終朝宜分命方嶽因茲大號侍中太尉顯達可暫輟槐陰指授羣帥中外纂嚴加顯達使持節向襄陽永元元年顯達督平北將軍崔慧景衆軍四萬圍南鄉堺馬圈城去襄陽三百里攻之四十日虜食盡噉死人肉及樹皮外圍既急虜突走斬獲千計官軍競取城中絹不復窮追顯達入據其城遣軍主莊丘纍黑進取南鄉縣故從陽郡治也虜主元宏自領十餘萬騎奄至顯達引軍渡水西據鷹子山築城人情沮敗虜兵甚急軍主崔恭祖胡松以烏布幔盛顯達數人簷之徑道從分磧山出均水口臺軍緣道奔退死者三万餘人左軍將張千戰死追贈遊擊將軍顯達素有威名著於蠻虜至是大損喪焉御史中丞范岫奏免顯達官朝議優詔答曰昔衛霍出塞往往無功馮鄧入關有時虧喪況公規謨肅舉期寄兼深見可知難無損威略方振遠圖廓清朔土雖執憲有常非所得議顯達表解職不許求降號又不許以顯達為都督江州軍事江州刺史鎮盆城持節本官如故初王敬則事起始安王遙光啓明帝慮顯達為變欲追軍還事尋平乃寢顯達亦懷危怖及東昏立彌不樂還京師得此授甚喜尋加領征南大將軍給三望車顯達聞京師大相殺戮又知徐孝嗣等皆死傳聞當遣兵襲江州顯達懼禍十一月十五日舉兵令長史庾弘遠司馬徐虎龍與朝貴書曰諸君足下我太祖高皇帝睿哲自天超人作聖屬彼宋季綱紀自頓應禪從民遘此基業世祖武皇帝昭略通遠克纂洪嗣四關罷嶮三河靜塵鬱林海陵頓孤負荷明帝英聖紹建中興至乎後主行悖三才琴橫席繡積麻筵淫犯先宮穢興閨闥皇陛為市㕓之所雕房起征戰之門任非華尚寵必寒厮江僕射兄弟忠言屬薦正諫繁興覆族之誅於斯而至故乃犴噬之刑四剽於海路家門之釁一起於中都蕭劉二領軍並升御座共稟遺詔宗戚之苦諒不足談渭陽之悲何辜至此徐司空歷葉忠榮清簡流世匡翼之功未著傾宗之罰已彰沈僕射年在懸車將念機杖歡歌園藪絶影朝門忽招陵上之罰何万古之傷哉遂使紫臺之路絶縉紳之儔纓組之閣罷金張之胤悲哉蟬冕為賤寵之服嗚呼皇陛列劫竪之坐且天人同怨乾象變錯往歲三州流血今者五地自動昔漢池異色胥王因之見廢吳郡暫震步生以為姦幸況事隆於往怪釁倍於前虐此而未廢孰不可興王僕射王領軍崔護軍中維簡正逆念剖心蕭衛尉蔡詹事沈左衛各負良家共傷時嶮先朝遺舊志在名節同列丹書要同義舉建安殿下秀德沖遠實允神器昏明之舉往聖流言今忝役戎驅亟請乞路須京塵一靜西迎大駕歌舞太平不亦佳哉裴豫州宿遣誠言久懷慷慨計其徑兵已登淮路申司州志節堅明分見迎合總勒偏率殿我而進蕭雍州房僧寄並已纂邁旌鼓將及南六允州司馬崔恭祖壯烈超羣嘉驛屢至佇聽烽諜共成脣齒荊郢行事蕭張二賢莫不案劒餐風橫戈待節關畿蕃守之儔孰非義侶我太尉公體道合聖杖德修文神武橫於七伐雄略震於九綱是乃從彼英序還抗社稷本欲鳴笳細錫無勞戈刃但忠黨有心節義難遣信次之間森然十萬飛旍咽於九派列艦迷於三川此蓋捧海澆螢烈火消凍耳吾子其擇善而從之無令竹帛空為後人笑也朝廷遣後軍將軍胡松驍騎將軍李叔獻水軍據梁山左衛將軍左興盛假節加征虜將軍督前鋒軍事屯新亭輔國將軍驍騎將軍徐世摽領兵屯杜姥宅顯達率衆數千人發尋陽與胡松戰於採石大破之京邑震恐十二月十三日顯達至新林築城壘左興盛率衆軍為拒戰之計其夜顯達多置屯火於岸側潛軍渡取石頭北上襲宮城遇風失曉十四日平旦數千人登落星岡新亭軍望火謂顯達猶在既而奔歸赴救屯城南宮掖大駭閉門守備顯達馬矟從步軍數百人於西州前與臺軍戰再合大勝手殺數人矟折官軍繼至顯達不能抗退走至西州從後烏榜村為騎官趙潭注矟刺落馬斬之於籬側血湧湔籬似淳于伯之被刑也時年七十二顯達在江州遇疾不治尋而自差意甚不悅是冬連大雪梟首於朱雀而雪不集之諸子皆伏誅史臣曰光武功臣所以能終其身名者非唯不任職事亦以繼奉明章心尊正嫡君安乎上臣習乎下王陳拔迹奮飛則建元永明之運身極鼎將則建武永元之朝勳非往時位踰昔等禮授雖重情分不交加以主猜政亂危亡慮及舉手扞頭人思自免干戈既用誠淪犯上之迹敵國起於同舟況又疏於此者也贊曰糾糾敬則臨難不惑功成殿寢誅我蝥賊顯達孤根應義南蕃威揚寵盛鼎食高門王虧河六允陳挫襄樊鳴笳細錫疑
