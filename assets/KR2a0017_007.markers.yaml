  - {type: variant, offset: 4488, length: 3, content: 青𦕎疑, WYG: 南齊書卷七南齊書卷七考證東昬侯本紀永元元年二月太尉陳顯達敗績於馬圈臣宗萬按杜佑曰馬圏城去襄陽三百里在今南陽郡界秺縣北又曰後魏馬圏鎮漢湼陽縣地二年四月乙夘遣中領軍王瑩率衆軍屯北籬門臣祖庚按崔慧景傳帝遣右衛将軍左興盛率臺内三萬人拒慧景於北籬門與紀異十二月梁王起義兵於襄陽臣祖庚按通鑑云十一月乙巳衍集僚佐謂曰當與卿等共除之是日建牙集衆又云帝遣劉山陽将兵就蕭穎胄襲襄陽然則是時梁王尚未起義矣故考異曰齊紀誤也以武烈将軍胡元進為廣州刺史武烈諸本皆作威烈臣承蒼按宋百官志有武烈将軍無威烈将軍齊世官名多循宋制今定作武三年三月丁未南康王寳融即皇帝位臣祖庚按和帝紀三年正月乙巳王受命大赦據此則正月乙己南康王已即位江陵矣此云三月丁未者通鑑考異曰盖是日建康始聞之耳南齊書卷七考證}
