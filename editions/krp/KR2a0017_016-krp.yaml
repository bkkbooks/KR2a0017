body:
  text: 南齊書卷十六梁蕭子顯撰志第八百官建官設職興自炎昊方乎隆周之册表乎盛漢之書存改洄沿備于歴代先賢徃學以之雕篆者衆矣若夫胡廣舊儀事惟簡撮應劭官典殆無遺恨王朗奏議屬霸國之初基陳矯増曺由軍事而補闕今則有魏氏官儀魚豢中外官也山濤以意辯人不闕荀朂欲去事煩唯論并省定制成文本之晉令後代承業案為前准肇域官品區别階資蔚宗選簿梗槩欽明階次詳悉虞通劉寅因茍氏之作矯舊増新今古相校齊受宋禪事遵常典既有司存無所偏廢其餘散在史注多已筌拾覧者易知不重述也諸臺府郎令史職吏以下具見長水校尉王珪之職儀國相蕭曺以来為人臣極位宋孝建用南譙王義宣至齊不用人以為贈不列官太宰宋大明用江夏王義恭以後無人齊以為贈太傅太師太保太傅周舊官漢末董卓為太師晉恵帝初衛瓘為太保自後無太師而太保為贈齊唯置太傅大司馬大将軍宋元嘉用彭城王義康後無人齊以為贈太尉司徒司空三公舊為通官司徒府領天下州郡名数户口簿籍雖無常置左右長史左西掾属主簿祭酒令史以下晉世王導為司徒右長史干寳撰立官府職儀已具特進位從公諸開府儀同三司驃騎将軍車騎将軍衞将軍鎮軍将軍中軍将軍撫軍将軍四征将軍東西南北四鎮将軍凡諸将軍加大字位從公開府儀同如公凡公督府置佐長史司馬各一人諮議参軍二人諸曺有錄事記室户曺倉曺中直兵外兵騎兵長流賊曺城局法曺田曺水曺鎧曺集曺右户十八曺局曺以上署正参軍法曺以下署行参軍各一人其行参軍無署者為長兼員其府佐史則從事中郎二人倉曺掾户曺属東西閣祭酒各一人主簿舍人御属二人加崇者則左右長史四人中郎掾属竝増数其未及開府則置府亦有佐史其数有減小府無長流置禁防参軍四安将軍四平将軍左右前後将軍征虜将軍四中郎将晉世荀羡王胡之竝居此官宋齊以来唯處諸王素族無為者冠軍将軍輔國将軍寧朔将軍寧逺将軍龍驤将軍凡諸小號亦有置府者太常府置丞一人五官功曺主簿九府九史皆然領官如左博士謂之太學博士國子祭酒一人博士二人助教十人建元四年有司奏置國學祭酒准諸曺尚書博士准中書郎助教准南臺御史選經學為先若其人難備給事中以還明經者以本位領其下典學二人三品准太常主簿户曺儀曺各二人五品白簿治禮吏八人六品保學醫二人威儀二人其夏國諱廢學有司奏省助教以下永明三年立學尚書令王儉領祭酒八年國子博士何𦙍單為祭酒疑所服陸澄等皆不能據遂以𤣥服臨試月餘日博議定乃服朱衣總明觀祭酒一人右太始六年以國學廢初置總明觀𤣥儒文史四科科置學士各十人正令史一人書令史二人幹一人門吏一人典觀吏二人建元中掌治五禮永明三年國學建省太廟令一人丞一人明堂令一人丞一人太祝令一人丞一人太史令一人丞一人廩犧令一人丞一人置令丞以下皆有職吏太樂令一人丞一人諸陵令永明末置用二品三品勲置主簿户曺各一人六品保與光禄勲府置丞一人領官如左左右光禄大夫位從公開府置佐史如公光禄大夫皆銀章青綬詔加金章紫綬者為金紫光禄大夫樂安任遐為光禄就王晏乞一片金晏乃啟轉為金紫不行太中大夫中散大夫諸大夫官皆處舊齒老年重者加親信二十人衛尉府置丞一人掌宫城管籥張衡西京賦曰衞尉八屯警夜廵晝宫城諸却敵樓上本施鼓持夜者以應更唱太祖以鼓多驚眠改以鐡磬云廷尉府置丞一人正一人監一人評一人律博士一人大司農府置丞一人領官如左太倉令一人丞一人導官令一人丞一人藉田令一人丞一人少府府置丞一人領官如左左右尚方令各一人丞一人鍜署丞一人永明三年省四年復置御府令一人丞一人東冶令一人丞一人南冶令一人丞一人平准令一人丞一人上林令一人丞一人亦属尚書殿中曺将作大匠太僕大鴻臚三卿不常置将作掌宫廟土木太僕掌郊禮執轡鴻臚掌導䕶賛拜有事權置兼官畢乃省乗黄令一人掌五輅安車大行㓙器輼輬車客館令掌四方賔客宣徳衞尉少府太僕欎林王立文安太后即尊號以宫名置之大長秋欎林立皇后置録尚書尚書令總領尚書䑓二十曺為内臺主行遇諸王以下皆禁駐左右僕射分道無令左僕射為臺主與令同左僕射領殿中主客二曺事諸曺郊廟園陵車駕行幸朝儀臺内非違文官舉補滿叙疾假事其諸吉慶瑞應衆賀災異賊發衆變臨軒崇拜改號格制莅官銓選凡諸除署功論封爵貶黜八議疑讞通闗案則左僕射主右僕射次經維是黄案左僕射右僕射署朱符見字經都丞竟右僕射横畫成目左僕射畫令畫右官闕則以次并畫若無左右則直置僕射在其中間總左右事吏部尚書領吏部刪定三公比部四曺度支尚書領度支金部倉部起部四曺左民尚書領左民駕部二曺都官尚書領都官水部庫部功論四曺五兵尚書領中兵外兵二曺祠部尚書右僕射通職不俱置起部尚書興立宫廟權置事畢省左丞一人掌宗廟郊祠吉慶瑞應災異立作格制諸案彈選用除置吏補滿除遣注職右丞一人掌兵士百工補役死叛考代年老疾病觧遣其内外諸庫藏榖帛刑辠創業諍訟田地船乘禀拘兵工死叛考剔討補差分百役兵器諸營署人領州郡租布人民户移徙州郡縣併帖城邑民户割属刺史二千石令長尉被收及免贈文武諸犯削官事白案右丞上署左丞次署黄案左丞上署諸立格制及詳讞大事宗廟朝廷儀體左丞上署右丞次署自令僕以下五尚書八座二十曺各置郎中令史以下又置都令史分領之僕射掌朝軌尚書掌讞奏都丞任碎在彈違諸曺緣常及外詳讞事應湏命議相值者皆郎先立意應奏黄案及闗事以立意官為議主凡辭訴有漫命者曺掾諮如舊若命有諮則以立意者為議主武庫令一人属庫部車将令一人丞一人属駕部公車令一人大官令一人丞一人大醫令一人丞一人内外殿中監各一人内外驊騮廐丞各一人材官将軍一人司馬一人属起部亦属領軍侍中祭酒髙功者稱之侍中漢世為親近之職魏晉選用稍増華重而大意不異宋文帝元嘉中王華王曇首殷景仁等並為侍中情在親宻與帝接膝共語貂拂帝手㧞貂置案上語畢復手挿之孝武時侍中何偃南郊陪乗鑾輅過白門闕偃将匐帝乃接之曰朕乃陪卿齊世朝㑹多以美姿容者兼官永元三年東昏南郊不欲親朝士以主璽陪乗前代未嘗有也侍中呼為門下亦置令史領官如左給事黄門侍郎亦管知詔令世呼為小門下散騎常侍通直散騎常侍員外舊與侍中通官其通直貟外用衰老人士故其官漸替宋大明雖華選比侍中而人情乆習終不見重尋復如初㪚騎侍郎通直散騎侍郎員外㪚騎侍郎給事中奉朝請駙馬都尉集書省職置正書令史朝散用衣冠之餘人數猥積永明中奉朝請至六百餘人中書監一人令一人侍郎四人通事舍人無員中書省職置主書令史正書以下祕書監一人丞一人郎著作佐郎晉祕書閣有令史掌衆書見晉令令亦置令史正書及弟子皆典教書畫御史中丞一人晉江左中丞司𨽻分督百僚傅咸所云行馬内外是也今中丞則職無不察専道而行騶輻禁呵加以聲色武将相逢輙致侵犯若有鹵簿至相敺撃宋孝建二年制中丞與尚書令分道雖丞郎下朝相值亦得斷之餘内外衆官皆受停駐治書侍御史二人侍御史十人蘭䑓置諸曺内外督令以下謁者僕射一人謁者十人謁者臺掌朝覲賔饗領軍将軍中領軍䕶軍将軍中䕶軍凡為中小輕同一官也諸為将軍官皆敬領䕶諸王為将軍道相逢則領䕶讓道置長史司馬五官功曺主簿左右二衞将軍驍騎将軍游撃将軍晉世以来謂領䕶至驍游為六軍二衞置司馬次官功曺主簿以下左右二中郎将前軍将軍後軍将軍左軍将軍右軍将軍號四軍屯騎歩兵射聲越騎長水五校尉虎賁中郎将冗從僕射羽林監積射将軍彊弩将軍殿中将軍員外殿中将軍殿中司馬督武衞将軍武騎常侍自二衞四軍五校已下謂之西省而散騎為東省丹陽尹位次九卿下太子太傅少傅府置丞功曺五官主簿太子詹事府置丞一人以下太子率更令太子家令置丞太子僕太子門大夫太子中庶子太子中舍人太子洗馬太子舍人太子左右衞率各一太子翊軍歩兵屯騎三校尉太子旅賁中郎将一人太子左右積弩将軍太子殿中将軍員外殿中将軍太子倉官令太子常從虎賁督右東宫職僚州牧刺史魏晉世州牧隆重刺史任重者為使持節都督輕者為持節督起漢順帝時御史中丞馮赦討九江賊督揚徐二州軍事而何徐宋志云起魏武遣諸州将督軍王珪之職儀云起光武竝非也晉太康中都督知軍事刺史治民各用人恵帝末乃并任非要州則單為刺史州朝置别駕治中議曺文學祭酒諸曺部從事史䕶南蠻校尉府置佐史𨽻荆州晉宋末省建元元年復置三年省延興元年置建武省䕶三巴校尉宋置建元二年改為刺史寕蠻校尉府亦置佐史𨽻雍州平蠻校尉永明三年置𨽻益州鎮蠻校尉𨽻寕州䕶西戎校尉䕶羌校尉右四校尉亦置四夷平越中郎将府置佐史𨽻廣州郡太守内史縣令相郡縣為國者為内史相鎮蠻䕶軍安逺䕶軍晉世雜號多為郡領之諸王師友文學各一人國官郎中令中尉大農為三卿左右常侍侍郎上軍中軍下軍三軍典書典祠學官典衞四令食官廐牧長謁者以下公侯置郎中令一卿贊曰百司分置惟皇命職雲師鳥紀各有其式南齊書卷十六南齊書卷十六考證百官志相國臣祖庚按即漢之相國髙帝置丞相十一年更名相國應劭曰相者助也太傅臣祖庚按周之三公也後漢惟有太傅一人謂之上公此盖遵漢制也大司馬臣宗萬按漢武帝元狩元年始置以冠将軍之號宣帝地節三年置太司馬不冠将軍哀帝建平二年冠将軍如故元夀二年去将軍位在司徒上大将軍臣祖庚按戰國時官楚虜大将軍屈丐是也漢髙帝以韓信為大将軍武帝以衞青為大将軍復置大司馬官號以冠之據此則大司馬與大将軍始分二職至武帝時合為一矣太尉司徒司空臣宗萬按漢初惟有太尉後加置大司徒大司空後漢仍之自漢歴魏皆為三公晉及江左相承不改特進臣宗萬按杜佑曰漢制諸侯功徳優盛朝廷所敬重者賜位特進位在三公下晉元康中定令特進位次諸公在開府驃騎上又按職儀曰特進以功徳特見進也諸開府儀同三司臣祖庚按同三公之三司也後漢太尉司徒司空謂之三司鄧隲為車騎将軍儀同三司自是南北因之有儀同三司之名驃騎将軍漢置位次丞相車騎将軍衛将軍位次上卿掌京師兵衞中軍将軍臣祖庚按晉武帝重兵官故軍校多選朝廷清重之士居之置中軍将軍以統宿衛七軍太常臣祖庚按漢九寺大卿之一也秦為奉常漢景帝中六年更名太常博士臣祖庚按秦官掌通古今秩比六百石員多数十人光禄勲臣祖庚按即秦郎中令漢武帝更名光禄勲邱濬曰即周官之膳夫皆以士為之秦漢時乃持㦸宿衛之官以之司膳羞則始于南北朝也光禄大夫臣祖庚按漢百官表注曰古官也杜佑曰秦時光禄勲属官有中大夫漢武帝太初元年更名光禄大夫掌議論無常事唯備顧問應對詔命所使無員後漢光禄大夫三人晉魏後以為加官又復以為禮贈之官衞尉臣祖庚按秦官漢景帝初更名中大夫令後元年復為衛尉廷尉臣祖庚按秦置漢景帝更名大理武帝復名廷尉盖漢無司冦故廷尉為重顔師古曰廷平也治獄貴平故以為號大司農臣祖庚按秦為理粟内史漢景帝更名大農令武帝改大司農少府秦官漢因之是為九卿将作大匠臣祖庚按秦有将作少府漢景帝更名将作大匠位次河南尹光武省以謁者領之章帝復置晉魏因之太僕臣祖庚按周禮有太僕下大夫周穆王置太僕正以伯冏為之秦漢以後皆因之大鴻臚臣祖庚按秦典客也漢名鴻臚景帝改大行令武帝更名大鴻臚應劭曰鴻聲也臚傳之也大長秋臣宗萬按秦之将行也漢景帝中六年更名大長秋應劭曰皇后卿也顔師古曰秋者收成之時長者恒乆之義故以為皇后官名録尚書臣祖庚按漢章帝以太傅趙熹太尉牟融並錄尚書事尚書有錄名盖自熹始尚書令臣祖庚按杜佑曰秦置漢武帝用宦者更為中書謁者令成帝省之更以士人為尚書令秩二千石吏部尚書度支尚書左民尚書都官尚書五兵尚書祠部尚書起部尚書臣祖庚按尚書之制秦漢以来有之魏置吏部左民客曺五兵度支凡五尚書晋初以左民更名三公五兵更名駕部復置屯田合以吏部客曺度支謂為六曺太康時以三公更名殿中駕部復為五兵省屯田為五尚書宋置都官為六尚書至齊别有起部而不常置也侍中臣祖庚按秦侍中本丞相史也五人徃来殿内東廂奏事謂之侍中漢為加官得入禁中應劭曰入侍天子故曰侍中奉朝請臣宗萬按馬端臨曰奉朝請無員本不為官奉朝㑹請召而已據此則志云永明中奉朝請至六百餘人非古制也祕書監臣祖庚按漢桓帝置後省魏武帝置祕書令文帝黄初初置中書令後仍改為祕書監御史中丞臣祖庚按秦官漢置兩丞一曰御史丞一曰中丞成哀間更中丞為御史長史岀外為臺主光武時復曰中丞魏初改為宫正復曰臺主尋又改為中丞宋齊以来因之謁者僕射臣祖庚按應劭曰秦官也古重武事故設主射以督之謁者臣祖庚按晉百官表注云漢皆用孝亷年五十威容嚴恪能儐賛者為之又云謁者十人掌捧詔書朝㑹則賛儐左右二衛将軍臣祖庚按漢文帝始用宋昌為衞将軍魏置中衞将軍武帝分中衞為左右衞皆掌宿衞營兵驍騎将軍臣祖庚按杜佑曰漢有驍騎将軍謂之雜號将軍後漢建武初改屯衛為驍騎魏晉以来多有改易此盖仍漢制也羽林監臣祖庚按漢武帝太初元年置名曰建章營騎後更名羽林顔師古曰如羽之疾如林之多丹陽尹臣祖庚按周官之内史也掌治京師漢武帝更名京兆尹後漢置河南尹晉太興元年改丹陽内史為尹此因之太子太傅少傅臣祖庚按漢書百官公卿表曰古官也漢官觧詁曰位次太師賈誼曰昔周成王以周公為太傅召公為太保呂望為太師又立三少皆上大夫與太子居處又續漢書百官志曰太子少傅秩二千石亦以輔導為職太子家令臣宗萬按通典曰秦官属詹事漢因之續漢書百官志曰職如司農太子僕臣宗萬按通典曰秦官漢因之後漢属少傅職如太僕太子洗馬臣宗萬按通典曰秦官漢亦曰洗馬後漢員十六人職比謁者晉有八人擬祕書郎齊置一人漢百官表注云洗馬前驅也州牧刺史臣祖庚按杜佑曰舜置十二州有牧夏為九州牧殷周八命曰牧漢元封元年置部刺史成帝時以為刺史位下大夫乃更為州牧秩真二千石位次九卿後復為刺史據此則州牧刺史一官兩名光武不委三府權歸舉刺之吏遂無州牧之名然刺史皆領州故曰州牧刺史郡太守内史臣祖庚按杜佑曰秦滅諸侯以其地為郡置守漢景帝中元二年更名太守漢置郡為諸侯王國者置内史以掌太守之任縣令相臣祖庚按杜佑曰周官有縣正各掌其縣之政令而賞罰之漢制凡縣萬户以上為令減萬户為長侯國為相南齊書卷十六考證
