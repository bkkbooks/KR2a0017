儀煥帝庭要荒服遐外被髮襲纓冕右左衽回衿帶天覆地載澤流汪濊聲教布濩德光大開元辰畢來王奉貢職朝后皇鳴珩佩觀典章樂王慶悅徽芳陶盛化遊大康惟昌明永克昌惟建元德丕顯齊七政敷五典彝倫序洪化闡王澤流太平始樹靈祇恭明祀仁介景祚膺嘉祉禮有容樂有儀金石陳干羽施邁武濩均咸池歌南風德永稱文明煥頌聲興王道純德彌淑寧八表康九服導禮讓移風俗移風俗永克融歌盛美告成功詠休烈邈無窮右黃鍾先奏晨儀篇太蔟奏五玉篇餘八篇二廂更奏之前舞階步歌辭新辭天挺聖哲三方維綱川岳伊寧七耀重光茂育萬物衆庶咸康道用潛通仁施遐揚德厚峍極功高昊蒼舞象盛容德以歌章八音既節龍躍鳳翔皇基永樹二儀等長前舞凱容歌詩舊辭於赫景命天鑒是臨樂來伊陽禮作惟陰歌自德富舞由功深庭列宮縣陛羅瑟琴翿籥繁會笙磬諧音簫韶雖古九奏在今導志和聲德音孔宣光我帝基協靈配乾儀形六合化穆自宣如彼雲漢為章于天熙熙萬類陶和當年擊轅中韶永世弗騫後舞階步歌辭新辭皇皇我后紹業盛明滌拂除穢宇宙載清允執中和以莅蒼生玄化遠被兆世軌形何以崇德乃作九成妍步恂恂雅曲芬馨八風清鼓應以祥禎澤浩天下功齊百靈後舞凱容歌辭舊辭假樂聖后寔天誕德積美自中王猷四塞龍飛在天儀形萬國欽明惟神臨朝淵默不言之化品物咸得告成于天銘勳是勒翼翼厥猷亹亹其仁從命創制因定和神海外有截九國無塵冕旒司契垂拱臨民乃舞凱容欽若天人純嘏孔休萬載彌新宣烈舞執干戚郊廟奏平冕黑介幘玄衣裳白領袖絳領袖中衣絳合幅袴絳糸末朝廷則武冠赤幘生絳袍單衣絹領袖皁領袖中衣虎文畫合幅袴白布彩皆黑韋緹周大武舞秦改為五行漢高造武德舞執干戚象天下樂已除亂桉禮云朱干玉戚冕而舞大武是則漢放此舞而立也魏文帝改五行還為大武而武德曰武頌舞明帝改造武始舞晉世仍舊傅玄六代舞歌有武辭此武舞非一也宋孝建初朝議以凱容舞為韶舞宣烈舞為武舞據韶為言宣烈即是古之大武非武德也今世諺呼為武王伐紂其冠服魏明帝世尚書所奏定武始舞服晉宋承用齊初仍舊不改宋舞名其舞人冠服見魏尚書奏後代相承用之凱容舞執羽籥郊廟冠委貌服如前朝廷進賢冠黑介幘生黃袍單衣白合幅袴餘如前本舜韶舞漢高改曰文始魏復曰大韶又造咸熙為文舞晉傅玄六代舞有虞韶舞辭宋以凱容繼韶為文舞相承用魏咸熙冠服前舞後舞晉泰始九年造正德大豫舞傅玄張華各為歌辭宋元嘉中改正德為前舞大豫為後舞右朝會樂辭舞曲皆古辭雅音稱述功德宴享所奏傅玄歌辭云獲罪於天北徙朔方墳墓誰掃超若流光如此十餘小曲名為舞曲疑非宴樂之辭然舞曲總名起此矣明君辭明君創洪業盛德在建元受命君四海聖皇應靈乾五帝繼三皇三皇世所歸聖德應期運天地不能違仰之彌已高猶天不可階將復結繩化靜拱天下齊右一曲漢章帝造鼙舞歌云關東有賢女魏明帝代漢曲云明明魏皇帝傅玄代魏曲作晉洪業篇云宣文創洪業盛德存泰始聖皇應靈符受命君四海今前四句錯綜其辭從五帝至不可階六句全玄辭後二句本云將復御龍氏鳳皇在庭栖又改易焉聖主曲辭聖主受天命應期則虞唐升旒綜萬機端扆馭八方盈虛自然數揖讓歸聖明北化陵河塞南威越滄溟廣德齊七政敷教騰三辰萬𧜛必承慶百福咸來臻聖皇應福始昌德洞祐先明君辭明君御四海總鑒盡人靈仰成恩已洽竭忠身必榮聖澤洞三靈德教被八鄉草木變柯葉川岳洞嘉祥愉樂盛明運舞蹈升太時微霜永昌命軌心長歡怡鐸舞歌辭黃雲門唐咸池虞韶舞夏夏殷濩列代有五振鐸鳴金延太武清歌發唱形為主聲和八音協律呂身不虛動手不徒舉應節合度周期序時奏宮角雜之以徵羽樂以移風禮相輔安有出其所右一曲傅玄辭以代魏太和時徵羽下除下厭衆目上從鍾鼓二句白鳩辭翩翩白鳩再飛再鳴懷我君德來集君庭右一曲舞云白符或云白符鳩舞出江南吳人所造其辭意言患孫皓虐政慕政化也其詩本云平平白符思我君惠集我金堂言白者金行符合也鳩亦合也符鳩雖異其義是同濟濟辭暢飛暢舞氣流芳追念三五大綺黃右一曲晉濟濟舞歌六解此是最後一解獨祿辭獨祿獨祿水深泥濁泥濁尚可水深殺我右一曲晉獨鹿舞歌六解此是前一解古辭明君曲後云勇安樂無慈不問清與濁清與無時濁邪交與獨祿伎錄云求祿求祿清白不濁清白尚可貪汙殺我晉歌為鹿字古通用也疑是風刺之辭碣石辭東臨碣石以觀滄海水河淡淡山嶋竦峙樹木叢生百草豐茂秋風蕭瑟洪波涌起日月之行若出其中星漢粲爛若出其𩹉幸甚至哉歌以言志右一曲魏武帝辭晉以為碣石舞歌詩四章此是中一章淮南王辭淮南王自言尊百尺高樓與天連我欲渡河河無梁願作雙黃鵠還故鄉右一曲晉淮南王舞歌六解前是第一後是第五齊世昌辭齊世昌四海安樂齊太平人命長當結久千秋萬歲皆老壽右一曲晉杯槃歌十解第三解云舞杯槃何翩翩舉坐翻覆壽萬年干寶云太康中有此舞杯槃翻覆至危之像言晉世之士苟貪飲食智不及遠其第一解首句云晉世寧宋改為宋世寧惡其杯槃翻覆辭不復取齊改為齊世昌餘辭同後一公莫辭吾不見公莫時吾何嬰公來嬰姥時吾思君去時吾何零子以耶思君去時思來嬰吾去時母那何去吾右一曲晉公莫舞歌二十章無定句前是第一解後是第十九二十解雜有三句竝不可曉解建武初明帝奏樂至此曲言是似永明樂流涕憶世祖云白紵辭陽春白日風花香趨步明月舞瑤堂情發金石媚笙簧羅袿徐轉紅袖揚清歌流響繞鳳梁如驚若思凝且翔轉眄流精豔輝光將流將引雙度雁行歡來何晚意何長明君馭世永歌昌右五曲尚書令王儉造白紵歌周處風土記云吳黃龍中童謠云行白者君追汝句驪馬後孫權征公孫淵浮海乘舶舶白也今歌和聲猶云行白紵焉俳歌辭俳不言不語呼俳噏所俳適一起狼率不止生扳牛角摩斷膚耳馬無懸蹄牛無上齒駱駼無角奮迅兩耳右侏儒導舞人自歌之古辭俳歌八曲此是前一篇二十二句今侏儒所歌擿取之也角抵像形雜伎歷代相承有也其增損源起事不可詳大略漢世張衡西京賦是其始也魏世則事見陳思王樂府宴樂篇晉世則見傅玄元正篇朝會賦江左咸和康中罷紫鹿跂行鼈食笮鼠齊王卷衣絕倒五案等伎中朝所無見起居注竝莫知所由也太元中苻堅敗後得關中檐橦胡伎進太樂今或有存亡案此則可知矣永明六年赤城山雲霧開朗見石橋瀑布從來所罕覩也山道士朱僧標以聞上遣主書董仲民案視以為神瑞太樂令鄭義泰案孫興公賦造天台山伎作莓苔石橋道士捫翠屏之狀尋又省焉皇齊啟運從瑤璣靈鳳銜書集紫微和樂既洽神所依超商卷夏耀英輝永世壽昌聲華飛右鳳皇銜書伎歌辭蓋魚龍之流也元會日侍中於殿前跪取其書宋世辭云大宋興隆膺靈符鳳鳥感和銜素書嘉樂之美通玄虛惟新濟濟邁唐虞巍巍蕩蕩道有餘齊初詔中書郎江淹改永平樂歌者竟陵王子良與諸文士造奏之人為十曲道人釋寶月辭頗美上常被之管絃而不列於樂官也贊曰綜採六代和平八風殷薦宴享舞德歌功
