body:
  text: 南齊書卷二十梁蕭子顯撰列傳第一皇后六宫位號漢魏以來因襲増置世不同矣建元元年有司奏置貴嬪夫人貴人為三夫人脩華脩儀脩容淑妃淑媛淑儀婕妤容華充華為九嬪美人中才人才人為散職永眀元年有司奏貴妃淑妃並加金章紫綬佩于寘玉淑妃舊擬九棘以淑為温恭之稱妃為亞后之名進同貴妃以比三司夫人之號不殊蕃國降淑媛以比九卿七年復置昭容位在九嬪建元三年太子宫置三内職良娣比開國侯保林比五等侯才人比駙馬都尉宣孝陳皇后諱道正臨淮東陽人魏司徒陳矯後父肇之郡孝㢘后少家貧勤織作家人矜其勞或止之后終不改嫁于宣帝庶生衡陽元王道度始安貞王道生后生太祖太祖年二嵗乳人乏乳后夢人以兩甌麻粥與之覺而乳大出異而乳之宣帝從仕在外后常留家治事教子孫有相者謂后曰夫人有貴子而不見也后歎曰我三兒誰當應之呼太祖小字曰正應是汝耳宣帝殂後后親自執勤婢使有過誤恕不問也太祖雖從宦而家業本貧為建康令時髙宗等冬月猶無縑纊而奉膳甚厚后每撤去兼肉曰於我過足矣殂于縣舍年七十三昇眀三年追贈竟陵公國太夫人蜜印畫青綬祠以太牢建元元年追尊孝皇后贈外祖父肇之金紫光禄大夫諡曰敬侯后母胡氏為永昌縣靖君髙昭劉皇后諱智容廣陵人也祖𤣥之父夀之並員外郎后母桓氏夢吞玉勝生后時有紫光滿室以告夀之夀之曰恨非是男桓曰雖女亦足興家矣后每寢卧家人常見上如有雲氣焉年十餘嵗歸太祖嚴正有禮法家庭肅然宋泰豫元年殂年五十歸𦵏宣帝墓側今泰安陵也門生王清與墓工始下鍤有白兎跳起尋之不得及墳成兎還棲其上昇眀二年贈竟陵公國夫人三年贈齊國妃印綬如太妃建元元年尊諡昭皇后三年贈后父金紫光禄大夫母桓氏上都鄉君夀之子興道司徒屬文蔚豫章内史義徽光禄大夫義倫通直郎武穆裴皇后諱恵昭河東聞喜人也祖封之給事中父璣之左軍參軍后少與豫章王妃庾氏為娣姒庾氏勤女工奉事太祖昭后恭謹不倦后不能及故不為舅姑所重世祖家好亦薄焉性剛嚴竟陵王子良妃袁氏布衣時有過后加訓罰昇眀三年為齊世子妃建元元年為皇太子妃三年后薨諡穆妃𦵏休安陵世祖即位追尊皇后贈璣之金紫光禄大夫后母檀氏餘杭廣昌鄉元君舊顯陽昭陽殿太后皇后所居也永眀中無太后皇后羊貴嬪居昭陽殿西范貴妃居昭陽殿東寵姬荀昭華居鳯華栢殿宫内御所居夀昌畫殿南閣置白鷺鼓吹二部乾光殿東西頭置鍾磬兩廂皆宴樂處也上數遊幸諸苑囿載宫人從後車宫内深隐不聞端門鼓漏聲置鍾於景陽樓上宫人聞鍾聲早起装飾至今此鍾唯應五鼓及三鼓也車駕數幸琅邪城宫人常從早發至湖北埭雞始鳴吳郡韓蘭英婦人有文辭宋孝武世獻中興賦被賞入宫眀帝世用為宫中職僚世祖以為博士教六宫書學以其年老多識呼為韓公文安王皇后諱寳眀琅邪臨沂人也祖韶之吳興太守父曄之太宰祭酒宋世太祖為文恵太子納后桂陽賊至太祖在新亭傳言已没宅復為人所抄掠文恵太子竟陵王子良奉穆后庾妃及后挺身送后兄昺之家事平乃出建元元年為南郡王妃四年為皇太子妃無寵太子為宫人製新麗衣裳及首飾而后牀帷陳設故舊釵鑷十餘枚永眀十一年為皇太孫太妃鬰林即位尊為皇太后稱宣徳宫贈后父金紫光禄大夫母桓氏豐安縣君其年十二月備法駕謁太廟髙宗即位出居鄱陽王故第為宣徳宫永元三年梁王定亰邑迎后入宫稱制至禪位天監十一年薨年五十八𦵏崇安陵諡曰安后兄晃義興太守鬱林王何妃名婧英廬江灊人撫軍將軍戢之女也永眀二年納為南郡王妃十一年為皇太孫妃鬱林王即位為皇后嫡母劉氏為髙昌縣都鄉君所生母宋氏為餘杭廣昌鄉君將拜鏡在床無故墮地其冬與太后同日謁太廟后禀性淫亂為妃時便與外人姦通在後宫復通帝左右楊珉之與同寢處如伉儷珉之又與帝相愛䙝故帝恣之迎后親戚入宫賞賜人百數十萬以世祖耀靈殿處后家屬帝被廢后貶為王妃海陵王王妃名韶眀琅邪臨沂人太常慈女也永眀八年納為臨汝公夫人鬱林即位為新安王妃延興元年為皇后其年降為海陵王妃眀敬劉皇后諱恵端彭城人光禄大夫道𢎞孫也太祖為髙宗納之建元三年除西昌侯夫人永眀七年卒葬江乘縣張山延興元年贈宣城王妃髙宗即位追尊為敬皇后贈父通直郎景猷金紫光禄大夫母王氏平陽鄉君永泰元年髙宗崩改𦵏祔于興安陵東昏禇皇后名令璩河南陽翟人太常澄女也建武二年納為皇太子妃眀年謁敬后廟東昏即位為皇后帝寵潘妃后不被遇黄淑儀生太子誦東昏廢並為庶人和帝王皇后名蕣華琅邪臨沂人太尉儉孫也初為隨王妃中興元年為皇后帝禪位后降為妃史臣曰后妃之徳著自風謡義起閨房而道化天下繰盆獻種㒺非耕織佩管晨興與子同事可以光熙閫業作儷公侯孝昭二后並有賢眀之訓不得母臨萬國寳命方昌椒廷虚位有婦人焉空慕周興禎符顯瑞徒萃徽名若使掖阼同休隂教逺燮則馬鄧風流復存乎此太祖創命宫禁貶約毁宋眀之紫極革前代之踰奢衣不文繡色無紅采永巷貧空有同素室世祖嗣位運藉休平夀昌前興鳯華晩構香栢文檉花梁繡柱雕金鏤寳頗用房帷趙瑟吳趨承閑奏曲嵗費傍恩足使充牣事由私蓄無損國儲髙宗挟數矯情外行儉陋内奉宫業曽莫云改東昏喪道侈風大扇銷糜海内以贍浮飾哲婦傾城同符殷夏嗚呼所以垂戒於方来也贊曰宣武孝則識有先知髙昭誕武世載母儀裴穆儲閫位亦從隳眀敬典册配在宗枝秋宫亦遽軒景前虧文安廢主百憂已離中興秉制揖讓𢎞規南齊書卷二十南齊書卷二十考證武穆裴皇后傳吳郡韓蘭英汲古閣本蘭下旁注宋本作藺四字后牀帷陳設故舊釵鑷十餘枚汲古閣本牀下旁注宋本作宋四字史臣論雕金鏤寳頗用房帷頗用南監本作照燭内奉宫業曽莫云改内奉宫業南監本作奉己之制南齊書卷二十考證
