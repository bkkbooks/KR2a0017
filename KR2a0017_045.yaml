body:
  text: 南齊書卷四十五列傳第二十六宗室衡陽元王道度始安貞王道生遙光遙欣遙昌安陸昭王緬衡陽元王道度太祖長兄也與太祖俱受學雷次宗宣帝問二兒學業次宗答曰其兄外朗其弟內潤皆良璞也隨宣帝征伐仕至安定太守卒於宋世建元二年追加封諡無子太祖以第十一子鈞繼道度後鈞字宣禮永明四年為江州刺史加散騎常侍母區貴人卒居喪盡禮六年遷為征虜將軍八年遷驍騎將軍常侍如故仍轉左衛將軍鈞有好尚為世祖所知兄弟中意遇次鄱陽王鏘十年轉中書令領石頭戍事遷散騎常侍祕書監領驍騎如故不拜隆昌元年改加侍中給扶海陵立轉撫軍將軍侍中如故尋遇害年二十二明帝即位以永陽王子珉仍本國繼元王為孫子珉字雲璵世祖第二十子也永明七年封義安王後改永陽永泰元年見害年十四復以武陵昭王曄第三子子坦奉元王後始安貞王道生字孝伯太祖次兄也宋世為奉朝請卒建元元年追封諡建武元年追尊為景皇妃江氏為后立寢廟於御道西陵曰修安生子鳳高宗安陸昭王緬鳳字景慈官至正員郎卒於宋世諡靖世子明帝建武元年贈侍中驃騎將軍開府儀同三司始安靖王改華林鳳莊門為望賢門太極東堂書畫鳳鳥題為神鳥而改鸞鳥為神雀子遙光嗣遙光字元暉生有躄疾太祖謂不堪奉拜祭祀欲封其弟世祖諫乃以遙光襲爵初為員外郎轉給事郎太孫洗馬轉中書郎豫章內史不拜高宗輔政遙光好天文候道密懷規贊隆昌元年除驍騎將軍冠軍將軍南東海太守行南徐州事仍除南彭城太守將軍如故又除輔國將軍吳興太守高宗廢鬱林又除冠軍將軍南蠻校尉西平中郎長史南郡太守一歲之內頻五除並不拜是時高宗欲即位誅賞諸事唯遙光共謀議建武元年以為持節都督揚南徐二州諸軍事前將軍揚州刺史晉安王寶義為南徐州遙光求解督見許二年進號撫軍將軍加散騎常侍給通幰車鼓吹遙光好吏事稱為分明頗多慘害足疾不得同朝例列常乘輿自望賢門入每與上久清間言畢上索香火明日必有所誅殺上以親近單少憎忌高武子孫欲並誅之遙光計畫參議當以次施行永泰元年即本位為大將軍給油絡車帝不豫遙光數入侍疾帝漸甚河東王鉉等七王一夕見殺遙光意也帝崩遺詔加遙光侍中中書令給扶永元元年給班劒二十人即本號開府儀同三司遙光既輔政見少主即位潛與江祏兄弟謀自樹立弟遙欣在荊楚擁兵居上流密相影響遙光當據東府號令使遙欣便星速急下潛謀將發而遙欣病死江祏被誅東昏侯召遙光入殿告以祏罪遙光懼還省便陽狂號哭自此稱疾不復入臺先是遙光行還入城風飄儀繖出城外遙光弟遙昌先卒壽春豫州部曲皆歸遙光及遙欣喪還葬武進停東府前渚荊州衆力送者甚盛帝誅江祏後慮遙光不自安欲轉為司徒還第召入喻旨遙光慮見殺八月十二日晡時收集二州部曲於東府門聚人衆街陌頗怪其異莫知指趣也遙光召親人丹陽丞劉渢及諸傖楚欲以討劉暄為名夜遣數百人破東冶出囚尚方取仗又召驍騎將軍垣歷生歷生隨信便至勸遙光令率城內兵夜攻臺輦萩燒城門曰公但乘輿隨後反掌可得遙光意疑不敢出天稍曉遙光戎服出聽事停輿處分上仗登城行賞賜歷生復勸出軍遙光不肯望臺內自有變至日中臺軍稍至尚書符遙光曰逆從之數畑然有徵干紀亂常刑茲罔赦蕭遙光宗室蚩庸才行鄙薄緹裙可望天路何階受遇自昔恩加猶子禮絶帝體寵越皇季旗章車服窮千乘之尊闉隍爽闓踰百雉之制及聖后在天親受顧託話言在耳德音猶存侮蔑天明罔畏不義無君之心履霜有日遂乃稱兵內犯竊發京畿自古巨舋莫斯為甚今便分命六師弘宣九伐皇上當親御戎軒弘此廟略信賞必罰有如大江於是戒嚴曲赦京邑領軍蕭坦之屯湘宮寺鎮軍司馬曹虎屯清溪大橋太子右衛率左興盛屯東府東籬門衆軍圍東城三面燒司徒二府遙光遣垣歷生從西門出戰臺軍屢北殺軍主桑天愛初遙光起兵問咨議參軍蕭暢暢正色拒折不從十五日暢與撫軍長史沈昭略潛自南出濟淮還臺人情大沮十六日垣歷生從南門出戰因棄矟降曹虎軍虎命斬之遙光大怒於牀上自竦踊使殺歷生兒其晚臺軍射火箭燒東北角樓至夜城潰遙光還小齋帳中著衣帢坐秉燭自照令人反拒齋閣皆重關左右並踰屋散出臺軍主劉國寶時當伯等先入遙光聞外兵至吹滅火扶匐下牀軍人排閣入於暗中牽出斬首時年三十二遙光未敗一夕城內皆夢羣緣城四出各各共説之咸以為異臺軍入城焚燒屋宇且盡遙光府佐司馬端為掌書記曹虎謂之曰君是賊非端曰僕荷始安厚恩今死甘心虎不殺執送還臺徐世豄殺之劉渢遁走還家園為人所殺端河內人渢南陽人事繼母有孝行弟溓事渢亦謹詔斂葬遙光尸原其諸子追贈桑天愛輔國將軍梁州刺史以江陵公寶覽為始安王奉靖王後永元二年為持節督湘州輔國將軍湘州刺史遙欣字重暉宣帝兄西平太守奉之無後以遙欣繼為曾孫除祕書郎太子舍人巴陵王文學中書郎延興元年高宗樹置以遙欣為持節督六允州緣淮軍事寧朔將軍六允州刺史仍為督豫州郢州之西陽司州之汝南二郡輔國將軍豫州刺史持節如故未之任建武元年進號西中郎將封聞喜縣公遷使持節都督荊雍益寧梁南北秦七州軍事右將軍荊州刺史改封曲江公高宗子弟弱小晉安王寶義有廢疾故以遙光為揚州居中遙欣居陝西在外權勢並在其門遙欣好勇聚畜武士以為形援四年進號平西將軍永泰元年以雍州虜寇詔遙欣以本官領刺史寧蠻校尉移鎮襄陽虜退不行永元元年卒年三十一贈侍中司空諡康公葬用王禮遙昌字季暉解褐祕書郎太孫舍人給事中祕書丞延興元年除黃門侍郎未拜仍為持節督郢司二州軍事寧朔將軍郢州刺史建武元年進號冠軍將軍封豐城縣公千五百戶未之鎮徙督豫州郢州之西陽司州之汝南二郡軍事征虜將軍豫州刺史持節如故二年虜主元宏寇壽春遣使呼城內人遙昌遣參軍崔慶遠朱選之詣宏慶遠曰旌蓋飄颻遠涉淮泗風塵慘烈無乃上勞宏曰六龍騰躍忽千里經途未遠不足為勞慶遠曰川境既殊遠勞軒駕屈完有言不虞君之涉吾地也何故宏曰故當有故卿欲使我含瑕依違為欲指斥其事慶遠曰君包荒之德本施北政未承來議無所含瑕宏曰朕本欲有言會卿來問齊王主廢立有其例不慶遠曰廢昏立明古今同揆中興克昌豈唯一代主上與先武帝非唯昆季有同魚水武皇臨崩託以後事嗣孫荒迷廢為鬱林功臣固請爰立明聖上逼太后之嚴令下迫羣臣之稽顙俯從億兆踐登皇極未審聖旨獨何疑怪宏曰聞卿此言殊解我心但哲婦傾城何足可用果如所言武帝子弟今皆何在慶遠曰七王同惡皆伏管蔡之誅其餘列蕃二十餘國內升清階外典方牧哲婦之戒古人所惑然十亂盈朝實唯文母宏曰如我所聞靡有孑遺卿言美而乖實未之全信宏又曰雲羅所掩六合宜一故往年與齊武有書言今日之事書似未達齊主命也南使既反情有愴然朕亦保休兵此段猶是本意不必專為問罪若如卿言便可釋然慶遠曰見可而進知難而退聖人奇兵今旨欲憲章聖人不失美無舊好豈不善哉宏曰卿為欲朕和親為欲不和慶遠曰和親則二國交歡蒼生再賴不和則二國交怨蒼生塗炭和與不和裁由聖衷宏曰朕來為復遊行鹽境北去洛都率爾便至亦不攻城亦不伐塢卿勿以為慮宏設酒及羊炙雜果又謂慶遠曰聽卿主克黜凶嗣不違忠孝何以不立近親如周公輔成王而苟欲自取慶遠答曰成王有亞聖之賢故周公得輔而相之今近蕃雖無悖德未有成王之賢霍光亦捨漢蕃親而遠立宣帝宏曰若爾霍光嚮自立為君當復得為忠臣不慶遠曰此非其類乃可言宣帝立與不立義當云何皇上豈得與霍光為匹若爾何以不言武王伐紂何意不立微子而輔之苟貪天下宏大笑明日引軍向城東遣道登道人進城內施衆僧絹五百匹慶遠選之各袴褶絡帶遙昌永泰元年卒上愛遙昌兄弟如子甚痛惜之贈車騎將軍儀同三司帝以問徐孝嗣孝嗣曰豐城本資尚輕贈以班台如為小過帝曰卿乃欲存萬代準則此我孤兄子不得與計諡憲公安陸昭王緬字景業善容止初為祕書郎宋邵陵王文學中書郎建元元年封安陸侯邑千戶轉太子中庶子遷侍中世祖即位遷五兵尚書領前軍將軍仍出為輔國將軍吳郡太守少時大著風績竟陵王子良與緬書曰竊承下風數十年來未有此政世祖嘉其能轉持節都督郢州司州之義陽軍事冠軍將軍郢州刺史永明五年還為侍中領驍騎將軍仍遷中領軍明年轉散騎常侍太子詹事出為會稽太守常侍如故遷使持都督雍梁南北秦四州荊州之竟陵司州之隨郡軍事左將軍寧蠻校尉雍州刺史緬留心辭訟親自隱劫抄度口皆赦遣許以自新再犯乃加誅為百姓所畏愛九年卒詔賻錢十萬布二百匹喪還百姓緣沔水悲泣設祭於峴山為立祠贈侍中衛將軍持節都督刺史如故給鼓吹一部諡昭侯年三十七高宗少相友愛時為僕射領衛尉表求解衛尉私第展哀詔不許每臨緬靈輒慟哭不成聲建武元年贈侍中司徒安陸王邑二千戶子寶晊嗣為持節督湘州軍事輔國將軍湘州刺史弟寶覽為江陵公寶宏汝南公邑各千五百戶二年寶晊進號冠軍將軍三年寶宏改封宵城永元元年以安陸郡邊虜寶晊改封湘東王進號征虜將軍二年為左衛將軍高宗兄弟一門皆尚吏事寶晊粗好文章義師下寶晊在城內東昏廢寶晊望物情歸己坐待法駕既而城內送首詣梁王宣德太后臨朝以寶晊為太常寶晊不自安謀反兄弟皆伏誅史臣曰太祖膺期御世二昆夙殞慶命傍流追序蕃胙安陸王緬以宗子戚屬弱年進仕典郡臨州去有餘迹遺愛在民蓋因情而可感學以從政夫豈必然贊曰太祖二昆追樹雙蕃元託繼胤貞興子孫並用威福自取亡存安陸稱美事表西魂
