body:
  text: 南齊書卷四十三列傳第二十四江斆何昌𧜛謝𣐞王思遠江斆字叔文濟陽考城人也祖湛宋左光祿大夫儀同三司父恁著作郎為太祖初所殺斆母文帝女淮陽公主幼以戚屬召見孝武謂謝莊曰此小兒方當為名器少有美譽桂陽王休範臨州辟迎主簿不就尚孝武女臨汝公主拜駙馬都尉除著作郎太子舍人丹陽丞時袁粲為尹見斆歎曰風流不墜政在江郎數與晏賞留連日夜遷安成王撫軍記室祕書丞中書郎斆庶祖母王氏老疾斆視膳嘗藥七十餘日不解衣及纍居內官每以侍養陳請朝廷優其朝直尋轉安成王驃騎從事中郎初湛娶褚秀之女被遣褚淵為衛軍重斆為人先通音意引為長史加寧朔將軍從帝立隨府轉司空長史領臨淮太守將軍如故轉太尉從事中郎齊臺建為吏部郎太祖即位斆以祖母久疾連年臺閣之職永廢溫凊啓乞自解初宋明帝勑斆出繼從叔遜為從祖渟淳後於是僕射王儉啓禮無從後小宗之文近世緣情皆由父祖之命未有既孤之後出繼宗族也雖復臣子一揆而義非天屬江忠簡胤嗣所寄唯斆一人傍無眷屬斆宜還本若不欲江遜絶後可以斆小兒繼遜為孫尚書參議謂閒世立後禮無其文荀顗無子立孫墜禮之始何琦又立此論義無所據於是斆還本家詔使自量立後者出為寧朔將軍豫章內史還除太子中庶子領驍騎將軍未拜門客通贓利世祖遣信撿核斆藏此客而躬自引咎上甚有怪色王儉從容啓上曰江斆若能治郡此便是具美耳上意乃釋永明初仍為豫章王太尉咨議領録事遷南郡王友竟陵王司徒司馬斆好文辭圍第五品為朝貴中最遷侍中領本州中正司徒左長史中正如故五年遷五兵尚書明年出為輔國將軍東海太守加秩中二千石行南徐州事七年徙為侍中領驍騎將軍尋轉都官尚書領驍騎將軍王晏啓世祖曰江斆今重登禮閣兼掌六軍慈渥所覃實有優忝但語其事任殆同間輩天旨既欲升其名位愚謂以侍中領驍騎望實清顯有殊納言上曰斆常啓吾為其鼻中惡今既以何胤王瑩還門下故有此回換耳鬱林即位遷掌吏部隆昌元年為侍中領國子祭酒鬱林廢朝臣皆被召入宮斆至雲龍門託藥醉吐車中而去明帝即位改領祕書監又改領晉安王師建武二年卒年四十四遺令儉約葬不受賻贈詔賻錢三萬布百匹子蒨啓遵斆令讓不受詔曰斆貽厥之訓送終以儉立言歸善益有嘉傷可從所請贈散騎常侍太常諡曰敬子何昌𧜛字儼望廬江灊人也祖叔度吳郡太守父佟之太常昌𧜛少而淹厚為伯父司空尚之所遇宋建安王休仁為揚州辟昌𧜛州主簿遷司徒行參軍太傅五官司徒東閣祭酒尚書儀曹郎建平王景素為征北南徐州昌𧜛又為府主簿以夙風素見重母老求祿出為湘東太守加秩千石為太祖驃騎功曹昌𧜛在郡景素被誅昌𧜛痛之至是啓太祖曰伏尋故建平王因心自遠忠孝基性徽和之譽早布國言勝素之情夙洽民聽世祖綢繆太宗眷異朝中貴人野外賤士雖聞見有殊誰不悉斯事者元徽之間政關羣小構扇異端共令傾覆殷勤之非古人所悼況蒼梧將季能無衒惑一年之中藉者再三有必巔之危無暫立之安行路寒心往來局蹐而王夷慮坦然委之天命惟謙惟敬專誠奉國閨無執戟之衛門闕衣介之夫此五尺童子所見不假闊曲言也一淪疑似身名頓滅寃結淵泉酷貫穹昊時經隆替歲改三元曠蕩之惠亟申被枉之澤未流俱沐溫光獨酸霜露明公鋪天地之施散雲雨之潤物無巨細咸被慶渥若今日不蒙照滌則為萬代寃魂昌𧜛非敢慕慷慨之士激揚當世實義切於心痛入骨髓瀝腸紓憤仰希神照辨明枉直亮王素行使還名帝籍歸靈舊塋死而不泯豈忘德於黃壚分軀碎首不足上謝又與司空褚淵書曰天下之可哀者有數而埋寃於黃泉者為甚焉何者百年之壽同於朝露揮忽去留寧足道哉政欲闔棺之日不隕令名竹帛傳芳烈鐘石紀清英是以昔賢甘心於死所者也若懷忠抱義而負枉贑贑之下時主未之矜卿相不為言良史濡翰將被以惡名豈不痛哉豈不痛哉竊尋故建平王地屬親賢德居宗望道心惟沖睿性天峻散情風雲不以塵務嬰襟明發懷古惟以琴書娛志言忠孝行惇慎二公之所深鑒也前者阮楊連黨搆此紛紜雖被明於朝貴愈結怨於羣醜覘察繼蹤疑防重著小人在朝詩史所歎少一句清識飲涕王每永言終日氣淚交橫既推信以期物故日去其備衛朱門蕭條示存典刑而已求解徐州以避北門要任苦乞會稽貪處東甌間務此竝彰於事迹與公道味相求期心有素方共經營家國劬勞王室何圖時不我與契闊屯昏忠誠弗亮罹此百殃歲朔亟流已經四載皇命惟新人沾天澤而幽然深酷未蒙照明封殯卑雜窮魂莫寄昭穆不序松柏無行事傷行路痛結幽顯吾等叩心泣血實有望於聖時公以德佐世欲物得其所豈可令建平王枉直不分邪田叔不言梁事袁絲諫止淮南以兩國舋禍尚回帝意豈非親親之義寧從敦厚而今疑以似未辨為世大戮若使王心跡得申亦示海內理寃枉明是非夫存亡國繼絶世周漢之通典有國之所急也昔叔向之理恃祁大夫而獲亮戾太子之寃資車丞相而見察幽靈有知豈不眷眷於明顧碎首抽脅自謂不殞淵答曰追風古人良以嘉歎但事既昭晦理有逆從建平初阻元徽未悖專欲委咎阮楊彌所致疑于時正亦謬參此機若審如高論其愧特深太祖嘉其義轉為記室遷司徒左西太尉戶曹屬中書郎王儉衛軍長史儉謂昌𧜛曰後任朝事者非卿而誰永明元年竟陵王子良表置友學官以昌𧜛為竟陵王文學以清信相得意好甚厚轉揚州別駕豫章王又善之遷太子中庶子出為臨川內史除廬陵王中軍長史未拜復為太子中庶子領屯騎校尉遷吏部郎轉侍中臨海王昭秀為荊州以昌𧜛為西中郎長史輔國將軍南郡太守行荊州事明帝遣徐玄慶西上害蕃鎮諸王玄慶至荊州欲以便宜從事昌𧜛曰僕受朝廷意寄翼輔外蕃何容以殿下付君一介之使若朝廷必須殿下還當更聽後旨昭秀以此得還京師建武二年為侍中領長水校尉轉吏部尚書復為侍中領驍騎將軍四年卒年五十一贈太常諡簡子昌𧜛不雜交遊通和泛愛歷郡皆清白士君子多稱之謝𣐞字義潔陳郡陽夏人也祖弘微宋太常父莊金紫光祿大夫𣐞四兄揚朏皓世謂謝莊名兒為風月景山水皓字仁悠少簡靜解褐祕書郎纍至太祖驃騎從事中郎建元初為吏部郎至太尉從事中郎永明初高選友學以皓為竟陵王友至北中郎長史卒𣐞年七歲王彧見而異之言於宋孝武孝武召見於稠人廣衆之中𣐞舉動間詳應對合旨帝甚悅詔尚公主值景和敗事寢僕射褚淵聞𣐞年少清正不惡以女結婚厚為資送解褐車騎行參軍遷祕書郎司徒祭酒丹陽丞撫軍功曹世祖為中軍引為記室齊臺建遷太子中舍人建元初轉桂陽王友以母老須養出為安成內史還為中書郎衛軍王儉引為長史雅相禮遇除黃門郎兼掌吏部尋轉太子中庶子領驍騎將軍轉長史兼侍中𣐞以晨昏有廢固辭不受世祖勑令速拜別停朝直遷司徒左長史出為吳興太守長城縣民盧道優家遭劫誣同縣殷孝悌等四人為劫𣐞收付縣獄考正孝悌母駱詣登聞訴稱孝悌為道優所誹謗橫劾為劫一百七十三人連名保徵在所不為申理𣐞聞孝悌母訴乃啓建康獄覆道優理窮款首依法斬刑有司奏免𣐞官𣐞又使典藥吏湯失火燒郡外齊南廂屋五閒又輒鞭除身為有司所奏詔竝贖論在郡稱為美績母喪去官服闋為吏部尚書高宗廢鬱林領兵入殿左右驚走報𣐞𣐞與客圍每下子輒云其當有意竟局乃還齊臥竟不問外事也明帝即位𣐞又屬疾不視事後上宴會功臣上酒尚書令王晏等興席𣐞獨不起曰陛下受命應天從民王晏妄叨天功以為己力上大笑解之座罷晏呼𣐞共載還令省欲相撫悅𣐞又正色曰君巢窟在何處晏初得班劒𣐞謂之曰身家太傅裁得六人君亦何事一朝至此晏甚憚之加領右軍將軍兄朏在吳興論啓公齊事稽晚𣐞輒代為啓上見非其手迹被問見原轉侍中領太子中庶子豫州中正永泰元年轉散騎常侍太子詹事其年卒年四十五贈金紫光祿大夫諡簡子初兄朏為吳興𣐞於征虜渚送別朏指𣐞口曰此中唯宜飲酒𣐞建武之初專以長酣為事與劉瑱沈昭略以觴酌交飲各至數斗世祖嘗問王儉當今誰能為五言詩儉對曰謝朏得父膏腴江淹有意上起禪靈寺勑𣐞撰碑文王思遠琅邪臨沂人尚書令晏從弟也父羅雲平西長史思遠八歲父卒祖弘之及外祖新安太守羊敬元竝栖退高尚故思遠少無仕心宋建平王景素辟為南徐州主簿深見禮遇景素被誅左右離散思遠親視殯葬手種松柏與廬江何昌𧜛沛郡劉璡上表理之事感朝廷景素女廢為庶人思遠分衣食以相資贍年長為備笄總訪求素對傾家送遣除晉熙王撫軍行參軍安成王車騎參軍建元初為長沙王後軍主簿尚書殿中郎出補竟陵王征北記室參軍府遷司徒仍為録事參軍遷太子中舍人文惠太子與竟陵王子良素好士並蒙賞接思遠求出為遠郡除建安內史長兄思玄卒思遠友于甚至表乞自解不許及祥日又固陳世祖乃許之除中書郎大司馬咨議世祖詔舉士竟陵王子良薦思遠及吳郡顧皓之陳郡殷睿邵陵王子貞為吳郡世祖除思遠為吳郡丞以本官行郡事論者以為得人以疾解職還為司徒咨議參軍領録事轉黃門郎出為使持節都督廣交越三州諸軍事寧朔將軍平越中郎將廣州刺史高宗輔政不之任仍遷御史中丞臨海太守沈昭略贓私思遠依事劾奏高宗及思遠從兄晏昭略叔父文季請止之思遠不從案事如故建武中遷吏部郎思遠以從兄晏為尚書令不欲竝居內臺權要之職上表固讓曰近頻煩歸啓實有微陛下矜遇之厚古今罕儔臣若孤恩誰當勠力既自誓輕軀命不復以塵黷為疑正以臣與晏地惟密親必不宜俱居顯要慺慺丹赤守之以死臣實庸鄙無足奬進陛下甄拔之旨要是許其一節臣果不能以理自固有乖則哲之明犯冒之尤誅責在己謬賞之私惟塵聖鑒權其輕重寧守心且亦緣陛下以德御下故臣可得以禮進退伏願思垂拯宥不使零墜今若祗膺所忝三公不足為泰犯忤之後九泉未足為劇而臣苟求刑戮自棄富榮愚夫不為臣亦庶免此心此志可憐可矜如其上命必行請罪非理聖恩方置之通塗而臣固求擯壓自愍自悼不覺涕流謹冒鈇鉞悉心以請窮則呼天仰祈一照上知其意乃改授司徒左長史初高宗廢立之際思遠與晏間言謂晏曰兄荷世祖厚恩今一旦贊人如此事彼或可以權計相須未知兄將來何以自立若及此引決猶可不失後名晏不納及拜驃騎集會子弟謂思遠兄思微曰隆昌之末阿戎勸吾自裁若從其語豈有今日思遠遽應曰如阿戎所見猶未晚也及晏敗故得無他思遠清修立身簡潔衣服牀筵窮治素淨賓客來通輒使人先密覘視衣服垢穢方便不前形儀新楚乃與促膝雖然既去之後猶令二人交帚拂其坐處上從祖弟季敞性甚豪縱上心非之謂季敞曰卿可數詣王思遠上既誅晏遷為侍中掌優策及起居注永元二年遷度支尚書未拜卒年四十九贈太常諡貞子思遠與顧皓之友善皓之卒後家貧思遠迎其兒子經恤甚至皓之字士明少孤好學有義行初舉秀才歷宦府閣永明末為太子中舍人兼尚書左丞隆昌初為安西咨議兼著作與思遠竝屬文章建武初以疾歸家高宗手詔與思遠曰此人殊可惜就拜中散大夫卒年四十九思微永元中為江州長史為陳伯之所殺史臣曰德成為上藝成為下觀夫二三子之治身豈直清體雅業取隆基構行禮蹈義可以勉物風規云君子之居世所謂美矣贊曰江纂世業有聞時陂何申舊主辭出乎義謝獻壽觴載色載刺思遠退食冲心篤寄
