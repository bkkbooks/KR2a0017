body:
  text: 南齊書卷四十八梁蕭子顯撰列傳第二十九袁彖孔稚珪劉繪袁彖字偉才陳郡陽夏人也祖洵呉郡太守父覬武陵太守彖少有風氣好屬文及𤣥言舉秀才歴諸王府參軍不就覬臨終與兄顗書曰史公才識可嘉足懋先基矣史公彖之小字也服未闋顗在雍州起事見誅宋明帝投顗屍江中不聽斂葬彖與舊奴一人微服潛行求屍四十餘日乃得宻瘞石頭後崗身自負土懐其父集未嘗離身明帝崩後乃改葬顗從叔司徒粲外舅征西将軍蔡興宗竝噐之除安成王征虜參軍主簿尚書殿中郎出為廬陵内史豫州治中太祖太傅相國主簿祕書丞議駮國史檀超以天文志紀緯序位度五行志載當時祥沴二篇所記事用相懸日蝕為災宜居五行超欲立處士傳彖曰夫事闗業用方得列其名行今栖遁之士排斥皇王陵轢将相此偏介之行不可長風移俗故遷書未傳班史莫編一介之善無縁頓畧宜列其姓業附出他篇遷始興王友固辭太祖使吏部尚書何戢宣㫖令就遷中書郎兼太子中庶子又以中書兼御史中丞轉黄門郎兼中丞如故坐弹謝超宗簡奏依違免官㝷補安西諮議南平内史除黄門未拜仍轉長史南郡内史行荆州事還為太子中庶子本州大中正出為冠軍将軍監呉興郡事彖性剛嘗以微言忤世祖又與王晏不協世祖在便殿用金柄刀子治𤓰晏在側曰外間有金刀之言恐不宜用此物世祖愕然窮問所以晏曰袁彖為臣説之上衘怒良乆彖到郡坐過用禄錢免官付東冶世祖遊孫陵望東冶曰中有一好貴囚數日車駕與朝臣幸冶履行庫藏因宴飲賜囚徒酒肉敕見彖與語明日釋之尋白衣行南徐州事司徒諮議衛軍長史遷侍中彖形體充腴有異於衆每從車駕射雉在郊野數人推扶乃能徒歩㓜而母卒飬於伯母王氏事之如親閨門中甚有孝義隆昌元年卒年四十八諡靖子孔稚珪字徳璋會稽山隂人也祖道隆位侍中父靈産泰始中罷晉安太守有隠遁之懐於禹井山立館事道精篤吉日於静屋四向朝拜涕泗滂沲東出過錢塘北郭輒於舟中遥拜杜子恭墓自此至都東向坐不敢背側元徽中為中散太中大夫頗觧星文好術數太祖輔政沈攸之起兵靈産密白太祖曰攸之兵衆雖彊以天時㝠數而觀無能為也太祖驗其言擢遷光禄大夫以簏盛靈産上靈臺令其占候餉靈産白羽扇素隠几曰君性好古故遺君古物稚珪少學渉有羙譽太守王僧䖍見而重之引為主簿州舉秀才觧褐宋安成王車騎法曹行參軍轉尚書殿中郎太祖為驃騎以稚珪有文翰取為記室參軍與江淹對掌辭筆遷正員郎中書郎尚書左丞父憂去官與兄仲智還居父山舍仲智妾李氏驕妬無禮稚珪白太守王敬則殺之服闋為司徒從事中郎州治中别駕從事史本郡中正永明七年轉驍騎将軍復領左丞遷黄門郎左丞如故轉太子中庶子廷尉江左相承用晉世張杜律二十卷世祖留心法令數訊囚徒詔獄官詳正舊注先是七年尚書刪定郎王植撰定律章表奏之曰臣尋晉律文簡辭約㫖通大綱事之所質取斷難釋張斐杜預同注一章而生殺永殊自晉泰始以來唯斟酌參用是則吏挾威福之勢民懐不對之怨所以温舒獻辭於失政絳侯忼慨而興歎皇運革祚道冠前王陛下紹興光開帝業下車之痛每惻上仁滿堂之悲有矜聖思爰發徳音刪正刑律敕臣集定張杜二注謹礪愚䝉盡思詳撰削其煩害録其允𠂻取張注七百三十一條杜注七百九十一條或二家両釋於義乃備者又取一百七條其注相同者取一百三條集為一書凡一千五百三十二條為二十卷請付外詳校擿其違謬從之於是公卿八座參議考正舊注有輕重處竟陵王子良下意多使從輕其中朝議不能斷者制㫖平決至九年稚珪上表曰臣聞匠萬物者以繩墨為正馭大國者以法理為本是以古之聖王臨朝思理逺防邪萌深杜姦漸莫不資法理以成化明刑賞以樹功者也伏惟陛下躡厯登皇乘圖踐帝天地更築日月再張五禮裂而復縫六樂穨而爰緝乃發徳音下明詔降恤刑之文申慎罰之典敕臣與公卿八座共刪注律謹奉聖㫖諮審司徒臣子良禀受成規創立條緒使兼監臣宋躬兼平臣王植等抄撰同異定其去取詳議八座裁正大司馬臣嶷其中洪疑大議衆論相背者聖照𤣥覽斷自天筆始就成立律文二十卷録叙一卷凡二十一卷今以奏聞請付外施用宣下四海臣又聞老子仲尼曰古之聽獄者求所以生之今之聽獄者求所以殺之與其殺不辜寧失有罪是則斷獄之職自古所難矣今律文雖定必湏用之用失其平不異無律律書精細文約例廣疑似相傾故誤相亂一乖其綱枉濫横起法吏無觧既多謬僻監司不習無以相斷則法書徒明於帙裏寃魂猶結於獄中今府州郡縣千有餘獄如令一獄嵗枉一人則一年之中枉死千餘矣寃毒之死上干和氣聖明所急不可不防致此之由又非但律吏之咎列邑之宰亦亂其經或以軍勲餘力或以勞吏暮齒獷情濁氣忍并生靈昬心狠態吞剝氓物虐理殘其命曲文被其罪寃積之興復縁斯發獄吏雖良不能為用使于公哭於邊城孝婦寃於遐外陛下雖欲宥之其已血濺九泉矣㝷古之名流多有法學故釋之定國聲光漢臺元常文恵績映魏閣今之士子莫肯為業縱有習者世議所輕良由空懃永嵗不逢一朝之賞積學當年終為閭伍所蚩将恐此書永墜下走之手矣今若𢎞其爵賞開其勸慕課業宦流班習胄子拔其精究使處内局簡其才良以居外仕方岳咸選其能邑長竝擢其術則臯繇之謀指掌可致杜鄭之業鬱焉何逺然後姦邪無所逃其刑惡吏不能藏其詐如身手之相驅若絃括之相接矣臣以疎短謬司大理陛下發自聖𠂻憂矜刑網御延奉訓逺照民瘼臣謹仰述天官伏奏雲陛所奏繆允者宜寫律上國學置律學助敎依五經例國子生有欲讀者䇿試上過髙第即便擢用使處法職以勸士流詔報從納事竟不施行轉御史中丞遷驃騎長史輔國将軍建武初遷冠軍将軍平西長史南郡太守稚珪以虜連嵗南侵征役不息百姓死傷乃上表曰匈奴為患自古而然雖三代智勇両漢權竒算畧之要二塗而已一則鐵馬風馳奮威沙漠二則輕車出使通驛虜庭㩁而言之優劣可覩今之議者咸以丈夫之氣恥居物下況我天威寧可先屈呉楚勁猛𢃄甲百萬截彼鯨鯢何往不碎請和示弱非國計也臣以為戎狄獸性本非人倫鴟鳴狼踞不足喜怒蜂目蠆尾何闗羙惡唯宜勝之以深權制之以逺笇𢎞之以大度處之以蟊賊豈足肆天下之忿捐蒼生之命發雷電之怒爭蟲鳥之氣百戰百勝不足稱雄横屍千里無益上國而蟻聚蠶攢窮誅不盡馬足毛羣難與競逐漢髙横威海表窘廹長圍孝文國富刑清事屈陵辱宣帝撫納安静朔馬不驚光武卑辭厚禮寒山無靄是両京四主英濟中區輸寳貨以結和遣宗女以通好長轡逺馭子孫是賴豈不欲戰惜民命也唯漢武藉五世之資承六合之富驕心奢志大事匈奴遂連兵積嵗轉戰千里長驅瀚海飲馬龍城雖斬獲名王屠走凶羯而漢之噐甲十亡其九故衛霍出闗千隊不反貳師入漢百旅頓降李廣敗於前鋒李陵没於後陣其餘奔北不可勝數遂使國儲空懸户口減半好戰之功其利安在戰不及和相去何若自西朝不綱東晉遷鼎羣胡沸亂𦍑狄交横荆棘攢於陵廟犲虎咆於宮闈山淵反覆黔首塗地逼廹崩騰開闢未有是時得失畧不稍陳近至元嘉多年無事末路不量復挑彊敵遂廼連城覆徙虜馬飲江青徐之際草木為人耳建元之初胡塵犯塞永明之始復結通和十餘年間邊候且息陛下張天造厯駕日登皇聲雷㝢宙勢壓河岳而封豕殘魂未屠劒首長蛇餘喘偷窺外甸烽亭不静五載於斯昔嵗蟻壊瘻食樊漢今兹蟲毒浸淫未已興師十萬日費千金五嵗之費寧可貲計陛下何惜匹馬之驛百金之賂數行之詔誘此凶頑使河塞息肩闗境全命蓄甲飬民以觀彼弊我策若行則為不世之福若不從命不過如戰失一隊耳或云遣使不受則為辱命夫以天下為量者不計細恥以四海為任者寧顧小節一城之没尚不足惜一使不反曾何取慙且我以權取貴得我畧行何嫌其恥所謂尺蠖之屈以求伸也臣不言遣使必得和自有可和之理猶如欲戰不必勝而有可勝之機耳今宜早發大軍廣張兵勢徴犀甲於岷峨命樓船於浦海使自青徂豫候騎星羅㳂江入漢雲陣萬里據險要以奪其魂斷糧道以折其膽多設疑兵使精銷而計亂固列金湯使神茹而慮屈然後發衷詔馳輕驛辯辭重幣陳列吉凶北虜頑而愛竒貪而好貨畏我之威喜我之賂畏威喜賂願和必矣陛下用臣之啓行臣之計何憂玉門之下而無欵塞之胡哉彼之言戰既慇懃臣之言和亦慊闊伏願察兩塗之利害檢二事之多少聖照𤣥省灼然可斷所表謬奏希下之朝省使同博議臣謬荷殊恩奉佐侯岳敢肆瞽直伏奏千里帝不納徴侍中不行留本任稚珪風韻清疎好文詠飲酒七八斗與外兄張融情趣相得又與琅邪王思逺廬江何㸃㸃弟𦙍竝欵交不樂世務居宅盛營山水憑几獨酌傍無雜事門庭之内草萊不剪中有蛙鳴或問之曰欲為陳蕃乎稚珪笑曰我以此當両部鼓吹何必期效仲舉永元元年為都官尚書遷太子詹事加散騎常侍三年稚珪疾東昏屏除以牀轝走因此疾甚遂卒年五十五贈金紫光禄大夫劉繪字士章彭城人太常悛弟也父勔宋末權貴門多人客使繪與之共語應接流暢勔喜曰汝後若束帯立朝可與賓客言矣觧褐著作郎太祖太尉行參軍太祖見而歎曰劉公為不亡也豫章王嶷為江州以繪為左軍主簿隨鎮江陵轉鎮西外兵曹參軍驃騎主簿繪聰警有文義善隸書數被賞召進對華敏僚吏之中見遇莫及琅邪王詡為功曹以吏能自進嶷謂僚佐曰吾雖不能得應嗣陳蕃然閣下自有二驥也復為司空記室録事轉太子洗馬大司馬諮議領録事時豫章王嶷與文惠太子以年秩不同物論謂宮府有疑繪苦求外出為南康相郡事之暇專意講説上左右陳洪請假南還問繪在郡何似既而閒之曰南康是三州喉舌應湏治幹豈可以年少講學處之邪徵還為安陸王䕶軍司馬轉中書郎掌詔誥敕助國子祭酒何𦙍撰治禮儀永明末京邑人士盛為文章談義皆湊竟陵王西邸繪為後進領䄂機悟多能時張融周顒竝有言工融音㫖緩韻顒辭致綺㨗繪之言吐又頓挫有風氣時人為之語曰劉繪貼宅别開一門言在二家之中也魚復侯子響誅後豫章王嶷欲求𦵏之召繪言其事使為表繪求紙筆湏臾便成嶷惟足八字云提攜鞠飬俯見成人乃歎曰禰衡何以過此後北虜使來繪以辭辯敕接虜使事畢當撰語辭繪謂人曰無論潤色未易但得我語亦難矣事兄悛恭謹與人語呼為使君隆昌中悛坐罪将見誅繪伏闕請代兄死髙宗輔政救觧之引為鎮軍長史轉黄門郎髙宗為驃騎以繪為輔國将軍諮議領錄事典筆翰髙宗即位遷太子中庶子出為寧朔将軍撫軍長史安陸王寳晊為湘州以繪為冠軍長史長沙内史行湘州事将軍如故寳晊妃悛女也寳晊愛其侍婢繪奪取具以啟聞寳晊以為恨與繪不協遭母䘮去官有至性持䘮墓下三年食麤糲服闋為寧朔将軍晉安王征北長史南東海太守行南徐州事繪雖豪俠常惡武事雅善博射未嘗跨馬兄悛之亡朝議贈平北将軍雍州刺史詔書已出繪請尚書令徐孝嗣改之及梁王義師起朝廷以繪為持節督雍梁南北秦四州郢州之竟陵司州之隨郡諸軍事輔國将軍領寧蠻校尉雍州刺史固譲不就衆以朝廷昏亂為之寒心繪終不受東昏改用張欣泰繪轉建安王車騎長史行府國事義師圍城南兗州刺史張稷總城内軍事與繪情欵異常将謀廢立閑語累夜東昏殞城内遣繪及國子博士范雲等送首詣梁王於石頭轉大司馬從事中郎中興二年卒年四十五繪撰能書人名自云善飛白言論之際頗好矜詡弟瑱字士温好文章飲酒奢逸不吝財物滎陽毛惠逺善畫馬瑱善畫婦人世竝為第一官至吏部郎先繪卒史臣曰刑禮相望勸戒之道淺識言治莫辯後先故宰世之堤防御民之羈絆端簡為政貴在畫一輕重屢易手足無從律令之本文約㫖曠據典行罰各用情求舒慘之意既殊寛猛之利亦異辭有出沒義生增損舊尹之事政非一途後主所是即為成用張㢮代積稍至遷訛故刑開二門法有両路刀筆之態深舞弄之風起承喜怒之機隙挾千金之姦利剪韭復生寧失有罪抱木牢户未必非寃下吏上司文簿從事辯聲察色莫用矜府申枉理讞急不在躬案法隨科幸無咎悔至於郡縣親民百務萌始以情矜過曽不待獄以律定罪無細非諐盖由網密憲煩文理相背夫懲恥難窮盗賊長有欲求猛勝事在或然掃墓高門為利孰逺故永明定律多用優寛治物不患仁心見累於𢎞厚為令貴在必行而惡其舛雜也贊曰袁狥厥戚猶子為情稚珪夷逺奏諫罷兵士章機悟立行砥名南齊書卷四十八南齊書卷四十八考證袁彖傳懐其父集父集南史作文集即指其伯父顗之集也南齊書卷四十八考證
