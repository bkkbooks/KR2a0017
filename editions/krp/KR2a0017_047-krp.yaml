body:
  text: 南齊書卷四十七梁蕭子顯撰列傳第二十八王融謝脁王融字元長琅邪臨沂人也祖僧達中書令曽髙竝台輔僧達答宋孝武云亡父亡祖司徒司空父道琰廬陵内史母臨川太守謝惠宣女惇敏婦人也敎融書學融少而神明警惠博渉有文才舉秀才晋安王南中郎板行叅軍坐公事免竟陵王司徒板法曹行參軍遷太子舍人融以父官不通弱年便欲紹興家業啓世祖求自試曰臣聞春庚秋蟀集候相悲露木風榮臨年共悦夫唯動植且或有心況在生靈而能無感臣自奉望宫闕沐浴恩私拔迹庸虚參名盛列纓劒紫複趨歩丹墀嵗時歸來誇榮邑里然無懃而官昔賢曽議不任而祿有識必譏臣所用慷慨憤懣不遑自晏誠以深恩鮮報聖主難逢蒲栁先秋光隂不待貪及明時展悉愚効以酬陛下不世之仁若微誠獲信短才見序文武吏法唯所施用夫君道含𢎞臣術無隱翁歸乃居中自見充國曰莫若老臣竊景前修敢蹈輕節以冒不媒之鄙式罄奉公之誠抑又唐堯在上不參二八管夷吾恥之臣亦恥之願陛下裁覽遷祕書丞從叔儉初有儀同之授融贈詩及書儉甚竒憚之笑謂人曰穣侯印詎便可觧尋遷丹陽丞中書郎虜使遣求書朝議欲不與融上疏曰臣側聞僉議疑給虜書如臣愚情切有未喻夫虜人面獸心狼猛蜂毒暴悖天經虧違地義逋竄燭幽去來豳朔綿周漢而不悛歴晋宋其踰梗豈有愛敬仁智恭讓亷脩慙犬馬之馴心同鷹虎之反目設槀秣有儲筋竿足用必以草竊闗燧宼擾邊疆寧容欵塞卑辭承衣請朔陛下務存遵飬不時侮亡許其膜拜之誠納裘之賮况復願同文軌儻見欵遣思奉聲教方致猜拒將使舊邑遺逸未知所寘衰胡餘噍或能自推一令蔓草難鉏涓流泛酌豈直疥癢輕痾容為心腹重患抑孫武之言也困則數罰窘則多賞先暴而後畏其衆者虜之謂乎前中原士庶雖淪懾殊俗至於婚葬之晨猶巾褠為禮而禁令苛刻動加誅轘於時獯粥初遷犬羊尚結即心徒怨困懼成逃自其將卒奔離資峙銷闕北畏勍蠕西逼南胡民背如崩勢絶防斷於是曲從物情偽竊章服歴年將絶隱蔽無聞既南向而泣者日夜以覬北顧而辭者江淮相屬㐫謀嵗窘淺慮無方於是稽顙郊門問禮求樂若來之以文德賜之以副書漢家軌儀重臨畿輔司隸傳節復入闗河無待八百之師不期十萬之衆固其提漿佇俟揮戈願倒三秦大同六漢一綂又虜前後奉使不專漢人必介以匈奴備諸覘獲且設官分職彌見其情抑退舊苗扶任種戚師保則后族馮晋國總錄則邽姓直勒渴侯台鼎則邱頽茍仁端執政則目凌鉗耳至於東都羽儀西京簮帶崔孝伯程虞虯乆在著作李元和郭季祐上于中書李思沖飾虜清官游明根泛居顯職今經典逺被詩史北流馮李之徒必欲遵尚直勒等類居致乖阻何則匈奴以氊騎為帷牀馳射為糇糧冠方㡌則犯沙陵雪服左衽則風驤鳥逝若衣以朱裳戴之𤣥冕節其揖讓敎以翔趨必同艱桎梏等懼冰淵婆娑􅩚躃困而不能前已及夫春草水生阻散馬之適秋風木落絶驅禽之歡息沸脣於桑墟别醍乳於冀俗聼韶雅如䏊瞶臨方丈若爰居馮李之徒固得志矣虜之㓙族其如病何於是風土之思深愎戾之情動拂衣者連裾抽鋒者比鏃部落爭於下酋渠危於上我一舉而兼吞卞莊之勢必也且棘寳薦虞晉疆彌盛大鍾出智宿氏以亡帝畧遠孚無思不服鑾光幸岱匪暮斯朝臣請收籍伊瀍茲書復掌猶取之内府藏之外籝於理有愜即事何損若狂言足採請决敇施行世祖答曰吾意不異卿今所啓比相見更委悉事竟不行永明末世祖欲北伐使毛惠秀畫漢武北伐圖使融掌其事融好功名因此上疏曰臣聞情慉自中事符則感象構於始機動斯彰莊敬之道可宗㑹揖讓其彌肅勇烈之士足貴應鼙鐸以増思肇植生民厥詳既緬降及興運維道有徵莫不有所因循而升皇業者也若夫膏腴既稱天乙知五方之富皮幣已列帝劉測四海之尊異封禪之文則升中之典攸鬯歎輿地之圖乃席卷之庸是立伏惟陛下竆神盡聖總極居中偶化兩儀均明二耀拯𤣥綱於頺絶反至道於澆淳可謂區㝢儀形齊民先覺者也臣亦遭逢生此嘉運鑿飲耕食自幸唐年而識用昬霾經術疎淺將薖且軸豈蕨與薇皇鑒燭幽天髙聼下賞片言之或善矜一物之失時湔拂塵蒙霑飾光價㧞足草廬厠身朝序復得拜賀嵗時瞻望日月於臣心願曽已畢矣但千祀一逢休明難再思策鈍駑樂陳涓􅙟竊習戰陣攻守之術農桑牧藝之書申商韓墨之權伊周孔孟之道常願待詔朱闕俯對青蒲請閑宴之私談當世之務位賤人微徒深傾欵方今九服清怡三靈和晏木有附枝輪無異轍東鞮獻舞南辮傳歌羌僰踰山秦屠越海舌象翫委體之懃輶譯厭瞻廵之數固將開桂林於鳯山創金城於西守而蠢爾獯狄敢讐大邦假息關河竊命函谷淪故京之爽塏變舊邑而荒涼息反坫之儒衣乆伊川之被髮北地殘氓東都遺老莫不茹泣吞悲傾耳戴目翹心仁政延首王風若試馳咫尺之書具甄戎旅之卒徇其墮城納其降虜可勿勞弦鏃無待干戈眞皇王之兵征而不戰者也臣乞以執殳先邁式道中原澄澣渚之恒流掃狼山之積霧係單于之頸屈左賢之膝習呼韓之舊儀拜鑾輿之廵幸然後天移雲動勒封岱宗咸五登三追蹤七十百神肅警萬國具僚璯弁星離玉帛雲聚集三燭於蘭席聆萬嵗之禎聲豈不盛哉豈不韙哉昔桓公志在伐莒郭牙審其幽趣魏后心存去漢德祖究其深言臣愚昧忖誠不足以知微然伏揆聖心規模𢎞遠既圖載其事必克就其功臣不勝歡喜圖成上置琅邪城射堂壁上遊幸輒觀視焉九年上幸芳林園褉宴朝臣使融為曲水詩序文藻富麗當世稱之上以融才辯十一年使兼主客接虜使房景高宋弁弁見融年少問主客年幾融曰五十之年乆踰其半因問在朝聞主客作曲水詩序景高又云在北聞主客此製勝於顔延年實願一見融乃示之後日宋弁於瑶池堂謂融曰昔觀相如封禪以知漢武之德今覽王生詩序用見齊王之盛融曰皇家盛明豈直比蹤漢武更慙鄙製無以遠匹相如上以虜獻馬不稱使融問曰秦西冀北實多駿驥而魏主所獻良馬乃駑駘之不若求名檢事殊為未孚將旦旦信誓有時而爽駉駉之牧不能復嗣宋弁曰不容虚偽之名當是不習土地融曰周穆馬跡徧於天下若騏驥之性因地而遷則造父之策有時而躓弁曰王主客何為懃懃於千里融曰卿國既異其優劣聊復相訪若千里日至聖上當駕鼓車弁曰向意既湏必不能駕鼓車也融曰買死馬之骨亦郭隗之故弁不能答融自恃人地三十内望為公輔直中書省夜歎曰鄧禹笑人行逢大􅟘開喧湫不得進又歎曰車前無八騶卒何得稱為丈夫朝廷討雍州刺史王奐融復上䟽曰臣毎覽史傳見憂國忘家捐生報德者未嘗不撫卷歎息以為今古共情也然或以片言微感一飡小惠參國士之眄同布素之遊耳豈有如臣獨拔無聞之伍過超非分之位名器雙假榮禄兩升而宴安􅉴罷之晨優游旰食之日所以敢布丹愚仰聞宸聽今議者或以西夏為念臣竊謂之不爾其故何哉陛下聖明羣臣悉力順以制逆上而御下指開賞黜之言微示生死之路方域之人皆相為敵既兵威遠臨人不自保雖窮鳥必啄固等命於梁鶉困獸斯驚終竝懸於廚鹿凱師勞飲固不待晨臣之寸心獨有微願自獫狁薦食荒侮伊瀍天道禍滛危亡日至母后内難兵力外虚謡言物情屬當今㑹若藉巫漢之歸師騁士卒之餘憤取圅谷如反掌陵關塞若摧枯但士非素蓄無以即用不教民戰是實棄之特希私集部曲豫加習校若䝉垂許乞𨽻監省拘食人身權備石頭防衛之數臣少重名節早習軍旅若試而無績伏受面欺之誅用且有功仰酬知人之哲會虜動竟陵王子良於東府募人板融寧朔將軍軍主融文辭辯㨗尤善倉卒屬綴有所造作援筆可待子良特相友好情分殊常晩節大習騎馬才地既華兼藉子良之勢傾意賓客勞問周欵文武翕習輻湊之招集江西傖楚數百人竝有幹用世祖疾篤暫絶子良在殿内太孫未入融戎服絳衫於中書省閤口斷東宫仗不得進欲立子良上既蘇太孫入殿朝事委高宗融知子良不得立乃釋服還省歎曰公誤我鬱林深忿疾融即位十餘日收下廷尉獄然後使中丞孔稚珪倚為奏曰融姿性剛險立身浮競動迹驚羣抗言異類近塞外微塵苦求將領遂招納不逞扇誘荒傖狡弄聲勢專行權利反覆脣齒之間傾動頰舌之内威福自己無所忌憚誹謗朝政歴毁王公謂已才流無所推下事曝遠近使融依源據答融辭曰囚實頑蔽觸行多諐但夙忝門素得奉教君子爰自總髪迄將立年州閭郷黨見許愚愼朝廷衣冠謂無舋咎遇䝉大行皇帝奬育之恩又荷文皇帝識擢之重司徒公賜預士林安陸王曲垂眄接既身被國慈必欲以死自効前後陳伐虜之計亦仰簡先朝今段犬羊乍擾紀僧眞奉宣先勅賜語北邉動静令囚草撰符詔于時即因啟聞希侍鑾輿及司徒宣勅招募同例非一實以戎事不小不敢承教續䝉軍號賜使招集銜敕而行非敢虚扇且格取亡叛不限傖楚狡弄聲勢應有形迹專行權利又無贓賄反覆脣齒之間未審悉與誰言輕動頰舌之内不容都無彼此但聖主膺教實所沐浴自上甘露頌及銀甕啟三日詩序接虜使語辭竭思稱揚得非誹謗且王公百司唯賢是與高下之敬等秩有差不敢踰濫豈應訾毁囚才分本劣謬被策用悚怍之情夙宵兢惕未嘗誇示里閭彰曝逺邇自循自省竝愧流言良由緣淺寡虞致貽囂謗伏惟明皇臨宇普天䝉澤戊寅赦恩輕重必宥百日曠期始蒙旬日一介罪身獨嬰憲劾若事實有徵爰對有在九死之日無恨泉壤詔於獄賜死時年二十七臨死歎曰我若不為百嵗老母當吐一言融意欲指斥帝在東宫時過失也融被收朋友部曲參問北寺相繼於道融請救於子良子良憂懼不敢救融文集行於世謝脁字𤣥暉陳郡陽夏人也祖述吳興太守父緯散騎侍郎脁少好學有美名文章清麗觧褐豫章王太尉行參軍歴隨王東中郎府轉王儉衛軍東閣祭酒太子舍人隨王鎭西功曹轉文學子隆在荆州好辭賦數集僚友朓以文才尤被賞愛流連晤對不捨日夕長史王秀之以脁年少相動密以啟聞世祖敕曰侍讀虞雲自宜恒應侍接脁可還都脁道中為詩寄西府曰常恐鷹隼擊秋菊委嚴霜寄言罻羅者寥廓已高翔遷新安王中軍記室脁牋辭子隆曰朓聞潢汙之水思朝宗而毎竭駑蹇之乘希沃若而中疲何則臯壤摇落對之惆悵岐路東西或以嗚悒況乃服義徒擁歸志莫從邈若墜雨飃似秋蔕朓實庸流行能無算屬天地休明山川受納襃採一介搜揚小善捨耒場圃奉筆莵園東泛三江西浮七澤契闊戎旃從容讌語長裾日曵後乘載脂榮立府廷恩加顔色沐髪晞陽未測涯涘撫臆論報早誓肌骨不悟滄溟末運波臣自蕩渤澥方春旅翮先謝清切蕃房寂寥舊蓽輕舟反泝弔影獨留白雲在天龍門不見去德滋永思德滋深唯待青江可望候歸艎於春渚朱邸方開効蓬心於秋實如其簪履或存衽席無改雖復身塡溝壑猶望妻子知歸攬涕告辭悲來横集㝷以本官兼尚書殿中郎隆昌初敕朓接北使朓自以口訥啟讓不當見許高宗輔政以朓為驃騎諮議領記室掌霸府文筆又掌中書詔誥除祕書丞未拜仍轉中書郎出為宣城太守以選復為中書郎建武四年出為晉安王鎭北諮議南東海太守行南徐州事啟王敬則反謀上甚嘉賞之遷尚書吏部郎朓上表三讓中書疑脁官未及讓以問祭酒沈約約曰宋元嘉中范曅讓吏部朱脩之讓黄門蔡興宗讓中書竝三表詔答具事宛然近世小官不讓遂成恒俗恐此有乖讓意王藍田劉安西竝貴重初不自讓今豈可慕此不讓邪孫興公孔顗竝讓記室今豈可三署皆讓邪謝吏部今授超階讓别有意豈關官之大小撝謙之美本出人情若大官必讓便與詣闕章表不異例既如此謂都非疑朓又啟讓上優答不許朓善草𨽻長五言詩沈約常云二百年來無此詩也敬皇后遷祔山陵脁撰哀策文齊世莫有及者東昬失德江祏欲立江夏王寳𤣥末更囘惑與弟祀密謂朓曰江夏年少輕脱不堪負荷神器不可復行廢立始安年長入纂不乖物望非以此要富貴政是求安國家耳遥光又遣親人劉渢密致意於朓欲以為肺腑脁自以受恩高宗非渢所言不肯答少日遥光以脁兼知衞尉事脁懼見引即以祏等謀告左興盛劉暄興盛不敢發言祏聞以告遙光遙光大怒乃稱敕召脁仍囘車付廷尉與徐孝嗣祏暄等連名啟誅脁曰謝脁資性險薄大彰遠近王敬則往構㓙逆微有誠効自爾昇擢超越倫伍而谿壑無厭著於觸事比遂扇動内外處處姦說妄貶乘輿竊論宫禁間謗親賢輕議朝宰醜言異計非可具聞無君之心既著共棄之誅宜及臣等參議宜下北里肅正刑書詔公等啟事如此脁資性輕險乆彰物議直以彫蟲薄伎見齒衣冠昔在渚宫構扇蕃邸日夜從諛仰窺俯畫及還京師飜自宣露江漢無波以為已功素論於茲而盡縉紳所以側目去夏之事頗有微誠賞擢曲加踰邁倫序感悅未聞陵競彌著遂復矯構風塵妄惑朱紫詆貶朝政疑閒親賢巧言利口見醜前志涓流纖孽作戒遠圖宜有少正之刑以申去害之義便可收付廷尉肅明國典又使御史中丞范岫奏收脁下獄死時年三十六朓初告王敬則敬則女為脁妻常懐刀欲報脁脁不敢相見及為吏部郎沈昭畧謂脁曰卿人地之美無忝此職但恨今日刑於寡妻朓臨敗歎曰我不殺王公王公由我而死史臣曰晉世遷宅江表人無北歸之計英霸作輔芟定中原彌見金德之不競也元嘉冄畧河南師旅傾覆自此以來攻伐寢議雖有戰爭事存保境王融生遇永明軍國寧息以文敏才華不足進取經畧心㫖殷懃表奏若使宫車未晏有事邉關融之報効或不易限夫經國體遠許乆為難而立功立事信居物右其賈誼終軍之流亞乎贊曰元長穎脱拊翼將飛時來運往身没志違高宗始業乃顧𤣥暉逢昬屬亂先蹈禍機南齊書卷四十七南齊書卷四十七考證王融傳居中自見汲古閣本見下注宋本作是事符則感汲古閣本感下注宋本作咸按感字為是宋本誤也不容都無主此主南監本作彼謝朓傳沈昭畧謂朓曰卿人地之美無忝此職但恨今日刑于寡妻南史作尚書郎范縝嘲朓之語南齊書卷四十七考證
