body:
  text: 南齊書卷二十七列傳第八劉懷珍李安民王玄載弟玄邈劉懷珍字道玉平原人漢膠東康王後也祖昶宋武帝平齊以為青州治中至員外常侍伯父奉伯宋世為陳南頓二郡太守懷珍幼隨奉伯至壽陽豫州刺史趙伯符出獵百姓聚觀懷珍獨避不視奉伯異之曰此兒方興吾宗本州辟主簿元嘉二十八年亡命司馬順則聚黨東陽州遣懷珍將數千人掩討平之宋文帝召問破賊事狀懷珍讓功不肯當親人怪問焉懷珍曰昔國子尼恥陳河閒之級吾豈能論邦域之捷哉時人稱之江夏王義恭出鎮盱眙道遇懷珍以應對見重取為驃騎長兼墨曹行參軍尋除振武將軍長廣太守孝建初為義恭大司馬參軍直閣將軍懷珍北州舊姓門附殷積啓上門生千人充宿衛孝武大驚召取青冀豪家私附得數千人士人怨之隨府轉太宰參軍大明二年虜圍泗口城青州刺史顏師伯請援孝武遣懷珍將步騎數千赴之於麋溝湖與虜戰破七城拜建武將軍樂陵河閒二郡太守賜爵廣晉縣侯明年懷珍啓求還孝武答曰邊維須才未宜陳請竟陵王誕反郡豪民王弼勸懷珍應之懷珍斬弼以聞孝武大喜除豫章王子尚車騎參軍加龍驤將軍泰始初除寧朔將軍東安東莞二郡太守率龍驤將軍王敬則姜産步騎五千討壽陽廬江太守王仲子南奔賊遣僞廬江太守劉道蔚五千人頓建武澗築三城懷珍遣軍主段僧愛等馬步三百餘人掩擊斬之引軍至晉熙僞太守閻湛拒守劉子勛遣將王仲虯步卒萬人救之懷珍遣馬步三千人襲擊仲虯大破之於莫邪山遂進壽陽又遣王敬則破殷琰將劉從等四壘於橫塘死虎懷珍等乘勝逐北頓壽春長邏門宋明帝嘉其功除羽林監屯騎校尉將軍如故懷珍請先平賊辭讓不受建安王休仁濃湖與賊相持久未決明帝召懷珍還拜前將軍加輔國將軍領軍向青山助擊劉胡事平除游擊將軍輔國將軍如故青州刺史沈文秀拒命明帝遣其弟文炳宣喻使懷珍領馬步三千人隨文炳俱行未至薛安都引虜徐六允已沒張永沈攸之於彭城大敗勑懷珍步從盱眙自淮陰濟淮救永等而官軍為虜所逐相繼奔歸懷珍乃還三年春敕懷珍權鎮山陽先是明帝遣青州刺史明僧皓北征僧皓遣將於王城築壘以逼沈文秀壁未立為文秀所破仍進攻僧皓帝使懷珍率龍驤將軍王廣之五百騎步卒二千人沿海救援至東海而僧皓已退保東萊懷珍進據朐城衆心忷懼或欲且保郁州懷珍謂衆曰卿等傳文秀厚賂胡師規為外援察其徒黨何能必就左衽齊士庶見於民名義積葉聲介一馳東萊可飛書而下何容阻軍緩邁止於此邪遂進至黔陬僞高密平昌二郡太守潰走懷珍達朝廷意送致文炳文秀終不從命焚燒郭邑百姓聞懷珍至皆喜僞長廣太守劉桃根領數千人戍不其城懷珍引軍次洋水衆皆曰文秀今遊騎滿境內宜堅壁伺隙懷珍曰今衆少糧單我懸彼固政宜簡精鋭掩其不備耳遣王廣之將百騎襲陷其城桃根走僞東萊太守鞠延僧數百人據城劫留高麗獻使懷珍又遣寧朔將軍明慶符與廣之擊降延僧遣高麗使詣京師文秀聞諸城皆敗乃遣使張靈碩請降懷珍乃還其秋虜遂侵齊圍歷城梁鄒二城游騎至東陽擾動百姓冀州刺史崔道固六允州刺史劉休賓告急休賓懷珍從弟也朝廷以懷珍為使持節都督徐六允二州軍事輔國將軍平胡中郎將徐州刺史封艾縣侯邑四百戶督水步四十餘軍赴救二城既沒乃止改授寧朔將軍竟陵太守轉巴陵王征西司馬領南義陽太守建平王景素為荊州仍徙右軍司馬遷南郡太守加寧朔將軍明帝手詔懷珍曰卿性忠讜平所葬仗賴在彼與年少共事不可深存受益景素而兒乃佳但不能接物頗亦墮事卿每諫之懷珍奉旨帝寢疾又詔懷珍曰卿不應乃作景素佐才舊所寄今徵卿參二衛直會帝崩乃為安成王撫軍司馬領南高平太守朝廷疑桂陽王休範中書舍人王道隆宣旨以懷珍為冠軍將軍豫章太守懷珍曰休範雖有禍萌安敢便發若終為寇必請奉律吞之今者賜使恐成猜迫固請不就乃除黃門郎領虎賁中郎將青州大中正桂陽反加懷珍前將軍守石頭為使持節督豫司二州郢州之西陽軍事冠軍將軍豫州刺史建平王景素反懷珍遣子靈哲領兵赴京師升明元年進號征虜將軍沈攸之在荊楚朝議疑惑懷珍遣冗從僕射張護使郢致誠於世祖并陳計策及攸之起兵衆謂當沿流直下懷珍謂僚佐曰攸之矜躁夙著虐加楚服必當阻兵中流聲劫幼主不敢長驅決勝明矣遣子靈哲領馬步數千人衛京師攸之遣使許天保說結懷珍懷珍斬之送首於太祖太祖送示攸之進號左將軍徙封中宿縣侯增邑六百戶攸之圍郢城懷珍遣建寧太守張謨游擊將軍裴仲穆統蠻漢軍萬人出西陽破賊前鋒公孫方平軍數千人收其器甲進平南將軍增督南豫北徐二州增邑為千戶初孝武世太祖為舍人懷珍為直閣相遇早舊懷珍假還青州上有白瀐馬齧人不可騎送與懷珍別懷珍報上百匹絹或謂懷珍曰蕭君此馬不中騎是以與君耳君報百匹不亦多乎懷珍曰蕭君局量堂堂寧應負人此絹吾方欲以身名託之豈計錢物多少太祖輔政以懷珍內資未多二年冬徵為都官尚書領前軍將軍以第四子寧朔將軍晃代為豫州刺史或疑懷珍不受代太祖曰我布衣時懷珍便推懷投款況在今日寧當有異晃發經日而疑論不止上乃遣軍主房靈民領百騎追送晃謂靈民曰論者謂懷珍必有異同我期之有素必不應爾卿是其鄉里故遣卿行非唯衛新亦以迎故也懷珍還仍授相國右司馬建元元年轉左衛將軍加給事中改霄城侯增邑二百戶明年加散騎常侍虜寇淮肥以本官加平西將軍假節西屯巢湖為壽春勢援虜退乃還懷珍年老以禁旅辛勤求為間職轉光祿大夫常侍如故其冬虜寇朐山授使持節安北將軍本官如故領兵救援未至事寧解安北持節四年疾篤上表解職上優詔答許別量所授其夏卒年六十三遺言薄葬世祖追贈散騎常侍鎮北將軍雍州刺史諡曰敬侯子靈哲字文明解褐王國常侍行參軍尚書直郎齊臺步兵校尉建元初歷寧朔將軍臨川王前軍咨議廬陵內史齊郡太守前軍將軍靈哲所生母嘗病靈哲躬自祈禱夢見黃衣老公曰可取南山竹笋食之疾立可愈靈哲驚覺如言而疾瘳嫡母崔氏及兄子景煥泰始中沒虜靈哲為布衣不聽樂及懷珍卒當襲爵靈哲固辭以兄子在虜中存亡未測無容越當茅土朝廷義之靈哲傾産私贖嫡母及景煥纍年不能得世祖哀之令北使告虜主虜主送以還南襲懷珍封爵靈哲永明初歷護軍長史東中郎咨議領中直兵出為寧朔將軍巴西梓潼二郡太守西陽王左軍司馬隆昌元年卒年四十九李安民蘭陵承人也祖嶷衛軍參軍父欽之殿中將軍補薛令安民隨父之縣元嘉二十七年沒虜率部曲自拔南歸太祖初逆使安民領支軍降義師板建威將軍補魯爽左軍及爽反安民遁還京師除領軍行參軍遷左衛殿中將軍大明中虜侵徐六允以安民為建威府司馬無鹽令除殿中將軍領軍討漢川互螫賊晉安王子勛反明帝除安民武衛將軍領水軍補建安王司徒城局參軍擊赭圻湖白荻浦獺窟皆捷除積射將軍軍主張興世據錢溪糧盡為賊所逼安民率舟乘數百越賊五城送米與興世僞軍主沈仲王張引軍自黹口欲斷江安民進軍合戰破之又擊鵲尾江城皆有功事平明帝大會新亭勞接諸軍主樗蒲官賭安民五擲皆盧帝大驚目安民曰卿面方如田封侯狀也安民少時貧窶有一人從門過相之曰君後當大富貴與天子交手共戲至是安民尋此人不知所在從張永沈攸之討薛安都於彭城軍敗安民在後拒戰還保下邳除寧朔將軍戍淮陽城論黹口功封邵武縣子食邑四百戶復隨吳喜沈攸之擊虜達睢口戰敗還保宿豫淮北既沒明帝敕留安民戍甬角城除寧朔將軍冗從僕射戍泗口領舟軍緣淮游防至壽春虜遣僞長社公連營十餘里寇汝陰豫州刺史劉勔擊退之虜荊亭戍主升乞奴棄城歸降安民率水軍攻前破荊亭絶其津徑遷寧朔將軍冠軍司馬廣陵太守行南六允州事太祖在淮陰安民遙相結事明帝以為疑徙安民為劉韞冠軍司馬寧遠將軍京兆太守又除寧朔將軍司州刺史領義陽太守竝不拜重除本職又不拜改授寧朔將軍山陽太守泰始末淮北民起義欲南歸以安民督前鋒軍事又請援接不克還除越騎校尉復為寧朔將軍山陽太守三巴擾亂太守張淡棄涪城走以安民假節都督討蜀軍事輔師將軍五獠亂漢中敕安民回軍至魏興事寧還至夏口元徽初除督司州軍事司州刺史領義陽太守假節將軍如故別敕安民曰九江須防邊備宜重今有此授以增鄢郢之勢無所致辭也及桂陽王休範起事安民出頓遣軍援京師徵授左將軍加給事中建平王景素作難冠軍黃回游擊將軍高道慶輔國將軍曹欣之等皆密遣致誠而游擊將軍高道慶領衆出討太祖慮其有變使安民及南豫州刺史段佛榮行以防之安民至京口破景素軍於葛橋景素誅留安民行南徐州事城局參軍王迥素為安民所親盜絹二匹安民流涕謂之曰我與卿契闊備嘗今日犯王法此乃卿負我也於軍門斬之厚為斂祭軍府皆震服授冠軍將軍驍衛將軍不拜轉征虜將軍東中郎司馬行會稽郡事安民將東太祖與別宴語淹留日夜安民密陳宋運將盡曆數有歸蒼梧縱虐太祖憂迫無計安民白太祖欲於東奉江夏王躋起兵太祖不許乃止蒼梧廢太祖徵安民為使持節督北討軍事冠軍將軍南六允州刺史沈攸之反太祖召安民以本官鎮白下治城隍加征虜將軍進軍西討又進前將軍行至盆城沈攸之平仍授督郢州司州之義陽諸軍事郢州刺史持節將軍如故升明三年遷左衛將軍領衛尉太祖即位為中領軍封康樂侯邑千戶宋泰始以來內外頻有賊寇將帥已下各募部曲屯聚京師安民上表陳之以為自非淮北常備其外餘軍悉皆輸遣若親近宜立隨身者聽限人數上納之故詔斷衆募時王敬則以勳誠見親至於家國密事上唯與安民論議謂安民曰署事有卿名我便不復細覽也尋為領軍將軍虜寇壽春至馬頭詔安民出征加鼓吹一部虜退安民沿淮進壽春先是宋世亡命王元初聚黨六合山僭號自云垂手過膝州郡討不能擒積十餘年安民遣軍偵候生禽元初斬建康市加散騎常侍其年虜又南侵詔安民持節履行緣淮清泗諸戍屯軍虜攻朐山連口甬角城安民頓泗口分軍應赴三年引水步軍入清於淮陽與虜戰破之虜退安民知有伏兵乃遣族弟馬軍主長文二百騎為前驅自與軍副周盤龍崔文仲係其後分軍隱林及長文至宿豫虜見衆少數千騎遮之長文且退且戰引賊向大軍安民率盤龍等趨兵至合戰於孫溪渚戰父彎側虜軍大敗赴清水死不可勝數虜遣其菟頭公送攻車材至布丘左軍將軍孫文顯擊破走之燒其車材淮北四州聞太祖受命咸欲南歸至是徐州人桓摽之六允州人徐猛子等合義衆數萬柴險求援太祖詔曰青徐四州義舉雲集安民可長轡遐馭指授羣帥安民赴救留遲虜急兵攻摽之等皆沒上甚責之太祖崩遺詔加侍中世祖即位遷撫軍將軍丹陽尹永明二年遷尚書左僕射將軍如故安民時屢啓密謀見賞又善結尚書令王儉故世傳儉啓有此授尋上表以年疾求退改授散騎常侍金紫光祿大夫將軍如故四年為安東將軍吳興太守常侍如故卒官年五十八賻錢十萬布百匹吳興有項羽神護郡聽事太守不得上太守到郡必須祀以軛下牛安民奉佛法不與神牛著屐上聽事又於聽上八關齊俄而牛死葬廟側今呼為李公牛冢及安民卒世以神為祟詔曰安民歷位內外庸績顯著忠亮之誠每簡朕心敷政近畿方申任寄奄至殞喪痛傷于懷贈鎮東將軍鼓吹一部常侍太守如故諡曰肅侯王玄載字彥休下邳人也祖宰僞北地太守父蕤東莞太守玄載解褐江夏王國侍郎太宰行參軍泰始初為長水校尉隨張永征彭城臺軍大敗玄載全軍據下邳城拒虜假冠軍將軍官軍新敗人情恐駭以玄載士望板為徐州刺史持節監徐州豫州梁郡軍事寧朔將軍平胡中郎將尋又領山陽東海二郡太守五年督青六允二州刺史將軍東海郡如故七年復為徐州督徐六允二州鍾離太守將軍郎將如故遷左軍將軍仍為寧朔將軍歷陽太守改持節都督二豫冠軍將軍南豫州刺史太守如故遷撫軍司馬出為持節督梁南北秦三州軍事冠軍將軍西戎校尉梁秦二州刺史進號征虜將軍尋徙督益寧二州益州刺史建寧太守將軍持節如故沈攸之之難玄載起義送誠進號後軍將軍封鄂縣子徵散騎常侍領後軍未拜建元元年為左民尚書鄂縣子如故會虜動南六允州刺史王敬則奔京師上遣玄載領廣陵加平北將軍假節行南六允州事本官如故事寧為光祿大夫員外散騎常侍永明四年為持節監六允州緣淮諸軍事平北將軍六允州刺史六年卒時年七十六諡烈子玄載夷雅好玄言修士操在梁益有清績西州至今思之從弟玄謨子瞻宋明帝世為黃門郎素輕世祖世祖時在大牀寢瞻謂豫章王曰帳中物亦復隨人寢興世祖銜之未嘗形色建元元年為冠軍將軍永嘉太守詣闕跪拜不如儀為守寺所列有司以啓世祖世祖召瞻入東宮仍送付廷尉殺之遣左右口啓上曰父辱子死王瞻傲慢朝廷臣輒以收治太祖曰語郎此何足計既聞瞻已死乃默無言瞻兄寬宋世與瞻竝為方伯至是瞻雖坐事而寬位待如舊也寬泰始初為隨郡值西方反父玄謨在都寬棄郡歸明帝加賞使隨張永討薛安都寬辭以母猶存在西為賊所執請得西行遂襲破隨郡斬僞太守劉師念拔其母事平明帝嘉之使圖畫寬形建元初為散騎常侍光祿大夫領前軍將軍永明元年為太常坐於宅殺牛免官後為光祿大夫三年卒玄載弟玄邈字彥遠初為驃騎行軍參軍太子左積弩將軍射聲校尉泰始初遷輔國將軍清河廣平川二郡太守幽州刺史青州刺史沈文秀反玄邈欲向朝廷慮見掩襲乃詣文秀求安軍頓文秀令頓城外玄邈即立營壘至夜拔軍南奔赴義比曉文秀追不復及明帝以為持節都督青州青州刺史將軍如故太祖鎮淮陰為帝所疑遣書結玄邈玄邈長史房叔安勸玄邈不相答和罷州還太祖以經途令人要之玄邈雖許既而嚴軍直過還都啓帝稱太祖有異謀太祖不恨也升明中太祖引為驃騎司馬冠軍將軍太山太守玄邈甚懼而太祖待之如初遷散騎常侍驍騎將軍冠軍如故出為持節都督梁南秦二州軍事征虜將軍西戎校尉梁南秦二州刺史兄弟同時為方伯封河陽縣侯建元元年進號右將軍侯如故亡命李烏奴作亂梁部陷白馬戍玄邈率東從七八百人討之不克慮不自保乃使人僞降烏奴告之曰王使君兵衆羸弱棄伎妾於城內攜愛妾二人去已數日矣烏奴喜輕兵襲州城玄邈設伏擊破之烏奴挺身走太祖聞之曰玄邈果不負吾意遇也還為征虜將軍長沙王後軍司馬南東海太守遷都官尚書世祖即位轉右將軍豫章王太尉司馬出為冠軍將軍臨川內史秩中二千石還為前軍司徒司馬散騎常侍太子右率永明七年為持節都督六允州緣淮軍事平北將軍六允州刺史未之任轉大司馬加後將軍八年轉太常遷散騎常侍右衛將軍出為持節監徐州軍事平北將軍徐州刺史十一年建康蓮華寺道人釋法智與州民周盤龍等作亂四百人夜攻州城西門登梯上城射殺城局參軍唐穎遂入城內軍主耿虎徐思慶董文定等拒戰至曉玄邈率百餘人登城便門奮擊生擒法智盤龍等玄邈坐免官鬱林即位授撫軍將軍遷使持節安西將軍歷陽南譙二郡太守延興元年加散騎常侍尋轉中護軍高宗使玄邈往江州殺晉安王子懋玄邈苦辭不行及遣王廣之往廣陵取安陸王子敬玄邈不得已奉旨給鼓吹置佐建武元年遷持節都督南六允厄青冀五州軍事平北將軍南六允州刺史轉護軍將軍加散騎常侍四年卒年七十二贈安北將軍雍州刺史諡曰壯侯同族王文和宋鎮北大將軍仲德兄孫也景和中為義陽王昶征北府主簿昶於彭城奔虜部曲皆散文和獨送至界上昶謂之曰諸人皆去卿有老母何不去邪文和乃去升明中為巴陵內史沈攸之事起文和斬其使馳白世祖告變棄郡奔郢城永明中歷青冀六允益四州刺史平北將軍史臣曰宋氏將季離亂日兆家懷逐鹿人有異圖故蕃嶽阻兵之機州郡觀釁之會此數子皆宿將舊勳與太祖比肩為方伯年位高下或為先輩而薦誠君側奉義萬里以此知樂推之非妄信民心之有歸玄載兄弟門從世秉誠烈不為道家所忌斯今之耿氏也贊曰霄城報馬分義先推靈哲守讓方軌丁韋李佐東土謀發天機王為清政其風不衰玄邈簡朕早背同歸
