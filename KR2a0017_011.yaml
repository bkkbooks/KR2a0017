body:
  text: 南齊書卷十一志第三樂南郊樂舞歌辭二漢同用見前漢志五郊互奏之魏歌舞不見疑是用漢辭也晉武帝泰始二年郊祀明堂詔禮遵用周室肇稱殷祀之義權用魏儀後使傅玄造祠天地五郊夕牲歌詩一篇迎神歌一篇宋文帝使顏延之造郊天夕牲迎送神饗神歌詩三篇是則宋初又仍晉也建元二年有司奏郊廟雅樂歌辭舊使學士博士撰搜簡採用請敕外凡義學者普令製立參議太廟登歌宜用司徒褚淵餘悉用黃門郎謝超宗辭超宗所撰多刪顏延之謝莊辭以為新曲備改樂名永明二年太子步兵校尉伏曼容上表宜集英儒刪纂雅樂詔付外詳竟不行羣臣出入奏肅咸之樂夤承寶命嚴恭帝緒奄受敷錫升中拓宇亘地稱皇罄天作主月域來賓日際奉土開元首正禮交樂舉六典聯事九官列序此下除四句皆顏辭牲出入奏引牲之樂皇乎敬矣恭事上靈昭教國祀肅肅明明有牲在滌有絜在俎以薦王衷以答神祜此上四句顏辭陟配在京降德在民奔精望夜高燎佇晨薦豆呈毛血奏嘉薦之樂我恭我享惟孟之春以孝以敬立我蒸民青壇奄靄翠幙端凝嘉俎重薦兼籍再升設業設簴展容玉庭肇禋配祀克對上靈此一篇增損謝辭右夕牲歌竝重奏迎神奏昭夏之樂惟聖饗帝惟孝饗親此下除二句禮行宗祀敬達郊禋金枝中樹廣樂四陳此下除八句月御案節星驅扶輪遙興遠駕曜曜振振告成大報受釐元神皇帝入壇東門奏永至之樂紫壇望靈翠幙佇神率天奉贄罄地來賓神貺竝介泯祗合祉恭昭鑒享肅光孝祀威藹四靈洞曜三光皇德全被大禮流昌皇帝升壇奏登歌辭報惟事天祭實尊靈史正嘉兆神宅崇禎五畤昭鬯六宗序介丘望塵皇軒肅舉皇帝初獻奏文德宣烈之樂營泰畤定天衷思心緒謀筮從此下除二句田燭置權火通大孝昭國禮融此一句改餘皆顏辭此下又除二十二句次奏武德宣烈之樂功燭上宙德燿中天風移九域禮飾八埏四靈晨炳五緯宵明膺曆締運道茂前聲太祖高皇帝配饗奏高德宣烈之樂此章永明二年造奏尚書令王儉辭饗帝嚴親則天光大舄弈前古榮鏡無外日月宣華卿雲流靄五漢同休六幽咸泰皇帝飲福酒奏嘉胙之樂鬯嘉禮承休錫盛德符景緯昌華應帝策聖藹耀昌基融祉暉世曆聲正涵月軌書文騰日迹寶瑞昭神圖靈貺流瑞液我皇崇暉祚重芬冠往籍送神奏昭夏之樂薦饗洽禮樂該神娛展辰旆回洞雲路拂璇階紫雰藹青霄開睠皇都顧玉臺留昌德結聖懷皇帝就燎位奏昭遠之樂天以德降帝以禮報牲罇俯陳柴幣仰燎事展司采敬達瑄薌煙贄青昊震颺紫場陳馨示策肅志宗禋禮非物備福唯誠陳皇帝還便殿奏休成之樂重奏昭事上祀饗薦具陳回鑾轉翠拂景翔宸綴縣敷暢鍾石昭融羽炫深晷籥曀行風肆序輟度肅禮停文四金聳衞六馭齊輪右南郊歌辭北郊樂歌辭案周頌昊天有成命郊祀天地也是則周漢以來祭天地皆同辭矣宋顏延之饗地神辭一篇餘與南郊同齊北郊羣臣入奏肅咸樂牲入奏引牲薦豆毛血奏嘉薦皇帝入壇東門奏永至飲福酒奏嘉胙還便殿奏休成辭竝與南郊同迎送神昭夏登歌異迎地神奏昭夏之樂詔禮崇營敬饗玄畤靈正丹帷月肅紫墀展薦登華風縣凝鏘神惟戾止鬱葆遙莊昭望歲芬環游辰太穆哉尚禮橫光秉藹皇帝升壇登歌佇靈敬享禋肅彝文縣動聲儀薦絜牲芬陰祇以貺昭司式慶九服熙度六農祥正皇帝初獻奏地德凱容之樂繕方丘端國陰掩珪晷仰靈心詔源委遍丘林此下除八句禮獻物樂薦音此下除二十二句餘皆顏辭次奏昭德凱容之樂慶圖濬邈蘊祥祕瑤俔天炳月嬪光紫霄邦化靈懋閫則風調儷德方儀徽載以昭送神奏昭夏之樂薦神升享序楙淹玉俎停金奏寶旆轉旒駕旋溢素景鬱紫躔靈心顧留辰睠洽外瀛瑞中縣瘞埋奏隸幽之樂后皇嘉慶定祗玄畤承帝休圖祗敷靈祉篚冪周序軒朱凝會牲幣芬壇精明佇蓋調川瑞昌警岳祥泰右北郊歌辭明堂歌辭祠五帝漢郊祀歌皆四言宋孝武使謝莊造辭莊依五行數木數用三火數用七土數用五金數用九水數用六案鴻範五行一曰水二曰火三曰木四曰金五曰土月令木數八火數七土數五金數九水數六蔡邕云東方有木三土五故數八南方有火二土五故數七西方有金四土五故數九北方有水一土五故數六又納音數一言得土三言得火五言得水七言得金九言得木若依鴻範木數用三則應水一火二金四也若依月令金九水六則應木八火七也當以鴻範一二之數言不成文故有取捨而使兩義竝違未詳以數立言為何依據也周頌我將祀文王言皆四其一句五一句七謝莊歌宋太祖亦無定句建元初詔黃門郎謝超宗造明堂夕牲等辭並採用莊辭建武二年雩祭明堂謝朓造辭一依謝莊唯世祖四言也賓出入奏肅咸樂歌辭二章承孝典恭事嚴聖浹天奉賮罄壤齊慶司儀且序羽容夙章芬枝揚烈黼構周張助寶尊軒酎珍充庭璆縣凝會颴琄朱竚聲先期選禮肅若有承祗對靈祉皇慶昭膺尊事威儀輝容昭序迅恭明神絜盛牲俎肅肅嚴宮藹藹崇基皇靈降止百祇具司戒誠望夜端烈承朝依微昭旦物色輕霄青帝歌參映夕駟昭晨靈乘震司青春鴈將向桐始蕤和風舞暄光遲萌動達萬品親潤無際澤無垠赤帝歌龍精初見大火中朱光北至圭景同帝在在離寔司衡雨水方降木堇榮庶物盛長咸殷阜恩澤四溟被九有黃帝歌履艮宅中宇司繩總四方裁化徧寒燠布政司炎涼此以下除八句至分乘經晷閉啟集度帝暉緝萬有皇靈澄國步白帝歌百川若鏡天地爽且明雲沖氣舉盛德在素精此下除四句庶類收成歲功行欲寧浹地奉渥罄宇承帝靈黑帝歌歲既暮日方馳靈乘坎德司規玄雲合晦鳥蹊白雲繁亘天崖此下除四句晨晷促夕漏延大陰極微陽宣此下除二句皇帝還東壁受福酒奏嘉胙樂歌辭太廟同用禮薦洽福祚昌聖皇膺嘉祐帝業凝休祥居極乘景運宅德瑞中王澄明臨四奧精華延八鄉洞海同聲憓澈宇麗乾光靈慶纏世祉鴻烈永無疆送神奏昭夏樂歌辭宋謝莊辭蘊禮容餘樂度靈方留景欲暮開九重肅五達鳳參差龍已秣沫雲既動河既梁萬里照四空香神之車歸清都璇庭寂玉殿虛鴻化凝孝風熾顧靈心結皇思鴻慶遐鬯嘉廌令芳並帝明德永祚深光增四字牲出入奏引牲樂歌詩惟誠絜饗維孝尊靈敬芳黍稷敬滌犧牲騂繭在豢載溢載豐以承宗祀以肅皇衷蕭芳四舉華火周傳神鑒孔昭嘉足參牷薦豆呈毛血奏嘉薦樂歌詩二章肇禋戒祀禮容咸舉六典飾文九司炤序牲柔既昭犧剛既陳恭滌惟清敬事惟神加籩再御兼俎兼薦節動軒越聲流金縣奕奕閟幄亹亹嚴闈絜誠夕鑒端服晨暉聖靈戾止翊我皇則上綏四𧜛下洋萬國永言孝饗孝饗有容儐僚贊列肅肅雍雍右夕牲辭迎神奏昭夏樂歌辭地紐謐乾樞回華蓋動紫微開旌蔽日車若雲駕六氣乘烟熅燁帝景耀天邑聖祖降五雲集此下除八句懋粢盛絜牲牷百禮肅羣司虔皇德遠大孝昌貫九幽洞三光神之安解玉鑾昌福至萬𧜛歡皆謝莊辭皇帝升明堂奏登歌辭雍臺辯朔澤宮選辰挈火夕炤明水朝陳六瑚賁室八羽華庭昭事先聖懷濡上靈肆夏式敬升歌發德永固洪基以綏萬國皆謝莊辭初獻奏凱容宣烈樂歌辭太廟同釃醴具登嘉俎咸薦饗洽誠陳禮周樂徧祝辭罷祼序容輟縣蹕動端庭鑾回嚴殿神儀駐景華漢高虛八靈案衞三代祇解途翠蓋澄耀罼帟凝晨玉辳息節金輅懷音戒誠達孝厎心肅感追馮皇鑒思承淵範神錫懋祉四緯昭明仰福帝徽俯齊庶生右祠明堂歌辭建元永明中奏雩祭歌辭清明暢禮樂新候龍景選貞辰陽律亢陰晷伏秏下土荐穜稑震儀警王度乾嗟雲漢望昊天張盛樂奏雲集五精延帝祖雩有諷禜有秩膋鬯芬圭瓚瑟靈之來帝閽開車煜燿吹徘徊停龍犧徧觀此凍雨飛祥風靡壇可臨奠可歆對泯祉鑒皇心右迎神歌辭依漢來郊歌三言宋明堂迎神八解濬哲維祖長發其武帝出自震重光御𧜛七德攸宣九疇咸靜難荊舒凝威蠡浦昧旦丕承夕惕刑政化壹車書德馨粢盛昭星夜景非雲曉慶衢室成陰璧水如鏡禮充玉帛樂被筦絃於鑠在詠陟配于天自宮徂兆靡愛牲牷我將我享永祚豐年右歌世祖武皇帝依廟歌四言營翼日鳥殷宵凝冰泮玄蟄昭景陽陽風習習女夷歌東皇集樽奠春酒秉青珪命田祖渥羣黎右歌青帝木生數三惟此夏德德恢台兩雨龍既御炎精來火景方中南譌秩靡草云黃含桃實族雲蓊鬱溫風煽興雨祁祁黍苗徧右歌赤帝火成數七稟火自高明毓金挺剛克凉燠資成化羣方載厚德陽季勾萌達炎徂溽暑融商暮百工止歲極凌陰沖皇流䟽已清原隰甸已平咸言祚惟億敦民保高京右歌黃帝土成數五帝悅于兌執矩固司藏百川收潦精景應徂商嘉樹離披榆關命賓鳥夜月如霜秋風方嫋嫋商陰肅殺萬寶咸亦遒勞哉望歲場功冀可收右歌白帝金成數九白日短玄夜深招搖轉移太陰霜鍾鳴冥陵起星回天月窮紀聽嚴風來不息望玄雲黝無色曾冰洌積羽幽飛雲至天山側關梁閉方不巡合國吹饗蜡賓充微陽究終始百禮洽萬觀祚臻右歌黑帝水成數六敬如在禮將周神之駕不少留躡龍鑣轉金蓋紛上馳雲之外警七耀詔八神排閶闔渡天津有渰興膚寸積雨冥冥又終夕俾栖糧惟萬箱皇情暢景命昌右送神歌辭太廟樂歌辭周頌清廟一篇漢安世歌十七章是也永平三年東平王蒼造光武廟登歌一章二十六句其辭稱述功德建安十八年魏國初建侍中王粲作登歌安世詩說神靈鑒饗之意明帝時侍中繆襲奏安世詩本故漢時歌名今詩所歌非往詩之文襲案周禮志注云安世樂猶周房中樂也往昔議者以房中歌后妃之德宜改安世名正始之樂後續讀漢安世歌亦說神來宴饗無有后妃之言思惟往者謂房中樂為后妃歌恐失其意方祭祀娛神登歌先祖功德下堂詠宴享無事歌后妃之化也於是改安世樂曰饗神歌散騎常侍王肅作宗廟詩頌十二篇不入於樂晉泰始中傅玄造廟夕牲昭夏歌一篇迎送神肆夏歌詩一篇登歌七廟七篇玄云登歌歌盛德之功烈故廟異其文至於饗神猶周頌之有瞽及雍但說祭饗神明禮樂之盛七廟饗神皆用之夏侯湛又造宗廟歌十三篇宋世王韶之造七廟登歌七篇昇明中太祖為齊王令司空褚淵造太廟登歌二章建元初詔黃門侍郎謝超宗造廟樂歌詩十六章永明二年尚書殿中曹奏太祖高皇帝廟神室奏高德宣烈之舞未有歌詩郊應須歌辭穆皇后廟神室亦未有歌辭案傅玄云登歌廟異其文饗神室同辭此議為允又尋漢世歌篇多少無定皆稱事立文竝多八句然後轉韻時有兩三韻而轉其例甚寡張華夏侯湛亦同前式傅玄改韻頗數更傷簡節之美近世王韶之顏延之竝四韻乃轉得賒促之中顏延之謝莊作三廟歌皆各三章章八句此於序述功業詳略為宜今宜依之郊配之日改降尊作主禮殊宗廟穆后母儀之化事異經綸此二歌為一章八句別奏事御奉行詔可尚書令王儉造太廟二室及郊配辭羣臣出入奏肅咸樂歌辭絜誠厎孝孝感煙霜夤儀飾序肅禮綿張金華樹藻肅哲騰光殷殷升奏嚴嚴階庠匪椒匪玉是降是將懋分神衷翊祐傳昌牲出入奏引牲樂歌辭肇祀嚴靈恭禮尊國達敬敷典結孝陳則芬滌既肅犧牷既整聳誠流思端儀選景肆禮佇夜綿樂望晨崇席皇鑒用饗明神薦豆呈毛血奏嘉薦樂歌辭清思眑眑閟寢微微恭言載感肅若有希芬俎具陳嘉薦兼列凝馨煙颺分炤星睿靈式降協我帝道上澄五緯下陶八表右夕牲歌辭迎神奏昭夏樂歌辭涓辰選氣展禮恭祇重闈月洞層牖煙施載虛玉鬯載受金枝天歌折饗雲舞罄