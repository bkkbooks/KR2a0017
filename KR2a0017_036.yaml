body:
  text: 南齊書卷三十六列傳第十七謝超宗劉祥謝超宗陳郡陽夏人也祖靈運宋臨川內史父鳳元嘉中坐靈運事同徙嶺南早卒超宗元嘉末得還與慧休道人來往好學有文辭盛得名譽解褐奉朝請新安王子鸞孝武帝寵子超宗以選補王國常侍王母殷淑儀卒超宗作誄奏之帝大嗟賞曰超宗殊有鳳毛恐靈運復出轉新安王撫軍行參軍泰始初為建安王司徒參軍事尚書殿中郎三年都令史駱宰議策秀才考格五問並得為上四三為中二為下一不合與第超宗議以為片辭折獄寸言挫衆魯史褒貶孔論興替皆無俟繁而後秉裁夫表事之淵析理之會豈必委牘方切治道非患對不盡問患以文弗奇必使一通峻正寧劣五通而常與其俱奇必使一亦宜採詔從宰議遷司徒主簿丹陽丞建安王休仁引為司徒記室正員郎兼尚書左丞中郎以直言忤僕射劉康左遷通直常侍太祖為領軍數與超宗共屬文愛其才翰衛將軍袁粲聞之謂太祖曰超宗開亮迥悟善可與語取為長史臨淮太守粲既誅太祖以超宗為義興太守升明二年坐公事免詣東府門自通其日風寒慘厲太祖謂四座曰此客至使人不衣自暖矣超宗既坐飲酒數甌辭氣橫出太祖對之甚歡板為驃騎咨議及即位轉黃門郎有司奏撰立郊廟歌敕司徒褚淵侍中謝朏散騎侍郎孔稚圭太學博士王咺之總明學士劉融何法冏何曇秀十人並作超宗辭獨見用為人仗才使酒多所陵忽在直省常醉上召見語及北方事超宗曰虜動來二十年矣佛出亦無如何以失儀出為南郡王中軍司馬超宗怨望謂人曰我今日政應為司驢為省司所奏以怨望免官禁錮十年司徒褚淵送湘州刺史王僧虔閣道壞墜水僕射王儉嘗牛驚跣下車超宗撫掌笑戲曰落水三公墮車僕射前後言誚稍布朝野世祖即位使掌國史除竟陵王征北咨議參軍領記室愈不得志超宗娶張敬兒女為子婦上甚疑之永明元年敬兒誅超宗謂丹陽尹李安民曰往年殺韓信今年殺彭越尹欲何計安民具啓之上積懷超宗輕慢使兼中丞袁彖奏曰風聞征北咨議參軍謝超宗根性浮險率情躁薄仕近聲權務先諂狎人裁疏黜亟便詆賤卒然面譽旋而背毀疑間台賢每窮詭舌訕貶朝政必聲凶言腹誹口謗莫此之甚不敬不諱罕與為二輒攝白從王永先到臺辨問超宗有何罪過詣諸貴皆有不遜言語並依事列對永先列稱主人超宗行來詣諸貴要每多觸忤言語怨懟與張敬兒周旋許結姻好自敬兒死後惋歎忿慨今月初詣李安民語論張敬兒不應死安民道敬兒書疏墨迹炳然卿何忽作此語其中多有不遜之言小人不悉盡羅縷諳憶如其辭列則與風聞符同超宗罪自已彰宜附常準超宗少無行檢長習民慝狂狡之迹聯代所疾迷之釁纍朝點觸剗容掃轍久埋世表屬聖明廣愛忍禍舒慈捨之憲外許以改過野心不悛在宥方驕才性無親處恩彌戾遂遘扇非端空生怨懟恣囂毒於京輔之門揚凶悖於卿守之席此而不翦國章何寄此而可貸孰不可容請以見事免超宗所居官解領記室輒勒外收付廷尉法獄治罪超宗品第未入簡奏臣輒奉白簡以聞世祖雖可其奏以彖言辭依違大怒使左丞王逡之奏曰臣聞行父盡忠無禮斯疾農夫去草見惡必耘所以振纓稱良登朝著績未有尸位存私而能保其榮名者也今月九日治書侍御史臣司馬侃啓彈征北咨議參軍事謝超宗稱根性昏動率心險放悖議爽真囂辭犯實親朋忍聞衣冠掩目輒收付廷尉法獄治罪處劾雖重文辭簡略事入主書被却還外其晚兼御史中丞臣袁彖改奏白簡始粗詳備厥初隱衛實彖之由尋超宗植性險戾稟行凶詖豺狼野心久暴遐邇張敬兒潛圖反噬罰未塞愆而稱怨痛枉形于言貌協附姦邪疑間勳烈構扇異端譏議時政行路同忿有心咸疾而阿昧苟容輕文略奏又彈事舊體品第不簡而釁戾殊常者皆命議親奏以彰深愆況超宗罪愈四凶過窮南竹雖下輒收而文止黃案沈浮哰見輕重相乖此而不糾憲綱將替彖才識疏淺質幹無聞憑戚升榮因慈荷任不能克己厲情少酬恩奬撓法容非用申私惠何以糾正邦違式明王度臣等參議請以見事免彖所居官解兼御史中丞輒攝曹依舊下禁止視事如故治書侍御史臣司馬侃雖承稟有由而初無疑執亦合及咎請杖督五十奪勞百日令史卑微不足申盡啓可奉行侃奏彈之始臣等並即經見加推糾案入主書方被却檢疏謬之愆伏追震悚詔曰超宗釁同大逆罪不容誅彖匿情欺國愛朋罔主事合極法特原收治免官如案禁錮十年超宗下廷尉一宿髮白皓首詔徙越州行至豫章上敕豫章內史虞悰曰謝超宗令於彼賜自盡勿傷其形骸明年超宗門生王永先又告超宗子才卿死罪二十餘條上疑其虛妄以才卿付廷尉辨以不實見原永先於獄自盡劉祥字顯徵東莞莒人也祖式之吳郡太守父敳太宰從事中郎祥宋世解褐為巴陵王征西行參軍歷驃騎中軍二府太祖太尉東閣祭酒驃騎主簿建元中為冠軍征虜功曹為府主武陵王蟲念所遇除正員外祥少好文學性韻剛疏輕言肆行不避高下司徒褚淵入朝以腰扇鄣日祥從側過曰作如此舉止羞面見人扇鄣何益淵曰寒士不遜祥曰不能殺袁劉安得免寒士永明初遷長沙王鎮軍板咨議參軍撰宋書譏斥禪代尚書令王儉密以啓聞上銜而不問歷鄱陽王征虜豫章王大司馬咨議臨川王驃騎從事中郎祥兄整為廣州卒官祥就整妻求還資事聞朝廷於朝士多所貶忽王奐為僕射祥與奐子融同載行至中堂見路人驅驢祥曰驢汝好為之如汝人才皆已令僕著連珠十五首以寄其懷辭曰蓋聞興教之道無尚必同拯俗之方理貴袪弊故揖讓之禮行乎堯舜之朝干戈之功盛於殷周之世清風以長物成春素霜以凋嚴戒節蓋聞鼓鼖懷音待揚桴以振響天地涵靈資昏明以垂位是以俊乂之臣借湯武而隆英達之君假伊周而治蓋聞懸飢在歲式羡藜藿之飽重炎灼體不念狐白之溫故才以偶時為劭道以調俗為尊蓋聞習數之功假物可尋探索之明循時則缺故班匠日往繩墨之伎不衰大道常存機神之智永絶蓋聞理定於心不期俗賞情貫於時無悲世辱故芬芳各性不待汨渚之哀明白為寶無假荊南之哭蓋聞百仞之臺不挺陵霜之木盈尺之泉時降夜光之寶故理有大而乖權物有微而至道蓋聞忠臣赴節不必在朝列士匡時義存則幹故包胥垂涕不荷肉食之謀王歜投身不主廟堂之算蓋聞智出乎身理無或困聲係於物才有必窮故陵波之羽不能淨浪盈岫之木無以輟風蓋聞良寶遇拙則奇文不顯達士逢讒則英才滅耀故墜葉垂蔭明月為之隔輝堂宇留光蘭燈有時不照蓋聞迹慕近方必勢遺於遠大情係驅馳固理忘於肥遁是以臨川之士時結羡網之悲負肆之氓不抱屠龍之歎蓋聞數之所隔雖近則難情之所符雖遠則易是以陟歎流霜時獲感天之誠泣血從刑而無悟主之智蓋聞妙盡於識神遠則遺功接於人情微則著故鍾鼓在堂萬夫傾耳大道居身有時不遇蓋聞列草深岫不改先冬之悴植松澗底無奪後凋之榮故展禽三黜而無下愚之譽千秋一時而無上智之聲蓋聞希世之寶違時則賤偉俗之器無聖必淪故鳴玉黜於楚岫章甫窮於越人蓋聞聽絶於聰非疾響所握神閉於明非盈光所燭故破山之雷不發聾夫之耳朗夜之輝不開矇叟之目有以祥連珠啓上者上令御史中丞任遐奏曰祥少而狡異長不悛徙請謁絶於私館反脣彰於公庭輕議乘輿歷貶朝望肆醜無避縱言自若厥兄浮櫬天倫無一日之悲南金弗獲嫂姪致其輕絶孤舟敻反存沒相捐遂令暴客掠奪骸柩行路流歎有識傷心攝祥門生孫狼兒列祥頃來飲酒無度言語闌逸道説朝廷亦有不遜之語實不避左右非可稱紙墨兄整先為廣州於職喪亡去年啓求迎喪還至大雷聞祥與整妻孟爭計財物瞋忿祥仍委前還後未至鵲頭其夜遭劫內人並為凶人所淫略如所列與風聞符同請免官付廷尉上別遣敕祥曰卿素無行檢朝野所悉輕棄骨肉侮蔑兄嫂此是卿家行不足乃無關他人卿才識所知蓋何足論位涉清途於分非屈何意輕肆口噦詆目朝士造席立言必以貶裁為口實冀卿年齒已大能自感厲日望悛革如此所聞轉更增甚喧議朝廷不避尊賤肆口極辭彰暴物聽近見卿影連珠寄意悖慢彌不可長卿不見謝超宗其才地二三故在卿前事殆是百分不一我當原卿性命令卿萬里思愆卿若能改革當令卿得還獄鞫祥辭祥對曰被問少習狡異長而不悛頃來飲酒無度輕議乘輿歷貶朝望每肆醜言無避尊賤迂答奉旨囚出身入官二十餘年沈悴草萊無明天壤皇運初基便蒙抽擢祭酒主簿並皆先朝相府聖明御𧜛榮渥彌隆咨議中郎一年再澤廣筵華宴必參末例列朝半問訊時奉天暉囚雖頑愚豈不識恩有何怨望敢生譏議囚歷府以來伏事四王武陵功曹凡涉二載長沙咨議故經少時奉隸大司馬並被恩拂驃騎中郎親職少日臨川殿下不遺蟲蟻賜參辭華司徒殿下文德英明四海傾屬囚不涯卑遠隨例問訊時節拜覲亦沾眄議自餘令王未被祗拜既不經伏節理無厚薄敕旨製書令有疑則啓囚以天日懸遠未敢塵穢私之疑事衛將軍臣儉宰輔聖朝令望當世囚自斷才短密以咨儉儉為折衷紙迹猶存未解此理云何敢為歷貶朝望云囚輕議乘輿為向誰道若向人道則應有主甲豈有事無髣佛空見羅謗囚性不耐酒親知所悉強進一升便已迷醉其餘事事自申乃徙廣州祥至廣州不得意終日縱酒少時病卒年三十九祥從祖兄彪祥曾祖穆之正胤建元初降封南康縣公虎賁中郎將永明元年坐廟墓不修削爵後為羽林監九年又坐與亡弟母楊別居不相料理楊死不殯葬崇聖寺尼慧首剃頭為尼以五百錢為買棺材以泥洹輿送葬劉墓為有司所奏事寢不出史臣曰魏文帝云文人不護細行古今之所同也由自知情深在物無競身名之外一概可蔑既徇斯道其弊彌流聲裁所加取忤人世向之所以貴身翻成害己故通人立訓為之而不恃也贊曰超宗蘊文粗祖構餘芬劉祥慕異言亦不羣違朝失典流放南濆
