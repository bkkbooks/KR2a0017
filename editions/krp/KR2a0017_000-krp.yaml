body:
  text: 南齊書序南齊書八紀十一志四十列傳合五十九篇梁蕭子顯撰始江淹已為十志沈約又為齊紀而子顯自表武帝别為此書臣等因校正其訛謬而叙其篇目曰將以是非得失興壞理亂之故而為法戒則必得其所託而後能傳扵乆此史之所以作也然而所託不得其人則或失其意或亂其實或析理之不通或設辭之不善故雖有殊功韙德非常之跡将闇而不章鬰而不發而檮杌嵬瑣姦回凶慝之形可幸而掩也甞試論之古之所謂良史者其眀必足以周萬事之理其道必足以適天下之用其智必足以通難知之意其文必足以發難顯之情然後其任可得而稱也何以知其然邪昔者唐虞有神眀之性有㣲妙之徳使由之者不能知知之者不能名以為治天下之本號令之所布法度之所設其言至約其體至備以為治天下之具而為二典者推而眀之所記者豈獨其跡邪并與其深㣲之意而傳之小大精粗無不盡也夲末先後無不白也使誦其説者如出乎其時求其指者如即乎其人是可不謂眀足以周萬事之理道足以適天下之用智足以通難知之意文足以發難顯之情者乎則方是之時豈特任政者皆天下之士哉葢執簡操筆而隨者亦皆聖人之徒也兩漢以來為史者去之逺矣司馬遷從五帝三王既没數千載之後秦火之餘因散絶殘脫之經以及傳記百家之説區區掇拾以集著其善惡之跡興廢之端又創己意以為夲紀世家八書列傳之文斯亦可謂竒矣然而蔽害天下之聖法是非顛倒而采摭謬亂者亦豈少哉是豈可不謂眀不足以周萬事之理道不足以適天下之用智不足以通難知之意文不足以發難顯之情者乎夫自三代以後為史者如遷之文亦不可不謂雋偉拔出之材非常之士也然顧以謂眀不足以周萬事之理道不足以適天下之用智不足以通難知之意文不足以發難顯之情者何哉葢聖賢之髙致遷固有不能純達其情而見之於後者矣故不得而與之也遷之得失如此况其他邪至扵宋齊梁陳後魏後周之書葢無以議為也子顯之扵斯文喜自馳騁其更改破析刻彫藻繢之變尤多而其文益下豈夫材固不可以强而有邪數世之史既然故其事跡曖昧雖有隨世以就功名之君相與合謀之臣未有赫然得傾動天下之耳目播天下之口者也而一時偷奪傾危悖理反義之人亦幸而不暴著扵世豈非所託不得其人故邪可不惜哉葢史者所以眀夫治天下之道也故為之者亦必天下之材然後其任可得而稱也豈可忽哉豈可忽哉臣恂臣寳臣臣穆臣藻臣洙臣覺臣彦若臣鞏謹叙目錄昧死上欽定四庫全書史部一南齊書目録正史類梁蕭子顯撰凡五十九卷本紀八卷志一十一卷列傳四十卷南齊書卷一本紀第一髙帝上姓蕭氏諱道成南齊書卷二本紀第二髙帝下南齊書卷三本紀第三武帝諱賾南齊書卷四本紀第四鬱林王諱昭業南齊書卷五本紀第五海陵王諱昭文南齊書卷六本紀第六眀帝諱鸞南齊書卷七本紀第七東昏侯諱寳卷南齊書卷八本紀第八和帝諱融南齊書卷九志第一禮上南齊書卷十志第二禮下南齊書卷十一志第三樂南齊書卷十二志第四天文上南齊書卷十三志第五天文下南齊書卷十四志第六州郡上南齊書卷十五志第七州郡下南齊書卷十六志第八百官南齊書卷十七志第九輿服南齊書卷十八志第十祥瑞南齊書卷十九志第十一五行南齊書卷二十列傳第一皇后宣孝陳皇后髙昭劉皇后武穆裴皇后文安王皇后鬱林王何妃海陵王王妃眀敬劉皇后東昏褚皇后和帝王皇后南齊書卷二十一列傳第二文恵太子南齊書卷二十二列傳第三豫章文獻王嶷南齊書卷二十三列傳第四褚淵淵弟澄徐嗣王儉南齊書卷二十四列傳第五栁世隆張瓌南齊書卷二十五列傳第六垣崇祖張敬兒南齊書卷二十六列傳第七王敬則陳顯達南齊書卷二十七列傳第八劉懐珍李安民王𤣥載弟𤣥邈南齊書卷二十八列傳第九崔祖思劉善眀蘇侃垣榮祖南齊書卷二十九列傳第十呂安國全景文周山圖周盤龍王廣之南齊書卷三十列傳第十一薛淵戴僧静栢康焦度曺虎南齊書卷三十一列傳第十二江謐荀伯玉南齊書卷三十二列傳第十三王琨張岱褚炫何戢王延之阮韜南齊書卷三十三列傳第十四王僧䖍張緒南齊書卷三十四列傳第十五虞玩之劉休沈沖庾杲之王諶南齊書卷三十五列傳第十六髙祖十二王臨川獻王映長沙威王晃武臨昭王曅安成恭王暠鄱陽王鏘桂陽王鑠始興簡王鑑江夏王鋒南平王鋭宜都王鏗晉熙王銶河東王鉉南齊書卷三十六列傳第十七謝超宗劉詳南齊書卷三十七列傳第十八到撝劉悛虞悰胡諧之南齊書卷三十八列傳第十九蕭景先蕭赤斧子頴胄南齊書卷三十九列傳第二十劉瓛弟璡陸澄南齊書卷四十列傳第二十一武帝十七王竟陵文宣王子良子昭胄廬陵王子卿魚復侯子響安陸王子敬晉安王子懋随郡王子隆建安王子真西陽王子眀南海王子罕巴陵王子倫邵陵王子貞臨賀王子岳西陽王子文衡陽王子峻南康王子琳湘東王子建南郡王子夏南齊書卷四十一列傳第二十二張融周顒南齊書卷四十二列傳第二十三王晏蕭諶蕭坦之江祏南齊書卷四十三列傳第二十四江斆何昌㝢謝卄瀹王思逺南齊書卷四十四列傳第二十五徐孝嗣沈文季南齊書卷四十五列傳第二十六宗室衡陽元王道度始安貞王道生遙光遥昌遥欣安陸昭王緬南齊書卷四十六列傳第二十七王秀之王慈蔡約陸慧曉顧憲之蕭恵基南齊書卷四十七列傳第二十八王融謝朓南齊書卷四十八列傳第二十九袁彖孔稚珪劉繪南齊書卷四十九列傳第三十王奐従弟繢張沖南齊書卷五十列傳第三十一文二王巴陵王昭秀桂陽王昭粲眀七王巴陵隐王寳義江夏王寳𤣥廬陵王寳源鄱陽王寳寅邵陵王寳攸晉熙王寳嵩桂陽王寳貞南齊書卷五十一列傳第三十二裴叔業崔慧景張欣泰南齊書卷五十二列傳第三十三文學丘靈鞠檀超卞彬丘巨源王智深陸厥崔慰祖王逡之祖沖之賈淵南齊書卷五十三列傳第三十四良政傅琰虞愿劉懐慰裴昭眀沈憲李珪之孔琇之南齊書卷五十四列傳第三十五髙逸褚伯玉眀僧紹顧歡臧榮緒何求劉虯庾易宗測杜京産沈驎士呉苞徐伯珍南齊書卷五十五列傳第三十六孝義崔懐慎公孫僧逺呉欣之韓係伯孫淡華寳韓靈敏封延伯呉達之王文殊朱謙之蕭叡眀樂頤江泌杜栖陸綘南齊書卷五十六列傳第三十七倖臣紀僧真劉係宗茹法亮呂文顯呂文度南齊書卷五十七列傳第三十八魏虜南齊書卷五十八列傳第三十九蠻東南夷南齊書卷五十九列傳第四十芮芮虜河南氐羌臣等謹案南齊書五十九卷梁蕭子顯撰子顯事蹟附載梁書蕭子恪傳章俊卿山堂考索引館閣書目云南齊書本六十卷今存五十九卷亡其一劉知幾史通曽鞏叙録則皆云八紀十一志四十列傳合為五十九卷不言其有闕佚然梁書及南史子顯本傳實俱作六十卷則館閣書目不為無據考南史載子顯自序似是據其叙傳之詞又晁公武讀書志載其進書表云天文事秘户口不知不敢私載疑原書六十卷為子顯叙傳末附以表與李延夀北史例同至唐已佚其叙傳而其表至宋猶存今又併其表佚之故較本傳闕一卷也又史通序例篇謂令升先覺逺述邱明史例中興於是為盛沈宋之志序蕭齊之序録雖以序為名其實例也子顯雖文傷蹇躓而義甚優長為序例之美者今考此書良政髙逸孝義倖臣諸傳皆有序而文學傳獨無序殆亦宋以後所殘闕歟齊髙好用圖讖梁武崇尚釋氏故子顯於髙帝紀卷一引太乙九宫占祥瑞志附㑹緯書髙逸傳論推闡禪理葢牽於時尚未能釐正又如髙帝紀載王藴之撫刀袁粲之郊飲連綴瑣事殊乖紀體至列傳尤為冗襍然如紀建元創業諸事載沈攸之書於張敬兒傳述顔靈寳語於王敬則傳直書無隠尚不失是非之公髙十二王傳引陳思之表曹冏之論感懐宗國有史家言外之意焉未嘗無可節取也自李延夀之史盛行此書誦習者尠日就訛脱州郡志及桂陽王傳中均有闕文無從補正其餘字句舛誤如謝莊傳南史作詔徙越巂此書作越州崔懐慎傳南史作臣子兩遂此書作兩節者又不可勝乙今裒合諸本參核異同正其灼然可知者其或無考則從闕疑之義焉乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫純臣孫士毅總校官臣陸費墀
