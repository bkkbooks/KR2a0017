body:
  text: 南齊書卷二十二列傳第三豫章文獻王豫章文獻王嶷字宣儼太祖第二子寬仁弘雅有大成之量太祖特鍾愛焉起家為太學博士長城令入為尚書左民郎錢唐令太祖破薛索兒改封西陽以先爵賜為晉壽縣侯除通直散騎侍郎以偏憂去官桂陽之役太祖出頓新亭壘板嶷為寧朔將軍領兵衛從休範率士卒攻壘南嶷執白虎幡督戰屢摧却之事寧遷中書郎尋為安遠護軍武陵內史時沈攸之責賧伐荊州界內諸蠻遂反及五溪禁斷魚鹽羣蠻怒酉溪蠻王田頭擬殺攸之使攸之責賧千萬頭擬輸五百萬發氣死其弟婁侯篡立頭擬子田都走入獠中於是蠻部大亂抄掠平民至郡城下嶷遣隊主張莫兒率將吏擊破之田都自獠中請立而婁侯懼亦歸附嶷誅婁侯於郡獄命田都繼其父蠻衆乃安入為宋從帝車騎咨議參軍府掾轉驃騎仍遷從事中郎詣司徒袁粲粲謂人曰後來佳器也太祖在領軍府嶷居清青溪宅蒼梧王夜中微行欲掩襲宅內嶷令左右刀於中庭蒼梧從出方攴閒窺見以為有備乃去太祖帶南六允州鎮軍府長史蕭順之在鎮憂危既切期渡江北起兵嶷諫曰主上狂凶人下不自保單行道路易以立功外州起兵鮮有克勝物情疑惑必先人受禍今於此立計萬不可失蒼梧王殞太祖報嶷曰大事已判汝明可早入從帝即位轉侍中總宮內直衛沈攸之之難太祖入朝堂嶷出鎮東府加冠軍將軍袁粲舉兵夕丹陽丞王遜告變先至東府嶷遣帳內軍主戴元孫二千人隨薛道淵等俱至石頭焚門之功元孫預焉先是王蘊薦部曲六十人助為城防實以為內應也嶷知蘊懷二不給其仗散處外省及難作搜檢皆已亡去遷中領軍加散騎常侍上流平後世祖自尋陽還嶷出為使持節都督江州豫州之新蔡晉熙二郡軍事左將軍江州刺史常侍如故給鼓吹一部以定策功改封永安縣公千五百戶仍徙都督荊湘雍益梁寧南北秦八州諸軍事鎮西將軍荊州刺史持節常侍如故時太祖輔政嶷務在省約停府州儀迎物初沈攸之欲聚衆開民相告士庶坐執役者甚衆嶷至鎮一日遣三千餘人見囚五歲刑以下不連臺者皆原遣以市稅重濫更定胓格以稅還民禁諸市調及苗籍二千石官長不得與人為公市宜諸曹吏聽分番假百姓甚悅禪讓之閒世祖欲速定大業嶷依違其事默無所言建元元年太祖即位赦詔未至嶷先下令蠲除國部內升明二年以前逋負遷侍中尚書令都督揚南徐二州諸軍事驃騎大將軍開府儀同三司揚州刺史持節如故封豫章郡王邑三千戶僕射王儉箋曰舊楚蕭條仍歲多故荒民散亡實須緝理公臨蒞甫爾英風惟穆江漢來蘇八州慕義自庾亮以來荊楚無復如此美政古人朞月有成而公旬日致治豈不休哉會北虜動上思為經略乃詔曰神牧總司王畿誠為治要荊楚領馭遐遠任寄弘隆自頃公私凋盡綏撫之宜尤重日復以為都督荊湘雍益梁寧南北秦八州諸軍事南蠻校尉荊湘二州刺史持節侍中將軍開府如故晉宋之際刺史多不領南蠻別以重人居之至是有二府二州荊州資費歲錢三千萬布萬匹米六萬斛又以江湘二州米十萬斛給鎮府湘州資費歲七百萬布三千匹米五萬斛南蠻資費歲三百萬布萬匹綿千斤絹三百匹米千斛近代莫比也尋給油絡俠望車二年春虜寇司豫二州嶷表遣南蠻司馬崔慧景北討又分遣中兵參軍蕭惠朗援司州屯西關虜軍濟淮攻壽春分騎當出隨鄧衆以為憂嶷曰虜入春夏非動衆時令豫司彊守遏其津要彼見堅嚴自當潰散必不敢越二鎮而南也是時纂嚴嶷以荊州鄰接蠻蛋慮其生心令鎮內皆緩服既而虜竟不出樊鄧於壽春敗走尋給班劒二十人其夏於南蠻園東南開館立學上表言狀置生四十人取舊族父祖位正佐臺郎年二十五以下十五以上補之置儒林參軍一人文學祭酒一人勸學從事二人行釋菜禮以穀過賤聽民以米當口錢優評斛一百義陽劫帥張羣亡命積年鼓行為賊義陽武陵天門南平四郡界被其殘破沈攸之連討不能禽乃首用之攸之起事羣從下郢於路先叛結寨於三溪依據深險嶷遣中兵參軍虞欣祖為義陽太守使降意誘納之厚為禮遺於坐斬首其黨數百人皆散四郡獲安入為都督揚南徐二州諸軍事中書監司空揚州刺史持節侍中如故加兵置佐以前軍臨川王映府文武配司空府嶷以將還都修治廨宇及路陌東歸部曲不得齎府州物出城發江津士女觀送數千人皆垂泣嶷發江陵感疾至京師未瘳上深憂慮為之大赦三年六月壬子赦令是也疾愈上幸東府設金石樂敕得乘輿至宮六門太祖崩嶷哀號眼耳皆出血世祖即位進位太尉置兵佐解侍中增班劒為三十人建元年中世祖以事失旨太祖頗有代嫡之意而嶷事世祖恭悌盡禮未嘗違忤顏色故世祖友愛亦深永明元年領太子太傅解中書監餘如故手啓上曰陛下以睿孝纂業萬𧜛惟新諸弟有序臣屢荷隆愛叨授台首不敢固辭俯仰祗寵心魂如失負重量力古今同規臣窮生如浮質操空素任居鼎右已移氣序自頃以來宿疾稍纏心慮恍惚表於容狀視此根候常恐命不勝恩加以星緯屢見災祥雖修短有能不耿介比心欲從俗啓解今職但厝辭為鄙或貽物誚所以息意緘默一委時運而可復加寵榮增其顛墜且儲傅之重實非選遂使太子見臣必束帶宮臣皆再拜二三之宜何以當此陛下同生十餘今唯臣而已友于之愛豈當獨臣鍾其隆遇別奉啓事仰祈恩照臣近亦侍言太子告意子良具因王儉申啓未知粗上聞未福慶方隆國祚永始若天假臣年得預人位唯當請降貂璫以飾微軀永侍天顏以惟畢世此臣之願也服之不衷猶為身災況寵爵乎殊榮厚恩必誓以命請上答曰事中恐不得從所陳宋氏以來州郡秩俸及雜供給多隨土所出無有定准嶷上表曰循革貴宜損益資用治在風夙均政由一典伏尋郡縣長尉俸祿之制雖有定科而其餘資給復由風俗東北異源西南各緒習以為常因而弗變緩之則莫非通規澄之則靡不入罪殊非約法明章先令後刑之謂也臣謂宜使所在各條公用公田秩石迎送舊典之外守宰相承有何供調尚書精加洗核務令優衷事在可通隨宜開許損公侵民一皆乙止却明立定格班下四方永為制從之嶷不參朝務而言事密謀多見信納服闋加侍中二年詔曰漢之梁孝寵異列蕃晉之文獻秩殊序況乃地侔前准勳兼往式雖天倫有本而因事增情宜廣田邑用申恩禮增封為四千戶宋元嘉世諸王入齊閣得白服帽見人主唯出太極四廟廂乃備朝服自此比以來此事一斷上與嶷同生相友睦宮內曲宴許依元嘉嶷固辭不奉敕唯車駕幸第乃白服烏紗帽以侍宴焉啓自陳曰臣自還朝便省儀刀捉刀左右十餘亦省唯郊外遠行或復暫有入殿亦省服身今所牽仗二俠轂二白直共七八十人事無大小臣必欲上啓伏度聖心脫未委曲或有言其多少不附事實仰希即賜垂敕又啓揚州刺史舊有六白領合扇二白拂臣脫以為疑不審此當云何行園苑中乘輿出籬門外乘輿鳴角皆相仍如此非止於帶神州者未審此當云何方有行來不可失衷上答曰儀刀捉刀不應省也俠轂白直乃可共百四五十以還正是耳亦不曾聞人道此吾自不使諸王無仗況復汝耶在私園苑中乘此非疑郊外鳴角及合扇并拂先乃有不復施用此來甚久凡在鎮自異還京師先廣州乃立鼓吹交部遂有輦事隨時而改亦復有可得依舊者汝若有疑可與王儉諸人量衷但令人臣之儀無失便行也又啓曰臣拙知自處暗於疑訪常見素姓扶詔或著布屩不意為異臣在西朝拜王儀飾悉依宋武陵事例有二鄣扇仍此下都脫不為疑小兒奴子並青布袴衫臣齊中亦有一人意謂外庶所服不疑與羊車相類曲荷慈旨今悉改易臣昔在邊鎮不無羽衛自歸朝以來便相分遣俠轂白直格置三百許人臣頃所引不過一百常謂京師諸王不煩牽仗若郊外遠行此所不論有仗者非臣一人所以不容方幅啓省又因王儉備宣下情臣出入榮顯禮容優泰第宇華曠事乖素約雖宋之遺製恩處有在猶深非服之慙威衛之請仰希曲照上答曰傳詔臺家人耳不足涉嫌鄣扇吾識及以來未見故有敕耳小兒奴子本非嫌也吾有所聞豈容不敕汝知令物致議耶吾已有敕汝一人不省俠轂但牽之吾昨不通仗事儉已道吾即令答不煩有此啓須閒言自更一二又啓曰違遠侍宴將踰一紀憂苦閒之始得開顏近頻侍座不勝悲喜沽沾飲過量實欲仰示恩狎令自下知見以杜游塵陛下留恩子弟此情何異外物政自彊生閒節聲其厚薄伏度或未上簡臣前在東田承恩過醉實思歎往秋之謗故言啓至切亦令羣物聞之伏願已照此心前侍幸順之宅臣依常乘車至仗後監伺不能示臣可否便互競啓閒聞云臣車逼突黃屋麾旄如欲相中推此用意亦何容易仰賴慈明即賜垂敕不爾臣終不知暗貽此纍比日禁斷整密此自常理外聲乃云起臣在華林輒捉御刀因此更嚴度情推理必不容爾為復上啓知耳但風塵易至和會實難伏願猶憶臣石頭所啓無生閒縫比間侍無次略附茹亮口宣臣由來華素已具上簡每欲存衷意慮不周或有乖當且臣五十之年為玩幾時為此亦復不能以理內自剝制北第舊邸本自甚華臣改修正而已小小製置已自仰簡往歲收合得少雜材并蒙賜故板啓榮內許作小眠齊始欲成就皆補接為辦無乖格製要是柳柏之華一時新淨東府又有齊亦為華屋而臣頓有二處住止下情竊所未安訊訪東宮玄圃乃有柏屋製甚古拙內中無此齊臣乃欲壞取以奉太子非但失之於前且補接既多不可見移亦恐外物或為異論不審可有垂許送東府齊理否臣公家住止率爾可安臣之今啓實無意識亦無言者太子亦不知臣有此屋政以東宮無而臣自處之體不宜爾爾所啓蒙允臣便當敢成第屋安之不疑陛下若不照體臣心便當永廢不修臣自謂今啓非但是自處宜然實為微臣往事伏願必垂降許伏見以諸王舉貨屢降嚴旨少拙營生已應上簡府州郡邸舍非臣私有今巨細所資皆是公潤臣私纍不少未知將來罷州之後或當不能不試學營覔以自贍連年惡疾餘顧影單回無事畜聚唯逐手為樂耳上答曰茹亮今啓汝所懷及見別紙汝勞疾亦復那得不動何意為作煩長啓事凡諸普敕此意可尋當不關汝一人也宜有敕事吾亦必道頃見汝自更委悉書不欲多及屋事慎勿彊厝此意白澤亦當不解何意爾三年文惠太子講孝經畢嶷求解太傅不許皇孫婚竟又陳解詔曰公惟德惟行無所厝辭且魯且衛其誰與二方式範當時流聲史籍豈容屢秉撝謙以乖期寄嶷常慮盛滿又因言宮宴求解揚州授竟陵王子良上終不許曰畢汝一世無所多言世祖即位後頻發詔拜陵不果行遣嶷拜陵還過延陵季子廟觀沸井有水牛突部伍直兵執牛推問不許取絹一匹橫繫牛角放歸其家為治存寬厚故得朝野歡心四年唐𧜛之賊起啓上曰此段小寇出於凶愚天網宏罩理不足論但聖明御世幸可不爾比藉聲聽皆云有由而然豈得不仰啓所懷少陳心款山海崇深臣獲保安樂公私情願於此可見齊有天下歲月未久澤沾萬民其實未多百姓猶險懷惡者衆陛下曲垂流愛每存優旨但頃小大士庶每以小利奉公不顧所損者大撻擲籍檢工巧督恤簡小塘藏丁匿口凡諸條制實長怨府此目前交利非天下大計一室之中尚不可精𧜛宙之內何可周視洗公家何嘗不知民多欺巧古今政以不可細碎故不為此實非乖理但識理者百不有一陛下弟兒大臣猶不皆能伏理況復天下悠悠萬品怨積聚黨凶迷相類止於一處何足不除脫復多所便成紜紜久欲上啓間侍無因謹陳愚管伏願特留神思上答曰欺巧那可容宋世混亂以為是不蚊蟻何足為憂已為義勇所破官軍昨至今都應散滅吾政恨其不辦大耳亦何時無亡命邪後乃詔聽復籍注五年進位大司馬八年給皂輪車尋加中書監固讓嶷身長七尺八寸善持容範文物衛從禮冠百僚每出入殿省皆瞻望嚴肅自以地位隆重深懷退素北宅舊有園田之美乃盛修理之七年啓求還第上令世子子廉代鎮東府上數幸嶷第宋長寧陵要道出第前路上曰我便是入他冢墓內尋人乃徙其表闕騏驎於東岡上騏驎及闕形勢甚巧宋孝武於襄陽致之後諸帝王陵皆模範而莫及也永明末車駕數游幸唯嶷陪從上出新林苑同輦夜歸至宮門嶷下輦辭出上曰今夜行無使為尉司所呵也嶷對曰京輦之內皆屬臣州願陛下不垂過慮上大笑上謀北伐以虜所獻氈車賜嶷每幸第清除不復屏人上敕外監曰我往大司馬第是還家耳妃庾氏常有疾瘳上幸嶷邸後堂設金石樂宮人畢至每臨幸輒極日盡歡嶷謂上曰古來言願陛下壽偕南山或稱萬歲此殆近貌言如臣所懷實願陛下極壽百年亦足矣上曰百年復何可得止得東西一百於事亦濟十年上封嶷諸子舊例千戶嶷欲五子俱封啓減人五百戶其年疾篤表解職不許賜錢百萬營功德嶷又啓曰臣自嬰今患亟降天臨醫徙術官泉開藏府慈寵優渥備極人臣生年疾迫遽陰無幾願陛下審賢與善極壽蒼旻彊德納和為億兆御臣命違昌數奄奪恩憐長辭明世伏涕嗚咽薨年四十九其日上再視疾至薨乃還宮詔曰嶷明哲至親勳高業始德懋王朝道光區縣奄至薨逝痛酷抽割不能自勝奈何奈何今便臨哭九命之禮宜備其制斂以衮冕之服溫明祕器命服一具衣一襲喪事一依漢東平王故事大鴻臚持節護喪事大官朝夕送奠大司馬太傅二府文武悉停過葬竟陵王子良啓上曰臣聞春秋所以稱王母弟者以尊其所重故也是以禮秩殊品爵命崇異在漢則梁王備出警入蹕之儀在晉則齊王具殊服九命之贈江左以來尊親是闕故致衮章之典廢而不傳實由人缺其位非禮虧省齊王故事與今不殊締構王業功迹不異凡有變革隨時之宜者政緣恩情有輕重德義有厚薄若事籌前規禮無異則且梁齊闕令終之美猶饗褒贈之榮況故大司馬仁和著於天性孝悌終於立身節義表於勤王寬猛彰於御物奉上無艱劬之貌接下無毀傷之容淡矣止於清貞無喜慍之色悠然栖於靜默絶馳競之聲詩云靡不有初鮮克有終夫終之者理實為難在於今行無廢斯德東平樂於小善河閒悅於詩書勳績無聞艱危不涉尚致卓爾不羣英聲萬代況今協贊皇基經綸霸始功業高顯清譽逾彰富貴隆重廉潔彌峻等古形今孰類茲美臣愚忖度未有斯例凡庶族同氣愛睦尚少豈有仰覩陛下垂友于之性若此者乎共起布衣俱登天貴生平遊處何事不同分甘均味何珍不等未常覩貌而天心不歡見形而聖儀不悅爰及臨危捨命親瞻喘息萬分之際沒在聖目號哭動乎天地感慟驚乎鬼神乃至撤膳移寢坐泣遷旦神儀損耗隔宿改容奉瞻聖顏誰不悲悚歷古所未聞記籍所不載既有若斯之大德實不可見典服之贈不彰如其脫致虧忘追改為煩不令千載之下物有遺恨其德不具美者尚荷嘉隆之命況事光先烈者寧可缺茲盛典臣恐有識之人容致其議且庶族近代桓溫庾亮之類亦降殊命伏度天心已當有在又詔曰寵章所以表德禮秩所以紀功慎終追遠前王之盛策纍行疇庸列代之通誥故使持節都督揚南徐二州諸軍事大司馬領太子太傅揚州刺史新除中書監豫章王嶷體道秉哲經仁緯義挺清譽於弱齡發韶風於早日締綸霸業之初翼讚皇基之始孝睦著於鄉閭忠諒彰乎邦邑及秉德論道總牧神甸七教必荷六府咸理振風潤雨無愆於時候恤民拯物有篤於矜懷雍容廊廟之華儀形列郡之觀神凝自遠具瞻允集朕友于之深情兼家國方授以神圖委諸廟勝緝頌九紘陪禪五嶽天不遺奄焉薨逝哀痛傷惜震慟乎厥心今先遠戒期龜謀襲吉宜加茂典以協徽猷可贈假黃鉞都督中外諸軍事丞相揚州牧緑綟綬具九服錫命之禮侍中大司馬太傅王如故給九旒鸞輅黃屋左纛虎賁班劒百人轀輬車前後部羽葆鼓吹葬送儀依東平王故事嶷臨終召子子廉子恪曰人生在世本自非常吾年已老前路幾何居今之地非心期所及性不貪聚自幼所懷政以汝兄弟纍多損吾暮志耳無吾欲後當共相勉厲篤睦為先才有優劣位有通塞運有富貧此自然理無足以相陵侮若天道有靈汝等各自修立灼然之分無失也勤學行守基業治閨庭尚間素如此足無憂患聖主儲皇及諸親賢亦當不以吾沒易情也三日施靈唯香火槃水干盂飯酒脯檳榔而已朔望菜食一盤加以甘果此外悉省葬後除靈可施吾常所乘輿扇繖朔望時節席地香火槃水酒脯干盂飯檳榔便足雖才愧古人意懷粗亦有在不以遺財為纍主衣所餘小弟未婚諸妹未嫁凡應此用本自茫然當稱力及時率有為辦事事甚多不復甲乙棺器及墓中勿用餘物為後患也朝服之外唯下鐵鐶刀一口作冢勿令深一一依格莫過度也後堂樓可安佛供養外國二僧餘皆如舊與汝遊戲後堂船乘吾所乘牛馬送二宮及司徒服飾衣裘悉為功德子廉等號泣奉行世祖哀痛特至至冬乃舉樂宴朝臣上歔欷流涕諸王邸不得起樓臨瞰宮掖上後登景陽望見樓悲感乃敕毀之薨後第庫無見錢世祖敕貨雜物服飾得數百萬起集善寺月給第見錢百萬至上崩乃省嶷性泛愛不樂聞人過失左右有投書相告置鞾中竟不視取火焚之齊庫失火燒荊州還資評直三千餘萬主局各杖數十而已羣吏中南陽樂藹彭城劉繪吳郡張稷最被親禮藹與竟陵王子良箋曰道德以可久傳聲風流以浸遠揮稱雖復青簡締芳未若玉石之不朽飛翰圖藻豈伊雕篆之無沫丞相沖粹表於天真淵照殆乎機象經邦緯民之範體國成務之規故以業茂惟賢功高則哲神輝眇邈睿算不追感纏奉車恨百留滯下官夙禀名節恩義軫慕望要結哀輒欲率荊江湘三州僚吏建碑壟首庶徽猷有述茂則方存昔子香淳德留銘江介巨平遺烈墮淚漢南況道尊前往惠積聯綿者哉下官今便反假無由躬事刊斫須至西州鳩集所資託中書侍郎劉繪營辦藹又與右率沈約書曰夫道宣餘烈竹帛有時先朽德孚遺事金石更非後亡丞相獨秀生民傍照日月標勝丘園素履穆於忠義譽應華衮功迹著於弼諧無得而稱理絶照載若夫日用闃寂雖無取於錙銖歲功宏達諒有寄於衡石竊承貴州士民或建碑表俾我荊南閲感無地且作紀江漢道基分陝衣冠禮樂咸被後昆若其望碑盡禮我州之舊俗傾玣罷肆鄙士土之遺風庶幾弘烈或不泯墜荊江湘三州策名不少竝欲各率毫釐少申景慕斯文之託歷選惟疑必待文蔚辭宗德僉茂履非高明而誰豈能騁無愧之辭酬式瞻之望吾西州窮士一介寂寥恩周榮譽澤遍衣食永惟道廕日月就遠緬尋遺烈觸目崩心常謂福齊南山慶鍾仁壽吾儕小人貽塵帷蓋豈圖一旦遂投此請約答曰丞相風道弘曠獨秀生民凝猷盛烈方軌伊旦遺之感朝野同悲承當刊石紀功傳華千載宜須盛述實允來談郭有道漢末之匹夫非蔡伯喈不足以偶三絶謝安石素族之台輔時無麗藻迄乃有碑無文況文獻王冠冕倫儀形𧜛內自非一世辭宗難或與此約閭閈鄙人名不入第歘酬今旨便是以禮許人聞命慙顏已不覺汗之沾背也建武中第二子子恪託約及太子詹事孔稚圭為文子廉字景藹初嶷養魚復侯子響為世子子廉封永新侯千戶子響還本子廉為世子除寧朔將軍淮陵太守太子中書舍人前軍將軍善撫諸弟子十一年卒贈侍中諡哀世子第三子子操泉陵侯王侯出身官無定准素姓三公長子一人為員外郎建武中子操解褐為給事中自此齊末皆以為例永泰元年南康侯子恪為吳郡太守避王敬則難奔歸以子操為寧遠將軍吳郡太守永元中為黃門郎義師圍城子操與弟宜陽侯子光卒於尚書都座第四子子行洮陽侯早卒子元琳嗣今上受禪詔曰褒隆往代義炳彝則朕當此樂推思弘前典豫章王元琳故巴陵王昭秀胄子周同齊氏宗國高武嫡胤宜祚井邑以傳世祀降新淦縣侯五百戶史臣曰楚元王高祖亞弟無功漢世東平憲王辭位永平未及光武之業梁孝惑於勝詭安平心隔晉運蕃輔貴盛地實高危持滿戒盈鮮能全德豫章宰相之器誠有天真因心無矯率由遠度故能光贊二祖內和九族實同周氏之初周公以來則未知所匹也贊曰堂堂烈考德邁前蹤移忠以孝植友惟恭帝載初造我王奮庸邦家有闕我王彌縫道深日用事緝民雍愛傳餘祀聲流景鍾
