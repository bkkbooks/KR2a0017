body:
  text: 南齊書卷九志第一禮上禮儀繁博與天地而為量紀國立君人倫攸始三代遺文略在經誥蓋秦餘所亡逸也漢初叔孫通制漢禮而班固之志不載及至東京太尉胡廣撰舊儀左中郎蔡雍造獨斷應劭蔡質咸綴識時事而司馬彪之書不取魏氏籍漢末大亂舊章殄滅侍中王粲尚書衛覬集創朝儀而魚豢王沈陳壽孫盛並未詳也吳則太史令丁孚拾遺漢事蜀則孟光許慈草建衆典晉初司空荀覬因魏代前事撰為晉禮參考今古更其節文羊祜任愷庾峻應貞並共刪集成百六十五篇後摯虞傅咸穓續此製未及成功中原覆沒今虞之決疑注是遺事也江左僕射刁協太常荀嵩補緝舊文光祿大夫蔡謨又踵修輯朝故宋初因循改革事係羣儒其前史所詳並不重述永明二年太子步兵校尉伏曼容表定禮樂於是詔尚書令王儉制定新禮立治禮樂學士及職局置舊學四人新學六人正書令史各一人幹一人祕書省差能書弟子二人因集前代撰治五禮吉凶賓軍嘉也文多不載若郊廟庠序之儀冠婚喪紀之節事有變革宜録時事者備今志其輿輅旗常與往代同異者更立別篇建元元年七月有司奏郊殷之禮未詳郊在何年復以何祖配郊殷復在何時未郊得先殷與不明堂亦應與郊同年而祭不若應祭者復有配與無配不祀者堂殿職僚毀置云何八座丞郎通關博士議曹郎中裴昭明儀曹郎中孔逖議今年七月宜殷祠來年正月宜南郊明堂並祭而無配殿中郎司馬憲議南郊無配饗祠如舊明堂無配宜應廢祀其殷祠同用今年十月右僕射王儉議案禮記王制天子先祫後時祭諸侯先時祭後祫春秋魯僖二年祫明年春禘自此以後五年再殷禮緯稽命徵曰三年一祫五年一禘經記所論禘祫與時祭其言詳矣初不以先殷後郊為嫌至於郊配之重事由王迹是故杜林議云漢業特起不因緣堯宜以高帝配天魏高堂隆議以舜配天蔣濟云漢時奏議謂堯已禪舜不得為漢祖舜亦已禪禹不得為魏之祖今宜以武皇帝配天晉宋因循即為前式又案禮及孝經援神契並云明堂有五室天子每月於其室聽朔布教祭五帝之神配以有功德之君大戴禮記曰明堂者所以明諸侯尊卑也許慎五經異義曰布政之宮故稱明堂明堂盛貌也周官匠人職稱明堂有五室鄭玄云周人明堂五室帝一室也初不聞有文王之寢鄭志趙商問云説者謂天子廟制如明堂是為明堂即文廟邪鄭答曰明堂主祭上帝以文王配耳猶如郊天以后稷配也袁孝尼云明堂法天之宮本祭天帝而以文王配配其父於天位則可牽天帝而就人鬼則非義也太元十三年孫耆之議稱郊以祀天故配之以后稷明堂以祀帝故配之以文王由斯言之郊為皇天之位明堂即上帝之廟徐邈謂配之為言必有神主郊為天壇則堂非文廟史記云趙綰王臧欲立明堂于時亦未有郊配漢又祀汾陰五畤即是五帝之祭亦未有郊配議者或謂南郊之日已旅上帝若又以無配而特祀明堂則一日再祭於義為黷案古者郊本不共日蔡雍獨斷曰祠南郊祀畢次北郊又次明堂高廟世祖廟謂之五供馬融云郊天之祀咸以夏正五氣用事有休有王各以其時兆於方郊四時合歲功作相成亦以此月總旅明堂是則南郊明堂各日之證也近代從省故與郊同日猶無煩黷之疑何者其為祭雖同所以致祭則異孔朝云言五帝佐天化育故有從祀之禮旅上帝是也至於四郊明堂則是本祀之所譬猶功臣從饗豈復廢其私廟且明堂有配之時南郊亦旅上帝此則不疑於共日今何故致嫌於同辰又禮記天子祭天地四方山川五祀歲遍尚書堯典咸秩無文詩云昭事上帝聿懷多福據此諸義則四方山川猶必享祀五帝大神義不可略魏文帝黃初二年正月郊天地明堂明帝太和元年正月以武皇帝配天文皇帝配上帝然則黃初中南郊明堂皆無配也又郊日及牲色異議紛然郊特牲云郊之用辛周之始郊也盧植云辛之為言自新潔也鄭玄云用辛日者為人當齋戒自新潔也漢魏以來或丁或己而用辛常多考之典據辛日為允郊特牲又云郊牲幣宜以正色繆襲據祭法云天地騂犢周家所尚魏以建丑為正牲宜尚白白虎通云三王祭天一用夏正所以然者夏正得天之數也魏用異朔故牲色不同今大齊受命建寅創曆郊廟用牲一依晉宋謂宜以今年十月殷祀宗廟自此以後五年再殷來年正月上辛有事南郊宜以共日還祭明堂又用次辛饗祀北郊而並無配犧牲之色率由舊章詔可明堂可更詳有司又奏明堂尋禮無明文唯以孝經為正竊尋設祀之意蓋為文主有配則祭無配則止愚謂既配上帝則以帝為主今雖無配不應闕祀徐邈近代碩儒每所折衷其云郊為天壇則堂非文廟此實明據內外百司立議已定如更詢訪終無異説傍儒依史竭其管見既聖旨惟疑羣下所未敢詳廢置之宜仰由天鑒詔依舊建元四年世祖即位其秋有司奏尋前代嗣位或於仍前郊年或別更始晉宋以來未有畫一今年正月已郊未審明年應南北二郊祀明堂與不依舊通關八座丞郎博士議尚書令王儉議案秦為諸侯雜祀諸畤始皇并天下未有定祠漢高受命因雍四畤而起北畤始祠五帝未定郊丘文帝六年新垣平議初起渭陽五帝廟武帝初至雍郊見五畤後常三歲一郊祠雍元鼎四年始立后土祠於汾陰明年立太一祠於甘泉自是以後二歲一郊與雍更祠成帝初即位丞相匡衡於長安定南北郊哀平之際又復甘泉汾陰祠平帝元始五年王莽奏依匡衡議還復長安南北郊光武建武二年定郊祀兆於洛陽魏晉因循率由漢典雖時或參差而類多間歲至於嗣位之君參差不一宜有定制檢晉明帝太寧三年南郊其年九月崩成帝即位明年改元即郊簡文咸安二年南郊其年七月崩孝武即位明年改元亦郊宋元嘉三十年正月南郊其年二月崩孝武嗣位明年改元亦郊此則二代明例差可依放謂明年正月宜饗祀二郊虔祭明堂自茲厥後依舊間歲尚書領國子祭酒張緒等十七人並同儉議詔可永明元年當南郊而立春在郊後世祖欲遷郊尚書令王儉啓案禮記郊特牲云郊之祭也迎長日之至也大報天而主日也易説三王之郊一用夏正盧植云夏正在冬至後傳曰啓蟄而郊此之謂也然則圜丘與郊各自行不相害也鄭玄云建寅之月晝夜分而日長矣王肅曰周以冬祭天於圜丘以正月又祭天以祈穀祭法稱燔柴太壇則圜丘也春秋傳云啓蟄而郊則祈穀也謹尋禮傳二文各有其義盧王兩説有若合符中朝省二丘以并二郊即今之郊禮義在報天事兼祈穀既不全以祈農何必俟夫啓蟄史官唯見傳義未達禮旨又尋景平元年正月三日辛丑南郊其月十一日立春元嘉十六年正月六日辛未南郊其月八日立春此復是近世明例不以先郊後春為嫌若或以元日合朔為礙者則晉成帝咸康元年正月一日加元服二日親祠南郊元服之重百僚備列雖在致齋行之不疑今齋內合朔此即前準若聖心過恭寧在嚴潔合朔之日散官備防非預齋之限者於止車門外別立幔省若日色有異則列於省前望實為允謂無煩遷日從之永明二年祠部郎中蔡履議郊與明堂本宜異日漢東京禮儀志南郊禮畢次北郊明堂高廟世祖廟謂之五供蔡雍所據亦然近世存省故郊堂共日來年郊祭宜有定準太學博士王祐議來年正月上辛宜祭南郊次辛有事明堂後辛饗祀北郊兼博士劉蔓議漢元鼎五年以辛巳行事自後郊日略無違異元封元年四月癸卯登封泰山坐明堂五年甲子以高祖配漢家郊祀非盡天子之縣故祠祭之月事有不同後漢永平以來明堂兆於國南而郊以上丁故供修三祀得并在初月雖郊有常日明堂猶無定辰何則郊丁社甲有説則從經禮無文難以意造是以必算良辰而不祭寅丑且禮之奠祭無同共者唯漢以朝日合於報天爾若依漢書五供便應先祭北郊然後明堂則是地先天食所未可也兼太常丞蔡仲熊議鄭志云正月上辛祀后稷於南郊還於明堂以文王配故宋氏創立明堂郊還即祭是用鄭志之説也蓋為志者失非玄意也玄之言曰未審周明堂以何月於月令則以季秋案玄注月令季秋大饗帝云大饗遍祭五帝又云大饗於明堂以文武配其時秋也去啓蟄遠矣又周禮大司樂凡大祭祀宿縣尋宿縣之旨以日出行事故也若日暗而後行事則無假預縣果日出行事何得方俟郊還東京禮儀志不記祭之時日而志云天郊夕牲之夜夜漏未盡八刻進熟明堂夕牲之夜夜漏未盡七刻進熟尋明堂之在郊前一刻而進獻奏樂方待郊還魏高堂隆表九日南郊十日北郊十一日明堂十二日宗廟案隆此言是審于時定制是則周禮二漢及魏皆不共日矣禮以辛郊書以丁祀辛丁皆合宜臨時詳擇太尉從事中郎顧憲之議春秋傳以正月上辛郊祀禮記亦云郊之用辛尚書獨云丁巳用牲于郊先儒以為先甲三日辛後甲三日丁可以接事天神之日後漢永平二年正月辛未宗祀光武皇帝於明堂辛既是常郊之日郊又在明堂之前無容不郊而堂則理應郊堂司徒西閣祭酒梁王議孝經鄭玄注云上帝亦天別名如鄭旨帝與天亦言不殊近代同辰良亦有據魏太和元年正月丁未郊祀武皇帝以配天宗祀文皇帝於明堂以配上帝此則已行之前準驍騎將軍江淹議郊旅上天堂祀五帝非為一日再黷之謂無俟釐革尚書陸澄議遺文餘事存乎舊書郊宗地近勢可共日不共者義在必異也元始五年正月六日辛未郊高皇帝以配天二十二日丁亥宗祀孝文於明堂配上帝永平二年正月辛未宗祀五帝於明堂光武皇帝配章帝元和二年巡狩岱宗柴祭翌日祠五帝於明堂柴山祠地尚不共日郊堂宜異於例益明陳忠奏事云延光三年正月十三日南郊十四日北郊十五日明堂十六日宗廟十七日世祖廟仲遠五祀紹統五供與忠此奏皆為相符高堂隆表二郊及明堂宗廟各一日摯虞新禮議明堂南郊間三兆禋天饗帝共日之證也又上帝非天昔人言之已詳今明堂用日宜依古在北郊後漢唯南郊備大駕自北郊以下車駕十省其二今祠明堂不應大駕尚書令王儉議前漢各日後漢亦不共辰魏晉故事不辨同異宋立明堂唯據自郊徂宮之義未達祀天旅帝之旨何者郊壇旅天甫自詰朝還祀明堂便在日昃雖致祭有由而煩黷斯甚異日之議於理為弘春秋感精符云王者父天母地則北郊之祀應在明堂之先漢魏北郊亦皆親奉晉泰寧有詔未及遵遂咸和八年甫得營繕太常顧和秉議親奉康皇之世已經遵用宋氏因循未遑釐革今宜親祠北郊明年正月上辛祠昊天次辛助后土後辛祀明堂御並親奉車服之儀率遵漢制南郊大駕北郊明堂降為法駕袞冕之服諸祠咸用詔可建武二年通直散騎常侍庾曇隆啓伏見南郊壇員兆外內永明中起瓦屋形製宏壯檢案經史無所準據尋周禮祭天於圜丘取其因高之義兆於南郊就陽位也故以高敞貴在上昭天明旁流氣物自秦漢以來雖郊祀參差而壇域中間並無更立宮室其意何也政是質誠尊天不自崇樹兼事通曠必務開遠宋元嘉南郊至時權作小陳帳以為退息泰始薄加修廣永明初彌漸高麗往年工匠遂啓立瓦屋前代帝皇豈於上天之祀而昧營構所不為者深有情意記稱掃地而祭於其質也器用陶匏天地之性也故至敬無文以素為貴竊謂郊事宜擬休偃不俟高大以明謙恭肅敬之旨庶或仰允太靈俯愜羣望詔付外詳國子助教徐景嵩議伏尋三禮天地兩祀南北二郊但明祭取犧牲器用陶匏不載人君偃處之儀今棟帳瓦之構雖殊俱非千載成例宜務因循太學博士賀瑒議周禮王旅上帝張氈案設皇邸國有故而祭亦曰旅氈案以氈為牀於幄中不聞郊所置宮宇兼左丞王摛議掃地而祭於郊謂無築室之議並同曇隆驍騎將軍虞炎議以為誠賣心所施止在一壇漢之郊祀饗帝甘泉天子自竹宮望拜息殿去壇場既遠郊奉禮畢旋幸於此瓦殿之與帷宮謂無簡格祠部郎李撝議周禮凡祭祀張其旅幕張尸次尸則有幄仲師云尸次祭祀之尸所居更衣帳也凡祭之文既不止於郊祀立尸之言理應關於宗廟古則張幕今也房省宗廟旅幕可變為棟宇郊祀氈案何為不轉製簷甍曇隆議不行建武二年旱有司議雩祭依明堂祠部郎何佟之議曰周禮司巫云若國大旱則帥巫而舞雩鄭玄云雩旱祭也天子於上帝諸侯以下於上公之神又女巫云旱暵則舞雩鄭玄云使女巫舞旱祭崇陰也鄭衆云求雨以女巫禮記月令云命有司為民祈祀山川百原乃大雩帝用盛樂乃命百縣雩祀百辟卿士有益於民者以祈穀實鄭玄云陽氣盛而恆旱山川百原能興雲致雨者也衆水所出為百原必先祭其本雩吁嗟求雨之祭也雩帝謂為壇南郊之旁祭五精之帝配以先帝也自鞉鞞至柷敔為盛樂他雩用歌舞而已百辟卿士古者上公以下謂勾龍后稷之類也春秋傳曰龍見而雩雩之止正當以四月王肅云大雩求雨之祭也傳曰龍見而雩謂四月也若五月六月大旱亦用雩禮於五月著雩義也晉永和中中丞啓雩制在國之南為壇祈上帝百辟舞童八列六十四人歌雲漢詩皆以孟夏得雨報太牢于時博士議舊有壇漢魏各自討尋月令云命有司祈祀山川百原乃大雩又云乃命百縣雩祀百辟卿士則大雩所祭唯應祭五精之帝而已勾芒等五神既是五帝之佐依鄭玄説宜配食於庭也鄭玄云雩壇在南郊壇之旁而不辨東西尋地道尊右雩壇方郊壇為輕理應在左宜於郊壇之東營域之外築壇既祭五帝謂壇宜員尋雩壇高廣禮傳無明文案覲禮設方明之祀為壇高四尺用圭璋等六玉禮天地四方之神王者率諸侯親禮為所以教尊尊也雩祭五帝粗可依放謂今築壇宜崇四尺其廣輪仍以四為度徑四丈周員十二丈而四階也設五帝之位各依其方如在明堂之儀皇齊以世祖配五精於明堂今亦宜配饗於雩壇矣古者孟春郊祀祈嘉穀孟夏雩禜祈甘雨二祭雖殊而所為者一禮唯有冬至報天初無得雨賽帝今雖闕冬至之祭而南郊兼祈報之禮理不容別有賽答之事也禮祀帝於郊則所尚省費周祭靈威仰若后稷各用一牲今祀五帝世祖亦宜各用一犢斯外悉如南郊之禮也武皇遏密未終自可不奏盛樂至於旱祭舞雩蓋是呼吁嗟之義既非存歡樂謂此不涉嫌其餘祝史稱辭仰祈靈澤而已禮舞雩乃使無闕今之女巫並不習歌舞方就教試恐不應速依晉朝之議使童子或時取舍之宜也司馬彪禮儀志云雩祀著皂衣蓋是崇陰之義今祭服皆緇差無所革其所歌之詩及諸供須輒勒主者申攝備辦從之隆昌元年有司奏參議明堂咸以世祖配國子助教謝曇濟議案祭法禘郊祖宗並列嚴祀鄭玄注義亦據兼饗宜祖宗兩配文武雙祀助教徐景嵩光祿大夫王逡之謂宜以世祖宗文皇帝配祠部郎何佟之議周之文武尚推后稷以配天謂文皇宜推世祖以配帝雖事施於尊祖亦義章於嚴父焉左僕射王晏議以為若用鄭玄祖宗通稱則生有功德沒垂尊稱歷代配帝何止於郊二邪今殷薦上帝允屬世祖百代不毀其文廟乎詔可至永元二年佟之又建議曰案祭法有虞氏禘黃帝而郊嚳祖顓頊而宗堯周人禘嚳而郊稷祖文王而宗武王鄭玄云禘郊祖宗謂祭祀以配食也此禘謂祀昊天於圜丘也祭上帝於南郊曰郊祭祀五帝五神於明堂曰祖宗郊祭一帝而明堂祭五帝小德配寡大德配衆王肅云祖宗是廟不毀之名果如肅言殷有三祖三宗並應不毀何故止稱湯契且王者之後存焉舜寧立堯頊之廟傳世祀之乎漢文以高祖配泰畤至武帝立明堂復以高祖配食一人兩配有乖聖典自漢明以來未能反者故明堂無兼配之祀竊謂先皇宜列二帝於文祖尊新廟為高宗並世祖而泛配以申聖主嚴父之義先皇於武皇倫則第為季義則經為臣設配饗之坐應在世祖之下並列俱西向國子博士王摛議孝經周公郊祀后稷以配天宗祀文王於明堂以配上帝不云武王又周頌思文后稷配天也我將祀文王於明堂也武王之文唯執競云祀武王此自周廟祭武王詩彌知明堂無矣佟之又議孝經是周公居攝時禮祭法是成王反位後所行故孝經以文王為宗祭法以文王為祖又孝莫大於嚴父配天則周公其人也尋此旨寧施成王乎若孝經所説審是成王所行則為嚴祖何得云嚴父邪且思文是周公祀后稷配天之樂歌我將是祀文王配明堂之樂歌若如摛議則此二篇皆應在復子明辟之後請問周公祀后稷文王為何所歌又國語云周人禘嚳郊稷祖文王宗武王韋昭云周公時以文王為宗其後更以文王為祖武王為宗尋文王以文治而為祖武王以武定而為宗欲明文亦有大德武亦有大功故鄭注祭法云祖宗通言耳是以詩云昊天有成命二后受之注云二后文王武王也且明堂之祀有單有合故鄭云四時迎氣於郊祭一帝還於明堂因祭一帝則以文王配明一賓不容兩主也享五帝於明堂則泛配文武泛之為言無的之辭其禮既盛故祖宗並配參議以佟之為允詔可太祖為齊王依舊立五廟即位立七廟廣陵府君太中府君淮陰府君即丘府君太常府君宣皇帝昭皇后為七廟建元二年太祖親祀太廟六室如儀拜伏竟次至昭后室前儀注應倚立上以為疑欲使廟僚行事又欲以諸王代祝令於昭后室前執爵以問彭城丞劉瓛瓛對謂若都不至昭后坐前竊以為薄廟僚即是代上執爵饋奠耳祝令位卑恐諸王無容代之舊廟儀諸王得兼三公親事謂此為便從之及太子穆妃薨卒哭祔于太廟陰室永明十一年文惠太子薨卒哭祔于太廟陰室太祖崩毀廣陵府君鬱林即位追尊文帝又毀太中主止淮陰府君明帝立復舊及崩祔廟與世祖為兄弟不為世數史臣曰先儒説宗廟之義據高祖已下五世親盡故親廟有四周以后稷始祖文武二祧所以云王立七廟也禹無始祖湯不先契夏五殷六其數如之漢立宗廟違經背古匡衡貢禹蔡雍之徒空有遷毀之議亘年四百竟無成典魏氏之初親廟止乎四葉吳蜀享祭失禮已多晉用王肅之談以文景為共世上至征西其實六也尋其此意非以兄弟為後當以立主之義可相容於七室及楊元后崩征西之廟不毀則知不以元后為世數廟有七室數盈八主江左賀循立議以後弟不繼兄故世必限七主無定數宋臺初立五廟以臧后為世室就禮而求亦親廟四矣義反會鄭非謂從王自此以來因仍舊制夫妻道合非世葉相承譬由下祭殤嫡無關廟數同之祖曾義未可了若據伊尹之言必及七世則子昭孫穆不列婦人若依鄭玄之説廟有親稱妻者言齊豈或濫享且閟宮之德周七非數楊元之祀晉八無傷今謂之七廟而上唯六祀使受命之君流光之典不足若謂太祖未登則昭穆之數何繼斯故禮官所宜詳也宋泰豫元年明帝崩博士周洽議權制諒暗之內不親奉四時祠建元四年尚書令王儉採晉中朝諒暗議奏曰權典既行喪禮斯奪事興漢世而源由甚遠殷宗諒暗非有服之稱周王即吉唯宴樂為譏春秋之義嗣君踰年即位則預朝會聘享焉左氏云凡君即位卿出並聘踐修舊好又云諸侯即位小國聘焉以繼好結信謀事補闕禮之大者至於諒暗之內而圖婚三年未終而吉禘齊歸之喪不廢搜嵵公之卒不徹樂皆致譏貶以明鑒戒自斯而談朝聘蒸嘗之典卒哭而備行婚禘搜樂之事三載而後舉通塞興廢各有由然又案大戴禮記及孔子家語並稱武王崩成王嗣位明年六月既葬周公冠成王而朝于祖以見諸侯命祝雍作頌襄十五年十一月晉侯周卒十六年正月葬晉悼公平公既即位改服修官蒸于曲沃禮記曾子問孔子曰天子崩國君薨則祝取羣廟之主而藏諸祖廟禮乎也卒哭成事而後主各反其廟春秋左氏傳凡君卒哭而祔祔而後特祀於主蒸嘗禘於廟先儒云特祀於主者特以喪禮奉新亡者至主於寢不同於古吉蒸嘗禘於廟者卒哭成事羣廟之主各反其廟則四時之祭皆即吉也三年喪畢吉禘於廟躋羣主以定新主也凡此諸義皆著在經誥昭乎方册所以晉宋因循同規前典卒哭公除親奉蒸嘗率禮無違因心允協爰至泰豫元年禮官立議不宜親奉乃引三年之制自天子達又據王制稱喪三年不祭唯祭天地社稷越紼而行事曾不知自天子達本在至情既葬釋除事以權奪委衰襲袞孝享宜申越紼之旨事施未葬卒哭之後何紼可越復依范宣之難杜預譙周之論士祭並非明據晉武在喪每欲存寧戚之懷不全依諒暗之典至於四時蒸嘗蓋以哀疾未堪非便頓改舊式江左以來通儒碩學所歷多矣守而弗革義豈徒然又宜且即心而言公卿大夫則負扆親臨三元告始則朝會萬國雖金石輟響而簨簴充庭情深於恆哀而迹降於凡制豈曰能安國家故也宗廟蒸嘗孝敬所先寧容吉事備行斯典獨廢就令必宜廢祭則應三年永闕乃復同之他故有司攝禮進退二三彌乖典衷謂宜依舊親奉從之永明九年正月詔太廟四時祭薦宣帝麥丏起餅鴨羊競孝皇后筍鴨卵脯醬炙白肉高皇帝薦肉膾葅羹昭皇后茗粣炙魚皆所嗜也先是世祖夢太祖曰宋氏諸帝嘗在太廟從我求食可別為吾祠上乃敕豫章王妃庾氏四時還青溪宮舊宅處內合堂奉祠二帝二后牲牢服章用家人禮史臣曰漢氏之廟遍在郡國求祀已瀆緣情又疏重簷閟寢不可兼建故前儒抗議謂之遷毀光武入纂南頓君已上四世別祠舂陵建武三年幸舂陵園廟是也張衡南都賦曰清廟肅以微微明帝至于章和每幸章陵輒祠舊宅建安末魏氏立宗廟皆在鄴都魏文黃初二年洛廟未成親祠武帝於建始殿用家人禮世祖發漢明之夢肇祀故宮孝享既申義合前典亦一時之盛也永明六年太常丞何諲之議今祭有生魚一頭干魚五頭少牢饋食禮云司士升魚臘膚魚用鮒十有五上既云臘下必是鮮其數宜同稱膚足知鱗革無毀記云稿魚曰商祭鮮曰脡祭鄭注商量脡直也尋商旨裁截脡義在全賀循祭義猶用魚十五頭今鮮頓刪約稿皆全用謂宜鮮稿各二頭稿微斷首尾示存古義國子助教桑惠度議記稱尚玄酒而俎腥魚玄酒不容多鮮魚理宜約干魚五頭者以其既加人功可法於五味以象酒之五齊也今欲鮮稿各雙義無所法諲之議不行十年詔故太宰褚淵故太尉王儉故司空柳世隆故驃騎大將軍王敬則故鎮東大將軍陳顯達故鎮東將軍李安民六人配饗太祖廟庭祠部郎何諲之議功臣配饗纍行宋世檢其遺事題列坐位具書贈官爵諡及名文不稱主便是設板也白虎通云祭之有主孝子以繫心也揆斯而言升配廟廷不容有主宋時板度既不復存今之所制大小厚薄如尚書召板為得其衷有司攝太廟舊人亦云見宋功臣配饗坐板與尚書召板相似事見儀注十一年右僕射王晏吏部尚書徐孝嗣侍中何胤奏故太子祔太廟既無先準檢宋元后故事太尉行禮太子拜伏與太尉俱臣等參議依擬前典太常主廟位太尉執禮祔太孫拜伏皆與之俱正禮既畢陰室之祭太孫宜親自進奠詔可建武二年有司奏景懿后遷登新廟車服之儀祠部郎何佟之議曰周禮王之六服大裘為上袞冕次之五車玉輅為上金輅次之皇后六服褘衣為上褕翟次之首飾有三副為上編次之五車重翟為上厭翟次之上公年無大裘玉輅而上公夫人有副及褘衣是以祭統云夫人副褘立于東房也又鄭云皇后六服唯上公夫人亦有褘衣詩云翟茀以朝鄭以翟茀為厭翟侯伯夫人入廟所乘今上公夫人副褘既同則重翟或不殊矣況景皇懿后禮崇九命且晉朝太妃服章之禮同於太后宋代皇太妃唯無五牛旗為異其外侍官則有侍中散騎常侍黃門侍郎散騎侍郎各二人分從前後部同於王者內職則有女尚書女長御各二人棨引同於太后又魏朝之晉王晉之宋王並置百官擬於天朝至於晉文王終猶稱薨而太上皇稱崩則是禮加於王矣故前議景皇后悉依近代皇太妃之儀則侍衛陪乘並不得異后乘重翟亦謂非疑也尋齊初移廟宣皇神主乘金輅皇帝親奉亦乘金輅先往行禮畢仍從神主至新廟今所宜依準也從之永泰元年有司議應廟見不尚書令徐孝嗣議嗣君即位並無廟見之文蕃支纂業乃有虔謁之禮左丞蕭琛議竊聞祗見厥祖義著商書朝于武宮事光晉册豈有正位居尊繼業承天而不虔覲祖宗格于太室毛詩周頌篇曰烈文成王即政諸侯助祭也鄭注云新王即政必以朝享之禮祭於祖考告嗣位也又篇曰閔豫小子嗣王朝廟也鄭注云嗣王者謂成王也除武王之喪將始即政朝於廟也則隆周令典煥炳經記體嫡居正莫若成王又二漢由太子而嗣位者西京七主東都四帝其昭成哀和從五君並皆謁廟文存漢史其惠景武元明章六君前史不載謁事或是偶有闕文理無異説議者乃云先在儲宮已經致敬卒哭之後即親奉時祭則是廟見故無別謁之禮竊以為不然儲后在宮亦從郊祀若謂前虔可兼後敬開元之始則無假復有配天之祭矣若以親奉時祭仍為廟見者自漢及晉支庶嗣位並皆謁廟既同有蒸嘗何為獨修繁禮且晉成帝咸和元年改號巳謁廟咸康元年加元服又更謁夫時非異主猶不疑二禮相因況位隔君臣而追以一謁兼敬宜遠纂周漢之盛範近黜晉宋之乖義展誠一廟駿奔萬國奏可永明元年十二月有司奏今月三日臘祠太社稷一日合朔日蝕既在致齋內未審於社祠無疑不曹檢未有前準尚書令王儉議禮記曾子問天子嘗禘郊社五禮之祭簠簋既陳唯大喪乃廢至於當祭之日火及日蝕則停尋伐鼓用牲由來尚矣而簠簋初陳問所不及據此而言致齋初日仍值薄蝕則不應廢祭又初平四年士孫瑞議以日蝕廢社冠而不廢郊朝議從之王者父天親地郊社不殊此則前準謂不宜廢詔可永明十一年兼祠部郎何佟之議案禮記郊特牲社祭土而主陰氣也君南向於北墉下答陰之義也鄭玄云答猶對也北墉社內北出方攴也王肅云陰氣北向故君南向以答之答之為言是相對之稱知古祭社北向設位齋官南向明矣近代相承帝社南向太社及稷並東向而齋官位在帝社壇北西向於神背後行禮又名稷為稷社甚乖禮意及乃未知失在何時原此理當未久竊以皇齊改物禮樂惟新中國之神莫貴於社若遂仍前謬懼虧盛典謂二社語其義則殊論其神則一位並宜北向稷若北向則成相背稷是百穀之總神非陰氣之主宜依先東向齋官立社壇東北南向立東為上諸執事西向立南為上稷依禮無兼稱今若欲尊崇正可名為太稷耳豈得謂為稷社邪臘祠太社日近案奏事御改定儀注儀曹稱治禮學士議曰郊特牲又云君之南向答陽也臣之北向答君也若以陽氣在南則位應向北陰氣向在北則位宜向南今南北二郊一限南向皇帝黑瓚階東西向故知壇墠無繫於陰陽設位寧拘於南北羣神小祠類皆限南面薦饗之時北向行禮蓋欲申靈祇之尊表求幽之義魏世秦靜使社稷別營稱自漢以來相承南向漢之於周世代未遠鄗上頽基商丘餘樹猶應尚存迷方失位未至於此通儒達識不以為非庾蔚之昔已有此議後徐爰周景遠並不同仍舊不改佟之議來難引君南向答陽臣北向答君敢問答之為言為是相對為是相背相背則社位南向君亦南向可如來議郊特牲云臣之北向答君復是君背臣今言君南臣北向相稱答則君南不得稱答矣記何得云祭社君南向之答陰邪社果同向則君亦宜西向何故在社南向在郊西向邪解則不然記云君之南向答陽此明朝會之時盛陽在南故君南向對之猶聖人南面而聽向明而治之義耳寧是祈祀天地之日乎知祭社北向君答故南向祀天南向君答宜北向矣今皇帝黑瓚階東西向者斯蓋始入之別位非接對之時也案記云社所以神地之道也又云社祭土而主陰氣又云不用命戮于社孔安國云社主陰陰主殺傳曰日蝕伐鼓于社杜預云責羣陰也社主陰氣之盛故北向設位以本其義耳餘祀雖亦地祇之貴而不主此義故位向不同不得見餘陰祀不北向便謂社應南向也案周禮祭社南向君求幽宜北向而記云君南向答陰之義求幽之論不乖歟魏權漢社社稷同營共門稷壇在社壇北皆非古制後移宮南自當如禮如靜此言乃是顯漢社失周法見漢世舊事爾時祭社南向未審出何史籍就如議者靜所言是祭社位向仍漢舊法漢又襲周成規因而不改者則社稷三座並應南向今何改帝社南向泰社及稷並東向邪治禮又難佟之凡三往反至建武二年有司議治禮無的然顯據佟之議乃行建武二年祠部郎何佟之奏案周禮大宗伯以蒼璧禮天黃琮禮地鄭玄又云皆有牲幣各放其器之色知禮天圓丘用玄犢禮地方澤用黃牲矣牧人云凡陽祀用騂牲陰祀用黝牲鄭玄云騂赤黝黑也陽祀祭天南郊及宗廟陰祀祭地北郊及社稷祭法云燔柴於泰壇祭天也瘞埋於泰折祭地也用騂犢鄭云地陰祀用黝牲與天俱用犢故連言之耳知此祭天地即南北郊矣今南北兩郊同用玄牲又明堂宗廟社稷俱用赤有違昔典又鄭玄云祭五帝於明堂勾芒等配食自晉以來并圜丘於南郊是以郊壇列五帝勾芒等今明堂祀五精更闕五神之位北郊祭地祇而設重黎之坐二三乖舛懼虧盛則前軍長史劉繪議語云犁牛之子騂且角雖欲勿用山川其舍諸未詳山川合為陰祀不若在陰祀則與黝乖矣佟之又議周禮以天地為大祀四望為次祀山川為小祀周人尚赤自四望以上牲色各依其方者以其祀大宜從本也山川以下牲色不見者以其祀小從所尚也則論禮二説豈不合符參議為允從之永元元年步兵校尉何佟之議曰蓋聞聖帝明王之治天下也莫不尊奉天地崇敬日月故冬至祀天於圓丘夏至祭地於方澤春分朝日秋分夕月所以訓民事君之道化下嚴上之義也故禮云王者必父天母地兄日姊月周禮典瑞云王搢大圭執鎮圭藻藉五采五就以朝日馬融云天子以春分朝日秋分夕月覲禮天子出拜日於東門之外盧植云朝日以立春之日也鄭玄云端當為冕朝日春分之時也禮記朝事議云天子冕而執鎮圭尺有二寸率諸侯朝日於東郊所以教尊尊也故鄭知此端為冕也禮記保傅云三代之禮天子春朝朝日秋暮夕月所以明有敬也而不明所用之定辰馬鄭云用二分之時盧植云用立春之日佟之以為日者太陽之精月者太陰之精春分陽氣方永秋分陰氣向長天地至尊用其始故祭以二至日月禮次天地敬故朝以二分差有理據則融玄之言得其義矣漢世則朝朝日暮夕月魏文帝詔曰覲禮天子拜日東門之外反禮方明朝事議曰天子冕而執鎮圭率諸侯朝日於東郊以此言之蓋諸侯朝天子祀方明因率朝日也漢改周法羣公無四朝之事故不復朝於東郊得禮之變矣然旦夕常於殿下東向拜日其禮太煩今採周春分之禮損漢日拜之儀又無諸侯之事無所出東郊今正殿即亦朝會行禮之庭也宜常以春分於正殿之庭拜日其夕月文不分明其議奏魏祕書監薛循請論云舊事朝日以春分夕月以秋分案周禮朝日無常日鄭玄云用二分故遂施行秋分之夕月多東潛而西向拜之背實遠矣謂朝日宜用仲春之朔夕月宜用仲秋之朔淳于睿駮之引禮記云祭日於東祭月於西以端其位周禮秋分夕月並行於上世西向拜月雖如背實亦猶月在天而祭之於坎不復言背月也佟之案禮器云為朝夕必放於日月鄭玄云日出東方月在西方又云大明生於東月生於西此陰陽之分夫婦之位也鄭玄云大明日也知朝日東向夕月西向斯蓋各本其位之所在耳猶如天子東西遊幸朝堂之官及拜官者猶北向朝拜寧得以背實為疑邪佟之謂魏世所行善得與奪之衷晉初棄圓丘方澤於兩郊二至輟禮至於二分之朝致替無義江左草創舊章多闕宋氏因循未能反古竊惟皇齊應天御極典教惟新謂宜使盛典行之盛代以春分朝於殿庭之西東向而拜日秋分於殿庭之東西向而拜月此即所謂必放日月以端其位之義也使四方觀化者莫不欣欣而頌美服無旒藻之飾蓋本天之至質也朝日不得同昊天至質之禮故玄冕三旒也近代祀天著袞十二旒極文章之義美則是古今禮之變也禮天朝日既服宜有異頃世天子小朝會著絳紗袍通天金博山冠斯即今朝之服次袞冕者也竊謂宜依此拜日月甚得差降之宜也佟之任非禮局輕奏大典實為侵官伏追慙震從之永明三年有司奏來年正月二十五日丁亥可祀先農即日輿駕親耕宋元嘉大明以來並用立春後亥日尚書令王儉以為亥日藉田經記無文通下詳議兼太學博士劉蔓議禮孟春之月立春迎春又於是月以元日祈穀又擇元辰躬耕帝藉盧植説禮通辰日日甲至癸也辰子至亥也郊天陽也故以日藉田陰也故以辰陰禮卑後必居其末亥者辰之末故記稱元辰法注曰吉亥又據五行之説木生於亥以亥日祭先農又其義也太常丞何諲之議鄭注云元辰蓋郊後吉亥也亥水辰也凡在墾稼咸存灑潤五行説十二辰為六合寅與亥合建寅月東耕取月建與日辰合也國子助教桑惠度議尋鄭玄以亥為吉辰者陽生於子元起於亥取陽之元以為生物亥又為水十月所建百穀賴茲沾潤畢熟也助教周山文議盧植云元善也郊天陽也故以日藉田陰也故以辰蔡雍月令章句解元辰云日幹也辰支也有事於天用日有事於地用辰助教何佟之議少牢饋食禮云孝孫其某來日丁亥用薦歲事于皇祖伯某注云丁未必亥也直舉一日以言之耳禘太廟禮日用丁亥若不丁亥則用己亥辛亥苟有亥可也鄭又云必用丁巳己者取其令名自丁寧自變改皆為謹敬如此丁亥自是祭祀之日不專施於先農漢文用此日耕藉祠先農故後王相承用之非有別義殿中郎顧皓之議鄭玄稱先郊後吉辰而不説必亥之由盧植明子亥為辰亦無常辰之證漢世躬藉肇發漢文詔云農天下之本其開藉田斯乃草創之令未覩親載之吉也昭帝癸亥耕于鉤盾弄田明帝癸亥耕下邳章帝乙亥耕定陶又辛丑耕懷魏之烈祖實書辛未不繫一辰徵於兩代矣推晉之革魏宋之因晉政是服膺康成非有異見者也班固序亥位云陰氣應亡射該藏萬物而雜陽閡種且亥既水辰含育為性播厥取吉其在茲乎固序丑位云陰大旅助黃鍾宣氣而牙物序未位云陰氣受任助蕤賓君主種物使長大茂盛是漢朝迭選魏室所遷酌舊用丑實兼有據參議奏用丁亥詔可建元四年正月詔立國學置學生百五十人其有位樂入者五十人生年十五以上二十以還取王公已下至三將著作郎廷尉正太子舍人領護諸府司馬咨議經除敕者諸州別駕治中等見居官及罷散者子孫悉取家去都二千里為限太祖崩乃止永明三年正月詔立學創立堂宇召公卿子弟下及員外郎之胤凡置生二百人其年秋中悉集有司奏宋元嘉舊事學生到先釋奠先聖先師禮又有釋菜未詳今當行何禮用何樂及禮器尚書令王儉議周禮春入學舍菜合舞記云始教皮辨祭菜示敬道也又云始入學必祭先聖先師中朝以來釋菜禮廢今之所行釋奠而已金石俎豆皆無明文方之七廟則輕比之五禮則重陸納車胤謂宣尼廟宜依亭侯之爵范寧欲依周公之廟用王者儀范宣謂當其為師則不臣之釋奠日備帝王禮樂此則車陸失於過輕二范傷於太重喻希云若至王者自設禮樂則肆賞於至敬之所若欲嘉美先師則所況非備尋其此説守附情理皇朝屈尊弘教待以師資引同上公即事惟允元嘉立學裴松之議應六佾以郊樂未具故權奏登歌今金石已備宜設軒縣之樂六佾之舞牲牢器用悉依上公其冬皇太子講孝經親臨釋奠車駕幸聽建武四年正月詔立學永泰元年東昏侯即位尚書符依永明舊事廢學領國子助教曹思文上表曰古之建國君民者必教學為先將以節其邪情而禁其流欲故能化民裁俗習與性成也是以忠孝篤焉信義成焉禮讓行焉尊教宗學其致一也是以成均煥於古典虎門炳於前經陛下體睿淳神纘承鴻業今制書既下而廢學先聞將恐觀國之光者有以擬議也若以國諱故宜廢昔漢成立學爰洎元始百餘年中未嘗暫廢其間有國諱也且晉武之崩又其學猶存斯皆先代不以國諱而廢學之明文也永明以無太子故廢斯非古典也尋國之有學本以興化致治也天子於以咨謀焉於以行禮焉記云天子出征受命於祖受成於學執有罪反釋奠於學又云食三老五更於太學天子袒而割牲執爵而酳以教諸侯悌也於斯學是天子有國之基教也或以之所言皆太學事也今引太學不非證也據臣所見今之國學即古之太學晉初太學生三千人既多猥雜惠帝時欲辨其涇渭故元康三年始立國子學官品第五以上得入國學天子去太學入國學以行禮也太子去太學入國學以齒讓也太學之與國學斯是晉世殊其士庶異其貴賤耳然貴賤士庶皆須教成故國學太學兩存之也非有太子故立也然繫廢興於太子者此永明之巨失也漢崇儒雅幾致刑厝而猶道謝三五者以其致教之術未篤也古之教者家有孰黨有庠術有序國有學以諷誦相摩今學非唯不宜廢而已乃宜更崇尚其道望古作規使郡縣有學鄉閭立教請付尚書及二學詳議有司奏從之學竟不立永明五年十月有司奏南郡王昭業冠求儀注未有前準尚書令王儉議皇孫冠事歷代所無禮雖有嫡子無嫡孫然而地居正體下及五世今南郡王體自儲暉實惟國裔元服之典宜異列蕃案士冠禮主人玄冠朝服賓加其冠贊者結纓鄭玄云主人冠者之父兄也尋其言父及兄則明祖在父不為主也大戴禮記公冠篇云公冠自為主四加玄冕以卿為賓此則繼體之君及帝之庶子不得稱子者也小戴禮記冠義云冠於阼以著代也醮於客位三加彌尊加有成也注稱嫡子冠於阼庶子冠於房記又云古者重冠故行之於廟所以自卑而尊先祖也據此而言彌與鄭注儀禮相會是故中朝以來太子冠則皇帝臨軒司徒加冠光祿贊冠諸王則郎中加冠中尉贊冠今同於儲皇則重依於諸王則輕又春秋之義不以父命辭王父命禮父在斯為子君在斯為臣皇太子居臣子之節無專用之道南郡雖處蕃國非支庶之列宜稟天朝之命微申冠阼之禮晉武帝詔稱漢魏遣使冠諸王非古正典此蓋謂庶子封王合依公冠自主之義至於國之長孫遣使惟允宜使太常持節加冠大鴻臚為贊醮酒之儀亦歸二卿祝醮之辭附準經記別更撰立不依蕃國常體國官陪位拜賀自依舊章其日內外二品清官以上詣止車集賀并詣東宮南門通箋別日上禮宮臣亦詣門稱賀如上臺之儀既冠之後剋日謁廟以弘尊祖之義此既大典宜通關八座丞郎并下二學詳議僕射王奐等十四人議並同并撰立贊冠醮酒二辭詔可祝辭曰皇帝使給事中太常武安侯蕭惠基加南郡王冠祝曰筮日筮賓肇加元服棄爾幼志從厥成德親賢使能克隆景福醮酒辭曰旨酒既清嘉薦既盈兄弟具在淑慎儀形永屆眉壽於穆斯寧永明中世祖以婚禮奢費勑諸王納妃上御及六宮依禮止棗栗腶修加以香澤花粉其餘衣物皆停唯公主降嬪則止遺舅姑也永泰元年尚書令徐孝嗣議曰夫人倫之始莫重冠婚所以尊表成德結歡兩姓年代汙隆古今殊則繁簡之儀因時或異三加廢於士庶六禮限於天朝雖因習未久事難頓改而大典之要深宜損益案士冠禮三加畢乃醴冠者醴則唯一而已故醴辭無二若不醴則每加輒醮以酒故醮辭有三王肅云醴本古其禮重酒用時味其禮輕故也或醴或醮二三之義詳記於經文今皇王冠畢一酌而已即可擬古設禮醴而猶用醮辭實為乖衷尋婚禮實篚以四爵加以合卺既崇尚質之理又象泮合之義故三飯卒食再酳用卺先儒以禮成好合事終於三然後用卺合儀注先酳卺以再以三有違旨趣又郊特牲曰三王作牢用陶匏言太古之時無共牢之禮三王作之而用太古之器重夫婦之始也今雖以方樏示約而彌乖昔典又連卺以宀元攴蓋出近俗復別有牢燭雕費采飾亦虧曩制方今聖政日隆聲教惟穆則古昔以敦風存餼羊以愛禮沿襲之規有切治要嘉禮實重宜備舊章謂自今王侯已下冠畢一酌醴以遵古之義醴即用舊文於事為允婚亦依古以卺酌終酳之酒並除金銀連宀元攴自餘雜器悉用埏陶堂人執燭足充美燎牢燭華侈亦宜停省庶雕可期移俗有漸參議並同奏可晉武太始二年有司奏故事皇后諱與帝諱俱下詔曰禮內諱不出宮近代諱之也建元元年太常上朝堂諱訓僕射王儉議曰后諱依舊不立訓禮天子諸侯諱羣祖臣隸既有從敬之義宜為太常府君諱至於朝堂榜題本施至極既逮追尊所不及禮降於在三晉之京兆宋之東安不列榜題孫育議稱京兆列在正廟臣下應諱而不上榜宋初博士司馬道敬議東安府君諱宜上榜何承天執不同即為明據其有人名地名犯太常府君及帝后諱者皆改宣帝諱同二名不偏諱所以改承明門為北掖以榜有之字與承並東宮承華門亦改為宣華云漢末蔡雍立漢朝會志竟不就秦人以十月旦為歲首漢初習以大饗會後用夏正饗會猶未廢十月旦會也東京以後正旦夜漏未盡七刻鳴鍾受賀公侯以下執贄來庭二千石以上升殿稱萬歲然後作樂宴饗張衡賦云皇輿夙駕登天光於扶桑然則雖云夙駕必辨色而行事矣魏武都鄴正會文昌殿用漢儀又設百華燈後魏文修洛陽宮室權都許昌宮殿狹小元日於城南立氈殿青帷以為門設樂饗會後還洛陽依漢舊事晉武帝初更定朝會儀夜漏未盡十刻庭燎起火羣臣集傅玄朝會賦云華燈若乎火樹熾百枝之煌煌此則因魏儀與庭燎並設也漏未盡七刻羣臣入白賀未盡五刻就本位至漏盡皇帝出前殿百官上賀如漢儀禮畢罷入羣臣坐謂之辰賀晝漏上三刻更出百官奉壽酒大饗作樂謂之晝會別置女樂三十人於黃帳外奏房中之歌江左多虞不復晨賀夜漏未盡十刻開宣陽門至平旦始開殿門晝漏上五刻皇帝乃出受賀宋世至十刻乃受賀其餘升降拜伏之儀及置立后妃王公已下祠祀夕牲拜授弔祭皆有儀注文多不載三月三日曲水會古禊祭也漢禮儀志云季春月上巳官民皆潔濯於東流水上自洗濯祓除去宿疾為大潔不見東流為何水也晉中朝云卿已下至於庶民皆褉洛水之側事見諸禊賦及夏仲御傳也趙王倫篡位三日會天淵池誅張林懷帝亦會天淵池賦詩陸機云天淵池南石溝引御溝水池西積石為禊堂跨水流杯飲酒亦不言曲水元帝又詔罷三日弄具今相承為百猆之具雕弄技巧增損無常史臣曰案禊與曲水其義參差舊言陽氣布暢萬物訖出姑洗潔之也巳者祉也言祈介祉也一説三月三日清明之節將修事於水側禱祀以祈豐年應劭云禊者潔也言自潔濯也或云漢世有郭虞者以三月上辰生二女上巳又生一女二日中頻生皆死時俗以為大忌民人每至其日皆適東流水祈祓自潔濯浮酌清流後遂為曲水案高后祓霸上馬融梁冀西第賦云西北戌亥玄石承輸蝦吐寫庚辛之域即曲水之象也今據禊為曲水事應在永壽之前已有祓除則不容在高后之後祈農之説於事為當九月九日馬射或説云秋金之節講武習射像漢立秋之禮史臣曰案晉中朝元會設臥騎倒騎顛騎自東華門馳往神虎門此亦角抵雜猆之流也宋武為宋公在彭城九日出項羽戲馬臺至今相承以為舊準
