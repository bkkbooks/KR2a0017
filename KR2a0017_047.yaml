body:
  text: 南齊書卷四十七列傳第二十八王融謝朓王融字元長琅邪臨沂人也祖僧達中書令曾高並台輔僧達答宋孝武云亡父亡祖司徒司空父道琰廬陵內史母臨川太守謝惠宣女惇敏婦人也教融書學融少而神明警惠博涉有文才舉秀才晉安王南中郎板行參軍坐公事免竟陵王司徒板法曹行參軍遷太子舍人融以父官不通弱年便欲紹興家業啓世祖求自試曰臣聞春庚秋蟀集候相悲露木風榮臨年共悅夫唯動植且或有心況在生靈而能無感臣自奉望宮闕沐浴恩私拔迹庸虛參名盛列纓劒紫復趨步丹墀歲時歸來誇榮邑里然無勤而官昔賢曾議不任而祿有識必譏臣所用慷慨憤悶不遑自晏誠以深恩鮮報聖主難逢蒲柳先秋光陰不待貪及明時展悉愚效以酬陛下不世之仁若微誠獲信短才見序文武吏法唯所施用夫君道含弘臣術無隱翁歸乃居中自是充國曰莫若老臣竊景前修敢蹈輕節以冒不媒之鄙式罄奉公之誠抑又唐堯在上不參二八管夷吾之臣亦之願陛下裁覽遷祕書丞從叔儉初有儀同之授融贈詩及書儉甚奇憚之笑謂人曰穰侯印詎便可解尋遷丹陽丞中書郎虜使遣求書朝議欲不與融上疏曰臣側聞僉議疑給虜書如臣愚情切有未喻夫虜人面獸心狼猛蜂毒暴悖天經虧違地義逋竄燭幽去來豳朔綿周漢而不悛歷晉宋其踰梗豈有愛敬仁智恭讓廉修慙犬馬之馴心同鷹虎之反目設秣有儲筋竿足用必以草竊關燧寇擾邊疆寧容款塞卑辭承衣請朔陛下務存遵養不時侮亡許其膜拜之誠納裘之賮況復願同文軌儻見款遣思奉聲教方致猜拒將使舊邑遺逸未知所置衰胡餘噍或能自推一令蔓草難鉏涓流泛酌豈直疥癢輕痾容為心腹重患抑孫武之言也困則數罰窘則多賞先暴而後畏其衆者虜之謂乎前中原士庶雖淪懾殊俗至於婚葬之晨猶巾為禮而禁令苛刻動加誅轘于時獯粥初遷犬羊尚結即心徒怨困懼成逃自其將卒奔離資待銷闕北畏勍蠕西逼南胡民背如崩勢絶防斷於是曲從物情偽竊章服歷年將絶隱蔽無聞既南向而泣者日夜以覬北顧而辭者江淮相屬凶謀歲窘淺慮無方於是稽顙郊門問禮求樂若來之以文德賜之以副書漢家軌儀重臨畿輔司隸傳節復入關河無待八百之師不期十萬之衆固其提漿佇俟揮戈願倒三秦大同六漢一統又虜前後奉使不專漢人必介以胸奴備諸覘獲且設官分職彌見其情抑退舊苗扶任種戚師保則后族馮晉國總録則邽姓直勒渴侯台鼎則丘頽苟仁端執政則目凌鉗耳至於東都羽儀西京簪帶崔孝伯程虞虯久在著作李元和郭季祐上于中書李思沖飾虜清官遊明根泛居顯職今經典遠被詩史北流馮李之徒必欲遵尚直勒等類居致乖阻何則胸奴以氈騎為帷牀馳射為糇糧冠方帽則犯沙陵雪服左衽則風驤鳥逝若衣以朱裳戴之玄頗頍節其揖讓教以翔趨必同艱桎梏等懼冰淵婆娑言亡因而不能前已及夫春草水生阻散馬之適秋風木落絶驅禽之歡息沸脣於桑墟別醍乳於冀俗聽韶雅如𧢈聵臨方丈若爰居馮李之徒固得志矣虜之凶族其如病何於是風土之思深愎戾之情動拂衣者連裾抽鋒者比鏃部落爭于下酋渠危於上我一舉而兼吞卞莊之勢必也且棘寶薦虞晉疆彌盛大鍾出智宿氏以亡帝略遠孚無思不服鑾光幸岱匪暮斯朝臣請收籍伊瀍茲書復掌猶取之內府藏之外籝於理有愜即事何損若狂言足採請決敕施行世祖答曰吾意不異卿今所啓比相見更委悉事竟不行永明末世祖欲北伐使毛惠秀畫漢武北伐圖使融掌其事融好功名因此上疏曰臣聞情慉自中事符則感象構於始機動斯彰莊敬之道可宗會揖讓其彌肅勇烈之士足貴應鼙鐸以增思肇植生民厥詳既緬降及興運維道有徵莫不有所因循而升皇業者也若夫膏腴既稱天乙知五方之富皮幣已列帝劉測四海之尊異封禪之文則升中之典攸鬯嘆輿地之圖乃席卷之庸是立伏惟陛下窮神盡聖總極居中偶化兩儀均明二耀拯玄綱於頽絶反至道於澆淳可謂區𧜛儀形齊民先覺者也臣亦遭逢生此嘉運鑿飲耕食自幸唐年而識用昏霾經術疏淺將薖且軸豈蕨與薇皇鑒燭幽天高聽下賞片言之或善矜一物之失時湔拂塵蒙霑飾光價拔足草廬廁身朝序復得拜賀歲時瞻望日月於臣心願曾已畢矣但千祀一逢休明難再思策鉛駑樂陳涓壒竊習戰陳攻守之術農桑牧藝之書申商韓墨之權伊周孔孟之道常願待詔朱闕俯對青蒲請間宴之私談當世之務位賤人微徒深傾款方今九服清怡三靈和晏木有附枝輪無異轍東鞮獻舞南辮傳歌羌稱踰山秦屠越海舌象玩委體之勤輶譯厭瞻巡之數固將開桂林於鳳山創金城於西守而蠢爾獯狄敢讎大邦假息關河竊命函谷淪故京之爽塏變舊邑而荒涼息反坫之儒衣久伊川之被髮北地殘氓東都遺老莫不茹泣吞悲傾耳戴目翹心仁政延首王風若試馳咫尺之書具甄戎旅之卒徇其墮城納其降虜可弗勞弦鏃無待干戈真皇王之兵征而不戰者也臣乞以執殳先邁式道中原澄浣渚之恆流掃狼山之積霧係單于之頸屈左賢之膝習呼韓之舊儀拜鑾輿之巡幸然後天移雲動勒封岱宗咸五登三追蹤七十百神肅警萬國具僚璯辨星離玉帛雲聚集三燭於蘭席聆萬歲之禎聲豈不盛哉豈不韙哉昔桓公志在伐莒郭牙審其幽趣魏后心存去漢德祖究其深言臣愚昧忖誠不足以知微然伏揆聖心規模弘遠既圖載其事必克就其功臣不勝歡喜圖成上置琅邪城射堂壁上遊幸輒觀視焉九年上幸芳林薗禊宴朝臣使融為曲水詩序文藻富麗當世稱之上以融才辨十一年使兼主客接虜使房景高宋辨辨見融年少問主客年幾融曰五十之年久踰其半因問在朝聞主客作曲水詩序景高又云在北聞主客此製勝於顏延年實願一見融乃示之後日宋辨於瑤池堂謂融曰昔觀相如封禪以知漢武之德今覽王生詩序用見齊王之盛融曰皇家盛明豈直比蹤漢武更慙鄙製無以遠匹相如上以虜獻馬不稱使融問曰秦西冀北實多駿驥而魏主所獻良馬乃駑駘之不若求名檢事殊為未孚將旦旦信誓有時而爽駉駉之牧不能復嗣宋辨曰不容虛偽之名當是不習土地融曰周穆馬迹遍於天下若騏驥之性因地而遷則造父之策有時而躓辨曰王主客何為勤勤於千里融曰卿國既異其優劣聊復相訪若千里日至聖上當駕鼓車辨曰向意既須必不能駕鼓車也融曰買死馬之骨亦以郭隗之故辨不能答融自恃人地三十內望為公輔直中書省夜歎曰鄧禹笑人行逢大耳臼兒開喧湫不得進又歎曰車前無八騶卒何得稱為丈夫朝廷討雍州刺史王奐融復上疏曰臣每覽史傳見憂國忘家捐生報德者未曾不撫卷歎息以為今古共情也然或以片言微感一餐小惠參國士之眄同布素之遊耳豈有如臣獨拔無聞之伍過超非分之位名器雙假榮祿兩升而宴安罷之晨優遊旰食之日所以敢布丹愚仰聞宸聽今議者或以西夏為念臣竊謂之不爾其故何哉陛下聖明羣臣悉力從以制逆上而御下指開賞黜之言微示生死之路方域之人皆相為敵既兵威遠臨人不自保雖窮鳥必啄固等命於梁鶉困獸斯驚終並懸於廚鹿凱師勞飲固不待晨臣之寸心獨有微願自獫狁荐食荒侮伊天道禍淫危亡日至母后內難糧力外虛謠言物情屬當今會若藉巫漢之歸師騁士卒之餘憤取函谷如反掌陵關塞若摧枯但士非素蓄無以即用不教民戰是實棄之特希私集部曲豫加習校若蒙垂許乞隸監省拘食人身權備石頭防衛之數臣少重名節早習軍旅若試而無績伏受面欺之誅用且有功仰酬知人之哲會虜動竟陵王子良於東府募人板融寧朔將軍軍主融文辭辨捷尤善倉卒屬綴有所造作援筆可待子良特相友好情分殊常晚節大習騎馬才地既華兼藉子良之勢傾意賓客勞問周款文武翕習輻湊之招集江西傖楚數百人並有幹用世祖疾篤暫絶子良在殿內太孫未入融戎服絳衫於中書省閣口斷東宮仗不得進欲立子良上既蘇太孫入殿朝事委高宗融知子良不得立乃釋服還省歎曰公誤我鬱林深忿疾融即位十餘日收下廷尉獄然後使中丞孔稚圭倚為奏曰融姿性剛險立身浮競動迹驚羣抗言異類近塞外微塵苦求將領遂招納不逞扇誘荒傖狡算聲勢專行權利反覆脣齒之間傾動頰舌之內威福自己無所忌憚誹謗朝政歷毀王公謂己才流無所推下事曝遠近使融依源據答融辭曰囚實頑蔽觸行多愆但夙恭忝門素得奉教君子爰自總髮迄將立年州閭鄉黨見許愚慎朝廷衣冠謂無舋咎過蒙大行皇帝奬育之恩又荷文皇帝識擢之重司徒公賜預士林安陸王曲垂眄接既身被國慈必欲以死自效前後陳伐虜之計亦仰簡先朝今假犬羊乍擾紀僧真奉宣先敕賜語北邊動靜令囚草撰符詔于時即因啓聞希侍鑾輿及司徒宣敕招募同例非一實以戎事不小不敢承教續蒙軍號賜使招集銜敕而行非敢虛扇且格取亡叛不限傖楚狡聲勢應有形迹專行權利又無贓賄反覆脣齒之間未審悉與誰言輕傾動頰舌之內不容都無主此但聖主膺教實所沐浴自上甘露頌及銀甕啓三日詩序接虜使語辭竭思稱揚得非誹謗且王公百司唯賢是與高下之敬等秩有差不敢踰濫豈應訾毀因囚才分本劣謬被策用悚怍之情夙宵兢惕未嘗誇示里閭彰曝遠邇自循自省並愧流言良由緣淺寡虞致貽囂謗伏惟明皇臨宇普天蒙澤戊寅赦恩輕重必宥百日曠期始蒙旬日一介罪身獨嬰憲劾若事實有徵爰對有在九死之日無恨泉壤詔於獄賜死時年二十七臨死歎曰我若不為百歲老母當吐一言融意欲指斥帝在東宮時過失也融被收朋友部曲參問北寺相繼於道融請救於子良子良憂懼不敢救融文集行於世謝朓字玄暉陳郡陽夏人也祖述吳興太守父緯散騎侍郎朓少好學有美名文章清麗解褐豫章王太尉行參軍度隨王東中郎府轉王儉衛軍東閣祭酒太子舍人隨王鎮西功曹轉文學子隆在荊州好辭賦數集僚友朓以文才尤被賞愛流連晤對不捨日夕長史王秀之以朓年少相動密以啓聞世祖敕曰侍讀虞雲自宜恆應侍接朓可還都朓道中為詩寄西府曰常恐鷹隼擊秋菊委嚴霜寄言罻羅者寥廓已高翔遷新安王中軍記室朓箋辭子隆曰朓聞潢汙之水思朝宗而每竭駑蹇之乘希沃若而中疲何則臯壤搖落對之惆悵岐路東西或以嗚悒況乃服義徒擁歸志莫從邈若墜雨飄似秋蒂朓實庸流行能無算屬天地休明山川受納褒採一介搜揚小善捨耒場圃奉筆菟園東亂三江西浮七澤契闊戎旃從容宴語長裾日曳後乘載脂榮立府廷恩加顏色沐髮晞陽未測涯涘撫臆論報早誓肌骨不悟滄溟末未運波臣自蕩渤澥方春旅翮先謝清切蕃房寂寥舊蓽輕舟反泝弔影獨留白雲在天龍門不見去德滋永思德滋深唯待青江可望候歸艎於春渚朱邸方開效蓬心於秋實如其簪履或存衽席無改雖復身填溝壑猶望妻子知歸攬涕告辭悲來橫集尋以本官兼尚書殿中郎隆昌初敕朓接北使朓自以口訥啓讓不當不見許高宗輔政以朓為驃騎咨議領記室掌霸府文筆又掌中書詔誥除祕書丞未拜仍轉中書郎出為宣城太守以選復為中書郎建武四年出為晉安王鎮北咨議南東海太守行南徐州事啓王敬則反謀上甚善嘉賞之遷尚書吏部郎朓上表三讓中書疑朓官未及讓以問祭酒沈約約曰宋元嘉中范蟲念讓吏部朱修之讓黃門蔡興宗讓中書並三表詔答具事宛然近世小官不讓遂成恆俗恐此有乖讓意王藍田劉安西並貴重初不自不讓今豈可慕此不讓邪孫興公孔顗並讓記室今豈可三署皆讓邪謝吏部今授超階讓別有意豈關官之大小撝讓之美本出人情若大官必讓便與詣闕章表不異例既如此謂都自非疑朓又啓讓上優答不許朓善草隸長五言詩沈約常云二百年來無此詩也敬皇后遷祔山陵朓撰哀策文齊世莫有及者東昏失德江祐欲立夏王寶玄末更回惑與弟祀密謂朓曰江夏年少輕脫不堪負荷神器不可復行廢立始安年長入纂不乖物望非以此要富貴政是求安國家耳遙光又遺遣親人劉渢密致意於朓欲以為肺腑朓自以受恩高宗非渢所言不肯答少日遙光以朓兼知衛尉事朓懼見引即以祏等謀告左興盛興盛不敢發言祏聞以告遙光遙光大怒乃稱敕見召朓仍回車付廷尉與徐孝嗣祏暄等連名啓誅朓曰謝朓資性險薄大彰遠近王敬則往構凶逆微有誠效自爾升擢超越倫伍而溪壑無厭著於觸事比遂扇動內外處處姦説妄貶乘輿竊論宮禁間謗親賢輕議朝宰醜言異計非可具聞無君之心既著共棄之誅宜及臣等參議宜下北里肅正刑書詔公等啓事如此朓資性輕險久彰物議直以雕蟲薄伎見齒衣冠昔在渚宮構扇蕃邸日夜縱諛仰窺俯畫及還京師翻自宣露江漢無波以為己功素論於茲而盡縉紳所以側目去夏之事頗有微誠賞擢曲加踰邁倫序感悅未聞陵競彌著遂復矯構風塵妄惑朱紫詆貶朝政疑間親賢巧言利口見醜前志涓流纖孽作戒遠圖宜有少正之刑以申去害之義便可收付廷尉肅明國典又使御史中丞范岫奏收朓下獄死時年三十六朓初告王敬則敬則女為朓妻常懷刀欲報朓朓不敢相見及為吏部郎沈昭略謂朓曰卿人地之美無忝此職但恨今日刑于寡妻朓臨敗歎曰我不殺王公王公由我而死史臣曰晉世遷宅江表人無北歸之計英霸作輔芟定中原彌見金德之不競也元嘉再略河南師旅傾覆自此以來攻伐寢議雖有戰爭事存保境王融生遇永明軍國寧息以文敏才華不足進取經略心旨殷勤表奏若使宮車未晏有事邊關融之報效或不易限夫經國體遠許久為難而立功立事信居物右其賈誼終軍之流亞乎贊曰元長穎脫拊翼將飛時來運往身沒志違高宗始業乃顧玄暉逢昏屬亂先蹈禍機
