body:
  text: 南齊書卷三十三列傳第十四王僧虔張緒王僧虔琅邪臨沂人也祖珣晉司徒伯父太保弘宋元嘉世為宰輔賓客疑所諱弘曰身家諱與蘇子高同父曇首右光祿大夫曇首兄弟集會諸子孫弘子僧達下地跳戲僧虔年數歲獨正坐採蠟燭珠為鳳凰弘曰此兒終當為長者僧虔弱冠弘厚善隸書宋文帝見其書素扇歎曰非唯跡逾子敬方當器雅過之除祕書郎太子舍人退默少交接與袁淑謝莊善轉義陽王文學太子洗馬遷司徒左西屬兄僧綽為太初所害親賓咸勸僧虔逃僧虔涕泣曰吾兄奉國以忠貞撫我以慈愛今日之事苦不見及耳若同歸九泉猶羽化也孝武初出為武陵太守兄子儉於中途得病僧虔為廢寢食同行客慰喻之僧虔曰昔馬援處兒姪之閒一情不異鄧攸於弟子更逾所生吾實懷其心誠未異古亡兄之胤不宜忽諸若此兒不救便當回舟謝職無復遊官宦之興矣還為中書郎轉黃門郎太子中庶子孝武欲擅書名僧虔不敢顯跡大明世常用掘筆書以此見容出為豫章王子尚撫軍長史遷散騎常侍復為新安王子鸞北中郎長史南東海太守行南徐州事二蕃皆帝愛子也尋遷豫章內史入為侍中遷御史中丞領驍騎將軍甲族向來多不居憲臺王氏以分枝居烏衣者位官微減僧虔為此官乃曰此是烏衣諸郎坐處我亦可試為耳復為侍中領屯騎校尉泰始中出為輔國將軍吳興太守秩中二千石王獻之善書為吳興郡及僧虔工書又為郡論者稱之徙為會稽太守秩中二千石將軍如故中書舍人阮佃夫家在會稽請假東歸客勸僧虔以佃夫要倖宜加禮接僧虔曰我立身有素豈能曲意此輩彼若見惡當拂衣去耳佃夫言於宋明帝使御史中丞孫敻奏僧虔前莅吳興多有謬命檢到郡至遷凡用功曹五官主簿至二禮吏署三傳及度與弟子合四百四十八人又聽民何係先等一百十家為舊門委州檢削坐免官尋以白衣兼侍中出監吳郡太守遷使持節都督湘州諸軍事建武將軍行湘州事仍轉輔國將軍湘州刺史所在以寬惠著稱巴峽流民多在湘土僧虔表割益陽羅湘西三縣緣江民立湘陰縣從之元徽中遷吏部尚書高平檀珪罷沅南令僧虔以為征北板行參軍訴僧虔求祿不得與僧虔書曰五常之始文武為先文則經緯天地武則撥亂定國僕一門雖謝文通乃忝武達羣從姑叔三媾帝室祖兄二世糜軀奉國而致子姪餓死草壤去冬今春頻荷二敕既無中人屢見蹉奪經涉五朔踰歷四晦書牘十二接覲六七遂不荷潤反更曝鰓九流繩平自不宜獨苦一物蟬腹龜腸為日已久飢虎能嚇人遽與肉餓麟不噬誰為落毛去冬乞豫章丞為馬超所爭今春蒙敕南昌縣為史偃所奪二子勳蔭人才有何見勝若以貧富相奪則分受不如身雖孤微百世國士姻媾位宦亦不後物尚書同堂姊為江夏王妃檀珪同堂姑為南譙王妃尚書婦是江夏王女檀珪祖姑嬪長沙景王尚書伯為江州檀珪祖亦為江州尚書從兄出身為後軍參軍檀珪父釋褐亦為中軍參軍僕於尚書人地本懸至於婚宦不肯殊絕今通塞雖異猶忝氣類尚書何事乃爾見苦泰始之初八表同逆一門二世粉骨衞主殊勳異績已不能甄常階舊途復見侵抑僧虔報書曰征北板比歲處遇小優殷主簿從此府入崇禮何儀曹即代殷亦不見訴為苦足下積屈一朝超升政自小難泰始初勤苦十年自未見其賞而頓就求稱亦何可遂吾與足下素無怨憾何以相侵苦直是意有佐佑耳珪又書曰昔荀公達漢之功臣晉武帝方爵其玄孫夏侯惇魏氏勳佐金德初融亦始就甄顯方賞其孫封樹近族羊叔子以晉泰始中建策伐吳至咸寧末方加襃寵封其兄子卞望之以咸和初殞身國難至興寧末方崇禮秩官其子孫蜀郡主簿田混黃初末死故君之難咸康中方擢其子孫似不以世代遠而被棄年世疎而見遺檀珪百罹六極造化罕比五喪停露百口轉命存亡披迫本希小祿無意階榮自古以來有沐食侯近代有王官府佐非沐食之職參軍非王官之謂質非匏瓜實羞空懸殷何二生或是府主情味或是朝廷意旨豈與悠悠之人同口而語使僕就此職尚書能以郎見轉不若使日得五升祿則不恥執鞭僧虔乃用為安城郡丞珪宋安南將軍韶孫也僧虔尋加散騎常侍轉右僕射昇明元年遷尚書僕射尋轉中書令左僕射二年為尚書令僧虔好文史解音律以朝廷禮樂多違正典民閒競造新聲雜曲時太祖輔政僧虔上表曰夫懸鍾之器以雅為用凱容之禮八佾為儀今總章羽佾音服舛異又歌鍾一肆克諧女樂以歌為務非雅器也大明中即以宮懸合和鞞拂節數雖會慮乖雅體將來知音或譏聖世若謂鍾舞已諧重違成憲更立歌鍾不參舊例四縣所奏謹依雅條即義沿理如或可附又今之清商實由銅爵三祖風流遺音盈耳京洛相高江左彌貴諒以金石干羽事絕私室桑濮鄭衞訓隔紳冕中庸和雅莫復於斯而情變聽移稍復銷落十數年閒亡者將半自頃家競新哇人尚謠俗務在噍殺不顧音紀流宕無崖未知所極排斥正曲崇長煩淫士有等差無故不可去樂禮有攸序長幼不可共聞故喧醜之制日盛於㕓里風味之響獨盡於衣冠宜命有司務懃功課緝理遺逸迭相開曉所經漏忘悉加補綴曲全者祿厚藝妙者位優利以動之則人思刻厲反本還源庶可跂踵事見納建元元年轉侍中撫軍將軍丹陽尹二年進號左衞將軍固讓不拜改授左光祿大夫侍中尹如故郡縣獄相承有上湯殺囚僧虔上疏言之曰湯本以救疾而實行寃暴或以肆忿若罪必入重自有正刑若去惡宜疾則應先啟豈有死生大命而潛制下邑愚謂治下囚病必先刺郡求職司與醫對共診驗遠縣家人省視然後處理可使死者不恨生者無怨上納其言僧虔留意雅樂昇明中所奏雖微有釐改尚多遺失是時上始欲通使僧虔與兄子儉書曰古語云中國失禮問之四夷計樂亦如苻堅敗後東晉始備金石樂故知不可全誣也北國或有遺樂誠未可便以補中夏之闕且得知其存亡亦一理也但鼓吹舊有二十一曲今所能者十一而已意謂北使會有散役得今樂署一人粗別同異者充此使限雖復延州難追其得知所知亦當不同若謂有此理者可得申吾意上聞否試為思之事竟不行太祖善書及即位篤好不已與僧虔賭書畢謂僧虔曰誰為第一僧虔曰臣書第一陛下亦第一上笑曰卿可謂善自為謀矣示僧虔古迹十一袠就求能書人名僧虔得民閒所有袠中所無者吳大皇帝景帝歸命侯書桓玄書及王丞相導領軍洽中書令珉張芝索靖衞伯儒張翼十二卷奏之又上羊欣所撰能書人名一卷其年冬遷持節都督湘州諸軍事征南將軍湘州刺史侍中如故清簡無所欲不營財產百姓安之世祖即位僧虔以風疾欲陳解會遷侍中左光祿大夫開府儀同三司僧虔少時羣從宗族竝會客有相之者云僧虔年位最高仕當至公餘人莫及也及授僧虔謂兄子儉曰汝任重於朝行當有八命之禮我若復此授則一門有二台司實可畏懼乃固辭不拜上優而許之改授侍中特進左光祿大夫客問僧虔固讓之意僧虔曰君子所憂無德不憂無寵吾衣食周身榮位已過所慙庸薄無以報國豈容更受高爵方貽官謗邪兄子儉為朝宰起長梁齋制度小過僧虔視之不悅竟不入戶儉即毀之永明三年薨僧虔頗解星文夜坐見豫章分野當有事故時僧虔子慈為豫章內史慮其有公事少時僧虔薨慈棄郡奔赴僧虔時年六十追贈司空侍中如故諡簡穆其論書曰宋文帝書自云可比王子敬時議者云天然勝羊欣功夫少於欣王平南廙右軍叔過江之前以為最亡曾祖領軍書右軍云弟書遂不減吾變古制今唯右軍領軍不爾至今猶法鍾張亡從祖中書令書子敬云弟書如騎騾駸駸恆欲度驊騮前庾征西翼書少時與右軍齊名右軍後進庾猶不分在荊州與都下人書云小兒輩賤家雞皆學逸少書須吾下當比之張翼王右軍自書表晉穆帝令翼寫題後答右軍當時不別久後方悟云小人幾欲亂真張芝索靖韋誕鍾會二衞竝得名前代無以辨其優劣唯見其筆力驚異耳張澄當時亦呼有意郗愔章草亞於右軍郗嘉賓草亞於二王緊媚過其父桓玄自謂右軍之流論者以比孔琳之謝安亦入能書錄亦自重為子敬書嵇康詩羊欣書見重一時親受子敬行書尤善正乃不稱名孔琳之書天然放縱極有筆力規矩恐在羊欣後丘道護與羊欣俱面受子敬故當在欣後范虫念與蕭思話同師羊欣後小叛既失故步為復小有意耳蕭思話書羊欣之影風流趣好殆當不減筆力恨弱謝綜書其舅云緊生起是得賞也恨少媚好謝靈運乃不倫遇其合時亦得入流賀道力書亞丘道護庾昕學右軍亦欲亂真矣又著書賦傳於世第九子寂字子玄性迅動好文章讀范滂傳未常不歎挹王融敗後賓客多歸之建武初欲獻中興頌兄志謂之曰汝膏粱年少何患不達不鎮之以靜將恐貽譏寂乃止初為祕書郎卒年二十一僧虔宋世嘗有書誡子曰知汝恨吾不許汝學欲自悔厲或以闔棺自欺或更擇美業且得有慨亦慰窮生但亟聞斯唱未覩其實請從先師聽言觀行冀此不復虛身吾未信汝非徒然也往年有意於史取三國志聚置床頭百日許復徙業就玄自當小差於史猶未近彷佛曼倩有云談何容易見諸玄志為之逸腸為之抽專一書轉誦數十家注自少至老手不釋卷尚未敢輕言汝開老子卷頭五尺許未知輔嗣何所道平叔何所說馬鄭何所異指例何所明而便盛於麈尾自呼談士此最險事設令袁令命汝言易謝中書挑汝言莊張吳興叩汝言老端可復言未嘗看邪談故如射前人得破後人應解不解即輸賭矣且論注百氏荊州八袠又才性四本聲無哀樂皆言家口實如客至之有設也汝皆未經拂耳瞥目豈有庖廚不脩而欲延大賓者哉就如張衡思侔造化郭象言類懸河不自勞苦何由至此汝曾未窺其題目未辨其指歸六十四卦未知何名莊子衆篇何者內外八袠所載凡有幾家四本之稱以何為長而終日欺人人亦不受汝欺也由吾不學無以為訓然重華無嚴父放勳無令子亦各由己耳汝輩竊議亦當云何日不學在天地閒可嬉戲何忽自課讁幸及盛時逐歲暮何必有所減汝見其一耳不全爾也設令吾學如馬鄭亦必甚勝復倍不如今亦必大減致之有由從身上來也汝今壯年自懃數倍許勝劣及吾耳世中比例舉眼是汝足知此不復具言吾在世雖乏德素要復推排人閒數十許年故是一舊物人或以比數汝等耳即化之後若自無調度誰復知汝事者舍中亦有少負令譽弱冠越超清級者于時王家門中優者則龍鳳劣者猶虎豹失蔭之後豈龍虎之議況吾不能為汝蔭政應各自努力耳或有身經三公蔑爾無聞布衣寒素卿相屈體或父子貴賤殊兄弟聲名異何也體盡讀數百卷書耳吾今悔無所及欲以前車誡爾後乘也汝年入立境方應從官兼有室累牽役情性何處復得下帷如王郎時邪為可作世中學取過一生耳試復三思勿諱吾言猶捶撻志輩冀脫万一未死之閒望有成就者不知當有益否各在爾身己切身豈復關吾邪鬼唯知愛深松茂栢寧知子弟毀譽事因汝有感故略胸懷矣張緒字思曼吳郡吳人也祖茂度會稽太守父寅太子中舍人緒少知名清簡寡欲叔父鏡謂人曰此兒今之樂廣也州辟議曹從事舉秀才建平王護軍主簿右軍法曹行參軍司空主簿撫軍南中郎二府功曹尚書倉部郎都令史諮郡縣米事緒蕭然直視不以經懷除巴陵王文學太子洗馬北中郎參軍太子中舍人本郡中正車騎從事中郎中書郎州治中黃門郎宋明帝每見緒輒歎其清淡轉太子中庶子本州大中正遷司徒左長史吏部尚書袁粲言於帝曰臣觀張緒有正始遺風宜為宮職復轉中庶子領翊軍校尉轉散騎常侍領長水校尉尋兼侍中遷吏部郎參掌大選元徽初東宮罷選曹擬舍人王儉格外記室緒以儉人地兼美宜轉祕書丞從之緒又遷侍中郎如故緒忘情榮祿朝野皆貴其風嘗與客閑言一生不解作諾時袁粲褚淵秉政有人以緒言告粲淵者即出緒為吳郡太守緒初不知也遷為祠部尚書復領中正遷太常加散騎常侍尋領始安王師昇明二年遷太子祖太傅長史加征虜將軍齊臺建轉散騎常侍世子詹事建元元年轉中書令常侍如故緒善言素望甚重太祖深加敬異僕射王儉謂人曰北士中覔張緒過江未有人不知陳仲弓黃叔度能過之不耳車駕幸莊嚴寺聽僧達道人講座遠不聞緒言上難移緒乃遷僧達以近之尋加驍騎將軍欲用緒為右僕射以問王儉儉曰南士由來少居此職褚淵在座啟上曰儉年少或不盡憶江左用陸玩顧和皆南人也儉曰晉氏衰政不可以為准則上乃止四年初立國學以緒為太常卿領國子祭酒常侍中正如故緒既遷官上以王延之代緒為中書令時人以此選為得人比晉朝之用王子敬王季琰也緒長於周易言精理奧見宗一時常云何平叔所不解易中七事諸卦中所有時義是其一也世祖即位轉吏部尚書祭酒如故永明元年遷金紫光祿大夫領太常明年領南郡王師加給事中太常如故三年轉太子詹事師給事如故緒每朝見世祖目送之謂王儉曰緒以位尊我我以德貴緒也遷散騎常侍金紫光祿大夫師如故給親信二十人復領中正長沙王晃屬選用吳興聞人邕為州議曹緒以資藉不當執不許晃遣書佐固請之緒正色謂晃信曰此是身家州鄉殿下何得見逼七年竟陵王子良領國子祭酒世祖敕王晏曰吾欲令司徒辭祭酒以授張緒物議以為云何子良竟不拜以緒領國子祭酒光祿師中正如故緒口不言利有財輒散之清言端坐或竟日無食門生見緒飢為之辨飡然未嘗求也卒時年六十八遺命作蘆葭車靈上置杯水香火不設祭從弟融敬重緒事之如親兄齎酒於緒靈前酌飲慟哭曰阿兄風流頓盡追贈散騎常侍特進金紫光祿大夫諡簡子子克蒼梧世正員郎險行見寵坐廢錮克弟允永明中安西功曹淫通殺人伏法允兄充永明元年為武陵王友坐書與尚書令王儉辭旨激揚為御史中丞到撝所奏免官禁錮論者以為有恨於儉也案建元初中詔序朝臣欲以右僕射擬張岱褚淵謂得此過優若別有忠誠特進升引者別是一理仰由裁照詔更量說者既異今兩記焉史臣曰王僧虔有希聲之量兼以藝業戒盈守滿發屈己自容方軌諸公實平世之良相張緒凝衿素氣自然標格搢紳端委朝宗民望夫如緒之風流者豈不謂之名臣贊曰簡穆長者其義恢恢聲律草隸爕理三台思曼廉靜自絕風埃遊心爻繫物允清才
