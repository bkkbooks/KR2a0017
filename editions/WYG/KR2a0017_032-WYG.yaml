body:
  text: 南齊書卷三十二梁蕭子顯撰列傳第十三王琨張岱褚炫何戢王延之阮韜王琨琅邪臨沂人也祖薈晉衛將軍父懌不慧侍婢生琨名為崑崙懌後娶南陽樂𤣥女無子改琨名立以為嗣琨少謹篤為從伯司徒謐所愛宋永初中武帝以其娶桓修女除郎中駙馬都尉奉朝請元嘉初從兄侍中華有寵權以門户衰弱待琨如親數相稱薦為尚書儀曹郎州治中累至左軍諮議領録事出為宣城太守司徒從事中郎義興太守歴任皆亷約還為北中郎長史黄門郎寧朔將軍東陽太守孝建初遷廷尉卿竟陵王驃騎長史加臨淮太守轉吏部郎吏曹選局貴要多所屬請琨自公卿下至士大夫例為用兩門生江夏王義恭嘗屬琨用二人後復遣屬琨答不許出為持節都督廣交二州軍事建威將軍平越將軍平越中郎廣州刺史南土沃實在任者常致巨富世云廣州刺史但經城門一過便得三千萬也琨無所取納表獻禄俸之半州鎮舊有鼔吹又啟輸還及罷任孝武知其清問還資多少琨曰臣買宅百三十萬餘物稱之帝悦其對為廷尉加給事中轉寧朔將軍長史歴陽内史上以琨忠實徙為寵子新安王東中郎長史加輔國將軍遷右衛將軍度支尚書出為永嘉王左軍始安王征虜二府長史加輔國將軍廣陵太守皆孝武諸子泰始元年遷度支尚書尋加光禄大夫初從兄華孫長襲華爵為新建侯嗜酒多諐失琨上表曰臣門姪不休從孫長是故左衛將軍嗣息少資常猥猶冀晚進頃更昏酣業身無檢故衛將軍華忠肅奉國善及世祀而長負舋承封將傾基緒嗣小息佟閑立保退不乖素風如䝉拯立則存亡荷榮私禄更構出為冠軍將軍呉郡太守遷中領軍坐在郡用朝舎錢三十六萬營餉二宫諸王及作絳襖奉獻軍用乃左遷光禄大夫尋加太常及金紫加散騎常侍廷尉虞龢議社稷合為一神琨案舊紏駮時龢深被親寵朝廷多琨强正明帝臨崩出為督㑹稽東陽新安臨海永嘉五郡軍事左軍將軍㑹稽太守常侍如故坐誤竟囚䧏號冠軍元徽中遷金紫光禄引訓太僕常侍如故本州中正加特進順帝即位進右光禄大夫常侍餘如故順帝遜位琨陪位及辭廟皆流涕太祖即位領武陵王師加侍中給親信二十人時王儉為宰相屬琨用東海郡迎吏琨謂信人曰語郎三臺五省皆是郎用人外方小郡當乞寒賤省官何容復奪之遂不過其事琨性既古慎而儉嗇過甚家人雜事皆手自操執公事朝㑹必夙夜早起簡閲衣裳料數冠幘如此數四世以此笑之尋解王師建元四年太祖崩琨聞國諱牛不在宅去臺數里遂歩行入宫朝士皆謂琨曰故宜待車有損國望琨曰今日奔赴皆應爾遂得病卒贈左光禄大夫餘如故年八十四張岱字景山呉郡呉人也祖敞晉度支尚書父茂度宋金紫光禄大夫岱少與兄太子中舎人寅新安太守鏡征北將軍永弟廣州刺史辨俱知名謂之張氏五龍鏡少與光禄大夫顔延之隣居顔談議飲酒喧呼不絶而鏡靜翳無言聲後延之於籬邊聞其與客語取胡床坐聽辭義清𤣥延之心服謂賔客曰彼有人焉由此不復酣呌寅鏡名最髙永辨岱不及也郡舉岱上計掾不行州辟從事累遷南平王右軍主簿尚書水部郎出補東遷令時殷沖為呉興謂人曰張東遷親貧湏養所以栖遲下邑然名器方顯終當大至随王誕於㑹稽起義以岱為建威將軍輔國長史行縣事事平為司徒左西曹母年八十籍注未滿岱便去官從實還養有司以岱違制將欲糾舉宋孝武曰觀過可以知仁不湏案也累遷撫軍諮議參軍領山隂令職事閑理巴陵王休若為北徐州未親政事以岱為冠軍諮議參軍領彭城太守行府州國事後臨海王為征虜廣州豫章王為車騎揚州晉安王為征虜南兖州岱歴為三府諮議三王行事與典籖主帥共事事舉而情得或謂岱曰主王既㓜執事多門而每能緝和公私云何致此岱曰古人言一心可以事百君我為政端平待物以禮悔吝之事無由而及明闇短長更是才用之多少耳入為黄門郎遷驃騎長史領廣陵太守新安王子鸞以盛寵為南徐州割呉郡屬焉髙選佐史孝武帝召岱謂之曰卿羙效夙著兼資宦已多今欲用卿為子鸞别駕總刺史之任無謂小屈終當大伸也帝崩累遷吏部郎明帝初四方反帝以岱堪幹舊才除使持節督西豫州諸軍事輔國將軍西豫州刺史尋徙為冠軍將軍北徐州刺史都督北討諸軍事並不之官泰始末為呉興太守元徽中遷使持節督益寧二州軍事冠軍將軍益州刺史數年益土安其政徵侍中領長水校尉度支尚書領左軍遷吏部尚書王儉為吏部郎時專斷曹事岱每相違執及儉為宰相以此頗不相善兄子瓌弟恕誅呉郡太守劉遐太祖欲以恕為晉陵郡岱曰恕未閑從政羙錦不宜濫裁太祖曰恕為人我所悉且又與瓌同勲自應有賞岱曰若以家貧賜禄此所不論語功推事臣門之恥尋加散騎常侍建元元年出為左將軍呉郡太守太祖知岱歴任清直至郡未㡬手敕岱曰大邦任重乃未欲回換但總戎務殷宜湏望實今用卿為䕶軍加給事中岱拜竟詔以家為府陳疾明年遷金紫光禄大夫領鄱陽王師世祖即位復以岱為散騎常侍呉興太守秩中二千石岱晚節在呉興更以寛恕著名遷使持節監南兗兗徐青冀五州諸軍事後將軍南兖州刺史常侍如故未拜卒年七十一岱初作遺命分張家財封置箱中家業張減随復改易如此十數年贈本官諡貞子褚炫字彦緒河南陽翟人也祖秀之宋太常父法顯鄱陽太守兄炤字彦宣少秉髙節一目眇官至國子博士不拜常非從兄淵身事二代聞淵拜司徒歎曰使淵作中書郎而死不當是一名士邪名徳不昌遂令有期頤之夀炫少清簡為從舅王景文所知從兄淵謂人曰從弟亷勝獨立乃十倍於我也宋義陽王昶為太常板炫補五官累遷太子舎人撫軍車騎記室正員郎從宋明帝射雉至日中無所得帝甚猜羞召問侍臣曰吾旦來如臯遂空行可笑座者莫答炫獨曰今節候雖適而雲霧尚凝故斯翬之禽驕心未警但得神駕游豫羣情便為載懽帝意解乃於雉塲置酒遷中書侍郎司徒右長史昇明初炫以清尚與劉俁謝朏江斆入殿侍文義號為四友遷黄門郎太祖驃騎長史遷侍中復為長史齊臺建復為侍中領歩兵校尉以家貧建元初出補東陽太守加秩中二千石還復為侍中領歩兵凡三為侍中出為竟陵王征北長史加輔國將軍尋徙為冠軍長史江夏内史將軍如故永明元年為吏部尚書炫居身清立非弔問不雜交遊論者以為美及在選部門庭蕭索賔客罕至出行左右捧黄紙帽箱風吹紙剥殆盡罷江夏還得錢十七萬於石頭并分與親族病無以市藥表自陳解改授散騎常侍領安成王師國學建以本官領博士未拜卒無以殯歛時年四十一贈太常諡曰貞子何戢字慧景廬江􅈞人也祖尚之宋司空父偃金紫光禄大夫被遇於宋武選戢尚山隂公主拜駙馬都尉解褐秘書郎太子中舎人司徒主簿新安王文學秘書丞中書郎景和世山隂主就帝求吏部郎褚淵入内侍已淵見拘逼終不肯從與戢同居止月餘日由是特申情好明帝立遷司徒從事中郎從建安王休仁征赭圻板轉戢司馬除黄門郎出為宣威將軍東陽太守吏部郎元徽初褚淵參朝政引戢為侍中時年二十九戢以年未三十苦辭内侍表疏屢上時議許之改授司徒左長史太祖為領軍與戢來往數置歡讌上好水引䴵戢令婦女躬自執事以設上焉久之復為侍中遷安成王車騎長史加輔國將軍濟隂太守行府州事出為呉郡太守以疾歸為侍中秘書監仍轉中書令太祖相國左長史建元元年遷散騎常侍太子詹事尋改侍中詹事如故上欲轉戢領選問尚書令褚淵以戢資重欲加常侍淵曰宋世王球從侍中中書令單作吏部尚書資與戢相似頃選職方昔小輕不容頓加常侍聖㫖每以蟬冕不宜過多臣與王儉既已左珥若復加戢則八座便有三貂若帖以驍游亦為不少乃以戢為吏部尚書加驍騎將軍戢美容儀動止與褚淵相慕時人呼為小褚公家業富盛性又華侈衣被服飾極為奢麗三年出為左將軍呉興太守上頗好畫扇宋孝武賜戢蟬雀扇善畫者顧景秀所畫時陸探微顧彦先皆能畫歎其巧絶戢因王晏獻之上令晏厚酬其意四年卒時年三十六贈散騎常侍撫軍太守如故諡懿子女為鬰林王后又贈侍中光禄大夫王延之字希季琅邪臨沂人也祖裕宋左光禄儀同三司父昇之都官尚書延之出繼伯父秀才粲之延之少而靜黙不交人事州辟主簿不就舉秀才北中郎法曹行參軍轉署外兵尚書外兵部司空主簿並不就除中軍建平王主簿記室仍度司空北中郎二府轉秘書丞西陽王撫軍諮議州别駕尋陽王冠軍安陸王後軍司馬加振武將軍出為安逺䕶軍武陵内史不拜宋明帝為衛軍延之轉為長史加宣威將軍司徒建安王休仁征赭圻轉延之為左長史加寧朔將軍延之清貧居宇穿漏褚淵徃候之見其如此具啟明帝帝即敕材官為起三間齋屋遷侍中領射聲校尉未拜出為呉郡太守罷郡還家産無所増益除吏部尚書侍中領右軍並不拜復為吏部尚書領驍騎將軍出為後軍將軍呉興太守遷都督浙東五郡㑹稽太守轉侍中秘書監晉熙王師遷中書令師如故未拜轉右僕射昇明二年轉左僕射宋徳既衰太祖輔政朝野之情人懐彼此延之與尚書令王僧䖍中立無所去就時人為之語曰二王持平不送不迎太祖以此善之三年出為使持節都督江州豫州之新蔡晉熙二郡諸軍事安南將軍江州刺史建元二年進號鎮南將軍延之與金紫光禄大夫阮韜俱宋領軍劉湛外甥並有早譽湛甚愛之曰韜後當為第一延之為次也延之甚不平每致餉下都韜與朝士同例太祖聞其如此與延之書曰韜云卿未嘗有别意當緣劉家月旦故邪在州禄俸以外一無所納獨處齋内吏民罕得見者四年遷中書令右光禄大夫本州大中正轉左僕射光禄中正如故尋領竟陵王師永明二年陳疾解職世祖許之轉特進右光禄大夫王師中正如故其年卒年六十四追贈散騎常侍右光禄大夫特進如故諡簡子延之家訓方嚴不妄見子弟雖節嵗問訊皆先克日子倫之見兒子亦然永明中為侍中世祖幸琅邪城倫之與光禄大夫全景文等二十一人坐不參承為有司所奏詔倫之親為陪侍之職而同衆惰慢免官景文等贖論建武中至侍中領前軍將軍都官尚書領游擊將軍卒阮韜字長明陳留人晉金紫光禄大夫裕𤣥孫也韜少歴清官為南兖州别駕刺史江夏王劉義恭逆求資費錢韜曰此朝廷物執不與宋孝武選侍中四人並以風貌王彧謝荘為一雙韜與何偃為一雙常充兼假泰始末為征南江州長史桂陽王休範在鎮數出行遊韜性方峙未嘗随從至散騎常侍金紫光禄大夫領始興王師永明二年卒史臣曰内侍樞近世為華選金璫熲耀朝之麗服久忘儒藝專授名家加以簡擇少姿簮貂冠冕基䕃所通後才先貌事同謁者以形骸為官斯違舊矣辟强之在漢朝幼有妙察仲宣之處魏國見貶容陋何戢之讓雖未能深識前古之美與夫尸官靦服者何等級哉賛曰萬石祗慎琨既為倫五龍一氏張亦繼荀炫清褚族戢遺何姻延之居簡名峻王臣南齊書卷三十二
