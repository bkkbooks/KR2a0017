  - {type: variant, offset: 3281, length: 0, content: '', krp: 南齊書卷十六南齊書卷十六考證百官志相國臣祖庚按即漢之相國髙帝置丞相十一年更名相國應劭曰相者助也太傅臣祖庚按周之三公也後漢惟有太傅一人謂之上公此盖遵漢制也大司馬臣宗萬按漢武帝元狩元年始置以冠将軍之號宣帝地節三年置太司馬不冠将軍哀帝建平二年冠将軍如故元夀二年去将軍位在司徒上大将軍臣祖庚按戰國時官楚虜大将軍屈丐是也漢髙帝以韓信為大将軍武帝以衞青為大将軍復置大司馬官號以冠之據此則大司馬與大将軍始分二職至武帝時合為一矣太尉司徒司空臣宗萬按漢初惟有太尉後加置大司徒大司空後漢仍之自漢歴魏皆為三公晉及江左相承不改特進臣宗萬按杜佑曰漢制諸侯功徳優盛朝廷所敬重者賜位特進位在三公下晉元康中定令特進位次諸公在開府驃騎上又按職儀曰特進以功徳特見進也諸開府儀同三司臣祖庚按同三公之三司也後漢太尉司徒司空謂之三司鄧隲為車騎将軍儀同三司自是南北因之有儀同三司之名驃騎将軍漢置位次丞相車騎将軍衛将軍位次上卿掌京師兵衞中軍将軍臣祖庚按晉武帝重兵官故軍校多選朝廷清重之士居之置中軍将軍以統宿衛七軍太常臣祖庚按漢九寺大卿之一也秦為奉常漢景帝中六年更名太常博士臣祖庚按秦官掌通古今秩比六百石員多数十人光禄勲臣祖庚按即秦郎中令漢武帝更名光禄勲邱濬曰即周官之膳夫皆以士為之秦漢時乃持㦸宿衛之官以之司膳羞則始于南北朝也光禄大夫臣祖庚按漢百官表注曰古官也杜佑曰秦時光禄勲属官有中大夫漢武帝太初元年更名光禄大夫掌議論無常事唯備顧問應對詔命所使無員後漢光禄大夫三人晉魏後以為加官又復以為禮贈之官衞尉臣祖庚按秦官漢景帝初更名中大夫令後元年復為衛尉廷尉臣祖庚按秦置漢景帝更名大理武帝復名廷尉盖漢無司冦故廷尉為重顔師古曰廷平也治獄貴平故以為號大司農臣祖庚按秦為理粟内史漢景帝更名大農令武帝改大司農少府秦官漢因之是為九卿将作大匠臣祖庚按秦有将作少府漢景帝更名将作大匠位次河南尹光武省以謁者領之章帝復置晉魏因之太僕臣祖庚按周禮有太僕下大夫周穆王置太僕正以伯冏為之秦漢以後皆因之大鴻臚臣祖庚按秦典客也漢名鴻臚景帝改大行令武帝更名大鴻臚應劭曰鴻聲也臚傳之也大長秋臣宗萬按秦之将行也漢景帝中六年更名大長秋應劭曰皇后卿也顔師古曰秋者收成之時長者恒乆之義故以為皇后官名録尚書臣祖庚按漢章帝以太傅趙熹太尉牟融並錄尚書事尚書有錄名盖自熹始尚書令臣祖庚按杜佑曰秦置漢武帝用宦者更為中書謁者令成帝省之更以士人為尚書令秩二千石吏部尚書度支尚書左民尚書都官尚書五兵尚書祠部尚書起部尚書臣祖庚按尚書之制秦漢以来有之魏置吏部左民客曺五兵度支凡五尚書晋初以左民更名三公五兵更名駕部復置屯田合以吏部客曺度支謂為六曺太康時以三公更名殿中駕部復為五兵省屯田為五尚書宋置都官為六尚書至齊别有起部而不常置也侍中臣祖庚按秦侍中本丞相史也五人徃来殿内東廂奏事謂之侍中漢為加官得入禁中應劭曰入侍天子故曰侍中奉朝請臣宗萬按馬端臨曰奉朝請無員本不為官奉朝㑹請召而已據此則志云永明中奉朝請至六百餘人非古制也祕書監臣祖庚按漢桓帝置後省魏武帝置祕書令文帝黄初初置中書令後仍改為祕書監御史中丞臣祖庚按秦官漢置兩丞一曰御史丞一曰中丞成哀間更中丞為御史長史岀外為臺主光武時復曰中丞魏初改為宫正復曰臺主尋又改為中丞宋齊以来因之謁者僕射臣祖庚按應劭曰秦官也古重武事故設主射以督之謁者臣祖庚按晉百官表注云漢皆用孝亷年五十威容嚴恪能儐賛者為之又云謁者十人掌捧詔書朝㑹則賛儐左右二衛将軍臣祖庚按漢文帝始用宋昌為衞将軍魏置中衞将軍武帝分中衞為左右衞皆掌宿衞營兵驍騎将軍臣祖庚按杜佑曰漢有驍騎将軍謂之雜號将軍後漢建武初改屯衛為驍騎魏晉以来多有改易此盖仍漢制也羽林監臣祖庚按漢武帝太初元年置名曰建章營騎後更名羽林顔師古曰如羽之疾如林之多丹陽尹臣祖庚按周官之内史也掌治京師漢武帝更名京兆尹後漢置河南尹晉太興元年改丹陽内史為尹此因之太子太傅少傅臣祖庚按漢書百官公卿表曰古官也漢官觧詁曰位次太師賈誼曰昔周成王以周公為太傅召公為太保呂望為太師又立三少皆上大夫與太子居處又續漢書百官志曰太子少傅秩二千石亦以輔導為職太子家令臣宗萬按通典曰秦官属詹事漢因之續漢書百官志曰職如司農太子僕臣宗萬按通典曰秦官漢因之後漢属少傅職如太僕太子洗馬臣宗萬按通典曰秦官漢亦曰洗馬後漢員十六人職比謁者晉有八人擬祕書郎齊置一人漢百官表注云洗馬前驅也州牧刺史臣祖庚按杜佑曰舜置十二州有牧夏為九州牧殷周八命曰牧漢元封元年置部刺史成帝時以為刺史位下大夫乃更為州牧秩真二千石位次九卿後復為刺史據此則州牧刺史一官兩名光武不委三府權歸舉刺之吏遂無州牧之名然刺史皆領州故曰州牧刺史郡太守内史臣祖庚按杜佑曰秦滅諸侯以其地為郡置守漢景帝中元二年更名太守漢置郡為諸侯王國者置内史以掌太守之任縣令相臣祖庚按杜佑曰周官有縣正各掌其縣之政令而賞罰之漢制凡縣萬户以上為令減萬户為長侯國為相南齊書卷十六考證}
