body:
  text: 南齊書卷三十梁蕭子顯撰列傳第十一薛淵戴僧靜桓康尹畧焦度曹虎薛淵河東汾隂人也宋徐州刺史安都從子本名道淵避太祖偏諱改安都以彭城降虜親族皆入北太祖鎮淮隂淵遁來南委身自結果幹有氣力太祖使領部曲備衞帳内從征伐元徽末以勲官至輔國將軍右軍將軍驍騎將軍軍主封竟陵矦沈攸之難起太祖入朝堂豫章王嶷代守東府使淵領軍屯司徒左府分備京邑袁粲據石頭豫章王嶷夜登西門遥呼淵淵驚起率軍赴難先至石頭焚門攻戰事平明旦衆軍還集杜姥宅街路皆滿宫門不開太祖登南掖門樓處分衆軍各還本頓至食後城門開淵方得入見太祖且喜且泣太祖即位増邑為二千五百戸除淮陵太守加寧朔將軍驍騎將軍如故尋為直閣將軍冠軍將軍仍轉太子左率虜遣偽將薛道摽冦夀春太祖以道摽淵之親近敕齊郡太守劉懷慰曰聞道摽分明來其兒婦竝在都與諸弟無復同生者凡此類無為不多方悞之縱不全信足使豺狼疑惑令為淵書與道摽示購之之意虜得書果追道摽遣他將代之世祖即位遷左衛將軍初淵南奔母索氏不得自㧞改嫁長安楊氏淵私遣購贖梁州刺史崔慧景報淵云索在界首遣信拘引已得拔難淵表求觧職至界上迎之見許改授散騎常侍征虜將軍淵母南歸事竟無實永明元年淵上表觧職送貂蟬詔曰逺隔殊方聲問難審淵憂迫之深固辭朝列昔東闗舊典猶通婚宦况母出有差音息時至依附前例不容申許便可斷表速還章服淵以贖母既不得又表陳觧職詔不許後虜使至上為淵致與母書車駕幸安樂寺淵從駕乗虜橋先是勑𦍑虜橋不得入仗為有司所奏免官見原四年出為持節督徐州諸軍事徐州刺史將軍如故明年遷右軍司馬將軍如故轉大司馬濟陽太守將軍如故七年為給事中右衛將軍以疾觧職歸家不能乘車去車脚使人轝之而去為有司所紏見原八年為右將軍大司馬領軍討巴東王子響子響軍主劉超之被捕急以眠褥雜物十餘種賂淵自逃淵匿之軍中為有司所奏詔原十年為散騎常侍將軍如故世祖崩朝廷慮虜南冦假淵節軍主本官如故尋加驍騎將軍假節本官如故隆昌元年出為持節督司州軍事司州刺史右將軍如故延興元年進號平北將軍未拜卒明帝即位方有詔賻錢五萬布五百匹尅日舉哀戴僧靜㑹稽永興人也祖飾宋景平中與富陽孫法先謀亂伏法家口徙青州僧靜少有膽力便弓馬事刺史沈文秀俱没虜後將家屬叛還淮隂太祖撫畜之常在左右僧靜於都載錦出為歐陽戍所得繫兖州獄太祖遣薛淵餉僧靜酒食以刀子置魚腹中僧靜與獄吏飲酒既醉以刀刻械手自折鏁發屋而出歸太祖匿之齋内以其家貧年給榖千斛虜圍甬城遣僧靜戰盪數捷補帳内軍主隨還京師勲階至積射將軍羽林監沈攸之事起太祖入朝堂僧静為軍主從袁粲據石頭太祖遣僧靜將腹心先至石頭時蘇烈據倉城僧靜射書與烈夜縋入城粲登城西南門列燭火處分臺軍至射之火乃滅回登東門其黨輔國將軍孫曇瓘驍勇善戰每盪一合輒大殺傷官軍死者百餘人軍主王天生殊死拒戰故得相持自亥至丑有流星赤色照地墜城中僧靜率力攻倉門身先士卒衆潰僧靜手斬粲於是外軍燒門入初粲大明中與蕭惠開周朗同車行逢大桁開駐車共語惠開取鏡自照曰無年可仕朗執鏡良久曰視死如歸粲最後曰當至三公而不終也僧靜以功除前軍將軍寧朔將軍將士戰亡者太祖為歛祭焉昇明二年除游擊將軍沈攸之平論封諸將以僧靜為興平縣侯邑千戸太祖即位増邑千二百戸除南濟隂太守本官如故除輔國將軍改封建昌建元二年遷驍騎將軍加員外常侍轉太子左衛率世祖踐阼出為持節督徐州諸軍事冠軍將軍北徐州刺史買牛給貧民令耕種甚得荒情遷給事中太子右率尋加通直常侍永明五年隸護軍陳顯達討荒賊桓天生於比陽僧靜與平西司馬韓孟度華山太守康元隆前進未至比陽四十里頓深橋天生引虜歩騎十萬奄至僧靜合戰大破之殺獲萬計天生退還比陽僧静進圍之天生軍出城外僧靜又擊破之天生閉門不復出僧静力疲乃退除征虜將軍南中郎司馬淮南太守八年巴東王子響殺僚佐世祖召僧静使領軍向江陵僧静面啓上曰巴東王年少長史捉之太急忿不思難故耳天子兒過誤殺人有何大罪今忽遣軍西上人情惶懼無所不至僧静不敢奉敇上不荅而心善之徙為廬陵王中軍司馬高平太守將軍如故九年卒詔曰僧静志懷貞果誠著艱難剋殄西墉勲彰運始奄致殞喪惻愴傷懷賻錢五萬布百匹諡壯矦僧靜同郡餘姚人陳𦙍叔本名承叔避宣帝諱改彊辯果捷便刀楯初為左夾轂隊將泰始初隨太祖東討遂歸身隨從征伐小心慎事以功見賞封當陽縣子官至太子左率啓世祖以鍛箭􅀈用鐵多不如鑄作東冶令張候伯以鑄􅀈鈍不合用事不行永明三年卒桓康北蘭陵承人也勇果驍悍宋大明中隨太祖為軍容從世祖在贑縣泰始初世祖起義為郡所縶衆皆散康裝擔一頭貯穆后一頭貯文惠太子及竟陵王子良自負置山中與門客蕭欣祖楊瑑之臯分喜濳三奴向思奴四十餘人相結破郡獄出世祖郡追兵急康等死戰破之隨世祖起義摧堅陷陣膂力絶人所經村邑恣行暴害江南人畏之以其名怖小兒畫其形以辟瘧無不立愈見擢為世祖冠軍府參軍除殿中將軍武騎常侍出補襄賁令桂陽事起康棄縣還都就太祖㑹事平除員外郎元徽五年七月六日夜少帝微行至領軍府帝左右人曰一府人皆眠何不緣牆入帝曰我今夕欲一處作適待明日夜康與太祖所養徤兒盧荒向黒於門間聽得其語明夕王敬則將帝首至扣門康謂是變與荒黒曉下拔白刃欲出仍隨入宫太祖鎮東府除康武陵王中兵寧朔將軍帶蘭陵太守常衛左右太祖誅黄回回時為南兖州部曲數千欲收恐為亂召入東府停外齋使康將數十人數回罪然後殺之回初與屯騎校尉王宜與同石頭之謀太祖隱其事猶以重兵付回而配以腹心宜與拳㨗善舞刀楯回嘗使十餘人以水交灑不能著既慮宜與反已乃先撤其軍將宜與不與回發怒不從處分擅斬之諸將因此白太祖以回握彊兵必遂反覆康請獨往刺之太祖曰卿等何疑甚彼無能為也及回被召上車愛妾見赤光冠其頭至足苦捉留回不肯止時人為之語曰欲侜張問桓康除後軍將軍直閣將軍南濮陽太守寧朔如故建元元年封吳平縣伯五百戸轉輔國將軍左軍將軍游擊將軍太守如故太祖謂康曰卿隨我日久未得方伯亦當未解我意政欲與卿先共滅虜耳虜動遣康行假節尋進冠軍將軍三年春於淮陽與虜戰大破之進兵攻陷虜樊諧城太祖喜敕康迎淮北義民不剋明年以康為持節督青冀二州東徐之東莞琅邪二郡朐山戍北徐之東海漣口戍諸軍事青冀二州刺史冠軍如故世祖即位轉驍騎將軍復前軍郡其年卒詔曰康昔預南勲義兼常懷倍深惻愴㓙事所須厚加料理年五十七淮南人尹畧少伏事太祖晚習騎射以便捷見使為將昇明中為虎賁中郎越騎校尉建元初封平周男三百戸永明八年為游擊將軍討巴東王子響見害贈輔國將軍梁州刺史焦度字文續南安氐人也祖文珪避難至襄陽宋元嘉中僑立天水郡畧陽縣乃屬焉度以歸國補北館客孝武初青州刺史顔師伯出鎮滑臺度領幢主送之索虜冦青州師伯遣度領軍與虜戰於沙溝杜梁度身破陣大捷師伯板為已輔國府參軍虜遣清水公拾賁敕文冦清口度又領軍救援刺虜騎將豹皮公墮馬獲其具裝鎧矟手殺數十人師伯啓孝武稱度氣力弓馬竝絶人帝召還充左右見度身形黒壯謂師伯曰真健物也除西陽王撫軍長兼行參軍補晉安王子勛夾轂隊主隨鎮江州子勛起兵以度為龍驤將軍領三千人為前鋒屯赭圻每與臺軍戰常自排突所向無不勝事敗逃宫亭湖中為冦賊朝廷聞其勇甚憂患之使江州刺史王景文誘降度等將部曲出首景文以為已鎮南參軍尋領中直兵厚待之隨景文還都常在府州内景文被害夕度大怒勸景文拒命景文不從明帝不知也以度武勇補晉熙王燮防閤除征虜鎧曹行參軍隨鎮夏口武陵王贊代燮為郢州度仍留鎮為贊前軍參軍沈攸之事起轉度中直兵加寧朔將軍軍主太祖又遣使假度輔國將軍屯騎校尉攸之大衆至夏口將直下都留偏兵守郢城而已度於城樓上肆言罵辱攸之至自發露形體穢辱之故攸之怒改計攻城度親力戰攸之衆䝉楯將登度令投以穢器賊衆不能冐至今呼此樓為焦度樓事寧度功居多轉後軍將軍封東昌縣子東宫直閤將軍為人朴澀欲就太祖求州比及見意色甚變竟不得一語太祖以其不閑民事竟不用建元四年乃除淮陵太守本官如故度見朝廷貴戚説郢城事宣露如初好飲酒醉輒暴怒上常使人節之年雖老而氣力如故尋除游擊將軍永明元年卒年六十一贈輔國將軍梁秦二州刺史子世榮永明中為巴東王防閤子響事世榮避奔雍州世祖嘉之以為始興中兵參軍曹虎字士威下邳下邳人也本名虎頭宋明帝末為直廂桂陽賊起隨太祖出新亭壘出戰先斬一級持還由是識太祖太祖為領軍虎訴勲補防殿隊主直西齋蒼梧廢明日虎欲出外避難遇太祖在東中華門問虎何之虎因曰故欲仰覔明公耳仍留直衛太祖鎮東府以虎與戴僧靜各領白直三百人累至屯騎校尉帯南城令豫平石頭封羅江縣男除前軍將軍上受禪増邑為四百戸直閤將軍領細仗主尋除寧朔將軍東莞太守建元元年冬虎啓乞改封候官尚書奏候官戸數殷廣乃改封監利縣二年除游撃將軍本官如故及彭沛義民起遣虎領六千人入渦沈攸之横吹一部京邑之絶虎啓以自隨義民久不至虎乃攻虜别營破之將士貪取俘執反為虜所敗死亡二千人世祖即位除員外常侍遷南中郎司馬加寧朔將軍南新蔡太守永明元年徙為安成王征虜司馬餘官如故明年江州蠻動敕虎領兵戍尋陽板輔國將軍伐蠻軍主又領尋陽相尋除游擊將軍輔國軍主如故世祖以虎頭名鄙敕改之六年四月荒賊桓天生復引虜出據隔城遣虎督數軍討之虎令輔國將軍朱公恩領騎百匹及前行踏伏值賊遊軍因合戰破之遂進至隔城賊黨拒守虎引圍柵絶其走路須臾候騎還報虜援已至尋而天生率馬歩萬餘人迎戰虎奮擊大敗之獲二千餘人明日遂攻隔城㧞之斬偽虎威將軍襄城太守帛烏祝復殺二千餘人賊棄平氐城退走十一年遷冠軍將軍驍騎如故明年遷太子左率轉西陽王冠軍司馬廣陵太守上敕虎曰廣陵須心腹非吾意可委者不可得處此任隨郡王子隆代巴東王子響為荆州備軍容西上以虎為輔國將軍鎮西司馬南平内史十一年收雍州刺史王奐敕領歩騎數百歩道取襄陽仍除持節督梁南北秦沙四州諸軍事西戎校尉梁南秦二州刺史將軍如故尋進號征虜將軍鬱林即位進號前將軍隆昌元年遷督雍州郢州之竟陵司州之隨郡軍事冠軍將軍雍州刺史建武元年進號右將軍二年進督為監進號平北將軍爵為侯増邑三百戸四年虜冦沔北虎聚軍襄陽與南陽太守房伯玉不協不急赴救末乃移頓樊城虜主元宏遺虎書曰皇帝謝偽雍州刺史神運兆中皇居闡洛化揔元天方融八表而南有未賔之吳治為兩主之隔幽顯含嗟人靈壅閼且漢北江邊密邇乾縣故先動鳯駕整我神邑卿進無陳平歸漢之智退闕雲長殉節之忠嬰閉窮城憂頓長沔機勇兩缺何其嗟哉朕比乃欲造卿逼宂未果且還新都響厥六戎入彼春月遲遲揚斾善脩爾畧以俟義臨虎使人答書曰自金精失道皇居徙縣喬木空存茂草方鬱七狄交侵五胡代起顧瞻中原每用弔焉知棄臯蘭隨水瀍澗伊川之象爰在兹日古人有云匪宅是卜而鄰是卜樊漢無幸咫尺殊風折膠入塞乘秋犯邊親屬窮於斬殺士女困於䖍劉與彼蠢左共為脣齒仁義弗聞苛暴先露乃復改易氈裘妄自尊大我皇開運光宅區夏而式亂逋逃棄同即異毎欲出車鞠旅以征不庭所冀干戚兩階叛命來格遂復遊魂不戢亂滑孔熾孤摠連率任屬方邵組甲十萬雄㦸千犀以此戡難何往不克主上每矜率土哀彼民黎使不戰屈敵兵無血刄故部勒小戍閉壁清野抗威遵養庶能懷音若遂迷復知進忘退當金鉦戒路雲旗北掃長驅燕代併羈名王使少卿忽諸頭曼不祀兵交無逺相為憫然永泰元年遷給事中右衛將軍持節隸都督陳顯達停襄陽伐虜度支尚書崔慧景於鄧地大敗虜追至沔北元宏率十萬衆從羽儀華蓋圍樊城虎閉門固守虜去城數里立營頓設氈屋復再圍樊城臨沔水望襄陽岸乃去虎遣軍主田安之等十餘軍出逐之頗相傷殺東昏即位遷前將軍鎮軍司馬永元元年始安王遥光反虎領軍屯青溪中橋事寧轉散騎常侍右衛將軍虎形幹甚毅善於誘納日食荒客常數百人晩節好貨賄吝嗇在雍州得見錢五千萬伎女食醬菜無重肴每好風景輒開庫拍張向之帝疑虎舊將兼利其財新除未及拜見殺時年六十餘和帝中興元年追贈安北將軍徐州刺史史臣曰解厄鴻門資舞陽之氣納降饗旅仗虎侯之力觀兹猛毅藉以風威未必投車挾輈然後勝敵故桓康之聲所以震懾江蠡也贊曰薛辭親愛歸身淮涘戴類千秋興言帝子桓勇焦壯爪牙之士虎守西邊功虧北鄙南齊書卷三十南齊書卷三十考證戴僧靜傳僧靜手斬粲臣祖庚按南史袁粲傳僧靜奮刀直前欲斬之子最呌抱父乞先死兵士人人莫不隕涕粲曰我不失忠臣汝不失孝子仍求筆作啓云臣義奉大宋策名兩畢今便歸魂墳隴永就山丘僧靜乃并斬之此不載宋書亦無此事通鑑考異曰時僧靜掩粲不備挺身直往安肻令粲作啓從容如此據此則傳不為漏而南史未可謂得也曹虎傳曹虎南史虎作武乾没孔熾乾没南監本作亂猾南齊書卷三十考證
