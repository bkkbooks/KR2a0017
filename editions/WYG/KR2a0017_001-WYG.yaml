body:
  text: 南齊書卷一梁蕭子顯撰本紀第一髙帝上太祖髙皇帝諱道成字紹伯姓蕭氏小諱鬭将漢相國蕭何二十四世孫也何子鄼㝎侯延生侍中彪彪生公府掾章章生皓皓生仰仰生御史大夫望之望之生光禄大夫育育生御史中丞紹紹生光禄勲閎閎生濟陰太守闡闡生呉郡太守永永生中山相苞苞生博士周周生蛇丘長矯矯生州従事逵逵生孝㢘休休生廣陵府丞豹豹生太中大夫裔裔生淮陰令整整生即丘令儁儁生輔國􅄁軍樂子宋昇眀二年九月贈太常生皇考蕭何居沛侍中彪免官居東海蘭陵縣中都鄊中都里晉元康元年分東海為蘭陵郡中朝亂淮陰令整字公齊過江居晉陵武進縣之東城里寓居江左者皆僑置本土加以南名於是為南蘭陵人也皇考諱承之字嗣伯少有大志才力過人宗人丹陽尹摹之北兗州刺史源之竝見知重初為建威府􅄁軍義熙中蜀賊譙縦初平皇考遷揚武将軍安固汶山二郡太守善扵綏撫元嘉初徙為武烈将軍濟南太守七年右将軍到彦之北伐大敗虜乗勝破青部諸郡國别帥安平公乙旃眷冦濟南皇考率數百人拒戰退之虜衆大集皇考使偃兵開城門衆諌曰賊衆我寡何輕敵之甚皇考曰今日懸守窮城事已危急若復示弱必為所屠惟當見强待之耳虜疑有伏兵遂引去青州刺史蕭思話欲委鎮保險皇考固諌不従思話失據潰走眀年征南大将軍檀道濟扵夀張轉戰班師滑臺䧟没兗州刺史竺靈秀抵罪宋文帝以皇考有全城之功手書與都督長沙王義欣曰承之理民直亦不在武幹後今擬為兗州刺史檀征南詳之皇考與道濟無素故事遂寝遷輔國鎮北中兵􅄁軍員外郎十年蕭思話為梁州刺史皇考為其横野府司馬漢中太守氐帥楊難當冦漢川梁州刺史甄法䕶棄城走思話至襄陽不進皇考輕軍前行攻氐偽魏興太守薛健扵黄金山尅之黄金山張魯舊戍南接漢川北枕驛道險固之極健既潰散皇考即據之氐偽梁秦二州刺史趙温先據州城聞皇考至退據小城薛健退屯下桃城立柴營皇考引軍與對壘相去二里健與偽馮翊太守蒲旱子悉力出戰皇考大破之健等閉營自守不敢出思話繼至賊乃稍退皇考進至峨公山為左衛将軍沙州刺史呂平大衆所圍積日建武将軍蕭汪之平西督䕶段虯䓁至表裏奮擊大破之難當又遣息和領歩騎萬餘人夹漢水兩岸援趙温攻逼皇考相拒四十餘日賊皆衣犀甲刀箭不能傷皇考命軍中斷槊長數尺以大斧搥其後賊不能當乃焚營退皇考追至南城衆軍自後而進連戰皆㨗梁州平詔曰承之禀命先驅䝉險深入全軍屢剋奮其忠果可龍􅋮将軍随府轉寧朔司馬太守如故入為太子屯騎校尉文帝以平氐之勞青州缺将欲授用彭城王義康秉政皇考不附乃轉為江夏王司徒中兵􅄁軍龍驤将軍南泰山太守封晉興縣五䓁男邑三百四十戸遷右軍将軍元嘉二十四年殂年六十四梁士民思之扵峨公山立廟祭祀昇眀二年贈散騎常侍金紫光禄大夫太祖以元嘉四年丁夘嵗生姿表英異龍顙鍾聲鱗文徧體儒士雷次宗立學扵鷄籠山太祖年十三受業治禮及左氏春秋十七年宋大将軍彭城王義康被黜鎮豫章皇考領兵防守太祖舎業南行十九年竟陵蠻動文帝遣太祖領偏軍討沔北蠻二十一年伐索虜至丘檻山竝破走二十三年雍州刺史蕭思話鎮襄陽唘太祖自随戍沔北討樊鄧諸山蠻破其聚落初為左軍中兵􅄁軍二十七年索虜圍汝南戍主陳憲臺遣寧朔将軍臧質安蠻司馬劉康祖救之文帝使太祖宣㫖授節度聞虜主拓䟦燾向彭城質䓁囬軍救援至盱眙太祖與質别軍主胡宗之䓁五軍歩騎數千人前驅燾已潛過淮卒相遇扵莞山下合戰敗績縁淮奔退宗之䓁皆陷没太祖還就質固守為虜所攻圍甚危急事寧還京師二十九年領偏軍征仇池梁州西界舊有武興戍晉隆安中没屬氐武興西北有蘭臯戍去仇池二百里太祖擊二壘皆破之遂従谷口入關未至長安八十里梁州刺史劉秀之遣司馬馬汪助太祖攻談堤城㧞之虜偽河間公奔赱虜救兵至太祖軍力疲少又聞文帝崩乃燒城還南鄭襲爵晉興縣五䓁男孝建初除江夏王大司馬􅄁軍随府轉太宰遷員外郎直閣中書舍人西陵王撫軍􅄁軍建康令新安王子鸞有盛寵簡選僚佐為北軍中郎中兵㕘軍陳太后憂起為武烈将軍復為建康令中兵如故景和世除後軍将軍值眀帝立為右軍将軍時四方反叛㑹稽太守尋陽王子房及東諸郡皆起兵眀帝加太祖輔國将軍率衆東討至晉陵與賊前鋒将程桿孫曇瓘䓁戰一日破賊十二壘分軍定諸縣晉陵太守袁摽棄城赱東境諸城相繼奔散徐州刺史薛安都反彭城従子索兒冦淮陰山陽太守程天祚舉城叛徐州刺史申令孫又降徴太祖討之時太祖平東賊還又将南討出次新亭前軍已彂而素兒自睢陵渡淮馬歩萬餘人撃殺臺軍主孫耿縦兵逼前軍張永營告急眀帝聞賊渡遽追太祖往救之屯破釜索兒向鍾離永遣寧朔将軍王寛據盱眙遏其歸路索兒擊破臺軍主髙道慶赱之扵石鼈将西歸王寛與軍主任農夫先據白鵠澗張永遣太祖馳督寛索兒東要撃太祖使不得前太祖鼓行結陣直入寛壘索兒望見不敢彂經數日索兒引軍頓石梁太祖追之至葛冢候騎還云賊至太祖乃頓軍引管分兩馬軍夹營外以待之俄頃賊馬歩奄至又推火車數道攻戰相持移日乃出輕兵攻賊西使馬軍合撃其後賊衆大敗追奔獲其器仗進屯石梁澗北索兒夜遣千人来斫營營中驚太祖卧不起宣令左右案部不得動湏臾賊散太祖議欲扵石梁西南髙地築壘通南道斷賊赱路索兒果来争之太祖率軍擊破之賊馬自相踐藉死索兒赱向鍾離太祖追至黯黮而還除驍騎将軍封西陽縣侯邑六百戸遷巴陵王衛軍司馬随鎮會稽江州刺史晉安王子勛遣臨川内史張淹自鄱陽嶠道入三呉臺軍主沈思仁與偽龍驤将軍任皇鎮西􅄁軍劉越緒各據險相守眀帝遣太祖領三千人討之時朝廷器甲皆充南討太祖軍容寡闕乃編㯶皮為馬具装析竹為寄生夜舉火進軍賊望見恐懼未戰而赱還除桂陽王征北司馬南東海太守行南徐州事初眀帝遣張永沈攸之以衆喻降薛安都謂太祖曰吾今因此北討卿意以為何如太祖對曰安都才識不足狡猾有餘若長轡緩御則必遣子入朝今以兵逼之彼将懼而為計恐非國之利也帝曰衆軍猛鋭何往不剋卿每杖策幸勿多言安都見兵至果引索虜永等敗扵彭城淮南孤弱以太祖為假冠軍将軍持節都督北討前鋒諸軍事鎮淮隂泰始三年沈攸之呉喜北敗扵睢口諸城戍大小悉奔歸虜遂進至淮北圍角城戍主賈法度力弱不敵諸将勸太祖渡㟁救之太祖不許遣軍主髙道慶将數百張弩浮艦淮中遥射城外虜弩一彂數百箭俱去虜騎相引避之乃命進戰城圍即解遷督南兗徐二州諸軍事南兗州刺史持節假冠軍督北討如故五年進督兗青冀三州六年除黄門侍郎領越騎校尉不拜復授冠軍将軍留夲任眀帝常嫌太祖非人臣相而民間流言云蕭道成當為天子眀帝愈以為疑遣冠軍将軍呉喜以三千人北使令喜留軍破釜自持銀壺酒封賜太祖太祖戎衣出門迎即酌飲之喜還帝意乃悦七年徴還京師部下勸勿就徵太祖曰諸卿闇扵見事主上自誅諸弟為太子稚弱作萬嵗後計何關佗族惟應速彂事緩必見疑今骨肉相害自非靈長之運禍難将興方與卿等戮力耳拜散騎常侍太子左衛率時世祖以功當别封贑縣太祖以一門二封固辭不受詔許之食邑二百戸眀帝崩遺詔為右衛将軍領衛尉加兵五百人與尚書令袁粲䕶軍褚淵領軍劉勔共掌機事又别領東北選事尋解衛尉加侍中領石頭戍軍事眀帝誅戮蕃戚江州刺史桂陽王休範以人凡獲全及蒼梧王立更有窺伺覬望密與左右閹人扵後堂習馳馬招聚士衆元徽二年五月舉兵扵尋陽收略官民數日得士衆二萬人騎五百匹彂盆口悉乗商旅船艦大雷戍主杜道欣鵲頭戍主劉諐期告變朝廷惶駭太祖與䕶軍褚淵征北張永領軍劉勔僕射劉秉逰撃将軍戴眀寳驍騎将軍阮佃夫右軍将軍王道隆中書舍人孫千齡員外郎楊運長集中書省計議莫有言者太祖曰昔上流謀逆皆因淹緩至扵覆敗休範必逺懲前失輕兵急下乗我無備今應變之術不宜念逺若偏師失律則大沮衆心宜頓新亭白下堅守宫掖東府石頭以待賊千里孤軍後無委積求戰不得自然瓦解我請頓新亭以當其鋒征北可以見甲守白下中堂舊是置兵地領軍宜屯宣陽門為諸軍節度諸貴安坐殿中右軍諸人不湏競出我自前驅破賊必矣因索筆下議竝注同中書舎人孫千齡與休範有密契獨曰宜依舊遣軍據梁山魯顯間右衛若不出白下則應進頓南州太祖正色曰賊今已近梁山豈可得至新亭既是兵衝所欲以死報國耳常日乃可屈曲相従今不得也座起太祖顧謂劉勔曰領軍已同鄙議不可改易乃單車白服出新亭加太祖使持節都督征討諸軍平南将軍加鼓吹一部治新亭城壘未畢賊前軍已至太祖方解衣髙卧以安衆心乃索白虎幡登西垣使寧朔将軍髙道慶羽林監陳顯達貟外郎王敬則浮舸與賊水戰自新林至赤㟁大破之燒其船艦死傷甚衆賊歩上新林太祖馳使報劉勔急開大小桁撥淮中船舫悉渡北㟁休範乗肩輿率衆至壘南上遣寧朔将軍黄回馬軍主周盤龍将歩騎出壘對陣休範分兵攻壘東短兵接戰自已至午衆皆失色太祖曰賊雖多而亂尋破也楊運長領三齊射手七百人引强命中故賊不得逼城未時張敬兒斬休範首太祖遣隊主陳靈寳送首還臺靈寳路中遇賊軍埋首道側臺軍不見休範首愈疑懼賊衆亦不知休範已死别率杜黒蠡急攻壘東司空主簿蕭恵朗領數百人突入東門叫噪至堂下城上守門兵披退太祖挺身上馬率數百人出戰賊皆推楯而前相去數丈分兵横射太祖引滿将彂左右将戴仲緒舉楯扞之箭應手飲羽傷百餘人賊死戰不能當乃却衆軍復得保城與黒蠡拒戰自晡達眀旦矢石不息其夜大雨鼓叫不復相聞将士積日不得寝食軍中馬夜驚城内亂走太祖秉燭正坐厲聲呵止之如此者數四賊帥丁文豪設伏破臺軍扵皁莢橋直至朱雀桁劉勔欲開桁王道隆不従勔及道隆竝戰沒初勔髙尚其意託造園宅名為東山頗忽世務太祖謂之曰将軍以顧命之重任兼内外主上春秋未㡬諸王竝幼沖上流聲議遐邇所聞此是将軍艱難之日而将軍深尚従容廢省羽翼一朝事至雖悔何追勔竟不納賊進至杜姥宅車騎典籖茅恬開東府納賊冠軍将軍沈懐眀扵石頭奔散張永潰扵白下宫内傳新亭亦陷太后執蒼梧王手泣曰天下敗矣太祖遣軍主陳顯達任農夫張敬兒周盤龍等従石頭濟淮間道従承眀門入衛宫闕休範既死典籖許公與詐稱休範在新亭士庶惶惑詣壘投名者千數太祖随得輒燒之乃列兵登城北謂曰劉休範父子先昨皆已即戮屍在南崗下身是蕭平南諸君善見觀君等名皆已焚除勿有懼也臺分遣衆軍撃杜姥宅宣陽門諸賊皆破平之太祖振旅凱入百姓縁道聚觀曰全國家者此公也太祖與袁粲褚淵劉秉引咎解軄不許遷散騎常侍中領軍都督南兗徐兗青冀五州軍事鎮軍将軍南兗州刺史持節如故進爵為公増邑二千戸太祖欲分其功請益粲等戸更日入直决事號為四貴秦時有太后穰侯涇陽髙陵君稱為四貴至是乃復有焉四年加太祖尚書左僕射夲官如故休範平後蒼梧王漸行凶暴南徐州刺史建平王景素少有令譽朝野歸心景素亦潛為自全之計布款誠扵太祖太祖拒而不納七月羽林監袁祗奔景素便舉兵太祖出屯𤣥武湖遣衆軍北討事平乃還太祖威名既重蒼梧王深相猜忌㡬加大禍陳太妃罵之曰蕭道成有功扵國今若害之後誰復為汝著力者乃止太祖密謀廢立五年七月戊子帝微行出北湖常單馬先走羽儀禁衛随後追之扵堤塘相蹈藉左右張互兒馬墜湖帝怒取馬置光眀亭前自馳騎刺殺之因共屠割與左右作𦍑胡伎為樂又扵蠻岡賭跳際夕乃還仁夀殿東阿氈屋中寢語左右楊玉夫伺織女度報我時殺害無常人懐危懼玉夫與其黨陳奉伯等二十五人同謀扵氈屋中取千牛刀殺蒼梧王稱敕使廂下奏伎因将首出與王敬則敬則送太祖太祖夜従承眀門乗常所騎赤馬入殿内驚怖既知蒼梧王死咸稱萬嵗及太祖踐祚號此馬為龍驤将軍世謂為龍驤赤眀日太祖戎服出殿庭槐樹下召四貴集議太祖謂劉秉曰丹陽國家重戚今日之事属有所歸秉讓不當太祖次讓袁粲粲又不受太祖乃下議備法駕詣東城迎立順帝扵是長刀遮粲秉等各失色而去甲午太祖移鎮東府與袁粲褚淵劉秉各甲仗五十人入殿丙申進位侍中司空録尚書事驃騎大将軍持節都督刺史如故封竟陵郡公邑五千戸給油幢絡車班劍三十人太祖固辭上命即驃騎大将軍開府儀同三司庚戍進督南徐州刺史封楊玉夫等二十五人爵邑各有差十月戊辰又進督豫司二州初荆州刺史沈攸之與太祖扵景和世同直殿省申以歡好以長女義興公主妻攸之第三子元和攸之為郢州值眀帝晚運隂有異圖自郢州遷為荆州聚斂兵力将吏逃亡輒討質隣伍養馬至二千餘匹皆分賦戍邏将士使耕田而食廩財悉充倉儲荆州作部嵗送數千人仗攸之割留簿上供討四山蠻装治戰艦數百千艘沈之靈溪裏錢帛器械巨積朝廷畏之髙道慶家在華容假還過江陵道慶素便馬攸之與宴飲扵聽事前合馬槊道慶槊中破攸之馬鞍攸之怒索刃槊道慶馳馬而出還都説攸之反状請三千人襲之朝議慮其事難濟太祖又保持不許太祖既廢立遣攸之子司従左長史元琰賫蒼梧王諸虐害器物示之攸之未得即起兵乃上表稱慶并與太祖書推功攸之有素書十數行常韜在裲襠角云是眀帝與已約誓十二月遂舉兵其妾崔氏許氏諌攸之曰官年已老那不為百口計攸之指裲襠角示之稱太后令召已下都京師恐懼乙卯太祖入居朝堂命諸将西討平西将軍黄回為都督前驅前湘州刺史王藴太后兄子少有膽力以父揩名官不達欲以将途自奮每撫刀曰龍淵太阿汝知我者叔父景文誡之曰阿答汝滅我門戸藴曰答與童烏貴賤覺異童烏景文子絢小字答藴小字也藴遭母喪罷任還至巴陵停舟一月日與攸之密相交構時攸之未便舉兵藴乃下達郢州世祖為郢州長史藴期世祖出弔因作亂據郢城世祖知之不出藴還至東府前又期太祖出太祖又不出弔再計不行外謀愈固司徒袁粲尚書令劉秉見太祖威權稍盛慮不自安與藴及黄回等相結舉事殿内宿衛主帥無不協同攸之反問初至太祖往石頭與粲謀議粲稱疾不相見剋壬申夜起兵據石頭劉秉恇怯晡時従丹陽郡載婦女入石頭朝廷不知也其夜丹陽丞王遜告變秉従弟領軍韞及直閣将軍卜伯興等嚴兵為内應太祖命王敬則扵宫内誅之遣諸将攻石頭王藴将數百精手帶甲赴粲城門已閉官軍又至乃散衆軍攻石頭斬粲劉秉赱雒檐湖藴逃鬭場竝擒斬之粲位任雖重無經世之略踈放好酒歩屧白揚郊野間道遇一士大夫便呼與酣飲眀日此人謂被知顧到門求通粲曰昨飲酒無偶聊相要耳竟不與相見嘗作五言詩云訪跡雖中宇循寄乃滄州盖其志也劉秉少以宗室清謹見知孝武世秉弟遐坐通嫡母殷氏養女殷舌中血出衆疑行毒害孝武使秉従弟祗諷秉唘證其事秉曰行路之人尚不應爾今日迺可一門同盡無容奉敕衆以此稱之故為眀帝所任蒼梧廢秉出集議扵路逢弟韞韞開車迎問秉曰今日之事固當歸兄邪秉曰吾等已讓領軍矣韞槌胸曰君肉中詎有血粲典籤莫嗣祖知粲謀太祖召問嗣祖袁謀反何不唘聞嗣祖曰事主義無二心雖死不敢泄也藴嬖人張承伯蔵匿藴太祖竝赦而用之黄回頓新亭聞石頭鼓噪率兵来赴之朱雀􅟘有戍軍受節度不聽夜過㑹石頭已平因稱救援太祖知而不言撫之愈厚遣回西上流涕告别太祖屯閱武堂馳結軍旅閏月辛丑詔假黄鉞率大衆出屯新亭中興堂治嚴築壘教曰河南稱慈諒由掩胔廣漢流仁實存殯朽近袤製兹營崇溝浚塹古墟曩隧時有湮移深松茂草㦯致刋薙憑軒動懐巡隍増愴宜竝為收改葬并設薄祀二年正月沈攸之攻郢城不剋衆潰自經死傳首京邑丙子太祖旋鎮東府二月癸未進太祖太尉増封三千戸都督南徐南兗徐兗青冀司豫荆雍湘郢梁益廣越十六州諸軍事太祖解驃騎辭都督不許乃表送黄鉞三月己酉增班劍為四十人甲仗百人入殿丙子加羽葆鼓吹餘竝如故􅉝夘太祖誅鎮北将軍黄回大眀泰始以来相承奢侈百姓成俗太祖輔政罷御府省二尚方諸飾玩至是又上表禁民間華偽雜物不得以金銀為箔馬乗具不得金銀度不得織成繡裙道路不得著錦履不得用紅色為幡盖衣服不得剪綵帛為雜花不得以綾作雜服飾不得作鹿行錦及局脚檉柏床牙箱籠雜物綵帛作屏鄣錦縁薦席不得私作器仗不得以七寳飾樂器又諸雜漆物不得以金銀為花獸不得輒鑄金銅為像皆湏墨敕凡十七條其中宫及諸王服用雖依舊例亦請詳衷九月丙午進位假黄鉞都督中外諸軍事太傅領揚州牧劍履上殿入朝不趨賛拜不名置左右長史司馬従事中郎掾属各四人使持節太尉驃騎大将軍録尚書南徐州刺史如故固辭詔遣敦勸乃受黄鉞辭殊禮甲寅給三望車三年正月乙巳太祖表蠲百姓逋負丙辰加前部羽葆鼓吹丁巳命太傅府依舊辟召丁夘給太祖甲仗五百人出入殿省甲午重申前命劍履上殿入朝不趨賛拜不名三月甲辰詔進位相國總百揆封十郡為齊公備九錫之禮加璽紱逺逰冠位在諸侯王上加相國緑綟綏其驃騎大将軍揚州牧南徐州刺史如故太祖三讓公卿敦勸固請乃受甲寅䇿相國齊公曰天地變通莫大乎炎凉懸象著眀莫崇乎日月嚴冬播氣貞松之􅋵自髙光景時昏若華之暎彌顯是故英睿當亂而不移忠賢臨危而盡節自景和昏虐王綱弛紊太宗受命紹開中興運属屯難四郊多壘蕭将軍震威華戎實資義烈康國濟民扵是乎在朕以不造夙罹閔凶嗣君失徳書契未紀威侮五行䖍劉九縣神厭靈繹海水羣飛彛器已塵宗禋誰主綴旒之殆未足為譬豈直小宛興刺黍離作歌而已㦲天賛皇宋實唘眀宰爰登寡昧纂承大業鴻緒再維閎基重造髙勲至徳振古絶倫昔保衡翼殷博陸匡漢方斯蔑如也今将授公典禮其敬聽朕命乃者袁劉構禍實繁有徒子房不臣稱兵協亂跨蹈五湖憑陵呉越浮祲虧辰沈氛晦景桴鼓振扵王畿鋒鏑交乎天邑顧瞻宫掖将成茂草言念邦國剪為仇讎當此之時人無固志公投袂殉難超然奮彂執金板而先馳登寅車而戒路軍政端嚴卒乗輯睦麾鉞一臨凶黨氷泮此則霸業之基勤王之始也安都背叛竊據徐方敢率犬羊陵虐淮滸索兒愚悖同惡相濟天祚無象背順歸逆北鄙黔黎奄墜塗炭均人廢職邉師告警公受命宗祊精貫朝日擁節和門氣踰霄漢破釜之㨗斬馘蔽野石梁之戰禽其渠帥保境全民江陽即序此又公之功也張淹迷昧弗顧夲朝爰自南區志圖東夏潛軍間入竊覬不虞扵時江服未夷皇途荐阻公忠誠慷慨在險彌亮深識九變妙察五色以寡制衆所向風偃朝廷無東顧之憂閩越有来蘓之慶此又公之功也匃奴野心侵掠疆場前師失律王旅崩撓灑血成川伏尸千里醜羯侜張勢振彭泗乗勝長驅窺覦京甸冠帶之軌将湮被髪之容行及公奉辭伐罪戒旦晨征兵車始交氛祲時蕩弔死撫傷𢎞宣皇澤俾我淮肥復沾盛化此又公之功也自兹厥後獫狁孔熾封豕長蛇重窺上國而世故相仍師出日老戰士無臨陣之心戎卒有懐歸之思是以下邳精甲望風振恐角城髙壘指日淪陷公眷言王事彂憤忘食躬擐甲胄視險若夷短兵纔接巨猾鳥散分疆畫界開創青兗此又公之功也泰始之末入􅄁禁旅任兼軍國事同顧命桂陽負衆輕問九鼎裂冠毁冕㧞夲塞源入兵萬乗之國頓㦸象魏之下烈火焚扵王城飛矢集乎君屋機變儵忽終古莫二羣后憂惶元戎無主公按劍凝神則竒謀貫世秉旄指麾則懦夫成勇曽不崇朝新亭獻㨗信宿之間宣陽厎定雲霧廓清區宇康乂此又公之功也皇室多難舋起戚藩邘晉應韓翻為讐敵建平失圖興兵内侮公又指授六師義形乎色役未踰旬朱方寧晏此又公之功也蒼梧肆虐諸夏麋沸淫刑以逞誰則無罪火炎崐岡玉石俱焚黔首相悲朝不謀夕髙祖之業已淪大眀之軌誰嗣公逺稽殷漢之義近遵魏晉之典猥以𦕈身入奉宗祏七廟清謐九區反政此又公之功也袁粲無質劉秉擕貳韜述相扇成此亂階醜圖潛構危機竊彂據有石頭志犯應路公神謀内運霜鋒外舉妖沴載澄國塗悅穆此又公之功也沈攸之苞禍嵗月滋彰蜂目豺聲阻兵安忍哀彼荆漢獨為匪民乃眷西顧緬同異域而經綸維始九伐未申長惡不悛遂逞凶逆驅合姦回勢過虓虎朝野憂疑三軍沮氣公秉鉞出關凝威江甸正情與曒日同亮眀略與秋雲競爽至義所感人百其心鼖鼔一麾夏首寧謐雲梯未舉魯山剋定積年逋誅一朝顯戮沮浦安流章臺順軌此又公之功也公有濟天下之勲重之以眀哲道庇生民志匡宇宙戮力肆心劬勞王室自東徂西靡有寧晏險阻艱難備嘗之矣若乃締構宗稷之勤造物資始之澤雲布霧散光被六幽弼予一人永清四海是以秬草騰芳扵郊園景星垂暉扵清漢遐方款關而慕義荒服重譯而来庭往㦲邈乎無得而名焉朕聞疇庸表徳前王盛典崇樹侯伯有國攸同所以文命成功𤣥珪顯錫姬旦秉哲曲阜唘蕃㦯改玉以𢎞風㦯胙土以宣化禮絶常班寵冠羣辟爰逮桓文車服異數惟公勲業超扵先烈而褒賞闕扵舊章古今之道何其爽歟静言欽歎良有缺然今進授相國以青州之齊郡徐州之梁郡南徐州之蘭陵魯郡琅邪東海晉陵義興揚州之呉郡㑹稽凡十郡封公為齊公錫兹𤣥土苴以白茅定爾邦家用建冢社斯實尚父故藩世作盟主紀綱侯甸率由舊則往者周召建國師保兼任毛畢執珪入作卿士内外之寵同規在昔今命使持節兼太尉侍中中書監司空衛将軍雩都縣開國侯淵授公相國印綬齊公璽紱持節兼司空守尚書令僧䖍授齊公茅土金虎符第一至第五左竹使符第一至第十左相國位總百辟秩踰三事職以禮移號随事革其以相國總百揆去録尚書之稱送所假節侍中貂蟬中外都督太傅太尉印綬竟陵公印䇿其驃騎大将軍揚州牧南徐州刺史如故又加公九錫其敬聽後命以公執禮𢎞律儀刑區宇遐邇一體人無異業是用錫公大輅戎輅各一𤣥牡二駟公崇修南畆所寳惟榖王府充實百姓繁衍是用錫公衮冕之服赤舄副焉公居身以謙導物以義鎔鈞庶品罔不和恱是用錫公軒縣之樂六佾之儛公翼賛王猷聲教逺洽蠻夷竭歡回首内附是用錫公朱戸以居公眀鍳人倫澄辨涇渭官方與能英乂克舉是用錫公納陛以登公保佑皇朝厲身化下杜漸防萌含生夤式是用錫公虎賁之士三百人公禦宄以刑禦姦以徳君親無将将而必誅是用錫公鈇鉞各一公鳳舉四維龍騫八表威靈所振異域同文是用錫公彤弓一彤矢百玈弓十玈矢千公眀彂載懐肅恭禋祀孝敬之重義感靈祗是用錫公秬鬯一卣珪瓉副焉齊國置丞相以下一遵舊式往欽㦲其祗服朕命經緯乾坤宏亮洪業茂昭爾大徳闡揚我髙祖之休命太祖三讓公卿敦勸固請乃受之丁巳下令赦國内殊死以下今月十五日昧爽以前一皆原赦鰥寡孤獨不能自存者賜穀五斛府州所領亦同蕩然宋帝詔齊公十郡之外随宜除用以齊國初建給錢五百萬布五千匹絹五千匹四月癸酉詔進齊公爵為王以豫州之南梁陳郡潁川陳留南兗州之盱眙山陽秦郡廣陵海陵南沛十郡增封使持節司空衛将軍褚淵奉策綬璽紱金虎符第一至第五左竹使符第一至第十左錫兹𤣥土苴白茅改立王社相國揚州牧驃騎大将軍南徐州刺史如故丙戍命齊王冕十有二旒建天子旌旗出警入蹕乗金根車駕六馬備五時副車置旄頭雲䍐樂儛八佾設鍾虡宫縣王世子為太子王女王孫爵命一如舊儀辛夘宋帝禪位下詔曰惟徳動天玉衡所以載序窮神知化億兆所以歸心用能經緯乾坤彌綸宇宙闡揚鴻烈大庇生民晦往眀来積代同軌前王踵武世必由之宋徳湮微昬毁相襲景和騁悖扵前元徽肆虐扵後三光再霾七廟将墜璇極委馭含識知冺我文武之祚𦕈焉如綴静惟此紊夕惕疚心相國齊王天誕叡聖河嶽炳靈拯傾提危澄氛静亂匡濟艱難功均造物宏謀霜照祕算雲回旌斾所臨一麾必㨗英風所拂無思不偃表裏清夷遐邇寧謐既而光唘憲章𢎞宣禮教姦宄之類覩隆威而隔情慕善之儔仰徽猷而増厲道邁扵重華勲超乎文命蕩蕩乎無得而稱焉是以辮髮左衽之酋款關請吏木衣卉服之長航海来庭豈惟肅慎獻楛越裳薦翬而已㦲故四奥載宅六府克和川陸効珍禎祥鱗集卿煙玉露旦夕揚􅇨嘉穟芝英晷刻呈茂革運斯炳代終彌亮負扆握樞允歸眀哲固以獄訟去宋謳歌適齊昔金政既淪水徳締構天之厯數皎焉攸徴朕雖寡昧闇扵大道稽覽隆替為日已乆敢忘列代遺則人神至􅂅乎便遜位别宫敬禪扵齊一依唐虞魏晉故事是日宋帝遜扵東邸備羽儀乘畫輪車出東掖門問今日何不奏鼓吹左右莫有答者壬辰䇿命齊王曰伊太古初陳萬物紛綸開耀靈以鑑品物立元后以馭蒸人若夫容成大庭之世宓羲五龍之辰靡得而詳焉自軒黄以降墳索所紀略可言者莫崇乎堯舜披金繩而握天鏡開玉匣而總地維徳之休眀宸居靈極期運有終歸禪與能所以大唐遜位􅨳然興歌有虞揖讓卿雲發采亮符命之攸臻坦至公以成務懐生載懌靈祗効祉遺風餘烈光被無垠漢魏因循弗敢失墜爰逮晉氏亦遵前儀惟我祖宗英叡勲格幽顯従天人而齊七政凝至徳而撫四維末葉不造仍世多故日蝕星隕山淪川竭惟王聖哲淵眀榮鏡㝢宙體望日之威資就雲之澤臨下以簡御衆以寛仁育羣生義征不譓國塗荐阻𢎞五慮而乂寧皇緒将湮秉六術以匡濟及至權臣内侮蕃屏陵上兵革雲翔萬邦震駭裁之以武風綏之以文化遐邇清夷表裏肅穆戢琱戈而事黼黻委旌門而恭儒館聲化逺洎荒服無塵殊類同規華戎一揆是以五光来儀扵軒庭九穂含芳扵郊牧象緯昭澈布新之符已顯圖讖彪炳受終之義既彰靈祗乃眷兆民引領朕聞至道深微惟人是𢎞天命無常惟徳是與所以仰鑒𤣥情俯察羣望敬禪神器授帝位扵爾躬四海困窮天禄永終於戱王其允執厥中儀刑前式以副率土之欣望命司裘而謁蒼昊奏雲門而升圜丘時膺大禮永保洪業豈不盛歟再命璽書曰皇帝敬問相國齊王大道之行與三代之英朕雖闇昧而有志焉夫昬眀相襲晷景之恒度春秋遞運時嵗之常序求諸天數猶且隆替矧伊在人能無終謝是故勛華𢎞風扵上葉漢魏垂式扵後昆昔我髙祖欽眀文思振民育徳皇靈眷命奄有四海晩世多難姦宄實繁鼖鼔宵聞元戎旦警億兆夷人唘䖏靡厝加以嗣君荒怠敷虐萬方神鼎将遷寳䇿無主實賴英聖匡濟艱危惟王體天則地含𢎞光大眀竝日月恵均雲雨國歩斯梗則稜威外發王猷不造則淵謨内昭重構閩呉再寧淮濟静九江之洪波卷海沂之氛沴放斥凶昧存我宗祀舊物惟新三光改照逮至寵臣裂冠則裁以廟略荆漢反噬則震以雷霆麾斾所臨風行草靡神算所指龍舉雲属諸夏廓清戎翟思韙興文偃武闡揚洪烈眀保沖昧翺翔禮樂之塲撫柔黔首咸躋仁夀之域自霜露所墜星辰所經正􅃋不通人跡罕至者莫不踰山越海北面稱蕃款關重譯修其職貢是以禎祥彂采左史載其竒𤣥象垂文保章審其度鳳書表肆類之運龍圗顯班瑞之期重以珠衡日角神姿特挺君人之義在事必彰書不云乎皇天無親惟徳是輔民心無常惟恵之懐神祇之眷如彼蒼生之願如此笙管變聲鍾石改調朕所以擁璇持衡傾佇眀哲昔金徳既淪而傳祚扵我有宋厯數告終實在茲日亦以水徳而傳扵齊式遵前典廣詢羣議王公卿士咸曰惟宜今遣使持節兼太保侍中中書監司空衛将軍雩都縣侯淵兼太尉守尚書令僧䖍奉皇帝璽綬受終之禮一依唐虞故事王其允副幽眀時登元后寵綏八表以酬昊天之休命太祖三辭宋帝王公以下固請兼太史令将作匠陳文建奏符命曰六亢位也後漢自建武至建安二十五年一百九十六年而禪魏魏自黄初至咸熙二年四十六年而禪晉晉自太始至元熙二年一百五十六年而禪宋宋自永初元年至昇眀三年凡六十年咸以六終六受六亢位也驗往揆今若斯昭著敢以職任備陳管穴伏􅂅順天時應符瑞二朝百辟又固請尚書右僕射王儉奏被宋詔遜位臣等􅄁議宜剋日輿駕受禪撰立儀注太祖乃許焉史臣曰案太乙九宫占推漢髙五年太乙在四宫主人與客俱得吉計先舉事者勝是嵗髙祖破楚晉元興二年太乙在七宫太一為帝天目為輔佐迫脅太一是年安帝為桓𤣥所逼出宫大将在一宫㕘相在三宫格太一經言格者已立政事上下格之不利有為安居之世不利舉動元興三年太乙在七宫宋武破桓𤣥元嘉元年太乙在六宫不利有為徐傅廢營陽王七年太一在八宫關囚惡嵗大小将皆不得立其年到彦之北伐初勝後敗客主倶不利十八年太乙在二宫客主倶不利是嵗氐楊難當冦梁益来年仇池破十九年大小将皆見關不立凶其年裴方眀伐仇池剋百頃眀年失之泰始元年太一在二宫為大小将奄撃之其年景和廢二年太一在三宫不利先起主人勝其年晉安王子勛反元徽二年太一在六宫先起敗是嵗桂陽王休範反竝伏誅四年太一在七宫先起者客西北走其年建平王景素敗昇眀元年太一在七宫不利為客安居之世舉事為主人應彂為客袁粲沈攸之等反伏誅是嵗太一在杜門臨八宫宋帝禪位不利為客安居之世舉事為主人禪代之應也南齊書卷一南齊書卷一考證髙帝夲紀上漢相國蕭何二十四世孫也臣宗萬按通鑑考異曰自相國何至皇考一十餘世皆有名及官位盖史官附㑹又按漢蕭望之傳不叙世譜此以為何後恐未確當然傳云望之東海蘭陵人即此可知帝之苗裔亦未必皆妄矣闡生呉郡太守永臣承蒼按齊梁同祖梁夲紀作呉郡太守氷未知孰是令喜留軍破釜自持銀壺酒封賜太祖太祖戎衣出門迎即酌飲之喜還帝意乃恱臣祖庚按宋略云道成懼弗􅈕飲喜語以情先為之酌扵是喜得罪而道成被徴通鑑従之考異曰南齊書欲成太祖之羙故云爾斯言信然靈寳路中遇賊軍埋首道側臣祖庚按宋略云棄諸溝中宋書云棄首扵水三書互異通鑑従宋書丁文豪設伏破臺軍扵皂莢橋直至朱雀桁臣祖庚按通鑑注云皂莢橋當在新亭之北朱雀桁即大航也以其在朱雀門外故名又云跨秦淮南北㟁以渡行人大路所由也桁與航同車騎典籤臣祖庚按南史故事府州縣内論事皆籤前直叙所論之事後云謹籤日月下又云某官某籖故府州置典籤以領之夲五品吏宋初改為士職宋末多以㓜少皇子為藩鎮以左右親近領典籖權任遂重又扵蠻岡賭跳臣祖庚按蠻岡南史同宋書作臺岡通鑑注云臺岡意即臺城之来岡賭跳者賭跳躑以髙為勝也十二月遂舉兵乙夘太祖入居朝堂臣宗萬按宋順帝紀十二月攸之反丁夘齊王入守朝堂閏月癸巳攸之圍郢城宋略十二月沈攸之作亂丁夘蕭道成入屯朝堂閏月癸巳攸之師及郢州據此攸之舉兵在十二月是矣而太祖居朝堂則在丁夘與此互異至攻郢在閏月癸巳按宋厯閏十二月庚辰朔則癸巳乃閏月十四日也紀在二年正月誤矣秉従弟領軍韞韞諸夲皆作韜但秉弟無名韜為領軍者今従宋書南史改韞往㦲邈乎無得而名焉往南史作汪南齊書卷一考證
