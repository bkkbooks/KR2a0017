  - {type: variant, offset: 6876, length: 0, content: '', WYG: 祖以崇祖心誠不實南監本作不盡誠心張敬兒傳休範左右數百人皆驚散臣祖庚按通鑑從休範傳以數十人自衛似得其實若左右有數百人黄回敬兒雖勇何能徑往取之耶何惡逆之苦苦南監本作甚較長敬兒軍中力授因以為别臣承蒼按此句之上多有訛闕南監本無攸之與兼長史江乂至給鼔吹一部五十七字而下文其子元琰之下軍至之上却有與兼長史江乂别駕傅宣等還守江陵敬兒十七字文勢極順然不見敬兒告變一節事亦闕文也竊}
