  - {type: variant, offset: 4419, length: 0, content: '', krp: 南齊書卷十七南齊書卷十七考證輿服志五輅臣宗萬按隋書舊制五輅於轅上起廂天子與參乘同在廂内何稠曰君臣同所過為相逼乃廣為盤輿别搆闌楯侍臣立於其中於内復起湏彌平坐天子獨居其上據此則五輅之制至隋始變此猶承古也皇太子象輅臣祖庚按此即五輅之一注云旂九旒降龍盖以别天子十二旒升龍也苐按周禮象輅以朝異姓以封而皇太子用之未知何取皇太后皇后重翟車臣祖庚按周禮此王后五輅之一錫面朱總兹則踵事増華去古逺矣指南車臣祖庚按崔豹古今注云黄帝與蚩尤戰大霧軍士皆迷路帝作指南車以示四方又曰指南車者周公所作又曰漢末䘮亂其法中絶馬鈞悟而作焉今指南車馬先生之遺法也記里鼓車注䌝衣漆畫臣承蒼按字書䌝俗紺字顔氏家訓吳人呼紺為禁故以絲旁作䌝代紺字據此則南監本改䌝為襟非是輦車臣祖庚按説文曰輦輓車也六書故曰輦車用人挽者也六典注曰古謂人牽為輦後漢有乗輿六輦也輿車注形如軺車臣祖庚按輿即車古無並稱者魏志太祖給張遼母輿車其名昉此説文曰軺車小車也晉書輿服志曰一馬曰軺車四望車亦曰皁輪臣祖庚按東宫舊事曰太子納妃用四望車又軺車釋名曰軺遥也逺也四向逺望之車也據此則四望車亦軺車之類通典曰三公有勲徳者特加皁輪故志云以加禮貴臣也平冕今謂平天冠臣宗萬按世本曰黄帝作旃冕説文曰冕大夫以上冠昔者黄帝始用布帛作冕應劭漢官儀曰周加垂旒天子前後垂真白珠各十二又按冕古無専名通典曰宋更名平天冕即此冠也通天冠臣祖庚按劉昭曰通天冠髙九寸正豎頂少邪乃直下為鐵卷梁前有山屐筩述乗輿所常服也杜佑曰通天冠其狀遺失漢因秦名制之據此則劉昭所云非秦舊制矣此盖承漢制耳進賢冠臣宗萬按漢輿服志曰古緇布冠儒者之服也人主五梁大官令兩梁親省御膳為重也博士兩梁崇儒也據此則漢時天子亦服之特於梁别崇卑耳魏晉以來為公卿大夫之服矣武冠臣祖庚按漢書昌邑王賀短衣大袴冠恵文冠服䖍曰武冠也趙恵文所服故號恵文又武帝賜南單于常侍恵文冠即此袴褶臣祖庚按通考曰袴褶魏晉以来以為車駕親戎中外戒嚴之服晉志雖有其説而不言其制然既曰戒嚴之服必戎服也至隋煬帝時詔百官從行服袴褶不便遂令改服戎衣則所謂袴褶者又似非鞍馬征行所便者與戒嚴之説不類唐時以袴褶為朝見之服韻書訓褶為袴又為祫也然袴裳也祫衣之交領也則不知所謂袴褶者一物乎二物乎唐輿服志羣臣服條内有裶褶大口袴則似是二物然不知所謂裶褶者衣乎裳乎又按宋史輿服志云范質與禮官議袴褶制度先儒無説惟開元雜禮有五品以上用細綾及羅六品以下用小綾之制注褶衣複衣也又令文三品以上紫褶五品以上裶褶七品以上綠褶九品以上碧褶並大口袴今請造袴褶如令文之制奏可又按説文曰袴脛衣也釋名曰褶襲也覆上之言也據此則袴褶自是兩物意晉制不傳齊去晉未遠猶不失其法隋特仍其名所以不便于從行唐盖因隋制以為朝服其晉之創制則為戎服無疑漆畫牽車注臣承蒼按以下四十五字大抵是史館校讐者所記宋書北魏書皆有之宋嘉祐中以七史訛闕尤甚特命館職讐校其梁齊陳三書皆屬之曽鞏此豈即鞏之筆歟南齊書卷十七考證}
