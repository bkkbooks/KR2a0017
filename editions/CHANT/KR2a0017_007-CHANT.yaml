body:
  text: 卷七本紀第七東昏侯東昏侯寶卷字智藏高宗第二子也本名明賢高宗輔政後改焉建武元年立為皇太子永泰元年七月己酉高宗崩太子即位八月丁巳詔雍州將士與虜戰死者復除有差又詔辨括選序訪搜貧屈庚申鎮北將軍晉安王寶義進號征北大將軍開府儀同三司南中郎將建安王寶寅為郢州刺史冬十月己未詔刪省科律十一月戊子立皇后褚氏賜王公以下錢各有差永元元年春正月戊寅大赦改元詔研策秀才考課百司辛卯車駕祀南郊詔三品清資官以上應食祿者有二親或祖父母年登七十並給見錢癸卯以冠軍將軍南康王寶融為荊州刺史二月癸丑以北中郎將邵陵王寶攸為南兗州刺史是月太尉陳顯達敗績於馬圈夏四月己巳立皇太子誦大赦賜民為父後爵一級甲戌以寧朔將軍柳惔為梁南秦二州刺史五月癸亥以撫軍大將軍始安王遙光為開府儀同三司六月己酉新除右衛將軍崔惠景為護軍將軍癸亥以始興內史范雲為廣州刺史甲子詔原雍州今年三調秋七月丁亥京師大水死者眾詔賜死者材器并賑卹八月乙巳蠲京邑遇水資財漂蕩者今年調稅又詔為馬圈戰亡將士舉哀丙辰揚州刺史始安王遙光據東府反詔曲赦京邑中外戒嚴尚書令徐孝嗣以下屯衛宮城遣領軍將軍蕭坦之率六軍討之戊午斬遙光傳首己未以征北大將軍晉安王寶玄為南徐兗二州刺史己巳尚書令徐孝嗣為司空右衛將軍劉暄為領軍將軍閏月丙子以江陵公寶覽為始安王虜偽東徐州刺史沈陵降以為北徐州刺史九月丁未以輔國將軍裴叔業為兗州刺史征虜長史張沖為豫州刺史壬戌以頻誅大臣大赦天下辛未以太子詹事王瑩為中領軍冬十月乙未誅尚書令新除司空徐孝嗣右僕射新除鎮軍將軍沈文季乙巳以始興內史顏翻為廣州刺史征虜將軍沈陵為越州刺史十一月丙辰太尉江州刺史陳顯達舉兵於尋陽乙丑護軍將軍崔慧景加平南將軍督眾軍南討事丙寅以冠軍將軍王鴻為徐州刺史十二月癸未以前輔國將軍楊集始為秦州刺史甲申陳顯達至京師宮城嚴警六軍固守乙酉斬陳顯達傳首丁亥以征虜將軍邵陵王寶攸為江州刺史二年春正月壬子以輔國將軍張沖為南兗州刺史庚午詔討豫州刺史裴叔業二月癸未以黃門郎蕭寅為司州刺史丙戌以衛尉蕭懿為豫州刺史征壽春己丑裴叔業病死兄子植以壽春降虜三月癸卯以輔國將軍張沖為司州刺史乙卯遣平西將軍崔慧景率眾軍伐壽春丁未以新除冠軍將軍張沖為南兗州刺史崔慧景於廣陵舉兵襲京師壬子右衛將軍左興盛督京邑水步眾軍南徐州刺史江夏王寶玄以京城納慧景乙卯遣中領軍王瑩率眾軍屯北籬門壬戌慧景至瑩等敗績甲子慧景入京師宮內據城拒守豫州刺史蕭懿起義救援夏四月癸酉慧景棄眾走斬首詔曲赦京邑南徐兗二州乙亥以新除尚書右僕射蕭懿為尚書令丙子以晉熙王寶嵩為南徐州刺史五月乙巳以虜偽豫州刺史王肅為豫州刺史戊申以桂陽王寶貞為中護軍己酉江夏王寶玄伏誅壬子大赦乙丑曲赦京邑南徐兗二州戊辰以始安王寶覽為湘州刺史六月庚寅車駕於樂遊苑內會如三元京邑女人放觀戊戌以新除冠軍將軍張沖為郢州刺史守五兵尚書陸慧曉為南兗州刺史秋七月甲辰以驃騎司馬張稷為北徐州刺史八月丁酉以新除驃騎司馬陳伯之為豫州刺史甲申夜宮內火冬十月己卯害尚書令蕭懿十一月辛丑以寧朔將軍張稷為南兗州刺史甲寅西中郎長史蕭穎冑起義兵於荊州十二月雍州刺史梁王起義兵於襄陽戊寅以冠軍長史劉繪為雍州刺史三年春正月丙申朔合朔時加寅漏上八刻事畢宮人於閱武堂元會皇后正位閹人行儀帝戎服臨視丁酉以驃騎大將軍晉安王寶義為司徒新除撫軍將軍建安王寶寅為車騎將軍開府儀同三司甲辰以寧朔將軍王珍國為北徐州刺史辛亥車駕祀南郊詔大赦天下百官陳讜言二月丙寅乾和殿西廂火壬午詔遣羽林兵征雍州中外纂嚴乙酉以武烈將軍胡元進為廣州刺史三月己亥以驃騎將軍沈徽孚為廣州刺史甲辰以輔國將軍張欣泰為雍州刺史丁未南康王寶融即皇帝位於江陵癸丑遣平西將軍陳伯之西征六月京邑雨水遣中書舍人二縣官長賑賜有差蕭穎冑弟穎孚起兵廬陵戊子曲赦江州安成廬陵二郡秋七月癸巳曲赦荊雍二州甲午雍州刺史張欣泰前南譙太守王靈秀率石頭文武奉建安王寶寅向臺至杜姥宅官門閉乃散走己未以征虜長史程茂為郢州刺史驍騎將軍薛元嗣為雍州刺史是日元嗣以郢城降義師八月丁卯以輔國將軍申冑監豫州事辛巳光祿大夫張環鎮石頭辛未以太子左率李居士總督西討諸軍事屯新亭城九月甲辰以居士為江州刺史新除冠軍將軍王珍國為雍州刺史車騎將軍建安王寶寅為荊州刺史以輔國將軍申冑監郢州龍驤將軍馬仙琕監豫州驍騎將軍徐元稱監徐州是日義軍至南州申冑軍二萬人於姑熟奔歸戊申以後軍參軍蕭璝為司州刺史前輔國將軍魯休烈為益州刺史輔國長史趙越嘗為梁南秦二州刺史丙辰李居士與義軍戰於新亭敗績冬十月甲戌王珍國與義軍戰於朱雀桁敗績戊寅寧朔將軍徐元瑜以東府城降青冀二州刺史桓和入衛屯東宮己卯以眾降光祿大夫張環棄石頭還宮於是閉宮城門自守庚辰以驍騎將軍胡虎牙為徐州刺史左軍將軍徐智勇為益州刺史游擊將軍牛平為梁南秦二州刺史李居士以新亭降琅邪城主張木亦降義師築長圍守宮城十二月丙寅新除雍州刺史王珍國侍中張稷率兵入殿廢帝時年十九帝在東宮便好弄不喜書學高宗亦不以為非但勗以家人之行令太子求一日再入朝發詔不許使三日一朝嘗夜捕鼠達旦以為笑樂高宗臨崩屬以後事以隆昌為戒曰作事不可在人後故委任群小誅諸宰臣無不如意性重澀少言不與朝士接唯親信閹人及左右御刀應敕等自江祏始安王遙光誅後漸便騎馬日夜於後堂戲馬與親近閹人倡伎鼓叫常以五更就臥至晡乃起王侯節朔朝見晡後方前或際闇遣出臺閣案奏月數十日乃報或不知所在二年元會食後方出朝賀裁竟便還殿西序寢自巳至申百僚陪位皆僵仆菜色比起就會怱遽而罷陳顯達事平漸出遊走所經道路屏逐居民從萬春門由東宮以東至于郊外數十百里皆空家盡室巷陌懸幔為高障置伎人防守謂之屏除或於市肆左側過親幸家環回宛轉周逼京邑每三四更中鼓聲四出幡戟橫路百姓喧走相隨士庶莫辨出輒不言定所東西南北無處不驅人高障之內設部伍羽儀復有數部皆奏鼓吹羌胡伎鼓角橫吹夜出晝反火光照天拜愛姬潘氏為貴妃乘臥輿帝騎馬從後著織成袴褶金簿帽執七寶縛槊戎服急裝不變寒暑陵冒雨雪不避坑穽馳騁渴乏輒下馬解取腰邊蠡器酌水飲之復上馬馳去馬乘具用錦繡處患為雨所沾濕織雜綵珠為覆蒙備諸雕巧教黃門五六十人為騎客又選無賴小人善走者為逐馬左右五百人常以自隨奔走往來略不暇息置射雉場二百九十六處翳中帷帳及步鄣皆袷以綠紅錦金銀鏤弩牙玳瑁帖箭郊郭四民皆廢業樵蘇路斷吉凶失時乳婦婚姻之家移產寄室或輿病棄屍不得殯葬有棄病人於青溪邊者吏懼為監司所問推置水中泥覆其面須臾便死遂失骸骨後宮遭火之後更起仙華神仙玉壽諸殿刻畫雕綵青金口帶麝香塗壁錦幔珠簾窮極綺麗縶役工匠自夜達曉猶不副速乃剔取諸寺佛剎殿藻井仙人騎獸以充足之世祖興光樓上施青漆世謂之青樓帝曰武帝不巧何不純用琉璃潘氏服御極選珍寶主衣庫舊物不復周用貴市民間金銀寶物價皆數倍虎魄釧一隻直百七十萬京邑酒租皆折使輸金以為金塗猶不能足下揚南徐二州橋桁塘埭丁計功為直斂取見錢供太樂主衣雜費由是所在塘瀆多有隳廢又訂出雉頭鶴氅白鷺縗親幸小人因緣為姦利課一輸十郡縣無敢言者三年夏於閱武堂起芳樂苑山石皆塗以五采跨池水立紫閣諸樓觀壁上畫男女私褻之像種好樹美竹天時盛暑未及經日便就萎枯於是徵求民家望樹便取毀徹牆屋以移致之朝栽暮拔道路相繼花藥雜草亦復皆然又於苑中立市太官每旦進酒肉雜肴使宮人屠酤潘氏為市令帝為市魁執罰爭者就潘氏決判帝有膂力能擔白虎幢自製雜色錦伎衣綴以金花玉鏡眾寶逞諸意態所寵群小黨與三十一人黃門十人初任新蔡人徐世檦為直閣驍騎將軍凡有殺戮皆其用命殺徐孝嗣後封為臨汝縣子陳顯達事起加輔國將軍雖用護軍崔慧景為都督而兵權實在世檦及事平世檦謂人曰五百人軍主能平萬人都督世檦亦知帝昏縱密謂其黨茹法珍梅蟲兒曰何世天子無要人但阿儂貨主惡耳法珍等爭權以白帝帝稍惡其凶強以二年正月遣禁兵殺之世檦拒戰而死自是法珍蟲兒用事並為外監口稱詔敕中書舍人王咺之與相脣齒專掌文翰其餘二十餘人皆有勢力崔慧景平後法珍封餘干縣男蟲兒封竟陵縣男及義師起江郢二鎮已降帝遊騁如舊謂茹法珍曰須來至白門前當一決義師至近郊乃聚兵為固守之計召王侯朝貴分置尚書都座及殿省又信鬼神崔慧景事時拜蔣子文神為假黃鉞使持節相國太宰大將軍錄尚書揚州牧鍾山王至是又尊為皇帝迎神像及諸廟雜神皆入後堂使所親巫朱光尚禱祀祈福以冠軍將軍王珍國領三萬人據大桁莫有鬭志遣左右直長閹豎王寶孫督戰呼為王長子寶孫切罵諸將帥直閣將軍席豪發憤突陣死豪驍將既弊眾軍於是土崩軍人從朱雀觀上自投及赴淮死者無數於是閉城自守城內軍事委王珍國兗州刺史張稷入衛京師以稷為副實甲猶七萬人帝烏帽袴褶備羽儀登南掖門臨望又虛設鎧馬齋仗千人皆張弓拔白出東掖門稱蔣王出盪素好鬭軍隊初使宮人為軍後乃用黃門親自臨陳詐被創使人輿將去至是於閱武堂設牙門軍頓每夜嚴警帝於殿內騎馬從鳳莊門入徽明門馬被銀蓮葉具裝鎧雜羽孔翠寄生逐馬左右衛從晝眠夜起如平常聞外鼓叫聲被大紅袍登景陽樓屋上望弩幾中之眾皆怠怨不為致力募兵出戰出城門數十步皆坐甲而歸慮城外有伏兵乃燒城傍諸府署六門之內皆蕩盡城中閣道西掖門內相聚為市販死牛馬肉帝初與群小計議陳顯達一戰便敗崔慧景圍城退走謂義師遠來不過旬日亦應散去敕太官辦樵米為百日糧而已大桁敗後眾情兇懼法珍等恐人眾驚走故閉城不復出軍既而義師長圍既立塹柵嚴固然後出盪屢戰不捷帝尤惜金錢不肯賞賜法珍叩頭請之帝曰賊來獨取我邪何為就我求物後堂儲數百具榜啟為城防帝云擬作殿竟不與又催御府細作三百人精仗待圍解以擬屏除金銀雕鏤雜物倍急於常王珍國張稷懼禍及率兵入殿分軍又從西上閣入後宮斷之御刀豐勇之為內應是夜帝在含德殿吹笙歌作女兒子臥未熟聞兵入趨出北戶欲還後宮清曜閣已閉閹人禁防黃泰平以刀傷其膝仆地顧曰奴反邪直後張齊斬首送梁王宣德太后令曰皇室受終祖宗齊聖太祖高皇帝肇基駿命膺籙受圖世祖武皇帝係明下武高宗明皇帝重隆景業咸降年不永宮車早晏皇祚之重允屬儲元而稟質凶愚發於稚齒爰自保姆迄至成童忍戾昏頑觸途必著高宗留心正嫡立嫡惟長輔以群才閒以賢戚內外維持冀免多難未及期稔便逞屠戮密戚近親元勳良輔覆族殲門旬月相係凡所任仗盡慝窮姦皆營伍屠販容狀險醜身秉朝權手斷國命誅戮無辜納其財產睚眥之間屠覆比屋身居元首好是賤事危冠短服坐臥以之晨出夜反無復已極驅斥氓庶巷無居人老細奔遑寘身無所東邁西屏北出南驅負疾輿屍填街塞陌興築繕造日夜不窮晨構夕毀朝穿暮塞絡以隨珠方斯巳陋飾以璧璫曾何足道時暑赫曦流金鑠石移竹藝果匪日伊夜根未及植葉已先枯畚鍤紛紜勤倦無已散費國儲專事浮飾逼奪民財自近及遠兆庶恇恇流竄道路府帑既竭肆奪市道工商裨販行號道泣屈此萬乘躬事角抵昂首翹肩逞能橦木觀者如堵曾無怍容芳樂華林並立闤闠踞肆鼓刀手銓輕重干戈鼓操昏曉靡息無戎而城豈足云譬至於居喪淫讌之愆三年載弄之醜反道違常之釁牝雞晨鳴之慝於事已細故可得而略也罄楚越之竹未足以言校辛癸之君豈或能匹征東將軍忠武奮發投袂萬里光奉明聖翌成中興乘勝席卷掃清京邑而群小靡識嬰城自固緩戮稽誅倏彌旬月宜速勦定寧我邦家可潛遣閒介密宣此旨忠勇齊奮遄加蕩撲放斥昏凶衛送外第未亡人不幸驟此百罹感念存沒心焉如割奈何奈何又令依漢海昏侯故事追封東昏侯茹法珍梅蟲兒王咺之等伏誅豐勇之原死史臣曰漢宣帝時南郡獲白虎獲之者張武言武張而猛服也東昏侯亡德橫流道歸拯亂躬當翦戮實啟太平推閹豎之名字亦天意也贊曰東昏慢道匹癸方辛乃隳典則乃棄彝倫玩習兵火終用焚身
