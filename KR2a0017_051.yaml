body:
  text: 南齊書卷五十一列傳第三十二裴叔業崔慧景張欣泰裴叔業河東聞喜人晉冀州刺史徽後也徽子游擊將軍黎遇中朝亂子孫沒涼州仕於張氏黎玄孫先福義熙末還南至滎陽太守叔業父祖晚渡少便弓馬有武幹宋元徽末累官為羽林監太祖驃騎行參軍建元元年除屯騎校尉虜侵司豫二州以叔業為軍主征討本官如故上初即位羣下各獻讜言二年叔業上疏曰成都沃壤四塞為固古稱一人守隘萬夫趑趄雍齊亂於漢世譙李寇於晉代成敗之迹事載前史頃世以來綏馭乖術地惟形勢居之者異姓國實武用鎮之者無兵致寇掠充斥賧稅不斷宜遣帝子之尊臨撫巴蜀總益梁南秦為三州刺史率文武萬人先啟漢分遣郡戍皆配精力搜盪山源糾虔姦𢀿威令既行民夷必服除寧朔將軍軍主如故永明四年累至右軍將軍東中郎諮議參軍高宗為豫州叔業為右軍司馬加建威將軍軍主領陳留太守七年為王敬則征西司馬將軍軍主如故隨府轉驃騎在壽春為佐數年九年為寧蠻長史廣平太守雍州刺史王奐事難叔業率部曲於城內起義上以其有幹用仍留為晉安王征北諮議領中兵扶風太守遷晉熙王冠軍司馬延興元年加寧朔將軍司馬如故叔業早與高宗接事高宗輔政厚任叔業以為心腹使領軍掩襲諸蕃鎮叔業盡心用命建武二年虜圍徐州叔業以軍主隸右衞將軍蕭坦之救援叔業攻虜淮柵外二城剋之賊衆赴水死甚衆除黃門侍郎上以叔業有勳誠封武昌縣伯五百戶仍為持節督徐州軍事冠軍將軍徐州刺史四年虜主寇沔北上令叔業援雍州叔業啟北人不樂遠行唯樂侵伐虜堺則雍司之賊自然分張無勞動民向遠也上從之叔業率軍攻虹城獲男女四千餘人徙督豫州輔國將軍豫州刺史持節如故永泰元年叔業領東海太守孫令終新昌太守劉思効馬頭太守李僧護等五萬人圍渦陽虜南六允州所鎮去彭城百二十里偽六允州刺史孟表固守拒戰叔業攻圍之積所斬級高五丈以示城內又遣軍主蕭璝成寶真分攻龍亢戍即虜馬頭郡也虜閉城自守偽徐州刺史廣陵王率二萬人騎五千匹至龍亢璝等拒戰不敵叔業三萬餘人助之數道攻虜虜新至營未立於是大敗廣陵王與數十騎走官軍追獲其節虜又遣偽將劉藻高怱繼至叔業率軍迎擊破之再戰斬首萬級獲生口三千人器仗驢馬絹布千萬計虜主聞廣陵王敗遣偽都督王肅大將軍楊大眼步騎十餘萬救渦陽叔業見兵盛夜委軍遁走明日官軍奔潰虜追之傷殺不可勝數日暮乃止叔業還保渦口上遣使慰勞高宗崩叔業還鎮少主即位誅大臣京師屢有變發叔業登壽春城北望肥水謂部下曰卿等欲富貴乎我言富貴亦可辦耳永元元年徙督南六允阨青冀五州軍事南六允州刺史將軍持節如故叔業見時方亂不樂居近蕃朝廷疑其欲反叔業亦遣使參察京師消息於是異論轉盛叔業兄子植颺竝為直閤殿內驅使慮禍至棄母奔壽陽說叔業以朝廷必見掩襲徐世檦等慮叔業外叛遣其宗人中書舍人裴長穆宣旨許停本任叔業猶不自安而植等說之不已叔業憂懼問計於梁王梁王令遣家還都自然無患叔業乃遣子芬之等還質京師明年進號冠軍將軍傳叔業反者不已芬之愈懼復奔壽春於是發詔討叔業遣護軍將軍崔慧景征虜將軍豫州刺史蕭懿督水陸衆軍西討頓軍小峴叔業病困植請救魏虜送芬之為質叔業尋卒虜遣大將軍李醜楊大眼二千餘騎入壽春初虜主元宏建武二年至壽春其下勸攻城宏曰不須攻後當降也植等皆還洛陽崔慧景字君山清河東武城人也祖構奉朝請父系之州別駕慧景初為國子學生宋泰始中歷位至員外郎稍遷長水校尉寧朔將軍太祖在淮陰慧景與宗人祖思同時自結太祖欲北渡廣陵使慧景具船於陶家後渚事雖不遂以此見親除前軍沈攸之事平仍出為武陵王安西司馬河東太守使防扞陝西昇明三年豫章王為荊州慧景留為鎮西司馬兼諮議太守如故太祖受禪封樂安縣子三百戶豫章王遣慧景奉表稱慶還京師太祖召見加意勞接轉平西府司馬南郡內史仍遷為南蠻長史加輔國將軍內史如故先是蠻府置佐資用甚輕至是始重其選建元元年虜動豫章王遣慧景三千人頓方城為司州聲援虜退梁州賊李烏奴未平以慧景為持節都督梁南北秦沙四州軍事西戎校尉梁南秦二州刺史將軍如故敕荊州資給發遣配以實甲千人步道從襄陽之鎮初烏奴屢為官軍所破走氐中乘閒出擾動梁漢據關城遣使詣荊州請降豫章王不許遣中兵參軍王圖南率益州軍從劒閣掩討大摧破之烏奴還保武興慧景發漢中兵衆進頓白馬遣支軍與圖南腹背攻擊烏奴大敗遂奔于武興世祖即位進號冠軍將軍在州蓄聚多獲珍貨永明三年以本號還遷黃門郎領羽林監明年遷隨王東中郎司馬加輔國將軍出為持節督司州軍事冠軍將軍司州刺史母喪詔起復本任慧景每罷州輒傾資獻奉動數百萬世祖以此嘉之九年以本號徵還轉太子左率加通直常侍明年遷右衞將軍加給事中是時虜將南侵上出慧景為持節督豫州郢州之西陽司州之汝南二郡諸軍事冠軍將軍豫州刺史鬱林即位進號征虜將軍慧景以少主新立密與虜交通朝廷疑懼高宗輔政遣梁王至壽春安慰之慧景遣密啟送誠勸進徵還為散騎常侍左衞將軍建武二年虜寇徐豫慧景以本官假節向鍾離受王玄邈節度尋加冠軍將軍四年遷度支尚書領太子左率冬虜主攻沔北五郡假慧景節率衆二萬騎千匹向襄陽雍州衆軍竝受節度永泰元年慧景至襄陽五郡已沒加慧景平北將軍置佐史分軍助戍樊城慧景頓渦口村與太子中庶子梁王及軍主前寧州刺史董仲民劉山陽裴颺傅法憲等五千餘人進行鄧城前參騎還稱虜軍且至須臾望數萬騎俱來慧景據南門梁王據北門令諸軍上城上時慧景等蓐食輕行皆有饑懼之色軍中北館客三人走投虜具告之虜偽都督中軍大將軍彭城王元勰分遣偽武衞將軍元蚪趣城東南斷慧景歸路偽司馬孟斌向城東偽右衞將軍播正屯城北交射城內梁王欲出戰慧景曰虜不夜圍人城待日暮自當去也既而虜衆轉盛慧景於南門拔軍衆軍不相知隨後奔退虜軍從北門入劉山陽與部曲數百人斷後死戰虜遣鎧馬百餘匹突取山陽山陽使射手射之三人倒馬手殺十餘人不能禁且戰且退慧景南出過鬧溝軍人蹈藉橋皆斷壞虜軍夾路射之軍主傅法憲見殺赴溝死者相枕山陽取襖杖填溝乘之得免虜主率大衆追之晡時虜主至沔北圍軍主劉山陽山陽據城苦戰至暮虜乃退衆軍恐懼其夕皆下船還襄陽東昏即位改領右衞將軍平北假節如故未拜永元元年遷護軍將軍尋加侍中陳顯達反加慧景平南將軍都督衆軍事屯中堂時輔國將軍徐世檦專勢號令慧景備員而已帝既誅戮將相舊臣皆盡慧景自以年宿位重轉不自安明年裴叔業以壽春降虜改授慧景平西將軍假節侍中護軍如故率軍水路征壽陽軍頓白下將發帝長圍屏除出琅邪城送之帝戎服坐城樓上召慧景單騎進圍內無一人自隨者裁交數言拜辭而去慧景既得出甚喜子覺為直閤將軍慧景密與期四月慧景至廣陵覺便出奔慧景過廣陵數十里召會諸軍主曰吾荷三帝厚恩當顧託之重幼主昏狂朝廷壞亂危而不扶責在今日欲與諸君共建大功以安宗社何如衆皆響應於是回軍還廣陵司馬崔恭祖守廣陵城開門納之帝聞變以征虜將軍右衞將軍左興盛假節督京邑水陸衆軍慧景停二日便收衆濟江集京口江夏王寶玄又為內應合二鎮兵力奉寶玄向京師臺遣驍騎將軍張佛護直閤將軍徐元稱屯騎校尉姚景珍西中郎參軍徐景智游盪軍主董伯珍騎官桓靈福等據竹里為數城寶玄遣信謂佛護曰身自還朝君何意苦相斷遏佛護答曰小人荷國重恩使於此創立小戍殿下還朝但自直過豈敢干斷遂射慧景軍因合戰慧景子覺及崔恭祖領前鋒皆傖楚善戰又輕行不爨食以數舫緣江載酒肉為軍糧每見臺軍城中煙火起輒盡力攻擊臺軍不復得食以此饑困元稱等議欲降佛護不許十二日恭祖等復攻之城陷佛護單馬走追得斬首徐元稱降餘軍主皆死慧景至臨沂令李玉之發橋斷路慧景收殺之臺遣中領軍王瑩都督衆軍據湖頭築壘上帶蔣山西巖實甲數萬慧景至查硎竹塘人萬副兒善射獵能捕虜虎投慧景曰今平路皆為臺軍所斷不可議進唯宜從蔣山龍尾上出其不意耳慧景從之分遣千餘人魚貫緣山自西巖夜下鼓叫臨城中臺軍驚恐即時奔散帝又遣右衞將軍左興盛率臺內三萬人拒慧景於北籬門望風退走慧景引軍入樂遊苑恭祖率輕騎十餘匹突進北掖門乃復出宮門皆閉慧景引衆圍之於是東府石頭白下新亭諸城皆潰左興盛走不得入宮逃淮渚荻舫中慧景擒殺之宮中遣兵出盪不剋慧景燒蘭臺府署為戰塲守衞尉蕭暢屯南掖門處分城內隨方應擊衆心以此稍安慧景稱宣德太后令廢帝為吳王時巴陵王昭冑先逃民間出投慧景慧景意更向之故猶豫未知所立竹里之捷子覺與恭祖爭勳慧景不能決恭祖勸慧景射火箭燒北掖樓慧景以大事垂定後若更造費用功力不從其計性好談義兼解佛理頓法輪寺對客高談恭祖深懷怨望先是衞尉蕭懿為征虜將軍豫州刺史自歷陽步道征壽陽帝遣密使告之懿率軍主胡松李居士等數千人自采石濟岸頓越城舉火臺城中鼓叫稱慶恭祖先勸慧景遣二千人斷西岸軍令不得渡慧景以城旦夕降外救自然應散至是恭祖請擊義師又不許乃遣子覺將精手數千人渡南岸義師昧旦進戰數合士皆致死覺大敗赴淮死者二千餘人覺單馬退開桁阻淮其夜崔恭祖與驍將劉靈運詣城降慧景衆情離壞乃將腹心數人潛去欲北渡江城北諸軍不知猶為拒戰城內出盪殺數百人義軍渡北岸慧景餘衆皆奔慧景圍城凡十二日軍旅散在京師不為營壘及走衆於道稍散單馬至木义浦為漁父所斬以頭內鰌魚籃檐送至京師時年六十三追贈張佛護為司州刺史左興盛豫州刺史竝征虜將軍徐景智桓靈福屯騎校尉董伯珍員外郎李玉之給事中其餘有差恭祖者慧景宗人驍果便馬矟氣力絕人頻經軍陣討王敬則與左興盛軍容袁文曠爭敬則首訴明帝曰恭祖禿馬絳衫手刺倒賊故文曠得斬其首以死易勳而見枉奪若失此勳要當刺殺左興盛帝以其勇使謂興盛曰何容令恭祖與文曠爭功遂封二百戶慧景平後恭祖繫尚方少時殺之覺亡命為道人見執伏法臨刑與妹書曰捨逆旅歸其家以為大樂況得從先君遊太清乎古人有力扛周鼎而有立錐之歎以此言死亦復何傷平生素心士大夫皆知之矣既不得附驥尾安得施名於後世慕古竹帛之事今皆亡矣慧景妻女亦頗知佛義覺弟偃為始安內史藏竄得免和帝西臺立以為寧朔將軍中興元年詣公車門上書曰臣竊惟太祖高宗之孝子忠臣而昏主之賊臣亂子者江夏王與陛下先臣與鎮軍是也臣聞堯舜之心常以天下為憂而不以位為樂彼孑然之舜壟畝之人猶尚若此況祖業之重家國之切江夏既行之於前陛下又蹈之於後雖成敗異術而所由同方也陛下初登至尊與天合符天下纖介之屈尚望陛下申之絲髮之寃尚望陛下理之況先帝之子陛下之兄所行之道即陛下所由哉如此尚弗恤其餘何幾哉陛下德侔造化仁育羣生雖在昆蟲草木有不得其所者覽而傷焉而況乎友愛天至孔懷之深夫豈不懷將以事割此實左右不明未之或詳惟陛下公聽竝觀以詢之芻蕘羣臣有以臣言為不可乞使臣廷辯之則天人之意塞四海之疑釋必若不然僥小民之無識耳使其曉然知此相聚而逃陛下以責江夏之寃朝廷將何以應之哉若天聽沛然回光發惻愴之詔而使東牟朱虛東襃儀父之節則何戈之士誰不盡死愚戇之言萬一上合事乞留中事寢不報偃又上疏曰近冒陳江夏之寃定承聖詔已有襃贈此臣狂踈之罪也然臣所以諮問者不得其實罪在萬沒無所復云但愚心所恨非敢以父子之親骨肉之閒而僥幸曲陛下之法傷至公之義誠不曉聖朝所以然之意何則若以狂主雖狂而實是天子江夏雖賢實是人臣先臣奉人臣逆人君以為不可申明詔得矣然未審陛下亦是人臣不而鎮軍亦復奉人臣逆人君今之嚴兵勁卒方指於象魏者其故何哉臣所不死苟存視息非有他故所以待皇運之開泰申寃魂之枉屈今皇運既已開泰矣而死於社稷盡忠反以為賊臣何用此生陛下世矣臣聞王臣之節竭智盡公以奉其上居股肱之任者申理寃滯薦達羣賢凡此衆臣夙興夜寐心未嘗須臾之閒而不在公故萬物無不得其理而頌聲作焉臣謹案鎮軍將軍臣穎冑宗室之親股肱之重身有伊霍之功荷陛下稷旦之任中領軍臣諱詳受帷幄之寄副宰相之尊皆所以棟梁朝廷社稷之臣天下所當遑遑匪懈盡忠竭誠欲使萬物得理而頌聲大興者豈復宜踰此哉而同知先臣股肱江夏匡濟王室天命未遂王亡與亡而不為陛下瞥然一言知而不言是不忠之臣不知而言乃不智之臣此而不知將何所知如以江夏心異先臣受制臣力則江夏同致死斃聽可昬政淫刑見殘無道然江夏之異以何為明孔呂二人誰以為戮手御麾幡言輒任公同心共志心若膠漆而以為異臣竊惑焉如以先臣遣使江夏斬之則征東之驛何為見戮陛下斬征東之使寔詐山陽江夏違先臣之請實謀孔矜天命有歸故事業不遂耳夫唯聖人乃知天命守忠之臣唯知盡死安顧成敗詔稱江夏遭時屯故跡屈行令內恕探情無玷純節今茲之旨又何以處鎮軍哉臣所言畢矣乞就湯鑊然臣雖萬沒猶願陛下必申先臣何則惻愴而申之則天下伏不惻愴而申之天下之人北面而事陛下者徒以力屈耳先臣之忠有識所知南史之筆千載可期亦何待陛下屈申而為襃貶然小臣惓惓之愚為陛下計耳臣之所言非孝於父實忠於君唯陛下孰察少留心焉臣頻觸宸嚴而不彰露所以每上封事者非自為戇地猶以春秋之義有隱諱之意也臣雖淺薄然今日之事斬足斷頭殘身滅形何所不能為陛下耳臣聞生人之死肉人之骨有識之士未為多感公聽竝觀申人之寃秉德任公理人之屈則普天之人爭為之死何則理之所不可以已也陛下若引臣寃免臣兄之罪收往失發惻愴之詔懷可報之意則桀之犬實可吠堯跖之客實可刺由又何況由之犬堯之客臣非生實為陛下重此名於天下已成之基可惜之寶莫復是加寖明寖昌不可不循寖微寖滅不可不慎惟陛下熟察詳擇其衷若陛下猶以為疑鎮軍未之允決乞下征東共詳可否無以向隅之悲而傷陛下滿堂之樂何則陛下昏主之弟江夏亦昏主之弟鎮軍受遺託之恩先臣亦荷顧命之重情節無異所為皆同殊者唯以成敗仰資聖朝耳臣不勝愚忠請使羣臣廷辯者臣乞專令一人精賜本語僥幸萬一天聽昭然則軻沈七族離燔妻子人以為難臣豈不易詔報曰具卿寃切之懷卿門首義而旌德未彰亦追以慨然今當顯加贈謚偃尋下獄死張欣泰字義亨竟陵人也父興世宋左衞將軍欣泰少有志節不以武業自居好隸書讀子史年十餘詣吏部尚書褚淵淵問之曰張郎弓馬多少欣泰答曰性怯畏馬無力牽弓淵甚異之辟州主簿歷諸王府佐元徽中興世在家擁雍州還資見錢三千萬蒼梧王自領人劫之一夜垂盡興世憂懼感病卒欣泰兄欣華時任安成郡欣泰悉封餘財以待之建元初歷官寧朔將軍累除尚書都官郎世祖與欣泰早經款遇及即位以為直閤將軍領禁旅除豫章王太尉參軍出為安遠護軍武陵內史還復為直閤步兵校尉領羽林監欣泰通涉雅俗交結多是名素下直輒遊園池著鹿皮冠衲衣錫杖挾素琴有以啟世祖者世祖曰將家兒何敢作此舉止後從車駕出新林敕欣泰甲仗廉察欣泰停仗於松樹下飲酒賦詩制局監呂文度過見啟世祖世祖大怒遣出外數日意稍釋召還謂之曰卿不樂為武職驅使當處卿以清貫除正員郎永明八年出為鎮軍中兵參軍南平內史巴東王子響殺僚佐上遣中庶子胡諧之西討使欣泰為副欣泰謂諧之曰今太歲在西南逆歲行軍兵家深忌不可見戰戰必見危今叚此行勝既無名負誠可恥彼凶狡相聚所以為其用者或利賞逼威無由自潰若且頓軍夏口宣示禍福可不戰而禽也諧之不從進屯江津尹略等見殺事平欣泰徙為隨王子隆鎮西中兵改領河東內史子隆深相愛納數與談宴州府職局多使關領意遇與謝朓相次典籤密以啟聞世祖怒召還都屏居家巷置宅南岡下面接松山欣泰負弩射雉恣情閑放衆伎雜藝頗多閑解明帝即位為領軍長史遷諮議參軍上書陳便宜二十條其一條言宜毀廢塔寺帝竝優詔報答建武二年虜圍鍾離城欣泰為軍主隨崔慧景救援欣泰移虜廣陵侯曰聞攻鍾離是子之深策可無謬哉兵法云城有所不攻地有所不爭豈不聞之乎我國家舟舸百萬覆江橫海所以案甲于今不至欲以邊城疲魏士卒我且千里運糧行留俱弊一時霖雨川谷涌溢然後乘帆渡海百萬齊進子復奚以御之乃令魏主以萬乘之重攻此小城是何謂歟攻而不拔誰之恥邪假令能拔子守之我將連舟千里舳艫相屬西過壽陽東接滄海仗不再請糧不更取士卒偃臥起而接戰乃魚鱉不通飛鳥斷絕偏師淮左其不能守畑可知矣如其不拔吾將假法于魏之有司以請子之過若挫兵夷衆攻不卒下驅士填隍拔而不能守則魏朝名士其當別有深致乎吾所未能量昔魏之太武佛狸傾一國之衆攻十雉之城死亡太半僅以身返既智屈於金墉亦雖拔而不守皆筭失所為至今為笑前鑒未遠已忘之乎和門邑邑戲載往意虜既為徐州軍所挫更欲於邵陽洲築城慧景慮為大患欣泰曰虜所以築城者外示姱大實懼我躡其後耳今若說之以彼此各願罷兵則其患自息慧景從之遣欣泰至虜城下具述此意及虜引退而洲上餘兵萬人求輸五百匹馬假道慧景欲斷路攻之欣泰說慧景曰歸師勿遏古人畏之死地之兵不可輕也勝之既不足為武敗則徒喪前功不如許之慧景乃聽虜過時領軍蕭坦之亦援鍾離還啟明帝曰邵陽洲有死賊萬人慧景欣泰放而不取帝以此皆不加賞四年出為永陽太守永元初還都崔慧景圍城欣泰入城內領軍守備事寧除輔國將軍廬陵王安東司馬義師起以欣泰為持節督雍梁南北秦四州郢州之竟陵司州之隨郡軍事雍州刺史將軍如故時少帝昏亂人情咸伺事隙欣泰與弟前始安內史欣時密謀結太子右率胡松前南譙太守王靈秀直閤將軍鴻選含德主帥苟勵直後劉靈運等十餘人竝同契會帝遣中書舍人馮元嗣監軍救郢茹法珍梅蟲兒及太子右率李居士制局監楊明泰等十餘人相送中興堂欣泰等使人懷刀於座斫元嗣頭墜果柈中又斫明泰破其腹蟲兒傷刺數瘡手指皆墮居士踰牆得出茹法珍亦散走還臺靈秀仍往石頭迎建安王寶夤率文武數百唱警蹕至杜姥宅欣泰初聞事發馳馬入宮冀法珍等在外城內處分必盡見委表𩹉相應因行廢立既而法珍得反處分閉門上仗不配欣泰兵鴻選在殿內亦不敢發城外衆尋散少日事覺詔收欣泰胡松等皆伏誅欣泰少時有人相其當得三公而年裁三十後屋瓦墮傷額又問相者云無復公相年壽更增亦可得方伯耳死時年四十六史臣曰崔慧景宿將老臣憂危昏運回董御之威舉晉陽之甲乘機用權內襲少主因樂亂之民藉淮楚之剽驍將授首羣帥委律鼓鼙讙於宮寢戈戟跱於城隍陵埤負戶士衰氣竭屢發銅虎之兵未有釋位之援勢等易京魚爛待盡征虜將軍投袂以先國急束馬旅師橫江競濟風驅電掃制勝轉丸越城之戰旗獲蔽野津耳臼儿之捷獻俘象魏瞻塵望烽窮壘重闢戮帶定襄曾未及此盛矣哉桓文異世也贊曰叔業外叛淮肥失險慧景倒戈宮門晝掩欣泰倉卒霜刃不染實起時昬堅氷互漸
