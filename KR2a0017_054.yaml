body:
  text: 南齊書卷五十四列傳第三十五高逸褚伯玉明僧紹顧歡臧榮緒何求劉虯庾易宗測杜京産沈驎士吳苞徐伯珍易有君子之道四焉語默之謂也故有入廟堂而不出徇江湖而永歸隱避紛紜情迹萬品若道義內足希微兩亡藏景窮巖蔽名愚谷解桎梏於仁義永形神於天壤則名教之外別有風猷故堯封有非聖之人孔門謬雞黍之客次則揭獨往之高節重去就之虛名激競違貪與世為異或慮全後悔事歸知殆或道有不申行吟山澤咸皆用宇宙而成心借風雲以為戒果志遠達道未或非然含貞養素文以藝業不然與樵者之在山何殊別哉故樊英就徵不稱李固之望馮恢下節見陋張華之語期之塵外庶以弘多若今十餘子者仕不求聞退不譏俗全身幽履服道儒門斯逸民之軌操故綴為高逸篇云爾褚伯玉字元璩吳郡錢唐人也高祖含始平太守父逖征虜參軍伯玉少有隱操寡嗜欲年十八父為之婚婦入前門伯玉從後門出遂往剡居瀑布山性耐寒暑時人比之王仲都在山三十餘年隔絶人物王僧達為吳郡苦禮致之伯玉不得已停郡信宿裁交數言而退寧朔將軍丘珍孫與僧達書曰聞褚先生出居貴館此子滅景雲棲不事王侯抗高木食有年載矣自非折節好賢何以致之昔文舉棲冶城安道入昌門於茲而三焉夫却粒之士餐霞之人乃可暫致不宜久羈君當思遂其高步成其羽化望其還策之日暫紆清塵亦願助為譬說僧達答曰褚先生從白雲遊舊矣古之逸民或留慮兒女或使華陰成市而此子索然唯朋松石介於孤峯絶嶺者積數十載近故要其來此冀慰日夜比談討芝桂借訪荔蘿若已窺煙液臨滄洲矣知君欲見之輒當申譬宋孝建二年散騎常侍樂詢行風俗表薦伯玉加徵聘本州議曹從事不就太祖即位手詔吳會二郡以禮迎遣又辭疾上不欲違其志敕於剡白石山立太平館居之建元元年卒年八十六常居一樓上仍葬樓所孔稚圭從其受道法為於館側立碑明僧紹字承烈平原人也祖玩州治中父略給事中僧紹宋元嘉中再舉秀才明經有儒術永光中鎮北府辟功曹竝不就隱長廣郡嶗山聚徒立學淮北沒虜乃南渡江明帝泰始六年徵通直郎不就升明中太祖為太傅教辟僧紹及顧歡臧榮緒以旍幣之禮徵為記室參軍不至僧紹弟慶符為青州僧紹乏糧食隨慶符之鬱洲住弇榆山栖雲精舍欣玩水石竟不一入州城建元元年冬詔曰朕側席思士載懷塵外齊郡明僧紹標志高栖耽情墳素幽貞之操宜加賁飾徵為正員外郎稱疾不就其後與崔思祖書曰明居士標意可重吾前旨竟未達邪小凉欲有講事卿可至彼具述吾意令與慶符俱歸又曰不食周粟而食周薇古猶發議在今寧得息談邪聊以為笑慶符罷任僧紹隨歸住江乘攝山太祖謂慶符曰卿兄高尚其事亦堯之外臣朕雖不相接有時通夢遺僧紹竹根如意筍籜冠僧紹聞沙門釋僧遠風德往候定林寺太祖欲出寺見之僧遠問僧紹曰天子若來居士若為相對僧紹曰山藪之人政當鑿壞以遁苦若辭不獲命便當依戴公故事耳永明元年世祖敕召僧紹稱疾不肯見詔徵國子博士不就卒子元琳字仲璋亦傳家業僧紹長兄僧胤能玄言宋世為冀州刺史弟僧皓亦好學宋孝武見之迎頌其名時人以為榮泰始初為青州刺史慶符建元初為黃門僧胤子惠照元徽中為太祖平南主簿從拒桂陽纍至驃騎中兵與荀伯玉對領直建元元年為巴州刺史綏懷蠻蛋上許為益州未遷卒顧歡字景怡吳郡鹽官人也祖赳晉隆安末避亂徙居歡年六七歲晝書甲子有簡三篇歡析計遂知六甲家貧父使驅田中雀歡作黃雀賦而歸雀食過半父怒欲撻之見賦乃止鄉中有學舍歡貧無以受業於舍壁後倚聽無遺忘者八歲誦孝經詩論及長篤志好學母年老躬耕誦書夜則燃糠自照同郡顧顗之臨縣見而異之遣諸子與遊及孫憲之竝受經句歡年二十餘更從豫章雷次宗咨玄儒諸義母亡水漿不入口六七日廬于墓次遂隱遁不仕於剡天台山開館聚徒受業者常近百人歡早孤每讀詩至哀哀父母輒執書慟泣學者由是廢蓼莪篇不復講太祖輔政悅歡風教徵為揚州主簿遣中使迎歡及踐阼乃至歡稱山谷臣顧歡上表曰臣聞舉網提綱振裘持領綱領既理毛目自張然則道德綱也物勢目也上理其綱則萬機時序下張其目則庶官不曠是以湯武得勢師道則祚延秦項忽道任勢則身戮夫天門開闔自古有之四氣相新絺裘代進今火澤易位三靈改憲天樹明德對時育物搜揚仄陋野無伏言是以窮谷愚夫敢露偏管謹刪撰老氏獻治綱一卷伏願稽古百王斟酌時用不以芻蕘棄言不以人微廢道則率土之賜也微臣之幸也幸賜一疏則上下交泰雖不求民而民悅不祈天而天應應天悅民則皇基固矣臣志盡幽深無與榮勢自足雲霞不須祿養陛下既遠見尋求敢不盡言言既盡矣請從此退是時員外郎劉思效表陳讜言曰宋自大明以來漸見凋弊徵賦有增於往天府尤貧於昔兼軍警屢興傷夷不復戍役殘丁儲無半菽小民嗷嗷無樂生之色貴勢之流貨室之族車服伎樂爭相奢麗亭池第宅競趣高華至於山澤之人不敢採飲其水草貧富相輝捐源尚末陛下宜發明詔吐德音布惠澤禁邪僞薄賦斂省徭役絶奇麗之賂塞鄭衛之倡變曆運之化應質文之用不亦大哉又彭汴有鴟梟之巢青丘為狐兔之窟虐害踰紀殘暴日滋鬼泣舊泉人悲故壤童孺視編髮而慙生耆老看左衽而恥沒陛下宜仰答天人引領之望下弔氓黎傾首之勤授鉞衛霍之將遺策蕭張之師萬道俱前窮山蕩谷此即恆山不足指而傾渤海不足飲而竭豈徒殘寇塵滅而已哉上詔曰朕夙旦惟夤思弘治道佇夢巖濱垂精管庫旰食舊縈懷其勤至矣吳郡顧歡散騎郎劉思效或至自丘園或越在冗位竝能獻書金門薦辭鳳闕辨章治體有協朕心今出其表外可詳擇所宜以時敷奏歡近已加旍賁思效可付選銓序以顯讜言歡東歸上賜麈尾素琴永明元年詔徵歡為太學博士同郡顧黯為散騎郎黯字長孺有隱操與歡俱不就徵歡晚節服食不與人通每旦出戶山鳥集其掌取食事黃老道解陰陽書為數術多效驗初元嘉末出都寄住東府忽題柱云三十年二月二十一日因東歸後太初弒逆果是此年月自知將終賦詩言志云精氣因天行遊魂隨物化剋死日卒於剡山身體柔軟時年六十四還葬舊墓木連理出墓側縣令江山圖表狀世祖詔歡諸子撰歡文議三十卷佛道二家立教既異學者互相非毀歡著夷夏論曰夫辨是與非宜據聖典尋二教之源故兩標經句道經云老子入關之天竺維衛國國王夫人名曰淨妙老子因其晝寢乘日精入淨妙口中後年四月八日夜半時剖左腋而生墜地即行七步於是佛道興焉此出玄妙內篇佛經云釋迦成佛有塵劫之數出法華𣰋量壽或為國師道士儒林之宗出瑞應本起歡論之曰五帝三皇莫不有師國師道士無過老莊儒林之宗孰出周孔若孔老非佛誰則當之然二經所說如合符契道則佛也佛則道也其聖則符其跡則反或和光以明近或曜靈以示遠道濟天下故無方而不入智周萬物故無物而不為其入不同其為必異各成其性不易其事是以端委搢紳諸華之容翦髮曠衣羣夷之服擎跽磬折侯甸之恭狐蹲狗踞荒流之肅棺殯槨月刀巴中夏之制火焚水沈西戎之俗全形守禮繼善之教毀貌易性絶惡之學豈伊同人爰及異物鳥王獸長往往是佛無窮世界聖人代興或昭五典或布三乘在鳥而鳥鳴在獸而獸吼教華而華言化夷而夷語耳雖舟車均於致遠而有川陸之節佛道齊乎達化而有夷夏之別若謂其致既均其法可換者而車可涉川舟可行陸乎今以中夏之性效西戎之法既不全同又不全異下育棄妻孥上廢宗祀嗜欲之物皆以禮伸孝敬之典獨以法屈悖禮犯順曾莫之覺弱喪忘歸孰識其舊且理之可貴者道也事之可賤者俗也捨華效夷義將安取若以道邪道固符合矣若以俗邪俗則大乖矣屢見刻舷沙門守株道士交諍小大互相彈射或域道以為兩或混俗以為一是牽異以為同破同以為異則乖爭之由淆亂之本也尋聖道雖同而法有左右始乎無端終乎無末泥洹仙化各是一術佛號正真道稱正一一歸無死真會無生在名則反在實則合但無生之教賒無死之化切切法可以進謙弱賒法可以退夸強佛教文而博道教質而精精非粗人所信博非精人所能佛言華而引道言實而抑抑則明者獨進引則昧者競前佛經繁而顯道經簡而幽幽則妙門難見顯則正路易遵此二法之辨也聖匠無心方圓有體器既殊用教亦異施佛是破惡之方道是興善之術興善則自然為高破惡則勇猛為貴佛跡光大宜以化物道跡密微利用為己優劣之分大略在茲夫蹲夷之儀婁羅之辨各出彼俗自相聆解猶蟲嚾鳥聒何足述效歡雖同二法而意黨道教宋司徒袁粲託為道人通公駮之其略曰白日停光星隱照誕降之應事在老先似非入關方炳斯瑞又老莊周孔有可存者依日末光憑釋遺法盜牛竊善反以成𢀿檢究源流終異吾黨之為道耳西域之記佛經之說俗以膝行為禮不慕蹲坐為恭道以三繞為虔不尚踞傲為肅豈專戎土爰亦茲方襄童謁帝膝行而進趙王見周三環而止今佛法在華乘者常安戒善行交蹈者通文王造周大伯創吳革化戎夷不因舊俗豈若舟車理無代用佛法垂化或因或革清信之士容衣不改息心之人服貌必變變本從道不遵彼俗教風自殊無患其亂孔老釋迦其人或同觀方設教其道必異孔老治世為本釋氏出世為宗發軫既殊其歸亦異符合之唱自由臆說又仙化以變形為上泥洹以陶神為先變形者白首還緇而未能無死陶神者使塵惑日損湛然常存泥洹之道無死之作地乖詭若此何謂其同歡答曰案道經之作著自西周佛經之來始乎東漢年踰八百代懸數十若謂黃老雖久而濫在釋前是呂尚盜陳之齊劉季竊王莽之漢也經云戎氣強獷乃復略人頰車邪又夷俗長跽法與華異翹左跂右全是蹲踞故周公禁之於前仲尼戒之於後又舟以濟川車以征陸佛起於戎豈非戎俗素惡邪道出於華豈非華風本善邪今華風既變惡同戎狄佛來破之良有以矣佛道實貴故戒業可遵戎俗實賤故言貌可棄今諸華士女民族弗革而露首編偏踞濫用夷禮云於翦落之徒全是胡人國有舊風法不可變又若觀風流教其道必異佛非東華之道道非西戎之法魚鳥異淵永不相關安得老釋二教交行八表今佛既東流道亦西邁故知世有精粗教有文質然則道教執本以領末佛教救末以存本請問所異歸在何許若以翦落為異則胥靡翦落矣若以立像為異則俗巫立像矣此非所歸歸在常住常住之象常道孰異神仙有死權便之說神仙是大化之總稱非窮妙之至名至名無名其有名者二十七品仙變成真真變成神或謂之聖各有九品品極則入空寂無為無名若服食茹芝延壽萬億壽盡則死藥極則枯此修考之士非神仙之流也明僧紹正二教論以為佛明其宗老全其生守生者蔽明宗者通今道家稱長生不死名補天曹大乖老莊立言本理文惠太子竟陵王子良竝好釋法吳興孟景翼為道士太子召入玄圃園衆僧大會子良使景翼禮佛景翼不肯子良送十地經與之景翼造正一論大略曰寶積云佛以一音廣說法老子云聖人抱一以為天下式一之為妙空玄絶於有景境神化贍於無窮為萬物而𣰋為處一數而無數莫之能名強號為一在佛曰實相在道曰玄牝道之大象即佛之法身以不守之守守法身以不執之執執大象但物有八萬四千行說有八萬四千法法乃至於無數行亦逮於無央等級隨緣須導歸一歸一曰回向向正即無邪邪觀既遣億善日新三五四六隨用而施獨立不改絶學無憂曠劫諸聖共遵斯一老釋未始於嘗分迷者分之而未合億善遍修修遍成聖雖十號千稱終不能盡終不能盡豈可思議司徒從事中郎張融作門律云道之與佛逗極無二吾見道士與道人戰儒墨道人與道士獄是非昔有鴻飛天首積遠難亮越人以為楚人以為乙人自楚越鴻常一耳以示太子僕周顒顒難之曰虛無法性其寂雖同位寂之方其旨則別論所謂逗極無二者為逗極於虛無當無二於法性耶足下所宗之本一物為鴻乙耳驅馳佛道無免二末未知高鑒緣何識本輕而宗之其有旨乎往復文多不載歡口不辨善於著筆著三名論甚工鍾會四本之流也又注王弼易二繫學者傳之始興人盧度亦有道術少隨張永北征永敗虜追急阻淮水不得過度心誓曰若得免死從今不復殺生須臾見兩楯流來接之得過後隱居西昌三顧山鳥獸隨之夜有鹿觸其壁度曰汝壞我壁鹿應聲去屋前有池養魚皆名呼之魚次第來取食乃去逆知死年月與親友別永明末以壽終初永明三年徵驃騎參軍顧惠胤為司徒主簿惠胤宋鎮軍將軍覬之弟子也間居養志不應徵辟臧榮緒東莞莒人也祖奉先建陵令父庸民國子助教榮緒幼孤躬自灌園以供祭祀母喪後乃著嫡寢論掃灑堂宇置筵席朔望輒拜薦甘珍未嘗先食純篤好學括東西晉為一書紀録志傳百一十卷隱居京口教授南徐州辟西曹舉秀才不就太祖為揚州徵榮緒為主簿不到司徒褚淵少時嘗命駕尋之建元中啓太祖曰榮緒朱方隱者昔臧質在宋以國戚出牧彭岱引為行佐非其所好謝疾求免蓬廬守志漏濕是安灌蔬終老與友關康之沈深典素追古著書撰晉史十袠贊論雖無逸才亦足彌綸一代臣歲時往京口早與之遇近報其取書始方送出庶得備録渠閣採異甄善上答曰公所道臧榮緒者吾甚志之其有史翰欲令入天祿甚佳榮緒惇愛五經謂人曰昔呂尚奉丹書武王致齊降位李釋教誡竝有禮敬之儀因甄明至道乃著拜五經序論常以宣尼生庚子日陳五經拜之自號被褐先生又以飲酒亂德言常為誡永明六年卒年七十四初榮緒與關康之俱隱在京口世號為二隱康之字伯愈河東人世居丹徒以墳籍為務四十年不出門不應州府辟宋太始中徵通直郎不就晚以母老家貧求為嶺南小縣性清約獨處一室稀與妻子相見不通賓客弟子以業傳受尤善左氏春秋太祖為領軍素好此學送春秋五經康之手自點定并得論禮記十餘條上甚悅寶愛之遺詔以經本入玄宮宋末卒何求字子有廬江灊人也祖尚之宋司空父鑠宜都太守求元嘉末為宋文帝挽郎解褐著作郎中軍衛軍行佐太子舍人平南參軍撫軍主簿太子洗馬丹陽吳郡丞清退無嗜欲又除征北參軍事司徒主簿太子中舍人泰始中妻亡還吳葬舊墓除中書郎不拜仍住吳居波若寺足不踰戶人莫見其面明帝崩出奔國哀除為司空從事中郎不就乃除永嘉太守求時寄住南澗寺不肯詣臺乞於寺拜受見許一夜忽乘小船逃歸吳隱虎丘山復除黃門郎不就永明四年世祖以為太中大夫又不就七年卒年五十六初求母王氏為父所害求兄弟以此無宦情求弟點少不仕宋世徵為太子洗馬不就隱居東離門卞望之墓側性率到鮮狎人物建元中褚淵王儉為宰相點謂人曰我作齊書已竟贊云淵既世族儉亦國華不賴舅氏遑恤外家儉欲候之知不可見乃止永明元年徵中書郎豫章王命駕造門點從後門逃去竟陵王子良聞之曰豫章王尚不屈非吾所議遺點𩣉叔夜酒杯徐景山酒鎗以通意點常自得遇酒便醉交遊宴樂不隔也永元中京師頻有軍寇點欲嘗結裳為袴與崔慧景共論佛義其語默之迹如此點弟胤有儒術亦懷隱遁之志所居宅名為小山隆昌中為中書令以皇后從叔見親寵明帝即位胤賣園宅將遂本志建武四年為散騎常侍巴陵王師聞吳興太守謝朏致仕慮後之於是奉表不待報而去隱會稽山上大怒令有司奏彈胤然發優詔焉永元二年徵散騎常侍太常卿劉虯字靈預南陽陽人也舊族徙居江陵虯少而抗節好學須得祿便隱宋泰始中仕至晉平王驃騎記室當陽令罷官歸家靜處斷穀餌朮及胡麻建元初豫章王為荊州教辟虯為別駕與同郡宗測新野庾易竝遣書禮請虯等各修箋答而不應辟命永明三年刺史廬陵王子卿表虯及同郡宗測宗尚之庾易劉昭五人請加蒲車束帛之命詔徵為通直郎不就竟陵王子良致書通意虯答曰虯四節臥病三時營灌暢餘陰於山澤託暮情於魚鳥寧非唐虞重恩周邵宏施虯進不研機入玄無洙泗稷館之辨退不凝心出纍非冢間樹下之節遠澤既灑仁規先著謹收樵牧之嫌敬加軾蛙之義虯精信釋氏衣粗布衣禮佛長齊注法華經自講佛義以江陵西沙洲去人遠乃徙居之建武二年詔徵國子博士不就其冬虯病正晝有白雲徘徊檐戶之內又有香氣及磬聲其日卒年五十八劉昭與虯同宗州辟祭酒從事不就隱居山中庾易字幼簡新野新野人也徙居屬江陵祖玫巴郡太守父道驥安西參軍易志性恬隱不交外物建元元年刺史豫章王辟為驃騎參軍不就臨川王映臨州獨重易上表薦之餉麥百斛易謂使人曰民樵採麋鹿之伍終其解毛之衣馳騁日月之車得保自耕之祿於大王之恩亦已深矣辭不受永明三年詔徵太子舍人不就以文義自樂安西長史袁彖欽其風通書致遺易以連理機竹翹書格報之建武二年詔復徵為司徒主簿不就卒宗測字敬微南陽人宋徵士炳孫也世居江陵測少靜退不樂人間歎曰家貧親老不擇官而仕先哲以為美談余竊有惑誠不能潛感地金冥致江鯉但當用天道分地利孰能食人厚祿憂人重事乎州舉秀才主簿不就驃騎豫章王徵為參軍測答府召云何為謬傷海鳥橫斤山木母喪身負土植松柏豫章王復遣書請之辟為參軍測答曰性同鱗羽愛止山壑眷戀松筠輕迷人路縱宕巖流有若狂者忽不知老至而今鬢已白豈容課虛責有限魚慕鳥哉永明三年詔徵太子舍人不就欲遊名山乃寫祖炳所畫尚子平圖於壁上測長子宦在京師知父此旨便求祿還為南郡丞付以家事刺史安陸王子敬長史劉寅以下皆贈送之測無所受齎老子莊子二書自隨子孫拜辭悲泣測長嘯不視遂往廬山止祖炳舊宅魚復侯子響為江州厚遣贈遺測曰少有狂疾尋山採藥遠來至此量腹而進松朮度形而衣薜蘿淡然已足豈容當此橫施子響命駕造之測避不見後子響不告而來奄至所住測不得已巾褐對之竟不交言子響不悅而退尚書令王儉餉測蒲褥頃之測送弟喪還西仍留舊宅永業寺絶賓友唯與同志庾易劉虯宗人尚之等往來講說刺史隨王子隆至鎮遣別駕宗哲致勞問測笑曰貴賤理隔何以及此竟不答建武二年徵為司徒主簿不就卒測善畫自圖阮籍遇蘇門於行障上坐臥對之又畫永業佛影臺皆為妙作頗好音律善易老續皇甫謐高士傳三卷又嘗遊衡山七嶺著衡山廬山記尚之字敬文亦好山澤與劉虯俱以驃騎記室不仕宋末刺史武陵王辟贊府豫章王辟別駕竝不就永明中與劉虯同徵為通直郎和帝中興初又徵為咨議竝不就壽終杜京産字景齊吳郡錢唐人杜子恭玄孫也祖運為劉毅衛軍參軍父道鞠州從事善彈世傳五斗米道至京産及子栖京産少恬靜閉意榮宦頗涉文義專修黃老會稽孔覬清剛有峻節一見而為款交郡召主簿州辟從事稱疾去除奉朝請不就與同郡顧歡同契始寧東山開舍授學建元中武陵王曄為會稽太祖遣儒士劉瓛入東為曄講說京産請瓛至山舍講書傾資供待子栖躬自屣履為瓛生徒下食其禮賢如此孔稚圭周顒謝𣐞竝致書以通殷勤永明十年稚圭及光祿大夫陸澄祠部尚書虞悰太子右率沈約司徒右長史張融表薦京産曰竊見吳郡杜京産潔靜為心謙虛成性通和發於天挺敏達表於自然學遍玄儒博通史子流連文藝沈吟道奧泰始之朝掛冠辭世遁捨家業隱于太平葺宇窮巖採芝幽澗耦耕自足薪歌有餘確爾不羣淡然寡欲麻衣藿食二十餘載雖古之志士何以加之謂宜釋巾幽谷結組登朝則巖谷含歡薜蘿起抃矣不報建武初徵員外散騎侍郎京産曰莊生持釣豈為白璧所回辭疾不就年六十四永元元年卒會稽孔道徵守志業不仕京産與之友善永明中會稽鍾山有人姓蔡不知名山中養鼠數十頭呼來即來遣去便去言語狂易時謂之謫仙不知所終沈驎士字雲禎吳興武康人也祖膺期晉太中大夫驎士少好學家貧織簾誦書口手不息宋元嘉末文帝令尚書僕射何尚之抄撰五經訪舉學士縣以驎士應選尚之謂子偃曰山東故有奇士也少時驎士稱疾歸鄉更不與人物通養孤兄子義著鄉曲或勸驎士仕答曰魚縣獸檻天下一契聖人玄悟所以每履吉先吾誠未能景行坐忘何為不希企日損乃作玄散賦以絶世太守孔山士辟不應宗人徐州刺史曇慶侍中懷文左率勃來候之驎士未嘗答也隱居餘不吳差山講經教授從學者數十百人各營屋宇依止其側驎士重陸機連珠每為諸生講之征北張永為吳興請驎士入郡驎士聞郡後堂有好山水乃往停數月永欲請為功曹使人致意驎士曰明府德履沖素留心山谷民是以被褐負杖忘其疲病必欲飾渾沌以蛾眉冠越客於文冕走雖不敏請附高節有蹈東海而死爾永乃止升明末太守王奐上表薦之詔徵為奉朝請不就永明六年吏部郎沈淵中書郎沈約又表薦驎士義行曰吳興沈驎士英風夙挺峻節早樹貞粹稟於天然綜博生乎篤習家世孤貧藜藿不給懷書而耕白首無倦挾琴採薪行歌不輟長兄早卒孤姪數四攝鞠稚吞苦推甘年踰七十業行無改元嘉以來聘召仍疊玉質踰潔霜操日嚴若使聞政王庭服道槐掖必能孚朝規於邊鄙播聖澤於荒垂詔又徵為太學博士建武二年徵著作郎永元二年徵太子舍人竝不就驎士負薪汲水并日而食守操終老篤學不倦遭火燒書數千卷驎士年過八十耳目猶聰明手以反故抄寫火下細書復成二三千卷滿數十篋時人以為養身靜默之所致也著周易兩繫莊子內篇訓注易經禮記春秋尚書論語孝經喪服老子要略數十卷以楊王孫皇甫謐深達生死而終禮矯僞乃自作終制年八十六卒同郡沈儼之字士恭徐州刺史曇慶子亦不仕徵太子洗馬永明元年徵中書郎三年又詔徵前南郡國常侍沈顗為著作郎建武二年徵太子舍人永元二年徵通直郎顗字處默宋領軍寅之兄孫也吳苞字天蓋濮陽鄄城人也儒學善三禮及老莊宋泰始中過江聚徒教學冠黃葛巾竹麈尾蔬食二十餘年隆昌元年詔曰處士濮陽吳苞栖志穹谷秉操貞固沈情味古白首彌厲徵太學博士不就始安王遙光右衛江祏於蔣山南為立館自劉瓛卒後學者咸歸之以壽終魯國孔嗣之字敬伯宋世與太祖俱為中書舍人竝非所好自廬陵郡去官隱居鍾山朝廷以為太中大夫建武三年卒徐伯珍字文楚東陽太末人也祖父竝郡掾史伯珍少孤貧書竹葉及地學書山水暴出漂溺宅舍村鄰皆奔走伯珍纍床而止讀書不輟叔父璠之與顏延之友善還祛蒙山立精舍講授伯珍往從學積十年究尋經史遊學者多依之太守琅邪王曇生吳郡張淹竝加禮辟伯珍應召便退如此者凡十二焉徵士沈儼造膝談論申以素交吳郡顧歡擲出尚書滯義伯珍訓答甚有條理儒者宗之好釋氏老莊兼明道術歲常旱伯珍筮之如期雨澍舉動有禮過曲木之下趨而避之早喪妻晚不復重娶自比曾參宅南九里有高山班固謂之九巖山後漢龍丘萇隱處也山多龍鬚柏望之五采世呼為婦人巖二年伯珍移居之門前生梓樹一年便合抱館東石壁夜忽有赤光洞照俄爾而滅白雀一雙栖其戶牖論者以為隱德之感焉永明二年刺史豫章王辟議曹從事不就家甚貧窶兄弟四人皆白首相對時人呼為四皓建武四年卒年八十四受業生凡千餘人同郡樓幼瑜亦儒學著禮捃遺三十卷官至給事中又同郡樓惠明有道術居金華山禽獸毒螫者皆避之宋明帝聞之勑出住華林園除奉朝請固乞不受求東歸永明三年忽乘輕舟向臨安縣衆不知所以尋而唐𧜛之賊破郡文惠太子呼出住蔣山又求歸見許世祖敕為立館史臣曰顧歡論夷夏優老而劣釋佛法者理寂乎萬古迹兆乎中世淵源浩博無始無邊宇宙之所不知數量之所不盡盛乎哉真大士之立言也探機扣寂有感必應以大苞小無細不容若乃儒家之教仁義禮樂仁愛義宜禮從樂和而已今則慈悲為本常樂為宗施舍惟機低舉成敬儒家之教憲章祖述引古證今於學易悟今樹以前因報以後果業行交酬連璅相襲陰陽之教占氣步景授民以時知其利害今則耳眼洞達心智他通身為奎井豈俟甘石法家之教出自刑理禁姦止邪明用賞罰今則十惡所墜五及無間刀樹劒山焦湯猛火造受自貽罔或差二墨家之教遵上儉薄磨踵滅頂且猶非吝今則膚同斷瓠目如井星授子捐妻在鷹庇鴿從橫之教所貴權謀天口連環歸乎適變今則一音萬解無待戶說四辨三會咸得吾師雜家之教兼有儒墨今則五時所宣于何不盡農家之教播植耕耘善相五事以藝九穀今則鬱單竹敕稻已異閻浮生天果報自然飲良道家之教執一虛無得性亡情凝神勿擾今則波若無照萬法皆空豈有道之可名寧餘一之可得道俗對校真假將讎釋理奧藏無往而不有也能善用之即真是俗九流之設用藉世教刑名道墨乖心異旨儒者不學無傷為儒佛理玄曠實智妙有一物不知不成圓聖若夫神道應現之力感會變化之奇不可思議難用言象而諸張米道符水先驗相傳師法祖自伯陽世情去就有此二學僧尼道士矛楯相非非唯重道兼亦殉利詳尋兩教理歸一極但迹有左右故教成先後廣略為言自生優劣道本虛無非由學至絶聖棄智已成有為有為之無終非道本若使本末同無曾何等級佛則不然具縛為種轉暗成明梯愚入聖途雖遠而可踐業雖曠而有期勸慕之道物我無隔而局情淺智鮮能勝受世途揆度因果二門雞鳴為善未必餘慶膾肉東陵曾無厄禍身才高妙鬱滯而靡達器思庸鹵富厚以終生忠反見遺詭乃獲用觀此而論近無罪福而業有不定著自經文三報開宗斯疑頓曉史臣服膺釋氏深信冥緣謂斯道之莫貴也贊曰含貞抱朴履道敦學惟茲潛隱棄鱗養角
