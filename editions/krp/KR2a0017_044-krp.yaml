body:
  text: 南齊書卷四十四梁蕭子顯撰列傳第二十五徐孝嗣沈文季徐孝嗣字始昌東海郯人也祖湛之宋司空父聿之著作郎並為太子劭所殺孝嗣在孕得免㓜而挺立風儀端簡八嵗襲爵枝江縣公見宋孝武升階流涕迄于就席帝甚愛之尚康樂公主泰始二年西討解嚴車駕還宫孝嗣登殿不著韎為治書御史蔡凖所奏罸金二兩拜駙馬都尉除著作郎母喪去官為司空太尉二府參軍安成王文學孝嗣姑適東莞劉舍舍兄蔵為尚書左丞孝嗣往詣之蔵退語舍曰徐郎是令僕人三十餘可知矣汝宜善自結昇眀中遷太祖驃騎從事中郎帶南彭城太守隨府轉為太尉諮議參軍太守如故齊臺建為世子庶子建元初國除出為晉陵太守還為太子中庶子領長水校尉未拜為寧朔將軍聞喜公子良征虜長史遷尚書吏部郎太子右衛率轉長史善趨歩閑容止與太宰禇淵相埓世祖深加待遇尚書令王儉謂人曰徐孝嗣將来必為宰相轉充御史中丞世祖問儉曰誰可繼卿者儉曰臣東都之日其在徐孝嗣乎出為吳興太守儉贈孝嗣四言詩曰方軌叔茂追清彦輔柔亦不吐剛亦不茹時人以比蔡子尼之行狀也在郡有能名㑹王儉亡上徴孝嗣為五兵尚書其年上敕儀曹令史陳淑王景之朱𤣥真陳義民撰江左以来儀典令諮受孝嗣眀年遷太子詹事從世祖幸方山上曰朕經始此山之南復為離宫之所故應有邁靈丘靈丘山湖新林苑也孝嗣答曰繞黄山款牛首乃盛漢之事今江南未曠民亦勞止願陛下少更留神上竟無所脩立竟陵王子良甚善之子良好佛法使孝嗣及廬江何𦙍掌知齊講及衆僧轉吏部尚書尋加右軍將軍轉領太子左衛率臺閣事多以委之世祖崩遺詔轉右僕射隆昌元年遷散騎常侍前將軍丹陽尹髙宗謀廢鬱林以告孝嗣孝嗣奉㫖無所釐贊髙宗入殿孝嗣戎服隨後鬱林既死髙宗湏太后令孝嗣於袖中出而奏之髙宗大悅以廢立功封枝江縣侯食邑千户給鼓吹一部甲仗五十人入殿轉左僕射常侍如故眀帝即位加侍中中軍大將軍定䇿勲進爵為公増封二千户給班劍二十人加兵百人舊拜三公乃臨軒至是帝特詔與陳顯達王晏並臨軒拜授北虜動詔孝嗣假節頓新亭時王晏為令民情物望不及孝嗣也晏誅轉尚書令領本州中正餘悉如故孝嗣愛好文學賞託清勝器量𢎞雅不以權勢自居故見容建武之世恭己自保朝野以此稱之初孝嗣在率府晝卧齋北壁下夢兩童子遽云移公床孝嗣驚起聞壁有聲行數歩而壁崩壓床建武四年即本號開府儀同三司孝嗣聞有詔歛容謂左右曰吾徳慙古人位登袞職將何以堪之眀君可以理奪必當死請若不獲命正當角巾丘園待罪家巷耳固讓不受是時連年虜動軍國虚乏孝嗣表立屯田曰有國急務兵食是同一夫輟耕於事彌切故井陌壃里長轂盛於周朝屯田廣置勝戈富於漢室降此以還詳畧可見但求之自古為論則賖即以當今宜有要術竊尋緣淮諸鎮皆取給亰師費引既殷漕運艱澁聚糧待敵毎若不周利害之基莫此為急臣比訪之故老及經彼宰守淮南舊田觸處極目陂遏不脩咸成茂草平原陸地彌望尤多今邉備既嚴戍卒増衆逺資餽運近廢良疇士多飢色可為嗟歎愚欲使刺史二千石躬自履行隨地墾闢精尋灌溉之源善商肥确之異州郡縣戍主帥以下悉分番附農今水田雖晚方事菽麥菽麥二種益是北土所宜彼人便之不減粳稻開創之利宜在及時所啓允合請即使至徐兗司豫爰及荆雍各當境規度勿有所遺别立主曹専司其事田器耕牛臺詳所給嵗終言殿最眀其刑賞此功克舉庶有𢎞益若緣邉足食則江南自豐權其所饒畧不可計事御見納時帝己寢疾兵事未已竟不施行帝疾甚孝嗣入居禁中臨崩受遺託重申開府之命加中書監永元初輔政自尚書下省出住宫城南宅不得還家帝失徳稍彰孝嗣不敢諫諍及江祏見誅内懐憂恐然未嘗表色始安王遥光反衆情惶惑見孝嗣入宫内乃安然羣小用事亦不能制也進位司空固讓求解丹陽尹不許孝嗣文人不顯同異名位雖大故得未及禍虎賁中郎將許凖有膽力領軍隸孝嗣陳說事機勸行廢立孝嗣遲疑久之謂必無用干戈理湏少主出遊閉城門召百僚集議廢之雖有此懐終不能决羣小亦稍憎孝嗣勸帝召百僚集議因誅之冬召孝嗣入華林省遣茹法珍賜藥孝嗣容色不異少能飲酒藥至斗餘方卒乃下詔曰周徳方熙三監迷叛漢厯載昌宰臣構戾皆身膏斧鉞族同煙燼殷鑒上代垂戒後昆徐孝嗣憑藉世資早䝉殊遇階緣際㑹遂登台鉉匡翼之誠無聞諂黷之迹屢著沈文季門世此下缺沈文季字伯達吳興武康人父慶之宋司空文季少以寛雅正直見知孝建二年起家主簿徵祕書郎以慶之勲重大眀五年封文季為山陽縣五等伯轉太子舍人新安王北中郎主簿西陽王撫軍功曹江夏王太尉東曹掾遷中書郎慶之為景和所殺兵仗圍宅收捕諸子文季長兄文叔謂文季曰我能死爾能報遂自縊文季揮刀馳馬去收者不敢追遂得免眀帝立起文季為寧朔將軍遷太子右衛率建安王司徒司馬赭圻平為宣威將軍廬江王太尉長史出為寧朔將軍征北司馬廣陵太守轉黃門郎領長水校尉眀帝宴㑹朝臣以南臺御史賀咸為柱下史紏不醉者文季不肯飲酒被驅下殿晉平王休祐為南徐州帝問禇淵湏幹事人為上佐淵舉文季轉寧朔將軍驃騎長史南東海太守休祐被殺雖用薨禮僚佐多不敢至文季獨往省墓展哀出為臨海太守元徽初遷散騎常侍領後軍將軍轉祕書監出為吳興太守文季飲酒至五斗妻王氏王錫女飲酒亦至三斗文季與對飲竟日而視事不廢昇眀元年沈攸之反太祖加文季為冠軍將軍督吳興錢塘軍事攸之先為景和銜使殺慶之至是文季收殺攸之弟新安太守登之誅其宗族加持節進號征虜將軍改封畧陽縣侯邑千户眀年遷丹陽尹將軍如故齊國初建為侍中領祕書監建元元年轉太子右衛率侍中如故改封西豐縣侯食邑千二百户文季風采稜岸善於進止司徒禇淵當世貴望頗以門户裁之文季不為之屈世祖在東宫於𤣥圃宴㑹朝臣文季數舉酒勸淵淵甚不平啟世祖曰沈文季謂淵經為其郡數加淵酒文季曰惟桑與梓必恭敬止豈如眀府亡國失土不識枌榆遂言及虜動淵曰陳顯達沈文季當今將畧足委以邉事文季諱稱將門因是發怒啟世祖曰禇淵自謂是忠臣未知身死之日何面目見宋眀帝世祖笑曰沈率醉也中丞劉休舉其事見原後豫章王北宅後堂集㑹文季與淵並善琵琶酒闌淵取樂器為眀君曲文季便下席大唱曰沈文季不能作伎兒豫章王嶷又解之曰此故當不損仲容之徳淵顔色無異曲終而止文季尋除征虜將軍侍中如故遷散騎常侍左衛將軍征虜如故世祖即位轉太子詹事常侍如故永眀元年出為左將軍吳郡太守三年進號平東將軍四年遷㑹稽太守將軍如故是時連年檢籍百姓怨望富陽人唐㝢之僑居桐廬父祖相傳圖墓為業㝢之自云其家墓有王氣山中得金印轉相誑惑三年冬㝢之聚黨四百人於新城水斷商旅黨與分布近縣新城令陸赤奮桐廬令王天愍棄縣走㝢之向富陽抄畧人民縣令何洵告魚浦子邏主從係公發魚浦村男丁防縣永興遣西陵戍主夏侯曇羨率將吏及戍左右埭界人起兵赴救㝢之遂陷富陽㑹稽郡丞張思祖遣臺使孔矜王萬嵗張繇等配以器仗將吏白丁防衛永興等十屬文季亦遣器仗將吏救援錢塘㝢之至錢塘錢塘令劉彪戍主聶僧貴遣隊主張玕於小山拒之力不敵戰敗㝢之進抑浦登岸焚郭邑彪棄縣走文季又發吳嘉興海鹽鹽官民丁救之賊分兵出諸縣鹽官令蕭元蔚諸暨令陵琚之並逃走餘杭令樂琰戰敗乃奔是春㝢之於錢塘僣號置太子以新城戍為天子宫縣廨為太子宫弟紹之為揚州刺史錢塘富人柯隆為尚書僕射中書舍人領太官令獻鋌數千口為㝢之作仗加領尚方令分遣其黨髙道度徐寇東陽東陽太守蕭崇之長山令劉國重拒戰見害崇之字茂敬太祖族弟至是臨難貞正果烈追贈冠軍將軍太守如故賊遂據郡又遣偽㑹稽太守孫泓取山隂時㑹稽太守王敬則朝正故㝢之謂乗虚可襲泓至浦陽江郡丞張思祖遣浃口戍主湯休武拒戰大破之上在樂遊苑聞㝢之賊謂豫章王嶷曰宋眀初九州同反鼠輩但作看蕭公雷汝頭遣禁兵數千人馬數百匹東討賊衆烏合畏焉官軍至錢塘一戰便散禽斬㝢之進兵平諸郡縣臺軍乗勝百姓頗被抄奪軍還上聞之收軍主前軍將軍陳天福棄市左軍將軍中宿縣子劉眀徹免官削爵付東冶天福上寵將也既伏誅内外莫不震肅天福善馬矟至今諸將法之御史中丞徐孝嗣奏曰風聞山東羣盜剽掠列城雖匪日而殄要慙于王畧郡縣闕攻守之宜倉府多侵耗之弊舉善懲惡應有攸歸吳郡所領鹽官令蕭元蔚桐廬令王天愍新城令陸赤奮等縣為首劫破掠並不經格戰委職散走元蔚天愍還臺赤奮不知所在又錢塘令劉彪富陽令何洵乃率領吏民相戰不敵未委歸臺餘建徳夀昌在劫斷上流不知被劫掠不吳興所領餘杭縣被劫破令樂琰乃率吏民徑戰不敵委走出都㑹稽所領諸暨縣為劫所破令陵琚之不經格戰委城奔走不知所在案元蔚等妄藉天私作司近服昧斯隐慝職啓䖍劉㑹稽郡丞張思祖謬因承乏總任是尸涓誠芻効終焉無紀平東將軍吳郡太守文季征虜将軍呉興太守西昌侯鸞任屬闗河威懐是寄輒下禁止彪琰洵思祖文季視事如故鸞等納贖論詔元蔚等免思祖鸞文季原文季固讓㑹稽之授轉都官尚書加散騎常侍出為持節督郢州司州之義陽諸軍事左將軍郢州刺史還為散騎常侍領軍將軍世祖謂文季曰南士無僕射多歴年所文季對曰南風不競非復一日文季雖不學發言必有辭采當世稱其應對尤善簺及彈棊簺用五子以疾遷金紫光禄大夫加親信二十人常侍如故轉侍中領太子詹事遷中䕶軍侍中如故以家為府隆昌元年復為領軍將軍侍中如故豫廢鬱林髙宗欲以文季為江州遣左右單景儁宣㫖文季口自陳讓稱年老不願外出因問右執法有人未景儁還具言之延興元年遷尚書右僕射眀帝即位加領太子詹事増邑五百户尚書令王晏常戲文季為呉興僕射文季答曰琅邪執法似不出卿門尋加散騎常侍僕射如故建武二年虜寇夀春豫州刺史豐城公遥昌嬰城固守數遣輕兵相抄擊眀帝以為憂詔文季領兵鎮夀春文季入城止游兵一聽出洞開城門嚴加備守虜軍尋退百姓無所傷損増封為千九百户尋加䕶軍將軍僕射常侍如故王敬則反詔文季領兵屯湖頭備亰路永元元年轉侍中左僕射將軍如故始安王遥光反其夜遣三百人於宅掩取文季欲以為都督而文季已還臺眀日與尚書令徐孝嗣守衛宫城戎服共坐南掖門上時東昏已行殺戮孝嗣深懐憂慮欲與文季論世事文季輒引以他辭終不得及事寧加鎮軍將軍置府侍中僕射如故文季見世方昏亂託以老疾不豫朝機兄子昭畧謂文季曰阿父年六十為員外僕射欲求自免豈可得乎文季笑而不答同孝嗣被害其日先被召見文季知敗舉動如常登車顧曰此行恐往而不反也於華林省死時年五十八朝野寃之中興元年贈侍中司空諡忠憲兄子昭畧有剛氣昇眀末為相國西曹太祖賞之及即位謂王儉曰南士中有沈昭畧何職處之儉曰臣已有擬奏轉前軍將軍上不欲違可其奏尋遷為中書郎永眀初厯太尉大司馬從事中郎驃騎司馬黄門郎南郡王文學華選以昭畧為友尋兼左丞元年出為臨海太守御史中丞累遷侍中冠軍將軍撫軍長史永元元年始安王遥光起兵東府執昭畧於城内昭畧潛自南出濟淮還臺至是與文季俱被召入華林省茹法珍等進藥酒昭畧怒罵徐孝嗣曰廢昏立眀古今令典宰相無才致有今日以甌擲面破曰作破面鬼死時年四十餘弟昭光聞收至家人勸逃去昭光不忍捨母遂見獲殺之中興元年贈昭畧太常昭光廷尉史臣曰為邦之訓食惟民天足食足兵民信之矣屯田之畧實重戰守若夫充國耕殖用殄羌戎韓浩棗祗亦建華夏置典農之官興大佃之議金城布險峻壘綿壃飛芻輓粒事難支繼一夫不耕或鍾饑餒縁邊戌卒坐甲千羣故宜盡收地利因兵務食緩則躬耕急則從戰嵗有餘糧則紅食可待前世達治言之已詳江左以来不暇逺䇿王旅外出未嘗宿飽四郊嬰守懼等松芻縣兵所救經嵗引日淩風泙水轉漕艱長傾窖底之儲盡倉敖之粟流馬木牛尚深前弊田積之要唯在江淮郡國同興逺不周急故吳氏列戍南濱屯農水右魏世淮北大佃而石横開漕皆輔車相資易以待敵孝嗣當蹙境之晨薦希行之計王無外畧民困首領觀機而動斯議殆為空陳惜矣贊曰文忠作相器範先標有容有業可以立朝豐城歴仕音儀孔昭為舟等溺在運同消南齊書卷四十四南齊書卷四十四考證沈文季傳執昭畧於城内臣承蒼按遥光以建武二年進號撫軍將軍昭畧是時為撫軍長史不容有見執之事若被執則勢湏防禁亦不能潛出還臺矣南齊書卷四十四考證
