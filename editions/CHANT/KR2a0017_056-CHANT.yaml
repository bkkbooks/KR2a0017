body:
  text: 卷五十六列傳第三十七紀僧真劉係宗茹法亮呂文顯呂文度倖臣有天象必有人事焉倖臣一星列於帝座經禮立教亦著近臣之服親倖之義其來已久爰自衰周侯伯專命桓文霸主至於戰國寵用近習不乏於時矣漢文幸鄧通雖錢遍天下位止郎中孝武韓嫣霍去病遂至侍中大司馬迄於魏晉世任權重才位稍爽而信倖唯均中書之職舊掌機務漢元以令僕用事魏明以監令專權及在中朝猶為重寄陳准歸任上司荀勗恨於失職晉令舍人位居九品江左置通事郎管司詔誥其後郎還為侍郎而舍人亦稱通事元帝用琅邪劉超以謹慎居職宋文世秋當周糾並出寒門孝武以來士庶雜選如東海鮑照以才學知名又用魯郡巢尚之江夏王義恭以為非選帝遣尚書二十餘牒宣敕論辯義恭乃歎曰人主誠知人及明帝世胡母顥阮佃夫之徒專為佞倖矣齊初亦用久勞及以親信關讞表啟發署詔敕頗涉辭翰者亦為詔文侍郎之局復見侵矣建武世詔命殆不關中書專出舍人省內舍人四人所直四省其下有主書令史舊用武官宋改文吏人數無員莫非左右要密天下文簿板籍入副其省萬機嚴秘有如尚書外司領武官有制局監領器仗兵役亦用寒人被恩幸者今立倖臣篇以繼前史之末云紀僧真紀僧真丹陽建康人也僧真少隨逐征西將軍蕭思話及子惠開皆被賞遇惠開性苛僧真以微過見罰既而委任如舊及罷益州還都不得志僧真事之愈謹惠開臨終歎曰紀僧真方當富貴我不見也乃以僧真託劉秉周顒初惠開在益州土反被圍危急有道人謂之曰城圍尋解檀越貴門後方大興無憂外賊也惠開密謂僧真曰我子弟見在者並無異才政是道成耳僧真憶其言乃請事太祖隨從在淮陰以閑書題令答遠近書疏自寒官歷至太祖冠軍府參軍主簿僧真夢蒿艾生滿江驚而白之太祖曰詩人採蕭蕭即艾也蕭生斷流卿勿廣言其見親如此元徽初從太祖頓新亭拒桂陽賊蕭惠朗突入東門僧真與左右共拒戰賊退太祖命僧真領親兵遊羅城中事寧除南臺御史太祖領軍功曹上將廢立謀之袁粲褚淵僧真啟上曰今朝廷猖狂人不自保天下之望不在袁褚明公豈得默己坐受夷滅存亡之機仰希熟慮太祖納之太祖欲度廣陵起兵僧真又啟曰主上雖復狂釁虐加萬民而累世皇基猶固盤石今百口北度何必得俱縱得廣陵城天子居深宮施號令目明公為逆何以避此如其不勝則應北走胡中竊謂此非萬全策也上曰卿顧家豈能逐我行耶僧真頓首稱無貳昇明元年除員外郎帶東武城令尋除給事中邵陵王參軍太祖坐東府高樓望石頭城僧真在側上曰諸將勸我誅袁劉我意不欲便爾及沈攸之事起從太祖入朝堂石頭反夜太祖遣眾軍掩討宮城中望石頭火光及叫聲甚盛人懷不測僧真謂眾曰叫聲不絕是必官軍所攻火光起者賊不容自燒其城此必官軍勝也尋而啟石頭平上出頓新亭使僧真領千人在帳內初上在領軍府令僧真學上手迹下名至是報答書疏皆付僧真上觀之笑曰我亦不復能別也初上在淮陰治城得古錫鐵大數尺下有篆文莫能識者僧真曰何須辯此文字此自久遠之物九錫之徵也太祖曰卿勿妄言及上將拜齊公已剋日有楊祖之謀於臨軒作難僧真更請上選吉辰尋而祖之事覺上曰無卿言亦當致小狼狽此亦何異呼沱之冰轉齊國中書舍人建元初帶東燕令封新陽縣男三百戶轉羽林監加建威將軍遷尚書主客郎太尉中兵參軍令如故復以本官兼中書舍人太祖疾甚令僧真典遺詔永明元年丁父喪起為建威將軍尋除南泰山太守又為舍人本官如故領諸王第事僧真容貌言吐雅有士風世祖嘗目送之笑曰人何必計門戶紀僧真常貴人所不及諸權要中最被盼遇除越騎校尉餘官如故出為建武將軍建康令還除左右郎將泰山太守加先驅使尋除前軍將軍遭母喪開冢得五色兩頭蛇世祖崩僧真號泣思慕明帝以僧真歷朝驅使建武元年除游擊將軍兼司農待之如舊欲令僧真治郡僧真啟進其弟僧猛為鎮蠻護軍晉熙太守永泰元年除司農卿明帝崩掌山陵事出為廬陵內史年五十五卒楊法持宋世道人楊法持與太祖有舊元徽末宣傳密謀昇明中以為僧正建元初罷道為寧朔將軍封州陵縣男三百戶二年虜圍胊山遣法持為軍主領支軍救援永明四年坐役使將客奪其鮭稟削封卒劉係宗劉係宗丹陽人也少便書畫為宋竟陵王誕子景粹侍書誕舉兵廣陵城內皆死敕沈慶之赦係宗以為東宮侍書泰始中為主書以寒官累遷至勳品元徽初為奉朝請兼中書通事舍人員外郎封始興南亭侯食邑三百七十戶帶秣陵令太祖廢蒼梧明旦呼正直舍人虞整醉不能起係宗歡喜奉命太祖曰今天地重開是卿盡力之日使寫諸處分敕令及四方書疏使主書十人書吏二十人配之事皆稱旨除羽林監轉步兵校尉仍除龍驤將軍出為海鹽令太祖即位除龍驤將軍建康令永明元年除寧朔將軍令如故尋轉右軍將軍淮陵太守兼中書通事舍人母喪自解起為寧朔將軍復本職四年白賊唐㝢之起宿衛兵東討遣係宗隨軍慰勞遍至遭賊郡縣百姓被驅逼者悉無所問還復民伍係宗還上曰此叚有征無戰以時平蕩百姓安怗甚快也賜係宗錢帛上欲修治白下城難於動役係宗啟謫役東民丁隨㝢之為逆者上從之後車駕講武上履行白下城曰劉係宗為國家得此一城永明中虜使書常令係宗題答秘書書局皆隸之再為少府遷游擊將軍魯郡太守鬱林即位除驍騎將軍仍除寧朔將軍宣城太守係宗久在朝省閑於職事明帝曰學士不堪治國唯大讀書耳一劉係宗足持如此輩五百人其重吏事如此建武二年卒官年七十七茹法亮茹法亮吳興武康人也宋大明中出身為小史歷齋幹扶侍孝武末年作酒法鞭罰過度校獵江右選白衣左右百八十人皆面首富室從至南州得鞭者過半法亮憂懼因緣啟出家得為道人明帝初罷道結事阮佃夫用為兗州刺史孟次陽典籤累至太祖冠軍府行參軍元徽初除殿中將軍為晉熙王郢州典籤除長兼殿中御史世祖鎮盆城須舊驅使人法亮求留為上江州典籤除南臺御史帶松滋令法亮便辟解事善於承奉稍見委信從還石頭建元初度東宮主書除奉朝請補東宮通事舍人世祖即位仍為中書通事舍人除員外郎帶南濟陰太守永明元年除龍驤將軍明年詔曰茹法亮近在盆城頻使銜命內宣朝旨外慰三軍義勇齊奮人百其氣險阻艱難心力俱盡宜沾茅土以甄忠績封望蔡縣男食邑三百戶轉給事中羽林監七年除臨淮太守轉竟陵王司徒中兵參軍巴東王子響於荊州殺僚佐上遣軍西上使法亮宣旨慰勞安撫子響法亮至江津子響呼法亮法亮疑畏不肯往又求見傳詔法亮又不遣故子響怒遣兵破尹略軍事平法亮至江陵刑賞處分皆稱敕斷決軍還上悔誅子響法亮被責少時親任如舊鬱林即位除步兵校尉延興元年為前軍將軍延昌殿為世祖陰室藏諸御服二少帝並居西殿高宗即位住東齋開陰室出世祖白紗帽防身刀法亮歔欷流涕除游擊將軍高武舊人鮮有存者法亮以主署文事故不見疑位任如故永泰元年王敬則事平法亮復受敕宣慰出法亮為大司農中書勢利之職法亮不樂去固辭不受既而代人已至法亮垂涕而出年六十四卒官呂文顯呂文顯臨海人也初為宋孝武齋幹直長昇明初為太祖錄尚書省事累位至殿中侍御史羽林監帶蘭陵丞令龍驤將軍秣陵令封劉陽縣男永明元年除寧朔將軍中書通事舍人本官如故文顯治事以刻覈被知三年帶南清河太守與茹法亮等迭出入為舍人並見親倖四方餉遺歲各數百萬並造大宅聚山開池五年為建康令轉長水校尉歷帶南泰山南譙太守尋為司徒中兵參軍淮南太守直舍人省累遷左中郎將南東莞太守右軍將軍高宗輔政以文顯守少府見任使歷建武永元之世尚書右丞少府卿卒呂文度呂文度會稽人宋世為細作金銀庫吏竹局匠元徽中為射雉典事隨監莫修宗上郢世祖鎮盆城拒沈攸之文度仍留伏事知軍隊雜役以此見親從還都為石頭城監仍度東宮世祖即位為制局監位至員外郎帶南濮陽太守殿內軍隊及發遣外鎮人悉關之甚有要勢故世傳越州嘗缺上覓一直事人往越州文度啟其所知費延宗合旨上即以為刺史永明中敕親近不得輒有申薦人士免官寒人鞭一百上性尊嚴呂文顯嘗在殿側咳聲高上使茹法亮訓詰之以為不敬故左右畏威承意非所隸莫敢有言也時茹法亮掌雜驅使簿及宣通密敕呂文顯掌穀帛事其餘舍人無別任虎賁中郎將潘敞掌監功作上使造禪靈寺新成車駕臨視甚悅敞喜要呂文顯私登寺南門樓上知之繫敞上方而出文顯為南譙郡久之乃復濟陽江瞿曇吳興沈徽孚等以士流舍人通事而已無權利徽孚粗有筆札建武中文詔多其辭也官至黃門郎史臣曰中世已來宰御天下萬機碎密不關外司尚書八座五曹各有恒任係以九卿六府事存副職咸皆冠冕搢紳任疏人貴伏奏之務既寢趨走之勞亦息關宣所寄屬當有歸通驛內外切自音旨若夫環纓斂笏俯仰晨昏贍幄座而竦躬陪蘭檻而高眄探求恩色習睹威顏遷蘭變鮑久而彌信因城社之固執開壅之機長主君世振裘持領賞罰事殷能不踰漏宮省咳唾義必先知故能窺盈縮於望景獲驪珠於龍睡坐歸聲勢臥震都鄙賄賂日積苞苴歲通富擬公侯威行州郡制局小司專典兵力雲陛天居亘設蘭錡羽林精卒重屯廣衛至於元戎啟轍武候還麾遮迾清道神行案轡督察來往馳鶩輦轂驅役分部親承几案領護所攝示總成規若徵兵動眾大興民役行留之儀請託在手斷割牢稟賣弄文符捕叛追亡長戍遠謫軍有千齡之壽室無百年之鬼害政傷民於此為蠹況乎主幼時昏其為讒慝亦何可勝紀也贊曰恩澤而侯親倖為舊便煩左右既貴且富
