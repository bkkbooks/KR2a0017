  - {type: variant, offset: 5704, length: 0, content: '', WYG: 南齊書卷二十七南齊書卷二十七考證劉懐珍傳亾命司馬順則聚黨東揚州臣承蒼按宋書州郡志孝建元年分揚州之㑹稽東陽新安永嘉臨海五郡為東揚州此司馬順則作亂在元嘉二十八年不應即有東揚州之稱未詳所謂夢見黄衣老公曰可取南山竹笋食之疾立可愈臣承蒼按南史夢見黄衣老公與藥靈哲驚覺于枕間得之藥似竹根于齋前種葉似􅝀茨與此傳所載小異李安民傳安民按南史民作人城局參軍王逈諸本同王逈南史作王回吳興有項羽神䕶郡聼事太守到郡必須祀以軛下牛安民奉佛法不與神牛著屐上聼事及安民卒世以神為祟臣祖庚按宋書孔季恭傳為吳興太守云項羽神居郡聼事二千石至常避之季恭居郡聼事竟無害也梁書蕭琛傳遷吳興太守郡有項王廟土民名為憤王甚有靈驗遂祀於郡聼事琛至徙神還廟南史蕭猷傳為吳興太守與楚王廟神交飲祈禱必從後為益州刺史齊茍兒反乃遥禱請救有田老逢數百騎如風言吳興楚王來救是日猷大破茍兒又南史蕭惠明傳為吳興太守惠明謂綱紀曰孔季恭嘗為此郡未聞有災遂盛設筵榻接賔數日見一人長丈餘張弓挟矢向惠明既而不見因發背旬日而卒又蕭惠荃傳惠基弟惠休永元元年徙吳興太守徴為右僕射吳興項羽神舊酷烈世人云惠休事神謹故得美還據此一項羽神從之則吉逆之則凶一若人之死生禍福皆神操其柄作史者每鋪張而樂道之難免近誣之失矣南齊書卷二十七考證}
