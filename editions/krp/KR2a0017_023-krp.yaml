body:
  text: 南齊書卷二十三梁蕭子顯撰列傳第四褚淵淵弟澄徐嗣王儉禇淵字彦囘河南陽翟人也祖秀之宋太常父湛之驃騎將軍尚宋武帝女始安哀公主淵少有世譽復尚文帝女南郡獻公主姑姪二世相繼拜駙馬都尉除著作佐郎太子舍人太宰參軍太子洗馬祕書丞湛之卒淵推財與弟唯取書數千卷襲爵都鄉侯歴中書郎司徒右長史吏部郎宋眀帝即位加領太子屯騎校尉不受遷侍中知東宫事轉吏部尚書尋領太子右衛率固辭司徒建安王休仁南討義嘉賊屯鵲尾遣淵詣軍選將帥以下勲階得自専決事平加驍騎將軍薛安都以徐州叛虜頻寇淮泗遣淵慰勞北討衆軍淵還啓帝言盱眙以西戎備單寡宜更配衣汝隂荆亭並已圍逼安豐又已不守夀春衆力止足自保若使遊騎擾夀陽則江外危廹歴陽𤓰歩鍾離義陽皆湏實力重戍選有幹用者處之帝在藩與淵以風素相善及即位深相委寄事皆見從改封雩都縣伯邑五百户轉侍中領右衛將軍尋遷散騎常侍丹陽尹出為呉興太守常侍如故增秩千石固辭增秩眀帝疾甚馳使召淵付以後事帝謀誅建安王休仁淵固諫不納復為吏部尚書領常侍衛尉如故不受乃授右僕射衛尉如故淵以母年髙羸疾晨昏湏養固辭衛尉不許眀帝崩遺詔以為中書令䕶軍將軍加散騎常侍與尚書令袁粲受顧命輔㓜主淵同心共理庶事當奢侈之後務𢎞儉約百姓賴之接引賓客未嘗驕倦王道隆阮佃夫用事姧賂公行淵不能禁也遭庶母郭氏喪有至性數日中毁頓不可復識期年不盥櫛惟哭泣處乃見其本質焉詔斷哭禁弔客𦵏畢起為中軍將軍本官如故元徽二年桂陽王休範反淵與衛將軍袁粲入衛宫省鎮集衆心淵初為丹陽與從弟炤同載出道逢太祖淵舉手指太祖車謂炤曰此非常人也出為呉興太祖餉物别淵又謂人曰此人材貎非常將来不可測也及顧命之際引太祖豫焉太祖既平桂陽遷中領軍領南兗州増户邑太祖固讓與淵及衛軍袁粲書曰下官常人志不及逺隨運推斥妄踐非涯才輕任重夙宵冰惕近值國危含氣同奮況在下官寧吝身命履冒鋒炭報効恒理而襃嘉之典偏見甄沐貴登端戎秩加爵土瞻言霄衢魂神震墜下官奉上以誠率性無矯前後忝荷未嘗固讓至若今授特深恇廹寔以衘恩先㫖義兼陵闕識蔽防萌宗戚構禍引誚歸咎既已靦顔乃復乗災求幸藉亂取貴斯實國家之耻非臣子所忍也且榮不可濫寵不可昧乞蠲中候請停増邑庶保止足輸効淮湄如使伐匈奴凱歸反斾以此受爵不復固辭矣淵粲答曰来告頴亮敬挹無已謙貶居心深承非飾此誠此㫖久著言外况復造席舒衿迂翰緒意推情顧已信足書紳但今之所宜商㩁必以輕重相推世惟多難事屬雕弊四維恇擾邊氓未安國家費廣府蔵湏備北狄侵邉憂虞交切㝢内含識尚為天下危心相與共荷任寄若此當可稍脩㢘退不求之懐抱實謂不可了其不可理無固執且勍寇窮㐫勢過原燎釁逆倉卒終古未聞常時懼惑當慮先定結壘新亭枕戈待敵斷決之䇿寔有由然鋒鏑初交元惡送首總律制竒判於此舉裂邑萬户登爵槐鼎亦何足少酬勲勞粗塞物聽今以近侍禁旅進昇中候乗平隨牒取此非叨濟河昔所履牧鎮軍秩不逾本詳校階序愧在未優就加沖損特虧朝制奉職數載同舟無㡬劉領軍峻節霜眀臨危不顧音迹未晞奄成今古迷途失偶慟不及悲戎謨内寄恒務倍急秉操辭榮將復誰委誠惟軍柄所期自増茂圭社誓貫朝廷匹夫里語尚欲信厚君令必行逡巡何路凡位居物首功在衆先進退之宜當與衆共茍殉獨善何以處物受不自私彌見至公表裏詳究無而後可想體殊常深思然納太祖乃受命其年淵加尚書令侍中給班劒二十人固讓令三年進爵為侯増邑千户服闋改授中書監侍中䕶軍如故給鼓吹一部眀年淵後嫡母呉郡公主薨毁瘠如初葬畢詔攝職固辭又以期祭禮及表解職並不許蒼梧酷暴稍甚太祖與淵及袁粲言世事粲曰主上㓜年微過易改伊霍之事非季代所行縱使功成亦終無全地淵黙然歸心太祖及廢蒼梧羣公集議袁粲劉秉既不受任淵曰非蕭公無以了此手取書授太祖太祖曰相與不肯我安得辭事乃定順帝立改號衛將軍開府儀同三司侍中如故甲仗五十人入殿沈攸之事起袁粲懐貳太祖召淵謀議淵曰西夏舋難事必無成公當先備其内耳太祖宻為其備事平進中書監司空本官如故齊臺建淵白太祖引何曽自魏司徒為晉丞相求為齊官太祖謙而不許建元元年進位司徒侍中中書監如故封南康郡公邑三千户淵固讓司徒與僕射王儉書欲依蔡謨事例儉以非所宜言勸淵受命淵終不就淵美儀貎善容止俯仰進退咸有風則每朝㑹百僚逺國使莫不延首目送之宋眀帝嘗歎曰褚淵能遲行緩歩便持此得宰相矣尋加尚書令本官如故二年重申前命為司徒又固讓是年虜動上欲發王公已下無官者為軍淵諫以為無益實用空致擾動上乃止朝廷機事多與諮謀每見從納禮遇甚重上大宴集酒後謂羣臣曰卿等並宋時公卿亦當不言我應得天子王儉等未及答淵斂板曰陛下不得言臣不早識龍顔上笑曰吾有愧文叔知公為朱祐久矣淵渉獵談議善彈琵琶世祖在東宫賜淵金鏤柄銀柱琵琶性和雅有氣度不妄舉動宅嘗失火煙焰甚逼左右驚擾淵神色怡然索轝来徐去輕薄子頗以名節譏之以淵眼多白精謂之白虹貫日言為宋氏亡徴也太祖崩遺詔以淵為録尚書事江左以来無單拜録者有司疑立優䇿尚書王儉議以為見居本官别拜録推理應有䇿書而舊事不載中朝以来三公王侯則優䇿並設官品第二䇿而不優優者襃美䇿者兼眀委寄尚書職居天官政化之本尚書令品雖第三拜必有䇿録尚書品秩不見而總任彌重前代多與本官同拜故不别有䇿即事縁情不容均之凡僚宜有䇿書用申隆寄既異王侯不假優文從之尋増淵班劔為三十人五日一朝頃之寢疾上相星連有變淵憂之表遜位又因王儉及侍中王晏口陳於世祖世祖不許又啓曰臣顧惟凡薄福過災生未能以正情自安遠慙彦輔既内懐耿介便覺晷刻難推叨職未久首嵗便嬰疾篤爾来沈痼頻經危殆彌深憂震陛下曲存遲囘或謂僉議同異此出於留慈毎過愛欲其榮臣年四十有八叨忝若此以疾陳遜豈駭聽察總錄之任江左罕授上隣亞台升降盖微今受祿弗辭退絀斯願於臣名器非曰貶少萬物耳目皎然共見寧足仰延聖慮稍垂矜惜臣若内飾㢘譽外循謙後此則憲書行劾刑綱是肅臣赤誠不能行亦幽眀所不宥區區寸心歸啓以實自吝寸隂寔願萬倍堯世昔王𢎞固請乃於司徒為衛將軍宋氏行之不疑當時物無異議以臣方之曽何足說伏願恢闡宏猷賜開亭造則臣死之日猶生之年乃改授司空領驃騎將軍侍中錄尚書如故上遣侍中王晏黄門郎王秀之問疾薨家無餘財負債至數十萬詔曰司徒奄至薨逝痛怛慟懐比雖尫瘵便力出臨哭給東園祕器朝服一具衣一襲錢二十萬布二百疋蠟二百斤時司空掾屬以淵未拜疑應為吏敬不王儉議依禮婦在塗聞夫家喪改服而入今掾屬雖未服勤而吏節禀於天朝宜申禮敬司徒府史又以淵既解職而未恭後授府猶應上服以不儉又議依中朝士孫徳祖從樂陵遷為陳留未入境樂陵郡吏依見君之服陳留迎吏依娶女有吉日齊衰弔司徒府宜依居官制服又詔曰夫襃徳所以紀民慎終所以歸厚前王習祖盛典咸必由之故侍中司徒録尚書事新除司徒領驃騎將軍南康公淵履道秉哲鑒識𢎞曠爰初弱齡清風夙舉登庸應務具瞻允集孝友著於家邦忠貞彰於亮采佐命先朝經綸王化契濶屯夷綢繆終始總錄機衡四門惟穆諒以同規往古式範来今謙光彌遠屢陳降挹權從髙㫖用虧大猷將登上列永翼聲教天不愸遺奄焉薨逝朕用震慟于厥心其贈公太宰侍中録尚書公如故給節加羽葆鼓吹増班劍為六十人𦵏送之禮悉依宋太保王𢎞故事諡曰文簡先是庶姓三公轜車未有定格王儉議官品第一皆加幢絡自淵始也又詔淵妻宋故巴西主埏隧蹔啓宜贈南康郡公夫人長子賁字蔚先解褐祕書郎昇眀中為太祖太尉從事中郎司徒右長史太傅户曹屬黄門郎領羽林監齊世子中庶子領翊軍校尉建元初仍為宫官厯侍中淵薨服闋見世祖賁流涕不自勝上甚嘉之以為侍中領歩兵校尉長史左民尚書散騎常侍祕書監不拜六年上表稱疾讓封與弟蓁世以為賁恨淵失節於宋室故不復仕永眀七年卒詔賜錢三萬布五十疋蓁字茂緒永眀中解褐為員外郎出為義興太守八年改封巴東郡侯眀年表讓封還賁子霽詔許之建武末為太子詹事度支尚書領軍将軍永元元年卒贈太常諡穆淵弟澄澄字彦道初湛之尚始安公主薨納側室郭氏生淵後尚呉郡公主生澄淵事主孝謹主愛之湛之亡主表淵為嫡澄尚宋文帝女廬江公主拜駙馬都尉厯官清顯善醫術建元中為吳郡太守豫章王感疾太祖召澄為治立愈尋遷左民尚書淵薨澄以錢萬一千就招提寺贖太祖所賜淵白貂坐褥壊作裘及纓又贖淵介幘犀導及淵常所乗黄牛永眀元年為御史中丞袁彖所奏免官禁錮見原遷侍中領右軍將軍以勤謹見知其年卒澄女為東昏皇后永元元年追贈金紫光禄大夫時東陽徐嗣妙醫術有一傖父冷病積年重茵累褥牀下設鑪火猶不差嗣為作治盛冬月令傖父髁身坐石上以百瓶水從頭自灌初與數十瓶寒戰垂死其子弟相守垂泣嗣令滿數得七八十瓶後舉體出氣如雲蒸嗣令徹牀去被眀日立能起行云此大熱病也又春月出南籬門戲聞笪屋中有呻吟聲嗣曰此病甚重更二日不治必死乃徃視一姥稱舉體痛而處處有黑敢黑無數嗣還煮升餘湯送令服之姥服竟痛愈甚跳投牀者無數湏臾所黑敢處皆拔出長寸許乃以膏塗諸瘡口三日而復云此名釘疽也事驗甚多過於澄矣王儉字仲寳琅琊臨沂人也祖曇首宋右光禄父僧綽金紫光禄大夫儉生而僧綽遇害為叔父僧䖍所養數嵗襲爵豫章侯拜受茅土流涕嗚咽㓜有神彩専心篤學手不釋卷丹陽尹袁粲聞其名言之於眀帝尚陽羨公主拜駙馬都尉帝以儉嫡母武康公主同太初巫蠱事不可以為婦姑欲開塜離𦵏儉因人自陳宻以死請故事不行解褐祕書郎太子舍人超遷祕書丞上表求校墳籍依七畧撰七志四十卷上表獻之表辭甚典又撰定元徽四部書目母憂服闋為司徒右長史晉令公府長史著朝服宋大眀以来著朱衣儉上言宜復舊時議不許蒼梧暴虐儉憂懼告袁粲求出引晉新安主壻王獻之為呉興例補義興太守還為黄門郎轉吏部郎昇眀二年遷長史兼侍中以父終此職固讓儉察太祖䧺異先於領府衣裾太祖為太尉引為右長史恩禮隆宻専見任用轉左長史及太傅之授儉所唱也少有宰相之志物議咸相推許時大典將行儉為佐命禮儀詔䇿皆出於儉褚淵惟為禪詔文使儉參治之齊臺建遷右僕射領吏部時年二十八太祖從容謂儉曰我今日以青溪為鴻溝對曰天應民順庶無楚漢之事建元元年改封南昌縣公食邑二千户眀年轉左僕射領選如故上壊宋眀帝紫極殿以材柱起宣陽門儉與褚淵及叔父僧䖍連名上表諫曰臣聞徳者身之基儉者徳之輿春臺將立晉卿秉議北宫肇構漢臣盡規彼二君者或列國常侯或守文中主尚使諫諍在義即悅况陛下聖哲應期臣等職司隆重敢藉前誥竊乃有心陛下登庸宰物節省之教既昭龍袞琁極簡約之訓彌逺乾華外構采椽不斵紫極故材為宣陽門臣等未譬也夫移心疾於股肱非良醫之美畏影迹而馳騖豈靜處之方且又三農在日千畛咸事輟望嵗之勤興土木之役非所以宣昭大猷光示遐邇若以門居宫南重陽所屬年月稍久漸就淪胥自可隨宜脩理而合度改作之煩於是乎息所啓謬合請付外施行上手詔酬納宋世外六門設竹籬是年初有發白虎樽者言白門三重門竹籬穿不完上感其言改立都墻儉又諫上答曰吾欲令後世無以加也朝廷初基制度草創儉識舊事問無不答上歎曰詩云維嶽降神生甫及申今亦天為我生儉也其年儉固請解選表曰臣逺尋終古近察身事邀恩幸藉未見其倫何者子房之遇漢后公達之逢魏君史籍以為美談君子稱其髙義二臣才堪王佐理非曲私兩主専仗威武有傷寛裕豈與庸流之人憑含𢎞之澤者同年而語哉預在有心胡寧無感如使傾宗殞元有益塵露猶當畢志驅馳仰詶萬一豈容稍在形飾以狥常事九流任要風猷所先玉石朱素由斯而定臣亦不謂文案之間都無微解至於品裁臧否特所未閑雖存自朂識不副意兼竊而任彼此俱壅専情本官庶㡬髣髴且前代掌選未必具在代来何為於今非臣不可傾心奉國匪復退讓之與預同休戚寧俟位任為親陛下若不以此理賜期豈仰望於殊眷頻冒嚴威分甘尤戾見許加侍中固讓復散騎常侍上曲宴羣臣數人各使効伎藝褚淵彈琵琶王僧䖍彈琴沈文季歌子夜張敬児舞王敬則拍張儉曰臣無所解唯知誦書因跪上前誦相如封禪書上笑曰此盛徳之事吾何以堪之後上使陸澄誦孝經自仲尼居而起儉曰澄所謂博而寡要臣請誦之乃誦君子之事上章上曰善張子布更覺非奇也尋以本官領太子詹事加兵二百人上崩遺詔以儉為侍中尚書左鎮軍將軍世祖即位給班劔二十人永眀元年進號衛軍將軍參掌選事二年領國子祭酒丹陽尹本官如故給鼓吹一部三年領國子祭酒叔父僧䖍亡儉表解職不許又領太子少傅本州中正解丹陽尹舊太子敬二傅同至是朝議接少傅以賓友之禮是嵗省總眀觀於儉宅開學士館悉以四部書充儉家又詔儉以家為府四年以本官領吏部儉長禮學諳究朝儀每博議證引先儒罕有其例八座丞郎無能異者令史諮事賓客滿席儉應接銓序傍無留滯十日一還學監試諸生巾卷在庭劔衛令史儀容甚盛作解散髻斜揷幘簮朝野慕之相與放效儉常謂人曰江左風流宰相唯有謝安盖自比也世祖深委仗之士流選用奏無不可五年即本號開府儀同三司固讓六年重申前命先是詔儉三日一還朝尚書令史出外諮事上以往来煩數復詔儉還尚書下省月聽十日出外儉啓求解選不許七年乃上表曰臣比年辭選具簡天朝款言彰於侍接丹誠布於朝野物議不以為非聖心未垂矜納臣聞知慧不如眀時求之微躬實允斯義妄庸之人沈浮無取命偶休泰遂踐康衢秋葉辭條不假風飇之力太陽躋景無俟螢爝之暉晦往眀来五徳遞運聖不獨治八元亮采臣逢其時而叨其位常總端右亟管銓衡事渉兩朝嵗綿一紀盛年已老孫孺巾冠人物徂遷逝者將半三考無聞九流寂寞能官之詠輟響於當時大車之刺方興於来日若夫珥貂衣袞之貴四輔六教之華誠知匪服職務差簡端揆雖重猶可勉勵至於品藻之任尤懼其阻夙宵罄竭屢試無庸嵗月之久近世罕比非惟悔吝在身故乃惟塵及國方今多士盈朝羣才競爽選衆而授古亦何人冒陳微翰必希天照至敬無文不敢煩黷見許改領中書監參掌選事其年疾上親臨視薨年三十八吏部尚書王晏啓及儉喪上答曰儉年徳富盛志用方隆豈意暴疾不展救䕶便為異世奄忽如此痛酷彌深其契闊艱運義重常懐言尋悲切不能自勝痛矣奈何往矣奈何詔衛軍文武及臺所兵仗可悉停待𦵏又詔曰慎終追逺列代通規襃徳紀勳彌峻恒䇿故侍中中書令太子少傅領國子祭酒衛軍将軍開府儀同三司南昌公儉體道秉哲風宇淵曠肇自弱齡清猷自逺登朝應務民望斯屬草昧皇基協隆鼎祚宏謨盛烈載銘彜篆及贊朕躬徽績光茂忠圖令範造次必彰四門允穆百揆時序宗臣之重情寄兼常方正位論道永釐袞職弼兹景化以贊隆平天不愸遺奄焉薨逝朕用震于厥心可追贈太尉侍中中書監公如故給節加羽葆鼓吹増班劔為六十人𦵏禮依故太宰文簡公褚淵故事冡墓材官營辦諡文憲公儉寡嗜慾惟以經國為務車服塵素家無遺財手筆典裁為當時所重少撰古今喪服集記并文集並行於世今上受禪下詔為儉立碑降爵為侯千户儉弟遜昇眀中為丹陽丞告劉秉事不䝉封賞建元初為晉陵太守有怨言儉慮為禍因褚淵啓聞中丞陸澄依事舉奏詔曰儉門世載徳竭誠佐命特降刑書宥遜以逺徙永嘉郡道伏誅史臣曰褚淵袁粲俱受宋眀帝顧託粲既死節於宋氏而淵逢興運世之非責淵者衆矣臣請論之夫湯武之迹異乎堯舜伊吕之心亦非稷契降此風規未足為證也自金張世族袁楊鼎貴委質服義皆由漢氏膏腴見重事起於斯魏氏君臨年祚短促服褐前代宦成後朝晉氏登庸與之從事名雖魏臣實為晉有故主位雖改臣任如初自是世禄之盛習為舊準羽儀所隆人懐羨慕君臣之節徒致虚名貴仕素資皆由門慶平流進取坐至公卿則知殉國之感無因保家之念宜切市朝亟革寵貴方来陵闕雖殊顧眄如一中行智伯未有異遇褚淵當泰始初運清塗已顯數年之間不患無位既以民望而見引亦隨民望而去之夫爵禄既輕有國常選恩非已獨責人以死斯故人主之所同謬世情之過差也贊曰猗歟褚公徳素内充民譽不爽家稱克隆從容佐世貽議匪躬文憲濟濟輔相之體稱述覇王綱維典禮期寄兩朝綢繆宫陛南齊書卷二十三南齊書卷二十三考證褚淵傳帝在藩與淵以風素相善風汲古閣本作夙出為吳興太守臣祖庚按通鑑作呉郡注云吳郡近畿大郡也呉興次郡也淵以大尚書出守當得大郡吳郡為是據此則傳云吳興誤矣新除司徒領驃騎將軍南康公淵諸本同臣承蒼按褚淵新除之官乃司空非司徒也諸本並誤王儉傳遷長史兼侍中監本脱史字從南史增入南齊書卷二十三考證
