  - {type: variant, offset: 4330, length: 0, content: '', WYG: 南齊書卷十五南齊書卷十五考證州郡志下荆州臣宗萬按春秋楚之郢都也秦㧞郢置南郡漢改為荆州此下闕文臣承蒼按所闕者皆巴州郡縣之名江夏郡臣祖庚按漢髙帝置属荆州應劭曰沔水自江别至南華容為夏水過郡入江故曰江夏司州臣宗萬按沈約曰武帝北平闗洛河南底定置司州刺史治虎牢少帝景平初復没元嘉末僑立治汝南是後遂治義陽元嘉宋僑立州于汝南縣瓠諸本同按上文已有宋景平初四字此宋字疑當作末油潘南監本無潘字雍州臣祖庚按沈約曰晋孝武始于襄陽立雍州幷立僑郡縣宋割荆州之襄陽南陽新野順陽隨五郡為雍州上黄臣祖庚按晋武帝平吴割中廬之南鄉臨沮之北鄉立縣属襄陽郡安帝分属長寕郡宋明帝以名與文帝陵同改為永寕郡此属華山郡順陽南監本作從陽白水郡臣祖庚按本縣治漢属廣漢晋属梓漳宋属晋夀又五代志武昌建威縣舊立白水郡非此地也秦州臣祖庚按本秦隴西郡魏分隴右為秦州天水郡臣祖庚按漢武帝元鼎三年置後漢明帝改曰漢陽又秦州地紀云郡前湖水冬夏無増减因以名焉金城郡臣祖庚按漢昭帝六年置應劭曰初築城得金故曰金城臨洮臣宗萬按漢地理志洮水岀西羌中北至枹䍐東入河禹貢西頃山在縣西南部都尉治也南隂平郡臣祖庚按輿地志晋人流寓于蜀者于益州立南北二隂平寓于漢中者于梁州立南北二隂平犍為郡臣祖庚按應劭曰古夜郎國漢武帝建元六年開僰道臣祖庚按應劭曰古僰侯國也宕渠臣宗萬按即春秋時巴子國也秦漢属巴郡宋改為宕渠北隂平郡臣祖庚按漢属廣漢属國都尉晋武帝分立隂平郡宋分立南北二隂平郡南牂柯郡臣宗萬按漢武帝建元六年開應劭曰臨牂柯江也顔師古曰牂柯係船􅍻也華陽國志曰楚頃襄王時遣荘蹻伐夜郎軍至且蘭㭬船于岸而歩戰既滅夜郎以且蘭有㭬船牂柯處乃改其名為牂柯南齊書卷十五考證}
