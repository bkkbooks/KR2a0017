body:
  text: 知州臣祖庚謹言梁臣蕭子顯齊之宗室仕梁而修齊史以故事多附㑹辭有溢羙且以時尚瞿曇黜儒崇釋其是非大謬于聖人昔曾鞏譏其喜自馳騁刻彫藻繢之變尤多而文益下洵非誣也初江淹已作十志沈約又有紀二十篇子顯别自表修淹約注紀遂不復存矣當時奉朝請吳均亦嘗著齊春秋三十篇劉子𤣥稱其該實而曾鞏目録馬端臨經籍考並不及載夫子顯才氣過人以著作自命然沿襲卑靡故識復猥𤨏即如天文但紀災祥州郡不著户口未免疎漏而祥瑞一志多載圖讖尤為近誣宜乎司馬光謂李延夀書叙事簡徑勝于正史也雖然蕭齊一代君臣行事之得失論議之徃復未嘗表見他書即古人著述亦復不傳于世所可考見者惟是編而是編之在今日惟監本若任其魚豕相仍不益將訛以傳訛㡬於殘缺無徴哉臣等仰承詔命博采前議廣集衆思敬謹編校不敢率略從事爰考宋魏二書南北二史資治通鑑暨通典通考諸書擇其事涉蕭齊精詳切要者或别其是非或訂其疑似條分目晰附於各卷之末俾覽者有所依據以仰副聖天子修眀正史之至意云臣謹識
