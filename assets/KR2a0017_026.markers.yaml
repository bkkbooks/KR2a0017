  - {type: variant, offset: 6792, length: 5, content: 鳴笳細錫疑, WYG: 南齊書卷二十六南齊書卷二十六考證王敬則傳衛尉丞顔靈寳窺見太祖乗馬在外竊謂親人曰今若不開内領軍天下㑹是亂耳臣祖庚按高帝紀不載宋後廢帝紀亦無此語通鑑考異曰靈實若語所親則須有知者豈得宿衛晏然不動據此則傳固未可盡信也明旦四貴集議按南史齊高帝紀公與袁粲褚彦回劉彦節更直入決事號為四貴仲雄於御前作懊儂曲臣祖庚按晉志曰懊儂歌者隆安初俗間訛謡之曲歌云春草可攬結女兒可攬擷杜佑曰懊儂歌石崇妾緑珠所作絲布澁難縫一曲而已仲雄葢倣其曲而作歌也收敬則子員外郎世雄臣承蒼按通鑑注云此即敬則世子仲雄也仲世二字必有一誤興盛軍容袁文曠斬之臣祖庚按通鑑作軍客又按南史有軍容馬容如桓康為齊高帝軍容蕭摩訶馬容陳智深葢皆簡拔魁健有武藝之士使之前驅以壯軍馬之容故以為名然則通鑑客字或容字之訛也南齊書卷二十六考證}
