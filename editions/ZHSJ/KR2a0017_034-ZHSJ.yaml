body:
  text: 南齊書卷三十四列傳第十五虞玩之劉休沈沖庾杲之王諶虞玩之字茂瑤會稽餘姚人也祖宗晉庫部郎父玫通直常侍玩之少閑刀筆汎涉書史解褐東海王行參軍烏程令路太后外親朱仁彌犯罪依法錄治太后怨訴孝武坐免官泰始中除晉熙國郎中令尚書起部郎通直郎元徽中為右丞時太祖參政與玩之書曰張華為度支尚書事不徒然今漕藏有闕吾賢居右丞已覺金粟可積也玩之上表陳府庫錢帛器械役力所懸轉多興用漸廣慮不支歲月朝議優報之遷安成王車騎錄事轉少府太祖鎮東府朝野致敬玩之猶躡屐造席太祖取屐視之訛黑斜銳𣓶斷以芒接之問曰卿此屐已幾載玩之曰初釋褐拜征北行佐買之著已二十年貧士竟不辦易太祖善之引為驃騎諮議參軍霸府初開賓客輻凑太祖留意簡接玩之與樂安任遐俱以應對有席上之美齊名見遇遐字景遠好學有義行兼與太祖素游褚淵王儉竝見親愛官至光祿大夫永元初卒玩之遷驍騎將軍黃門郎領本部中正上患民閒欺巧及即位敕玩之與驍騎將軍傅堅意檢定簿籍建元二年詔朝臣曰黃籍民之大紀國之治端自頃氓俗巧偽為日已久至乃竊注爵位盜易年月增損三狀貿襲万端或戶存而文書已絕或人在而反託死板叛停私而云隸役身強而稱六疾編戶齊家少不如此皆政之巨蠹教之深疵比年雖却籍改書終無得實若約之以刑則民偽已遠若綏之以德則勝殘未易卿諸賢竝深明治體可各獻嘉謀以振澆化又臺坊訪募此制不近優刻素定閑劇有常宋元嘉以前茲役恆滿大明以後樂補稍絕或緣寇難頻起軍蔭易多民庶從利投坊者寡然國經未變朝紀恆存相揆而言隆替何速此急病之洪源晷景之切患以何科算革斯弊邪玩之上表曰宋元嘉二十七年八條取人孝建元年書籍衆巧之所始也元嘉中故光祿大夫傅隆年出七十猶手自書籍躬加隱校隆何必有石建之慎高柔之勤蓋以世屬休明服道脩身故耳今陛下日旰忘食未明求衣詔逮幽愚謹陳妄說古之共治天下唯良二千石今欲求治取正其在勤明令長凡受籍縣不加檢合但封送州州檢得實方却歸縣吏貪其賂民肆其姦姦彌深而却彌多賂愈厚而答愈緩自泰始三年至元徽四年揚州等九郡四號黃籍共却七萬一千餘戶于今十一年矣而所正者猶未四萬神州奧區尚或如此江湘諸部倍不可念愚謂宜以元嘉二十七年籍為正民惰法既久今建元元年書籍宜更立明科一聽首悔迷而不反依制必戮使官長審自檢校必令明洗然後上州永以為正若有虛昧州縣同咎今戶口多少不減元嘉而板籍頓闕弊亦有以自孝建已來入勳者衆其中操干戈衞社稷者三分殆無一焉勳簿所領而詐注辭籍浮遊世要非官長所拘錄復為不少尋蘇峻平後庾亮就溫嶠求勳簿而嶠不與以為陶侃所上多非實錄尋物之懷私無世不有宋末落紐此巧尤多又將位既衆舉卹為祿實潤甚微而人領數萬如此二條天下合役之身已據其太半矣又有改注籍狀詐入仕流苦昔為人役者今反役人又生不長髮便謂為道人填街溢巷是處皆然或抱子并居竟不編戶遷徙去來公違土斷屬役無滿流亡不歸寧喪終身疾病長臥法令必行自然競反又四鎮戍將有名寡實隨才部曲無辨勇懦署位借給巫媼比肩彌山滿海皆是私役行貨求位其塗甚易募役卑劇何為投補坊吏之所以盡百里之所以單也今但使募制明信滿復有期民無逕路則坊可立表而盈矣為治不患無制患在不行不患不行患在不久上省玩之表納之乃別置板籍官置令史限人一日得數巧以防懈怠於是貨賂因緣籍注雖正猶強推却以充程限至世祖永明八年謫巧者戍緣淮各十年百姓怨望世祖乃詔曰夫簡貴賤辨尊卑者莫不取信於黃籍豈有假器濫榮竊服非分故所以澄革虛妄式允舊章然釁起前代過非近失既往之諐不足追咎自宋昇明以前皆聽復注其有謫役邊疆各許還本此後有犯嚴加翦治玩之以久官年宦衰疾上表告退曰臣聞負重致遠力窮則困竭誠事君智盡必傾理固然也四十仕進七十懸車壯則驅馳老宜休息臣生於晉長於宋老於齊世歷三代朝市再易臣以宋元嘉二十八年為王府行佐於茲三十年矣自頃以來衰耗漸篤為性不懶惰而倦怠頓來耳目本聰明而聾梄轉積脚不支身喘不緒氣景刻不推朝晝不保大功兄弟四十有二人通塞壽夭唯臣獨存朝露末光寧堪長久且知足不辱臣已足矣禀命飢寒不求富貴銅山由命臣何恨焉久甘之矣直道事人不免縲紲屬遇聖明知其非罪臣之幸厚矣授命於道消之晨効節於百揆之日臣忠之効也慶降於文明之初荷澤於天飛之運臣命之偶也不謀巧宦而位至九卿德慙李陵而忝居門下堯舜無窮臣亦通矣年過六十不為夭矣榮期之三樂東平之一善臣俱盡之矣經昏踐亂涉艱履危仰聖德以求全憑賢輔以申節未嘗厭屈於勳權畏溺於狐鼠臣立身之本於斯不虧在其壯也當官不讓及其衰矣豪露靡因伏願慈臨賜臣骸骨非為希高慕古愛好泉林特以丁運孤貧養禮多闕風樹之感夙自纏心庶天假其辰得二三年閒掃守丘墓以此歸全始終之報遂矣上省玩之表許之玩之於人物好臧否宋末王儉舉員外郎孔逷使虜玩之言論不相饒逷儉竝恨之至是玩之東歸儉不出送朝廷無祖餞者玩之歸家起大宅數年卒其後員外郎孔瑄就儉求會稽五官儉方盥投皂莢於地曰卿鄉俗惡虞玩之至死治煩人孔逷字世遠玩之同郡人好典故學與王儉至交昇明中為齊臺尚書儀曹郎太祖謂之曰卿儀曹才也儉為宰相逷嘗謀議帷幙每及選用頗失鄉曲情儉從容啟上曰臣有孔逷猶陛下之有臣也永明中為太子家令卒時人呼孔逷何憲為王儉三公憲字子思廬江人也以強學見知母鎮北長史王敷之女聰明有訓識憲為本州別駕永明十年使于虜中劉休字弘明沛郡相人也祖徽正員郎父超九真太守休初為駙馬都尉奉朝請宋明帝湘東國常侍好學諳憶不為帝所知襲祖封南鄉侯友人陳郡謝儼同丞相義宣反休坐匿之被繫尚方七年孝武崩乃得出隨弟欽為羅縣太始初諸州反休筮明帝當勝靜處不預異謀數年還投吳喜為輔師府錄事參軍喜稱其才進之明帝得在左右板桂陽王征北參軍帝頗有好尚尤嗜飲食休多藝能爰及鼎味問無不解後宮孕者帝使筮其男女無不如占帝素肥痿不能御內諸王妓妾懷孕使密獻入宮生子之後閉其母於幽房前後十數從帝桂陽王休範子也蒼梧王亦非帝子陳太妃先為李道兒妾故蒼梧微行嘗自稱為李郎焉帝憎婦人妬尚書右丞榮彥遠以善見親婦妬傷其面帝曰我為卿治之何如彥遠率爾應曰聽聖旨其夕遂賜藥殺其妻休妻王氏亦妬帝聞之賜休妾敕與王氏二十杖令休於宅後開小店使王氏親賣掃箒皂莢以辱之其見親如此尋除員外郎領輔國司馬中書通事舍人帶南城令除尚書中兵郎給事中舍人令如故除安成王撫軍參軍出為都水使者南康相休善言治體而在郡無異績還為正員郎邵陵王南中郎錄事建威將軍新蔡太守隨轉左軍府加鎮蠻護軍將軍太守如故遷諮議司馬進寧朔將軍鎮蠻護軍太守如故徙尋陽太守將軍司馬如故後遷長史沈攸之難世祖挾晉熙邵陵二王軍府鎮盆城休承奉軍費事寧仍遷邵陵王安南長史除黃門郎寧朔將軍前軍長史齊臺散騎常侍建元初為御史中丞頃之休啟曰臣自塵榮南憲星晷交春謬聞弱奏劾無空月豈唯不能使蕃邦斂手豪右屏氣乃遣聽已暴之辜替網觸羅之鳥而猶以此里失鄉黨之和朝絕比肩之顧覆背騰其喉脣武人厲其觜吻怨之所聚勢難久堪議之所裁孰懷其允臣竊尋宋世載祀六十歷職斯任者五十有三校其年月不過盈歲於臣叨濫宜請骸骨上曰卿職當國司以威裁為本而忽憚世誚卿便應辭之事始何可獲惰晚節邪宋末上造指南車以休有思理使與王僧虔對共監試元嘉世羊欣受子敬正隸法世共宗之右軍之體微古不復見貴休始好此法至今此體大行四年出為豫章內史加冠軍將軍卒年五十四沈沖字景綽吳興武康人也祖宣新安太守父懷文廣陵太守沖解褐衞尉五官轉揚州主簿宋大明中懷文有文名沖亦涉獵文義轉西陽王撫軍法曹參軍尋舉秀才還為撫軍正佐兼記室及懷文得罪被繫沖兄弟行謝情哀貌苦見者傷之柳元景欲救懷文言於帝曰沈懷文三子塗炭不可見願陛下速正其罪帝竟殺之元景為之歎息沖兄弟以此知名泰始初以母老家貧啟明帝得為永興令遷巴陵王主簿除尚書殿中郎元徽中出為晉安王安西記室參軍還為司徒主簿山陰令轉司徒錄事參軍世祖為江州沖為征虜長史尋陽太守甚見委遇世祖還都使沖行府州事遷領軍長史建元初轉驃騎諮議參軍領錄事未及到任轉黃門郎仍遷太子中庶子世祖在東宮待以恩舊及即位轉御史中丞侍中冠軍廬陵王子卿為郢州以沖為長史輔國將軍江夏內史行府州事隨府轉為安西長史南郡內史行荊州府事將軍如故永明四年徵為五兵尚書沖與兄淡淵名譽有優劣世號為鼓兄弟淡淵竝歷御史中丞兄弟三人皆為司直晉宋未有也中丞案裁之職被憲者多結怨淵永明中彈吳興太守袁彖建武中彖從弟昂為中丞到官數日奏彈淵子繢父在僦白幰車免官禁錮沖母孔氏在東隣家失火疑為人所焚爇大呼曰我三兒皆作御史中丞與人豈有善者世祖方欲任沖沖西下至南州而卒時年五十一上甚惜之喪還詔曰沖喪柩至止惻愴良深以其昔在南蕃特兼憫悼車駕出臨沖喪詔曰沖貞詳閑理志局淹正誠著蕃朝績彰出內不幸早世朕甚悼之追贈太保常諡曰恭子庾杲之字景行新野人也祖深之雍州刺史父粲司空參軍杲之少而貞立學涉文義起家奉朝請巴陵王征西參軍郢州舉秀才除晉熙王鎮西外兵參軍世祖征虜府功曹尚書駕部郎清貧自業食唯有韮木米𣐞韮生韮雜菜或戲之曰誰謂庾郎貧食鮭常有二十七種言三九也仍為世祖撫軍中軍記室遷員外散騎常侍正員郎遷中書郎領荊湘二州中正轉書左丞常侍領中正如故出為王儉衞軍長史時人呼儉府為入芙蓉池儉謂人曰昔袁公作衞軍欲用我為長史雖不獲就要是意向如此今亦應須如我輩人也乃用杲之遷黃門郎兼御史中丞尋即正杲之風範和潤善音吐世祖令對虜使兼侍中上每歎其風器之美王儉在座曰杲之為蟬冕所照更生風采陛下故當與其即真帝意未用也永明中諸王年少不得妄與人接敕杲之與濟陽江淹五日一詣諸王使申遊好尋又遷廬陵王中軍長史遷尚書吏部郎參大選事轉太子右衞率加通直常侍九年卒臨終上表曰臣昨夜及旦更增氣疾自省綿痼頃刻危殆無容復臥任居隆顯玷塵明世乞解所忝待終私庭臣以凡庸謬徼昌運奬擢之厚千載難逢且年踰知命志事榮顯脩夭有分無所厝言若天鑒微誠蹔借餘曆傾宗殞元陳力無遠仰違庭闕伏枕鯁戀送貂蟬及章詔不許杲之歷在上府以文學見遇上造崇虛館使為碑文卒時年五十一上甚惜之諡曰貞子時會稽孔廣字淹源亦美姿制歷州治中卒王諶字仲和東海郯人也祖萬慶員外常侍父元閔護軍司馬宋大明中沈曇慶為徐州辟諶為迎主簿又為州迎從事湘東王國常侍鎮北行參軍州國府主皆宋明帝也除義陽王征北行參軍又除度明帝衞軍府諶有學義累為帝蕃佐及即位除司徒參軍帶薛令兼中書舍人見親遇常在左右諶見帝所行慘僻屢諫不從請退坐此見怒繫尚方少日出尋除尚書殿中郎徙記室參軍正員郎薛令如故遷兼中書郎晉平王驃騎板諮議出為湘東太守秩中二千石未拜坐公事免復為桂陽王驃騎府諮議參軍中書郎明帝好圍置圍州邑以建安王休仁為圍州都大中正諶與太子右率沈勃尚書水部郎庾珪之彭城丞王抗四人為小中正朝請褚思莊傅楚之為清定訪問出為臨川內史還為尚書左丞尋以本官領東觀祭酒即明帝所置總明觀也遷黃門轉正員常侍輔國將軍江夏王右軍長史冠軍將軍轉給事中廷尉卿未拜建元中武陵王曄為會稽以諶為征虜長史行事冠軍如故永明初遷豫章王太尉司馬將軍如故世祖與諶相遇於宋明之世欲委任為輔國將軍晉安王南中郎長史淮南太守行府州事五年除黃門郎領驍騎將軍遷太子中庶子驍騎如故諶貞正和謹朝庭稱為善人多與之厚八年轉冠軍將軍長沙王車騎長史徙廬陵王中軍長史將軍如故西陽王子明在南六允州長史沈憲去職上復徙諶為征虜長史行南六允府州事將軍如故諶少貧嘗自紡績及通貴後每為人說之世稱其志達九年卒年六十九史臣曰鶉居鷇飲裁樹司牧板籍之起尚未分民所以愛字之義深納隍之意重也季世以後務盡民力量財品賦以自奉養下窮而上不卹世澆而事愈變故有竊名簿閥忍賊肌膚生濫死乖趨避繩網積虛累謬已數十年欺蔽相容官民共有為國之道良宜矯革若令優役輕傜則斯詐自弭明糾羣吏則茲偽不行空閱舊文徒成民幸是以崔琰之譏魏武謝安之論京師斷民之難豈直遠在周世哉贊曰玩之止足為論未光劉休善筮安臥南湘沖獲時譽杲信珪璋諶惟舊序並用興王
