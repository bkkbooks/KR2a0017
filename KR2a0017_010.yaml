body:
  text: 南齊書卷十志第二禮下建元四年高帝山陵昭皇后應遷祔祠部疑有祖祭及遣啓諸奠九飯之儀不左僕射王儉議奠如大斂賀循云從墓之墓皆設奠如將葬廟朝之禮范寧云將窆而奠雖不稱為祖而不得無祭從之有司又奏昭皇后神主在廟今遷祔葬廣廟有虞以安神神既已處廟改葬出靈豈應虞祭鄭注改葬云從廟之廟禮宜同從墓之墓事何容異前代謂應無虞左僕射王儉議范寧云葬必有魂車若不為其歸神將安舍世中改葬即墓所施靈設祭何得不祭而毀耶賀循云既窆設奠於墓以終其事雖非正虞亦粗相似晉氏修復五陵宋朝敬后改葬皆有虞今設虞非疑從之建元二年皇太子妃薨前宮臣疑所服左僕射王儉議禮記文王世子父在斯為子君在斯為臣且漢魏以來宮僚充備臣隸之節具體在三昔庾翼妻喪王允滕弘謂府吏宜有小君之服況臣節之重邪宜依禮為舊君妻齊衰三月居官之身並合屬假朝晡臨哭悉繫東宮今臣之未從官在遠者於居官之所屬寧二日半仍行喪成服遣箋表不得奔赴從之太子妃斬草乘黃議建銘旌僕射王儉議禮既塗棺祝取銘置于殯東大斂畢便應建于西階之東宋大明二年太子妃薨建九旒有司又議斬草日建旒與不若建旒應幾旒及畫龍升降云何又用幾翣僕射王儉議旒本是命服無關於凶事今公卿以下平存不能備禮故在凶乃建耳東宮秩同上公九命之儀妃與儲君一體義不容異無緣未同常例別立凶旒大明舊事是不經詳議率爾便行耳今宜考以禮典不得效尤從失吉部伍自有桁輅凶部別有銘旌若復立旒復置何處翣自用八從之有司奏大明故事太子妃玄宮中有石志參議墓銘不出禮典近宋元嘉中顏延作王球石志素族無碑策故以紀德自爾以來王公以下咸共遵用儲妃之重禮殊恆列既有哀策謂不須石志從之有司奏穆妃卒哭後靈還在道遇朔望當須設祭不王儉議既虞卒哭祭之於廟本是祭序昭穆耳未全同卒吉四時之祭也所以有朔望殷事蕃國不行權制宋江夏王妃卒哭以後朔望設祭帝室既以卒哭除喪無緣方有朔望之祭靈筵雖未升廟堂而舫中即成行廟猶如桓玄及宋高祖長沙臨川二國並有移廟之禮豈復謂靈筵在途便設殷事耶推此而言朔望不復俟祭宋懿后時舊事不及此益可知時議從之建元三年有司奏皇太子穆妃以去年七月薨其年閏九月未審當月數閏為應以閏附正月若用月數數閏者南郡王兄弟便應以此四月晦小祥至於祥月不為有疑不左僕射王儉議三百六旬尚書明義文公納幣春秋致譏穀梁云積分而成月公羊云天無是月雖然左氏謂告朔為得禮是故先儒咸謂三年期喪歲數沒閏大功以下月數數閏夫閏者蓋是年之餘日而月之異朔所以吳商云含閏以正期允協情理今杖期之喪雖以十一月而小祥至於祥縞必須周歲凡厭屈之禮要取象正服祥縞相去二月厭降小祥亦以則之又且求之名義則小祥本以年限考於倫例則相去必應二朔今以厭屈而先祥不得謂此事之非期事既同條情無異貫沒閏之理固在言先設令祥在此晦則去縞三月依附準例益復為礙謂應須五月晦乃祥此國之大典宜共精詳並通關八座丞郎研盡同異尚書令褚淵難儉議曰厭屈之典由所尊奪情故祥縞備制而年月不申今以十一月而祥從期可知既計以月數則應數閏以成典若猶含之何以異於縞制疑者正以祥之當閏月數相縣積分餘閏曆象所弘計月者數閏故有餘月計年者苞含故致盈積稱理從制有何不可儉又答淵難曰含閏之義通儒所難但祥本應期屈而不遂語事則名體具存論哀則情無以異迹雖數月義實計年閏是年之歸餘故宜總而苞之期而兩祥緣尊故屈祥則沒閏象年所申屈申兼著二途具舉經記之旨其在茲乎如使五月小祥六月乃閏則祥之去縞事成二月是為十一月以象前期二朔以放後歲名有區域不得相參魯襄二十八年十二月乙未楚子卒唯書上月初不言閏此又附上之明義也鄭射王賀唯云期則沒閏初不復區別杖期之中祥將謂不俟言矣成休甫云大祥後禫有閏別數之明杖期之祥不得方於綅縞之末即恩如彼就例如此淵又據舊義難儉十餘問儉隨事解釋祠部郎中王圭之議謂喪以閏施功衰以下小祥值閏則略而不言今雖厭屈祥名猶存異於餘服計月為數屈追慕之心以遠為邇日既餘分月非正朔含而全制於情唯允僕射儉議理據詳博謹所附同今司徒淵始雖疑難再經往反未同儉議依舊八座丞郎通共博議為允以來五月晦小祥其祥禫自依常限奏御班下內外詔可皇太子穆妃服尚書左丞兼著作郎王逡問左僕射王儉中軍南郡王小祥應待聞喜不穆妃七月二十四日薨聞喜公八月發哀計十一月之限應在六月南郡王為當同取六月則大祥復申一月應用八月非復正月在存親之義若各自為祥廬堊相間玄素雜糅未審當有此疑不儉曰送往有已復生有節罔極非服制所申祥縞明示終之斷相待之義經記無聞世人多以廬室衰麻不宜有異故相去一二月者或申以俱除此所謂任情徑行未達禮旨昔撰喪記已嘗言之遠還之人自有為而未祭在家之子立何辭以不變禮有除喪而歸者此則經記之遺文不待之明據假使應待則相去彌年亦宜必待乃為衰絰永服以窮生吉蠲長絶於宗廟斯不可矣苟曰非宜則旬月之間亦不容申何者禮有倫序義無徒設今遠則不待近必相須禮例既乖即心無取若疑兄弟同居吉凶舛雜則古有異宮之義設無異宮則遠還之子自應開立別門以終喪事靈筵祭奠隨在家之人再期而毀所以然者奔喪禮云為位不奠鄭玄云以其精神不存乎此也聞哀不時實緣在遠為位不奠益有可安此自有為而然不關嫡庶庶子在家亦不待嫡矣而況儲妃正體王室中軍長嫡之重天朝又行權制進退彌復非疑謂不應相待中軍祥縞之日聞喜致哀而已不受弔慰及至忌辰變除昆弟亦宜相就寫情而不對客此國之大典宜通關八座丞郎共盡同異然後奏御司徒褚淵等二十人並同儉議為允請以為永制詔可建元三年太子穆妃薨南郡王聞喜公國臣疑制君母服儉又議禮庶人為國君齊衰先儒云庶人在官若府史之屬是也又諸侯之大夫妻為夫人服繐衰七月以此輕微疏遠故不得盡禮今皇孫自是蕃國之王公太子穆妃是天朝之嫡婦宮臣得申小君之禮國官豈敢為夫人之敬當單衣白帢素帶哭于中門外每臨輒入與宮官同永明十一年文惠太子薨右僕射王晏等奏案喪服經為君之父長子同齊衰期今至尊既不行三年之典止服期制羣臣應降一等便應大功九月功衰是兄弟之服不可以服尊臣等參議謂宜重其衰裳減其月數同服齊衰三月至於太孫三年既申南郡國臣宜備齊衰期服臨汝曲江既非正嫡不得禰先儲二公國臣並不得服詔依所議又奏案喪服經雖有妾為君之長子從君而服二漢以來此禮久廢請因循前準不復追行詔曰既久廢停便又奏伏尋御服文惠太子期內不奏樂諸王雖本服期而儲皇正體宗廟服者一同釋服奏樂姻娶便應並通竊謂二等誠俱是嘉禮輕重有異娶婦思嗣事非全吉三日不樂禮有明文宋世期喪降在大功者婚禮廢樂以申私戚通以前典詔依議又奏案禮祥除皆先於今夕易服明旦乃設祭尋比世服臨然後改服與禮為乖今東宮公除日若依例皇太孫服臨方易服臣等參議謂先哭臨竟而後祭之應公除者皆於府第變服而後入臨行奉慰之禮詔可建武二年朝會時世祖遏密未終朝議疑作樂不祠部郎何佟之議昔舜受終文祖義非胤堯及放勛徂落遏密三祀近代晉康帝繼成帝于時亦不作樂懷帝永嘉元年惠帝喪制未終于時江充議云古帝王相承雖世及有異而輕重同禮從之建武二年正月有司以世祖宗文皇帝今二年正月二十四日再忌日二十九日大祥三月二十九日祥禫至尊及羣臣泄哀之儀應定準下二學八座丞郎博士陶韶以為名立義生自古之制文帝正號祖宗式序昭穆祥忌禫日皇帝宜服祭服出太極泄哀百僚亦祭服陪位太常丞李撝議曰尋尊號既追重服宜正但已從權制故苴杖不説至於鑽燧既同天地亦變容得無感乎且晉景獻皇后崩羣臣備小君之服追尊之后無違后典追尊之帝固宜同帝禮矣雖臣子一例而禮隨時異至尊龍飛中興事非嗣武理無深衣之變但王者體國亦應弔服出正殿舉哀百寮致慟一如常儀給事中領國子助教謝墨曇濟議夫喪禮一制限節兩分虞祔追亡之情小祥抑存之禮斯蓋至愛可申極痛宜屈耳文皇帝雖君德早凝民化未洽追崇尊極實緣于性今言臣則無實論己則事虛聖上馭𧜛更奉天眷祗禮七廟非從三后周忌祥禫無所依設太學博士崔愝同陶韶議太常沈倓同李撝議國子博士劉警等同謝墨曇濟議祠部郎何佟之議曰春秋之旨臣子繼君親雖恩義有殊而其禮則一所以敦資敬之情篤方喪之義主上雖仰嗣高皇嘗經北面方今聖曆御宇垂訓無窮在三之恩理不容替竊謂世祖宗祥忌至尊宜弔服升殿羣臣同致哀感事畢百官詣宣德宮拜表仍致哀陵園以弘追遠之慕尚書令王晏等十九人同佟之議詔可海陵王薨百官會哀時纂嚴朝議疑戎服臨會祠部郎何佟之議羔裘玄冠不以弔理不容以兵服臨喪宋泰始二年孝武大祥之日于時百寮入臨皆於宮門變戎服著衣爐入臨畢出外還襲戎衣從之贊曰姬制孔作訓範百王三千有數四維是張損益典廢舉憲章戎祀軍國社廟郊庠冠婚朝會服紀凶喪存為盛德戒在先亡
