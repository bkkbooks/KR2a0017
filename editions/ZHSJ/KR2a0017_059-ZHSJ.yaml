body:
  text: 南齊書卷五十九列傳第四十芮芮虜河南氐羌芮芮虜塞外雜胡也編髮左衽晉世什翼圭入塞內後芮芮逐水草盡有匈奴故庭威服西域土氣早寒所居為穹廬氈帳刻木記事不識文書馬畜丁肥種衆殷盛常與魏虜為讎敵宋世其國相希利垔解星筭數術通胡漢語常言南方當有姓名齊者其人當興昇明二年太祖輔政遣驍騎將軍王洪軌範使芮芮剋期共伐魏虜建元元年八月芮芮主發三十萬騎南侵去平城七百里魏虜拒守不敢戰芮芮主於燕然山下縱獵而歸上初踐阼不遑出師二年三年芮芮主頻遣使貢獻貂皮雜物與上書欲伐魏虜謂上足下自稱吾獻師子皮袴褶皮如虎皮色白毛短時有賈胡在蜀見之云此非師子皮乃扶拔皮也國相邢基祇羅迴奉表曰夫四象稟政二儀改度而萬物生焉斯蓋虧盈迭襲曆數自然也昔晉室將終楚桓竊命寔賴宋武匡濟之功故能扶衰定傾休否以泰祚流九葉而國嗣不繼今皇天降禍於上宋室猜亂于下臣雖荒遠粗闚圖書數難以來星文改度房心受變虛危納祉宋滅齊昌此其驗也水運遘屯木德應運子年垂刈劉穆之記崏嶺有不衽之山京房讖云卯金十六草肅應王歷觀圖緯休徵非一皆云慶鍾蕭氏代宋者齊會有使力法度及此國使反採訪聖德彌驗天縱之姿故能挾隆皇祚光權定之業翼亮天功濟悖主之難樹勳京師威振海外杖義之功侔縱湯武冥績既著寶命因歸受終之曆歸于有道況夫帝無常族有德必昌時來之數唯靈是與陛下承乾啟之機因乘龍之運計應符革祚久已踐極荒裔傾戴莫不引領設未龍飛不宜沖挹上違天人之心下乖黎庶之望皇芮承緒肇自二儀拓土載民地越滄海百代一族大業天固雖吳漢漠殊域義同脣齒方欲剋期中原龔行天罰治兵繕甲俟時大舉振霜戈於并代鳴和鈴於秦趙掃殄凶醜梟剪元惡然後皇輿遷幸光復中華永敦隣好侔蹤齊魯使四海有奉蒼生咸賴荒餘歸仰豈不盛哉永明元年王洪軌範還京師經途三萬餘里洪軌範齊郡臨淄人為太祖所親信建武中為青冀二州刺史私占丁侵虜堺奔敗結氣卒芮芮王求醫工等物世祖詔報曰知須醫及織成錦工指南車漏刻竝非所愛南方治疾與北土不同織成錦工竝女人不堪涉遠指南車漏刻此雖有其器工匠久不復存不副為悞自芮芮居匈奴故庭十年丁零胡又南攻芮芮得其故地芮芮稍南徙魏虜主元宏以其侵逼遣偽平元王駕鹿渾龍驤將軍楊延數十萬騎伐芮芮大寒雪人馬死者衆先是益州刺史劉悛遣使江景玄使丁零宣國威德道經鄯善于闐鄯善為丁零所破人民散盡于闐尤信佛法丁零僭稱天子勞接景玄使反命芮芮常由河南道而抵益州河南匈奴種也漢建武中匈奴奴婢亡匿在涼州界雜種數千人虜名奴婢為貲一謂之貲虜鮮卑慕容廆庶兄吐谷渾為氐王在益州西北亘數千里其南界龍涸城去成都千餘里大戍有四一在清水川一在赤水一在澆河一在吐屈真川皆子弟所治其王治慕駕川多畜逐水草無城郭後稍為宮屋而人民猶以氈廬百子帳為行屋地常風寒人行平沙中沙礫飛起行迹皆滅肥地則有雀鼠同穴生黃紫花瘦地輒有鄣氣使人斷氣牛馬得之疲汗不能行宋初始受爵命至宋末河南王吐谷渾拾寅為使持節散騎常侍都督西秦河沙三州諸軍事車騎大將軍開府儀同三司領護羌校尉西秦河二州刺史建元元年太祖即本官進號驃騎大將軍宋世遣武衞將軍王世武使河南是歲隨拾寅使來獻詔答曰皇帝敬問使持節散騎常侍都督西秦河沙三州諸軍事車騎大將軍開府儀同三司領護羌校尉西秦河二州刺史新除驃騎大將軍河南王寶命革授爰集朕躬猥當大業祗惕兼懷夏中增感王世武至得元徽五年五月二十一日表聞之濕熱想比平安又卿乃誠遙著保寧遐壃今詔升徽號以酬忠款遣王世武銜命拜授又仍使王世武等往芮芮想即資遣使得時達又奏所上馬等物悉至今往別牒錦絳紫碧綠黃青等紋各十匹拾寅子易度侯好星文甞求星書朝議不給寅卒三年以河南王世子吐谷渾易度侯為使持節都督西秦河沙三州諸軍事鎮西將軍領護羌校尉西秦河二州刺史河南王永明三年詔曰易度侯守職西蕃綏懷允緝忠績兼舉朕有嘉焉可進號車騎大將軍遣給事中丘冠先使河南道并送芮芮使至六年乃還得玉長三尺二寸厚一尺一寸易度侯卒八年立其世子休留茂為使持節督西秦河沙三州諸軍事鎮西將軍領護羌校尉西秦河二州刺史復遣振武將軍丘冠先拜授并行弔禮冠先至河南休留茂逼令先拜冠先厲色不肯休留茂恥其國人執冠先於絕巖上推墮深谷而死冠先字道玄吳興人晉吏部郎傑六世孫也上初遣冠先示尚書令王儉儉答上曰此人不啻堪行乃再銜命及死世祖敕其子雄曰卿父受使河南秉忠守死不辱王命我甚賞惜喪屍絕域不可復尋於卿後宦塗無妨甚有高比賜錢十萬布三十匹氐楊氏與苻氐同出略陽漢世居仇池地號百頃建安中有百頃氐王是也晉世有楊茂艹舀後轉彊盛事見前史仇池四方壁立自然有樓櫓却敵狀高竝數丈有二十二道可攀緣而升東西二門盤道可七里上有岡阜泉源氐於上平地立宮室菓園倉庫無貴賤皆為板屋土牆所治處名洛谷宋元嘉十九年龍驤將軍裴方明等伐氐剋仇池後為魏虜所攻失地氐王楊難當從兄子文德聚衆茄蘆宋世加以爵位文德死從弟僧嗣文慶傳代之難當族弟廣香先奔虜元徽中為虜攻殺文慶以為陰平公茄蘆鎮主文慶從弟文弘為白水太守屯武興朝議以為輔國將軍北秦州刺史武都王仇池公太祖即位欲綏懷異俗建元元年詔曰昔絕國入贄美稱前冊殊俗內款聲流往記偽虜茄蘆鎮主陰平郡公楊廣香怨結同族舋起親黨當宋之世遂舉地降敵茄蘆失守華陽暫驚近單使先馳宣揚皇威廣香等追其遠世之誠仰我惟新之化肉袒請附復地千里氐羌雜種咸同歸從宜時領納厚加優卹廣香翻迷反正可特量所授部曲酋豪隨名酬賞以廣香為督沙州諸軍事平羌校尉沙州刺史尋進號征虜將軍梁州刺史范柏年被誅其親將李烏奴懼奔叛文弘納之烏奴率亡命千餘人攻梁州為刺史王玄邈所破復走還氐中荊州刺史豫章王嶷遣兵討烏奴檄梁州能斬送烏奴首賞本郡烏奴田宅事業悉賜之與廣香書曰夫廢興無謬逆順有古今共貫賢愚同察梁州刺史范柏年懷挾詭態首鼠兩端既已被伐盤桓稽命遂潛遣李烏奴叛楊文弘扇誘邊疆荒雜柏年今已梟禽烏奴頻被摧破計其餘燼行自消夷今遣參軍行晉壽太守王道寶參軍事行北巴西新巴二郡太守任湜之行宕渠太守王安會領銳卒三千遄塗風邁浮川電掩又命輔國將軍三巴校尉明惠照巴郡太守魯休烈南巴西太守柳弘稱益州刺史傅琰竝簡徒競騖選甲爭馳雍州水步行次魏興并山東僑舊會于南鄭或汎舟墊江或飛旍劒道腹背飊騰表𩹉震擊文弘容納叛戾專為淵藪外侮皇威內凌國族君弈世忠款深識理順想即起義應接大軍共為掎角討滅烏奴剋建忠勤茂立誠節沈攸之資十年之積權百旅之衆師出境而城潰兵未戰而自屠朝廷無遺鏃之費士民靡傷痍之弊況蕞爾小豎方之篾如其取殲殄豈延漏刻忝以寡昧分陝司蕃清氛蕩穢諒惟任職此府器械山積戈旗林聳士卒剽勁蓄銳權威除難剿寇豈俟徵習但以剪伐萌菌弗勞洪斧撲彼蚊蚋無假多力皇上聖哲應期恩澤廣被罪止首惡餘無所問賞罰之科具寫如別使道寶步出魏興分軍泝墊江俱會晉壽太祖以文弘背叛進廣香為持節都督西秦州刺史廣香子北部鎮將軍郡事炅為征虜將軍武都太守以難當正胤楊後起為持節寧朔將軍平羌校尉北秦州刺史武都王鎮武興即文弘從兄子也三年文弘歸降復以為征西將軍北秦州刺史先是廣香病死氐衆半奔文弘半詣梁州刺史崔慧景文弘遣從子後起進據白水白水居晉壽上流西接涪界東帶益路北連陰平茄蘆為形勝之地晉壽太守楊公則啟經略之宜上答曰文弘罪不可恕事中政應且加恩耳卿若能襲破白水必加厚賞世祖即位進後起號冠軍將軍永明元年以征虜將軍炅為沙州刺史陰平王將軍如故二年八座奏後起勒勤彰款塞忠著邊城進號征虜將軍四年後起卒詔曰後起奄至殞逝惻愴于懷綏禦邊服宜詳其選行輔國將軍北秦州刺史武都王楊集始幹局沈亮乃心忠款必能緝境寧民宣揚聲教可持節輔國將軍北秦州刺史平羌校尉武都王後起弟後明為龍驤將軍白水太守集始弟集朗為寧朔將軍五年有司奏集始驅狐剪棘仰化邊服母以子貴宜加榮寵除集始母姜氏為太夫人假銀印九年八座奏楊炅嗣勤西牧馳款內昭宜增戎章用輝遐外進號前將軍十年集始反率氐蜀雜衆寇漢川梁州刺史陰智伯遣軍主寧朔將軍桓盧奴梁季羣宋王士隆等千餘人拒之不利退保白馬賊衆萬餘人縱兵火攻其城柵盧奴拒守死戰智伯又遣軍主陰仲昌等馬步數千人救援至白馬城東千溪橋相去數里集始等悉力攻之官軍內外奮擊集始大敗十八營一時潰走殺獲數千人集始奔入虜堺隆昌元年以前將軍楊炅為使持節督沙州諸軍事平西將軍平羌校尉沙州刺史集始入武興以城降虜氐人符幼孫起義攻之建武二年氐虜寇漢中梁州刺史蕭懿遣前氐王楊後起弟子元秀收合義兵氐衆響應斷虜運道虜亦遣偽南梁州刺史仇池公楊靈珍據泥山以相拒格元秀病死符幼孫領其衆高宗詔曰仇池公楊元秀氐王苗胤乃心忠勇醜虜凶逼血誠彌厲宣播朝威招誘戎種萬里齊契響然歸從誠効顯著寔有可嘉不幸殞喪悽愴于懷夫死事加恩陽秋明義宜追覃榮典以弘勸奬贈仇池公持歸國氐楊馥之聚義衆屯沮水關城白馬北集始遣弟集朗率兵迎拒州軍於黃亘戰大敗集始走下辯馥之據武興虜軍尋退馥之留弟昌之守武興自引兵據仇池詔曰氐王楊馥之世纂忠義率厲部曲樹績邊城克殄姦醜復內稟朝律外撫戎荒款心式昭朕甚嘉之以為持節督北秦雍二州諸軍事輔國將軍平羌校尉北秦州刺史仇池公沙州刺史楊炅進號安西將軍三年炅死以炅子崇祖為假節督沙州軍事征虜將軍平羌校尉沙州刺史陰平王四年偽南梁州刺史楊靈珍與二弟婆羅阿卜珍率部曲三萬餘人舉城歸附送母及子雙健阿皮於南鄭為質梁州刺史陰廣宗遣中兵參軍猷王思考率衆救援為虜所得婆羅阿卜珍戰死靈珍攻集始於武興殺其二弟集同集衆集始窮急請降以靈珍為持節督隴右軍事征虜將軍北梁州刺史仇池公武都王永元二年復以集始為使持節督秦雍二州軍事輔國將軍平羌校尉北秦州刺史靈珍後為虜所殺自虜陷仇池以後或得或失宋以仇池為郡故以氐封焉宕昌羌種也各有酋豪領部衆汧隴閒宋末宕昌王梁彌機為使持節督河涼二州安西將軍東羌校尉河涼二州刺史隴西公建元元年太祖進號鎮西將軍又征虜將軍西涼州刺史羌王像舒彭亦進為持節平西將軍後叛降虜永明元年八座奏前使持節都督河涼二州軍事鎮西將軍東羌校尉河涼二州刺史隴西公宕昌王梁彌機前使持節平北將軍西涼州刺史羌王像舒彭竝著勤西垂寧安邊境可復先官爵詔又可以隴右都帥羌王劉洛羊為輔國將軍機卒三年詔曰行宕昌王梁彌頡忠款內附著績西服宜加爵命式隆蕃屏可使持節督河涼二州諸軍事安西將軍東羌校尉河涼二州刺史隴西公宕昌王頡卒六年以行宕昌王梁彌承為使持節督河涼二州諸軍事安西將軍東羌校尉河涼二州刺史宕昌王使求軍儀及伎雜書詔報曰知須軍儀等九種竝非所愛但軍器種甚多致之未易內伎不堪涉遠祕閣圖書例不外出五經集注論語今特敕賜王各一部俗重虎皮以之送死國中以為貨史臣曰氐胡獷盛乘運迭起秦趙僭差相係覆滅餘類蠢蠢被西疆而奄北際芮芮地窮幽都戎馬天隔氐楊密邇華夷分民接境侵犯漢漾浸逼狼狐壃埸之心窺望威德梁部多難於斯為梗殘羌遺種際運肇昌盡隴憑河遠通南驛據國稱蕃竝受職命晉氏衰故敗中朝淪覆滅餘四夷庶雪戎禍授以兵杖升進軍麾後代因仍貪廣聲教綏外懷遠先名後實貿易有無世開邊利羽毛齒革𣰋損於我若夫九種之事有至於此也贊曰芮芮河南同出胡種稱王僭帝擅彊專權統氐羌孽餘散出河隴來賓往叛放命承宗
