body:
  text: 南齊書卷十三梁蕭子顯撰志第五天文下史臣曰天文設象宜備内外兩宮但災之所躔不必遍行景緯五星精晷與二曜而為七妖祥是主厯數攸司盖有殊於列宿也若北辰不移據在杠軸衆星動流實繋天體五星從伏非闗二義故徐顯思以五星為非星虞喜論之詳矣五星相犯列宿雜建元元年八月辛亥太白犯軒轅大星九月癸丑太白從行於軫犯填星二年六月丙子太白晝見四年二月丙戌太白晝見在午上六年辛夘太白晝見午上庚子太白入東井無所犯七月己未太白有光影八月戊子太白從軒轅犯女主星甲辰太白從行犯軒轅少民星九月己夘太白從行犯太㣲西蕃上将辛酉太白從行入太㣲在右執法星西北一尺戊辰太白從行犯太㣲左執法十二月壬子太白從行犯填星在氐度丙辰太白從行犯房北頭第一星丁夘太白犯楗閉星永明元年六月己酉太白行犯太㣲上将星辛酉太白行犯太㣲左執法八月甲申太白犯南斗第四星九月乙酉太白犯南斗第三星壬辰太白熒惑合同在南斗度十月丁夘太白犯哭星二年正月戊戌太白晝見當午上三月甲戌太白從行入羽林四月丙申太白從行犯東井鉞星六月戊辰太白熒惑合同在輿鬼度己巳太白從行輿鬼度犯嵗星三年四月丁未太白晝見癸亥太白晝見當午上五月戊子太白犯少民星八月丁巳太白晝見當午上十一月壬申太白從行入氐十二月己酉太白填星合在箕度四年九月壬辰太白晝見當午丙午太白犯南斗十一月庚子太白入羽林又犯天闗五年五月丁酉太白晝見當午上庚子太白三犯畢左股第一星西南一尺六月甲戌太白犯東井北轅第三星在西一尺八月甲寅太白從行入軒轅在女主星東北一尺二寸不為犯戊辰太白從在太㣲西蕃上将星西南五寸辛巳太白從在太㣲左執法星西北四寸六年四月辛酉太白從在熒惑北三寸為犯竝在東井度五月癸夘太白晝見當午上六月己巳太白從在太㣲西蕃右執法星東南四寸為犯七月癸巳太白在氐角星東北一尺為犯八月乙亥太白從行在房南第二左股次将星西南一尺為犯閏八月甲午太白晝見當午十一月戊午太白從在嵗星西北四尺同在尾度又在熒惑東北六尺五寸在心度合宿十二月壬寅太白從行在填星西南二尺五寸斗度七年二月辛巳太白從行入羽林十月癸酉太白在嵗星南相去一尺六寸從在箕度為合十一月丁夘太白從行入羽林八年正月丁未太白書見當午上六月戊子太白從行入東井己丑太白晝見當午八月庚辰太白從行在軒轅女主星南七尺為犯九月丙申太白從行在太㣲西蕃上将星西南一尺為犯丁未太白從行入太㣲辛酉太白從行在進賢西五寸為犯十月乙亥太白從行在亢南第二星西南一尺為犯甲申太白從行入氐十一月戊戌太白從行在房北頭第二星東北一寸又在楗閉星西南七寸竝為犯又在熒惑西北二尺為合宿癸夘太白從行在熒惑東北一尺為犯九年四月癸未太白從厯夕見西方從疾參宿一度比来多隂至己丑開除己見在日北當西北維上薄昏不見宿星則為先厯而見六月丙子太白晝見當午上七月辛夘太白從行入太㣲在西蕃上将星北四寸為犯九月乙亥太白從行在南斗第四星北二寸為犯丁夘太白在南斗第三星西一寸為犯十年二月甲辰太白從行入羽林五月辛巳太白從行入東井在軒轅西第一星東六寸為犯七月乙丑太白從行在軒轅大星東八寸為犯十一年正月戊辰太白從行在嵗星西北六寸為犯在奎度二月丁丑太白從行東井北轅西頭第一星東北一尺為犯四月戊子太白在五諸侯東第二星西北六寸為犯辛丑太白從行入輿鬼在東北星西南四寸為犯五月戊午太白晝見當午名為經天癸亥太白從行入軒轅大星北一尺二寸無所犯九月己酉太白晝見當午上十月丙戌太白行在進賢星西南四寸為犯十一月戊戌太白從行入氐丁夘太白從行在楗閉星西北六寸為犯十二月壬辰太白從行在南斗第六星東南一尺為犯辛丑太白從行在西建東星西南一尺為犯建元元年五月己未熒惑犯太㣲西蕃上将又犯東蕃上将二年十月辛酉熒惑守太㣲四年六月戊子熒惑從行入東井無所犯戊戌熒惑在東井度形色小而黄黒不明丁丑熒惑太白同在東井度七月甲戍熒惑從行入輿鬼犯積尸十月癸未熒惑從行犯太㣲西蕃上将星丙戍熒惑從入太㣲十一月丙辰熒惑從行在太㣲犯右執法永明元年正月己亥熒惑逆犯上相辛亥熒惑守角庚子熒惑逆入太㣲三月丁夘熒惑守太白六月戊申熒惑從犯亢己巳熒惑從行犯氐東南星七月戊寅熒惑填星同在氐度丁亥熒惑行犯房北頭第二星八月乙丑熒惑從行犯天江甲戌熒惑犯南斗第五星十一月丙申熒惑入羽林二年八月庚午熒惑犯太㣲西蕃上将癸未熒惑犯太㣲右執法丁酉熒惑犯太㣲右執法十月庚申熒惑犯進賢十一月壬辰熒惑犯亢南苐二星丙申熒惑犯亢南星十二月乙夘熒惑入氐三年二月乙夘熒惑在房北頭第一星西北一尺徘徊守房四月戊戌熒惑犯六月乙亥熒惑犯房癸亥熒惑犯天江南頭第二星八月丁巳熒惑犯南斗第五星十一月丙戌熒惑從行入羽林四年八月戊辰熒惑入太㣲癸酉熒惑犯太㣲右執法戊子熒惑在太㣲九月戊申熒惑犯嵗星己酉熒惑犯嵗星芒角相接十月丁丑熒惑犯亢南頭第一星十一月庚寅熒惑犯氐西南星十二月己未熒惑犯房北頭第一星庚申熒惑入房北犯鉤鈐星五年二月乙亥熒惑填星同在南斗度為合宿九月乙未熒惑從行在哭星東相去半寸六年四月癸丑熒惑伏在参度去太白二尺五寸辰星去太白五尺三寸為合宿甲戌熒惑在辰星東南二尺五寸俱從行入東井曠中無所犯閏四月丁丑熒惑從行在氐西南星北七寸為犯己夘熒惑從行入氐無所犯乙巳熒惑從行在房北頭第一上将右驂星南六寸為犯又在鉤鈐星西北五寸十一月丙寅熒惑從行在嵗星西相去四尺同在尾度為合宿七年二月丙子熒惑從行在填星西相去二尺同在牽牛度為合宿三月戊午熒惑從在泣星西北七寸戊辰熒惑從行入羽林八月戊戌熒惑逆入羽林九月乙丑熒惑入羽林成句已八年四月丙申熒惑從行入輿鬼在西北星東南二寸為犯十月乙亥熒惑入氐十一月乙未熒惑從入北落門在第一星東南去鉤鈐三寸為犯九年三月甲午熒惑從在填星東七寸在嵗星南六寸同在虗度為犯為合宿四月癸亥熒惑從行入羽林閏七月辛酉熒惑從行在畢左股星西北一寸為犯八月十四日熒惑應伏在昴三度前先歴在畢度二十一日始逆行北轉垂及𤣥冬熒惑囚死之時而形色漸大於常十年二月庚子熒惑從入東井北轅西頭第一星西二寸為犯三月癸未熒惑從行在輿鬼西北七寸為犯乙酉熒惑從行入輿鬼六月壬寅熒惑從行入太㣲十一年二月庚戍熒惑從在鎮星西北六寸為犯同在營室五月戊午熒惑從行在嵗星西南六寸為犯同在婁度八月辛巳熒惑從行入東井在南轅西第一星東北一尺四寸十一月丁巳熒惑逆行在五諸侯東星北四寸為犯隆昌元年三月乙丑熒惑從行入輿鬼西北星東一寸為犯癸酉熒惑從行在輿鬼積尸星東北七寸為犯閏三月甲寅熒惑從入軒轅五月丁酉熒惑從入太㣲在右執法北二寸為犯建元四年正月己夘嵗星太白俱從行同在婁度為合宿六月丁酉嵗星晝見永明元年五月甲午嵗星入東井七月壬午嵗星晝見三年五月丙子嵗星與太白合六月辛丑嵗星與辰星合十月己巳嵗星從入太㣲十一月甲子嵗星從入太微犯右執法四年閏二月丙辰嵗星犯太㣲上将三月庚申嵗星犯太㣲上将四月己未嵗星犯右執法八月乙巳嵗星犯進賢又與熒惑於軫度合宿五年二月癸夘嵗星犯進賢六月甲子嵗星盖見在軫度十月己未嵗星從在氐西南星北七寸又辰星從入氐在嵗星西四尺五寸又太白從在辰星東相去一尺同在氐度三星為合宿十二月甲戌嵗星晝見六年三月甲申嵗星逆行入氐宿六月丙寅嵗星晝見在氐度八年三月庚申嵗星守牽牛九年二月壬午嵗星從在填星西七寸同在虚度為合宿閏七月辛酉嵗星在泣星北五寸為犯又守填星九月辛夘在泣星西一尺五寸為合宿永明元年六月辰星從行入太㣲在太白西北一尺二年八月甲寅辰星于翼犯太白九年六月丙子辰星随太白於西方在七星度相去一尺四寸為合宿十一年九月丙辰辰星依厯應夕見西方亢宿一度至九月八日不見隆昌元年正月丙戌辰星見危度在太白北一尺為犯建元三年十月癸丑填星逆行守氐四年七月戊辰填星從行入氐永明元年正月庚寅填星守房心三月甲子填星逆行犯西咸星二年二月戊辰填星犯東咸星四年十二月辛巳填星犯建星七年十二月戊辰填星在須女度又辰星從行在填星西南一尺一寸為合宿八年三月庚申填星守哭星九年七月庚戍填星逆在泣西星東北七寸為犯十月甲午填星從行在泣星西北五寸為犯流星災建元元年十月癸酉有流星大如三升塸色白尾長五丈從南河東北二尺出北行歴輿鬼西過未至軒轅後星而没没後餘中央曲如車輪俄頃化為白雲乆乃滅流星自下而升名曰飛星三年十月丙午有流星大如月赤白色尾長七丈西北行入紫宫中光照墻垣四年正月辛未有流星大如三升塸赤色從北極第二星北一尺出北行一丈而沒九月壬子流星如鵝卵從栁北出入軒轅又一枚如𤓰大出西行沒空中永明元年六月己酉有流星如二升椀從紫宫出南行沒氐二年三月庚辰有流星如二升椀從天市中出南行在心後四年二月乙丑有流星大如一升器戊辰有流星大如五升器四月丁夘有流星大如一升器從南斗東北出西行經斗入氐六月丙戌有流星大如鴨卵從匏𤓰南出至虚而入八月辛未有流星大如三升塸從觜星南出西南行入天濛没十一月戊寅有流星大如二升塸白色從亢東北出行入天市十二月丁巳有流星大如三升椀白色從天市帝座出東北行一丈而没五年六月辛未有流星大如三升器没後有痕九月丙申有流星大如四升器白色有光照地十二月甲子西北有流星大如鴨卵黄白色尾長六尺西南行一丈餘没六年三月癸酉有流星大如鴨卵赤色無尾四月丙辰北面有流星大如二升器白色北行六尺而沒七月癸巳有流星大如鵝卵白色從匏𤓰南出西南行一丈没空中須㬰又有流星大如五升器白色從北河南出東北行一丈三尺没空中十月戊寅南面有流星大如鷄卵赤色在東南行没没後如連珠十二月壬寅有流星大如鵝卵黄白色尾長三丈有光没後有痕從梗河出西行一丈許没空中七年正月甲寅有流星如五升器白色尾長四尺從坐旗星岀西行入五車而過没空中六月丁丑流星大如二升器黄赤色有光尾長六尺許從亢南岀西行入翼中而没没後如連珠十月乙丑有流星如三升器赤黄色尾長六尺岀紫宫内北極星東南行三丈没空中壬辰流星如三升器白色有光從五車北岀行入紫宫抵北極第一第二星而過落空中尾如連珠仍有音響似雷太史奏名曰天狗八年四月癸巳有流星如二升器黄白色有光從心星南一尺許岀南行二丈没没後如連珠丁巳流星如鵝卵白色長五丈許從角星東北二尺岀西北行没太㣲西蕃上将星間六月癸未有流星如鴨卵赤色從紫宫中岀西南行未至大角五尺許没七月戊申有流星如五升器赤白色長七尺東南行二丈没空中十月乙亥有流星如鵝卵白色從紫宫中岀西北行三丈許没空中十一月乙未有流星如鵝卵赤白色有光無尾從氐北一丈岀南行入氐中没辛丑流星如鵝卵白色從参伐岀南行一丈没空中又有一流星大如三升器白色從軫中岀東南行入婁中没九年五月庚子有流星如鷄子白色無尾從紫宫裏黄帝座星西二尺岀南行一丈没空中丁未流星如李子白色無尾從奎東北大星東二尺岀東北行至天将軍而没戊申流星如鵝卵黄白色尾長二丈從箕星東一尺岀南行四丈没七月乙夘西南有流星大如二升器白色無尾西南行一丈餘没戊午有流星如二升器黄白色有光從天江星西出東北經天入参中而没没後如連珠閏七月戊辰流星如鵝卵赤色尾長二尺從文昌西行入紫宫没己巳西南有流星如二升器白色西南行一丈没九月戊子有流星大如雞卵白色從少㣲星北頭岀東行入太㣲抵帝座星而過未至東蕃次相一尺没如散珠十年正月甲戍有流星如五升器白色從氐中出東南行經房道過從心星南二尺没三月癸未有流星如雞卵青白色尾長四尺從牽牛南八寸岀南行一丈没空中十一年二月壬寅東北有流星如一升器白色無尾北行三丈而没四月丙申有流星如三升器白色有光尾長一丈許從箕星東北一尺岀行二丈許入斗度没空中臨没如連珠五月壬申有流星大如雞子黄白色從太㣲端門岀無所犯西南行一丈許没没後有痕七月辛酉有流星如雞子赤色無尾從氐中岀西行一丈五尺没空中戊寅有流星如雞卵黄白色從紫宫東蕃内岀東北行一丈五尺至北極第五星西北四尺没九月乙酉有流星如鴨卵黄白色從婁南一尺岀東行二丈十二月己丑西南有流星如三升器黄赤色無尾西南行三丈許没散如遺火永元三年夜天開黄色明照湏㬰有物絳色如小甕漸漸大如倉廩聲隆隆如雷墜太湖中野雉皆雊世人呼為木殃史臣案春秋緯天狗如大奔星有聲望之如火見則四方相射漢史云西北有三大星如日状名曰天狗天狗岀則人相食天官云天狗状如大鏡星又云如大流星色黄有聲其止地類狗所墜望之如火光炎炎衝天其上鋭其下圎如數頃田見則流血千里破軍殺将漢史又云昭明下為天狗所下兵起血流昭明星也洛書云昭明見而覇者出運斗樞云昭明有芒角兵徴也河圖云太白散為天狗漢史又云有星出其状赤白有光即為天狗其下小無足所下國易政衆説不同未詳孰是推亂亡之運此其必天狗乎老人星建元元年十一月戊辰老人星見南方丙上八月癸卯祠老人星永明三年八月丁酉老人星見南方丙上六年八月壬戌老人星見南方丙上七年七月壬戍老人星見南方丙上九年閏七月戊寅老人星見南方丙上十年八月乙酉老人星見十一年九月丙寅老人星見南方丙上白虹雲氣建元四年二月辛夘白虹貫日永明十年七月癸酉西方有白虹須㬰滅十一年九月甲午西方有白虹南頭指申北頭指戍上乆乆消㓕建元四年二月辛夘黒氣大小二枝東至卯西至酉廣五丈乆乆消㓕永明二年四月丁未北斗第六第七星間有一白氣四年正月辛未黄白氣長丈五尺許入太㣲永明四年正月癸未南靣有陣雲一丈許五年四月己巳有雲色黒廣五尺東頭指丑西頭指酉竝至地十一月乙巳東南有陣雲髙一丈北至夘東南至已乆乆㪚漫六年二月癸亥東西有一梗雲半天曲向西蒼白色三月庚辰南面有梗雲黒色廣六寸七年十月辛未有梗雲蒼黒色東頭至寅西頭指酉廣三尺貫紫宫乆乆消漫八年十一月乙未有梗雲黒色六尺許東頭至夘西頭至酉乆乆散漫十二月庚辰南靣有陣雲黒色髙一丈許東頭至已西頭至未乆乆散漫十一年七月丙辰東面有梗雲蒼白色廣二尺三寸南頭指已至地北頭指子至地乆乆漸散漫贊曰陽精火鏡隂靈水存有禀有射代為明昏垂光滿盖列景周渾具位臣輔備象街門災生霣薄祟起飛奔弗􅁯人懼瑜瑕辯論若任天道竈亦多言南齊書卷十三南齊書卷十三考證天文志下八月乙亥太白從行在房南第二左股次将星臣召南按左股係左服之訛房四星主車駕南星曰左驂次左服故曰第二左服癸未熒惑犯太㣲右執法丁酉熒惑犯太㣲右執法臣永祚按癸未至丁酉計十五日不書逆行熒惑安能兩犯右執法意者先犯左執法次犯右執法耶四月戊戌熒惑犯犯字下必有闕文有流星大如三升塸或疑塸字未詳臣承蒼按南史毗騫國嘗遺扶南王純金五十人食器形如圎盤又如瓦塸名為多羅受五升又如椀者受一升塸與甌通從瓦從土其義一也天狗状如大鏡星大鏡星無考天官書原文状如大奔星為是東西有一梗雲半天爾雅釋詁梗正直也豈雲之直者耶下文又言曲向西或先直後曲故云南齊書卷十三考證
