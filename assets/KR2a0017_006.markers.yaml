  - {type: variant, offset: 3921, length: 0, content: '', WYG: 南齊書卷六南齊書卷六考證眀帝夲紀三年春正月丁酉通鑑考異曰案長厯是月乙丑朔無丁酉下有己巳當作丁夘四年春正月庚午通鑑考異曰案長厯是月己丑朔無庚午通鑑所以不日永泰元年七月以太尉陳顯達為江州刺史臣祖庚按陳顯達傳顯達敗扵馬圈表解職不許求降號又不許乃除江州又云東昏立顯達彌不樂還京師得此授甚喜据此則刺史江州在東昏立後馬圏之敗亦在永元元年情事適合况眀帝末顯達方以三公撃魏不容無故除江州也南齊書卷六考證}
