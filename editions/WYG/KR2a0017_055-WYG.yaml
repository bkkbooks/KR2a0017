body:
  text: 南齊書卷五十五梁蕭子顯撰列傳第三十六孝義崔懷慎公孫僧逺吳欣之韓係伯孫淡華寶韓靈敏封延伯吳逹之王文殊朱謙之蕭叡眀樂頤江泌杜栖陸絳子曰父子之道天性也君臣之義也人之含孝禀義天生所同淳薄因心非俟學至遲遇為用不謝始庶之法驕慢之性多慙水菽之享夫色養盡力行義致身甘心壠畝不求聞逹斯即孟氏三樂之辭仲由負米之歎也通乎神明理緣感召情澆世薄方表孝慈故非内徳者所以寄心懷仁者所以標物矣埋名韞節鮮或昭著紀夫事行以列于篇崔懷慎清河東武城人也父邪利魯郡太守宋元嘉中没虜懷慎與妻房氏篤愛聞父陷没即日遣妻布衣蔬食如居䘮禮邪利後仕虜中書戒懷慎不許如此懷慎得書更號泣懷慎從叔模為滎陽太守亦同没虜模子雖居處改節而不廢婚宦大眀中懷慎宗人冀州刺史元孫北使虜問之曰崔邪利模竝力屈歸命二家子姪出處不同義將安在元孫曰王尊驅驥王陽囘車欲令忠孝竝𢎞臣子兩節太始初淮北陷没界上流奔者多有去就懷慎因此入北至桑乾邪利時已卒懷慎絶而後蘇載喪還青州徒跣氷雪土氣寒酷而手足不傷時人以為孝感喪畢以弟在南建元初又逃歸而弟亦已亡懷慎孤貧獨立宗黨哀之日斂給其升米永明中卒公孫僧逺㑹稽剡人也治父喪至孝事母及伯父甚謹年榖饑貴僧逺省飡減食以養母及伯弟亡無以葬身販貼與隣里供斂送之費躬負土手種松栢兄姊未婚嫁乃自賣為之成禮名聞郡縣太祖即位遣兼散騎常侍虞炎十二部使行天下建元三年表列僧逺等二十三人詔竝表門閭蠲租稅吳欣之晉陵利城人也宋元嘉末弟尉之為武進縣戍隨王誕起義太祖遣軍主華欽討之吏民皆散尉之獨留見執將死欣之詣欽乞代弟命辭淚哀切兄弟皆見原建元二年有詔蠲表永明初廣陵民章起之二息犯罪爭死太守劉悛表以聞韓係伯襄陽人也事父母謹孝襄陽土俗隣居種桑樹於界上為誌係伯以桑枝䕃妨他地遷堺上開數尺隣畔隨復侵之係伯輙更改種久之隣人慙愧還所侵地躬徃謝之建元三年蠲租税表門閭以夀終孫淡太原人也居長沙事母孝母疾不眠食以差為期母哀之後有疾不使知也豫章王領湘州辟驃騎行參軍建元三年蠲租税表門閭卒於家華寶晉陵無錫人也父豪義熙末戍長安寶年八歳臨别謂寶曰須我還當為汝上頭長安䧟虜豪殁寶年至七十不婚冠或問之者輙號慟彌日不忍答也同郡薛天生母遭艱菜食天生亦菜食母未免喪而死天生終身不食魚肉與弟有恩義又同郡劉懷𦙍與弟懷則年十歳遭父喪不絮帛不食鹽菜建元三年竝表門閭韓靈敏㑹稽剡人也早孤與兄靈珍竝有孝性母尋又亡家貧無以營凶兄弟共種瓜半畝朝採瓜子暮已復生以此遂辦葬事靈珍亡無子妻卓氏守節不嫁慮家人奪其志未嘗告歸靈敏事之如母晉陵吳康之妻趙氏父亡弟㓜值歳饑母老病篤趙詣鄉里自賣言辭哀切鄉里憐之人人分升米相救遂得免及嫁康之少時夫亡家欲更嫁誓死不貳義興蔣儁之妻黄氏夫亡不重嫁逼之欲赴水自殺乃止建元三年詔蠲租賦表門閭永眀元年㑹稽永興吳翼之母丁氏少喪夫性仁愛遭年荒分衣食以貽里中饑餓者隣里求借未嘗違同里陳穰父母死孤單無親戚丁氏收養之及長為營婚娶又同里王禮妻徐氏荒年客死山隂丁為買棺器自徃斂葬元徽末大雪商旅斷行村里比屋饑餓丁自出鹽米計口分賦同里左僑家露四喪無以葬丁為辦塜槨有三調不登者代為輸送丁長子婦王氏守寡執志不再醮州郡上言詔表門閭蠲租税又廣陵徐靈禮妻遭火救兒與兒俱焚死太守劉悛以聞又㑹稽人陳氏有三女無男祖父母年八九十老耄無所知父篤癃病母不安其室值歲饑三女相率於西湖採菱蓴更日至市貨賣未嘗虧怠鄉里稱為義門多欲取為婦長女自傷煢獨誓不肯行祖父母尋相繼卒三女自營殯葬為菴舍墓側又永興概中里王氏女年五歳得毒病兩目皆盲性至孝年二十父母死臨屍一呌眼皆血出小妹娥䑛其血左目即開時人稱為孝感縣令何曇秀不以聞又諸暨東洿里屠氏女父失明母痼疾親戚相棄鄉里不容女移父母逺住紵羅晝樵采夜紡績以供養父母俱卒親營殯葬負土成墳忽聞空中有聲云汝至性可重山神欲相驅使汝可為人治病必得大富女謂是􅔨魅弗敢從遂得病積時隣舍人有中溪蜮毒者女試治之自覺病便差遂以巫道為人治疾無不愈家産日益鄉里多欲娶之以無兄弟誓守墳墓不肯嫁為山賊刼殺縣令于琳之具言郡太守王敬則不以聞建武三年吳興乘公濟妻姚氏生二男而公濟及兄公願乾伯竝卒各有一子欣之天保姚養育之賣田宅為娶婦自與二男寄止隣家眀帝詔為其二子婚表門閭復徭役吳郡范法恂妻褚氏亦勤苦執婦業宋昇明中孫曇瓘謀反亡命褚謂其子僧簡曰孫越州先姑之姉子與汝父親則從母兄弟交則義重古人逃竄脱不免汝冝收之曇瓘尋伏法褚氏令僧簡徃斂葬年七十餘永明中卒僧簡在都聞病馳歸未至而褚已卒將殯舉屍不起尋而僧簡至焉封延伯字仲璉渤海人也有學行不與世人交事寡嫂甚謹州辟主簿舉秀才不就後乃仕垣崇祖為豫州啟太祖用為長史帯梁郡太守以疾自免僑居東海遂不至京師三世同財為北州所宗附豫章王辟中兵不就卒建元三年大使廵行天下義興陳𤣥子四世一百七十口同居武陵郡邵榮興文獻叔八世同居東海徐生之武陵范安祖李聖伯范道根五世同居零陵譚𢎞寶衡陽何𢎞華陽陽黑頭疎從四世同居竝共衣食詔表門閭蠲税租又蜀郡王續祖華陽郝道福竝累世同㸑建武三年明帝詔表門閭蠲調役吳逹之義興人也嫂亡無以葬自賣為十夫客以營冢槨從祖弟敬伯夫妻荒年被略賣江北逹之有田十畝貨以贖之與之同財共宅郡命為主簿固以讓兄又讓世業舊田與族弟弟亦不受田遂閑廢建元三年詔表門閭河南辛普明僑居㑹稽自少與兄同處一帳兄亡以帳施靈座夏月多蚊普明不以露寝見色兄将葬隣人嘉其義賻助甚多普明初受後皆反之贈者甚怪普明曰本以兄墓不周故不逆來意今何忍亡者餘物以為家財後遭母喪幾至毁滅揚州刺史豫章王辟為義曹從事年五十卒又有何伯璵弟㓜璵俱厲節操養孤兄子及長為婚推家業盡與之安貧枯槁誨人不倦鄉里呼為人師郡守下車莫不修謁永明十一年伯璵卒㓜璵少好佛法翦落長齋持行精苦梁初卒兄弟年並八十餘王文殊吳興故鄣人也父没虜文殊思慕泣血蔬食山谷三十餘年太守謝􅀢板為功曹不就永明十一年太守孔琇之表曰文殊性挺五常心符三教以父没獯庭抱終身之痛專席恒居銜罔極之䘏服紵縞以經年餌蔬菽以俟命婚義滅於天情官序空於素抱儻降甄異之恩牓其閭里鬱林詔牓門改所居為孝行里朱謙之字處光吳郡錢唐人也父昭之以學解稱於鄉里謙之年數歲所生母亡昭之假葬田側為族人朱㓜方燎火所焚同産姊密語之謙之雖小便哀戚如持喪年長不婚娶永眀中手刃殺㓜方詣獄自繫縣令申靈朂表上别駕孔稚珪兼記室劉璡司徒左西掾張融牋與刺史豫章王曰禮開報仇之典以申孝義之情法斷相殺之條以表權時之制謙之揮刃酬寃既申私禮繫頸就死又眀公法今仍殺之則成當世罪人宥而活之即為盛朝孝子殺一罪人未足𢎞憲活一孝子實廣風徳張緒陸澄是其鄉舊應具來由融等與謙之竝不相識區區短見深有恨然豫章王言之世祖時吳郡太守王慈太常張緒尚書陸澄竝表論其事世祖嘉其義慮相復報乃遣謙之隨曹虎西行將發㓜方子惲於津陽門伺殺謙之謙之之兄選之又刺殺惲有司以聞世祖曰此皆是義事不可問悉赦之吳興沈顗聞而歎曰弟死於孝兄殉於義孝友之節萃此一門選之字處林有志節著辯相論㓜時顧歡見而異之以女妻焉官至江夏王參軍蕭叡眀南蘭陵人領軍將軍諶從祖兄弟也父孝孫左軍叡明初仕員外殿中將軍少有至性奉親謹篤母病躬禱夕不假寐及亡不勝哀而卒永明五年世祖詔曰龍驤將軍安西中兵參軍松滋令蕭叡眀愛敬淳深色養盡禮喪過乎哀遂致毁滅雖未逹聖教而一至可愍宜加榮命以矜善人可贈中書郎樂頤字文徳南陽湼陽人世居南郡少而言行和謹仕為京府參軍父在郢州病亡頤忽思父涕泣因請假還中路果得父凶問頤便徒跣號咷出陶家後渚遇商人附載西上水漿不入口數日嘗遇病與母隔壁忍痛不言齧被至碎恐母之哀己也湘州刺史王僧䖍引為主簿以同僚非人棄官去吏部郎庾杲之嘗徃候頤為設食枯魚菜菹而已杲之曰我不能食此母聞之自出常膳魚羮數種杲之曰卿過於茅季偉我非郭林宗仕至郢州治中卒弟預亦孝父臨亡執其手以託郢州行事王奐預悲感悶絶吐血數升遂發病官至驃騎録事隆昌末預謂丹陽尹徐孝嗣曰外傳籍籍似有伊周之事君䝉武帝殊常之恩荷託付之重恐不得同人此舉人笑褚公至今齒冷孝嗣心甚納之建武中為永世令民懷其徳卒官有一老嫗行擔斛蔌若將詣市聞預死棄擔號泣鴈門解仲恭亦僑居南郡家行敦睦得纖豪財利輙與兄弟平分母病經時不差入山採藥遇一老父語之曰得丁公藤病立愈此藤近在前山際高樹垂下便是也忽然不見仲恭如其言得之治病母即差至江陵人猶有識此藤者江泌字士清濟陽考城人也父亮之員外郎泌少貧晝日斫屧夜讀書隨月光握卷升屋性行仁義衣弊恐虱饑死乃復取置衣中數日閒終身無復虱母亡後以生闕供養遇鮭不忍食食菜不食心以其有生意也歴仕南中郎行參軍所給募吏去役得時病莫有舎之者吏扶杖投泌泌親自隱䘏吏死泌為買棺無僮役兄弟共輿埋之領國子助教乘牽車至染烏頭見老翁歩行下車載之躬自歩去世祖以為南康王子琳侍讀建武中明帝害諸王後泌憂念子琳詣誌公道人問其禍福誌公覆香鑪灰示之曰都盡無所餘及子琳被害泌徃哭之淚盡繼之以血親視殯葬乃去時廣漢王侍讀嚴桓之亦哭王盡哀泌尋卒泌族人兗州治中泌黄門郎悆子也與泌同名世謂泌為孝江泌以别之杜栖字孟山吳郡錢唐人徴士京産子也同郡張融與京産相友毎相造言論栖常在側融指栖曰昔陳太丘之召元方方之為劣以今方古古人何貴栖出京師從儒士劉瓛受學善清言能彈琴飲酒名儒貴遊多敬待之中書郎周顒與京産書曰賢子學業清標後來之秀嗟愛之懷豈知云已所謂人之英彦若已有之也刺史豫章王聞其名辟議曹從事仍轉西曹佐竟陵王子良數致禮接國子祭酒何𦙍治禮又重栖以為學士掌婚冠儀以父老歸養怡情壠畝栖肥白長壯及京産疾旬日閒便皮骨自支京産亡水漿不入口七日晨夕不罷哭不食鹽菜每營買祭奠身自看視號泣不自持朔望節歳絶而復續吐血數升時何𦙍謝朏竝隱東山遺書敦譬誡以毁滅至祥禫暮夢見其父慟哭而絶初𦙍兄㸃見栖歎曰卿風韻如此雖獲嘉譽不永年矣卒時年三十六當世咸嗟惜焉建武二年剡縣有小兒年八歳與母俱得赤班病母死家人以小兒猶惡不令其知小兒疑之問云母嘗數問我病昨來覺聲羸今不復聞何謂也因自投下牀匍匐至母屍側頓絶而死鄉隣告之縣令宗善才求表廬事竟不行陸絳字魏卿吳郡人也父閑字遐業有風槩與人交不茍合少為同郡張緒所知仕至揚州别駕眀帝崩閑謂所親曰宫車晏駕百司將聽於冢宰主上地重才弱必不能振難將至矣乃感心疾不復預州事刺史始安王遥光反事敗閑以綱佐被召至杜姥宅尚書令徐孝嗣啟閑不預逆謀未及報徐世摽令殺之絳時隨閑抱閑頸乞代死遂并見殺史臣曰澆風一起人倫毁薄抑引之教徒聞珪璋之璞罕就若令事長移忠儻非行舉薑桂辛酸容遷本質而旌閭變里問餼存牢不過鰥寡齊矜力田等勸其於扶奬名教未為多也贊曰孝為行首義實因心白華秉節寒木齊心南齊書卷五十五
