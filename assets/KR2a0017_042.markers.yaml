  - {type: variant, offset: 4779, length: 0, content: '', WYG: 南齊書卷四十二南齊書卷四十二考證王晏傳字士彦南史作字休黙一字士彦漸見親侍侍汲古閣本作待元㑹畢乃召晏於華林省誅之臣宗萬按眀帝本紀四年正月丙辰晏伏誅通鑑考異曰丙辰正月二十八日也按郊禮必在正月既云未郊一日敕停則誅晏必非元㑹之日也本傳盖言元㑹禮後耳蕭諶傳諶於太祖為絶服族子通鑑諶世祖之族子也與此異仗身執還入省臣祖庚按通典唐制鎮戍之官給仗身其人眡鎮戍之上中下為差京官五品已上亦有仗身職員通鑑注云仗身執仗之衛士也一門二州兄弟三封臣祖庚按通鑑注云諶為南徐州誕為司州所謂二州也諶封衡陽郡公誄封西昌侯誕封安復侯所謂三封也蕭坦之傳以懃直為世祖所知臣祖庚按通鑑云嘗為東宫直閤為世宗所知注云既為東宫直閤則從世宗為是東宫亦有直閤將軍據此則祖字訛也並應還都汲古閣本作遷都尉江祏傳父徳隣南史作徳驎領南昌太守臣承蒼按齊世無南昌太守之官南史作領南平昌太守舅殊無渭陽之情臣承蒼按渭陽之詩言甥之致情於舅也後人多反用之南史晉安王子懋傳不意渭陽翻成梟鏡亦以渭陽為舅氏之稱南齊書卷四十二考證}
