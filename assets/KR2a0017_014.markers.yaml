  - {type: variant, offset: 5254, length: 0, content: '', WYG: 南齊書卷十四南齊書卷十四考證州郡志上揚州臣宗萬按漢始置揚州治在建康臺城西亦謂之西州丹陽郡臣宗萬按丹陽圖云自句容以西属鄣郡以東属㑹稽郡漢武帝元封二年改鄣郡為丹陽郡秣陵臣祖庚按宋白曰秣陵縣秦属鄣郡漢置揚州刺史理秣陵湖熟臣祖庚按漢湖熟侯國晋宋為縣㑹稽郡臣祖庚按秦置漢高帝六年為荆國十二年更名吴所謂吴㑹是也富陽臣宗萬按即漢富春縣本属㑹稽後属吴郡晋簡文鄭太后諱春孝武改曰富陽臨安臣宗萬按吴分餘杭為臨水縣晉武帝太康元年更名臨安属吴興郡武進臣祖庚按晋武帝太康元年分丹徒曲阿立縣属晋陵郡南渡後属南東海郡義興郡臣祖庚按即常州之宜興宋太平興國元年避太宗諱改為宜興義鄉臣祖庚按晉恵帝永興元年分吴興之長城立縣属義興郡南琅邪郡臣宗萬按沈約曰晋亂琅邪民随元帝過江者千餘户太興三年立懐徳縣丹陽雖有琅邪郡而無其地成帝成康元年桓溫領郡鎮江乗之蒲州金城上求割丹陽之江乗縣境立郡淩臣祖庚按因淩水得名應劭曰淩水岀淩縣西南入淮酈道元曰淩水岀凌縣東流逕其縣故城東而東南流入淮二説互異武原臣宗萬按水經注云武原縣在下邳縣西通典曰泗州下邳縣北有漢武原縣故城通鑑考異曰武原自漢以来属彭城郡宋志南彭城郡有武原縣而徐州之彭城無之盖自永嘉之亂其民南徙而故縣邱墟也南平昌郡臣祖庚按前漢属琅邪後漢属北海晋太康地志属城陽宋分立豫州臣祖庚按治夀陽在歴陽故謂西豫州邵陵臣祖庚按漢属汝南郡晋以後属潁川郡杜佑曰蔡川郾陵縣有古邵陵城汝陽郡臣祖庚按沈約曰晋太康地志無汝陽郡應是江左分汝南立汝陽漢舊縣属汝南郡汝南郡臣祖庚按宋豫州刺史治汝水水經注云汝水自汝南上蔡縣東逕懸瓠城北于湖注甬城臣宗萬按通鑑甬城當作角城水經注云角城在下邳睢陵縣南臨淮水其地據濟水入淮之口髙間曰角城去淮陽十八里杜佑曰角城晋安帝義熙中置在宿遷縣界五代志作甬城烏江臣祖庚按烏江縣始見于晋書属淮南郡不記置立宋属歴陽郡宋白曰晋太康六年于東城界置烏江縣此属臨江郡以并歴陽故也南兖州臣祖庚按晋成帝立治京口文帝始割江淮間為境治廣陵海陵郡臣祖庚按晋安帝分廣陵立郡山陽郡臣祖庚按晋安帝義熙中分廣陵立郡境内有地名山陽故名盱眙郡臣宗萬按盱眙本縣治前漢属臨淮郡後漢属下邳郡晋復属臨淮郡安帝分立盱眙郡鍾離郡臣祖庚按本縣治漢属九江郡晋属淮南郡安帝時分立属南兖州又通典鍾離縣東四十里有古鍾離城史記伍子胥傳吴㧞楚鍾離注古鍾離之國世本作終犁馬頭郡臣祖庚按沈約曰故淮南當塗縣地晋安帝立因山形而名属南豫州宋属徐州睢陵臣宗萬按前漢属淮南郡後漢属下邳郡宋属濟隂郡沈約曰濟隂本属兖州其民流寓徐土因割地為郡杜佑曰睢陵縣故城在泗州下邳縣東南吉陽臣祖庚按吴立縣於吉水之陽因以為名上饒臣宗萬按宋白曰信州有上饒縣本秦番縣界漢為番陽縣今州古城遺跡開皇中所廢古上饒也九域志番陽東南至上饒五百四十里龍川臣祖庚按顔師古曰裴氏廣州記云本博羅縣之東鄉也有龍穿地而岀即穴流水因以為號鬰林郡臣祖庚按故秦桂林郡属尉佗武帝光鼎六年開更名武平郡臣祖庚按吴孫皓建衡三年分交阯立新興郡晉武帝太康三年更名新昌属交州九徳郡臣祖庚按古越裳氏國沈約曰孫吴分立九徳郡盧容臣祖庚按即秦象郡象林縣地亦謂之象浦南齊書卷十四考證}
