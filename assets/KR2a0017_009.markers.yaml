  - {type: variant, offset: 14736, length: 0, content: '', WYG: 南齊書卷九南齊書卷九考證禮志上永明元年十二月有司奏今月三日臘祀太社稷臣祖庚按通典云顓頊祀共工氏子勾龍為社烈山氏子柱為稷又云社壇在東稷壇在西祭法云王為羣姓立社曰太社後漢建武二年立太社稷于洛陽其名昉此郊特牲云日用甲日之始也周初日猶用戊召誥云戊午乃社于新邑自定禮後始用甲也迨漢髙帝以春三月及臘祠后稷後漢二月八月及臘一嵗三祠晉武帝太康九年詔社實一神其倂社之祀東晉元帝依魏洛京之制立二社一稷永明十一年從何佟之議稱稷為太稷盖依漢制然云臘祀則知齊特嵗一舉行耳永明五年十月有司奏前准尚書令王儉議皇孫冠事歴代所無禮雖有嫡子嫡孫通典嫡孫上有無字元服之典宜異列蕃通典列蕃下有依於諸王則輕同於儲皇則重二句南齊書卷九考證}
