body:
  text: 南齊書卷五本紀第五海陵王海陵恭王昭文字季尚文惠太子第二子也永明四年封臨汝公邑千五百戶初為輔國將軍濟陽太守十年轉持節督南豫州諸軍事南豫州刺史將軍如故十一年進號冠軍將軍文惠太子薨還都鬱林王即位為中軍將軍領兵置佐封新安王邑二千戶隆昌元年為使持節都督揚南徐二州諸軍事揚州刺史將軍如故其年鬱林王廢尚書令西昌侯鸞議立昭文為帝延興元年秋七月丁酉即皇帝位以尚書令鎮軍大將軍西昌侯鸞為驃騎大將軍録尚書事揚州刺史宣城郡公詔曰太祖高皇帝英謀光大受命作齊世祖武皇帝宏猷冠世繼暉下武世宗文皇帝清明懿鑠四海宅心並德漏下泉功昭上象聲教所覃無思不洽洪基式固景祚方融而天步多阻運鍾否剝嗣君昏忍暴戾滋多棄侮天經悖滅人紀朝野重足遐邇側視民怨神恫宗祧如綴賴忠謨肅舉霄漢廓清俾三后之業絶而更紐七百之慶危而復安猥以沖人入纂乾緒載懷馭朽若墜諸淵思與黎元共綏燧福大赦改元文武賜位二等八月甲辰以新除衛尉蕭諶為中領軍司空王敬則進位太尉新除車騎大將軍陳顯達為司空尚書左僕射王晏為尚書令左衛將軍王廣之為豫州刺史驃騎大將軍鄱陽王鏘為司徒詔遣大使巡行風俗丁未詔曰新安國五品以上悉與滿自此以下皆聽解遣其欲仕者適其所樂以驍騎將軍河東王鉉為南徐州刺史西中郎將臨海王昭秀為車騎將軍南徐州刺史永嘉王昭粲為荊州刺史戊申以輔國將軍王詡為廣州刺史中書郎蕭遙欣為六允州刺史庚戌以車騎板行參軍李慶綜為寧州刺史辛亥以安西將軍王玄邈為中護軍新除後軍司馬蕭誕為徐州刺史壬子以冠軍司馬臧靈智為交州刺史乙卯申明織成金薄綵花錦繡履之禁九月癸酉詔曰頃者以淮關徭戍勤瘁於行役故覃以榮階薄酬厥勞勳狀淹留未集王府非所以急舍爵之典趣報功之旨便可分遣使部往彼銓用辛巳以前九真太守宋慈明為交州刺史癸未誅新除司徒鄱陽王鏘中軍大將軍隨郡王子隆遣平西將軍王廣之誅南六允州刺史安陸王子敬於是江州刺史晉安王子懋起兵遣中護軍王玄邈討之乙未驃騎大將軍鸞假黃鉞內外纂嚴又誅湘州刺史南平王鋭郢州刺史晉熙王銶南豫州刺史宜都王鏗丁亥以衛將軍廬陵王子卿為司徒撫軍將軍桂陽王鑠為中軍將軍開府儀同三司冬十月癸巳詔曰周設媒官趣及時之制漢務輕徭在休息之典所以布德弘教寬俗阜民朕君制八紘志敷九德而習俗之風為弊未改靜言多慍無忘昏昃督勸婚嫁宜嚴更申明必使禽幣以時摽梅息怨正廚諸役舊出州郡徵吏民以應其數公獲二旬私纍數朔又廣陵年常遞出千人以助淮戍勞擾為煩抑亦苞苴是育今並可長停別量所出諸縣使村長路都防城直縣為劇尤深亦宜禁斷丁酉解嚴進驃騎大將軍揚州刺史宣城公鸞為太傅領大將軍揚州牧加殊禮進爵為王戊戌誅新除中軍將軍桂陽王鑠撫軍將軍衡陽王鈞侍中祕書監江夏王鋒鎮軍將軍建安王子真左將軍巴陵王子倫癸卯以寧朔將軍蕭遙欣為豫州刺史新除黃門郎蕭遙昌為郢州刺史輔國將軍蕭誕為司州刺史宣城王輔政帝起居皆咨而後行思食蒸魚菜太官令答無録公命竟不與辛亥皇太后令曰司空後將軍丹陽尹右僕射中領軍八座夫明晦迭來屯平代有上靈所以眷命億兆所以歸懷自皇家淳耀列聖繼軌諸侯官方百神受職而殷憂時啓多難薦臻隆昌失德特紊人鬼非徒四海解體乃亦九鼎將移賴天縱英輔大匡社稷崩基重造墜典再興嗣主幼沖庶政多昧且早嬰疾弗克負荷所以宗正內侮戚藩外叛覘天視地人各有心雖二祖之德在民而七廟之危行及自非樹以長君鎮以淵器未允天人之望寧息姦宄之謀太傅宣城王胤體宣皇鍾慈太祖識冠生民功高造物符表夙著謳頌有在宜入承寶命式寧宗祏帝可降封海陵王吾當歸老別館昔宣帝中興漢室簡文重延晉祀庶我鴻基於茲永固言念家國感慶載懷建武元年詔海陵王依漢東海王強故事給虎賁旄頭畫輪車設鍾虡宮縣供奉所須每存隆厚十一月稱王有疾數遣御師占視乃殞之給溫明祕器衣一襲斂以衮冕之服大鴻臚監護喪事葬給轀輬車九旒大輅黃屋左纛前後部羽葆鼓吹挽歌二部依東海王故事諡曰恭王年十五史臣曰郭璞稱永昌之名有二日之象而隆昌之號亦同焉案漢中平六年獻帝即位便改元為光熹張讓段圭誅後改元為昭寧董卓輔政改元為永漢一歲四號也晉惠帝太安二年長沙王事敗成都王穎改元為永安穎自鄴奪河間王顒復改元為永興一歲三號也隆昌延興建武亦三改年號故知喪亂之軌迹雖千載而必同矣贊曰穆穆海陵因亡代興不先不後遭命是膺
