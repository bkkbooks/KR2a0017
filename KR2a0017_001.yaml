body:
  text: 南齊書卷一本紀第一高帝上太祖高皇帝諱道成字紹伯姓蕭氏小諱鬬將漢相國蕭何二十四世孫也何子酇定侯延生侍中彪彪生公府掾章章生皓皓生仰仰生御史大夫望之望之生光祿大夫育育生御史中丞紹紹生光祿勳閎閎生濟陰太守闡闡生吳郡太守永永生中山相苞苞生博士周周生蛇丘長矯矯生州從事逵逵生孝廉休休生廣陵府丞豹豹生太中大夫裔裔生淮陰令整整生即丘令俊俊生輔國參軍樂子宋升明二年九月贈太常生皇考蕭何居沛侍中彪免官居東海蘭陵縣中都鄉中都里晉元康元年分東海為蘭陵郡中朝亂淮陰令整字公齊過江居晉陵武進縣之東城里寓居江左者皆僑置本土加以南名於是為南蘭陵蘭陵人也皇考諱承之字嗣伯少有大志才力過人宗人丹陽尹摹之北六允州刺史源之並見知重初為建威府參軍義熙中蜀賊譙縱初平皇考遷揚武將軍安固汶山二郡太守善於綏撫元嘉初徙為威烈將軍濟南太守七年右將軍到彥之北伐大敗虜乘勝破青部諸郡國別帥安平公乙旃眷寇濟南皇考率數百人拒戰退之虜衆大集皇考使偃兵開城門衆諫曰賊衆我寡何輕敵之甚皇考曰今日懸守窮城事已危急若復示弱必為所屠惟當見強待之耳虜疑有伏兵遂引去青州刺史蕭思話欲委鎮保險皇考固諫不從思話失據潰走明年征南大將軍檀道濟於壽張轉戰班師滑臺陷沒六允州刺史竺靈秀抵罪宋文帝以皇考有全城之功手書與都督長沙王義欣曰承之理民直亦不在武幹後今擬為六允州檀征南詳之皇考與道濟無素故事遂寢遷輔國鎮北中兵參軍員外郎十年蕭思話為梁州刺史皇考為其橫野府司馬漢中太守氐帥楊難當寇漢川梁州刺史甄法護棄城走思話至襄陽不進皇考輕軍前行攻氐偽魏興太守薛健於黃金山剋之黃金山張魯舊戍南接漢川北枕驛道險固之極健既潰散皇考即據之氐偽梁秦二州刺史趙溫先據州城聞皇考至退據小城薛健退屯下桃城立柴營皇考引軍與對壘相去二里健與偽馮翊太守蒲旱早子悉力出戰皇考大破之健等閉營自守不敢出思話繼至賊乃稍退皇考進至峨公山為左衛將軍沙州刺史呂平大衆所圍積日建武將軍蕭汪之平西督護段虯等至表𩹉奮擊大破之難當又遣息和領步騎萬餘人夾漢水兩岸援趙溫攻逼皇考相拒四十餘日賊皆衣犀甲刀箭不能傷皇考命軍中斷槊長數尺以大斧捶其後賊不能當乃焚營退皇考追至南城衆軍自後而進連戰皆捷梁州平詔曰承之稟命先驅蒙險深入全軍屢剋奮其忠果可龍驤將軍隨府轉寧朔司馬太守如故入為太子屯騎校尉文帝以平氐之勞青州缺將欲授用彭城王義康秉政皇考不附乃轉為江夏王司徒中兵參軍龍驤將軍南泰山太守封晉興縣五等男邑三百四十戶遷右軍將軍元嘉二十四年殂年六十四梁土民思之於峨公山立廟祭祀升明二年贈散騎常侍金紫光祿大夫太祖以元嘉四年丁卯歲生姿表英異龍顙鍾聲鱗文遍體儒士雷次宗立學於雞籠山太祖年十三受業治禮及左氏春秋十七年宋大將軍彭城王義康被黜鎮豫章皇考領兵防守太祖舍業南行十九年竟陵蠻動文帝遣太祖領偏軍討沔北蠻二十一年伐索虜至丘檻山並破走二十三年雍州刺史蕭思話鎮襄陽啓太祖自隨戍沔北討樊鄧諸山蠻破其聚落初為左軍中兵參軍二十七年索虜圍汝南戍主陳憲臺遣寧朔將軍臧質安蠻司馬劉康祖救之文帝使太祖宣旨授節度聞虜主拓跋燾向彭城質等回軍救援至盱眙太祖與質別軍主胡宗之等五軍步騎數千人前驅燾已潛過淮卒相遇於莞山下合戰敗績緣淮奔退宗之等皆陷沒太祖還就質固守為虜所攻圍甚危急事寧還京師二十九年領偏軍征仇池梁州西界舊有武興戍晉隆安中沒屬氐武興西北有蘭皋戍去仇池二百里太祖擊二壘皆破之遂從谷口入關未至長安八十里梁州刺史劉秀之遣司馬馬注助太祖攻談堤城拔之虜偽河間公奔走虜救兵至太祖軍力疲少又聞文帝崩乃燒城還南鄭襲爵晉興縣五等男孝建初除江夏王大司馬參軍隨府轉太宰遷員外郎直閣中書舍人西陵陽王撫軍參軍建康令新安王子鸞有盛寵簡選僚佐為北軍中郎中兵參軍陳太后憂起為武烈將軍復為建康令中兵如故景和世除後軍將軍值明帝立為右軍將軍時四方反叛會稽太守尋陽王子房及東諸郡皆起兵明帝加太祖輔國將軍率衆東討至晉陵與賊前鋒將程捍孫曇瓘等戰一日破賊十二壘分軍定諸縣晉陵太守袁摽棄城走東境諸城相繼奔散徐州刺史薛安都反彭城從子索兒寇淮陰山陽太守程天祚舉城叛徐州刺史申令孫又降徵太祖討之時太祖平東賊還又將南討出次新亭前軍已發而索兒自睢陵渡淮馬步萬餘人擊殺臺軍主孫耿縱兵逼前軍張永營告急明帝聞賊渡遽追太祖往救之屯破釜索兒向鍾離永遣寧朔將軍王寬據盱眙遏其歸路索兒擊破臺軍主高道慶走之於石鱉將西歸王寬與軍主任農夫先據白鵠澗張永遣太祖馳督寬索兒東要擊太祖使不得前太祖鼓行結陳直入寬壘索兒望見不敢發經數日索兒引軍頓石梁太祖追之至葛冢候騎還云賊至太祖乃頓軍引管分兩馬軍夾營外以待之俄頃賊馬步奄至又推火車數道攻戰相持移日乃出輕兵攻賊西使馬軍合擊其後賊衆大敗追奔獲其器仗進屯石梁澗北索兒夜遣千人來斫營營中驚太祖臥不起宣令左右案部不得動須臾賊散太祖議欲於石梁西南高地築壘通南道斷賊走路索兒果來爭之太祖率軍擊破之賊馬自相踐藉死索兒走向鍾離太祖追至黯黮而還除驍騎將軍封西陽縣侯邑六百戶遷巴陵王衛軍司馬隨鎮會稽江州刺史晉安王子勛遣臨川內史張淹自鄱陽嶠道入三吳臺軍主沈思仁與偽龍驤將軍任皇鎮西參軍劉越緒各據險相守明帝遣太祖領三千人討之時朝廷器甲皆充南討太祖軍容寡闕乃編棕皮為馬具裝析竹為寄生夜舉火進軍賊望見恐懼未戰而走還除桂陽王征北司馬南東海太守行南徐州事初明帝遣張永沈攸之以衆喻降薛安都謂太祖曰吾今因此北討卿意以為何如太祖對曰安都才識不足狡猾有餘若長轡緩御則必遣子入朝今以兵逼之彼將懼而為計恐非國之利也帝曰衆軍猛鋭何往不剋卿每杖策幸勿多言安都見兵至果引索虜永等敗於彭城淮南孤弱以太祖為假冠軍將軍持節都督北討前鋒諸軍事鎮淮陰泰始三年沈攸之吳喜北敗於睢口諸城戍大小悉奔歸虜遂退進至淮北圍角城戍主賈法度力弱不敵諸將勸太祖渡岸救之太祖不許遣軍主高道慶將數百張弩浮艦淮中遙射城外虜弩一發數百箭俱去虜騎相引避之乃命進戰城圍即解遷督南六允徐二州諸軍事南六允州刺史持節假冠軍督北討如故五年進督六允青冀三州六年除黃門侍郎領越騎校尉不拜復授冠軍將軍留本任明帝常嫌太祖非人臣相而民間流言云蕭道成當為天子明帝愈以為疑遣冠軍將軍吳喜以三千人北使令喜留軍破釜自持銀壺酒封賜太祖太祖戎衣出門迎即酌飲之喜還帝意乃悅七年徵還京師部下勸勿就徵太祖曰諸卿暗於見事主上自誅諸弟為太子稚弱作萬歲後計何關他族惟應速發事緩必見疑今骨肉相害自非靈長之運禍難將興方與卿等勠力耳拜散騎常侍太子左衛率時世祖以功當別封贛縣太祖以一門二封固辭不受詔許之加邑二百戶明帝崩遺詔為右衛將軍領衛尉加兵五百人與尚書令袁粲護軍褚淵領軍劉勔共掌機事又別領東北選事尋解衛尉加侍中領石頭戍軍事明帝誅戮蕃戚江州刺史桂陽王休範以人凡獲全及蒼梧王立更有窺窬之望密與左右閹人於後堂習馳馬招聚亡命元徽二年五月舉兵於尋陽收略官民數日便辦衆二萬人騎五百匹發盆口悉乘商旅船舫大雷戍主杜道欣鵲頭戍主劉愆期告變朝廷惶駭太祖與護軍褚淵征北張永領軍劉勔僕射劉秉遊擊將軍戴明寶驍騎將軍阮佃夫右軍將軍王道隆中書舍人孫千齡員外郎楊運長集中書省計議莫有言者太祖曰昔上流謀逆皆因淹緩至於覆敗休範必遠懲前失輕兵急下乘我無備今應變之術不宜念遠若偏師失律則大沮衆心宜頓新亭白下堅守宮掖東府石頭以待賊千里孤軍後無委積求戰不得自然瓦解我請頓新亭以當其鋒征北可以見甲守白下中堂舊是置兵地領軍宜屯宣陽門為諸軍節度諸貴安坐殿中右軍諸人不須競出我自前驅破賊必矣因索筆下議並注同中書舍人孫千齡與休範有密契獨曰宜依舊遣軍據梁山魯顯間右衛若不出白下則應進頓南州太祖正色曰賊今已近梁山豈可得至新亭既是兵衝所以欲死報國耳常日乃可屈曲相從今不得也座起太祖顧謂劉勔曰領軍已同鄙議不可改易乃單車白服出新亭加太祖使持節都督征討諸軍平南將軍加鼓吹一部治新亭城壘未畢賊前軍已至太祖方解衣高臥以安衆心乃索白虎幡登西垣使寧朔將軍高道慶羽林監陳顯達員外郎王敬則浮舸與賊水戰自新林至赤岸大破之燒其船艦死傷甚衆賊步上新林太祖馳使報劉勔急開大小桁撥淮中船舫悉渡北岸休範乘肩輿率衆至壘南上遣寧朔將軍黃回馬軍主周盤龍將步騎出壘對陳休範分兵攻壘東短兵接戰自巳至午衆皆失色太祖曰賊雖多而亂尋破也楊運長領三齊射手七百人引強命中故賊不得逼城未時張敬兒斬休範首太祖遣隊主陳靈寶送首還臺靈寶路中遇賊軍埋首道側臺軍不見休範首愈疑懼賊衆亦不知休範已死別率杜黑蠡急攻壘東司空主簿蕭惠朗數百人突入東門叫噪至堂下城上守門兵披退太祖挺身上馬率數百人出戰賊皆推楯而前相去數丈分兵橫射太祖引滿將發左右將戴仲緒舉楯扞之箭應手飲羽傷百餘人賊死戰不能當乃却衆軍復得保城與黑蠡拒戰自晡達明旦矢石不息其夜大雨鼓叫不復相聞將士積日不得寢食軍中馬夜驚城內亂走太祖秉燭正坐厲聲呵止之如此者數四賊帥丁文豪設伏破臺軍於皂莢橋直至朱雀桁劉勔欲開桁王道隆不從勔及道隆並戰沒初勔高尚其意託造園宅名為東山頗忽世務太祖謂之曰將軍以顧命之重任兼內外主上春秋未幾諸王並幼沖上流聲議遐邇所聞此是將軍艱難之日而將軍深尚從容廢省羽翼一朝事至雖悔可何追勔竟不納賊進至杜姥宅車騎典籤茅恬開東府納賊冠軍將軍沈懷明於石頭奔散張永潰於白下宮內傳新亭亦陷太后執蒼梧王手泣曰天下敗矣太祖遣軍主陳顯達任農夫張敬兒周盤龍等從石頭濟淮間道從承明門入衛宮闕休範既死典籤許公與詐稱休範在新亭士庶惶惑詣壘投名者千數太祖隨得輒燒之乃列兵登城北謂曰劉休範父子先昨皆已即戮尸在南岡下身是蕭平南諸君善見觀君等名皆已焚除勿有懼也臺分遣衆軍擊杜姥宅宣陽門諸賊皆破平之太祖振旅凱入百姓緣道聚觀曰全國家者此公也太祖與袁粲褚淵劉秉引咎解職不許遷散騎常侍中領軍都督南六允徐邧冀五州軍事鎮軍將軍南六允州刺史持節如故進爵為公增邑二千戶太祖欲分其功請益粲等戶更日入直決事號為四貴秦時有太后穰侯涇陽高陵君稱為四貴至是乃復有焉四年加太祖尚書左僕射本官如故休範平後蒼梧王漸行凶暴南徐州刺史建平王景素少有令譽朝野歸心景素亦潛為自全之計布款誠於太祖太祖拒而不納七月羽林監袁祗奔景素便舉兵太祖出屯玄武湖遣衆軍北討事平乃還太祖威名既重蒼梧王深相猜忌幾加大禍陳太妃罵之曰蕭道成有功於國今若害之後誰復為汝著力者乃止太祖密謀廢立五年七月戊子帝微行出北湖常單馬先走羽儀禁衛隨後追之於堤塘相蹈藉左右張互兒馬墜湖帝怒取馬置光明亭前自馳騎刺殺之因共屠割與左右作羌胡伎為樂又於蠻岡賭跳際夕乃還仁壽殿東阿氈屋中寢語左右楊玉夫伺織女度報我時殺害無常人懷危懼玉夫與其黨陳奉伯等二十五人同謀於氈屋中取千牛刀殺蒼梧王稱敕使廂下奏伎因將首出與王敬則敬則送太祖太祖夜從承明門乘常所騎赤馬入殿內驚怖既知蒼梧王死咸稱萬歲及太祖踐阼號此馬為龍驤將軍世謂為龍驤赤明日太祖戎服出殿庭槐樹下召四貴集議太祖謂劉秉曰丹陽國家重戚今日之事屬有所歸秉讓不當太祖次讓袁粲粲又不受太祖乃下議備法駕詣東城迎立順帝於是長刀遮粲秉等各失色而去甲午太祖移鎮東府與袁粲褚淵劉秉各甲仗五十人入殿丙申進位侍中司空録尚書事驃騎大將軍持節都督刺史如故封竟陵郡公邑五千戶給油幢絡車班劒三十人太祖固辭上台即驃騎大將軍開府儀同三司庚戌進督南徐州刺史封楊玉夫等二十五人爵邑各有差十月戊辰又進督豫司二州初荊州刺史沈攸之與太祖於景和世同直殿省申以歡好以長女義興公主妻攸之第三子元和攸之為郢州值明帝晚運陰有異圖自郢州遷為荊州聚斂兵力將吏逃亡輒討質鄰伍養馬至二千餘匹皆分賦戍邏將士使耕田而食廩財悉充倉儲荊州作部歲送數千人仗攸之割留簿上供討四山蠻裝治戰艦數百千艘沈之靈溪𩹉錢帛器械巨積朝廷畏之高道慶家在華容假還過江陵道慶素便馬攸之與宴飲於聽事前合馬槊道慶槊中破攸之馬鞍攸之怒索刃槊道慶馳馬而出還都説攸之反狀請三千人襲之朝議慮其事難濟太祖又保持不許太祖既廢立遣攸之子司徒左長史元琰賫蒼梧王諸虐害器物示之攸之未得即起兵乃上表稱慶并與太祖書推功攸之有素書十數行常韜在裲襠角云是明帝與己約誓十二月遂舉兵其妾崔氏許氏諫攸之曰官年已老那不為百口計攸之指裲襠角示之稱太后令召己下都京師恐懼乙卯太祖入居朝堂命諸將西討平西將軍黃回為都督前驅前湘州刺史王蘊太后兄子少有膽力以父揩名宦不達欲以將途自奮每撫刀曰龍淵太阿汝知我者叔父景文誡之曰阿答汝滅我門戶蘊曰答與童烏貴賤覺異童烏景文子絢小字答蘊小字也蘊遭母喪罷任還至巴陵停舟一月日與攸之密相交構時攸之未便舉兵蘊乃下達郢州世祖為郢州長史蘊期世祖出弔因作亂據郢城世祖知之不出蘊還至東府前又期太祖出太祖又不出弔再計不行外謀愈固司徒袁粲尚書令劉秉見太祖威權稍盛慮不自安與蘊及黃回等相結舉事殿內宿衛主帥無不協同攸之反問初至太祖往石頭與粲謀議粲稱疾不相見剋壬申夜起兵據石頭劉秉恇怯晡時從丹陽郡載婦女入石頭朝廷不知也其夜丹陽丞王遜告變秉從弟領軍韜韞及直閣將軍卜伯興等嚴兵為內應太祖命王敬則於宮內誅之遣諸將攻石頭王蘊將數百精手帶甲赴粲城門已閉官軍又至乃散衆軍攻石頭斬粲劉秉走雒簷湖蘊逃場並禽斬之粲位任雖重無經世之略踈放好酒步屧白楊郊野間道遇一士大夫便呼與酣飲明日此人謂被知顧到門求通粲曰昨飲酒無偶聊相要耳竟不與相見嘗作五言詩云訪迹雖中宇循寄乃滄州蓋其志也劉秉少以宗室清謹見知孝武世秉弟遐坐通嫡母殷氏養女殷亡口中血出衆疑行毒害孝武使秉從弟祗諷秉啓證其事秉曰行路之人尚不應爾今日乃可一門同盡無容奉敕衆以此稱之故為明帝所任蒼梧廢秉出集議於路逢弟韞韞開車迎問秉曰今日之事固當歸兄邪秉曰吾等已讓領軍矣韞槌曰君肉中詎有血粲典籤莫嗣祖知粲謀太祖召問嗣祖袁謀反何不啓聞嗣祖曰事主義無二心雖死不敢泄也蘊嬖人張承伯藏匿蘊太祖並赦而用之黃回頓新亭聞石頭鼓噪率兵來赴之朱雀耳臼兒有戍軍受節度不聽夜過會石頭已平因稱救援太祖知而不言撫之愈厚遣回西上流涕告別太祖屯閲武堂馳結軍旅閏月辛丑詔假黃鉞率大衆出屯新亭中興堂治嚴築壘教曰河南稱慈諒由掩胔廣漢流仁實存殯朽近袤製茲營崇溝浚塹古墟曩隧時有湮移深松茂草或致刊剃憑軒動懷巡隍增愴宜並為收改葬并設薄祀二年正月沈攸之攻郢城不剋衆潰自經死傳首京邑丙子太祖旋鎮東府二月癸未進太祖太尉增封三千戶都督南徐南六允徐六允青冀司豫荊雍湘郢梁益廣越十六州諸軍事太祖解驃騎辭都督不許乃表送黃鉞三月己酉增班劒為四十人甲仗百人入殿丙子加羽葆鼓吹餘並如故辛卯太祖誅鎮北將軍黃回大明泰始以來相承奢侈百姓成俗太祖輔政罷御府省二尚方諸飾玩至是又上表禁民間華偽雜物不得以金銀為箔馬乘具不得金銀度不得織成繡裙道路不得著錦履不得用紅色為幡蓋衣服不得翦綵帛為雜花不得以綾作雜服飾不得作鹿行錦及局腳柳柏床牙箱籠雜物綵帛作屏鄣錦緣薦席不得私作器仗不得以七寶飾樂器又諸雜漆物不得以金銀為花獸不得輒鑄金銅為像皆須墨敕凡十七條其中宮及諸王服用雖依舊例亦請詳衷九月丙午進位假黃鉞都督中外諸軍事太傅領揚州牧劒履上殿入朝不趨贊拜不名置左右長史司馬從事中郎掾屬各四人使持節太尉驃騎大將軍録尚書南徐州刺史如故固辭詔遣敦勸乃受黃鉞辭殊禮甲寅給三望車三年正月乙巳太祖表蠲百姓逋負丙辰加前部羽葆鼓吹丁巳命太傅府依舊辟召丁卯給太祖甲仗五百人出入殿省甲午重申前命劒履上殿入朝不趨贊拜不名三月甲辰詔進位相國總百揆封十郡為齊公備九錫之禮加璽紱遠遊冠位在諸侯王上加相國緑綟綬其驃騎大將軍揚州牧南徐州刺史如故太祖三讓公卿敦勸固請乃受甲寅策相國齊公曰天地變通莫大乎炎涼懸象著明莫崇乎日月嚴冬播氣貞松之操自高光景時昏若華之映彌顯是故英睿當亂而不移忠賢臨危而盡節自景和昏虐王綱薥紊太宗受命紹開中興運屬屯難四郊多壘蕭將軍震威華戎實資義烈康國濟民於是乎在朕以不造夙罹閔凶嗣君失德書契未紀威侮五行虔劉九縣神歇靈繹海水羣飛彝器已塵宗禋誰主綴旒之殆未足為譬豈直小宛興刺黍離作歌而已哉天贊皇宋實啓明宰爰登寡昧纂承大業鴻緒再維閎基重造高勳至德振古絶倫昔保衡翼殷博陸匡漢方斯蔑如也今將授公典禮其敬聽朕命乃者袁劉鄧構禍實繁有徒子房不臣稱兵協亂跨蹈五湖憑陵吳越浮祲辰沈氛晦景桴鼓振於王畿鋒鏑交乎天邑顧瞻宮掖將成茂草言念邦國翦為仇讎當此之時人無固志公投袂殉難超然奮發執金板而先馳登寅車而戒路軍政端嚴卒乘輯睦麾鉞一臨凶黨冰泮此則霸業之基勤王之始也安都背叛竊據徐方敢率犬羊陵虐淮滸索兒愚悖同惡相濟天祚無象背順歸逆北鄙黔黎奄墜塗炭均人廢職邊師告警公受命宗祊精貫朝日擁節和門氣踰霄漢破釜之捷斬馘蔽野石梁之戰禽其渠帥保境全民江陽即序此又公之功也張淹迷昧弗顧本朝受爰自南區志圖東夏潛軍間入竊覬不虞于時江服未夷皇塗荐阻公忠誠慷慨在險彌亮深識九變妙察五色以寡制衆所向風偃朝廷無東顧之憂閩越有來蘇之慶此又公之功也胸奴野心侵掠疆埸前師失律王旅崩撓灑血成川伏尸千里醜羯侜張勢振彭泗乘勝長驅窺覦京甸冠帶之軌將湮被髮之容行及公奉辭伐罪戒旦晨征兵車始交氛祲時蕩弔死撫傷弘宣皇澤俾我淮肥復沾盛化此又公之功也自茲厥後獫狁孔熾封豕長蛇重窺上國而世故相仍師出日老戰士無臨陳之心戎卒有懷歸之思是以下邳精甲望風振恐角城高壘指日淪陷公眷言王事發憤忘食躬擐甲胄視險若夷短兵才接巨猾鳥散分疆畫界開創青六允此又公之功也泰始之末入參禁旅任兼軍國事同顧命桂陽負衆輕問九鼎裂冠毀冕拔本塞源入兵萬乘之國頓戟象魏之下烈火焚於王城飛矢集乎君屋機變倏忽終古莫二羣后憂惶元戎無主公按劒凝神則奇謀貫世秉旄指麾則懦夫成勇曾不崇朝新亭獻捷信宿之間宣陽底定雲霧廓清區宇康乂此又公之功也皇室多難釁起戚蕃邘晉應韓翻為讎敵建平失圖興兵內侮公又指授六師義形乎色役未踰旬朱方寧晏此又公之功也蒼梧肆虐諸夏麋沸淫刑以逞誰則無罪火炎昆岡玉石俱焚黔首相悲朝不謀夕高祖之業已淪大文明之軌誰嗣公遠稽殷漢之義近遵魏晉之典猥以眇身入奉宗祏七廟清謐九區反政此又公之功也袁粲無質劉秉攜二韜韞述相扇成此亂階醜圖潛構危機竊發據有石頭志犯應路公神謀內運霜鋒外舉妖沴載澄國塗悅穆此又公之功也沈攸之苞禍歲月滋彰蜂目豺聲阻兵安忍哀彼荊漢獨為匪民乃眷西顧緬同異域而經綸維始九伐未申長惡不悛遂逞凶逆驅合姦回勢過虓虎朝野憂疑三軍沮氣公秉鉞出關凝威江甸正情與曒日同亮明略與秋雲競爽至義所感人百其心鼖鼓一麾夏首寧謐雲梯未舉魯山剋定積年逋誅一朝顯戮沮浦安流章臺順軌此又公之功也公有濟天下之勳重之以明哲道庇生民志匡宇宙勠力肆心劬勞王室自東徂西靡有寧晏險阻艱難備嘗之矣若乃締構宗稷之勤造物資始之澤雲布霧散光被六幽弼豫一人永清四海是以秬草騰芳於郊園景星垂暉於清漢遐方款關而慕義荒服重譯而來庭注汪哉邈乎無得而名焉朕聞疇庸表德前王盛典崇樹侯伯有國攸同所以文命成功玄圭顯錫姬旦秉哲曲阜啓蕃或改玉以弘風或胙土以宣化禮絶常班寵冠羣辟爰逮桓文車服異數惟公勳業超於先烈而褒賞闕於舊章古今之道何其爽歟靜言欽歎良有缺然今進授相國以青州之齊郡徐州之梁郡南徐州之蘭陵魯郡琅邪東海晉陵義興揚州之吳郡會稽凡十郡封公為齊公錫茲玄土苴以白茅定爾邦家用建冢社斯實尚父故蕃世作盟主紀綱侯甸率由舊則往者周邵建國師保兼任毛畢執圭入作卿士內外之寄同規在昔今命使持節兼太尉侍中中書監司空衛將軍雩都縣開國侯淵授公相國印綬齊公璽紱持節兼司空副守尚書令僧虔授齊公茅土金虎符第一至第五左竹使符第一至第十左相國位總百辟秩踰三鉉職以禮移號隨事革其以相國總百辟去録尚書之稱送所假節侍中貂蟬中外都督太傅太尉印綬竟陵公印策其驃騎大將軍揚州牧南徐州刺史如故又加公九錫其敬聽後命以公秉禮弘律儀刑區宇遐邇一體民無異業是用錫公大輅戎輅各一玄牡二駟公崇修南畝所寶惟穀王府充實百姓繁阜是用錫公袞冕之服赤舄副焉公居身以謙導物以義鎔鈞庶品罔不和悅是用錫公軒縣之樂六佾之公翼贊王猷聲教遠洽蠻夷竭歡回首內附是用錫公朱戶以居公明鑒人倫澄辨涇渭官方與能英乂克舉是用錫公納陛以登公保佑皇朝厲身化下杜漸防萌含生夤式是用錫公虎賁之士三百人公禦宄以刑禦姦以德君親無將將而必誅是用錫公鈇鉞各一公鳳舉四維龍騫八表威靈所振異域同文是用錫公彤弓一彤矢百玈弓十玈矢千公明發載懷肅恭禋祀孝敬之重義感靈祇是用錫公秬鬯一卣圭瓚副焉齊國置丞相以下一遵舊式往欽哉其祗服朕命經緯乾坤宏亮洪業茂昭爾大德闡揚我高祖之休命太祖三讓公卿敦勸固請乃受之丁巳下令赦國內殊死以下今月十五日昧爽以前一皆原赦魚衆寡孤獨不能自存者賜穀五斛府州所領亦同蕩然宋帝詔齊公十郡之外隨宜除用以齊國初建給錢五百萬布五千匹絹五千匹四月癸酉詔進齊公爵為王以豫州之南梁陳郡潁川陳留南六允州之盱眙山陽秦郡廣陵海陵南沛十郡增封使持節司空衛將軍褚淵奉策授璽紱金虎符第一至第五左竹使符第一至第十左錫茲玄土苴白茅改立王社相國揚州牧驃騎大將軍南徐州刺史如故丙戌命齊王冕十有二旒建天子旌旗出警入蹕乘金根車駕六馬備五時副車置旄頭雲罕樂八佾設鍾虡宮縣王世子為太子王女王孫爵命一如舊儀辛卯宋帝禪位下詔曰惟德動天玉衡所以載序窮神知化億兆所以歸心用能經緯乾坤彌綸宇宙闡揚鴻烈大庇生民晦往明來積代同軌前王踵武世必由之宋德湮微昏毀相襲景和騁悖於前元徽肆虐於後三光再霾七廟將墜璇極委馭含識知泯我文武之祚眇焉如綴靜惟此紊夕惕疚心相國齊王天誕睿聖河嶽炳靈拯傾提危澄氛靜亂匡濟艱難功均造物宏謀霜照祕算雲回旌斾所臨一麾必捷英風所拂無思不偃表𩹉清夷遐邇寧謐既而光啓憲章弘宣禮教姦宄之類覩隆威而隔情慕善之儔仰徽猷而增厲道邁於重華勳超乎文命蕩蕩乎無得而稱焉是以辮髮左衽之酋款關請吏木衣卉服之長航海來庭豈惟肅慎獻楛越嘗裳薦翬而已哉故四奧載宅六府克和川陸效珍禎祥鱗集卿煙玉露旦夕揚藻嘉穟芝英晷刻呈茂革運斯炳代終彌亮負扆握樞允歸明哲固以獄訟去宋謳歌適齊昔金政既淪水德締構天之曆數皎焉攸徵朕雖寡昧暗于大道稽覽隆替為日已久敢忘列代遺則人神至願乎便遜位別宮敬禪于齊一依唐虞魏晉故事是日宋帝遜于東邸備羽儀乘畫輪車出東掖門問今日何不奏鼓吹左右莫有答者壬辰策命齊王曰伊太古初陳萬物紛綸開耀靈以鑑品物立元后以馭蒸人若夫容成大庭之世宓羲五龍之辰靡得而詳焉自軒黃以降墳素所紀略可言者莫崇乎堯舜披金繩而握天鏡開玉匣而總地維德之休明宸居靈極期運有終歸禪與能所以大唐遜位耳我然興歌有虞揖讓卿雲發采亮符命之攸臻坦至公以成務懷生載懌靈祇效祉遺風餘烈光被無垠漢魏因循弗敢失墜爰逮晉氏亦遵前儀惟我祖宗英睿勳格幽顯從天人而齊七政凝至德而撫四維末葉不造仍世多故難滅星謀日蝕星隕山淪川竭惟王聖哲淵明榮鏡𧜛宙體望日之威資就雲之澤臨下以簡御衆以寬仁育羣生義征不譓國塗荐阻弘五慮而乂寧皇緒將湮秉六術以匡濟及至權臣內侮蕃屏陵上兵革雲翔萬邦震駭裁之以武風綏之以文化遐邇清夷表𩹉肅穆戢雕戈而事黼黻委旌門而恭儒館聲化遠洎荒服無塵殊類同規華戎一揆是以五光來儀於軒庭九穗含芳於郊牧象緯昭徹布新之符已顯圖讖彪炳受終之義既彰靈祇乃眷兆民引領朕聞至道深微惟人是弘天命無常惟德是與所以仰鑒玄情俯察羣望敬禪神器授帝位于爾躬四海困窮天祿永終於戲王其允執厥中儀刑前式以副率土之欣望命司裘而謁蒼昊奏雲門而升圓丘時膺大禮永保洪業豈不盛歟再命璽書曰皇帝敬問相國齊王大道之行與三代之英朕雖暗昧而有志焉夫昏明相襲晷景之恆度春秋遞運時歲之常序求諸天數猶且隆替矧伊在人能無終謝是故勛華弘風於上葉漢魏垂式於後昆昔我高祖欽明文思振民育德皇靈眷命奄有四海晚世多難姦宄實繁鼖鼓宵聞元戎旦警億兆夷人啓處靡厝加以嗣君荒怠敷虐萬方神鼎將遷寶策無主實賴英聖匡濟艱危惟王體天則地舍弘光大明並日月惠均雲雨國步斯梗則稜威外發王猷不造則淵謨內昭重構閩吳再寧淮濟靜九江之洪波卷海沂之氛沴放斥凶昧存我宗祀舊物惟新三光改照逮至寵臣裂冠則裁以廟略荊漢反噬則震以雷霆麾旆所臨風行草靡神算所指龍舉雲屬諸夏廓清戎翟思韙興文偃武闡揚洪烈明保沖昧翺翔禮樂之場撫柔黔首咸濟躋仁壽之域自霜露所墜星辰所經正朔不通人迹罕至者莫不踰山越海北面稱蕃款關重譯修其職貢是以禎祥發采左史載其奇玄象垂文保章審其度鳳書表肆類之運龍圖顯班瑞之期重以珠衡日角神姿特挺君人之義在事必彰書不云乎皇天無親惟德是輔民心無常惟惠之懷神祇之眷如彼蒼生之願如此笙管變聲鍾石改調朕所以擁琁持衡傾佇明哲昔金德既淪而傳祚于我有宋曆數告終實在茲日亦以水德而傳于齊式遵前典廣詢羣議王公卿士咸曰惟宜今遣使持節兼太保侍中中書監司空衛將軍雩都縣侯淵兼太尉守尚書令僧虔奉皇帝璽綬受終之禮一依唐虞故事王其允副幽明時登元后寵綏八表以酬昊天之休命太祖三辭宋帝王公以下固請兼太史令將作匠陳文建奏符命曰六亢位也後漢自建武至建安二十五年一百九十六年而禪魏魏自黃初至咸熙二年四十六年而禪晉晉自太始至元熙二年一百五十六年而禪宋宋自永初元年至升明三年凡六十年咸以六終六受六亢位也驗往揆今若斯昭著敢以職任備陳管穴伏願順天時膺符瑞二朝百辟又固請尚書右僕射王儉奏被宋詔遜位臣等參議宜剋日輿駕受禪撰立儀注太祖乃許焉史臣曰案太一九宮占推漢高五年太一在四宮主人與客俱得吉計先舉事者勝是歲高祖破楚晉元興二年太一在七宮太一為帝天目為輔佐迫脅太一是年安帝為桓玄所逼出宮大將在一宮參相在三宮格太一經言格者已立政事上下格之不利有為安居之世不利舉動元興三年太一在七宮宋武破桓玄元嘉元年太一在六宮不利有為徐傅廢營陽王七年太一在八宮關囚惡歲大小將皆不得立其年到彥之北伐初勝後敗客主俱不利十八年太一在二宮客主俱不利是歲氐楊難當寇梁益來年仇池破十九年大小將皆見關不立凶其年裴方明伐仇池剋百頃明年失之泰始元年太一在二宮為大小將奄擊之其年景和廢二年太一在三宮不利先起主人勝其年晉安王子勛反元徽二年太一在六宮先起敗是歲桂陽王休範反並伏誅四年太一在七宮先起者客西北走其年建平王景素敗升明元年太一在七宮不利為客安居之世舉事為主人應發為客袁粲沈攸之等反伏誅是歲太一在杜門臨八宮宋帝禪位不利為客安居之世舉事為主人禪代之應也策文難滅星謀疑
