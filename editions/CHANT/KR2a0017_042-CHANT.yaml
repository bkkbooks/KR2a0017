body:
  text: 卷四十二列傳第二十三王晏王晏字士彥琅邪臨沂人也祖弘之通直常侍父普曜祕書監晏宋大明末晏起家臨賀王國常侍員外郎巴陵王征北板參軍安成王撫軍刑獄隨府轉車騎晉熙王燮為郢州晏為安西主簿世祖為長史與晏相遇府轉鎮西板晏記室諮議沈攸之事難鎮西職僚皆隨世祖鎮盆城上時權勢雖重而眾情猶有疑惑晏便專心奉事軍旅書翰皆委焉性甚便僻漸見親侍乃留為上征虜撫軍府板諮議領記室從還都遷領軍司馬中軍從事中郎常在上府參議機密建元初轉太子中庶子世祖在東宮專斷朝事多不聞啟晏慮及罪稱疾自疏尋領射聲校尉不拜世祖即位轉長兼侍中意任如舊永明元年領步兵校尉遷侍中祭酒校尉如故遭母喪起為輔國將軍司徒左長史晏父普曜藉晏勢宦多歷通官晏尋遷左衛將軍加給事中未拜而普曜卒居喪有稱起冠軍將軍司徒左長史濟陽太守未拜遷衛尉將軍如故四年轉太子詹事加散騎常侍六年轉丹陽尹常侍如故晏位任親重朝夕進見言論朝事自豫章王嶷尚書令王儉皆降意以接之而晏每以疏漏被上呵責連稱疾久之上以晏須祿養七年轉為江州刺史晏固辭不願出外見許留為吏部尚書領太子右衛率終以舊恩見寵時尚書令王儉雖貴而疏晏既領選權行臺閣與儉頗不平儉卒禮官議諡上欲依王導諡為文獻晏啟上曰導乃得此諡但宋以來不加素族出謂親人曰平頭憲事已行矣八年改領右衛將軍陳疾自解上欲以高宗代晏領選手敕問之晏啟曰鸞清幹有餘然不諳百氏恐不可居此職上乃止明年遷侍中領太子詹事本州中正又以疾辭十年改授散騎常侍金紫光祿大夫給親信二十人中正如故十一年遷右僕射領太孫右衛率世祖崩遺旨以尚書事付晏及徐孝嗣令久於其職鬱林即位轉左僕射中正如故隆昌元年加侍中高宗謀廢立晏便響應推奉延興元年轉尚書令加後將軍侍中中正如故封曲江縣侯邑千戶給鼓吹一部甲仗五十人入殿高宗與晏宴於東府語及時事晏扺掌曰公常言晏怯今定何如建武元年進號驃騎大將軍給班劍二十人侍中令中正如故又加兵百人領太子少傅進爵為公增邑為二千戶以虜動給兵千人晏為人篤於親舊為世祖所稱至是自謂佐命惟新言論常非薄世祖故事眾始怪之高宗雖以事際須晏而心相疑斥料簡世祖中詔得與晏手敕三百餘紙皆是論國家事以此愈猜薄之初即位始安王遙光便勸誅晏帝曰晏於我有勳且未有罪遙光曰晏尚不能為武帝安能為陛下帝默然變色時帝常遣心腹左右陳世範等出塗巷採聽異言由是以晏為事晏輕淺無防慮望開府數呼相工自視云當大貴與賓客語好屏人請間上聞之疑晏欲反遂有誅晏之意傖人鮮于文粲與晏子德元往來密探朝旨告晏有異志世範等又啟上云晏謀因四年南郊與世祖故舊主帥於道中竊發會虎犯郊壇帝愈懼未郊一日敕停行元會畢乃召晏於華林省誅之下詔曰晏閭閻凡伍少無特操階緣人乏班齒官途世祖在蕃搜揚擢用棄略疵瑕遂升要重而輕跳險銳在貴彌著猜忌反覆觸情多端故以兩宮所弗容十手所共指既內愧于心外懼憲牘掩迹陳痾多歷年載頻授蕃任輒辭請不行事似謙虛情實詭伏隆昌以來運集艱難匡贊之功頗有心力迺爵冠通侯位登元輔綢繆恩寄朝莫均焉谿壑可盈無厭將及視天畫地遂懷異圖廣求卜相取信巫覡論薦黨附遍滿臺府令大息德元淵藪亡命同惡相濟劍客成群弟詡凶愚遠相脣齒信驛往來密通要契去歲之初奉朝請鮮于文粲備告姦謀朕以信必由中義無與貳推誠委任覬能悛改而長惡易流構扇彌大與北中郎司馬蕭毅臺隊主劉明達等剋期竊發以河東王鉉識用微弱可為其主得志之日當守以虛器明達諸辭列炳然具存昔漢后以反脣致討魏臣以虯鬚為戮況無君之心既彰陵上之迹斯著此而可容誰寘刑辟並可收付廷尉肅明國典晏未敗數日於北山廟答賽夜還晏既醉部伍人亦飲酒羽儀錯亂前後十餘里中不復相禁制識者云此勢不復久也晏子德元有意尚至車騎長史德元初名湛世祖謂晏曰劉湛江湛並不善終此非佳名也晏乃改之至是與弟晉安王友德和俱被誅弟詡晏弟詡永明中為少府卿六年敕位未登黃門郎不得畜女妓詡與射聲校尉陰玄智坐畜妓免官禁錮十年敕特原詡禁錮後出為輔國將軍始興內史廣州刺史劉纘為奴所殺詡率郡兵討之延興元年授詡持節廣州刺史詡亦篤舊晏誅上又遣南中郎司馬蕭季敞襲詡殺之蕭諶蕭諶字彥孚南蘭陵蘭陵人也祖道清員外郎父仙伯桂陽王參軍諶初為州從事晉熙國侍郎左常侍諶於太祖為絕服族子元徽末世祖在郢州欲知京邑消息太祖遣諶就世祖宣傳謀計留為腹心昇明中為世祖中軍刑獄參軍東莞太守以勳懃封安復縣男三百戶建元初為武陵王冠軍臨川王前軍參軍除尚書都官郎建威將軍臨川王鎮西中兵世祖在東宮諶領宿衛太祖殺張景真世祖令諶口啟乞景真命太祖不悅諶懼而退世祖即位出諶為大末令未之縣除步兵校尉領射陽令轉帶南濮陽太守領御仗主永明二年為南蘭陵太守建威將軍如故復除步兵校尉太守如故世祖齋內兵仗悉付之心膂密事皆使參掌除正員郎轉左中郎將後軍將軍太守如故世祖臥疾延昌殿敕諶在左右宿直上崩遺敕諶領殿內事如舊鬱林即位深委信諶諶每請急出宿帝通夕不得寐諶還乃安轉衛軍司馬兼衛尉加輔國將軍丁母憂敕還復本任守衛尉高宗輔政有所匡諫帝既在後宮不出唯遣諶及蕭坦之遙進乃得聞達諶回附高宗勸行廢立密召諸王典籤約語之不許諸王外接人物諶親要日久眾皆憚而從之鬱林被廢日初聞外有變猶密為手敕呼諶其見信如此諶性險進無計略及廢帝日領兵先入後宮齋內仗身素隸服諶莫有動者海陵立轉中領軍進爵為公二千戶甲仗五十人入直殿內月十日還府建武元年轉領軍將軍左將軍南徐州刺史給扶進爵衡陽郡公食邑三千戶高宗初許事克用諶為揚州及有此授諶恚曰見炊飯熟推以與人王晏聞之曰誰復為蕭諶作甌箸者諶恃勳重干豫朝政諸有選用輒命議尚書使為申論上新即位遣左右要人於外聽察具知諶言深相疑阻二年六月上幸華林園宴諶及尚書令王晏等數人盡歡坐罷留諶晚出至華林閤仗身執還入省上遣左右莫智明數諶曰隆昌之際非卿無有今日今一門二州兄弟三封朝廷相報政可極此卿恒懷怨望乃云炊飯已熟合甑與人邪今賜卿死諶謂智明曰天去人亦復不遠我與至尊殺高武諸王是君傳語來去我今死還取卿於省殺之至秋而智明死見諶為祟詔曰蕭諶擢自凡庸識用輕險因藉倖會早預驅馳永明之季曲頒恩紀鬱林昏悖頗立誠效寵靈優渥期遇兼隆內總戎柄外暢蕃威兄弟榮貴震灼朝野曾不感佩殊荷少答萬一自以勳高伊霍事均難賞才冠當時恥居物後矯制王權與奪由己空懷疑懼坐構嫌猜覘候宮掖希覬非望蔽上罔下之心誣君不臣之跡固以彰暴民聽喧聒遐邇遂潛散金帛招集不逞交結禁衛互為脣齒密契戚邸將肆姦逆朕以其任寄既重爵列河山每加彌縫弘以大信庶能懷音翻然悛改而豺狼其性凶謀滋甚夫無將必戮陽秋明義況釁積禍盈若斯之大可收付廷尉速正刑書罪止元惡餘無所問諶好左道吳興沈文猷相諶云相不減高帝諶喜曰感卿意無為人言也至是文猷伏誅兄誕諶兄誕字彥偉初為殿中將軍永明中為建康令與秣陵令司馬迪之同乘行車前導四卒左丞沈昭略奏凡有鹵簿官共乘不得兼列騶寺請免誕等官詔贖論延興元年自輔國徐州為持節督司州刺史將軍如故明帝立封安德侯五百戶進號冠軍建武二年春虜攻司州誕盡力拒守虜退增封四百戶徵左衛將軍上欲殺諶以誕在邊鎮拒虜故未及行虜退六旬諶誅遣黃門郎梁王為司州別駕使誅誕束身受戮家口繫尚方弟誄諶弟誄與諶同豫廢立為寧朔將軍東莞太守轉西中郎司馬建武初封西昌侯千戶轉太子左率領軍解司州圍還同伏誅諶伯父仙民官至太中大夫卒蕭坦之蕭坦之南蘭陵蘭陵人也祖道濟太中大夫父欣祖有勳於世祖至武進令坦之與蕭諶同族初為殿中將軍累至世祖中軍板刑獄參軍以宗族見驅使除竟陵王鎮北征北參軍東宮直閣以懃直為世祖所知除給事中淮陵令又除蘭陵令給事中如故尚書起部郎司徒中兵參軍世祖崩坦之隨太孫文武度上臺除射聲校尉令如故未拜除正員郎南魯郡太守少帝以坦之世祖舊人親信不離得入內見皇后帝於宮中及出後堂雜戲狡獪坦之皆得在側或值醉後裸袒坦之輒扶持諫喻見帝不可奉乃改計附高宗密為耳目除晉安王征北諮議隆昌元年追錄坦之父勳封臨汝縣男食邑三百戶徙征南諮議高宗謀廢少帝既與蕭諶及坦之定謀帝腹心直閣將軍曹道剛疑外間有異密有處分諶未能發始興內史蕭季敞南陽太守蕭頴基並應還都諶欲待二蕭至藉其勢力以舉事高宗慮事變以告坦之坦之馳謂諶曰廢天子古來大事比聞曹道剛朱隆之等轉已猜疑衛尉明日若不就事無所復及弟有百歲母豈能坐聽禍敗政應作餘計耳諶遑遽明日遂廢帝坦之力也海陵即位除黃門郎兼衛尉卿進爵伯增邑為六百戶建武元年遷散騎常侍右衛將軍進爵侯增邑為千五百戶明年虜動假坦之節督徐州征討軍事虜圍鍾離春斷淮洲坦之擊破之還加領太子中庶子未拜遷領軍將軍永泰元年為侍中領軍東昏立為侍中領軍將軍永元元年遭母喪起復職加右將軍置府江祏兄弟欲立始安王遙光密謂坦之坦之曰明帝取天下已非次第天下人至今不服今若復作此事恐四海瓦解我其不敢言持喪還宅宅在東府城東遙光起事遣人夜掩取坦之坦之科頭著褌踰牆走從東冶僦渡南渡間道還臺假節督眾軍討遙光屯湘宮寺事平遷尚書右僕射丹陽尹右將軍如故進爵公增邑千戶坦之肥黑無鬚語聲嘶時人號為蕭啞剛狠專執群小畏而憎之遙光事平二十餘日帝遣延明主帥黃文濟領兵圍坦之宅殺之子賞祕書郎亦伏誅坦之從兄翼宗為海陵郡將發坦之謂文濟曰從兄海陵宅故應無他文濟曰海陵宅在何處坦之告文濟曰應得罪仍遣收之檢家赤貧唯有質錢帖子數百還以啟帝原死繫尚方和帝中興元年追贈坦之中軍將軍開府儀同三司江祏江祏字弘業濟陽考城人也祖遵寧朔參軍父德鄰司徒右長史祏姑為景皇后少為高宗所親恩如兄弟宋末解褐晉熙國常侍太祖徐州西曹員外郎高宗冠軍參軍帶灄陽令竟陵王征北參軍尚書水部郎高宗為吳興以祏為郡丞加宣威將軍廬陵王中軍功曹記室安陸王左軍諮議領錄事帶京兆太守除通直郎補南徐州別駕高宗輔政委以心腹隆昌元年自正員郎補丹陽丞中書郎高宗為驃騎鎮東府以祏為諮議參軍領南平昌太守與蕭誄對直東府省內時新立海陵人情未服高宗胛上有赤誌常祕不傳祏勸帝出以示人晉壽太守王洪範罷任還上袒示之曰人皆謂此是日月相卿幸無泄言洪範曰公日月之相在軀如何可隱轉當言之公卿上大悅會直後張伯尹瓚等屢謀竊發祏誄憂虞無計每夕輒託事外出及入纂議定加祏寧朔將軍高宗為宣城王太史密奏圖緯云一號當得十四年祏入帝喜以示祏曰得此復何所望及即位遷守衛尉將軍如故封安陸縣侯邑千戶祏祖遵以后父贈金紫光祿大夫父德鄰以帝舅亦贈光祿大夫建武二年遷右衛將軍掌甲仗廉察四年轉太子詹事祏以外戚親要勢冠當時遠致餉遺或取諸王第名書好物然家行甚睦待子姪有恩意上寢疾永泰元年轉祏為侍中中書令出入殿省上崩遺詔轉右僕射祏弟衛尉祀為侍中敬皇后弟劉暄為衛尉東昏即位參掌選事高宗雖顧命群公而意寄多在祏兄弟至是更直殿內動止關諮永元元年領太子詹事劉暄遷散騎常侍右衛將軍祏兄弟與暄及始安王遙光尚書令徐孝嗣領軍蕭坦之六人更日帖敕時呼為六貴帝稍欲行意孝嗣不能奪坦之雖時有異同而祏堅意執制帝深忿之帝失德既彰祏議欲立江夏王寶玄劉暄初為寶玄郢州行事執事過刻有人獻馬寶玄欲看之暄曰馬何用看妃索煮肫帳下諮暄暄曰旦已煮鵝不煩復此寶玄恚曰舅殊無渭陽之情暄聞之亦不悅至是不同祏議欲立建安王寶夤密謀於遙光遙光自以年長屬當鼎命微旨動祏祏弟祀以少主難保勸祏立遙光暄以遙光若立己失元舅之望不肯同故祏遲疑久不決遙光大怒遣左右黃曇慶於青溪橋道中刺殺暄曇慶見暄部伍人多不敢發事覺暄告祏謀帝處分收祏兄弟祀時直在內殿疑有異遣信報祏曰劉暄似有異謀今作何計祏曰政當靜以鎮之耳俄而召祏入見停中書省初直齋袁文曠以王敬則勳當封祏執不與帝使文曠取祏以刀環築其心曰復能奪我封否祏祀同日見殺弟祀祀字景昌初為南郡王國常侍歷高祖驃騎東閣祭酒祕書丞晉安王鎮北長史南東海太守行府州事治下有宣尼廟久廢不脩祀更開掃構立祀弟禧居喪早卒有子廞字偉卿年十二聞收至謂家人曰伯既如此無心獨存赴井死後帝於後堂騎馬致適顧謂左右曰江祏若在我當復能騎此不劉暄暄字士穆出身南陽國常侍遙光起事以討暄為名事平暄遷領軍將軍封平都縣侯千戶其年又見殺和帝中興元年贈祏衛將軍暄散騎常侍撫軍將軍並開府儀同三司祀散騎常侍太常卿史臣曰士死知己蓋有生所共情雖愚智之品有二而逢迎之運唯一夫懷可知之才受知人之眄無慚外物此固天理其猶藏在中心銜恩念報況乎義早蕃僚道同遇合踰越勝己顧邁先流棄子如遺曾微舊德使狗之喻人致前譏慚包疚心我無其事嗚呼陸機所以賦豪士也贊曰王蕭提契世祖基之樂羊食子里克無辭江劉后戚明嗣是維廢興異論終用乖疑
