body:
  text: 南齊書卷四十一梁蕭子顯撰列傳第二十二張融周顒張融字思光呉郡呉人也祖褘晉琅邪王國郎中令父暢宋㑹稽太守融年弱冠道士同郡陸脩靜以白鷺羽麈尾扇遺融曰此既異物以奉異人宋孝武聞融有早譽解褐為新安王北中郎參軍孝武起新安寺僚佐多儭錢帛融獨儭百錢帝曰融殊貧當序以佳禄出為封溪令從叔永出後渚送之曰似聞朝㫖汝尋當還融曰不患不還政恐還而復去廣越嶂嶮獠賊執融將殺食之融神色不動方作洛生詠賊異之而不害也浮海至交州於海中作海賦曰盖言之用也情矣形乎使天形寅内敷情敷外寅者言之業也吾逺職荒官將海得地行闗入浪宿渚經波傅懐樹觀長滿朝夕東西無里南北如天反覆懸烏表裏菟色壯哉水之竒也竒哉水之壯也故古人以之頌其所見吾問翰而賦之焉當其濟興絶感豈覺人在我外木生之作君自君矣分渾始地判氣初天作成萬物為山為川總川振㑹導海飛門爾其海之狀也之相也則窮區没渚萬里藏岸控㑹河濟朝總江漢囘混浩潰巔倒發濤浮天振逺灌日飛髙摐麤江撞則八紘摧隤鼓怒則九紐折裂􅝸於活長風以舉波漷音郭天地而為勢􅀈音盩澤于及涾音沓洽音合来往相􅀢麤合汨子突湥音突􅀈於渤渤􅀢紆狀石成窟西衝虞淵之曲東振湯谷之阿若木於是乎倒覆折扶桑而為渣在牙濩􅖐音藥􅯛音門渾涫於官􅵞於和碨於磊雍渤非勃淬音卒淪音崙澊音尊灡淺壟嵸子拱湍轉則日月似驚浪動而星河如覆既烈太山與崑崙相壓而共潰又盛雷車震漢破天以折轂淃於員漣涴於卵瀨於嬾輾轉縱横揚珠起玉流鏡飛眀是其囘堆曲浦幽闗弱渚之形勢也沙嶼相接洲島相連東西南北如滿于天梁禽楚獸胡木漢草之所生焉長風動路深雲暗道之所經焉苕苕蔕蔕窅窅翳翳晨烏宿音秀於東隅落河浪其西界茫沆于剛汴河汨于突磈于磊漫無官桓旁踞委岳横竦危巒重嶂岌岌攢嶺聚立嵂吕兀􅹲音窟􅼎吕今嶔欽架石相隂􅀢􅀢徒罪陁陁横出旁入嵬嵬支罪磊磊若相追而下及峯勢縱横岫形參錯或如前而未進乍非遷而已却天抗暉於東曲日倒麗於西阿嶺集雪以懐鏡巖昭春而自華江洚許江􅮞􅮞許百漈子曷巖拍芬百嶺觸山䃶石汙􅺆于各􅱑音寒況于朗碨於磊泱於朗􅻻􅻼音阿流柴磹五感反􆀠五屈頓浪低波􅻹苦降䂭苦交硄苦江折嶺挫峯窂浪硠音郎掊朋山相􅀈苦合萬里藹藹極路天外電戰雷奔倒地相礚獸門象逸魚路鯨奔水遽龍魄陸振虎魂却瞻無後向望無前長尋髙眺唯水與天若乃山横蹴浪風倒摧波磊若驚山竭嶺以竦石鬱若飛煙奔雲以振霞連瑶光而交綵接玉繩以通華爾乎夜滿深霧晝宻長雲髙河滅景萬里無文山門幽暖岫户葐蒀九天相掩王地交氛汪汪横横音皇沆沆于剛浩浩音害淬麤貴潰大人之表泱於朗蕩君子之外風沬相排日閉雲開浪散波合岳起山隤若乃漉沙構白熬波出素積雪中春飛霜暑路爾其竒名出錄詭物無書髙岸乳鳥横門産魚則何㦬音羅鱅音容鮨音詣􅭡音非魜音人􅱇音果䱻音滑哄日吐霞吞河潄月氣開地震聲動天發噴灑噦於月噫於戒流雨而揚雲喬髗壯脊架岳而飛墳􅀈音挺動崩五山之勢瞷矣簡睔矣􅀈煥七曜之文蟕蠵瑁蛑綺貝繡螺𤣥珠互綵緑紫相華遊風秋瀬泳景登春伏鱗漬綵昇魵洗文若乃春代秋緒嵗去冬歸柔風麗景晴雲積暉起龍塗於靈歩翔螭道之神飛浮㣲雲之如瞢落輕雨之依依觸巧塗而䃭去紺逺抵欒木以激揚浪相礴傍各而起千狀波獨湧乎驚萬容蘋藻留映荷芰提隂扶容曼綵秀逺華深眀藕移玉清蓮代金眄芬芳於遥渚汎灼爍於長潯浮艫雜軸遊舶交艘帷軒帳席方逺連髙入驚波而箭絶振排天之䧺飆越湯谷以逐景渡虞淵以追月徧萬里而無時浃天地於揮忽雕隼飛而未半鯤龍趠貪教而不逮舟人未及復其喘已周流宇宙之外矣隂鳥陽禽春毛秋羽逺翅風遊髙翮雲舉翔歸棲去連隂日路瀾漲波渚陶𤣥浴素長紘四斷平表九絶雉翥成霞鴻飛起雪合聲鳴侣並翰翻羣飛闗溢繡流浦照文爾夫人㣲亮氣小白如淋凉空澄逺層漢無隂照天容於鮷渚鏡河色於魦潯括盖餘以進廣浸夏洲以洞深形每驚而義維静跡有事而道無心於是乎山海蔵隂雲塵入岫天英徧華日色盈秀則若士神中琴髙道外䄂輕羽以衣風逸𤣥裾於雲帶筵秋月於源潮帳春霞於秀瀬曬蓬莱之靈岫望方壺之妙闕樹遏日以飛柯嶺囘峯以蹴月空居無俗素舘何塵谷門風道林路雲真若乃幽崖􅀈於夹倉夹隈隩之窮駿波虎浪之氣激勢之所不攻有卉有木為灌為叢路糅網雜結葉相籠通雲交拂連韻共風蕩洲礉去角岸而千里若崩衝崕沃島其萬國如戰振駿氣以擺雷飛䧺光以倒電若夫増雲不氣流風斂聲瀾文復動波色還驚眀月何逺沙裏分星至其積珍全逺架寳諭深瓊池玉壑珠岫㻁岑合日開夜舒月解隂珊瑚開繢瑠璃竦華丹文錦色雜照􅖅霞洪洪潰潰浴干日月淹漢星墟滲河天界風何本而自生雲無從而空滅籠麗色以拂烟鏡懸暉以照雪爾乃方員去我混然落情氣暄而濁化靜自清心無終故不滯志不敗而無成既覆舟而載舟固以死而以生𢎞芻狗於人獸導至本以充形雖萬物之日用諒何緯其何經道湛天初機茂形外亡有所以而有非膠有於生末亡無所以而無信無心以入太不動動是使山岳相崩不聲聲故能天地交泰行蔵虚於用舍應感亮於圓㑹仁者見之謂之仁達者見之謂之達咶者㡬於上善吾信哉其為大矣融文辭詭激獨與衆異後還亰師以示鎮國將軍顧凱之凱之曰卿此賦實超𤣥虚但恨不道鹽耳融即求筆注之曰漉沙構白熬波出素積雪中春飛霜暑路此四句後所足也凱之與融兄有恩好凱之卒融身負墳土在南與交阯太守卞展有舊展於嶺南為人所殺融挺身奔赴舉秀才對䇿中第為尚書殿中郎不就為儀曹郎泰始五年眀帝取荆郢湘雍四州射手叛者斬亡身及家長者家口没奚官元徽初郢州射手有叛者融議家人家長罪所不及亡身刑五年尋請假奔叔父喪道中罸幹錢敬道鞭杖五十寄繫延陵獄大眀五年制二品清官行僮幹杖不得出十為左丞孫緬所奏免官尋復位攝祠倉部二曹領事劉勔戰死祠曹議上應哭勔不融議宜哭於是始舉哀倉曹又以正月俗人所忌太倉為可開不融議不宜拘束小忌尋兼掌正厨融見宰殺囘車徑去自表解職為安成王撫軍倉曹參軍轉南陽王友融父暢先為丞相長史義宣事難暢為王𤣥謨所錄將殺之𤣥謨子瞻為南陽王前軍長史融啓求去官不許融家貧願禄初與從叔征北將軍永書曰融昔稱㓜學早訓家風雖則不敏率以成性布衣葦席弱年所安簞食瓢飲不覺不樂但世業清貧民生多待榛栗棗脩女贄既長束帛禽鳥男禮已大勉身就官十年七仕不欲代耕何至此事昔求三呉一丞雖屬舛錯今聞南康缺守願得為之融不知階級階級亦可不知融政以求丞不得所以求郡求郡不得亦可復求丞又與吏部尚書王僧䖍書曰融天地之逸民也進不辨貴退不知賤兀然造化忽如草木實以家貧累積孤寡傷心八姪俱孤二弟頗弱撫之而感古人以悲豈能山海陋祿申融情累阮籍愛東平土風融亦欣晉平閑外時議以融非治民才竟不果辟太祖太傅掾歴驃騎豫章王司空諮議參軍遷中書郎非所好乞為中散大夫不許融風止詭越坐常危膝行則曵歩翹身仰首意制甚多隨例同行常稽遲不進太祖素竒愛融為太尉時時與融欵接見融常笑曰此人不可無一不可有二即位後手詔賜融衣曰見卿衣服麤故誠乃素懐有本交爾藍縷亦虧朝望今送一通故衣意謂雖故乃勝新也是吾所著已令裁減稱卿之體并履一量融與吏部尚書何戢善往詣戢誤通尚書劉澄融下車入門乃曰非是至户外望澄又曰非是既造席視澄曰都自非是乃去其為異如此又為長沙王鎮軍竟陵王征北諮議並領記室司徒從事中郎永眀二年總眀觀講勅朝臣集聽融扶入就榻私索酒飲之難問既畢乃長歎曰嗚呼仲尼獨何人哉為御史中丞到偽所奏免官尋復融形貎短醜精神清澈王敬則見融革帶垂寛殆將至骼謂之曰革帶太急融曰既非歩吏急帶何為融假東出世祖問融住在何處融答曰臣陸處無屋舟居非水後日上以問融從兄緒緒曰融近東出未有居止權牽小船於岸上住上大笑虜中聞融名上使融接北使李道固就席道固顧之而言曰張融是宋彭城長史張暢子不融嚬蹙久之曰先君不幸名達六夷豫章王大㑹賓僚融食炙始行畢行炙人便去融欲求鹽蒜口終不言方揺食指半日乃息出入朝廷皆拭目驚觀之八年朝臣賀衆瑞公事融扶入拜起復為有司所奏見原遷司徒右長史竟陵張欣時為諸暨令坐罪當死欣時父興世宋世討南譙王義宣官軍欲殺融父暢興世以袍覆暢而坐之以此得免興世卒融著髙履負土成墳至是融啓竟陵王子良乞代欣時死子良答曰此乃是長史美事恐朝有常典不得如長史所懐遷黄門郎太子中庶子司徒左長史融有孝義忌月三旬不聽樂事嫂甚謹宋丞相義宣起事父暢以不同將見殺司馬竺超民諫免之暢臨終謂諸子曰昔丞相事難吾緣竺司馬得活爾等必報其子弟後超民孫微冬月遭母喪居貧融往弔之悉脫衣以為賻披牛被而反常以兄事㣲豫章王嶷竟陵王子良薨自以身經佐吏哭輙盡慟建武四年病卒年五十四遺令建白旌無旒不設祭令人捉麈尾登屋復魂曰吾生平所善自當凌雲一笑三千買棺無製新衾左手執孝經老子右手執小品法華經妾二人哀事畢各遣還家又曰以吾平生之風調何至使婦人行哭失聲不湏暫停閨閣融𤣥義無師法而神解過人白黑談論鮮能抗拒永眀中遇疾為問律自序曰吾文章之體多為世人所驚汝可師耳以心不可使耳為心師也夫文豈有常體但以有體為常政當使常有其體丈夫當刪詩書制禮樂何至因循寄人籬下且中代之文道體闕變尺寸相資彌縫舊物吾之文章體亦何異何嘗顛温凉而錯寒暑綜哀樂而横歌哭哉政以屬辭多出比事不羈不阡不陌非途非路耳然其傳音振逸鳴節竦韻或當未極亦已極其所矣汝若復别得體者吾不拘也吾義亦如文造次乗我顛沛非物吾無師無友不文不句頗有孤神獨逸耳義之為用將使性入清波塵洗猶沐無得釣聲同利舉價如髙俾是道塲險成軍路吾昔嗜僧言多肆法辯此盡遊乎言笑而汝等無幸又云人生之口正可論道説義惟飲與食此外如樹網焉吾每以不爾為恨爾曹當振綱也臨卒又戒其子曰手澤存焉父書不讀况文音情婉在其韻吾意不然别遺爾音吾文體英絶變而屢竒既不能逺至漢魏故無取嗟晉宋豈吾天挺盖不隤家聲汝若不㸔父祖之意欲汝見也可號哭而看之融自名集為玉海司徒禇淵問玉海名融答玉以比徳海崇上善文集數十卷行於世張氏知名前有敷演鏡暢後有充融卷稷周顒字彦倫汝南安成人晉左光祿大夫顗七世孫也祖虎頭員外常侍父恂歸鄉相顒少為族祖朗所知解褐海陵國侍郎益州刺史蕭恵開賞異顒擕入蜀為厲鋒將軍帶肥郷成都二縣令轉恵開輔國府參軍將軍令如故仍為府主簿常謂恵開性太險峻每致諫恵開不悦答顒曰天險地險王公設險但問用險何如耳隨恵開還都宋眀帝頗好言理以顒有辭義引入殿内親近宿直帝所為慘毒之事顒不敢顯諫輙誦經中因緣罪福事帝亦為之小止轉安成王撫軍行參軍元徽初出為剡令有恩恵百姓思之還歴邵陵王南中郎三府參軍太祖輔政引接顒顒善尺牘沈攸之送絶交書太祖口授令顒裁答轉齊臺殿中郎建元初為長沙王參軍後軍參軍山隂令縣舊訂滂民以供雜使顒言之於太守聞喜公子良曰竊見滂民之困困實極矣役命有常祗應轉竭蹙廹驅催莫安其所險者或竄避山湖困者自經溝瀆爾亦有摧臂斮手茍自殘落販傭貼子權赴急難每至滂使發動遵赴常促輒有柤杖被録稽顙階垂泣涕告哀不知所振下官未嘗不臨食罷筯當書偃筆為之久之愴不能已交事不濟不得不就加捶罸見此辛酸時不可過山隂邦治事倍餘城然畧聞諸縣亦處處皆躓唯上虞以百户一滂大為優足過此列城不無凋罄宜應有以普救倒懸設流開便則轉患為功得之何逺還為文恵太子中軍録事參軍隨府轉征北文恵在東宫顒還正貟郎始興王前軍諮議直侍殿省復見賞遇顒音辭辯麗出言不窮宫商朱紫發口成句汎渉百家長於佛理著三宗論立空假名立不空假名設不空假名難空假名設空假名難不空假名假名空難二宗又立假名空西涼州智林道人遺顒書曰此義㫖趣似非始開妙聲中絶六七十載貧道年二十時便得此義竊每歡喜無與共之年少見長安耆老多云闗中髙勝乃舊有此義當法集盛時能深得斯趣者本無多人過江東畧是無一貧道捉麈尾来四十餘年東西講説謬重一時餘義頗見宗録唯有此塗白黑無一人得者為之發病非意此音猥来入耳始是真實行道第一功徳其論見重如此顒於鍾山西立隐舍休沐則歸之轉太子僕兼著作撰起居注遷中書郎兼著作如故常遊侍東宫少從外氏車騎將軍臧質家得衛恒散隸書法學之甚工文恵太子使顒書𤣥圃茅齋壁國子祭酒何𦙍以倒薤書求就顒換之顒笑而答曰天下有道丘不與易也每賓友㑹同顒虚席晤語辭韻如流聽者忘倦兼善老易與張融相遇輙以𤣥言相滯彌日不解清貧寡欲終日長蔬食雖有妻子獨處山舍衛將軍王儉謂顒曰卿山中何所食顒曰赤米白鹽緣葵紫蓼文恵太子問顒菜食何味最勝顒曰春初早韭秋末晚菘時何𦙍亦精信佛法無妻妾太子又問顒卿精進何如何𦙍顒曰三塗八難共所未免然各有其累太子曰所累伊何對曰周妻何肉其言辭應變皆如此也轉國子博士兼著作如故太學諸生慕其風争事華辯後何𦙍亦斷食肉猶欲食白魚䱇脯糖蠏以為非見生物疑食蚶蠣使學生議之學生鍾岏曰䱇之就脯驟於屈伸蟹之將糖躁擾彌甚仁人用意深懐如怛至於車螯蚶蠣眉目内闕慙渾沌之竒礦殻外緘非金人之慎不悴不榮曽草木之不若無馨無臭與瓦礫其何算故宜長充庖厨永為口實竟陵王子良見岏議大怒𦙍兄㸃亦遁節清信顒與書勸令菜食曰丈人之所以未極遐蹈或在不近全菜邪脱灑離析之討鼎爼網罟之興載䇿其来實逺誰敢干議觀聖人之設膳脩仍復為之品節盖以茹毛飲血與生民共始縱而勿裁將無厓畔善為士者豈不以恕己為懐是以各静封疆罔相陵軼況乃變之大者莫過死生生之所重無踰性命性命之於彼極切滋味之在我可賒而終身朝晡資之以味彼就寃殘莫能自列我業久長吁哉可畏且區區㣲卵脆薄易矜歂彼弱麑顧歩宜愍觀其飲啄飛行人應憐悼况可心心撲禠加復恣忍吞嚼至乃野牧盛羣閉豢重圏量肉揣毛以挨枝剥如土委地僉謂常理百為愴息事豈一塗若云三世理誣則幸矣良快如使此道果然而形未息則一往一来一生一死輪廻是常事雜報如家人天如客遇客日尠在家日多吾儕信業未足長免則傷心之慘行亦息念丈人於血氣之類雖無身踐至於晨鳬夜鯉不能不取備屠門財貝之經盗手猶為㢘士所棄生性之一啓鸞刀寧復慈心所忍騶虞雖飢非自死之草不食聞其風者豈不使人多愧衆生之禀此形質以畜肌膋皆由其積壅癡迷沈流莫反報受穢濁歴苦酸長此甘與肥皆無眀之報聚也何至復引此滋腴自汙腸胃丈人得此有素聊復寸言發起耳顒卒官時㑹王儉講孝經未畢舉曇濟自代學者榮之官為給事中史臣曰𢎞毅存容至仁表貎汲黯剛戇崔琰聲姿然後能不憚䧺桀亟成譏犯張融標心託㫖全等塵外吐納風雲不論人物而事君㑹友敦義納忠誕不越檢常在名教若夫竒偉之稱則虞飜陸績不得獨擅於前也贊曰思光矯矯萬里千仭升同應諧黜同解擯務在連衡不謀銷印彦倫辭辯苦節清韻白馬横擒雲梯獨振張融海賦文多脱誤諸本同南齊書卷四十一南齊書卷四十一考證張融傳九天相掩王地交氛諸本同按王疑作五周顒傳量肉揣毛以挨枝剝挨南監本作俟枝疑作披南齊書卷四十一考證
