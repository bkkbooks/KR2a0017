body:
  text: 南齊書卷五十七列傳第三十八魏虜魏虜胸奴種也姓托跋氏晉永嘉六年并州刺史劉琨為屠各胡劉聰所攻索頭猗盧遣子曰利孫將兵救琨於太原猗盧入居代郡亦謂鮮卑被髮左衽故呼為索頭猗盧孫什翼犍字鬱律旃後還陰山為單于領胸奴諸部太元元年苻堅遣偽并州刺史苻洛伐犍破龍庭禽犍還長安為立宅教犍書學分其部黨君雲中等四郡諸部主帥歲終入朝并得見犍差稅諸部以給之堅敗子圭字涉圭隨舅慕容垂據中山還領其部後稍強盛隆安元年圭破慕容寶於中山遂有并州僭稱魏年號天瑞賜追諡犍烈祖文平皇帝圭死諡道武皇帝子木末立年號太常死諡明元皇帝子燾字佛狸代立年號太平真君宋元嘉中偽太子晃與大臣崔氏寇氏不睦崔寇譖之玄高道人有道術晃使祈福七日七夜佛狸夢其祖父並怒手刃向之曰汝何故信讒欲害太子佛狸驚覺下偽詔曰王者大業纂承為重儲宮嗣紹百王舊例自今已往事無巨細必經太子然後上聞晃後謀殺佛狸見殺燾死諡太武皇帝立晃子濬字烏雷直勤年號和平追諡晃景穆皇帝濬死諡文成皇帝子弘字萬民立年號天安景和九年偽太子宏生改年為皇興什翼圭始都平城猶逐水草無城郭木末始土著居處佛狸破梁州黃龍徙其居民大築郭邑截平城西為宮城四角起樓女出方攴門不施屋城又無南門外立二土門內立廟開四門各隨方色凡五廟一世一間瓦屋其西立太社佛狸所居雲母等三殿又立重屋居其上飲食名阿真在西皇后可孫出此求食初姚興以塞外虜赫連勃勃為安北將軍領五部胡屯大城姚泓敗後入長安佛狸攻破勃勃子昌娶勃勃女為皇后義熙中仇池公楊盛表云索虜勃勃胸奴正胤是也可孫昔妾媵之殿西鎧仗庫屋四十餘間殿北絲綿布絹庫土屋一十餘間偽太子宮在城東亦開四門瓦屋四角起樓妃妾住皆土屋婢使千餘人織綾錦販賣酤酒養豬羊牧牛馬種菜逐利太官八十餘窖窖四千斛半穀半米又有懸食瓦屋數十間置尚方作鐵及木其袍衣使宮內婢為之偽太子別有倉庫其郭城繞宮城南悉築為坊坊開巷坊大者容四五百家小者六七十家每南坊搜檢以備姦巧城西南去白登山七里於山邊別立父祖廟城西有祠天壇立四十九木人長丈許白幘練裙馬尾被立壇上常以四月四日殺牛馬祭祀盛陳鹵簿邊壇奔馳奏伎為樂城西三里刻石寫五經及其國記於鄴取石虎文石屋基六十枚皆長丈餘以充用國中呼內左右為直真外左右為烏矮真曹局文書吏為比德真簷衣人為朴大真帶仗人為胡洛真通事人為乞萬真守門人為可薄真偽臺乘驛賤人為拂竹真諸州乘驛人為咸真殺人者為契害真為主出受辭人為折潰真貴人作食人為附真三公貴人通謂之羊真佛狸置三公太宰尚書令僕射侍中與太子共決國事殿中尚書知殿內兵馬倉庫樂部尚書知伎樂及角史伍伯駕部尚書知牛馬驢騾南部尚書知南邊州郡北部尚書知北邊州郡又有俟勤地何比尚書莫堤比刺史郁若比二千石受別官比諸侯諸曹府有倉庫悉置比官皆使通虜漢語以為傳驛蘭臺置中丞御史知城內事又置九豆和官宮城三里內民戶籍不屬諸軍戍者悉屬之其車服有大小輦皆五層下施四輪三二百人牽之四施絙索備傾倒軺車建龍旗尚黑妃后則施雜綵幰無幢絡太后出則婦女著鎧騎馬近輦左右虜主及后妃常行乘銀鏤羊車不施帷幔皆偏坐垂腳轅中在殿上亦跂據正殿施流蘇帳金博山龍鳳朱漆畫屏風織成幌坐施氍毹褥前施金香爐琉璃鉢金碗盛雜食器設客長盤一尺御饌圓盤廣一丈為四輪車元會日六七十人牽上殿蠟日逐除歲盡城門磔雄雞葦索桃梗如漢儀自佛狸至萬民世增雕飾正殿西築土臺謂之白樓萬民禪位後常遊觀其上臺南又有伺星樓正殿西又有祠屋琉璃為瓦宮門稍覆以屋猶不知為重樓並設削泥采畫金剛力士胡俗尚水又規畫黑龍相盤繞以為厭勝泰始五年萬民禪位子宏自稱太上皇宏立號延興元年至六年萬民死諡獻文皇帝改號為承明元年是歲元徽四年也祖母馮氏黃龍人助治國事初佛狸母是漢人為木末所殺佛狸以乳母為太后自此以來太子立輒誅其母一云馮氏本江都人佛狸元嘉二十七年南侵略得馮氏濬以為妾獨得全焉明年丁巳歲改號太和宋明帝末年始與虜和好元徽升明之世虜使歲通建元元年偽太和三年也宏聞太祖受禪其冬發衆遣丹陽王劉昶為太師寇司豫二州明年詔遣衆軍北討宏遣大將郁豆眷假長命攻壽陽及鍾離為豫州刺史垣崇祖右將軍周盤龍徐州刺史崔文仲等所破宏又遣偽南部尚書托跋等向司州分兵出六允青界十萬衆圍朐山戍主玄元度嬰城固守青冀二州刺史盧紹之遣子奐領兵助之城中無食紹之出頓州南石頭亭隔海運糧柴供給城內虜圍斷海道緣岸攻城會潮水大至虜淹溺元度出兵奮擊大破之臺遣軍主崔靈建楊法持房靈民萬餘人從淮入海船艦至夜各舉兩火虜衆望見謂是南軍大至一時奔退初元度自云臂上有封侯志宋世以示世祖時世祖在東宮書與元度曰努力成臂上之相也虜退上議加封爵元度歸功於紹之紹之又讓故並見寢上乃擢紹之為黃門郎鬱州呼石頭亭為平虜亭紹之字子緒范陽人自云盧諶玄孫宋大明中預攻廣陵勳上紹之拔迹自投上以為州治中受心腹之任官至光祿大夫永明八年卒三年領軍將軍李安民左軍將軍孫文顯與虜軍戰於淮陽大敗之初虜寇至緣淮驅略江北居民猶懲佛狸時事皆驚走不可禁止乃於梁山置二軍南置三軍慈姥置一軍洌州置二軍三山置二軍白沙洲置一軍蔡州置五軍長蘆置三軍菰浦置二軍徐浦置一軍內外悉班階賞以示威刑偽昌黎王馮莎向司州荒人桓天生説莎云諸蠻皆響應莎至蠻竟不動莎大怒於淮邊獵而去及壽春摧敗朐山不拔虜主出定州大治道路聲欲南行不敢進乃與偽梁郡王計曰兵出彭泗間無復鬬志要當一兩戰得還歸既於淮陽被破一時奔走青徐間赴義民先是或抄虜運車更相殺掠往往得南歸者數千家上未遑外略以虜既摧破且欲示以威懷遣後軍參軍車僧朗北使虜問僧朗曰齊輔宋日淺何故便登天位僧朗曰虞夏登庸親當革禪魏晉匡戰輔貽厥子孫豈二聖促促於天位兩賢謙虛以獨善時宜各異豈得一揆苟曰事宜故屈己應物虜又問齊主悉有何功業僧朗曰主上聖性寬仁天識弘遠少為宋文皇所器遇入參禁旅泰始之初四方寇叛東平劉子房張淹北討薛索兒兼掌軍國豫司顧命宋桂陽建平二王阻兵內侮一麾殄滅蒼梧王反道敗德有過桀紂遠遵伊霍行廢立之事袁粲劉秉沈攸之同惡相濟又秉旄杖鉞大定凶黨戮力佐時四十餘載經綸夷險十五六年此功此德可謂物無異議虜又問南國無復齊土何故封齊僧朗曰營丘表海實為大國宋朝光啓土宇謂是呂尚先封今淮海之間自有青齊非無地也又問蒼梧何故遂加斬戮僧朗曰蒼梧暴虐書契未聞武王斬紂懸之黃鉞共是所聞何傷於義升明中北使殷靈誕苟昭先在虜聞太祖登極靈誕謂虜典客曰宋魏通好憂患是同宋今滅亡魏不相救何用和親及虜寇豫州靈誕因請為劉昶司馬不獲僧朗至北虜置之靈誕下僧朗立席言曰靈誕昔是宋使今成齊民實希魏主以禮見處靈誕交言遂相忿詈調虜曰使臣不能立節本朝誠自慙恨劉昶賂客解奉君於會刺殺僧朗虜即收奉君誅之殯斂僧朗送喪隨靈誕等南歸厚加贈賻世祖踐阼昭先具以啓聞靈誕下獄死贈僧朗散騎侍郎永明元年冬遣驍騎將軍劉纘前軍將軍張謨使虜明年冬虜使李道固報聘世祖於玄武湖水步軍講武登龍舟引見之自此歲使往來疆埸無事三年初令鄰里黨各置一長五家為鄰五鄰為里五里為黨四年造戶籍分置州郡雍州涼州秦州沙州涇州華州岐州河州西華州寧州陝州洛州荊州郢州北豫州東荊州南豫州西六允州東六允州南徐州東徐州青州齊州濟州二十五州在河南湘相州懷州秦汾州東雍州肆州定州瀛州朔州并州冀州幽州平州司州十三州在河北凡分魏晉舊司豫青六允冀并幽秦雍涼十州地及宋所失淮北為三十八州矣明年邊人桓天生作亂虜遣步騎萬餘人助之至比陽為征虜將軍戴僧靜等所破荒人胡丘生起義懸瓠為虜所擊戰敗南奔偽安南將軍遼東公平南將軍上谷公又攻舞陰舞陰戍主輔國將軍殷公愍拒破之六年虜又遣衆助桓天生與輔國將軍曹虎戰大敗於隔城至七年遣使邢産侯靈紹復通好先是劉纘再使虜太后馮氏悅而親之馮氏有計略作皇誥十八篇偽左僕射李思沖稱史臣注解是歲馮氏死八年世祖還隔城所俘獲二千餘人佛狸已來稍僭華典胡風國俗雜相揉亂宏知談義解屬文輕果有遠略遊河北至比干墓作弔比干文云脫非武發封墓誰因嗚呼分土介士胡不我臣宏以己巳歲立圓丘方澤置三夫人九嬪平城南有干水出定襄堺流入海去城五十里世號為索干都土氣寒凝風砂起六月雨雪議遷都洛京九年遣使李道固蔣少遊報使少遊有機巧密令觀京師宮殿楷式清河崔元祖啓世祖曰少遊臣之外甥特有公輸之思宋世陷虜處以大匠之官今為副使必欲模範宮闕豈可令氈鄉之鄙取象天宮臣謂且留少遊令使主反命世祖以非和通意不許少遊安樂人虜宮室制度皆從其出初佛狸討羯胡於長安殺道人且盡及元嘉南寇獲道人以鐵籠盛之後佛狸感惡疾自是敬畏佛教立塔寺浮圖宏父弘禪位後黃冠素服持戒誦經居石窟寺宏太和三年道人法秀與苟兒王阿辱瑰王等謀反事覺囚法秀加以籠頭鐵宀元攴無故自解脫虜穿其頸骨使呪之曰若復有神當令穿肉不入遂穿而殉之三日乃死偽咸陽王復欲盡殺道人太后馮氏不許宏尤精信粗涉義理宮殿內立浮圖宏既經古洛是歲下偽詔尚書思慎曰夫覆載垂化必由四氣運其功曦曜望舒亦須五星助其暉仰惟聖母睿識自天業高曠古將稽詳典範日新皇度不圖罪逆招禍奄丁窮罰追惟罔極永無逮及思遵先旨勑造明堂之樣卿所制體含六合事越中古理圓義備可軌之千載信是應世之材先固之器也羣臣瞻見模樣莫不僉然欲速造朕以寡昧亦思造盛禮卿可即於今歲停宮城之作營建此構興皇代之奇制遠成先志近副朕懷又詔公卿參定刑律又詔罷臘前儺唯年一儺又詔季冬朝賀典無成文以袴褶事非禮敬之謂若置寒朝服徒成煩濁自今罷小歲賀歲初一賀又詔王爵非庶姓所僭伯號是五等常秩烈祖之胄仍本王爵其餘王皆為公公轉為侯侯即為伯子男如舊雖名易於本而品不異昔公第一品侯第二品伯第三品子第四品男第五品十年上遣司徒參軍蕭琛范雲北使宏西郊即前祠天壇處也宏與偽公卿從二十餘騎戎服繞壇宏一周公卿七匝謂之踏壇明日復戎服登壇祠天宏又繞三匝公卿七匝謂之繞天以繩相交絡紐木枝棖覆以青繒形制平圓下容百人坐謂之為繖一云百子帳也於此下宴息次祠廟及布政明堂皆引朝廷使人觀視每使至宏親相應接申以言義甚重齊人常謂其臣下曰江南多好臣偽侍臣李元凱對曰江南多好臣歲一易主江北無好臣而百年一主宏大慙出元凱為雍州長史俄召復職世祖初治白下謂人曰我欲以此城為上頓處後於石頭造靈露車三千乘欲步道取彭城形迹頗著先是八年北使顏幼明劉思斆反命偽南部尚書李思沖曰二國之和義在庇民如聞南朝大造舟車欲侵淮泗推心相期何應如此幼明曰主上方弘大信於天下不失臣妾既與輯和何容二三其德壃埸之言差不足信且朝廷若必恭恕赫怒使守在外亦不近相淮濆思沖曰我國之強經略淮東何患不蕩海東嶽政存於信誓耳且和好既結豈可復有不信昔華元子反戰伐之際尚能以誠相告此意良慕也幼明曰卿未有子反之急詎求登床之請是後宏亦欲南侵徐豫於淮泗間大積馬芻十一年遣露布并上書稱當南寇世祖發揚徐州民丁廣設召募北地人支酉聚數千人於長安城北西山起義遣使告梁州刺史陰智伯秦州人王度人起義應酉攻獲偽刺史劉藻秦雍間七州民皆響震衆至十萬各自保壁望朝廷救其兵宏遣弟偽河南王幹尚書盧陽烏擊秦雍義軍幹大敗酉迎戰進至咸陽北濁谷圍偽司空長洛王繆老生合戰又大破之老生走還長安梁州刺史陰智伯遣軍主席德仁張弘林等數千人應接酉等進向長安所至皆靡會世祖崩宏聞關中危急乃稱聞喪退師太和十七年八月使持節安南大將軍都督徐青齊三州諸軍事南中郎將徐州刺史廣陵侯府長史帶淮陽太守鹿樹生移齊六允州府長史府奉被行所尚書符騰詔皇師雷舉搖旆南指誓清江祲志廓衡靄以去月下旬濟次河洛會前使人邢巒等至審知彼有大艾以春秋之義聞喪寢伐爰勑有司輟鑾止軔休馬華陽戢戈嵩北便肇經周制光宅中區永皇基于無窮恢盛業乎萬祀辰宸居重正鴻化增新四海承休莫不銘慶故以往示如律令并遣使弔國諱遣偽大將楊大眼張聰明等數萬人攻酉酉廣等並見殺隆昌元年遣司徒參軍劉斆車騎參軍沈宏報使至北宏稱字玄覽其夏虜平北將軍魯直清率衆降以為督洛州軍事領平戎校尉征虜將軍洛州刺史是歲宏徙都洛陽改姓元氏初胸奴女名托跋妻李陵胡俗以母名為姓故虜為李陵之後虜甚諱之有言其是陵後者輒見殺至是乃改姓焉宏聞高宗踐阼非正既新移都兼欲大示威力是冬自率大衆分寇豫徐司梁四州遣偽荊州刺史薛真度尚書郗祁阿婆出南陽向沙堨築壘開溝為南陽太守房伯玉新野太守劉思忌所破建武二年春高宗遣鎮南將軍王廣之出司州右僕射沈文季出豫州左衛將軍崔慧景出徐州宏自率衆至壽陽軍中有黑氈行殿容二十人坐輦邊皆三郎曷剌真槊多白真毦鐵騎為羣前後相接步軍皆烏楯槊綴接以黑蝦蟆幡牛車及驢駱載軍資妓女三十許萬人不攻城登八公山賦詩而去別圍鍾離城徐州刺史蕭惠休輔國將軍申希祖拒守出兵奮擊宏衆敗多赴淮死乃分軍據邵陽州柵斷水路夾築二城右衛將軍蕭坦之遣軍主裴叔業攻二城拔之惠休又募人出燒虜攻城車虜力竭不能剋王奐之誅子肅奔虜宏以為鎮南將軍南豫州刺史遣肅與劉昶號二十萬衆圍義陽司州刺史蕭誕拒戰虜築圍柵三重燒居民淨盡并力攻城城中負楯而立王廣之都督救援虜遣三萬餘人逆攻太子右率蕭季敞於下梁季敞戰不利司州城內告急王廣之遣軍主黃門侍郎梁王間道先進與太子右率蕭誄輔國將軍徐玄慶荊州軍主魯休烈據賢首山出虜不備城內見援軍至蕭誕遣長史王伯瑜及軍主崔恭祖出攻虜柵因風放火梁王等衆軍自外擊之昶肅棄圍引退追擊破之輔國將軍桓和出西陰平偽魯郡公郯城戍主帶莫樓為東海太守江道僧設伏路側和與合戰大敗之青徐民降者百餘家青冀二州刺史王洪範遣軍主崔延攻虜紀城並拔之宏先又遣偽尚書盧陽烏華州刺史韋靈智攻赭陽城北襄城太守成公期拒守虜攻城百餘日設以鉤衝不捨晝夜期所殺傷數千人臺又遣軍主垣歷生蔡道貴救援陽烏等退官軍追擊破之夏虜又攻司州櫟城二戍戍主魏僧岷朱僧起拒敗之偽安南將軍梁州刺史魏郡王元英十萬餘人通斜谷寇南鄭梁州刺史蕭懿遣軍主薑山安趙超宗等數軍萬餘人分據角弩白馬沮水拒戰大敗英進圍南鄭土山衝車晝夜不息懿率東從兵二千餘人固守拒戰隨手摧却英攻城自春至夏六十餘日不下死傷甚衆軍中糧盡搗麴為食畜菜葉直千錢懿先遣軍主韓嵩等征獠回軍援州城至黃牛川為虜所破懿遣氐人楊元秀還仇池説氐起兵斷虜運道氐即舉衆攻破虜歷城睪蘭駱谷仇池平洛蘇勒六戍偽尚書北梁州刺史辛黑末戰死英遣軍副仇池公楊靈珍據泥公山武興城主楊集始遣弟集朗與歸國氐楊馥之及義軍主徐曜甫迎戰於黃亘大敗奔歸時梁州土豪范凝梁季羣於家請英設會伏兵欲殺英事覺英執季羣殺之凝竄走英退保濁水聞氐衆盛與楊靈珍復俱退入斜谷會天大雨軍馬含漬截竹煮米於馬上持炬炊而食英至下辨靈珍弟婆羅阿卜珍反襲擊英衆散射中英頰偽陵江將軍悅楊生領鐵騎死戰救之得免梁漢平武都太守杜靈瑗奮武將軍望法憘寧朔將軍望法泰州治中皇甫耽並拒虜戰死追贈靈瑗法憘羽林監法泰積射將軍時偽洛州刺史賈異寇甲口為上洛太守李靜所破三年虜又攻司州櫟城為戍主魏僧岷所拒破秋虜遣軍襲漣口東海太守鄭延祉棄西城走東城猶固守臺遣冠軍將軍六允州刺史徐玄慶救援虜引退延祉伏罪初偽太后馮氏兄昌黎王馮莎二女大馮美而有疾為尼小馮為宏皇后生偽太子詢後大馮疾差宏納為昭儀宏初徙都詢意不樂思歸桑乾宏制衣冠與之詢竊毀裂解髮為編服左衽大馮有寵日夜讒詢宏出鄴城馬射詢因是欲叛北歸密選宮中御馬三千匹置河陰渚皇后聞之召執詢馳使告宏宏徙詢無鼻城在河橋北二里尋殺之以庶人禮葬立大馮為皇后便立偽太子恪是歲偽太和二十年也偽征北將軍州刺史巨鹿公伏鹿孤賀鹿渾守桑乾宏從叔平陽王安壽戍懷柵在桑乾西北渾非宏任用中國人與偽定州刺史馮翊公目鄰安樂公托跋阿幹兒謀立安壽分據河北期久不遂安壽懼告宏殺渾等數百人任安壽如故先是偽荊州刺史薛真度尚書郤祁阿婆為房伯玉所破宏怒以南陽小郡誓取滅之四年自率軍向雍州宏先至南陽房伯玉嬰城拒守宏從數萬騎罩黃繖去城一里遣偽中書舍人公孫雲謂伯玉曰我今蕩一六合與先後行異先行冬去春還不為停久今誓不有所剋終不還北停此或三五年卿此城是我六龍之首無容不先攻取遠一年中不過百日近不過一月非為難殄若不改迷當斬卿首梟之軍門闔城無二幸可改禍為福但卿有三罪今令卿知卿先事武帝蒙在左右不能盡節前主而盡節今主此是一罪前歲遣偏師薛真度暫來此卿遂破傷此是二罪武帝之胤悉被誅戮初無報效而反為今主盡節違天害理此是三罪不可容恕聽卿三思勿令闔城受苦伯玉遣軍副樂稚柔答曰承欲見攻圍期於必剋卑微常人得抗大威真可謂獲其死所先蒙武帝徒採拔賜預左右犬馬知恩寧容無感但隆昌延興昏悖違常聖明纂業家國不殊此則進不負心退不愧幽前歲薛真度導誘邊氓遂見陵突既荷國恩聊耳撲掃回己而言應略此責宏引軍向城南寺前頓止從東南角溝橋上過伯玉先遣勇士數人著斑衣虎頭帽從伏竇下忽出宏人馬驚退殺數人宏呼善射將原靈度射之應弦而倒宏乃過宏時大舉南寇偽咸陽王元憘彭城王元協常侍王元嵩寶掌王元麗廣陵侯元燮都督大將軍劉昶王肅楊大眼奚康生長孫稚等三十六軍前後相繼衆號百萬其諸王軍朱色鼓公侯緑色鼓伯子男黑色鼓並有鼙角吹脣沸地宏留偽咸陽王憘圍南陽進向新野新野太守劉思忌亦拒守臺先遣軍主直閣將軍胡松助北襄城太守成公期守赭陽城軍主鮑舉助西汝南北義陽二郡太守黃瑤起戍舞陰城宏攻圍新野城戰不息遣人謂城中曰房伯玉已降汝南為何獨自取糜碎思忌令人對曰城中兵食猶多未暇從汝小虜語也雍州刺史曹虎遣軍至均口不進永泰元年城陷縛思忌問之曰今欲降未思忌曰寧為南鬼不為北臣乃死贈冠軍將軍梁州刺史於是沔北大震湖陽戍主蔡道福赭陽城主成公期及軍主胡松舞陰城主黃瑤起及軍主鮑舉從陽太守席謙並棄城走虜追軍獲瑤起王肅募人臠食其肉追贈冠軍將軍六允州刺史數日房伯玉以城降伯玉清河人既降虜以為龍驤將軍伯玉不肯受高宗知其志月給其子希哲錢五千米二十斛後伯玉就虜求南邊一郡為馮翊太守生子幼便教其騎馬常欲南歸永元末希哲入虜伯玉大怒曰我力屈至此不能死節猶望汝在本朝以報國恩我若從心亦欲間關求反汝何為失計遂卒虜中虜得沔北五郡宏自將二十萬騎破太子率崔慧景等於鄧城進至樊城臨沔水而去還洛陽聞太尉陳顯達經略五郡圍馬圈宏復率大衆南攻破顯達而死喪還未至洛四百餘里稱宏詔徵偽太子恪會魯陽恪至協以宏偽法服衣之始發喪至洛乃宣布州郡舉哀制服諡孝文皇帝是年王肅為虜制官品百司皆如中國凡九品品各有二肅初奔虜自説其家被誅事狀宏為之垂涕以第六妹偽彭城公主妻之封肅平原郡公為宅舍以香塗壁遂見信用恪立號景明元年永元二年也豫州刺史裴叔業以壽春降虜先是偽東徐州刺史沈陵率部曲降陵吳興人初以失志奔虜大見任用宏既死故南歸頻授徐越二州刺史時王肅偽征南將軍豫州都督朝廷既新失大鎮荒人往來詐云肅欲歸國少帝詔以肅為使持節侍中都督豫徐司三州右將軍豫州刺史西豐公邑二千戶虜既得淮南其夏遣偽冠軍將軍南豫州刺史席法友攻北新蔡安豐二郡太守胡景略於建安城死者萬餘人百餘日朝廷無救城陷虜執景略以歸其冬虜又遣將桓道福攻隨郡太守崔士招破之後偽咸陽王憘以恪年少與氐楊集始楊靈祐乞佛馬居及虜大將支虎李伯尚等十餘人請會鴻池陂因恪出北芒獵襲殺之憘猶豫不能發欲更剋日馬居説憘曰殿下若不至北芒便可回師據洛城閉四門天子聞之必走向河北走桑乾仍斷河橋為河南天子隔河而治此時不可失也憘又不從靈祐疑憘反己即馳告恪憘聞事敗欲走渡河而天雨暗迷道至孝義驛恪已得洛城遣弟度廣平王領數百騎先入宮知無變乃還遣直衛三郎兵討憘執殺之虜法謀反者不得葬棄尸北芒王肅以疾卒史臣曰齊虜分江南為國歷三代矣華夏分崩舊京幅裂觀舋阻兵事興東晉二庾藉元舅之盛自許專征元規臨邾城以覆師稚恭至襄陽而反旆褚裒以徐六允徑卒一沒於鄒魯殷浩驅楊豫之衆大敗於山桑桓溫弱冠雄姿因平蜀之聲勢步入咸關野戰洛鄴既而鮮卑固於負海羌虜割有秦代自為敵國情險勢分宋武乘機故能以次而行誅滅及魏虜兼并河南失境兵馬土地非復曩時宋文雖得之知己未能料敵故師帥無功每戰必殆泰始以邊臣外叛遂亡淮北經略不振乃議和親太祖創命未及圖遠戎塵先起侵暴方牧淮豫剋捷青海摧奔以逸待勞坐微百勝自四州淪沒民戀本朝國祚惟新歌奉威德提戈荷甲人自為深壘結防想望南旗天子習知邊事取亂而授兵律若前師指日遠掃臨彭而督將逗留援接稽曉晚向義之徒傾巢盡室既失事機朝議北寢偃武修文更思後會永明之世據已成之策職問往來關禁寧靜壃埸之民並安堵而息窺覦百姓附農桑而不失業者亦由此而已也夫荊棘所生用武之弊寇戎一犯傷痍難復豈非此之驗乎建武初運獯雄南逼豫徐強鎮嬰高城蓄士卒不敢與之校武胡馬蹈藉淮肥而常自戰其地梯衝之害鼓掠所亡建元以來未之前有兼以穹廬華徙即禮舊都雍司北部親近許洛平塗數百通驛車軌漢世馳道直抵章陵鑣案所騖晨往暮返虜懷兼弱之威挾廣地之計強兵大衆親自凌殄旍鼓彌年矢石不息朝規懦屈莫能救禦故南陽覆壘新野頽隍民戶墾田皆為狄保雖分遣將卒俱出淮南未解沔北之危已深渦陽之敗征賦內盡民命外殫比屋騷然不聊生矣夫休罒某月之數誠有天機得失之迹各歸人事豈不由將率相臨貪功昧賞勝敗之急不相救讓號令不明固中國之所短也贊曰天立勍胡竊有帝圖即安諸夏建號稱孤齊民急病并邑焚刳
