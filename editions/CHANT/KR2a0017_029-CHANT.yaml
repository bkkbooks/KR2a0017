body:
  text: 卷二十九列傳第十呂安國呂安國廣陵廣陵人也宋大明末安國以將領見任隱重有幹局為劉勔所稱泰始二年勔征殷琰於壽春安國以建威將軍為勔軍副眾軍擊破琰長史杜叔寶軍於橫塘安國抄斷賊糧道燒其運車多所傷殺琰眾奔退勔遣安國追之先至壽春琰閉門自守安國與輔國將軍垣閎屯據城南於是眾軍繼至安國勳第一封彭澤縣男未拜明年改封鍾武縣加邑為四百戶累至寧朔將軍義陽太守四年又改封湘南縣男虜陷汝南司州失守以安國為督司州諸軍事寧朔將軍司州刺史六年義陽立州治仍領義陽太守稍遷右軍將軍假輔師將軍元徽二年為晉熙王征虜司馬輔師將軍如故轉游擊將軍三年出為持節都督青兗冀三州緣淮前鋒諸軍事輔師將軍兗州刺史明年進號冠軍將軍還為游擊將軍加散騎常侍征虜將軍沈攸之事起太祖以安國為湘州刺史征虜將軍如故先是王蘊罷州南中郎將南陽王翽未之鎮蘊寧朔長史庾佩玉權行州事朝廷先遣南中郎將中兵參軍臨湘令韓幼宗領軍防州沈攸之之難二人各相疑阻佩玉輒殺幼宗平西將軍黃回至郢州遣軍主任候伯行湘州事又殺佩玉候伯與回同衛將軍袁粲謀石頭事回令候伯水軍乘舸往赴會眾軍已至不得入太祖令安國至鎮收候伯誅之尋進號前將軍建元元年進爵增邑六百戶轉右衛將軍加給事中二年虜寇邊上遣安國出司州安集民戶詔曰郢司之閒流雜繁廣宜並加區判定其隸屬參詳兩州事無專任安國可蹔往經理以本官使持節總荊郢諸軍北討事屯義陽西關虜未至安國移屯沔口以俟應接改封湘鄉世祖即位授使持節散騎常侍平西將軍司州刺史領義陽太守永明二年徙都督南兗兗徐青冀五州諸軍事平北將軍南兗州刺史仍為都督湘州刺史四年湘川蠻動安國督州兵討之有疾徵為光祿大夫加散騎常侍安國欣有文授謂其子曰汝後勿作袴褶驅使單衣猶恨不稱當為朱衣官也上遣中書舍人茹法亮敕安國曰吾恒憂卿疾病應有所須勿致難也明年遷都官尚書領太子左率六年遷領軍將軍安國累居將率在朝以宿舊見遇尋遷散騎常侍金紫光祿大夫兗州中正給扶上又敕茹法亮曰吾見呂安國疾狀自不宜勞且腳中既恒惡扶人至吾前於禮望殊成有虧吾難敕之其人甚諱病卿可作私意向其若好差不復須扶人依例入幸勿牽勉八年卒年六十四贈使持節鎮北將軍南兗州刺史常侍如故給鼓吹一部諡肅侯全景文時舊將帥又有吳郡全景文字弘達少有氣力與沈攸之同載出都到奔牛埭於岸上息有人相之君等皆方伯人行當富貴也景文謂攸之曰富貴或可一人耳今言皆然此殆妄言也景文仍得將領為軍主孝建初為竟陵王驃騎行參軍以功封漢水侯除員外郎積射將軍泰始二年為假節寧朔將軍宂從僕射軍主隨前將軍劉亮討破東賊於晉陵除長水校尉假輔國將軍北討薛索兒於破釜領水軍斷賊糧運仍隨太祖於葛冢石梁再戰皆有功南賊相持未決敕景文隸劉亮拒劉胡攻圍力戰身被數十創除前軍將軍封孝寧縣侯邑六百戶除寧朔將軍游擊將軍假輔師將軍高平太守鎮軍安西二府司馬驍騎將軍元徽末出為南豫州刺史歷陽太守輔國將軍如故遷征虜將軍南琅邪濟陰二郡太守軍主尋加散騎常侍建元元年以不預佐命國除授南琅邪太守常侍將軍如故遷光祿大夫征虜將軍臨川王征西司馬南郡太守還累遷為給事中光祿大夫永明九年卒周山圖周山圖字季寂義興義鄉人也少貧微傭書自業有氣幹為吳郡晉陵防郡隊主宋孝武伐太初山圖豫勳賜爵關中侯兗州刺史沈僧榮鎮瑕丘與山圖有舊以為己建武府參軍竟陵王誕據廣陵反僧榮遣山圖領二百人詣沈慶之受節度事平論勳為中書舍人戴明寶所抑泰始初為殿中將軍四方反叛僕射王彧舉山圖將領呼與語甚悅使領百舸為前驅與軍主佼長生等攻破賊湖白赭圻二城除員外郎加振武將軍豫平濃湖追賊至西陽還明帝賞之賜苑西宅一區鎮軍將軍張永征薛安都於彭城山圖領二千人迎運至武原為虜騎所追合戰多所傷殺虜圍轉急山圖據城自固然後更結陣死戰突圍出虜披靡不能禁眾稱其勇呼為武原將及永軍大敗山圖收散卒得千餘人守下邳城還除給事中宂從僕射直閣將軍山圖好酒多失明帝數加怒誚後遂自改出為錢唐新城戍是時豫州淮西地新沒虜更於歷陽立鎮五年以山圖為龍驤將軍歷陽令領兵守城初臨海亡命田流自號東海王逃竄會稽鄞縣邊海山谷中立屯營分布要害官軍不能討明帝遣直後聞人襲說降之授流龍驤將軍流受命將黨與出行達海鹽放兵大掠而反是冬殺鄞令耿猷東境大震六年敕山圖將兵東屯浹口廣設購募流為其副暨挐所殺別帥杜連梅洛生各擁眾自守至明年山圖分兵掩討皆平之豫章賊張鳳聚眾康樂山斷江劫抄臺軍主李雙蔡保數遣軍攻之連年不禽至是軍主毛寄生與鳳戰於豫章江大敗明帝復遣山圖討之山圖至先羸兵偃眾遣幢主龐嗣厚遺鳳要出會聚聽以兵自衛鳳信之行至望蔡山圖設伏兵於水側擊斬鳳首眾百餘人束首降除寧朔將軍漣口戍主山圖遏漣水築西城斷虜騎路并以溉田元徽三年遷步兵校尉加建武將軍轉督高平下邳淮陽淮西四郡諸軍事寧朔將軍淮南太守盜發桓溫塚大獲寶物客竊取以遺山圖山圖不受簿以還官遷左中郎將太祖輔政山圖密啟曰沈攸之久有異圖公宜深為之備太祖笑而納之武陵王贊為郢州太祖令山圖領兵衛送世祖與晉熙王燮自郢下以山圖為後防攸之事起世祖為西討都督啟山圖為軍副世祖留據盆城眾議以盆城城小難固不如還都山圖曰今據中流為四方勢援大眾致力川岳可為城隍小事不足難也世祖使城局參軍劉皆陳淵委山圖以處分事山圖斷取行旅船板以造樓櫓立水柵旬日皆辦世祖甚嘉之授前軍將軍加寧朔將軍進號輔國將軍攸之攻郢城世祖令山圖量其形勢山圖曰攸之見與鄰鄉亟同征伐悉其為人性度險刻無以結固士心如頓兵堅城之下適所以為離散之漸耳攸之既敗平西將軍黃回乘輕舸從白服百餘人在軍前下緣流叫盆城中恐須臾知是回凱歸乃安世祖謂山圖曰周公前言可謂明於見事矣還都太祖遣山圖領部曲鎮京城鎮戍諸軍悉受節度遷游擊將軍輔國如故建元元年封廣晉縣男邑三百戶出為假節督兗青冀三州徐州東海胊山軍事寧朔將軍兗州刺史百姓附之二年進號輔國將軍其秋虜動上策虜必不出淮陰乃敕山圖曰知卿綏邊撫戎甚有次第應變算略悉以相委恐列醜未必能送死卿丈夫無可藉手耳虜果寇胊山為玄元度盧紹之所破虜於淮陽是時淮北四州起義上使山圖自淮入清倍道應赴敕山圖曰卿當盡相帥馭理每存全重天下事唯同心力山岳可摧然用兵當使背後無憂慮若後冷然無橫來處閉目痛打無不摧碎吾政應鑄金待卿成勳耳若不藉此平四州非丈夫也努力自運勿令他人得上功會義眾已為虜所沒山圖拔三百家還淮陰表移東海郡治漣口又於石鱉立陽平郡皆見納世祖踐阼遷竟陵王鎮北司馬帶南平昌太守將軍如故以盆城之舊出入殿省甚見親信義鄉縣長風廟神姓鄧先經為縣令死遂發靈山圖啟乞加神位輔國將軍上答曰足狗肉便了事何用階級為轉黃門郎領羽林四廂直衛山圖於新林立墅舍晨夜往還上謂之曰卿罷萬人都督而輕行郊外自今往墅可以仗身自隨以備不虞及疾上手敕參問遣醫給藥永明元年卒年六十四詔賜朝服一具衣一襲周盤龍周盤龍北蘭陵蘭陵人也宋世土斷屬東平郡盤龍膽氣過人尤便弓馬泰始初隨軍討赭圻賊躬自鬭戰陷陣先登累至龍驤將軍積射將軍封晉安縣子邑四百戶元徽二年桂陽賊起盤龍時為宂從僕射騎官主領馬軍主隨太祖頓新亭與屯騎校尉黃回出城南與賊對陣尋引還城中合力拒戰事寧除南東莞太守加前軍將軍稍至驍騎將軍昇明元年出為假節督交廣二州軍事征虜將軍平越中郎將廣州刺史未之官預平石頭二年沈攸之平司州刺史姚道和懷貳被徵以盤龍督司州軍事司州刺史假節將軍如故改封沌陽縣太祖即位進號右將軍建元二年虜寇壽春以盤龍為軍主假節助豫州刺史垣崇祖決水漂漬盤龍率輔國將軍張倪馬步軍於西澤中奮擊殺傷數萬人獲牛馬輜重上聞之喜詔曰醜虜送死敢寇壽春崇祖盤龍正勤義勇乘機電奮水陸斬擊填川蔽野師不淹晨西蕃剋定斯實將率用命之功文武爭伐之力凡厥勳勤宜時銓序可符列上盤龍愛妾杜氏上送金釵鑷二十枚手敕曰餉周公阿杜轉太子左率改授持節軍主如故明年虜寇淮陽圍角城先是上遣軍主成買戍角城謂人曰我今作角城戍我兒當得一子或問其故買曰角城與虜同岸危險具多我豈能使虜不敢南向我若不沒虜則應破虜兒不作孝子便當作世子也至虜圍買數重上遣領軍將軍李安民為都督救之敕盤龍曰角城漣口賊始復進西道便是無賊卿可率馬步下淮陰就安民軍鍾離船少政可致衣仗數日糧軍人扶淮步下也買與虜拒戰手所傷殺無數晨朝早起手中忽見有數升血其日遂戰死盤龍子奉叔單馬率二百餘人陷陣虜萬餘騎張左右翼圍繞之一騎走還報奉叔已沒盤龍方食棄箸馳馬奮槊直奔虜陣自稱周公來虜素畏盤龍驍名即時披靡時奉叔已大殺虜得出在外盤龍不知乃衝東擊西奔南突北賊眾莫敢當奉叔見其父久不出復躍馬入陣父子兩匹騎縈攪數萬人虜眾大敗盤龍父子由是名播北國形甚羸訥而臨軍勇果諸將莫逮永明元年遷征虜將軍南琅邪太守三年遷右衛將軍加給事中五年轉大司馬加征虜將軍濟陽太守世祖數講武常令盤龍領馬軍校騎騁槊後以疾為光祿大夫尋出為持節都督兗州緣淮諸軍事平北將軍兗州刺史進爵為侯角城戍將張蒲與虜潛相構結因大霧乘船入清中採樵載虜二十餘人藏仗𥫳下直向城東門防門不禁仍登岸拔白爭門戍主皇甫仲賢率軍主孟靈寶等三十餘人於門拒戰斬三人賊眾被創赴水而虜軍馬步至城外已三千餘人阻塹不得進淮陰軍主王僧慶等領五百人赴救虜眾乃退坐為有司所奏詔白衣領職八座尋奏復位加領東平太守盤龍表年老才弱不可鎮邊求解職見許還為散騎常侍光祿大夫世祖戲之曰卿著貂蟬何如兜鍪盤龍曰此貂蟬從兜鍪中出耳十一年病卒年七十九贈安北將軍兗州刺史子奉叔子奉叔勇力絕人隨盤龍征討所在為暴掠世祖使領軍東討唐㝢之奉叔畏上威嚴檢勒部下不敢侵斥為東宮直閤鬱林在西州奉叔密得自進及即位與直閤將軍曹道剛為心膂道剛驍騎將軍加冠軍將軍奉叔游擊將軍加輔國將軍並監殿內直衛少日仍遷道剛為黃門郎高宗固諫不納奉叔善騎馬帝從其學騎射尤見親寵得入後宮尋加領淮陵太守兗州中正道剛加南濮陽太守隆昌元年除黃門郎未拜仍出為持節都督青冀二州軍事冠軍將軍青州刺史時帝謀誅宰輔故出奉叔為外援除道剛中軍司馬青冀二州中正本官如故奉叔就帝求千戶侯許之高宗輔政以為不可封曲江縣男三百戶奉叔大怒於眾中攘刀厲目高宗說喻之乃受奉叔辭畢將之鎮部伍已出高宗慮其一出不可復制與蕭諶謀稱敕召奉叔於省內殺之勇士數人拳擊久之乃死啟帝云奉叔慢朝廷帝不獲已可其奏高宗廢帝之日道剛直閣省蕭諶先入戶若欲論事兵人隨後奄進以刀剌之洞胸死因進宮內廢帝世雄奉叔弟世雄永元中為西江督護陳顯達事後世雄殺廣州刺史蕭季敞稱季敞同逆送首京師廣州刺史顏翻討殺之王廣之王廣之字林之沛郡相人也少好弓馬便捷有勇力初為馬隊主宋大明中以功補本縣令殿中龍驤強弩將軍驃騎中兵南譙太守泰始初除寧朔將軍軍主隸寧朔將軍劉懷珍征殷琰於壽春琰將劉從築壘相守臺軍相拒移日琰遣長史杜叔寶領五千人運車五百乘援從懷珍遣廣之及軍主辛慶祖黃回千道連等要擊於橫塘寶結營拒戰廣之等肉薄攻營自晡至日沒大敗之殺傷千餘人遂退燒其運車從聞之棄壘奔走時合肥城反官軍前後受敵都督劉勔召諸軍主會議廣之曰請得將軍所乘馬往平之勔以馬與廣之廣之去三日攻剋合肥賊仍隨懷珍討淮北時明帝遣青州刺史明僧暠北征至三城為沈文秀所攻廣之將步騎三千餘人緣海救之俱引退廣之又進軍襲文秀所置長廣太守劉桃根桃根棄城走軍還封安蠻縣子三百戶尋改蒲圻除建威將軍南陽太守不之官除越騎校尉龍驤將軍鍾離太守遷為左軍將軍加寧朔將軍高平太守又除游擊將軍寧朔如故加給事中冠軍將軍討宋建平先登京口改封寧都縣子五百戶太祖廢蒼梧出廣之為假節督徐州軍事徐州刺史鍾離太守冠軍如故沈攸之事起廣之留京師豫平石頭仍從太祖頓新亭進號征虜將軍太祖誅黃回回弟駟及從弟馬兄子奴亡逸太祖與廣之書曰黃回雖有微勳而罪過轉不可容近遂啟請御大小二輿為刺史服飾吾乃不惜為其啟聞政恐得輿復求畫輪車此外罪不可勝數第自悉之今啟依法令廣之於江西搜捕駟等建元元年進爵為侯食邑千戶轉散騎常侍左軍將軍北虜動明年詔假廣之節出淮上廣之家在彭沛啟上求招誘鄉里部曲北取彭城上許之以廣之為使持節都督淮北軍事平北將軍徐州刺史廣之引軍過淮無所剋獲坐免官尋除征虜將軍加散騎常侍太子右率世祖即位遷長沙王鎮軍司馬南東海太守司徒司馬尋陽相南新蔡太守安陸王北中郎左軍司馬廣陵太守將軍如故出為持節都督徐州諸軍事徐州刺史將軍如故還為光祿大夫左將軍司徒司馬遷右衛將軍轉散騎常侍前將軍世祖見廣之子珍國應堪大用謂廣之曰卿可謂老蚌也廣之曰臣不敢辭上大笑除游擊將軍不拜十一年虜動假廣之節招募隆昌元年遷給事中左衛將軍時豫州刺史崔慧景密與虜通有異志延興元年以廣之為持節督豫州郢州之西陽司州之汝南二郡軍事平西將軍豫州刺史預廢鬱林勳增封三百戶高宗誅害諸王遣廣之征安陸王子敬於江陽給鼓吹一部事平仍改授使持節散騎常侍都督江州諸軍事鎮南將軍江州刺史進封應城縣公食邑二千戶建武二年虜圍司州遣廣之持節督司州征討解圍廣之未至百餘里虜退乃還明年遷侍中鎮軍將軍給扶四年卒年七十三追贈散騎常侍車騎將軍諡曰壯公史臣曰公侯扞城守國之所資也必須久習兵事非一戰之力安國等致效累朝聲勤克舉並識時變咸知附託盤龍驍勇獨冠三軍匈奴之憚飛將曾不若也壯矣哉贊曰安國舊將協同遷社同禆九江翊從中夏盤龍殺敵洞開胡馬廣之末年旌旄驟把
