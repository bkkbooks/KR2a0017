  - {type: variant, offset: 9455, length: 0, content: '', WYG: 南齊書卷四十南齊書卷四十考證魚復侯子響傳丹陽尹蕭順之領兵繼至子響部下恐懼各逃散子響乃白服降賜死臣祖庚按南史子響見順之欲自申眀順之不許於射堂縊殺之與此互異通鑑考異曰盖蕭子顯為順之諱耳注云順之梁武帝之父蕭子顯仕梁朝而作齊書故言其為順之諱也又按帝紀作巴東王通鑑同盖魚復巴東屬邑是時貶為魚復侯也豫章王嶷上表臣祖庚按表文與南史所載繁簡互别㣲列葦韔之容韔汲古閣本作輤旁注雍本作韔先是貶為魚復侯南監本無先是二字晉安王子懋傳阮報其兄于瑶之為計兄南監本作同産弟南史亦作同産弟不如法即問事問事南監本作周章或超五三階級及文章詩筆南監本無及字汲古閣本無級字南齊書卷四十考證}
