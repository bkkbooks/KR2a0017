置立宋属歴陽郡宋白曰晋太康六年于東城界置烏江縣此属臨江郡以并歴陽故也南兖州臣祖庚按晋成帝立治京口文帝始割江淮間為境治廣陵海陵郡臣祖庚按晋安帝分廣陵立郡山陽郡臣祖庚按晋安帝義熙中分廣陵立郡境内有地名山陽故名盱眙郡臣宗萬按盱眙本縣治前漢属臨淮郡後漢属下邳郡晋復属臨淮郡安帝分立盱眙郡鍾離郡臣祖庚按本縣治漢属九江郡晋属淮南郡安帝時分立属南兖州又通典鍾離縣東四十里有古鍾離城史記伍子胥傳吴㧞楚鍾離注古鍾離之國世本作終犁馬頭郡臣祖庚按沈約曰故淮南當塗縣地晋安帝立因山形而名属南豫州宋属徐州睢陵臣宗萬按前漢属淮南郡後漢属下邳郡宋属濟隂郡沈約曰濟隂本属兖州其民流寓徐土因割地為郡杜佑曰睢陵縣故城在泗州下邳縣東南吉陽臣祖庚按吴立縣於吉水之陽因以為名上饒臣宗萬按宋白曰信州有上饒縣本秦番縣界漢為番陽縣今州古城遺跡開皇中所廢古上饒也九域志番陽東南至上饒五百四十里龍川臣祖庚按顔師古曰裴氏廣州記云本博羅縣之東鄉也有龍穿地而岀即穴流水因以為號鬰林郡臣祖庚按故秦桂林郡属尉佗武帝光鼎六年開更名武平郡臣祖庚按吴孫皓建衡三年分交阯立新興郡晉武帝太康三年更名新昌属交州九徳郡臣祖庚按古越裳氏國沈約曰孫吴分立九徳郡盧容臣祖庚按即秦象郡象林縣地亦謂之象浦南齊書卷十四考證
