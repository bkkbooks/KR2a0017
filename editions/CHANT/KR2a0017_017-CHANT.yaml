body:
  text: 卷十七志第九輿服昔三皇乘祗車出谷口夏氏以奚仲為車正殷有瑞車山車垂句是也周禮匠人為輿以象天地漢武天漢四年朝諸侯甘泉宮定輿服制班於天下光武建武十三年得公孫述葆車輿輦始具蔡邕創立此志馬彪勒成漢典晉摯虞治禮亦議五輅制度江左之始車服多闕但有金戎省充庭之儀太興中太子臨學無高蓋車元帝詔乘安車元明時屬車唯九乘永和中石虎死後舊工人奔叛歸國稍造車輿太元中苻堅敗後又得偽車輦於是屬車增為十二乘義熙中宋武平關洛得姚興偽車輦宋大明改修輦輅妙盡時華始備偽氐復設充庭之制永明中更增藻飾盛於前矣案周禮以檢漢志名器不同晉宋改革稍與世異今記時事而已玉輅漆畫輪兩廂上望板前優遊龍汗板斗蓋一轅漆畫車衡旂十二旒棨戟漆案立床錦複黃絞鄣泥五輅江左相承駕四馬左右騑為六施絳系游御繩其重轂貳轄飛軨幡左纛金鍐方釳繁纓鏤鍚皆如古制世祖永明初加玉輅為重蓋又作麒麟頭采畫以馬首戴之竟陵王子良啟曰臣聞車旗有章載自前史器必依禮服無舛法凡蓋員象天軫方法地上無二天之儀下設兩蓋之飾求之志錄恐為乖衷又假為麟首加乎馬頭事不師古鮮或可施建武中明帝乃省重蓋等金輅象輅木輅革輅建大麾宋昇明三年錫齊王大輅戎輅各一乘黃五輅無大輅戎輅左丞王逡之議大輅殷之祭車故不登周輅之名而明堂位云大輅殷輅也注云大輅木輅也月令中央土乘大輅注云殷輅也禮器大輅繁纓一就注云大輅殷之祭天車也周禮五路玉路金路象路革路木路則周之木路殷之大輅也周革路建大白以即戎此則戎輅也意謂國之大事在祀與戎故錫以殷祭天之車與周之即戎之路祀則以殷戎必以周者明郊天義遠建前代之禮即戎事近故以今世之制明堂位云魯君孟春乘大路載十有二旒日月之章祀於帝郊天必以大輅以錫諸侯良有以也今木路即大路也太尉左長史王儉議宜用金輅九旒時乘黃無副借用五輅大朝臨軒權列三輅玉金輅建碧旂象木輅建赤旂永明初太子步兵校尉伏曼容議以為齊德尚青五路五牛及五色幡旗並宜以先青為次軍容戎事之所乘犧牲繭握之所薦並宜悉依尚色三代服色以姓音為尚漢不識音故還尚其行運之色今既無善律則大齊所尚亦宜依漢道若有善吹律者便應還取姓尚太子僕周顒議三代姓音古無前記裁音配尚起自曼容則是曼容善識姓聲不復旁假吹律何故能識遠代之宮商而更迷皇朝之律呂而云當今無知吹律以定所尚宜附漢以從闕邪皇朝本以行運為所尚非關不定於音氏如此設有善律之知音不宜遵聲以為尚散騎常侍劉朗之等十五人並議駮之事不行皇太子象輅皇太后皇后重翟車蓋碧旂九旒棨戟宋元嘉東宮儀記云中宮僕御重翟金根車未詳得稱為金根也皇太子妃厭翟車指南車記里鼓車輦車司馬法曰夏后氏輦曰金車殷曰胡奴車周曰輜車皆輦也漢書叔孫通傳云皇帝輦出房成帝輦過後宮此朝宴並用也輿服志云輦車具金銀丹青采雘雕畫蒲陶之文乘人以行信陽侯陰就見井丹左右人進輦是為臣下亦得乘之晉武帝給安平獻王孚雲母輦晉中朝又有香衣輦江左唯御所乘臥輦漆畫輪車御為群公舉哀臨哭所乘皇后太子妃亦乘之漆畫牽車御及皇太子所乘即古之羊車也晉泰始中中護軍羊琇乘羊車為司隸校尉劉毅所奏武帝詔曰羊車雖無制非素者所服免官衛玠傳云總角乘羊車市人聚觀今不駕羊猶呼牽此車者為羊車云輿車一曰小輿小行幸乘之皇太子亦得於宮內乘之衣書十二乘古副車之象也今亦曰五時副車青萌車是謂㩉幔車油絡畫安車公主王妃三公特進夫人所乘漢制皇后貴人紫罽軿車晉皇后乘雲母油畫安車駕六以兩轅安車駕五為副公主畫安車駕六以兩轅安車駕三為副公主畫安車駕三三夫人青交絡安車駕三皆以紫絳罽軿車駕三為副九嬪世婦軿車駕二王公妃特進夫人皁交絡為副漢賤軺車而貴軿車晉賤輜軿而貴軺車皆行禮所乘黃屋車建碧旂九旒九命上公所乘青蓋安車朱轓漆班輪駕一左右騑通幰車為副諸王禮行所乘凡車有轓者謂之軒皁蓋安車朱轓漆班輪駕一通幰牛車為副三公禮行所乘安車黑耳皁蓋馬車朱轓駕一牛車為副國公列侯禮行所乘馬車駕一九卿領護二衛驍游四軍五校從郊陵所乘晉制三公下至九卿又各安車黑耳一乘公駕三特進駕二卿駕一復各軺車施黑耳後戶皁輪一乘油絡軺車尚書令僕射中書監令尚書侍中常侍中黃門中書散騎侍郎皆駕一牛朝直所乘晉制尚書令施黑耳後戶皁輪僕射中書監令直施後戶皁輪尚書無後戶皆漆輪轂今猶然安車赤屏駕一又軺車施後戶為副太子二傅禮行所乘四望車亦曰皁輪以加禮貴臣晉武詔給魏舒陽燧四望小車三望車或謂之夾望亦以加禮貴臣次四望油幢絡車王公加禮者之常乘次三望平乘車三公諸王所乘自四望至平乘皆銅校飾轀輬車虞書曰予欲觀古人之象日月星辰山龍華蟲作繢宗彝藻火粉米黼黻絺繡以五采章施於五色天子服備日月以下公山龍以下侯伯華蟲以下子男藻火以下卿大夫粉米以下天子六冕王后六服著在周官公侯以下咸有名則佩玉組綬並具禮文後代沿革見漢志晉服制令其冠十三品見蔡邕獨斷並不復具詳宋明帝泰始四年更制五輅議修五冕朝會饗獵各有所服事見宋注舊相承三公以下冕七旒青玉珠卿大夫以下五旒黑玉珠永明六年太常丞何諲之議案周禮命數改三公八旒卿六旒尚書令王儉議依漢三公服二龍九章卿華蟲七章從之平冕黑介幘今謂平天冠皁表朱緣裏廣七尺長尺二寸垂珠十二旒以朱組為纓如其綬色衣皁上絳下裳前三幅後四幅衣畫而裳繡為日月星辰山龍華蟲藻火粉米黼黻十二章素帶廣四寸朱裏以朱綠裨飾其側要中以朱垂以綠垂三尺中衣以絳緣其領袖赤皮韍絳袴襪赤舄郊廟臨朝所服也漢世冕用白玉珠為旒魏明帝好婦人飾改以珊瑚珠晉初仍舊後乃改江左以美玉難得遂用琫珠世謂之白琁珠袞衣漢世出陳留襄邑所織宋末用繡及織成建武中明帝以織成重乃采畫為之加飾金銀薄世亦謂為天衣史臣曰黼黻之設經緯為用故五色六章十二衣還相為質也歷代龍袞織以成文今體不勝衣變易舊法豈致美黻冕之謂乎通天冠黑介幘金博山顏絳紗袍皁緣中衣乘輿常朝所服舊用駮犀簪導東昏改用玉其朝服臣下皆同黑介幘單衣無定色乘輿拜陵所服其白帢單衣謂之素服以舉哀臨喪遠游冠太子諸王所冠太子朱纓翠羽緌珠節諸王玄纓公侯皆同平冕各以組為纓王公八旒衣山龍九章卿七旒衣華蟲七章並助祭所服皆畫皁絳繒為之進賢冠諸開國公侯鄉亭侯卿大夫尚書關內侯二千石博士中書郎丞郎祕書監丞郎太子中舍人洗馬舍人諸府長史卿尹丞下至六百石令長小吏以三梁二梁一梁為差事見晉令武冠侍臣加貂蟬餘軍校武職黃門散騎太子中庶子二率朝散都尉皆冠之唯武騎虎賁服文衣插雉尾於武冠上史臣曰應劭漢官釋附蟬及司馬彪志並不見侍中與常侍有異唯言左右珥貂而已案項氏說云漢侍中蟬刻為蟬像常侍但為璫而不蟬未詳何代所改也法冠廷尉等諸執法者冠之高山冠謁者冠之樊噲冠殿門衛士冠之黑介幘冠文冠平幘冠武冠尚書令僕射尚書納言幘後飾為異童子空頂幘施假髻貴賤同服救日蝕文武官皆免冠著赤介幘對朝服赤幘示威武也袴褶車駕親戎中外纂嚴所服黑冠帽綴紫褾以絡帶代鞶帶中官紫褾外官絳褾其纂嚴戎服不綴褾行留悉同校獵巡幸從官戎服革帶鞶帶文官不纓武官脫冠袿襡大衣謂之褘衣皇后謁廟所服公主會見大首髻其燕服則施嚴雜寶為佩瑞袿襡用繡為衣裳加五色鎖金銀校飾綬乘輿黃赤綬黃赤縹綠紺五采太子朱綬諸王纁朱綬皆赤黃縹紺四采妃亦同相國綠綟綬三采綠紫紺郡公玄朱侯伯青朱子男素朱皆三采公世子紫侯世子青鄉亭關內侯墨綬皆二采郡國太守內史青尚書令僕中書監令祕書監皆黑丞皆黃諸府丞亦黃皇后與乘輿同赤貴嬪夫人貴人紫王太妃長公主封君亦紫綬六宮青綬青白紅郡公侯夫人青綬乘輿傳國璽秦璽也晉中原亂沒胡江左初無之北方人呼晉家為白板天子冉閔敗璽還南別有行信等六璽皆金為之亦秦漢之制也皇后金璽太子諸王金璽皆龜鈕公侯五等金章公世子金印侯銀印貴嬪夫人金章公主王太妃封君金印六宮以下公侯太夫人夫人銀印其公將軍金章光祿大夫卿尹太子傅諸領護將軍中郎將校尉郡國太守內史四品五品將軍皆銀章尚書令僕中書監令祕書監丞太子二率諸府長史卿尹丞尉中丞都水使者諸州刺史皆銅印三臺五省二品文官皆簪白筆王公五等及武官不簪加內侍乃簪百官執手板尚書令僕尚書手板頭復有白筆以紫皮裹之名曰笏漢末仲長統謂百司皆宜執之其肩上紫袷囊名曰契囊世呼為紫荷佩玉自乘輿以下與晉宋制同建元四年制王公侯卿尹珠水精其餘用牙蚌太官宰人服離支衣後定贊曰文物煌煌儀品穆穆分別禮數莫過輿服
