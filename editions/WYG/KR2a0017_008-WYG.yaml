front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0017_WYG_008-1a, image: WYG0259/WYG0259-0074c.png}
body:
  text: 南齊書卷八梁蕭子顯撰本紀第八和帝和帝諱寳融字智昭髙宗第八子也建武元年封隨郡王邑二千戸三年為冠軍将軍領石頭戌軍事永元元年改封南康王為持節督荆雍益寜梁南北秦七州軍事西中郎将荆州刺史二年十一月甲寅長史蕭穎胄殺輔國将軍巴西梓潼二郡太守劉山陽奉梁王舉義乙夘教纂嚴又教曰吾躬率晉陽翦此凶孽戎事方勤宜覃澤恵所領内繋囚見徒罪無輕重殊死已下皆原遣先有位署即復本職将吏轉一階從征身有家口停鎮給廩食凡諸雜役見在諸軍帶甲之身克定之後悉免為民其功効賞報别有科條丙辰以雍州刺史梁王為使持節都督前鋒諸軍事左将軍丁巳以蕭穎胄為右将軍都督行留諸軍事戊午梁王上表勸進十二月乙亥羣僚勸進並不許壬辰驍騎将軍夏侯亶自京師至江陵稱宣徳太后令西中郎将南康王宜纂承皇祚光臨億兆方俟清宫未即大號可且封宣城南琅邪南東海東陽臨海新安尋陽南郡竟陵宜都十郡為宣城王相國荆州牧加黄鉞置僚屬選百官西中郎府南康國並如故湏軍次近路主者詳依舊典法駕奉迎三年正月乙巳王受命大赦唯梅蟲兒茹法珍等不在赦例右将軍蕭穎胄為左長史進號鎮軍将軍梁王進號征東将軍甲戍以冠軍将軍楊公則為湘州刺史甲寅建牙于城南二月乙丑以冠軍長史王茂先為江州刺史冠軍将軍曹景宗為郢州刺史右将軍邵陵王寳攸為荆州刺史己巳羣僚上尊號立宗廟及南北郊甲申梁王率大衆屯沔口郢州刺史張沖拒守三月丁酉張沖死驃騎将軍薛元嗣等固守中興元年春三月乙巳即皇帝位大赦改元文武賜位二等鰥寡孤獨不能自存者糓人五斛即永元三年也以相國左長史蕭穎胄為尚書令晉安王寳義為司空廬陵王寳源為車騎将軍開府儀同三司建安王寳寅為徐州刺史散騎常侍夏侯詳為中領軍領軍将軍蕭偉為雍州刺史丙午有司奏封庶人寳卷為零陽侯詔不許又奏為涪陵王詔可乙酉尚書令蕭穎胄行荆州刺史假梁王黄鉞壬子以征虜将軍栁惔為益寜二州刺史己未以冠軍将軍荘邱黒為梁南秦二州刺史冠軍将軍鄧元起為廣州刺史夏四月戊辰詔曰荆雍義舉所基實始王迹君子勞心細人盡力宜加酬奨副其乃誠凡東討衆軍及諸嚮義之衆可普復除五月乙夘車駕幸竹林寺禪房宴羣臣巴西太守魯休烈巴東太守蕭恵訓子璝拒義軍秋七月東軍主吴子陽十三軍救郢州屯加湖丁酉征虜将軍王茂先擊破之辛亥以茂先為中䕶軍丁夘魯山城主孫樂祖以城降己未郢城主薛元嗣降八月丙子平西将軍陳伯之降乙夘以伯之為江州刺史子虎牙為徐州刺史九月乙未詔梁王若定京邑得以便宜從事冬十一月乙未以輔國将軍李元履為豫州刺史壬寅尚書令鎮軍将軍蕭穎胄卒以黄門郎蕭澹行荆州府州事丁巳蕭璝魯休烈降十二月丙寅建康城平己巳皇太后令以梁王為大司馬録尚書事驃騎大将軍揚州刺史封建安郡公依晉武陵王遵承制故事百僚致敬壬申改封建安王寳寅鄱陽王癸酉以司徒揚州刺史晉安王寳義為太尉領司徒甲戌給大司馬錢二千萬布絹各五千匹乙酉以輔國将軍蕭宏為中護軍二年春正月戊戌宣徳太后臨朝入居内殿大司馬梁王解承制致敬如先己亥以寜朔将軍蕭昺監南兖州壬寅以大司馬都督中外諸軍事加殊禮己酉以大司馬長史王亮為守尚書令甲寅詔大司馬梁王進位相國總百揆揚州牧封十郡為梁公備九錫之禮加逺逰冠位在諸王上加相國緑綟綬己未以新除右将軍曹景宗為郢州刺史二月壬戌湘東王寳晊伏誅戊辰詔進梁公爵為梁王増封十郡三月乙未皇太后令給梁國錢五百萬布五千匹絹千匹辛丑鄱陽王寳寅奔虜邵陵王寳攸晉熙王寳嵩桂陽王寳貞伏誅甲午命梁王冕十有二旒建天子旌旗出警入蹕乘金根駕六馬備五時副車置旄頭雲罕樂舞八佾設鐘簴宫懸王子王女爵命一如舊儀庚戌以冠軍長史蕭秀為南徐州刺史新除中領軍蔡道恭為司州刺史車駕東歸至姑熟丙辰禪位梁王丁巳廬陵王寳源薨夏四月辛酉禪詔至皇太后遜外宫丁夘梁王奉帝為巴陵王宫于姑熟行齊正朔一如故事戊辰薨年十五追尊為齊和帝葬恭安陵史臣曰夏以桀亡殷隨紂滅郊天改朔理無延世而皇符所集重興西楚神器蹔来雖有㝠數徽名大號斯為幸矣贊曰和帝晚隆掃難清宫逹機覩運髙頌永終南齊書卷八南齊書卷八考證和帝本紀有司奏封庶人寳卷為零陽侯零陽南史作零陵中興二年二月壬戌湘東王寳晊伏誅臣祖庚按明帝十一男湘東無傳南史王亮傳云張稷等議立湘東嗣王寳晊領軍王瑩曰城閉已久人情離解征東在近何不諮問紀不載其事通鑑考異云和帝已立稷等知建康不可守故弑東昬豈敢復議立寳晊據此則議立湘東之説南史誤矣是時衍已有異志諸王無不見害湘東獨能自存乎南齊書卷八考證
