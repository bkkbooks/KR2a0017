body:
  text: 南齊書卷三十八梁蕭子顯撰列傳第十九蕭景先蕭赤斧子頴胄蕭景先南蘭陵蘭陵人太祖從子也祖爰之員外郎父敬宗始興王國中軍景先少遭父喪有至性太祖嘉之及從官京邑常相提攜解褐為海陵王國上軍將軍補建陵令還為新安王國侍郎桂陽國右常侍太祖鎮淮隂景先以本官領軍主自随防衛城内委以心腹除後軍行參軍卭縣令員外郎與世祖欵暱世祖為廣興郡啟太祖求景先同行除世祖寧朔府司馬自此常相随逐世祖為鎮西長史以景先為鎮西長流參軍除寧朔將軍随府轉撫軍中兵參軍尋除諮議領中兵如故昇明初為世祖征虜府司馬領新蔡太守随上鎮盆城沈攸之事平還都除寧朔將軍驍騎將軍仍為世祖撫軍中軍二府司馬兼左衛將軍建元元年遷太子左衛率封新吳縣伯邑五百户景先本名道先乃改避上諱出為持節督司州軍州事寧朔將軍司州刺史領義陽太守是冬虜出淮泗増司部邊戍兵義陽人謝天盖與虜相構扇景先言於督府驃騎豫章王遣輔國將軍中兵參軍蕭惠朗二千人助景先惠朗依山築城斷塞關隘討天盖黨與虜尋遣偽南部尚書頞跋屯汝南洛州刺史昌黎王馮莎屯清丘景先嚴備待敵豫章王又遣寧朔將軍王僧炳前軍將軍王應之龍驤將軍荘明三千人屯義陽闗外為聲援虜退進號輔國將軍景先啟稱上徳化之美上答曰風淪俗敗二十餘年以吾當之豈得頓掃幸得數載盡力救蒼生者必有功於萬物也治天下者雖聖人猶湏良佐汝等各各自竭不憂不治也世祖即位徵為侍中領左軍將軍尋兼領軍將軍景先事上盡心故恩寵特密初西還上坐景陽樓召景先語故舊唯豫章王一人在席而已轉中領軍車駕射雉郊外行游景先常甲仗從亷察左右尋進爵為侯領太子詹事本官如故遭母喪詔超起為領軍將軍遷征虜將軍丹陽尹五年荒人桓天生引蠻虜於雍州界上司部以北人情騷動上以景先諳究司土詔曰得雍州刺史張瓌啟事蠻虜相扇容或侵軼蜂蠆有毒宜時剿蕩可遣征虜將軍丹陽尹景先總率歩騎直指義陽可假節司州諸軍皆受節度景先至鎮屯軍城北百姓乃安牛酒來迎軍未還遇疾遺言曰此度疾病異於前後自省必無起理但夙荷深恩今謬充戎寄闇弱每事不稱上慙慈㫖便長違聖世悲哽不知所言可為作啟事上謝至尊粗申愚心毅雖成長素闕訓範貞等㓜稚末有所識方以仰累聖明非殘息所能陳謝自丁荼毒以來妓妾已多分張所餘醜猥數人皆不似事可以明月佛女桂支佛兒玉女美玉上臺美滿􅃩華奉東宫私馬有二十餘匹牛藪頭可簡好者十匹牛二頭上臺馬五匹牛一頭奉東宫大司馬司徒各奉二匹驃騎鎮軍各奉一匹應私仗器亦悉輸臺六親多未得料理可随宜温䘏㣲申素意所賜宅曠大恐非毅等所居湏喪服竟可輸還臺劉家前宅久聞其貨可合率市之直若短少啟官乞足三處田勤作自足供衣食力少更随宜買麤猥奴婢充使不湏餘營生周旋部曲還都理應分張其久舊勞勤者應料理随宜啟聞乞恩卒時年五十上傷惜之詔曰西信適至景先奄至喪逝悲懐切割自不勝任今便舉哀賻錢十萬布二百匹景先喪還詔曰故假節征虜將軍丹陽尹新吳侯景先器懐開亮幹局通敏綢繆少長義兼勲戚誠著夷險績茂所司方升寵榮用申任寄奄至喪逝悲痛良深可贈侍中征北將軍南徐州刺史給鼓吹一部假節侯如故諡曰忠侯子毅以勲戚子少歴清官太子舎人洗馬随王友永嘉太守大司馬諮議參軍南康太守中書郎建武初為撫軍司馬遷北中郎司馬虜動領軍守琅邪城毅性奢豪好弓馬為髙宗所疑忌王晏事敗并陷誅之遣軍圍宅毅時㑹賔客奏伎聞變索刀未得收人突進挾持毅入與母别出便殺之蕭赤斧南蘭陵人太祖從祖弟也祖隆子衛軍録事參軍父始之冠軍中兵參軍赤斧歴官為奉朝請以和謹為太祖所知宋大明初竟陵王誕反廣陵赤斧為軍主隸沈慶之圍廣陵城攻戰有勲事寧封永安亭侯食邑三百七十戸除車騎行參軍出補晉陵令員外郎丹陽令還除晉熙王撫軍中兵參軍出為建威將軍錢唐令遷正員郎赤斧治政為百姓所安吏民請留之時議見許改除寧朔將軍太祖輔政以赤斧為輔國將軍左軍㑹稽司馬輔鎮東境遷黄門郎淮陵太守順帝遜位於丹陽故治立宫上令赤斧輔送至薨乃還建元初遷武陵王冠軍長史驃騎司馬南東海太守輔國將軍並如故遷長兼侍中祖母喪去職起為冠軍將軍寧蠻校尉出為持節督雍梁南北秦四州郢州之竟陵司州之随郡軍事雍州刺史本官如故在州不營産利勤於奉公遷散騎常侍左衛將軍世祖親遇與蕭景先相比封南豐縣伯邑四百户遷給事中太子詹事赤斧夙患渇利永明三年㑹世祖使甲仗衛三廂赤斧不敢辭疾甚數日卒年五十六家無儲積無絹為衾上聞之愈加惋惜詔賻錢五萬上材一具布百匹蠟二百斤追贈金紫光禄大夫諡曰懿伯子頴胄襲爵頴胄字雲長𢎞厚有父風起家秘書郎太祖謂赤斧曰頴胄輕朱被身覺其趨進轉美足慰人意遷太子舎人遭父喪感脚疾數年然後能行世祖有詔慰勉賜醫藥除竟陵王司徒外兵參軍晉熙王文學頴胄好文義弟頴基好武勇世祖登烽火樓詔羣臣賦詩頴胄詩合㫖上謂頴胄曰卿文弟武宗室便不乏才除明威將軍安陸内史遷中書郎上以頴胄勲戚子弟除左將軍知殿内文武事得入便殿出為新安太守吏民懐之隆昌元年永嘉王昭粲為南徐州以頴胄為南東海太守行南徐州事轉持節督青冀二州軍事輔國將軍青冀二州刺史不行除黄門郎領四廂直遷衛尉髙宗廢立頴胄從容不為同異乃引頴胄預功建武二年進爵侯増邑為六百户賜頴胄以常所乗白􅀈牛上慕儉約欲鑄壊太官元日上夀銀酒鎗尚書令王晏等咸稱盛徳頴胄曰朝廷盛禮莫過三元此一器既是舊物不足為侈帝不悦後預曲宴銀器滿席頴胄曰陛下前欲壊酒鎗恐宜移在此器也帝甚有慙色冠軍江夏王寳𤣥鎮石頭以頴胄為長史行石頭戍事復為衛尉出為冠軍將軍廬陵王後軍長史廣陵太守行南兖州府州事是年虜動揚聲當飲馬長江帝懼敕頴胄移居民入城百姓驚恐席卷欲南渡頴胄以賊勢尚逺不即施行虜亦尋退仍為持節督南兖徐青冀荆五州諸軍事輔國將軍南兖州刺史和帝為荆州以頴胄為冠軍將軍西中郎長史南郡太守行荆州府州事東昏侯誅戮羣公委任厮小崔陳敗後方鎮各懐異計永元二年十月尚書令臨湘侯蕭懿及弟衛尉暢見害先遣輔國將軍巴西梓潼二郡太守劉山陽領三千兵受㫖之官就頴胄共襲雍州雍州刺史梁王將起義兵慮頴胄不識機變遣使王天虎詣江陵聲云山陽西上并襲荆雍書與頴胄勸同義舉頴胄意猶未決初山陽出為南州謂人曰朝廷以白虎幡追我亦不復還矣席卷妓妾盡室而行至巴陵遲回十餘日不進梁王復遣天虎賫書與頴胄陳設其畧是時或云山陽謀殺頴胄以荆州同義舉頴胄乃與梁王定契斬王天虎首送示山陽發百姓車牛聲云起歩軍征襄陽十一月十八日山陽至江津單車白服從左右數十人詣頴胄頴胄使前汶陽太守劉孝慶前永平太守劉熙曅鎧曹參軍蕭文照前建威將軍陳秀輔國將軍孫末伏兵城内山陽入門即於車中亂斬之副軍主李元履收餘衆歸附遣使蔡道猷馳驛送山陽首於梁王乃發教纂嚴分部購募東昏聞山陽死發詔討荆雍贈山陽寧朔將軍梁州刺史頴胄有器局既唱大事虛心委已衆情歸之加頴胄右將軍都督行留諸軍事置佐史本官如故西中郎司馬夏侯詳加征虜將軍遣寧朔將軍王法度向巴陵頴胄獻錢二十萬米千斛鹽五百斛諮議宗塞别駕宗史獻榖二千斛牛二頭換借富貲以助軍費長沙寺僧業富沃鑄黄金為龍數千兩埋土中歴相傳付稱為下方黄鐵莫有見者乃取此龍以充軍實十二月移檄西中郎府長史都督行留諸軍事右軍將軍南郡太守南豐縣開國侯蕭頴胄司馬征虜將軍新興太守夏侯詳告京邑百官諸州郡牧守夫運不嘗夷有時而陂數無恒剥否極則亨昔商邑中微彭韋投袂漢室方昏虛牟効節故風聲永樹卜世長久者也昔我太祖髙皇帝徳範生民功格天地仰緯彤雲俯臨紫極世祖嗣興増光前業雲雨之所沾被日月之所出入莫不舉踵來王交臂納貢鬱林昏迷顚覆厥序俾我大齊之祚翦焉將墜髙宗明皇帝建道徳之盛軌垂仁義之至蹤紹二祖之鴻基繼三五之絶業昧旦丕顯不明求衣故竒士盈朝異人輻湊若廼經禮緯樂之文定鼎作洛之制非雲如醴之祥白質黒章之瑞諒以則天比大無徳稱焉而嗣主不綱窮肆陵暴十諐畢行三風咸襲喪初而無哀貌在慼而有喜容酣酒嗜音㒺懲其侮䜛賊狂邪是與比周遂令親賢嬰荼毒之誅宰輔受葅醢之戮江僕射蕭劉領軍徐司空沈僕射曹右衛或外戚懿親或皇室令徳或時宗民望或國之虎臣竝勲彰中興功比周邵秉鈞賛契受遺先朝咸以名重見疑正直貽斃害加黨族虐及嬰孺曽無渭陽追逺之情不顧本枝殱落之痛信必見疑忠而獲罪百姓業業㒺知攸暨崔慧景内逼淫刑外不堪命驅土崩之民為免死之計倒戈回刃還指宫闕城無完守人有異圖頼蕭令君勲濟宗祏業拯蒼氓四海䝉一匡之徳億兆慿再造之功江夏王拘廹威强牽制巨力迹屈當時廼心可亮竟不能内恕探情顯加鴆毒蕭令自以親惟族長任實宗臣至誡苦言朝夕獻入䜛醜交搆漸見疎疑浸潤成災奄離怨酷用人之功以寧社稷刈人之身以騁滛濫台輔既誅姦小競用梅蟲兒茹法珍妖忍愚戾窮縱醜惡販鬻主威以為家勢營惑嗣主恣其妖虐宫女千餘祼服宣淫孽臣數十袒裼相逐帳飲闤肆之間宵逰街陌之上提挈羣豎以為歡笑劉山陽潛受凶㫖規肆狂逆天誘其衷即就梟翦夫天生蒸民樹之以君使司牧之勿使失性豈有尊臨㝢縣毒遍黔首絶親戚之恩無君臣之義功重者先誅勲髙者速斃九族内離四夷外叛封境日蹙戎馬交馳帑藏既空百姓已竭不䘏不憂慢逰是好民怨於下天懲於上故熒惑襲月孽火燒宫妖水表災震蝕告沴七廟阽危三才莫紀大懼我四海之命永淪于地南康殿下體自髙宗天挺英懿食葉之徴著於弱年當璧之祥兆乎綺嵗億兆顒顒咸思戴奉且勢居上游任總戎畧家國之否寧濟是當莫府身備皇宗忝荷顧託憂深責重誓清時難今命冠軍將軍西中郎諮議領中直兵參軍軍主楊公則寧朔將軍領中兵參軍軍主王法度冠軍將軍諮議参軍軍主龎劌輔國將軍諮議參軍領别駕軍主宗夬輔國將軍諮議參軍軍主樂藹等領勁卒三萬陵波電邁逕造秣陵冠軍将軍領諮議中直兵參軍軍主蔡道恭輔國將軍中直兵參軍右軍府司馬軍主席闡文輔國將軍中直兵參軍軍主任漾之寧朔將軍中直兵參軍軍主韓孝仁寧朔將軍中直兵參軍軍主朱斌中直兵參軍軍主宗氷之建威将軍中直兵參軍軍主朱景舒寧朔將軍中直兵參軍軍主庾域寧逺将軍軍主庾略等被甲二萬直指建業輔國將軍武寧太守軍主鄧元起輔國將軍前軍将軍軍主王世興等鐵騎一萬分趨白下征虜將軍領司馬新興太守夏侯詳寧朔將軍諮議參軍軍主栁忱寧朔將軍領中兵參軍軍主劉孝慶建威將軍軍主江陵令江詮等帥組甲五萬駱驛繼發雄劔髙麾則五星從流長㦸逺指則雲虹變色天地為之矞皇山淵以之崩沸莫府親貫甲胄授律中權董帥熊羆之士十有五萬征鼔紛沓雷動荆南寧朔將軍南康王友蕭頴達領虎旅三萬抗威後拒蕭雍州勲業盖世謀猷淵肅既痛家禍兼憤國難泣血枕戈誓雪怨酷精卒十萬已出漢川張郢州節義慷慨悉力齊奮江州邵陵王湘州張行事王司州皆逺近懸契不謀而同竝勒驍猛指景風驅舟艦魚麗萬里盖水車騎雲屯平原霧塞以同心之士伐倒戈之衆盛徳之師救危亡之國何征而不服何誅而不克哉今兵之所指唯在梅蟲兒茹法珍二人而已諸君徳載累世勲著先朝屬無妄之時居中否之運受廹羣豎念有危懼大軍近次當各思㧞迹來赴軍門檄到之日有能斬送蟲兒法珍首者封二千户開國縣侯若迷惑凶黨敢拒軍鋒刑兹無赦戮及宗族賞罰之信有如曒日江水在此余不食言遣冠軍將軍楊公則向湘州王法度不進軍免官公則進剋巴陵仍向湘州遣寧朔將軍劉坦行湘州事頴胄遣人謂梁王曰時月未利當湏來年二月今便進兵恐非良䇿梁王曰今坐甲十萬糧用自竭況藉以義心一時驍鋭且太白出西方仗義而動天時人謀無有不利昔武王伐紂行逆太嵗豈復待年月邪頴胄乃從遣西中郎參軍鄧元起率衆向夏口三年正月和帝為相國頴胄領左長史進號鎮軍將軍於是始選用方伯梁王屢表勸和帝即尊號梁州刺史栁惔竟陵太守曹景宗竝勸進頴胄使别駕宗夬撰定禮儀上尊號改元於江陵立宗廟南北郊州府城門悉依建康宫置尚書五省以城南射堂為蘭臺南郡太守為尹建武中荆州大風雨龍入柏齋中柱壁上有爪足處刺史蕭遥欣恐畏不敢居之至是以為嘉祐殿中興元年三月頴胄為侍中尚書令假節都督如故尋領吏部尚書監八州軍事行荆州刺史本官如故左丞樂藹奏曰敕㫖以軍旅務殷且停朝直竊謂匪懈于位義昭夙興國容舊典不可頓闕與兼右丞江詮等參議八座丞郎以下宜五日一朝有事郎坐侍下鼓無事許從實還外奏可梁王義師出沔口郢州刺史張沖據城拒守楊公則定湘州行事張寳積送江陵率軍㑹夏口巴西太守魯休烈巴東太守蕭恵訓遣子璝拒義師頴胄遣汶陽太守劉孝慶進峽口與巴東太守任漾之宜都太守鄭法紹衛之時軍旅之際人情未安頴胄府長史張熾從絳衫左右三十餘人入千秋門城内驚恐疑有同異御史中丞奏彈熾詔以贖論頴胄弟頴孚在京師廬陵人修靈祐竊將南上於西昌縣山中聚兵二千人襲郡内史謝篹奔豫章頴孚靈祐據郡求援頴胄遣寧朔將軍范僧簡入湘州南道援之僧簡進尅安成仍以為輔國將軍安成内史拜頴孚為冠軍將軍廬陵内史合二郡兵出彭蠡口東昬侯遣軍主彭盆劉希祖三千人受江州刺史陳伯之節度南討二郡義兵仍進取湘州南康太守王丹保郡應盆等頴孚聞兵至望風奔走前内史謝篹復還郡劉希祖至安成攻戰七日城陷范僧簡見殺希祖仍為安成内史頴孚收散卒據西昌謝篹又遣軍攻之衆敗奔湘州以頴孚為督湘東衡陽零陵桂陽營陽五郡湘東内史假節將軍如故尋病卒後修靈祐又合餘衆攻篹篹復敗走豫章劉希祖亦以郡降湘東内史王僧粲亦拒義自稱平西將軍湘州刺史以南平鎮軍主周敷為長史率前軍襲湘州去州百餘里楊公則長史劉坦守州城遣軍主尹法畧拒之屢戰不勝及聞建康城平僧粲散走乃斬之南康太守王丹亦為郡人所殺郢城降義師衆軍東下八月魯休烈蕭璝破汶陽太守劉孝慶等於峽口巴東太守任漾之見殺遂至上明江陵大震頴胄恐馳告梁王曰劉孝慶為蕭璝所敗宜遣楊公則還援根本梁王曰公則今泝流上荆鞭長之義耳蕭璝魯休烈烏合之衆尋自退散政湏荆州少時持重良湏兵力兩弟在雍指遣往徴不為難至頴胄乃追贈任漾之輔國將軍梁州刺史遣軍主蔡道恭假節屯上明拒蕭璝時梁王已平郢江二鎮頴胄輔帝出居上流有安重之勢素能飲酒噉白肉鱠至三升既聞蕭璝等兵相持不決憂慮感氣十二月壬寅夜卒遺表曰臣疹患數日不謂便至困篤氣息綿㣲待盡而已臣雖庸薄忝籍葭莩過受先朝殊常之眷循寵礪心誓生以死屬皇業中否天地分崩總率諸侯翼奉明聖頼社稷靈長大明在運故兵之所臨無思不服今四海垂平干戈行戢方希陪翠華奉法駕反東都觀舊物不幸遘疾奄辭明世懐此深恨永結泉壤竊惟王業至重萬幾甚大登之實難守之未易陛下富於春秋當逺尋祖宗創業艱難殷鑒季末顛覆厥緒思所以念始圖終康此兆庶征東大將軍臣衍元勲上徳光賛天下陛下垂拱仰成則風流日化臣雖萬沒無所遺恨時年四十和帝出臨哭詔贈侍中丞相本官如故前後部羽葆鼔吹班劍三十人輼輬車黄屋左纛梁王圍建康城住在石頭和帝宻詔報頴胄凶問秘不發喪及城平識者聞之知天命之有在矣梁天監元年詔曰念功惟徳歴代所同追逺懐人彌與事篤齊故侍中丞相尚書令頴胄風格峻逺器宇淵邵清猷盛業問望斯歸締構義始肇基王迹挈闊屯夷載形心事朕膺天改命光宅區宇望岱瞻河永言増慟可封巴東郡公邑三千户本官如故喪還今上車駕臨哭渚次詔曰齊故侍中丞相尚書令頴胄葬送有期前代所加殊禮依晉王導齊豫章王故事可悉給諡曰獻武范僧簡贈交州刺史史臣曰魏氏基於用武夏侯諸曹竝以戚族而為將相夫股肱為義既有常然肺腑之重兼存宗寄豐沛之間貴人滿市功臣所出多在南陽夫貞幹所以成務非虛言也賛曰新吳事武簡在帝心南豐治政迹顯亡衾鎮軍茂績機識𢎞深荆南立主嚮義漢隂南齊書卷三十八南齊書卷三十八考證蕭頴胄傳至是以為嘉祐殿祐南史作福廬陵人修靈祐靈祐南史作景智南齊書卷三十八考證
