body:
  text: 南齊書卷四本紀第四鬱林王鬱林王昭業字元尚文惠太子長子也小名法身世祖即位封南郡王二千戶永明五年十一月戊子冠於東宮崇政殿其日小會賜王公以下帛各有差給昭業扶二人七年有司奏給班劒二十人鼓吹一部高選友學十一年給皂輪三望車詔高選國官文惠太子薨立昭業為皇太孫居東宮世祖崩太孫即位八月壬午詔稱先帝遺詔以護軍將軍武陵王曄為衛將軍征南大將軍陳顯達即本號竝開府儀同三司尚書左僕射西昌侯鸞為尚書令太孫詹事沈文季為護軍將軍癸未以司徒竟陵王子良為太傅詔曰朕以寡薄嗣膺寶政對越靈命欽若前圖思所以敬守成規拱揖羣后哀荒在日有懵大猷宜育德振民光昭睿範凡逋三調及衆責在今年七月三十日前悉同蠲除其備償封籍貨鬻未售亦皆還主御府諸署池田邸冶興廢沿事本施一時於今無用者詳所罷省公宜權禁一以還民關市征賦務從優減丙戌詔曰近北掠餘口悉充軍實刑故無小罔或攸赦撫辜興仁事深睿範宜從蕩宥許以自新可一同放遣還復民籍已賞賜者亦皆為贖辛丑詔曰往歲蠻虜協謀志擾邊服羣帥授略大殲凶醜革城克捷及舞陰固守二處勞人未有沾爵賞者可分遣選部往彼序用九月癸丑詔東西二省府國長老所積財單祿寡良以矜懷選部可甄才品能推校年月邦守邑丞隨宜量處以貧為先辛酉追尊文惠皇太子為世宗文皇帝冬十月壬寅尊皇太孫太妃為皇太后立皇后何氏十一月辛亥立臨汝公昭文為新安王曲江公昭秀為臨海王皇弟昭粲為永嘉王隆昌元年春正月丁未改元大赦加太傅竟陵王子良殊禮驍騎將軍晉熙王銶為郢州刺史丹陽尹安陸王子敬為南六允州刺史征北大將軍晉安王子懋為江州刺史臨海王昭秀為荊州刺史永嘉王昭粲為南徐州刺史征南大將軍陳顯達進號車騎大將軍郢州刺史建安王子真為護軍將軍詔百僚極陳得失又詔王公以下各舉所知戊申以護軍將軍沈文季為領軍將軍己酉以前將軍曹虎為雍州刺史右衛將軍薛淵為司州刺史庚戌以寧朔將軍蕭懿為梁南秦二州刺史輔國長史申希祖為交州刺史辛亥車駕祠南郊詔曰執耜暫忘懸磬比室秉機或惰無褐終年非怠非荒雖由王道不稂不莠實賴民和頃歲多稼無爽遺秉如積而三登之美未臻萬斯之基尚遠且風土異宜百民舛殊務刑章治緒未必同源妨本害政事非一揆冕旒屬念無忘夙興可嚴下州郡務滋耕殖相畝闢疇廣開地利深樹國本克阜天民天又詢訪獄市博聽謠俗傷風損化各以條聞主者詳為條格戊午車駕拜崇安陵己巳以新除黃門侍郎周奉叔為青州刺史二月辛卯車駕祠明堂夏四月辛巳衛將軍開府儀同三司武陵王曄薨戊子太傅竟陵王子良薨戊戌以前沙州刺史楊炅為沙州刺史丁酉以驃騎將軍廬陵王子卿為衛將軍尚書右僕射鄱陽王鏘為驃騎將軍竝開府儀同三司閏月乙丑以南東海太守蕭穎胄為青冀二州刺史丁卯鎮軍大將軍鸞即本號開府儀同三司戊辰以中軍將軍新安王昭文為揚州刺史六月丙寅以黃門侍郎王思遠為廣州刺史秋七月庚戌以中書郎蕭遙欣為六允州刺史東莞太守臧靈智為交州刺史癸巳皇太后令曰鎮軍車騎左僕射前將軍領軍左衛衛尉八座自我皇歷啓基受終于宋睿聖繼軌三葉重光太祖以神武創業草昧區夏武皇以英明提極經緯天人文帝以上哲之資體元良之重雖功未被物而德已在民三靈之眷方永七百之基已固嗣主特鍾沴氣爰表弱齡險戾著于緑車愚固彰於崇正狗馬是好酒色方湎所務唯鄙事所疾唯善人世祖慈愛曲深每加容掩冀年志稍改立守神器自入纂鴻業長惡滋甚居喪無一日之哀縗絰為歡宴之服昏酣長夜萬機斯壅發號施令莫知所從閹竪徐龍駒專總樞密奉叔珍之互執權柄自以為任得其人表𩹉緝穆邁蕭曹而愈信布倚太山而坐平原於是恣情肆意罔顧天顯二帝姬嬪竝充寵御二宮遺服皆納玩府內外混漫男女無別丹屏之北為酤鬻之所青蒲之上開桑中之肆又微服潛行信次忘反端委以朝虛位交戟而守空宮積旬矣宰輔忠賢盡誠奉主誅鋤羣小冀能悛革曾無克己更深怨憾公卿股肱以異己置戮文武昭穆以德譽見猜放肆醜言將行屠膾社稷危殆有過綴旒昔太宗克光於漢世簡文代興於晉氏前事之不忘後人之師也鎮軍居正體道家國是賴伊霍之舉實寄淵謨便可詳依舊典以禮廢黜中軍將軍新安王體自文皇睿哲天秀宜入嗣鴻業永寧四海外即以禮奉迎未亡人屬此多難投筆增慨昭業少美容止好隸書世祖勑皇孫手書不得妄出以貴重之進對音吐甚有令譽王侯五日一問訊世祖常獨呼昭業至幄座別加撫問呼為法身鍾愛甚重文惠皇太子薨昭業每臨哭輒號咷不自勝俄爾還內歡笑極樂在世祖喪哭泣竟入後宮嘗列胡妓二部夾閣迎奏為南郡王時文惠太子禁其起居節其用度昭業謂豫章王妃庾氏曰阿婆佛法言有福德生帝王家今日見作天王便是大罪左右主帥動見拘執不如作市邊屠酤富兒百倍矣及即位極意賞賜動百數十萬每見錢輒曰我昔時思汝一文不得今得用汝未朞年之間世祖齊庫儲錢數億垂盡開主衣庫與皇后寵姬觀之給閹人竪子各數人隨其所欲恣意輦取取諸寶器以相剖擊破碎之以為笑樂居嘗裸袒著紅縠褌雜采相衵服好鬥雞密買雞至數千價世祖御物甘草杖宮人寸斷用之毀世祖招婉殿乞閹人徐龍駒為齊龍駒尤親幸為後閣舍人日夜在六宮房內昭業與文帝幸姬霍氏淫通龍駒勸長留宮內聲云度霍氏為尼以餘人代之嘗以邪諂自進每謂人曰古時亦有監作三公者皇后亦淫亂齊閣通夜洞開內外淆雜無復分別中書舍人綦母珍之朱隆之直閣將軍曹道剛周奉叔竝為帝羽翼高宗屢諫不納先啓誅龍駒次誅奉叔及珍之帝竝不能違既而尼媼外入頗傳異語乃疑高宗有異志中書令何胤以皇后從叔見親使直殿省嘗隨后呼胤為三父與胤謀誅高宗令胤受事胤不敢當依違杜諫帝意復止乃謀出高宗於西州中勑用事不復關咨高宗慮變定謀廢帝二十二日壬辰使蕭諶坦之等於省誅曹道剛朱隆之等率兵自尚書入雲龍門戎服加朱衣於上比入門三失履王晏徐孝嗣蕭坦之陳顯達王廣之沈文季係進帝在壽昌殿聞外有變使閉內殿諸房閣令閹人登興光樓望還報云見一人戎服從數百人急裝在西鍾樓下須臾蕭諶領兵先入宮截壽昌閣帝走向愛姬徐氏房拔劒自刺不中以帛纏頸輿接出延德殿諶初入殿宿衛將士皆操弓楯欲拒戰諶謂之曰所取自有人卿等不須動宿衛信之及見帝出各欲自奮帝竟無一言出西弄殺之時年二十二輿尸出徐龍駒宅殯葬以王禮餘黨亦見誅史臣曰鬱林王風華外美衆所同惑伏情隱詐難以求立嫡以長未知瑕釁世祖之心不變周道既而愆鄙內作兆自宮闈雖為害未遠足傾社稷春秋書梁伯之過言其自取亡也贊曰十愆有一無國不失鬱林負荷棄禮亡律東西二省府國長老一本長字作屯疑
