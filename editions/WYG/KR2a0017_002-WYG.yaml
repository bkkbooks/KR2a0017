body:
  text: 南齊書卷二梁蕭子顯撰夲紀第二髙帝下建元元年夏四月甲午上即皇帝位扵南郊設壇紫燎告天曰皇帝臣道成敢用𤣥牡昭告皇皇后帝宋帝陟鑒乾序欽若眀命以命于道成夫肇自生民樹以司牧所以闡極則天開元創物肆兹大道天下惟公命不扵常昔在虞夏受終上代粤自漢魏揖讓中葉咸炳諸典謨載在方冊水徳既微仍世多故寔賴道成匡拯之功以𢎞濟扵厥艱大造顛墜再構區宇宣禮眀刑締仁緝義晷緯凝象川岳表靈誕惟天人罔弗和㑹乃仰協歸運景属與能用集大命扵茲辭徳匪嗣至扵累仍而羣公卿士庶尹御事爰及黎獻至扵百戎僉曰皇天眷命不可以固違人神無託不可以曠主畏天之威敢不祇從鴻厯敬簡元辰䖍奉皇符升壇受禪告類上帝以永答民衷式敷萬國惟眀靈是饗禮畢大駕還宫臨太極前殿詔曰五徳更紹帝跡所以代昌三正迭隆王度所以改耀世有質文時㦯因革其資元膺厯經道振民固以異術同揆殊流共貫者矣朕以寡昧属值艱季推肆勤之誠藉樂治之數賢能悉心士民致力用獲拯溺龕暴一匡天下業未㕘古功殆侔昔宋氏以凌夷有徴厯數攸及思𢎞樂推永鑒崇替爰集天禄扵朕躬惟志菲薄辭弗獲昭遂欽従天人式繇景命祗月正扵文祖升禋鬯扵上帝猥以寡徳光宅四海纂革代之蹤託王公之上若渉淵水罔知所濟寳祚初唘洪慶惟新思俾利澤宣被億兆可大赦天下改昇眀三年為建元元年賜人爵二級文武進位二等鰥寡孤獨不能自存者穀人五斛逋租宿債勿復收有犯鄉論清議贓汙淫盗一皆蕩滌洗除先注與之更始長徒敕繋之囚特皆原遣亾官失爵禁錮奪勞一依舊典封宋帝為汝隂王築宫丹陽縣故治行宋正􅃋車旗服色一如故事上書不為表荅表不稱詔降宋晉熙王燮為隂安公江夏王躋為沙陽公随王翽為舞陰公新興王嵩為定襄公建安王禧為荔浦公郡公主為縣君縣公主為鄊君詔曰繼世象賢列代盛典疇庸嗣羙前載令圗宋氏通侯乃宜随運省替但欽徳懐義尚表墳閭况功濟區夏道光民俗者㦲降差之典宜遵往制南康縣公華容縣公可為侯萍鄉縣侯可為伯減戸有差以繼劉穆之王𢎞何無忌後以司空褚淵為司徒呉郡太守栁世隆為南豫州刺史詔曰宸運肇創寳命維新宜𢎞慶宥廣敷蠲汰刼賊餘口沒在臺府者悉原赦諸負舋流徙普聽還夲土以齊國左衛将軍陳顯達為中䕶軍中領軍王敬則為南兖州刺史左衛将軍李安民為中領軍戊戌以荆州刺史嶷為尚書令驃騎大将軍開府儀同三司揚州刺史冠軍将軍映為荆州刺史西中郎将晃為南徐州刺史冠軍将軍垣崇祖為豫州刺史驃騎司馬崔文仲為徐州刺史斷四方上慶禮己亥詔曰自廬井毁制農桑易業鹽鐡妨民貨鬻傷治厯代成俗流蠧嵗滋援拯遺弊革末反本使公不専利氓無失業二宫諸王悉不得營立屯邸封略山湖太官池籞宫停稅入優量省置庚子詔宋帝后藩王諸陵宜有守衛有司奏帝陵各置長一人兵有差王陵五人妃嬪三人五月丙午進河南王吐谷渾拾寅號驃騎大将軍詔曰宸運革命引爵改封宋氏第秩雖宜省替其有預効屯夷宣力齊業者一仍夲封無所減降有司奏留襄陽郡公張敬兒䓁六十二人除廣興郡公沈曇亮等百二十二人改元嘉厯為建元厯木徳盛夘終未以正月夘祖十二月未臘丁未詔曰設募取将懸賞購士盖出權宜非曰恒制頃世艱險浸以成俗且長逋逸開罪山湖是為黥刑不辱亡竄無咎自今以後可斷衆募壬子詔封佐命文武功臣新除司徒褚淵等三十一人進爵増戸各有差乙夘河南王吐谷渾拾寅奉表貢獻丙辰詔遣大使分行四方遣兼散騎常侍十二人巡行以交寧道逺不遣使己未汝隂王薨追諡為宋順帝終禮依魏元晉恭帝故事辛酉陰安公劉燮等伏誅追封諡上兄道度為衡陽元王道生為始安貞王丙寅追尊皇考曰宣皇帝皇妣為孝皇后妃為昭皇后六月辛未詔相國驃騎中軍三府職可依資勞度二官若職限已盈所餘可賜滿壬申以㳺撃将軍周山圗為兖州刺史乙亥詔曰宋末頻年戎冦兼災疾凋損㦯枯骸不收毁櫬莫掩宜速宣下埋蔵營䘏若標題猶存姓字可識可即運載致還夲鄊有司奏遣外監典事四人周行離門外三十五里為限其餘班下州郡無棺器標題者属所以臺錢供市庚辰七廟主備法駕即于太廟詔諸将及客戮力艱難盡勤直衛其従還宫者普賜位一階辛巳罷荆州刺史甲申立皇太子賾斷諸州郡禮慶見刑入重者降一等并申前赦恩百日立皇子嶷為豫章王映為臨川王晃為長沙王曅為武陵王暠為安成王鏘為鄱陽王鑠為桂陽王鑑為廣陵王皇孫長懋為南郡王乙酉葬宋順帝扵遂寧陵秋七月丁未詔曰交趾比景獨隔書朔斯乃前運方季負海不朝因迷遂往歸款莫由曲赦交州部内李叔獻一人即撫南土文武詳才選用并遣大使宣揚朝恩以試守武平太守行交州府事李叔獻為交州刺史丙辰以虜偽茄盧鎮主陰平公楊廣香為沙州刺史丁巳詔南蘭陵桑梓夲鄉長蠲租布武進王業所基復十年九月辛丑詔二呉義興三郡遭水減今年田租乙巳以新除尚書令驃騎将軍豫章王嶷為荆湘二州刺史平西将軍臨川王映為揚州刺史丙午司空褚淵領尚書令戊申車駕幸宣武堂宴㑹詔諸王公以下賦詩冬十月丙子立彭城劉𦙍為汝陰王奉宋帝後己夘車駕殷祀太廟辛巳詔曰朕嬰綴世務三十餘嵗險阻艱難備嘗之矣末路屯夷戎車嵗駕誠藉時来之運實資士民之力宋元徽二年以来諸従軍得官者未悉䝉禄可催速下訪随正即給才堪餘任者訪洗量序若四州士庶夲鄉淪䧟簿籍不存尋校無所可聽州郡保押従實除奏荒逺闕中正者特許據軍簿奏除㦯戍扞邉役末由旋反聽扵同軍各立五保所𨽻有司時為言列汝陰太妃王氏薨追贈為宋恭皇后十一月庚子以太子左衛率蕭景先為司州刺史辛亥立皇太子妃裴氏甲申封功臣驃騎長史江謐等十人爵戸各有差二年春正月戊戍􅃋大赦天下以司空尚書令褚淵為司徒中軍将軍張敬兒為車騎将軍中領軍李安民為領軍将軍中䕶軍陳顯達為䕶軍将軍辛丑車駕親祀南郊癸夘詔索虜冦淮泗遣衆軍北伐内外纂嚴二月丁夘虜冦夀陽豫州刺史垣崇祖破走之置巴州壬申以三巴校尉眀慧昭為巴州刺史戊子以寧蠻校尉蕭赤斧為雍州刺史南蠻長史崔慧景為梁南秦二州刺史辛夘詔西境獻㨗解嚴癸巳遣大使巡慰淮肥徐豫邉民尤貧遘難者刺史二千石量加賑䘏甲午詔江西北民避難流徙者制遣還夲土蠲今年租税單貧及孤老不能自存者即聽番籍郡縣押領三月丁酉以侍中西昌侯鸞為郢州刺史戊戌以䕶軍将軍陳顯達為南兖州刺史呉郡太守張岱為中䕶軍己亥車駕幸樂逰苑宴王公以下賦詩辛丑以征虜将軍崔思祖為青冀二州刺史夏四月丙寅進髙麗王樂浪公髙璉號驃騎大将軍五月立六門都墻六月癸未詔昔嵗水旱曲赦丹陽二呉義興四郡遭水尤劇之縣元年以前三調未充虛列已畢官長局吏應共償備外詳所除宥秋七月甲寅以輔國将軍盧紹之為青冀二州刺史戊午皇太子妃裴氏薨閏月辛巳遣領軍将軍李安民行淮泗庚寅索虜攻朐山青冀二州刺史盧紹之等破走之冬十一月戊子以氐楊後起為秦州刺史十二月戊戌以司空褚淵為司徒乙巳車駕幸中堂聽訟壬子以驃騎大将軍豫章王嶷為司空揚州刺史前将軍臨川王映為荆州刺史三年春正月壬戍􅃋詔王公卿士薦讜言丙子以平北将軍陳顯達為益州刺史貞陽公栁世隆為南兖州刺史皇子鋒為江夏王領軍将軍李安民等破虜扵淮陽夏四月以寧􅃋将軍沈景徳為廣州刺史六月壬子大赦逋租宿債除減有差秋七月以冠軍将軍垣榮祖為徐州刺史冬十月戊子以河南王世子吐谷渾易度侯為西秦河二州刺史河南王四年春正月壬戌詔曰夫膠庠之典彛倫攸先所以招振才端唘彂性緒𢎞字黎氓納之軌義是故五禮之跡可傳六樂之容不冺朕自膺厯受圖志闡經訓且有司羣僚奏議咸集盖以戎車時警文教未宣思樂泮宫永言多慨今關燧無虞時和嵗稔逺邇同風華夷慕義便可式遵前准修建斆學精選儒官廣延國胄以江州刺史王延之為右光禄大夫癸亥詔曰比嵗申威西北義勇争先殞氣冦塲命盡王事戰亡蠲復雖有恒典主者遵用每傷簡薄建元以来戰亡賞蠲租布二十年雜役十年其不得收屍主軍保押亦同此例以後将軍長沙王晃為䕶軍将軍中軍将軍南郡王長懋為南徐州刺史冠軍将軍安成王暠為江州刺史二月乙未以冠軍将軍桓康為青冀二州刺史上不豫庚辰詔原京師囚繋有差元年以前逋責皆原除三月庚申召司徒褚淵左僕射王儉詔曰吾夲布衣素族念不到此因藉時来遂隆大業風道沾被升平可期遘疾彌留至扵大漸公等奉太子如事吾柔逺能邇緝和内外當令太子敦穆親戚委任賢才崇尚節儉𢎞宣簡恵則天下之理盡矣死生有命夫復何言壬戌上崩扵臨光殿年五十六四月庚寅上謚曰太祖髙皇帝奉梓宫扵東府前渚升龍舟丙午窆武進泰安陵上少沈深有大量寛嚴清儉喜怒無色博渉經史善属文工草𨽻書奕棋第二品雖經綸夷險不廢素業従諌察謀以威重得衆即位後身不御精細之物敕中書舎人桓景真曰主衣中似有玉介導此制始自大眀末後泰始尤増其麗留此置主衣政是興長疾源可即時打碎凡復有可異物皆宜随例也後宫器物欄檻以銅為飾者皆改用鐵内殿施黄紗帳宫人著紫皮履華盖除金花𤓰用鐵迴釘每曰使我治天下十年當使黄金與土同價欲以身率天下移變風俗上姓名骨體及期運厯數竝逺應圖讖數十百條歴代所未有臣下撰録上抑而不宣盛矣史臣曰孫卿有言聖人之有天下受之也非取之也漢髙神武駿聖觀秦氏東逰盖是雅多大言非始自知天命光武聞少公之論讖亦特一時之笑語魏武初起義兵所期征西之墓晉宣不内迫曺爽豈有定覇浮橋宋氏崛起匹夫兵由義立咸皆一世推雄卒開鼎祚宋氏正位八君卜年五紀四絶長嫡三稱中興内難邉虞兵革世動太祖基命之初武功潛用泰始開運大拯時艱龍徳在田見猜雲雨之迹及蒼梧暴虐舋結朝野百姓懔懔命懸朝夕權道既行兼濟天下元功振主利器難以假人羣才戮力實懐尺寸之望豈其天厭水行固已人希木徳歸功與能事極乎此雖至公扵四海而運實時来無心扵黄屋而道随物變應而不為此皇齊所以集大命也賛曰於皇太祖有命自天同度宇宙合量山淵宋徳不紹神器虛傳寧亂以武黜暴資賢庸彂西疆功興北翰偏師獨克孤旅霆斷援斾東夏職司静亂指斧徐方時惟伐叛抗威京輦坐清江漢文藝在躬芳塵淵塞用下以才鎮民以徳端已雄睟君臨尊黙苞括四海大造家國南齊書卷二南齊書卷二考證髙帝夲紀下建元元年夏四月丙寅追尊皇考曰宣皇帝皇妣為孝皇后臣祖庚按通鑑同南史在甲午二年正月以司空尚書令褚淵為司徒臣祖庚按十二月以司空褚淵為司徒其事複見其月互異又淵傳三年為司徒又固讓四年寢疾遜位改授司空據此則淵以三年為司徒四年為司空而紀又云四年八月癸夘司徒褚淵薨紀傳前後各不相顧二月丁夘虜冦夀陽臣祖庚按通鑑作己酉攷異曰是月辛夘朔無丁夘五月立六都門墻臣宗萬按通鑑云自晉以来建康宫之外城惟設竹籬而有六門會有彂白虎樽者命改立都墻又白虎樽即白獸樽晉書避唐諱故曰獸也河南王世子吐谷渾易度侯易度侯諸夲皆作度易侯今従氐𦍑傳改正南齊書卷二考證
