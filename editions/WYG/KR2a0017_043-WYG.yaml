body:
  text: 南齊書卷四十三梁蕭子顯撰列傳第二十四江斆何昌㝢謝􅊪王思逺江斆字叔文濟陽考城人也祖湛宋左光禄大夫儀同三司父恁著作郎為太子劭所殺斆母文帝女淮陽公主幼以戚屬召見孝武謂謝莊曰此小兒方當為名器少有美譽桂陽王休範臨州辟迎主簿不就尚孝武女臨汝公主拜駙馬都尉除著作郎太子舍人丹陽丞時袁粲為尹見斆歎曰風流不墜政在江郎數與宴賞留連日夜遷安成王撫軍記室秘書丞中書郎斆庶祖母王氏老疾斆視膳嘗藥七十餘日不解衣及累居内官每以侍養陳請朝廷優其朝直尋轉安成王驃騎從事中郎初湛娶褚秀之女被遣禇淵為衛軍重斆為人先通音意引為長史加寧朔將軍順帝立隨府轉司空長史領臨淮太守將軍如故轉太尉從事中郎齊臺建為吏部郎太祖即位斆以祖母久疾連年臺閣之職永廢温清啓乞自解初宋眀帝勅斆出繼從叔愻為從祖淳後於是僕射王儉啓禮無後小宗之文近世緣情皆由父祖之命未有既孤之後出繼宗族也雖復臣子一揆而義非天屬江忠簡𦙍嗣所寄惟斆一人傍無眷屬斆宜還本若不欲江愻絶後可以斆小兒繼愻為孫尚書參議謂間世立後禮無其文荀顗無子立孫墜禮之始何琦又立此論義無所據於是斆還本家詔使自量立後者出為寧朔將軍豫章内史還除太子中庶子領驍騎將軍未拜門客通贓利世祖遣信撿覈斆蔵此客而躬自引咎上甚有怪色王儉從容啓上曰江斆若能治郡此便是具美耳上意乃釋永眀初仍為豫章王太尉諮議領録事遷南郡王友竟陵王司徒司馬斆好文辭圍棊第五品為朝貴中最遷侍中領本州中正司徒左長史中正如故五年遷五兵尚書眀年出為輔國將軍東海太守加秩中二千石行南徐州事七年徙為侍中領驍騎將軍尋轉都官尚書領驍騎將軍王晏啓世祖曰江斆今重登禮閣兼掌六軍慈渥所覃實有優忝但語其事任殆同閑輩天㫖既欲升其名位愚謂以侍中領驍騎望實清顯有殊納言上曰斆常啓吾為其鼻中惡今既以何𦙍王瑩還門下故有此囘換耳鬱林即位遷掌吏部隆昌元年為侍中領國子祭酒鬱林廢朝臣皆被召入宫斆至雲龍門託藥醉吐車中而去眀帝即位改領祕書監又改領晉安王師建武二年卒年四十四遺令儉約葬不受賻贈詔賻錢三萬布百匹子蒨啓遵斆令讓不受詔曰斆貽厥之訓送終以儉立言歸善益有嘉傷可從所請贈散騎常侍太常諡曰敬子何昌㝢字儼望廬江􅈞人也祖叔度呉郡太守父佟之太常昌㝢少而淹厚為伯父司空尚之所遇宋建安王休仁為揚州辟昌㝢州主簿遷司徒行參軍太傅五官司徒東閣祭酒尚書儀曹郎建平王景素為征北南徐州昌㝢又為府主簿以風素見重母老求禄出為湘東太守加秩千石為太祖驃騎功曹昌㝢在郡景素被誅昌㝢痛之至是啓太祖曰伏尋故建平王因心自逺忠孝基性徽和之譽早布國言勝素之情夙洽民聽世祖綢繆太宗眷異朝中貴人野外賤士雖聞見有殊誰不悉斯事者元徽之間政闗羣小構扇異端共令傾覆慇懃之非古人所悼況蒼梧將季能無􅃷惑一年之中藉者再三有必巔之危無蹔立之安行路寒心往来跼而王夷慮坦然委之天命惟謙惟敬専誠奉國閨無執㦸之衛門闕衣介之夫此五尺童子所見不假闊曲言也一淪疑似身名頓滅寃結淵泉酷貫穹昊時經隆替嵗改三元曠蕩之恵亟申被枉之澤未流俱沐温光獨酸霜露眀公鋪天地之施散雲雨之潤物無巨細咸被慶渥若今日不䝉照滌則為萬代寃魂昌㝢非敢慕慷慨之士激揚當世實義切於心痛入骨髓瀝膓紓憤仰希神照辯眀枉直亮王素行使還名帝籍歸靈舊塋死而不泯豈忘徳於黄壚分軀碎首不足上謝又與司空褚淵書曰天下之可哀者有數而埋寃於黄泉者為甚焉何者百年之夀同於朝露揮忽去留寧足道哉政欲闔棺之日不隕令名竹帛傳芳烈鍾石紀清英是以昔賢甘心於死所者也若懐忠抱義而負枉㝠㝠之下時主未之矜卿相不為言良史濡翰將被以惡名豈不痛哉豈不痛哉竊尋故建平王地屬親賢徳居宗望道心惟沖睿性天峻散情風雲不以塵務嬰衿眀發懐古惟以琴書娛志言忠孝行惇慎二公之所深鑒也前者阮楊連黨搆此紛紜雖被眀於朝貴愈結怨於羣醜覘察繼蹤疑防重著小人在朝詩史所歎少一句清識飲涕王每永言終日氣淚交横既推信以期物故日去其備衛朱門蕭條示存典刑而已求解徐州以避北門要任苦乞㑹稽貪處東甌閑務此並彰於事迹與公道味相求期心有素方共經營家國劬勞王室何圖時不我與契闊屯昬忠誠弗亮罹此百殃嵗朔亟流已經四載皇命惟新人沾天澤而幽然深酷未蒙照眀封殯卑雜窮魂莫寄昭穆不序松栢無行事傷行路痛結幽顯吾等叩心泣血實有望於聖時公以徳佐世欲物得其所豈可令建平王枉直不分邪田叔不言梁事袁絲諫止淮南以兩國舋禍尚囘帝意豈非親親之義寧從敦厚而今疑以未辨為世大戮若使王心跡得申亦示海内理寃枉眀是非存亡國繼絶世周漢之通典有國之所急也昔叔向之理恃祁大夫而獲亮戾太子之寃資車丞相而見察幽靈有知豈不眷眷於眀顧碎首抽脅自謂不殞淵答曰追風古人良以嘉歎但事既昭晦理有逆從建平初阻元徽未悖専欲委咎阮楊彌所致疑于時正亦謬參此機若審如髙論其愧特深太祖嘉其義轉為記室遷司徒左西太尉户曹屬中書郎王儉衛軍長史儉謂昌㝢曰後任朝事者非卿而誰永眀元年竟陵王子良表置文學官以昌㝢為竟陵王文學以清信相得意好甚厚轉揚州别駕豫章王又善之遷太子中庶子出為臨川内史除廬陵王中軍長史未拜復為太子中庶子領屯騎校尉遷吏部郎轉侍中臨海王昭秀為荆州以昌㝢為西中郎長史輔國將軍南郡太守行荆州事眀帝遣徐𤣥慶西上害蕃鎮諸王𤣥慶至荆州欲以便宜從事昌㝢曰僕受朝廷意寄翼輔外蕃何容以殿下付君一介之使若朝廷必湏殿下還當更聽後㫖昭秀以此得還亰師建武二年為侍中領長水校尉轉吏部尚書復為侍中領驍騎將軍四年卒年五十一贈太常諡簡子昌㝢不雜交遊通和汎愛歴郡皆清白士君子多稱之謝􅊪字義潔陳郡陽夏人也祖𢎞㣲宋太常父莊金紫光禄大夫􅊪四兄颺朏顥嵸世謂謝莊名兒為風月景山水顥字仁悠少簡静解褐祕書郎累至太祖驃騎從事中郎建元初為吏部郎至太尉從事中郎永眀初髙選文學以顥為竟陵王友至北中郎長史卒􅊪年七嵗王彧見而異之言於宋孝武孝武召見於稠人廣衆之中􅊪舉動閑詳應對合㫖帝甚悅詔尚公主值景和敗事寢僕射禇淵聞􅊪年少清正不惡以女結婚厚為資送解褐車騎行參軍遷祕書郎司徒祭酒丹陽丞撫軍功曹世祖為中軍引為記室齊臺建遷太子中舍人建元初轉桂陽王友以母老湏養出為安成内史還為中書郎衛軍王儉引為長史雅相禮遇除黄門郎兼掌吏部尋轉太子中庶子領驍騎將軍轉長史兼侍中􅊪以晨昏有廢固辭不受世祖勅令速拜别停朝直遷司徒左長史出為吳興太守長城縣民盧道優家遭劫誣同縣殷孝悌等四人為劫􅊪收付縣獄考正孝悌母駱詣登聞訴稱孝悌為道優所誹謗横劾為劫一百七十三人連名保徴在所不為申理􅊪聞孝悌母訴乃啓建康獄覆道優理窮款首依法斬刑有司奏免􅊪官􅊪又使典藥吏煑湯失火燒郡外齋南廂屋五間又輙鞭除身為有司所奏詔並贖論在郡稱為美績母喪去官服闋為吏部尚書髙宗廢鬱林領兵入殿左右驚走報􅊪􅊪與客圍棊每下子輒云其當有意竟局乃還齋卧竟不問外事也眀帝即位􅊪又屬疾不視事後上讌㑹功臣上酒尚書令王晏等興席􅊪獨不起曰陛下受命應天順民王晏妄叨天功以為己力上大笑解之座罷晏呼􅊪共載還令省欲相撫悅􅊪又正色曰君巢窟在何處晏初得班劍􅊪謂之曰身家太傅裁得六人君亦何事一朝至此晏甚憚之加領右軍將軍兄朏在吳興論啓公事稽晚􅊪輒代為啟上見非其手迹被問見原轉侍中領太子中庶子豫州中正永泰元年轉散騎常侍太子詹事其年卒年四十五贈金紫光禄大夫諡簡子初兄朏為吳興􅊪於征虜渚送别朏指􅊪口曰此中唯宜飲酒􅊪建武之初専以長酣為事與劉瑱沈昭畧以觴酌交飲各至數斗世祖嘗問王儉當今誰能為五言詩儉對曰謝朏得父膏腴江淹有意上起禪靈寺勅􅊪撰碑文王思逺琅邪臨沂人尚書令晏從弟也父羅雲平西長史思逺八嵗父卒祖𢎞之及外祖新安太守羊敬元並栖退髙尚故思逺少無仕心宋建平王景素辟為南徐州主簿深見禮遇景素被誅左右離散思逺親視殯葬手種松栢與廬江何昌㝢沛郡劉璡上表理之事感朝廷景素女廢為庶人思逺分衣食以相資贍年長為備笄總訪求素對傾家送遣除晉熙王撫軍行參軍安成王車騎參軍建元初為長沙王後軍主簿尚書殿中郎出補竟陵王征北記室參軍府遷司徒仍為録事參軍遷太子中舍人文恵太子與竟陵王子良素好士並蒙賞接思逺求出為逺郡除建安内史長兄思𤣥卒思逺友于甚至表乞自解不許及祥日又固陳世祖乃許之除中書郎大司馬諮議世祖詔舉士竟陵王子良薦思逺及吳郡顧暠之陳郡殷叡邵陵王子貞為吳郡世祖除思逺為吳郡丞以本官行郡事論者以為得人以疾解職還為司徒諮議參軍領録事轉黄門郎出為使持節都督廣交越三州諸軍事寧朔將軍平越中郎將廣州刺史髙宗輔政不之任仍遷御史中丞臨海太守沈昭畧贓私思逺依事劾奏髙宗及思逺從兄晏昭畧叔父文季請止之思逺不從案事如故建武中遷吏部郎思逺以從兄晏為尚書令不欲並居内臺權要之職上表固讓曰近頻煩歸啓實有微概陛下矜遇之厚古今罕儔臣若孤恩誰當戮力既自誓輕軀命不復以塵㸃為疑正以臣與晏地惟宻親必不宜俱居顯要慺慺丹赤守之以死臣實庸鄙無足奬進陛下甄拔之㫖要是許其一節臣果不能以理自固有乖則哲之眀犯冒之尤誅責在己謬賞之私惟塵聖鑒權其輕重寧守褊心且亦緣陛下以徳御下故臣可得以禮進退伏願思垂拯宥不使零墜今若祗膺所忝三公不足為泰犯忤之後九泉未足為劇而臣茍求刑戮自棄富榮愚夫不為臣亦庶免此心此志可憐可矜如其上命必行請罪非理聖恩方置之通塗而臣固求擯壓自愍自悼不覺涕流謹冒鈇鉞悉心以請窮則呼天仰祈一照上知其意乃改授司徒左長史初髙宗廢立之際思逺與晏閒言謂晏曰兄荷世祖厚恩今一旦贊人如此事彼或可以權計相湏未知兄將来何以自立若及此引决猶可不失後名晏不納及拜驃騎集㑹子弟謂思逺兄思微曰隆昌之末阿戎勸吾自裁若從其語豈有今日思逺遽應曰如阿戎所見猶未晚也及晏敗故得無他思逺清修立身簡潔衣服牀筵窮治素浄賓客来通輒使人先宻覘視衣服垢穢方便不前形儀新楚乃與促膝雖然既去之後猶令二人交帚拂其坐處上從祖弟季敞性甚豪縦上心非之謂季敞曰卿可數詣王思逺上既誅晏遷為侍中掌優䇿及起居注永元二年遷度支尚書未拜卒年四十九贈太常諡貞子思逺與顧暠之友善暠之卒後家貧思逺迎其兒子經䘏甚至暠之字士眀少孤好學有義行初舉秀才歴官府閣永眀末為太子中舍人兼尚書左丞隆昌初為安西諮議兼著作與思逺並屬文章建武初以疾歸家髙宗手詔與思逺曰此人殊可惜就拜中散大夫卒年四十九思微永元中為江州長史為陳伯之所殺史臣曰徳成為上藝成為下觀夫二三子之治身豈直清體雅業取隆基構行禮蹈義可以勉物風規云君子之居世所謂美矣贊曰江纂世業有聞時陂何申舊主辭出乎義謝獻夀觴載色載刺思逺退食冲心篤寄南齊書卷四十三南齊書卷四十三考證何昌㝢傳眀帝遣徐𤣥慶至荆州欲以便宜從事臣祖庚按南史眀帝使裴叔業賫㫖詔昌㝢令以便宜從事叔業傳無此事又按通鑑從齊書作徐𤣥慶據此則南史誤矣謝􅊪傳朏指􅊪口曰此中唯宜飲酒臣宗萬按尺牘謝朏與弟􅊪書曰今致數斗酒可力飲此勿豫人事與此小異南齊書卷四十三考證
