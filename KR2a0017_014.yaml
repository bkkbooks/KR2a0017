body:
  text: 南齊書卷十四志第六州郡上揚南徐豫南豫南六允北六允北徐青冀江廣交越揚州京輦神臯漢魏刺史鎮壽春吳置持節督州牧八人不見揚州都督所治晉太康元年吳平刺史周浚始鎮江南元帝為都督渡江左遂成帝畿望實隆重領郡如左丹陽郡建康秣陵丹陽溧陽永世湖熟江寧句容會稽郡山陰永興上虞餘姚諸暨剡鄞始寧句章鄮吳郡吳婁海虞嘉興海鹽錢唐富陽鹽官新城建德壽昌桐廬吳興郡烏程武康餘杭東遷長城於潛臨安故鄣安吉原鄉東陽郡長山太末烏傷永康信安吳寧豐安定陽遂昌新安郡始新黟遂安歙海寧臨海郡章安臨海寧海始豐樂安永嘉郡永寧安固松陽橫陽樂成南徐州鎮京口吳置幽州牧屯兵在焉丹徒水道入通吳會孫權初鎮之爾雅曰絶高為京今京城因山為壘望海臨江緣江為境似河內郡內鎮優重宋氏以來桑梓帝宅江左流寓多出膏腴領郡如左南東海郡郯祝其襄賁利成西隰丹徒武進晉陵郡晉陵無錫延陵曲阿暨陽南沙海陽義興郡永明二年割屬揚州後復舊陽羡臨津國山義鄉綏安南琅邪郡本治金城永明徙治白下臨沂江乘蘭陵承建武三年省譙建元二年平陽郡流民在臨江郡者立宣祚縣尋改為譙永明元年省懷化一縣并屬臨淮郡自此以下郡無實土海西射陽淩淮陰東陽淮浦建武二年省淮陵郡司吾武陽建武三年省泰山郡屬甄城陽樂徐建武三年省南東莞郡東莞莒姑幕建武三年省南清河郡南徐州領冀州東武城清河貝丘繹幕建武二年省南彭城郡彭城武原傅陽蕃薛開陽洨僮下邳建武三年省呂建武四年省杼秋建武四年省北陵建武四年省南高平郡宋太始五年僑置初寄治淮陰復徙淮南當塗二縣僑屬南豫後屬南徐金鄉高平南濟陰郡城武單父城陽建武三年省南濮陽郡廩丘東燕會鄄城建武三年省濟陽郡度屬榆次建武二年省南魯郡建武二年省魯樊西安建武二年省南平昌郡建武三年省安丘郡省屬東莞新樂郡省屬東莞東武高密南泰山郡建武三年省南城郡省度屬平昌尋又省廣平南濟陽郡建武三年省考城郡省度屬魯尋又省豫州晉元帝永昌元年刺史祖約避胡賊自譙還治壽春壽春淮南一都之會地方千餘里有陂田之饒漢魏以來揚州刺史所治北拒淮水禹貢云淮海惟揚州也咸和四年祖約以城降胡復以庾亮為刺史治蕪湖蕪湖浦水南入亦為險奧劉備謂孫權曰江東先有建業次有蕪湖庾亮經略中原以毛寶為刺史治邾城為胡所覆荊州刺史庾翼領州在武昌諸郡失土荒民數千無佃業翼表移西陽新蔡二郡荒民就陂田於尋陽穆帝永和五年胡偽揚州刺史王浹以壽春降而刺史或治歷陽進馬頭及譙不復歸舊鎮也哀帝隆和元年袁真還壽春真為桓溫所滅溫以子熙為刺史戍歷陽孝武寧康元年桓沖移姑熟以邊寇未靜分割譙梁二郡見民置之浣川立為南譙梁郡十二年桓石虔還歷陽庾準為刺史表省諸權置皆還如本義熙二年劉毅復鎮姑熟上表曰忝任此州地不為曠西界荒餘密邇寇虜北垂蕭條土氣強獷民不識義唯戰是習逋逃不逞不謀日會比年以來無月不戰實非空乏所能獨撫請輔國將軍張暢領淮南安豐梁國三郡時豫州邊荒至乃如此十二年劉義慶鎮壽春後常為州治撫接遐荒扞禦疆埸領郡如左南汝陰郡建元二年罷南陳左郡二縣并慎汝陰宋安陽和城南頓陽夏宋丘永元元年地志無樊永元志無鄭永元志無東宋永元志無南陳左縣永元志無邊水永元志無晉熙郡新治冶陰安懷寧南樓煩齊興太湖左縣潁川郡臨潁邵陵南許昌永元志無曲陽汝陽郡武津汝陽梁郡永元元年地志南梁郡領睢陽新汲陳蒙崇義五縣北譙梁蒙城父永元志屬南譙北陳郡陽夏西華萇平項陳留郡浚儀小黃雍丘南頓郡永元元年地志無和城南頓西南頓郡寄治州永元元年地志無西南頓和城譙平鄉北梁郡永元元年地志無北蒙北陳西汝陰郡樓煩汝陰宋陳永元志無平豫永元志無固始永元志無新蔡永元志無汝南永元志無安城北譙郡寧陵譙蘄永元志屬南譙汝南郡永元元年地志無瞿陽安城上蔡北新蔡郡鮦陽新蔡固始苞信弋陽郡期思南新息弋陽上蔡平輿陳郡南陳萇平永元志無項永元志無西華永元志無陽夏永元志無安豐郡雩婁新化史水扶陽開化邊城松滋永元志屬北新蔡安豐光城左郡樂安光城茹田由邊城郡永元元年地志無建寧郡陽城建寧齊昌郡陽塘保城齊昌永興右三郡永明四年割郢州屬南豫州晉寧康元年豫州刺史桓沖始鎮姑熟後遷徙見晉書宋永初二年分淮東為南豫州治歷陽而淮西為豫州元嘉七年省并大明元年復置治姑熟泰始二年治歷陽三年治宣城五年省淮西沒虜七年復分淮東置南豫建元二年太祖以西豫吏民寡刻分置兩州損費甚多省南豫左僕射王儉啓愚意政以江西連接汝潁土曠民希胸奴越逸唯以壽春為阻若使州任得才虜動要有聲聞豫設防禦此則不俟南豫假令或慮一失醜羯之來聲不先聞胡馬至壽陽嬰城固守不能斷其路朝廷遣軍歷陽己當不得先機戎車初戒每事草創孰與方鎮常居軍府素正臨時配助所益實少安不忘危古之善政所以江左屢分南豫意亦可求如聞西豫力役尚復粗可今得南譙等郡民戶益薄於其實益復何足云太祖不從永明二年割揚州宣城淮南豫州歷陽譙廬江臨江六郡復置南豫州四年冠軍長史沈憲啓二豫分置以桑堁子亭為斷潁川汝陽在南譙歷陽界內悉屬西豫廬江居晉熙汝陰之中屬南豫求以潁川汝陽屬南豫廬江還西豫七年南豫州別駕殷瀰稱潁川汝陽荒殘來久流民分散在譙歷二境多蒙復除獲有郡名租輸益微府州絶無將吏空受名領終無實益但寄治譙歷於方斷之宜實應屬南豫二豫亟經分置廬江屬南豫濱帶長江與南譙接境民黎租帛從流送州實為便利遠踰西豫非其所願郡領灊舒及始新左縣村竹産府州採伐為益不少府州新創異於舊藩資役多闕實希得廬江請依昔分置尚書參議往年慮邊塵須實故啓回換今淮泗無虞宜許所牒詔可領郡如左淮南郡于湖永明八年省甬角城高平下邳三縣并繁昌當塗浚遒定陵襄垣宣城郡廣德懷安宛陵廣陽石城臨城寧國宣城建元涇安吳歷陽郡歷陽龍亢雍丘南譙郡山桑蘄北許昌永元志無扶陽曲陽嘉平廬江郡舒建元二年為郡治灊始新和城永元志無西華永元志無呂亭左縣建元二年割晉熙屬譙建元二年割南譙屬臨江郡建元二年罷并歷陽後復置烏江懷德酇南六允州鎮廣陵漢故王國有江都浦水魏文帝伐吳出此見江濤盛壯歎云天所以限南北也晉元帝過江建興四年揚聲北討遣宣城公裒督徐六允二州鎮廣陵其後或還江南然立鎮自此始也時百姓遭難流移此境流民多庇大姓以為客元帝太興四年詔以流民失籍使條名上有司為給客制度而江北荒殘不可檢實明帝太寧三年郗鑒為六允州鎮廣陵後還京口是後六允州或治盱眙或治山陽桓玄以桓弘為青州鎮廣陵義熙二年諸葛長民為青州徙山陽時鮮卑接境長民表云此蕃十載釁故相襲城池崩毀荒舊散伏邊疆諸戍不聞雞犬且犬羊侵暴抄掠滋甚乃還鎮京口晉末氏廣陵控接三齊故青六允同鎮宋永初元年罷青并六允三年檀道濟始為南六允州廣陵因此為州鎮土甚平曠刺史每以秋月多出海陵觀濤與京口對岸江之壯闊處也永明元年刺史柳世隆奏尚書符下土斷條格并省僑郡縣凡諸流寓本無定十家五落各自星處一縣之民散在州境西至淮畔東屆海隅今專罷僑邦不省荒邑雜居舛止與先不異離為區斷無革遊濫謂應同省隨堺并帖若鄉屯里聚二三百家井甸可修區域易分者別詳立於是濟陰郡六縣下邳郡四縣淮陽郡三縣東莞郡四縣以散居無實土官長無廨舍寄止民村及州治立見省民戶帖屬領郡如左廣陵郡建元四年罷北淮陽北下邳北濟陰東莞四郡并海陵廣陵高郵江都齊寧永明元年置海陵郡建陵寧海如臯臨江蒲濤臨澤齊昌永明元年置海安永明五年罷新郡并此縣度屬山陽郡東城山陽鹽城左鄉盱眙郡考城盱眙陽城直瀆長樂南沛郡沛蕭相北六允州鎮淮陰地理志云淮陰縣屬臨淮郡郡國志屬下邳國晉太康地記屬廣陵郡穆帝永和中北中郎將荀羡北討鮮卑云淮陰舊鎮地形都要水陸交通易以觀釁沃野有開殖之利方舟運漕無他屯阻乃營立城池宋泰始二年失淮北於此立州鎮建元四年移鎮盱眙仍領盱眙郡舊北對清泗臨淮守險有平陽平石鱉田稻豐饒所領唯平陽平一郡永明七年光祿大夫呂安國啓稱北六允州民戴尚伯六十人訴舊壤幽隔飄寓失所今雖創置淮陰而陽平一郡州無實土寄山陽境內竊見司徐青三州悉皆新立並有實郡東平既是望邦衣冠所係希於山陽盱眙二界間割小戶置此郡始招集荒落使本壤族姓有所歸依臣尋東平郡既是此州本領臣賤族桑梓願立此邦見許領郡如左陽平郡寄治山陽泰清永陽安宜豐國東平郡壽張割山陽官瀆以西三百戶置淮安割直瀆破釜以東淮陰鎮下流雜一百戶置高平郡濟北郡泰山郡新平郡魯郡右荒北徐州鎮鍾離漢志鍾離縣屬九江郡晉太康二年起居注置淮南鍾離未詳此前所省令晉地記屬淮南郡宋泰始末年屬南六允元徽元年置州割為州治防鎮緣淮永明元年省北徐譙梁魏陽平彭城五郡領郡如左鍾離郡燕縣郡治朝歌虞永明元年割馬頭屬零永明元年割馬頭屬馬頭郡巳吾永明元年罷譙郡屬二年刺史戴僧靜又以濟縣并之濟陰郡頓丘永明元年罷定陶并睢陵樂平永明元年割鍾離屬濟安永明元年割鍾離屬新昌郡頓丘穀熟尉氏沛郡相蕭沛青州宋泰始初淮北沒虜六年始治鬱州上鬱州在海中周回數百里島出白鹿土有田疇魚鹽之利劉善明為刺史以海中易固不峻城雉乃纍石為之高可八九尺後為齊郡治建元初徙齊郡治瓜步以北海治齊郡故治州治如舊流荒之民郡縣虛置至於分居土著蓋無幾焉建元四年移鎮朐山後復舊領郡如左齊郡永明元年罷秦郡并之治瓜步臨淄永明二年省華城縣并齊安永明元年罷西安宿豫尉氏平虜昌國泰益都北海郡都昌宋鬱縣建元改用漢名也廣饒贛榆膠東劇下密平壽東莞琅邪二郡治朐山也即丘南東莞永明元年以流戶置北東莞冀州宋元嘉九年分青州置青州領齊濟南樂安高密平昌北海東萊太原長廣九郡冀州領廣川平原清河樂陵魏郡河間頓丘高陽勃海九郡泰始初遇虜寇並荒沒今所存者泰始之後更置立也二州共一刺史郡縣十無八九但有名存案宋志自知也建元初以東海郡屬冀州全領一郡北東海郡治連口襄賁僮下邳厚丘曲城江州鎮尋陽中流襟帶晉元康元年惠帝詔荊揚二州疆土曠遠有司奏割揚州之豫章鄱陽廬陵臨川南康建安晉安為新州新安東陽宣城舊豫章封內豫章之東北相去懸遠可如故屬揚州又割荊州之武昌桂陽安成并十郡可因江水之名為江州宜治豫章庾亮領刺史都督六州云以荊江為本校二州戶口雖相去機事實覺過半江州實為根本臨終表江州宜治尋陽以州督豫州新蔡西陽二郡治湓城接近東江諸郡往來便易其後庾翼又還豫章義熙後還尋陽何無忌表竟陵去治遼遠去江陵正三百里荊州所立綏安郡民戶參入此境郡治常在夏口左右欲資此郡助江濱戍防以竟陵還荊州又司州弘農揚州松滋二郡寄尋陽人民雜居宜並見督今九江在州鎮之北彭蠡在其東也領郡如左尋陽郡柴桑彭澤豫章郡南昌新淦艾建城建昌望蔡新吳永修吳平康樂豫章豐城臨川郡南城臨汝新建永城宜黃南豐東興安浦西豐廬陵郡石陽西昌東昌吉陽巴丘興平高昌陽豐遂興鄱陽郡鄱陽餘干葛陽樂安廣晉上饒安成郡平都新喻永新萍鄉宜陽廣興安復南康郡贛雩都南野寧都平固陂陽虔化永明八年罷安遠縣并南康南新蔡郡慎苞信陽唐左縣宋建安郡吳興建安將樂邵武建陽綏城沙村晉安郡侯官羅江原豐晉安溫麻廣州鎮南海濱際海隅委輸交部雖民戶不多而俚獠猥雜皆樓居山險不肯賓服西南二江川源深遠別置督護專征討之捲握之資富兼十世尉他餘基亦有霸迹江左以其遼遠蕃戚未有居者唯宋隨王誕為刺史領郡如左南海郡番禺熙安博羅增城龍川懷化酉平綏寧新豐羅陽高要安遠河源東官郡懷安寶安海安欣樂海豐齊昌陸安興寧義安郡綏安海寧海陽義招潮陽程鄉新寧郡博林南興臨沇甘泉新成威平單牒龍潭城陽威化歸順初興撫納平鄉蒼梧郡廣信寧新封興撫寧遂城丁留懷熙猛陵廣寧蕩康僑寧思安高涼郡安寧羅州莫陽西鞏思平禽鄉平定永平郡夫寧安沂萡安盧平員鄉蘇平逋寧雷鄉開城毗平武林豐城晉康郡威城都城夫阮元溪安遂晉化永始端溪賓江熙寧樂城武定悅城文招義立新會郡盆允新夷封平初賓封樂義寧新熙永昌始康招集始成廣熙郡龍鄉羅平賓化寧鄉長化定昌永熙寶寧宋康郡廣化石門化隆遂度威覃單城開寧海鄰輿定綏定宋隆郡平興招興崇化建寧熙穆崇德海昌郡寧化招懷永建始化新建綏建郡新招四會化蒙化注化穆樂昌郡始昌樂山宋元義立安樂鬱林郡布山鬱平阿林建安始集龍平賓平新林綏寧中胄領方懷安歸化晉平威化桂林郡武熙騰溪潭平龍岡臨浦中留武豐程安威定潭中安遠安化龍定寧浦郡安廣簡陽平山寧浦興道吳安晉興郡晉興熙注桂林增翊安廣廣鬱晉城鬱陽齊樂郡希平觀寧臻安宋平綏南封陵齊康郡樂康齊建郡初寧永城齊熙郡交州鎮交址在海漲島中楊雄針曰交州荒遰水與天際外接南夷寶貨所出山海珍怪莫與為比民恃險遠數好反叛領郡如左九真郡移風胥浦松原高安建初常樂津梧軍安吉龐武寧武平郡武定封溪平道武興根寧南移新昌郡范信嘉寧封山西道臨西吳定新道晉化九德郡九德咸歡浦陽南陵都洨越常西安日南郡西捲象林壽冷朱吾比景盧容無勞交址郡龍編武寧望海句漏吳興西于朱南定曲昜海平羸𥕟宋平郡昌國義懷綏寧宋壽郡建元二年割越州屬義昌郡永元二年改沃屯置越州鎮臨漳郡本合浦北界也夷獠叢居隱伏巖障寇盜不賓略無編戶宋泰始中西江督護陳伯紹獵北地見二青牛驚走入草使人逐之不得乃志其處云此地當有奇祥啓立為越州七年始置百梁隴蘇永寧安昌富昌南流六郡割廣交朱三郡屬元徽二年以伯紹為刺史始立州鎮穿山為城門威服俚獠土有瘴氣殺人漢世交州刺史每暑月輒避處高今交土調和越瘴獨甚刺史常事戎馬唯以貶伐為務臨漳郡漳平丹城勞石容城長石都并緩端合浦郡徐聞合浦朱盧新安晉始蕩昌朱豐宋豐宋廣永寧郡杜羅金安蒙廖簡留城百梁郡百梁始昌宋西安昌郡武桑龍淵石秋撫林南流郡方度北流郡永明六年立無屬縣龍蘇郡龍蘇富昌郡南立義立歸明高興郡宋和寧單高興威成夫羅南安歸安陳蓮高城新建思築郡鹽田郡杜同定川郡興昌隆川郡良國齊寧郡建元二年置割鬱林之新邑建初二縣并開城建元二年置延海新邑建初越中郡馬門郡鍾吳田羅馬陵思寧封山郡安金吳春俚郡永明六年立無屬縣齊隆郡先屬交州中改為永泰元年改為齊隆還屬州
