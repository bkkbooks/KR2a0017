body:
  text: 南齊書卷十四梁蕭子顯撰志第六州郡上揚南徐豫南豫南兖北兖北徐青冀江廣交越揚州京輦神臯漢魏刺史鎮夀春吳置持節督州牧八人不見揚州都督所治晉太康元年吳平刺史周浚始鎮江南元帝為都督渡江左遂成帝畿望實隆重領郡如左丹陽郡建康秣陵丹陽溧陽永世湖熟江寕句容㑹稽郡山隂永興上虞餘姚諸暨剡鄞始寕句章鄮吴郡吴婁海虞嘉興海鹽錢唐富陽鹽官新城建徳夀昌桐廬吴興郡烏程武康餘杭東遷長城於潜臨安故鄣安吉原鄉東陽郡長山太末烏傷永康信安吴寕豐安定陽遂昌新安郡始新黟遂安歙海寕臨海郡章安臨海寕海始豐樂安永嘉郡永寕安固松陽横陽樂成南徐州鎮京口呉置幽州牧屯兵在焉丹徒水道入通吳㑹孫權初鎮之爾雅曰絶髙為京今京城因山為壘望海臨江緣江為境似河内郡内鎮優重宋氏以来桑梓帝宅江左流寓多岀膏腴領郡如左南東海郡郯祝其襄賁利成西隰丹徒武進晉陵郡晉陵無錫延陵曲阿暨陽南沙海陽義興郡永明二年割屬揚州後復舊陽羡臨津國山義鄉綏安南琅邪郡本治金城永明徙治白下臨沂江乘蘭陵承建武三年省譙建元二年平陽郡流民在臨江郡者立宣祚縣尋改為譙永明元年省懐化一縣并屬臨淮郡自此以下郡無實土海西射陽淩淮隂東陽淮浦建武二年省淮陵郡司吾武陽建武三年省泰山郡屬甄城陽樂徐建武三年省南東莞郡東莞莒姑幕建武三年省南清河郡南徐州領冀州東武城清河貝丘繹幕建武二年省南彭城郡彭城武原傅陽蕃薛開陽洨僮下邳建武三年省呂建武四年省杼秋建武四年省北陵建武四年省南髙平郡宋太始五年僑置初寄治淮隂復徙淮南當塗二縣僑属南豫後属南徐金鄉高平南濟隂郡城武單父城陽建武三年省南濮陽郡廩邱東燕㑹鄄城建武三年省濟陽郡度属榆次建武二年省南魯郡建武二年省魯樊西安建武二年省南平昌郡建武三年省安邱郡省属東莞新樂郡省屬東莞東武髙宻南泰山郡建武三年省南城郡省度属平昌尋又省廣平南濟陽郡建武三年省考城郡省度属魯尋又省豫州晉元帝永昌元年刺史祖約避胡賊自譙還治夀春夀春淮南一都之㑹地方千餘里有陂田之饒漢魏以来揚州刺史所治北距淮水禹貢云淮海惟揚州也咸和四年祖約以城降胡復以庾亮為刺史治蕪湖蕪湖浦水南入亦為險奥先主謂孫權曰江東先有建業次有蕪湖庾亮經畧中原以毛寳為刺史治邾城為胡所覆荆州刺史庾翼領州在武昌諸郡失土荒民数千無佃業翼表移西陽新蔡二郡荒民就陂田于尋陽穆帝永和五年胡偽揚州刺史王浃以夀春降而刺史或治歴陽進馬頭及譙不復歸舊鎮也哀帝隆和元年袁真還夀春真為桓温所滅温以子熈為刺史戍歴陽孝武寕康元年桓冲移姑熟以邊宼未静分割譙梁二郡見民置之浣川立為南譙梁郡十二年桓石虔還歴陽庾准為刺史表省諸權置皆還如本義熈二年劉毅復鎮姑熟上表曰忝任此州地不為曠西界荒餘宻邇㓂虜北垂蕭條土氣彊獷民不識義唯戰是習逋逃不逞不謀日㑹比年以来無月不戰實非空之所能獨撫請輔國将軍張暢領淮南安豐梁國三郡時豫州邉荒至乃如此十二年劉義慶鎮夀春後常為州治撫接遐荒扞禦疆場領郡如左南汝隂郡建元二年罷南陳左郡二縣并慎汝隂宋安陽和城南頓陽夏宋邱永元元年地志無樊永元志無鄭永元志無東宋永元志無南陳左縣永元志無邉水永元志無晉熙郡新治隂安懐寕南樓煩齊興太湖左縣潁川郡臨潁邵陵南許昌永元志無曲陽汝陽郡武津汝陽梁郡永元元年地志南梁郡領睢陽新汲陳蒙崇義五縣北譙梁蒙城父永元志属南譙北陳郡陽夏西華萇平項陳留郡浚儀小黄雍邱南頓郡永元元年地志無和城南頓西南頓郡寄治州永元元年地志無西南頓和城譙平鄉北梁郡永元元年地志無北蒙北陳西汝隂郡樓煩汝隂宋陳永元志無平豫永元志無固始永元志無新蔡永元志無汝南永元志無安城北譙郡寕陵譙蘄永元志属南譙汝南郡永元元年地志無瞿陽安城上蔡北新蔡郡鮦陽新蔡固始苞信弋陽郡期思南新息弋陽上蔡平輿陳郡南陳萇平永元志無項永元志無西華永元志無陽夏永元志無安豐郡雩婁新化史水扶陽開化邉城松滋永元志属北新蔡安豐光城左郡樂安光城茹田邉城郡永元元年地志無建寕郡陽城建寕齊昌郡陽塘保城齊昌永興右三郡永明四年割郢州屬南豫州晉寕康元年豫州刺史桓冲始鎮姑熟後遷徙見晉書宋永初二年分淮東為南豫州治歴陽而淮西為豫州元嘉七年省并大明元年復置治姑熟泰始二年治歴陽三年治宣城五年省淮西没虜七年復分淮東置南豫建元二年太祖以西豫吏民寡刻分置兩州損費甚多省南豫左僕射王儉啓愚意政以江西連接汝潁土曠民希匃奴越逸唯以夀春為阻若使州任得才虜動要有聲聞豫設防禦此則不俟南豫假令或慮一失醜羯之来聲不先聞胡馬倐至夀陽嬰城固守不能斷其路朝廷遣軍歴陽已當不得先機戎車初戒毎事草創孰與方鎮常居軍府素正臨時配助所益寔少安不㤀危古之善政所以江左屡分南豫意亦可求如聞西豫力役尚復粗可今得南譙等郡民户益薄于其寔益復何足云太祖不從永明二年割揚州宣城淮南豫州歴陽譙廬江臨江六郡復置南豫州四年冠軍長史沈憲啟二豫分置以桑堁子亭為㫁潁川汝陽在南譙歴陽界内悉属西豫廬江居晋熙汝隂之中属南豫求以潁川汝陽属南豫廬江還西豫七年南豫州别駕殷瀰稱潁川汝陽荒殘来乆流民分散在譙歴二境多䝉復除獲有郡名租輸益㣲府州絶無将吏空受名領終無寔益但寄治譙歴于方㫁之宜實應属南豫二豫亟經分置廬江属南豫濱帶長江與南譙接境民黎租帛從流送州寔為便利逺踰西豫非其所願郡領灊舒及始新左縣村竹産府州採伐為益不少府州新創異於舊藩資役多闕寔希得廬江請依昔分置尚書参議徃年慮邉塵湏寔故啟廻換今淮泗無虞宜許所牒詔可領郡如左淮南郡于湖永明八年省甬城髙平下邳三縣并繁昌當塗浚遒定陵襄垣宣城郡廣徳懐安宛陵廣陽石城臨城寕國宣城建元涇安吴歴陽郡歴陽龍亢雍邱南譙郡山桑蘄北許昌永元志無扶陽曲陽嘉平廬江郡舒建元二年為郡治灊始新和城永元志無西華永元志無吕亭左縣建元二年割晉熙属譙建元二年割南譙属臨江郡建元二年罷并歴陽後復置烏江懐徳酇南兖州鎮廣陵漢故王國有江都浦水魏文帝伐吴岀此見江濤盛壮歎云天所以限南北也晉元帝過江建興四年揚聲北討遣宣城公裒督徐兖二州鎮廣陵其後或還江南然立鎮自此始也時百姓遭難流移此境流民多庇大姓以為客元帝太興四年詔以流民失籍使條名上有司為給客制度而江北荒殘不可檢寔明帝太寕三年郗鑒為兖州鎮廣陵後還京口是後兖州或治盱眙或治山陽桓𤣥以桓𢎞為青州鎮廣陵義熙二年諸葛長民為青州徙山陽時鮮卑接境長民表云此蕃十載舋故相襲城池崩毁荒舊散伏邉疆諸戍不聞雞犬且犬羊侵暴抄掠滋甚乃還鎮京口晉末以廣陵控接三齊故青兖同鎮宋永初元年罷青并兖三年檀道濟始為南兖州廣陵因此為州鎮土甚平曠刺史毎以秋月多出海陵觀濤與京口對岸江之壮闊處也永明元年刺史栁世隆奏尚書符下土斷條格并省僑郡縣凡諸流寓本無定憇十家五落各自星處一縣之民散在州境西至淮畔東届海隅今専罷僑邦不省荒邑雜居舛止與先不異離為區斷無革游濫謂應同省隨堺并帖若鄉屯里聚二三百家井甸可脩區域易分者别詳立於是濟隂郡六縣下邳郡四縣淮陽郡三縣東莞郡四縣以散居無寔土官長無廨舍寄止民村及州治立見省民户帖屬領郡如左廣陵郡建元四年罷北淮陽北下邳北濟隂東莞四郡并海陵廣陵髙郵江都齊寧永明元年置海陵郡建陵寕海如臯臨江蒲濤臨澤齊昌永明元年置海安永明五年罷新郡并此縣度属山陽郡東城山陽鹽城左鄉盱眙郡考城盱眙陽城直瀆長樂南沛郡沛蕭相北兖州鎮淮隂地理志云淮隂縣属臨淮郡郡國志属下邳國晉太康地記属廣陵郡穆帝永和中北中郎将荀羡北討鮮卑云淮隂舊鎮地形都要水陸交通易以觀舋沃野有開殖之利方舟運漕無他屯阻乃營立城池宋泰始二年失淮北于此立州鎮建元四年移鎮盱眙仍領盱眙郡舊北對清泗臨淮守險有平陽石鱉田稻豐饒所領唯平陽一郡永明七年光禄大夫吕安國啟稱北兖州民戴尚伯六十人訴舊壤幽隔飄寓失所今雖創置淮隂而陽平一郡州無實土寄山陽境内竊見司徐青三州悉皆新立竝有實郡東平既是望邦衣冠所係希於山陽盱眙二界間割小户置此郡始招集荒落使本壤族姓有所歸依臣尋東平郡既是此州本領臣賤族桑梓願立此邦見許領郡如左陽平郡寄治山陽泰清永陽安宜豐國東平郡夀張割山陽官瀆以西三百户置淮安割直瀆破釡以東淮隂鎮下流雜一百戸置髙平郡濟北郡泰山郡新平郡魯郡右荒北徐州鎮鍾離漢志鍾離縣属九江郡晉太康二年起居注置淮南鍾離未詳此前所省令晉地記属淮南郡宋泰始末年属南兖元徽元年置州割為州治防鎮緣淮永明元年省北徐譙梁魏陽平彭城五郡領郡如左鍾離郡燕縣郡治朝歌虞永明元年割馬頭属零永明元年割馬頭属馬頭郡已吾永明元年罷譙郡属二年刺史戴僧静又以濟縣并之濟隂郡頓邱永明元年罷定陶并睢陵樂平永明元年割鍾離属濟安永明元年割鍾離属新昌郡頓邱榖熟尉氏沛郡相蕭沛青州宋泰始初淮北没虜六年始治欎州上欎州在海中週廻數百里島岀白鹿土有田疇魚鹽之利劉善明為刺史以海中易固不峻城雉乃累石為之髙可八九尺後為齊郡治建元初徙齊郡治𤓰歩以北海治齊郡故治州治如舊流荒之民都縣虚置至於分居土著盖無㡬焉建元四年移鎮朐山後復舊領郡如左齊郡永明元年罷秦郡并之治𤓰歩臨淄永明二年省華城縣并齊安永明元年罷西安宿豫尉氏平虜昌國泰益都北海郡都昌宋欎縣建元故用漢名也廣饒贑榆膠東劇下宻平夀東莞琅邪二郡治朐山也即邱南東莞永明元年以流户置北東莞冀州宋元嘉九年分青州置青州領齊濟南樂安高宻平昌北海東莱太原長廣九郡冀州領廣川平原清河樂陵魏郡河間頓邱髙陽勃海九郡泰始初遇虜㓂竝荒没今所存者泰始之後更置立也二州共一刺史郡縣十無八九但有名存案宋志自知也建元初以東海郡属冀州全領一郡北東海郡治連口㐮賁僮下邳厚邱曲城江州鎮尋陽中流衿帶晉元康元年恵帝詔荆揚二州疆上曠逺有司奏割揚州之豫章鄱陽廬陵臨川南康建安晉安為新州新安東陽宣城舊豫章封内豫章之東北相去懸逺可如故属揚州又割荆州之武昌桂陽安成并十郡可因江水之名為江州宜治豫章庾亮領刺史都督六州云以荆江為本校二州户口雖相去機事實覺過半江州寔為根本臨終表江州宜治尋陽以州督豫州新蔡西陽二郡治湓城接近東江諸郡徃来便易其後庾翼又還豫章義熙後還尋陽何無忌表竟陵去治遼逺去江陵正三百里荆州所立綏定郡民户参入此境郡治常在夏口左右欲資此郡助江濱戍防以竟陵還荆州又司州𢎞農揚州松滋二郡寄尋陽人民雜居宜竝見督今九江在州鎮之北彭蠡在其東也領郡如左尋陽郡柴桑彭澤豫章郡南昌新淦艾建城建昌望蔡新吴永修吴平康樂豫章豐城臨川郡南城