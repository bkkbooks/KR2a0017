body:
  text: 南齊書卷二十五列傳第六垣崇祖張敬兒垣崇祖字敬遠下邳人也族姓豪強石虎世自略陽徙之於鄴曾祖敞為慕容德偽吏部尚書祖苗宋武征廣固率部曲歸降仍家下邳官至龍驤將軍汝南新蔡太守父詢之積射將軍宋孝武世死事贈冀州刺史崇祖年十四有幹略伯父豫州刺史護之謂門宗曰此兒必大成吾門汝等不及也刺史劉道隆辟為主簿厚遇之除新安王國上將軍景和世道隆求出為梁州啓轉崇祖為義陽王征北行參軍與道隆同行使還下邳召募明帝立道隆被誅薛安都反明帝遣張永沈攸之北討安都使將裴祖隆李世雄據下邳祖隆引崇祖共拒戰會青州援軍主劉珍彌之背逆歸降祖隆士衆沮敗崇祖與親近數十人夜救祖隆與俱走還彭城虜既陷徐州崇祖仍為虜將遊兵琅邪間不復歸虜不能制密遣人於彭城迎母欲南奔事覺虜執其母為質崇祖妹夫皇甫肅兄婦薛安都之女故虜信之肅仍將家屬及崇祖母奔朐山崇祖因將部曲據之遣使歸命太祖在淮陰板為朐山戍主送其母還京師明帝納之朐山邊海孤險人情未安崇祖常浮舟舸於水側有急得以入海軍將得罪亡叛具以告虜虜偽圂城都將東徐州刺史成固公始得青州聞叛者説遣步騎二萬襲崇祖屯洛要去朐山城二十里崇祖出送客未歸城中驚恐皆下船欲去崇祖還謂腹心曰賊比擬來本非大舉政是承信一説易遣誑之今若得百餘人還事必濟矣但人情一駭不可斂集卿等可急去此二里外大叫而來唱艾塘義人已得破虜須戍軍速往相助逐退船中人果喜爭上岸崇祖引入據城遣羸弱入島令人持兩炬火登山鼓叫虜參騎謂其軍備甚盛乃退崇祖啓明帝曰淮北士民力屈胡虜南向之心日夜以冀崇祖父伯並為淮北州郡門族布在北邊百姓所信一朝嘯吒事功可立第名位尚輕不足威衆乞假名號以示遠近明帝以為輔國將軍北琅邪蘭陵二郡太守亡命司馬從之謀襲郡崇祖討捕斬之數陳計算欲剋復淮北時虜聲當寇淮南明帝以問崇祖崇祖因啓宜以輕兵深入出其不意進可立不世之勳退可絶其窺窬之患帝許之崇祖將數百人入虜界七百里據南城固蒙山扇動郡縣虜率大衆攻之其別將梁湛母在虜虜執其母使湛告部曲曰大軍已去獨住何為於是衆情離阻一時奔退崇祖謂左右曰今若俱退必不獲免乃住後力戰大敗追者而歸以久勞封下邳縣子泰豫元年行徐州事徙戍龍沮在朐山南崇祖啓斷水清注平地以絶虜馬帝以問劉懷珍云可立崇祖率將吏塞之未成虜主謂偽彭城鎮將平陽公曰龍沮若立國之恥也以死爭之數萬騎掩至崇祖馬槊陷陳不能抗乃築城自守會天雨十餘日虜乃退龍沮竟不立歷盱眙平陽東海三郡太守將軍如故轉邵陵王南中郎司馬復為東海太守初崇祖遇太祖於淮陰太祖以其武勇善待之崇祖謂皇甫肅曰此真吾君也吾今逢主矣所謂千載一時遂密布誠節元徽末太祖憂慮令崇祖受旨即以家口託皇甫肅勒數百人將入虜界更聽後旨會蒼梧廢太祖召崇祖領部曲還都除遊擊將軍沈攸之事平以崇祖為持節督六允青冀三州諸軍事纍遷冠軍將軍六允州刺史太祖踐阼謂崇祖曰我新有天下夷虜不識運命必當動其蟻衆以送劉昶為辭賊之所衝必在壽春能制此寇非卿莫可徙為使持節監豫司二州諸軍事豫州刺史將軍如故封望蔡縣侯七百戶建元二年虜遣偽梁王郁豆眷及劉昶馬步號二十萬寇壽春崇祖召文武議曰賊衆我寡當用奇以制之當修外城以待敵城既廣闊非水不固今欲堰肥水却淹為三面之險諸君意如何衆曰昔佛狸侵境宋南平王士卒完盛以郭大難守退保內城今日之事十倍於前古來相承不築肥堰皆以地形不便積水無用故也若必行之恐非事宜崇祖曰卿見其一不識其二若捨外城賊必據之外修樓櫓內築長圍四周無礙表𩹉受敵此坐自為擒守郭築堰是吾不諫之策也乃於城西北立堰塞肥水堰北起小城周為深塹使數千人守之崇祖謂長史封延伯曰虜貪而少慮必悉力攻小城圖破此堰見塹狹城小謂一往可剋當以蟻附攻之放水一激急踰三峽事窮奔透自然沈溺此豈非小勞而大利邪虜衆由西道集堰南分軍東路肉薄攻小城崇祖著白紗帽肩輿上城手自轉式至日晡時決小史埭水勢奔下虜攻城之衆漂墜塹中人馬溺死數千人衆皆退走初崇祖在淮陰見上便自比韓信白起咸不信唯上獨許之崇祖再拜奉旨及破虜啓至上謂朝臣曰崇祖許為我制虜果如其言其恆自擬韓白今真其人也進為都督號平西將軍增封為千五百戶崇祖聞陳顯達李安民皆增給軍儀啓上求鼓吹橫吹上敕曰韓白何可不與衆異給鼓吹一部崇祖慮虜復寇淮北啓徙下蔡戍於淮東其冬虜果欲攻下蔡既聞內徙乃揚聲平除故城衆疑虜當於故城立戍崇祖曰下蔡去鎮咫尺虜豈敢置戍實欲除此故城政恐奔走殺之不盡耳虜軍果夷掘下蔡城崇祖自率衆渡淮與戰大破之追奔數十里殺獲千計上遣使入關參虜消息還敕崇祖曰卿視吾是守江東而已邪所少者食卿但努力營田自然平殄殘醜敕崇祖修治苟芍陂田世祖即位徵為散騎常侍左衛將軍俄詔留本任加號安西仍遷五兵尚書領驍騎將軍初豫章王有盛寵世祖在東宮崇祖不自附結及破虜詔使還朝與共密議世祖疑之曲加禮待酒後謂崇祖曰世間流言我已豁諸懷抱自今已後富貴見付也崇祖拜謝崇祖去後上復遣荀伯玉口敕以邊事受旨夜發不得辭東宮世祖以崇祖心誠不實銜之太祖崩慮崇祖為異便令內轉永明元年四月九日詔曰垣崇祖凶詬險躁少無行業昔因軍國多虞採其一夫之用大運光啓頻煩升擢溪壑靡厭恐浸以彌廣去歲在西連謀境外無君之心已彰遐邇特加遵養庶或悛革而猜二滋甚志興亂階隨與荀伯玉驅合不逞窺窬非覬構扇邊荒互為表𩹉寧朔將軍孫景育究悉姦計具以啓聞除惡務本刑茲罔赦便可收掩肅明憲辟死時年四十四子惠隆徙番禺卒張敬兒南陽冠軍人也本名苟兒宋明帝以其名鄙改焉父醜為郡將軍官至節府參軍敬兒年少便弓馬有膽氣好射虎發無不中南陽新野風俗出騎射而敬兒尤多膂力求入隊為曲阿戍驛將州差補府將還為郡馬隊副轉隊主稍官寧蠻府行參軍隨同郡人劉胡領軍伐襄陽諸山蠻深入險阻所向皆破又擊湖陽蠻官軍引退蠻賊追者數千人敬兒單馬在後衝突賊軍數十合殺數十人箭中左腋賊不能抗平西將軍山陽王休祐鎮壽陽求善騎射人敬兒自占見寵為長史兼行參軍領白直隊泰始初除寧朔將軍隨府轉參驃騎軍事署中兵領軍討義嘉賊與劉胡相拒於鵲尾洲啓明帝乞本郡事平為南陽太守將軍如故初王玄謨為雍州土斷敬兒家屬舞陰敬兒至郡復還冠軍三年薛安都子柏令環龍等竊據順陽廣平略義成扶風界刺史巴陵王休若遣敬兒及新野太守劉攘兵攻討合戰破走之徙為順陽太守將軍如故南陽蠻動復以敬兒為南陽太守遭母喪還家朝廷疑桂陽王休範密為之備乃起敬兒為寧朔將軍越騎校尉桂陽事起隸太祖頓新亭賊矢石既交休範白服乘輿往勞樓下城中望見其左右人兵不多敬兒與黃回白太祖曰桂陽所在備防寡闕若詐降而取之此必可擒也太祖曰卿若能辦事當以本州相賞敬兒相與出城南放仗走大呼稱降休範喜召至輿側回陽致太祖密意休範信之回目敬兒敬兒奪取休範防身刀斬休範首休範左右數百人皆驚散敬兒馳馬持首歸新亭除驍騎將軍加輔國將軍太祖以敬兒人位既輕不欲便使為襄陽重鎮敬兒求之不已乃微動太祖曰沈攸之在荊州公知其欲何所作不出敬兒以防之恐非公之利也太祖笑而無言乃以敬兒為持節督雍梁二州郢司二郡軍事雍州刺史將軍如故封襄陽縣侯二千戶部伍泊沔口敬兒乘舴艋過江詣晉熙王燮中江遇風船覆左右丁壯者各泅走餘二小吏沒火兀下叫呼官敬兒兩掖挾之隨船覆仰常得在水上如此翻覆行數十里方得迎接失所持節更給之沈攸之聞敬兒上遣人伺覘見雍州迎軍儀甚盛慮見掩襲密自防備敬兒至鎮厚結攸之信饋不絶得其事迹密白太祖攸之得太祖書翰論選用方伯密事輒以示敬兒以為反間敬兒終無二心元徽末襄陽大水平地數丈百姓資財皆漂沒襄陽虛耗太祖與攸之書令賑貸之攸之竟不歷意敬兒與攸之司馬劉攘兵情款及蒼梧廢敬兒疑攸之當因此起兵密以問攘兵攘兵無所言寄敬兒馬鐙一隻敬兒乃為之備升明元年冬攸之反遣使報敬兒敬兒勞接周至為設酒食謂之曰沈公那忽使君來君殊可命乃列仗於廳事前斬之集部曲傾偵攸之下當襲江陵時攸之遺太祖書曰吾聞魚相忘於江湖人相忘於道術彼我可謂通之矣大明之中謬奉聖主忝同侍衛情存契闊義著斷金乃分帛而衣等糧而食值景和昏暴心爛形燋若斯之苦寧可言盡吾自分碎首於閣下足下亦懼滅族於舍人爾時盤石之心既固義無二計迫時難相引求全天道矜善此理不空結姻之始實關於厚及明帝龍飛諸人皆為鬼矣吾與足下得蒙大造親過夙眷遇若代臣録其心迹復忝驅使臨崩之日吾豫在遺託加榮授寵恩深位高雖復情謝古人粗識忠節誓心仰報期之必死此誠志竟未申遂先帝登遐微願永奪自爾已來與足下言面殆絶非唯分張形迹自然至此脫枉一告未常不對紙流涕豈願相誚於今哉苟有所懷不容不白初得賢子賾疏云得家信云足下有廢立之事安國寧民此功巍巍非吾等常人所能信也俄奉皇太后假令云足下潛構深略獨斷懷抱一何能壯但冠雖弊不可承足蓋共尊高故耳足下交結左右親行殺逆以免身患卿當謂龍逢比干癡人耳凡廢立大事不可廣謀但袁褚遺寄劉又國之近戚數臣地籍實為膏腴人位並居時望若此不與議復誰可得共披心者哉昏明改易自古有之豈獨大宋中屯邪前代盛典煥盈篇史請為足下言之羣公共議宜啓太后奉令而行當以王禮出第足下乃可不通大理要聽君子之言豈可罔滅天理一何若茲孝經云資於事父以事君縱為宗社大計不爾寧不識有君親之意邪乃復慮以家危啖以爵賞小人無狀遂行弒害吾雖寡識竊求古比豈有為臣而有近日之事邪使一旦荼毒身首分離生自可恨死者何罪且有登齋之賞此科出於何文凡在臣隸誰不惋駭華夷扣心行路泣血乃至不殯使流蟲在戶自古以來此例有幾衛國微小故有弘演不圖我宋獨無其人撫膺惆悵不能自已足下與向之殺者何異人情易反還成嗟悲為子君者無乃難乎蹊田之譬豈復有異管仲有言君善未嘗不諫足下諫諍不聞甘崔杼之罪何惡逆之苦昔太甲還位伊不自疑昌邑之過不可稱數霍光荷託尚共議於朝班然後廢之由有湯沐之施論者不以劫主為名桓溫之心未忘於篡海西失道人倫頓盡廢之以公猶禮處之當溫強盛誰能相抗尚畏懼於形迹四海不愜未嘗有樂推之者伊尹霍光名高於臣節桓氏亦得免於脅奪凡是諸事布於書策若此易曉豈待指掌卿常言比迹夷叔如何一旦行過桀跖邪聖明啓運蒼生重造普天率土誰不歌抃實是披心罄節奉公忘私之日而卿大收宮妓劫奪天藏器械金寶必充私室移易朝舊布置私黨被甲入殿內外宮閣管籥悉關家人吾不知子孟孔明遺訓如此王謝陶庾行此舉止且朱方帝鄉非親不授足下非國戚也一旦專縱自樹云是兒守臺城父居東府一家兩録何以異此知卿防固重復猜畏萬端言以禦遠實為防內若德允物望夷猶可推心共處如其失理乖道金城湯池無所用也文長以戈戟自衛何解滅亡吳起有云義禮不修舟中之人皆讎也足下既無伍員之痛苟懷貪婪而有賊宋之心吾寧捐申包之節邪聞求忠臣者必出孝子之門卿忠孝於斯盡矣今竊天府金帛以行姦惠盜國權爵以結人情且授非其理合我則賞此事已復不可恆用用之既訖恐非忠策且受者不感識者不知不能遏姦折謀誠節慨惋隔硋數千無因自對不能知復何情顏當與足下平生舊款吾聞前哲絶交不出惡言但此自陳名節於心因告別於千載放筆增歎公私潸淚想不深怪往言然天下耳目豈伊可誣抑亦當自知投杖無疆為必先及太祖出頓新亭報攸之書曰辱足下誚書交道不終為恥已足欲下便來何故多罔君子吾結髮入仕豈期遠大蓋感子路之言每不擇官而宦逮文帝之世初被聖明鑒賞及孝武之朝復蒙英主顧眄因此感激未能自反及與足下斂袂定交款著分好何嘗不勸慕古人國士之心務重前良忠貞之節至於契闊杯酒殷勤攜袖薦女成姻志相然諾義信之篤誰與間之又乃景和陵虐事切憂畏明帝正位運同休顯啓臆論心安危豈二元徽之季聽高道慶邪言欲相討伐發威施敕已行外內于時臣子鉗口道路以目吾以分交義重患難宜均犯陵白刃以相任保悖主手敕今封送相示豈不畏威念周旋之義耳推此陰惠何愧懷抱不云足下猥含禍詖前遣王思文所牒朝事蓋情等家國共詳衷否虛心小大必以先輸問張雍州遷代之日將欲誰擬本是逆論來事非欲代張乃封此示張激使見怒若張惑一言果興怨恨事負雅素君子所不可為況張之奉國忠亮有本情之見與意契不二邪又張雍州啓事稱彼中蠻動兼民遭水患敕令足下思經拯之計吾亦有白論國如家布情而往每思虛達事之相接恆必猜離反謂無故遣信此乃覘察平諒之襟動則相阻傷負心期自誰作故先時足下遣信尋盟敦舊厲以篤終吾止附還白申罄情本契然遠要方固金石今日舉錯定是誰恧久言邪元徽末德藝亡禋祀足下備聞無待亟述太后惟憂式遵前誥興毀之略事屬鄙躬黜昏樹明實惟前則寧宗靜國何愧前修廢立有章足下所允冠弊之譏將以何語封為郡王寧為失禮景和無名方之不愈乎龍逢自匹夫之美伊霍則社稷之臣同異相乘非吾所受也登齋有賞壽寂已蒙之於前同謀獲功明皇亦行之於昔此則接踵成事誰敢異之謂其大收宮女劫奪天藏器械金寶必充私室必若虛設市虎亦可不翅此言若以此詐民天下豈患無眼心苟無瑕非所耿介甲杖之授事既舊典豈見有任鎮邦家勳經定主而可得出入輕單不資寵衛斯之患慮豈直身憂祗奉此恩職惟事理朱方之牧公卿僉意吾亦謂微勳之次無忝一州且魏晉舊事帝鄉蕃職何嘗豫州必曹司州必馬折膠受柱在體非愧袁粲據石頭足下無不可吾之守東府來告便謂非動容見疾頻笑入戾乃如是乎袁粲劉秉受遇深重家國既安不思撫鎮遂與足下表𩹉潛規據城之夜豈顧社稷幸天未長亂宗廟有靈即與褚衛軍協謀義斷以時殄滅想足下聞之悵然孤沮小兒忝侍中代來之澤遇直上臺便呼一家兩録發不擇言良以太甚吾之方寸古列共言乃以陶庾往賢大見譏責足下自省詎得以此見貽邪比蹤夷叔論吾則可行過桀跖無乃近誣哉謂吾不朝此則良誨朝之與否想更問之足下受先帝之恩施擁戎西州鼎湖之日率土載奔而宴安中流酣飲自若即懷狼望陵侮皇朝晉熙殿下以皇弟代鎮而斷割候迎罔蔑宗子驅略士馬志悉以西上郢中所遺示僅餘劣弱昔徵茅不入猶動義師況荊州物産雍交梁之會自足下為牧薦獻何品良馬徑卒彼中不無良皮美罽商賂所聚前後貢奉多少何如唯聞太官時納飲食耳桂陽之難坐觀成敗自以雍容漢南西伯可擬賴原即天世非望亦消又招集逋亡斷遏行侶治舟試艦恆以朝廷為旗的秣馬桉劒常願天下有風塵為人臣者固若是邪至乃不遵制書敕下如空國恩莫行命令擁隔詔除郡縣輒自板代罷官去職禁還京師凶人出境無不千里尋躡而反募臺將來必厚加給賞太妃遣使市馬齎寶往蜀足下悉皆斷折以為私財此皆遠邇共聞暴於視聽主上睿明當璧𧜛縣同慶絶域奉贄萬國通書而盤桓百日始有單騎事存送往於此可徵不朝如此誰應受誚反以見呵非所反側今乃勒兵以窺象館長戟以指魏闕不亦為忠臣孝子之所痛心疾首邪賢子元琰獲免虎口及凌波西邁吾所發遣猶推素懷不畏嗤嗤足下尚復滅君臣之紀況吾布衣之交乎遂事不諫既往難咎今六師西向為足下憂之攸之與兼長史江乂別駕傅宣等守江陵城敬兒軍中力授因以為別敬兒告變使至太祖大喜進號鎮軍將軍加散騎常侍改為都督給鼓吹一部攸之於郢城敗走其子元琰與兼長史江乂別駕傅宣等守江陵城敬兒軍至白水元琰聞城外鶴唳謂是叫聲心懼欲走其夜乂宣開門出奔城潰元琰奔寵洲見殺百姓既相抄敓敬兒至江陵誅攸之親黨沒入其財物數十萬悉以入私攸之於湯渚村自經死居民送首荊州敬兒使楯擎之蓋以青繖徇諸市郭乃送京師進號征西將軍爵為公增邑為四千戶敬兒於襄陽城西起宅聚財貨又欲移羊叔子墮淚碑於其處立臺綱紀諫曰羊太傅遺德不宜遷動敬兒曰太傅是誰我不識也敬兒弟恭兒不肯出官常居上保村中與居民不異敬兒呼納之甚厚恭兒月一出視敬兒輒復去恭兒本名豬兒隨敬兒改名也初敬兒既斬沈攸之使報隨郡太守劉道宗聚衆得千餘人立營頓司州刺史姚道和不殺攸之使密令道宗罷軍及攸之圍郢道和遣軍頓堇城為郢援事平依例蒙爵賞敬兒具以啓聞建元元年太祖令有司奏道和罪誅之道和字敬雍羌主姚興孫也父萬壽偽鎮東大將軍降宋武帝卒於散騎侍郎道和出身為孝武安北行佐有世名頗讀書史常誑人云祖天子父天子身經作皇太子元徽中為遊擊將軍隨太祖新亭破桂陽賊有功為撫軍司馬出為司州疑怯無斷故及於誅三年徵敬兒為護軍將軍常侍如故敬兒武將不習朝儀聞當內遷乃於密室中屏人學揖讓答對空中俯仰如此竟日妾侍竊窺笑焉太祖即位授侍中中軍將軍以敬兒秩窮五等一仍前封建元二年遷散騎常侍車騎將軍置佐史太祖崩敬兒於家竊泣曰官家大老天子可惜太子年少向我所不及也遺詔加敬兒開府儀同三司將拜謂其妓妾曰我拜後應開黃閣因口自為鼓聲既拜王敬則戲之呼為褚淵敬兒曰我馬上所得終不能作華林閣勳也敬則甚恨敬兒始不識書晚既為方伯乃習學讀孝經論語於新林慈姥廟為妾乞兒呪神自稱三公然而意知滿足初得鼓吹羞便奏之初娶前妻毛氏生子道文後娶尚氏尚氏有美色敬兒棄前妻而納之尚氏猶居襄陽宅不自隨敬兒慮不復外出乃迎家口悉下至都啓世祖不蒙勞問敬兒心疑及垣崇祖死愈恐懼妻謂敬兒曰昔時夢手熱如火而君得南陽郡元徽中夢半身熱而君得本州今復夢舉體熱矣有閹人聞其言説之事達世祖敬兒又遣使與蠻中交關世祖疑其有異志永明元年敕朝臣華林八關齋於坐收敬兒敬兒左右雷仲顯知有變抱敬兒而泣敬兒脫冠貂投地曰用此物誤我少日伏誅詔曰敬兒蠢茲邊裔昏迷不修屬值宋季多難頗獲野戰之力拔迹行伍超登非分而愚躁無已矜伐滋深往蒞本州久苞異志在昔含弘庶能懲革位班三槐秩窮五等懷音靡聞姦回屢構去歲迄今嫌二滋甚鎮東將軍敬則丹陽尹安民每侍接之日陳其凶狡必圖反噬朕猶謂恩義所感本質可移頃者已來釁戾遂著自以子弟在西足動殊俗招扇羣蠻規擾樊夏假託妖巫用相震惑妄設徵祥潛圖問鼎履霜於開運之辰堅冰於嗣業之世此而可忍孰不可容天道禍淫逆謀顯露建康民湯天獲商行入蠻備覩姦計信驛書翰證驗炳明便可收掩式正刑辟同黨所及特皆原宥子道文武陵內史道暢征虜功曹道固弟道休並伏誅少子道慶見宥後數年上與豫章王嶷三日曲水內宴舴艋船流至御坐前覆沒上由是言及敬兒悔殺之恭兒官至員外郎在襄陽聞敬兒敗將數十騎走入蠻中收捕不得後首出上原其罪史臣曰平世武臣立身有術若非愚以取信則宜智以自免心迹無阻乃見優容崇祖恨結東朝敬兒情疑鳥盡嗣運方初委骨嚴憲若情非發憤事無感激功名之間不足為也贊曰崇祖為將志懷馳逐規搔淮部立勳豫牧敬兒蒞雍深心防楚豈不劬勞實興師旅烹犬藏弓同歸異緒賴原即大世疑
