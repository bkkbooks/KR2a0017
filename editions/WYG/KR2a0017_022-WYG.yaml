body:
  text: 南齊書卷二十二梁蕭子顯撰列傳第三豫章文獻王豫章文獻王嶷字宣儼太祖第二子寛仁𢎞雅有大成之量太祖特鍾愛焉起家為太學博士長城令入為尚書左民郎錢唐令太祖破薛索兒改封西陽以先爵賜為晉夀縣矦除通直散騎侍郎以偏憂去官桂陽之役太祖出頓新亭壘板嶷為寧朔將軍領軍衛從休範率士卒攻壘南嶷執白虎幡督戰屢摧却之事寧遷中書郎尋為安逺護軍武陵内史時沈攸之責賧伐荆州界内諸蠻遂反五溪禁斷魚鹽羣蠻怒酉溪蠻王田頭擬殺攸之使攸之責賧千萬頭擬輸五百萬發氣死其弟婁矦簒立頭擬子田都走入獠中於是蠻部大亂抄掠平民至郡城下嶷遣隊主張莫兒率將吏擊破之田都自獠中請立而婁矦懼亦歸附嶷誅婁矦於郡獄命田都繼其父蠻衆乃安入為宋順帝車騎諮議參軍府掾轉驃騎仍遷從事中郎詣司徒袁粲粲謂人曰後来佳器也太祖在領軍府嶷居青溪宅蒼梧王夜中㣲行欲掩襲宅内嶷令左右儛刀㦸於中庭蒼梧從墻間窺見以為有備乃去太祖帶南兗州鎮軍府長史蕭順之在鎮憂危既切期渡江北起兵嶷諫曰主上狂㓙人不自保單行道路易以立功外州起兵鮮有克勝物情疑惑必先人受禍今於此立計萬不可失蒼梧王殞太祖報嶷曰大事已判汝眀可早入順帝即位轉侍中總宫内直衛沈攸之之難太祖入朝堂嶷出鎮東府加冠軍將軍袁粲舉兵夕丹陽丞王遜告變先至東府嶷遣帳内軍主戴元孫二千人隨薛道淵等俱至石頭焚門之功元孫預焉先是王藴薦部曲六十人助為城防實以為内應也嶷知藴懐貳不給其仗散處外省及難作捜檢皆已亡去遷中領軍加散騎常侍上流平後世祖自尋陽還嶷出為使持節都督江州豫州之新蔡晉熙二郡軍事左將軍江州刺史常侍如故給鼓吹一部以定䇿功改封永安縣公千五百户仍徙都督荆湖雍益梁寧南北秦八州諸軍事鎮西將軍荆州刺史持節常侍如故時太祖輔政嶷務在省約停府州儀迎物初沈攸之欲聚衆開民相告士庶坐執役者甚衆嶷至鎮一日遣三千餘人見囚五嵗刑以下不連臺者皆原遣以市稅重濫更定㮧格以稅還民禁諸市調及苖籍二千石官長不得與人為市諸曹吏聽分畨假百姓甚悅禪讓之間世祖欲速定大業嶷依違其事黙無所言建元元年太祖即位赦詔未至嶷先下令蠲除國内昇眀二年以前逋負遷侍中尚書令都督揚南徐二州諸軍事驃騎大將軍開府儀同三司揚州刺史持節如故封豫章郡王邑三千户僕射王儉牋曰舊楚蕭條仍嵗多故荒民散亡實湏緝理公臨莅甫爾英風惟穆江漢来蘇八州慕義自庾亮以来荆楚無復如此美政古人朞月有成而公旬日致治豈不休哉㑹北虜動上思為經畧乃詔曰西闗總司王畿誠為治要荆楚領馭遐逺任寄𢎞隆自頃公私凋盡綏撫之宜尤重恒日復以為都督荆湘雍益梁寧南北秦八州諸軍事南蠻校尉荆湘二州刺史持節侍中將軍開府如故晉宋之際刺史多不領南蠻别以重人居之至是有二府二州荆州資費嵗錢三千萬布萬匹米六萬斛又以江湘二州米十萬斛給鎮府湘州資費嵗七百萬布三千匹米五萬斛南蠻資費嵗三百萬布萬匹綿千斤絹三百匹米千斛近代莫比也尋給油絡侠望車二年春虜寇司豫二州嶷表遣南蠻司馬崔慧景北討又分遣中兵參軍蕭恵朗援司州屯西闗虜軍濟淮攻夀春分騎當出隨鄧衆以為憂嶷曰虜入春夏非動衆時令豫司彊守遏其津要彼見堅嚴自當潰散必不敢越二鎮而南也是時纂嚴嶷以荆州隣接蠻蜑慮其生心令鎮内皆緩服既而虜竟不出樊鄧於夀春敗走尋給班劍二十人其夏於南蠻園東南開館立學上表言狀置生四十人取舊族父祖位正佐臺郎年二十五以下十五以上補之置儒林參軍一人文學祭酒一人勸學從事二人行釋莱禮以穀過賤聽民以米當口錢優評斛一百義陽刧帥張羣亡命積年鼓行為賊義陽武陵天門南平四郡界被其殘破沈攸之連討不能禽乃首用之攸之起事羣從下郢於路先叛結寨於三溪依據深險嶷遣中兵參軍虞欣祖為義陽太守使降意誘納之厚為禮遺於坐斬首其黨數百人皆散四郡獲安入為都督揚南徐二州諸軍事中書監司空揚州刺史持節侍中如故加兵置佐以前軍臨川王暎府文武配司空府嶷以將還都修治廨宇及路陌東歸部曲不得齎府州物出城發江津士女觀送數千人皆垂泣嶷發江陵感疾至亰師未瘳上深憂慮為之大赦三年六月壬子赦令是也疾愈上幸東府設金石樂敕得乗輿至宫六門太祖崩嶷哀號眼耳皆出血世祖即位進位太尉置兵佐解侍中増班劔為三十人建元中世祖以事失㫖太祖頗有代嫡之意而嶷事世祖恭悌盡禮未嘗違忤顔色故世祖友愛亦深永眀元年領太子太傅解中書監餘如故手啓上曰陛下以叡孝纂業萬㝢惟新諸弟有序臣屢荷隆愛叨授台首不敢固辭俛仰祗寵心魂如失負重量力古今同規臣窮生如浮質操空素任居鼎右已移氣序自頃以来宿疾稍纒心慮恍惚表於容狀視此根候常恐命不勝恩加以星緯屢見災祥雖脩短有恒能不耿介比心欲從俗啓解今職但厝辭為鄙或貽物誚所以息意緘嘿一委時運而可復加寵榮增其顛墜且儲傅之重實非恒選遂使太子見臣必束帶宫臣皆再拜二三之宜何以當此陛下同生十餘今唯臣而已友于之愛豈當獨臣鍾其隆遇别奉啓事仰祈恩照臣近亦侍言太子告意子良具因王儉申啓未知粗上聞未福慶方隆國祚永始若天假臣年得預人位唯當請降貂璫以飾微軀永侍天顔以惟畢世此臣之願也服之不衷猶為身災况寵爵乎殊榮厚恩必誓以命請上答曰事中恐不得從所陳宋氏以来州郡秩俸及供給多隨土所出無有定准嶷上表曰循革貴宜損益資用治在夙均政由一典伏尋郡縣長尉俸禄之制雖有定科而其餘資給復由風俗東北異源西南各緒習以為常因而弗變緩之則莫非通規澄之則靡不入罪殊非約法眀章先令後刑之謂也臣謂宜使所在各條公用公田秩石迎送舊典之外守宰相承有何供調尚書精加洗覈務令優衷事在可通隨宜開許損公侵民一皆止却眀立定格班下四方永為恒制從之嶷不參朝務而言事宻謀多見信納服闋加侍中二年詔曰漢之梁孝寵異列蕃晉之文獻秩殊恒序况乃地侔前准勲兼往式雖天倫有本而因事増情宜廣田邑用申恩禮増封為四千户宋元嘉世諸王入齋閤得白服帬帽見人主唯出大極四廂乃備朝服自比以來此事一斷上與嶷同生相友睦宫内曲宴許依元嘉嶷固辭不奉敕唯車駕幸第乃白服烏紗帽以侍宴焉啓自陳曰臣自還朝便省儀刀捉刀左右十餘亦省唯郊外逺行或復暫有入殿亦省服身今所牽仗二侠轂二白直共七八十人事無大小臣必欲上啓伏度聖心脫未委曲或有言其多少不附事實仰希即賜垂敕又啓揚州刺史舊有六白領合扇二白拂臣脱以為疑不審此當云何行園苑中乗轝出籬門外乗轝鳴角皆相仍如此非止於帶神州者未審此當云何方有行来不可失衷上答曰儀刀捉刀不應省也侠轂白直乃可共百四五十以還正是耳亦不曽聞人道此吾自不使諸王無仗况復汝耶在私園苑中乗此非疑郊外鳴角及合扇并拂先乃有不復施用此来甚久凡在鎮自異還亰師先廣州乃立鼓吹交部遂有輦事隨時而改亦復有可得依舊者汝若有疑可與王儉諸人量衷但令人臣之儀無失便行也又啓曰臣拙知自處闇於疑訪常見素姓扶詔或著布屩不意為異臣在西朝拜王儀飾悉依宋武陵事例有二鄣扇仍此下都脱不為疑小兒奴子並青布袴衫臣齋中亦有一人意謂外庶所服不疑與羊車相類曲荷慈㫖今悉改易臣昔在邊鎮不無羽衛自歸朝以来便相分遣侠轂白直格置三百許人臣頃所引不過一百常謂亰師諸王不煩牽仗若郊外逺行此所不論有仗者非臣一人所以不容方幅啓省又因王儉備宣下情臣出入榮顯禮容優泰第宇華曠事乖素約雖宋之遺製恩處有在猶深非服之慙威衛之請仰希曲照上答曰傳詔臺家人耳不足渉嫌鄣扇吾識及以来未見故有敕耳小児奴子本非嫌也吾有所聞豈容不敕汝知令致物議耶吾已有敕汝一人不省侠轂但牽之吾昨不通仗事儉已道吾即令答不煩有此啓湏間言自更一二又啓曰違逺侍宴將踰一紀憂苦間之始得開顔近頻侍座不勝悲喜沾飲過量實欲仰示恩狎令自下知見以杜游塵陛下留恩子弟此情何異外物政自彊生間節聲其厚薄伏度或未上簡臣前在東田承恩過醉實思歎往秋之謗故言啓至切亦令羣物聞之伏願已照此心前侍幸順之宅臣依常乗車至仗後監伺不能示臣可否便互競啓間云臣車逼突黄屋麾旄如欲相中推此用意亦何容易仰賴慈眀即賜垂敕不爾臣終不知闇貽此累比日禁斷整宻此自常理外聲乃云起臣在華林輒捉御刀因此更嚴度情推理必不容爾為復上啓知耳但風塵易至和㑹實難伏願猶憶臣石頭所啓無生閒縫比閑侍無次畧附茹亮口宣臣由来華素已具上簡每欲存衷意慮不周或有乖常且臣五十之年為翫㡬時為此亦復不能以理内自制北第舊邸本自甚華臣改脩正而已小小製置已自仰簡往嵗收合得少雜材并䝉賜故板啓榮内許作小眠齋始欲成就皆補接為辨無乖格製要是檉栢之華一時新淨東府又有齋亦為華屋而臣頓有二處住止下情竊所未安訊訪東宫𤣥圃乃有栢屋製甚古拙内中無此齋臣乃欲壊取以奉太子非但失之於前且補接既多不可見移亦恐外物或為異論不審可有垂許送東府齋理否臣公家住止率爾可安臣之今啓實無意識亦無言者太子亦不知臣有此屋政以東宫無而臣自處之體不宜爾爾所啓䝉允臣便當敢成弟屋安之不疑陛下若不照體臣心便當永廢不脩臣自謂今啓非但是自處宜然實為㣲臣往事伏願必垂降許伏見以諸王舉貨屢降嚴㫖少拙營生已應上簡府州郡邸舍非臣私有今巨細所資皆是公潤臣私累不少未知將来罷州之後或當不能不試學營覔以自贍連年惡疾餘顧影單囘無事畜聚唯逐手為樂耳上答曰茹亮今啓汝所懐及見别紙汝勞疾亦復那得不動何意為作煩長啓事凡諸普敕此意可尋當不闗汝一人也宜有敕事吾亦必道頃見汝自更委悉書不欲多及屋事慎勿彊厝此意白澤亦當不解何意爾三年文恵太子講孝經畢嶷求解太傅不許皇孫婚竟又陳解詔曰公惟徳惟行無所厝辭且魯且衛其誰與二方式範當時流聲史籍豈容屢秉撝謙以乖期寄嶷常慮盛滿又因宫宴求解揚州授竟陵王子良上終不許曰畢汝一世無所多言世祖即位後頻發詔拜陵不果行遣嶷拜陵還過延陵季子廟觀沸井有水牛突部伍直兵執牛推問不許取絹一疋横繫牛角放歸其家為治存寛厚故得朝野歡心四年唐㝢之賊起啓上曰此段小寇出於兇愚天網宏罩理不足論但聖眀御世幸可不爾比藉聲聽皆云有由而然豈得不仰啓所懐少陳心欵山海崇深臣獲保安樂公私情願於此可見齊有天下嵗月未久澤沾萬民其實未多百姓恃險懐惡者衆陛下曲垂流愛每存優㫖但頃小大士庶毎以小利奉公不顧所損者大撻籍檢工巧督䘏簡小塘蔵丁匿口凡諸條制實長怨府此目前交利非天下大計一室之中尚不可精㝢宙之内何可周視公家何嘗不知民多欺巧古今政以不可細碎故不為此實非乖理但識理者百不有一陛下弟児大臣猶不皆能伏理况復天下悠悠萬品怨積聚黨兇迷相類止於一處何足不除脱復多所便成紜紜久欲上啓閑侍無因謹陳愚管伏願特留神思上答曰欺巧那可容宋世混亂以為是不蚊蟻何足為憂已為義勇所破官軍昨至今都應散滅吾政恨其不辨大耳亦何時無亡命邪後乃詔聽復籍注五年進位大司馬八年給皁輪車尋加中書監固讓嶷身長七尺八寸善持容範文物衛從禮冠百僚每出入殿省皆瞻望嚴肅自以地位隆重深懐退素北宅舊有園田之美乃盛脩理之七年啓求還第上令世子子㢘代鎮東府上數幸嶷第宋長寧陵􅎬道出第前路上曰我便是入他冢墓内尋人乃徙其表闕騏驎於東崗上騏驎及闕形勢甚巧宋孝武於襄陽致之後諸帝王陵皆模範而莫及也永眀末車駕數游幸唯嶷陪從上出新林苑同輦夜歸至宫門嶷下輦辭出上曰今夜行無使為尉司所呵也嶷對曰亰輦之内皆屬臣州願陛下不垂過慮上大笑上謀北伐以虜所獻氈車賜嶷每幸第清除不復屏人上敕外監曰我往大司馬第是還家耳嶷妃庾氏常有疾瘳上幸後堂設金石樂宫人畢至每臨幸輒極日盡歡嶷謂上曰古来言願陛下夀偕南山或稱萬嵗此殆近貎言如臣所懐實願陛下極夀百年亦足矣上曰百年復何可得止得東西一百於事亦濟十年上封嶷諸子舊例千户嶷欲五子俱封啓減人五百户其年疾篤表解職不許賜錢百萬營功徳嶷又啓曰臣自嬰今患亟降天臨醫走術官泉開蔵府慈寵優渥備極人臣生年疾廹遽隂無㡬願陛下審賢與善極夀蒼昊彊徳納和為億兆御臣命違昌數奄奪恩憐長辭眀世伏涕嗚咽薨年四十九其日上再視疾至薨乃還宫詔曰嶷眀哲至親勲髙業始徳懋王朝道光區縣奄至薨逝痛酷抽割不能自勝奈何奈何今便臨哭九命之禮宜備其制斂以袞冕之服温眀祕器命服一具衣一襲喪事一依漢東平王故事大鴻臚持節䕶喪事大官朝夕送奠大司馬太傅二府文武悉停過葬竟陵王子良啓上曰臣聞春秋所以稱王母弟者以尊其所重故也是以禮秩殊品爵命崇異在漢則梁王備出警入蹕之儀在晉則齊王具殊服九命之贈江左以來尊親是闕故致袞章之典廢而不傳實由人缺其位非禮虧省齊王故事與今不殊締構王業功迹不異凡有變革隨時之宜者政緣恩情有輕重徳義有厚薄若事籌前規禮無異則且梁齊闕令終之美猶饗襃贈之榮况故大司馬仁和著於天性孝悌終於立身節義表於勤王寛猛彰於御物奉上無艱劬之貎接下無毁傷之容淡矣止於清貞無喜愠之色悠然棲於静黙絶馳競之聲詩云靡不有初鮮克有終夫終之者理實為難在於令行無廢斯徳東平樂於小善河間悦於詩書勲績無聞艱危不渉尚致卓爾不羣英聲萬代况今協贊皇基經綸霸始功業髙顯清譽逾彰富貴隆重㢘潔彌峻等古形今孰類兹美臣愚忖度未有斯例凡庶族同氣愛睦尚少豈有仰覩陛下垂友于之性若此者乎共起布衣俱登天貴生平遊處何事不同分甘均味何珍不等未嘗覩貎而天心不懽見形而聖儀不悦爰及臨危捨命親瞻喘息萬分之際没在聖目號哭動乎天地感慟驚乎鬼神乃至撤膳移寢坐泣遷旦神儀損耗隔宿改容奉瞻聖顔誰不悲悚厯古所未聞記籍所不載既有若斯之大徳實不可見典服之贈不彰如其脱致虧忘追改為煩不令千載之下物有遺恨其徳不具美者尚荷嘉隆之命况事光先烈者寧可缺兹盛典臣恐有識之人容致其議且庶族近代桓温庾亮之類亦降殊命伏度天心已當有在又詔曰寵章所以表徳禮秩所以紀功慎終追逺前王之盛䇿累行疇庸列代之通誥故使持節都督揚南徐二州諸軍事大司馬領太子太傅揚州刺史新除中書監豫章王嶷體道秉哲經仁緯義挺清譽於弱齡發韶風於早日締綸霸業之初翼讚皇基之始孝睦著於鄉閭忠諒彰乎邦邑及秉徳論道總牧神甸七教必荷六府咸理振風潤雨無諐於時候䘏民拯物有篤於矜懐雍容廊廟之華儀刑列郡之觀神凝自逺具瞻允集朕友于之深情兼家國方授以神圖委諸廟勝緝頌九紘陪禪五岳天不愸遺奄焉薨逝哀痛傷惜震慟乎厥心今先逺戒期龜謀襲吉宜加茂典以協徽猷可贈假黄鉞都督中外諸軍事丞相揚州牧綠綟綬具九服錫命之禮侍中大司馬太傅王如故給九旒鸞輅黄屋左纛虎賁班劍百人輼輬車前後部羽葆鼓吹𦵏送儀依東平王故事嶷臨終召子子㢘子恪曰人生在世本自非常吾年已老前路幾何居今之地非心期所及性不貪聚自㓜所懐政以汝兄弟累多損吾暮志耳無吾後當共相勉厲篤睦為先才有優劣位有通塞運有富貧此自然理無足以相陵侮若天道有靈汝等各自脩立灼然之分無失也勤學行守基業治閨庭尚閑素如此足無憂患聖主儲皇及諸親賢亦當不以吾没易情也三日施靈唯香火槃水盂飯酒脯檳榔而已朔望菜食一盤加以甘菓此外悉省𦵏後除靈可施吾常所乗轝扇繖朔望時節席地香火槃水酒脯盂飯檳榔便足雖才愧古人意懐粗亦有在不以遺財為累主衣所餘小弟未婚諸妹未嫁凡應此用本自茫然當稱力及時率有為辦事事甚多不復甲乙棺器及墓中勿用餘物為後患也朝服之外惟下鐵鐶刀一口作冢勿令深一一依格莫過度也後堂樓可安佛供養外國二僧餘皆如舊與汝遊戲後堂船乗吾所乗牛馬送二宫及司徒服飾衣裘悉為功徳子㢘等號泣奉行世祖哀痛特至至冬乃舉樂宴朝臣上歔欷流涕諸王邸不得起樓臨瞰宫掖上後登景陽望見樓悲感乃敕毁之薨後第庫無見錢世祖敕貨雜物服飾得數百萬起集善寺月給第見錢百萬至上崩乃省嶷性汎愛不樂聞人過失左右有投書相告置鞾中竟不視取火焚之齋庫失火燒荆州還資評直三千餘萬主局各杖數十而已羣吏中南陽樂藹彭城劉繪吳郡張稷最被親禮藹與竟陵王子良牋曰道徳以可久傳聲風流以浸逺隳稱雖復青簡締芳未若玉石之不朽飛翰圖藻豈伊雕篆之無沬丞相沖粹表於天真淵照殆乎機象經邦緯民之範體國成務之規故以業茂惟賢功髙則哲神輝𦕈邈叡算不追感纒奉車恨百留滯下官夙禀名節恩義軫慕望􅎬結哀輙欲率荆江湘三州僚吏建碑壟首庶徽猷有述茂則方存昔子香淳徳留銘江介鉅平遺烈墮淚漢南况道尊前往惠積聨綿者哉下官今便反假無由躬事刋斵湏至西州鳩集所資託中書侍郎劉繪營辦藹又與右率沈約書曰夫道宣餘烈竹帛有時先朽徳孚遺事金石更非後亡丞相獨秀生民傍照日月標勝丘園素履穆於忠義譽應華衮功迹著於弼諧無得而稱理絶照載若夫日用閴寂雖無取於錙銖嵗功宏達諒有寄於衡石竊承貴州士民或建碑表俾我荆南閲感無地且作紀江漢道基分陕衣冠禮樂咸被後昆若其望碑盡禮我州之舊俗傾壥罷肆鄙土之遺風庶㡬𢎞烈或不泯墜荆江湘三州䇿名不少並欲各率毫釐少申景慕斯文之託歴選惟疑必待文蔚辭宗徳僉茂履非髙眀而誰豈能騁無愧之辭詶式瞻之望吾西州窮士一介寂寥恩周榮譽澤遍衣食永惟道廕日月就逺緬尋遺烈觸目崩心常謂福齊南山慶鍾仁夀吾儕小人貽塵帷盖豈圖一旦遂投此請約荅曰丞相風道𢎞曠獨秀生民凝猷盛烈方軌伊旦愸遺之感朝野同悲承當刋石紀功傳華千載宜湏盛述實允来談郭有道漢末之匹夫非蔡伯喈不足以偶三絶謝安石素族之台輔時無麗藻迄乃有碑無文况文獻王冠冕彛倫儀形㝢内自非一世辭宗難或與此約閭閈鄙人名不入第歘酬今㫖便是以禮許人聞命慙顔已不覺汗之沾背也建武中第二子子恪託約及太子詹事孔稚珪為文子㢘字景藹初嶷養魚復侯子響為世子子㢘封永新侯千户子響還本子㢘為世子除寧朔將軍淮陵太守太子中書舍人前軍將軍善撫諸弟子十一年卒贈侍中諡哀世子第三子子操泉陵侯王侯出身官無定准素姓三公長子一人為員外郎建武中子操解褐為給事中自此齊末皆以為例永泰元年南康侯子恪為呉郡太守避王敬則難奔歸以子操為寧逺將軍吳郡太守永元中為黄門郎義師圍城子操與弟宜陽侯子光卒於尚書都座第四子子行洮陽侯早卒子元琳嗣今上受禪詔曰褒隆往代義炳彛則朕當此樂推思𢎞前典豫章王元琳故巴陵王昭秀胄子同齊氏宗國髙武嫡𦙍宜祚井邑以傳世祀降新淦縣侯五百户史臣曰楚元王髙祖亞弟無功漢世東平憲王辭位永平未及光武之業梁孝惑於勝詭安平心隔晉運蕃輔貴盛地實髙危持滿戒盈鮮能全徳豫章宰相之器誠有天真因心無矯率由遠度故能光贊二祖内和九族實同周氏之初周公以来則未知所匹也贊曰堂堂烈考徳邁前蹤移忠以孝植友惟恭帝載初造我王奮庸邦家有闕我王彌縫道深日用事緝民雍愛傳餘祀聲流景鍾南齊書卷二十二
