body:
  text: 南齊書卷二本紀第二高帝下建元元年夏四月甲午上即皇帝位於南郊設壇柴燎告天曰皇帝臣道成敢用玄牡昭告皇皇后帝宋帝陟鑒乾序欽若明命以命于道成夫肇自生民樹以司牧所以闡極則天開元創物肆茲大道天下惟公命不于常昔在虞夏受終上代粵自漢魏揖讓中葉咸炳諸典謨載在方册水德既微仍世多故實賴道成匡拯之功以弘濟于厥艱大造顛墜再構區宇宣禮明刑締仁緝義晷緯凝象川嶽表靈誕惟天人罔弗和會乃仰協歸運景屬與能用集大命于茲辭德匪嗣至于纍仍而羣公卿士庶尹御事爰及黎獻至于百戎僉曰皇天眷命不可以固違人神無託不可以曠主畏天之威敢不祗從鴻曆敬簡元辰虔奉皇符升壇受禪告類上帝以永答民衷式敷萬國惟明靈是饗禮畢大駕還宮臨太極前殿詔曰五德更紹帝迹所以代昌三正迭隆王度所以改耀世有質文時或因革其資元膺曆經道振民固以異術同揆殊流共貫者矣朕以寡昧屬值艱季推肆勤之誠藉樂治之數賢能悉心士民致力用獲拯溺龕暴一匡天下業未參古功殆侔昔宋氏以陵夷有徵曆數攸及思弘樂推永鑒崇替爰集天祿于朕躬惟志菲薄辭弗獲昭遂欽從天人式繇景命祗月正于文祖升禋鬯于上帝猥以寡德光宅四海纂革代之蹤託王公之上若涉淵水罔知所濟寶祚初啓洪慶惟新思俾利澤宣被億兆可大赦天下改升明三年為建元元年賜民爵二級文武進位二等魚衆寡孤獨不能自存者穀人五斛逋租宿債勿復收有犯鄉論清議贓汙淫盜一皆蕩滌洗除先注與之更始長徒敕繫之囚特皆原遣亡官失爵禁錮奪勞一依舊典封宋帝為汝陰王築宮丹陽縣故治行宋正朔車旗服色一如故事上書不為表答表不稱詔降宋晉熙王燮為陰安公江夏王躋為沙陽公隨王翽為舞陰公新興王嵩為定襄公建安王禧為荔浦公郡公主為縣君縣公主為鄉君詔曰繼世象賢列代盛典疇庸嗣美前載令圖宋氏通侯乃宜隨運省替但欽德懷義尚表墳閭況功濟區夏道光民俗者哉降差之典宜遵往制南康縣公華容縣公可為侯萍鄉縣侯可為伯減戶有差以繼劉穆之王弘何無忌後以司空褚淵為司徒吳郡太守柳世隆為南豫州刺史詔曰宸運肇創寶命惟新宜弘慶宥廣敷蠲汰劫賊餘口沒在臺府者悉原放諸負釁流徙普聽還本以齊國左衛將軍陳顯達為中護軍中領軍王敬則為南六允州刺史左衛將軍李安民為中領軍戊戌以荊州刺史嶷為尚書令驃騎大將軍開府儀同三司揚州刺史冠軍將軍映為荊州刺史西中郎將晃為南徐州刺史冠軍將軍垣崇祖為豫州刺史驃騎司馬崔文仲為徐州刺史斷四方上慶禮己亥詔曰自廬井毀制農桑易業鹽鐵妨民貨鬻傷治歷代成俗流蠹歲滋援拯遺弊革末反本使公不專利氓無失業二宮諸王悉不得營立屯邸封略山湖太官池宮停稅入優量省置庚子詔宋帝后蕃王諸陵宜有守衛有司奏帝陵各置長一人兵有差王陵五人妃嬪三人五月丙午進河南王吐谷渾拾寅號驃騎大將軍詔曰宸運革命引爵改封宋氏第秩雖宜省替其有預效屯夷宣力齊業者一仍本封無所減降有司奏留襄陽郡公張敬兒等六十二人除廣興郡公沈曇亮等百二十二人改元嘉曆為建元曆木德盛卯終未以正月卯祖十二月未臘辛丁未詔曰設募取將懸賞購士蓋出權宜非曰恆制頃世艱險浸以成俗且長逋逸開罪山湖是為黥刑不辱亡竄無咎自今以後可斷衆募壬子詔封佐命文武功臣新除司徒褚淵等三十一人進爵增戶各有差己乙卯河南王吐谷渾拾寅奉表貢獻丙辰詔遣大使分行四方遣兼散騎常侍十二人巡行以交寧道遠不遣使己未汝陰王薨追諡為宋順帝終禮依魏元晉恭帝故事辛酉陰安公劉燮等伏誅追封諡上兄道度為衡陽元王道生為始安貞王丙寅追尊皇考曰宣皇帝皇妣為孝皇后妃為昭皇后六月辛未詔相國驃騎中軍三府職可依資勞度二宮官若職限已盈所餘可賜滿壬申以遊擊將軍周山圖為六允州刺史乙亥詔曰宋末頻年戎寇兼災疾凋損或枯骸不收毀櫬莫掩宜速宣下埋藏營若標題猶存姓字可識可即運載致還本鄉有司奏遣外監典事四人周行離門外三十五里為限其餘班下州郡無棺器標題者屬所以臺錢供市庚辰七廟主備法駕即于太廟詔諸將及客戮力艱難盡勤直衛其從還宮者普賜位一階辛巳罷荊州刺史甲申立皇太子賾斷諸州郡禮慶見刑入重者降一等并申前赦恩百日立皇子嶷為豫章王映為臨川王晃為長沙王蟲念為武陵王皓為安成王鏘為鄱陽王鑠為桂陽王鑑為廣陵王皇孫長懋為南郡王乙酉葬宋順帝于遂寧陵秋七月丁未詔曰交址比景獨隔書朔斯乃前運方季負海不朝因迷遂往歸款莫由曲赦交州部內李叔獻一人即撫南土文武詳才選用并遣大使宣揚朝恩以試守武平太守行交州府事李叔獻為交州刺史丙辰以虜偽茄蘆鎮主陰平公楊廣香為沙州刺史丁巳詔南蘭陵桑梓本鄉長蠲租布武進王業所基復十年九月辛丑詔二吳義興三郡遭水減今年田租乙巳以新除尚書令驃騎將軍豫章王嶷為荊湘二州刺史平西將軍臨川王映為揚州刺史丙午司空褚淵領尚書令戊申車駕幸宣武堂宴會詔諸王公以下賦詩冬十月丙子立彭城劉胤為汝陰王奉宋帝後己卯車駕殷祠太廟辛巳詔曰朕嬰綴世務三十餘歲險阻艱難備嘗之矣末路屯夷戎車歲駕誠藉時來之運實資士民之力宋元徽二年以來諸從軍得官者未悉蒙祿可催速下訪隨正即給才堪餘任者訪洗量序若四州士庶本鄉淪陷簿籍不存尋校無所可聽州郡保押從實除奏荒遠闕中正者特許據軍簿奏除或戍扞邊役末由旋反聽於同軍各立五保所隸有司時為言列汝陰太妃王氏薨追贈為宋恭皇后十一月庚子以太子左衛率蕭景先為司州刺史辛亥立皇太子妃裴氏甲申封功臣驃騎長史江謐等十人爵戶各有差二年春正月戊戌朔大赦天下以司空尚書令褚淵為司徒中軍將軍張敬兒為車騎將軍中領軍李安民為領軍將軍中護軍陳顯達為護軍將軍辛丑車駕親祠南郊癸卯詔索虜寇淮泗遣衆軍北伐內外纂嚴二月丁卯虜寇壽陽豫州刺史垣崇祖破走之置巴州壬申以三巴校尉明慧昭為巴州刺史戊子以寧蠻校尉蕭赤斧為雍州刺史南蠻長史崔惠景為梁南秦二州刺史辛卯詔西境獻捷解嚴癸巳遣大使巡慰淮肥徐豫邊民尤貧遘難者刺史二千石量加賑甲午詔江西北民避難流徙者制遣還本蠲今年租稅單貧及孤老不能自存者即聽番籍郡縣押領三月丁酉以侍中西昌侯鸞為郢州刺史戊戌以護軍將軍陳顯達為南六允州刺史吳郡太守張岱為中護軍己亥車駕幸樂遊苑宴會王公以下賦詩辛丑以征虜將軍崔思祖思為青冀二州刺史夏四月丙寅進高麗王樂浪公高璉號驃騎大將軍五月立六門都牆六月癸未詔昔歲水旱曲赦丹陽二吳義興四郡遭水尤劇之縣元年以前三調未充虛列已畢官長局吏應共償備外詳所除宥秋七月甲寅以輔國將軍盧紹之為青冀二州刺史戊午皇太子妃裴氏薨閏月辛巳遣領軍將軍李安民行淮泗庚寅索虜攻朐山青冀二州刺史盧紹之等破走之冬十一月戊子以氐楊後起為秦州刺史十二月戊戌以司空褚淵為司徒乙巳車駕幸中堂聽訟壬子以驃騎大將軍豫章王嶷為司空揚州刺史前將軍臨川王映為荊州刺史三年春正月壬戌朔詔王公卿士薦讜言丙子以平北將軍陳顯達為益州刺史貞陽公柳世隆為南六允州刺史皇子鋒為江夏王領軍將軍李安民等破虜於淮陽夏四月以寧朔將軍沈景德為廣州刺史六月壬子大赦逋租宿債除減有差秋七月以冠軍將軍徐垣榮祖為徐州刺史冬十月戊子以河南王世子吐谷渾度易侯為西秦河二州刺史河南王四年春正月壬戌詔曰夫膠庠之典彝倫攸先所以招振才端啓發性緒弘字黎氓納之軌義是故五禮之迹可傳六樂之容不泯朕自膺曆受圖志闡經訓且有司羣僚奏議咸集蓋以戎車時警文教未宣思樂泮宮永言多慨今關燧無虞時和歲稔遠邇同風華夷慕義便可式遵前準修建學精選儒官廣延國胄以江州刺史王延之為右光祿大夫癸亥詔曰比歲申威西北義勇爭先殞氣寇場命盡王事戰亡蠲復雖有恆典主者遵用每傷簡薄建元以來戰亡賞蠲租布二十年雜役十年其不得收尸主軍保押亦同此例以後將軍長沙王晃為護軍將軍中軍將軍南郡王長懋為南徐州刺史冠軍將軍安成王皓為江州刺史二月乙未以冠軍將軍桓康為青冀二州刺史上不豫庚辰詔原京師囚繫有差元年以前逋責皆原除三月庚申召司徒褚淵左僕射王儉詔曰吾本布衣素族念不到此因藉時來遂隆大業風道沾被升平可期遘疾彌留至于大漸公等奉太子如事吾柔遠能邇緝和內外當令太子敦穆親戚委任賢才崇尚節儉弘宣簡惠則天下之理盡矣死生有命夫復何言壬戌上崩于臨光殿年五十六四月庚寅上諡曰太祖高皇帝奉梓宮於東府前渚升龍舟丙午窆武進泰安陵上少沈深有大量寬嚴清儉喜怒無色博涉經史善屬文工草隸書奕第二品雖經綸夷險不廢素業從諫察謀以威重得衆即位後身不御精細之物敕中書舍人桓景真曰主衣中似有玉介導此制始自大明末後泰始尤增其麗留此置主衣政是興長疾源可即時打碎凡復有可異物皆宜隨例也後宮器物欄檻以銅為飾者皆改用鐵內殿施黃紗帳宮人著紫皮履華蓋除金花爪用鐵回釘每曰使我治天下十年當使黃金與土同價欲以身率天下移變風俗上姓名骨體及期運曆數並遠應圖讖數十百條歷代所未有臣下撰録上抑而不宣盛矣史臣曰孫卿有言聖人之有天下受之也非取之也漢高神武駿聖觀秦氏東遊蓋是雅多大言非始自知天命光武聞少公之論讖亦特一時之笑語魏武初起義兵所期征西之墓晉宣不內迫曹爽豈有定霸浮橋宋氏屈起匹夫兵由義立咸皆一世推雄卒開鼎祚宋氏正位八君卜年五紀四絶長嫡三稱中興內難邊虞兵革世動太祖基命之初武功潛用泰始開運大拯時艱龍德在田見猜雲雨之迹及蒼梧暴虐釁結朝野百姓懍懍命懸朝夕權道既行兼濟天下元功振主利器難以假人羣才勠力實懷尺寸之望豈其天厭水行固已人希木德歸功與能事極乎此雖至公於四海而運實時來無心於黃屋而道隨物變應而不為此皇齊所以集大命也贊曰於皇太祖有命自天同度宇宙合量山淵宋德不紹神器虛傳寧亂以武黜暴資賢庸發西疆功興北翰偏師獨克孤旅霆斷援旆東夏職司靜亂指斧徐方時惟伐叛抗威京輦坐清江漢文藝在躬芳塵淵塞用下以才鎮民以德端己雄睟君臨尊默苞括四海大造家國
