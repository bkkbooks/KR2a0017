body:
  text: 南齊書卷八本紀第八和帝和帝諱寶融字智昭高宗第八子也建武元年封隨郡王邑二千戶三年為冠軍將軍領石頭戍軍事永元元年改封南康王為持節督荊雍益寧梁南北秦七州軍事西中郎將荊州刺史二年十一月甲寅長史蕭穎胄殺輔國將軍巴西梓潼二郡太守劉山陽奉梁王舉義乙卯教纂嚴又教曰吾躬率晉陽翦此凶孽戎事方勤宜覃澤惠所領內繫囚見徒罪無輕重殊死已下皆原遣先有位署即復本職將吏轉一階從征身有家口停鎮給廩食凡諸雜役見在諸軍帶甲之身克定之後悉免為民其功效賞報別有科條丙辰以雍州刺史梁王為使持節都督前鋒諸軍事左將軍丁巳以蕭穎胄為右將軍都督行留諸軍事戊午梁王上表勸進十二月乙亥羣僚勸進並不許壬辰驍騎將軍夏侯亶自京師至江陵稱宣德太后令西中郎將南康王宜纂承皇祚光臨億兆方俟清宮未即大號可且封宣城南琅邪南東海東陽臨海新安尋陽南郡竟陵宜都十郡為宣城王相國荊州牧加黃鉞置僚屬選百官西中郎府南康國並如故須軍次近路主者詳依舊典法駕奉迎三年正月乙巳王受命大赦唯梅蟲兒茹法珍等不在赦例右將軍蕭穎胄為左長史進號鎮軍將軍梁王進號征東將軍甲戌以冠軍將軍楊公則為湘州刺史甲寅建牙于城南二月乙丑以冠軍長史王茂先為江州刺史冠軍將軍曹景宗為郢州刺史右將軍邵陵王寶攸為荊州刺史己巳羣僚上尊號立宗廟及南北郊甲申梁王率大衆屯沔口郢州刺史張沖拒守三月丁酉張沖死驃騎將軍薛元嗣等固城中興元年春三月乙巳即皇帝位大赦改元文武賜位二等魚衆寡孤獨不能自存者穀人五斛即永元三年也以相國左長史蕭穎胄為尚書令晉安王寶義為司空廬陵王寶源為車騎將軍開府儀同三司建安王寶寅為徐州刺史散騎常侍夏侯詳為中領軍領軍將軍蕭偉為雍州刺史丙午有司奏封庶人寶卷為零陽侯詔不許又奏為涪陵王詔可乙酉尚書令蕭穎胄行荊州刺史假梁王黃鉞壬子以征虜將軍柳惔為益寧二州刺史己未以冠軍將軍莊丘黑為梁南秦二州刺史冠軍將軍鄧元起為廣州刺史夏四月戊辰詔曰荊雍義舉所基實始王迹君子勞心細人盡力宜加酬奬副其乃誠凡東討衆軍及諸嚮義之衆可普復除五月乙卯車駕幸竹林寺禪房宴羣臣巴西太守魯休烈巴東太守蕭惠訓子璝拒義軍秋七月東軍主吳子陽十三軍救郢州屯加湖丁酉征虜將軍王茂先擊破之辛亥以茂先為中護軍丁卯魯山城主孫樂祖以城降己未郢城主薛元嗣降八月丙子平西將軍陳伯之降乙卯以伯之為江州刺史子虎牙為徐州刺史九月乙未詔梁王若定京邑得以便宜從事冬十一月乙未以輔國將軍李元履為豫州刺史壬寅尚書令鎮軍將軍蕭穎胄卒以黃門郎蕭淡行荊州府州事丁巳蕭璝魯休烈降十二月丙寅建康城平己巳皇太后令以梁王為大司馬録尚書事驃騎大將軍揚州刺史封建安郡公依晉武陵王遵承制故事百僚致敬壬申改封建安王寶寅鄱陽王癸酉以司徒揚州刺史晉安王寶義為太尉領司徒甲戌給大司馬錢二千萬布絹各五千匹乙酉以輔國將軍蕭宏為中護軍二年春正月戊戌宣德太后臨朝入居內殿大司馬梁王解承制致敬如先己亥以寧朔將軍蕭昺監南六允州壬寅以大司馬都督中外諸軍事加殊禮己酉以大司馬長史王亮為守尚書令甲寅詔大司馬梁王進位相國總百揆揚州牧封十郡為梁公備九錫之禮加遠遊冠位在諸王上加相國緑綟綬己未以新除右將軍曹景宗為郢州刺史二月壬戌湘東王寶晊伏誅戊辰詔進梁公爵為梁王增封十郡三月乙未皇太后令給梁國錢五百萬布五千匹絹千匹辛丑鄱陽王寶寅奔虜邵陵王寶攸晉熙王寶嵩桂陽王寶貞伏誅甲午命梁王冕十有二旒建天子旌旗出警入蹕乘金根駕六馬備五時副車置旄頭雲罕樂舞八佾設鍾簴宮懸王子王女爵命一如舊儀庚戌以冠軍長史蕭秀為南徐州刺史新除中領軍蔡道恭為司州刺史車駕東歸至姑熟丙辰禪位梁王丁巳廬陵王寶源薨夏四月辛酉禪詔至皇太后遜外宮丁卯梁王奉帝為巴陵王宮于姑熟行齊正朔一如故事戊辰薨年十五追尊為齊和帝葬恭安陵史臣曰夏以桀亡殷隨紂滅郊天改朔理無延世而皇符所集重興西楚神器暫來雖有冥數徽名大號斯為幸矣贊曰和帝晚隆掃難清宮達機覩運高頌永終
