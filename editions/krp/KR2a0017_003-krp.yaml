罪遣丹陽尹蕭順之率軍討之子響伏誅冬十月丁丑詔呉興水淹過度開所在倉賑賜癸巳原建元以前逋租十一月乙夘以建武将軍伏登之為交州刺史十二月乙丑以振威将軍陳僧授為越州刺史戊寅詔尚書丞郎職事繁劇䘏俸未優可量增賜禄己夘皇子子建為湘東王癸巳以監青冀二州軍行刺史事張沖為青冀二州刺史九年春正月甲午以侍中江夏王鋒為南徐州刺史冠軍将軍劉悛為益州刺史辛丑車駕祀南郊詔京師見囚繋詳量原遣三月乙夘以南中郎司馬劉楷為司州刺史辛丑以太子左衛率劉纉為廣州刺史夏四月乙亥有司奏舊格一年两過行陵三月十五日曺郎以下小行九月十五日司空以下大行今長停小行惟二州一大行詔曰可六月甲戌以尚書左僕射王奐為雍州刺史秋九月戊辰車駕幸琅邪城講武觀者傾都普頒酒肉十年春正月戊午詔諸責負衆逋七年以前悉原除髙貲不在例孤老六疾人穀五斛内外有務衆官増禄俸以左民尚書南平王鋭為湘州刺史司徒竟陵王子良領尚書令右衛将軍王𤣥邈為北徐州刺史中軍将軍廬陵王子卿進號車騎将軍北中郎将南海王子罕為兖州刺史輔國将軍臨汝公昭文為南豫州刺史冠軍将軍王文和為北兖州刺史二月壬寅鎮軍将軍陳顯達領中領軍夏四月辛丑大司馬豫章王嶷薨五月己巳司徒竟陵王子良為揚州刺史秋八月丙申以新城太守郭安眀為寧州刺史冬十月乙丑車駕幸𤣥武湖講武甲午車駕殷祀太廟十一月戊午詔曰頃者霖雨樵糧稍貴京邑居民多離其弊遣中書舎人二縣官長賑賜十一年春正月癸丑詔京師見繋囚詳所原遣以驃騎大将軍王敬則為司空江州刺史鄱陽王鏘為領軍将軍鎮軍大将軍陳顯達為江州刺史右衛将軍崔慧景為豫州刺史丙子皇太子長懋薨二月壬午以車騎将軍廬陵王子卿為驃騎将軍南豫州刺史撫軍将軍安陸王子敬進號車騎将軍己丑輔國将軍曺虎為梁南秦二州刺史癸夘以新除中書監晉安王子懋為雍州刺史丙午以冠軍将軍王文和為益州刺史三月乙亥雍州刺史王奐伏誅夏四月壬午詔東宫文武臣僚可悉度為太孫官屬甲午立皇太孫昭業太孫妃何氏詔賜天下為父後者爵一級孝子順孫義夫節婦粟帛各有差癸夘以驍騎将軍劉靈哲為兖州刺史五月戊辰詔曰水旱成災榖稼傷弊凡三調衆逋可同申至秋登京師二縣朱方姑熟可權斷酒庚午以輔國将軍蕭恵休為徐州刺史丙子以左民尚書宜都王鏗為南豫州刺史六月壬午詔霖雨既過遣中書舎人二縣官長賑賜京邑居民秋七月丁巳詔曰頃風水為灾二岸居民多離其患加以貧病六疾孤老稚弱彌足矜念遣中書舎人履行沾䘏又詔曰水旱為災實傷農稼江淮之間倉廪既虚遂草竊充斥互相侵奪依阻山湖成此逋逃曲赦南兖兖豫司徐五州南豫州之歴陽譙臨江廬江四郡三調衆逋宿債竝同原除其縁淮及青冀新附僑民復除已訖更申五年是月上不豫徙御延昌殿乗輿始登階而殿屋鳴咤上惡之虜侵邉戊辰遣江州刺史陳顯達鎮雍州樊城上慮朝野憂惶乃力疾召樂府奏正聲伎戊寅大漸詔曰始終大期賢聖不免吾行年六十亦復何恨但皇業艱難萬㡬事重不能無遺慮耳太孫進徳日茂社稷有寄子良善相毗輔思𢎞治道内外衆事無大小悉與鸞𠫭懐共下意尚書是職務根本悉委王晏徐孝嗣軍旅捍邉之略委王敬則陳顯達王廣之王𤣥邈沈文季張瓌薛淵䓁百辟庶僚各奉爾職謹事太孫勿有懈怠知復何言又詔曰我識滅之後身上著夏衣畫天衣純烏犀導應諸器服悉不得用寳物及織成等惟装複裌衣各一通常所服身刀長短二口鐵環者随我入梓宫祭敬之典夲在因心東隣殺牛不如西家禴祭我靈上慎勿以牲為祭惟設餅茶飲干飯酒脯而已天下貴賤咸同此制未山陵前朔望設菜食陵墓萬世所宅意常恨休安陵未稱今可用東三䖏地最東邉以葬我名為景安陵喪禮每存省約不須煩民百官停六時入臨朔望祖日可依舊諸主六宫竝不須従山陵内殿鳳華夀昌耀靈三䖏是吾所改制夫貴有天下富兼四海宴處寢息不容乃陋謂此為奢儉之中慎勿壊去顯陽殿王像諸佛及供養具如别牒可盡心禮拜供養之應有功徳事可專在中自今公私皆不得出家為道及起立塔寺以宅為精舍竝嚴斷之惟年六十必有道心聽朝賢選序已有别詔諸小小賜乞及閣内處分亦有别牒内外禁衛勞舊主帥左右悉付蕭諶優量驅使之勿負吾遺意也是日上崩年五十四上剛毅有斷為治總大體以富國為先頗不喜逰宴雕綺之事言常恨之未能頓遣臨崩又詔凡諸逰費宜従休息自今逺近薦獻務存節儉不得出界營求相髙奢麗金粟繒纊弊民已多珠玉玩好傷工尤重嚴加禁絶不得有違准繩九月丙寅葬景安陵史臣曰世祖南面嗣業功參寳命雖為繼體事實艱難御衮垂旒深存政典文武授任不革舊章眀罰厚恩皆由上出義兼長逺莫不蕭然外表無塵内朝多豫機事平理職貢有恒府蔵内充民鮮勞役宫室苑囿未足以傷財安樂延年衆庶所同幸若夫割愛懐抱同彼甸人太祖羣昭位後諸穆昔漢武留情晚悟追恨戾園魏文侯克中山不以封弟英賢心迹臣所未詳也賛曰武帝丕顯徽號止戈韶嶺歇祲彭𣲖澄波威承景厯肅御金科北懐戎款南獻夷歌市朝晏逸中外寧和南齊書卷三南齊書卷三考證武帝夲紀生獲肅之斬首百餘級遂率部曲百餘人舉義兵臣祖庚按宋書鄧琬傳云世子與南康相沈用之等據郡起義宋略亦云沈肅之以郡招起義据此則帝與肅之同起義矣與紀互異又按通鑑考異曰賾始自獄中刼出琬所署南康相不容便與之同則宋書誤也三年八月丁巳以行宕昌王梁彌頡為河涼二州刺史臣祖庚按魏書三年七月魏遣使拜宕昌王梁彌機兄子彌承為宕昌王與此互異六年十月初臨太極殿讀時令臣宗萬按漢儀太史每嵗上其年厯先立春立夏大暑立秋立冬常讀五時令皇帝所服各随五時之色帝升御座尚書令以下就席位尚書三公郎以令署按上奏以入就席伏讀訖賜酒一巵据此武帝是舉盖遵古制前此未行故曰初臨也南齊書卷三考證
