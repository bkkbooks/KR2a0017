  - {type: variant, offset: 4946, length: 0, content: '', WYG: 南齊書卷三十三南齊書卷三十三考證王僧䖍傳僧䖍年數嵗採蠟燭珠為鳳凰南史云僧䖍累十二博棊既不墜落亦不重作僧綽採蠟燭珠為鳳凰與此不同又上羊欣所撰能書人名一卷臣宗萬按欣所撰能書人名史以文繁不載兹附記其畧以便省覽李斯趙髙善大篆程邈善隸書曹喜蔡邕陳道善篆隸王次仲作八分楷法師宜官能為大字方一丈小字方寸千言梁鵠得師宜官法邯鄲淳得次仲法毛𢎞鵠弟子秘書八分左子邑與淳小異杜度始有草名崔瑗善草書瑗子實亦能草書張芝善草書芝弟昶亦能草姜詡梁宣田彦和韋誕皆芝弟子並書草誕最優亦善楷誕子少季亦有能稱羅暉趙礱與伯英同時見稱張超亦善草劉徳升善為行書鍾繇書有三體一曰銘石之書二曰章程書傳秘書三曰行押書繇子㑹能學父書衛覬善草覬子瓘採張芝法以覬法參之更為草藁瓘子恒亦善書索靖芝姊之孫善草書皇象亦能草陳暢善八分楊肇善草隸肇孫經亦善草隸杜畿子恕孫預三世善草書王攸善草行書羊忱羊固並善行書李式善寫隸草弟定子公府能名同式李充母衛夫人善鍾法王逸少之師王廙能章楷謹傳鍾法廙從兄王導善藁行導子恬善隸書恬弟洽衆書通善尤能隸行洽少子岷善隸行廙兄子羲之博精羣法特善書隸羲之第七子獻之善隸藁獻之兄𤣥之徽之兄子淳之並善草行王舒子允之亦善草行王濛能草隸子修善𨽻行王綏善隸行郗愔善章草亦能隸子超亦善草庾亮善草行庾翼善隸行與羲之齊名謝安善隸行許靖民善隸草羲之髙足晉穆帝時有張翼善學人書謝敦康昕並工隸草張𢎞特善飛白南齊書卷三十三考證}
