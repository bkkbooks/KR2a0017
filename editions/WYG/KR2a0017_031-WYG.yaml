body:
  text: 南齊書卷三十一梁蕭子顯撰列傳第十二江謐荀伯玉江謐字令和濟陽考城人也祖秉之臨海太守宋世清吏父徽尚書都官郎吳令為太初所殺謐繫尚方孝武平京邑乃得出解褐奉朝請輔國行參軍于湖令强濟稱職宋明帝為南豫州謐傾身奉之為帝所親待即位以為驃騎參軍弟䝉貌醜帝常召見狎侮之謐轉尚書度支郎俄遷右丞兼比部郎泰始四年江夏王義恭第十五女卒年十九未筓禮官議從成人服諸王服大功左丞孫夐重奏禮記女子十五而筓鄭云年應許嫁者也其未許嫁者則二十而筓射慈云十九猶為殤禮官違越經典於禮無據博士太常以下結免贖論謐坐杖督五十奪勞百日謐又奏夐先不研辨混同謬議准以事例亦宜及咎夐又結免贖論詔可出為建平王景素冠軍長史長沙内史行湘州事政治苛刻僧遵道人與謐情欵随謐莅郡犯小事餓繫郡獄僧遵裂三衣食之既盡而死為有司所奏徵還明帝崩遇赦得免為正員郎右軍將軍太祖領南兖州謐為鎮軍長史廣陵太守入為游擊將軍性流俗善趨勢利元徽末朝野咸屬意建平王景素謐深自委結景素事敗僅得免禍蒼梧王廢後物情尚懐疑惑謐獨竭誠歸事太祖以本官領尚書左丞昇明元年遷黄門侍郎左丞如故沈攸之事起議加太祖黄鉞謐所建也事平遷吏部郎稍被親待遷太尉諮議領録事叅軍齊臺建為右衛將軍建元元年遷侍中出為臨川王平西長史冠軍將軍長沙内史行湘州留事先遣之鎭既而驃騎豫章王嶷領湘州以謐為長史將軍内史知州留事如故封永新縣伯四百户三年為左民尚書諸皇子出閤用文武主帥皆以委謐尋敇曰江謐寒士誠當不得競等華儕然甚有才幹堪為委遇可遷掌吏部謐才長刀筆所在事辦太祖崩謐稱疾不入衆頗疑其怨不豫顧命也世祖即位謐又不遷官以此怨望時世祖不豫謐詣豫章王嶷請間曰至尊非起疾東宫又非才公今欲作何計世祖知之出謐為征虜將軍鎮北長史南東海太守未發上使御史中丞沈沖奏謐前後罪曰謐少懐輕躁長習諂薄交無義合行必利動特以奕世更局見擢宋朝而阿諛内外貨賂公行咎盈憲簡戾彰朝聽輿金輦寳取容近習以沈攸之地勝兵强終當得志委心託身嵗暮相結以劉景素親屬望重物應樂推獻誠薦子窺窬非望時艱網漏得全首領太祖匡飭天地方知逺圖薄其艱洗之瑕許其革音之効加以非分之寵推以不次之榮列迹勲良比肩朝徳以徃者微勤刀筆小用賞厠河山任忝出入輕險之性在貴彌彰貪昧之情雖富無滿重莅湘部顯行斷盗及居銓衡肆意受納連席同乗皆詖黷舊侣密筵閑讌必貨賄常客理合升進者以為已恵事宜貶退者並稱中㫖謂販鬻威權姦自不露欺主罔上奸議可掩先帝寢疾彌留人神憂震謐托病私舎曽無變容國諱經旬甫蹔入殿參訪遺詔覘忖時㫖以身列朝流宜䝉兼帶先顧不逮舊位無加遂崇飾惡言肆醜縱悖譏誹朝政訕毁皇猷遍蚩忠賢歴詆台相至於蕃岳入授列代恒規勲戚出撫前王彛則而謐妄發樞機坐構囂論復敢貶謗儲后不顧辭端毁折宗王每窮舌杪皆云誥誓乖禮崇樹失宜仰指天俯畫地希幸災故以申積憤犯上之跡既彰反噬之情已著請免官削爵土收送廷尉獄治罪詔賜死時年五十二子介建武中為呉令治亦深切民間榜死人髑髏為謐首棄官而去荀伯玉字弄璋廣陵人也祖永南譙太守父闡之給事中伯玉少為栁元景撫軍板行叅軍南徐州祭酒晉安王子勛鎮軍行叅軍泰始初子勛舉事伯玉友人孫沖為將帥伯玉隸其驅使封新亭侯事敗伯玉還都賣卜自業建平王景素聞而招之伯玉不往太祖鎮淮隂伯玉歸身結事為太祖冠軍刑獄叅軍太祖為明帝所疑及徵為黄門郎深懐憂慮伯玉勸太祖遣數十騎入虜界安置標榜於是虜游騎數百履行界上太祖以聞猶懼不得留令伯玉卜伯玉斷卦不成行而明帝詔果復太祖夲任由是見親待從太祖還都除奉朝請令伯玉看宅知家事世祖罷廣興還立别宅遣人於大宅掘樹數株伯玉不與馳以聞太祖曰卿執之是也轉太祖平南府晉熙王府參軍太祖為南兖州伯玉轉為上鎮軍中兵參軍帶廣陵令除羽林監不拜初太祖在淮南伯玉假還廣陵夢上廣陵城南樓上有二青衣小兒語伯玉云草中肅九五相追逐伯玉視城下人頭上皆有草泰始七年伯玉又夢太祖乗船在廣陵北渚見上兩腋下有翅不舒伯玉問何當舒上曰却後三年伯玉夢中自謂是呪師向上唾呪之凡六呪有六龍出兩腋下翅皆舒還而復歛元徽二年而太祖破桂陽威名大震五年而廢蒼梧太祖謂伯玉曰卿時乗之夢今且効矣昇眀初仍為太祖驃騎中兵參軍除歩兵校尉不拜仍帶濟陽太守中兵如故覇業既建伯玉忠勤盡心常衛左右加前軍將軍随太祖太尉府轉中兵將軍太守如故建元元年封南豐縣子四百户轉輔國將軍武陵王征虜司馬太守如故徙為安成王冠軍司馬轉豫章王司空諮議太守如故世祖在東宫專斷用事頗不如法任左右張景真使領東宫主衣食官榖帛賞賜什物皆御所服用景真於南澗寺捨身齋有元徽紫皮袴褶餘物稱是於樂遊設㑹伎人皆著御衣又度絲錦與崐崘舶營貨輙使傳令防送過南州津世祖拜陵還景真白服乗畫舴艋坐胡牀觀者咸疑是太子内外祇畏莫敢有言伯玉謂親人曰太子所為官終不知豈得顧死蔽官耳目我不啟聞誰應啟者因世祖拜陵後密啟之上大怒檢校東宫世祖還至方山日暮將泊豫章王於東府乗飛䴏東迎具白上怒之意世祖夜歸上亦停門籥待之二更盡方入宫上明日遣文惠太子聞喜公子良宣敇以景真罪狀示世祖稱太子令收景真殺之世祖憂懼稱疾月餘日上怒不解晝卧太陽殿王敬則直入叩頭啟上曰官有天下日淺太子無事被責人情恐懼願官往東宫解釋之太祖乃幸宫召諸王以下於𤣥圃園為家宴致醉乃還上嘉伯玉盡心愈見親信軍國密事多委使之時人為之語曰十敇五令不如荀伯玉命世祖深怨伯玉上臨崩指伯玉謂世祖曰此人事我忠我身後人必為其作口過汝勿信也可令往東宫長侍白澤小却以南兖州處之伯玉遭父憂除冠軍將軍南濮陽太守未拜除黄門郎夲官如故世祖轉為豫章王太尉諮議太守如故俄遷散騎常侍太守如故伯玉憂懼無計上聞之以其與垣崇祖善慮相扇為亂加意撫之伯玉乃安永明元年垣崇祖誅伯玉并伏法初善相墓者見伯玉家墓謂其父曰當出暴貴而不久也伯玉後聞之曰朝聞道夕死可矣死時年五十史臣曰君老不事太子義烈之遺訓也欲夫專心所奉在節無貳雖人子之親尚宜自别則偏黨為論豈或傍啟察江荀之行也雖異術而同亡以古道而居今世難乎免矣賛曰謐口禍門荀言亟盡時清主異并合同殞南齊書卷三十一
