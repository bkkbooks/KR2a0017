body:
  text: 南齊書卷七梁蕭子顯撰本紀第七東昬侯東昬侯寳卷字智藏髙宗第二子也本名明賢髙宗輔政後改焉建武元年立為皇太子永泰元年七月己酉髙宗崩太子即位八月丁巳詔雍州将士與虜戰死者復除有差又詔辨括選序訪捜貧屈庚申鎮北将軍晉安王寳義進號征北大将軍開府儀同三司南中郎将建安王寳寅為郢州刺史冬十月己未詔刪省科律十一月戊子立皇后褚氏賜王公以下錢各有差永元元年春正月戊寅大赦改元詔研策秀才考課百司辛夘車駕祀南郊詔三品清資官以上應食禄者有二親或祖父母年登七十並給見錢癸夘以冠軍将軍南康王寳融為荆州刺史二月癸丑以北中郎将邵陵王寳攸為南兖州刺史是月太尉陳顯達敗績於馬圈夏四月己巳立皇太子誦大赦賜民為父後爵一級甲戍以寜朔将軍栁惔為梁南秦二州刺史五月癸亥以撫軍大将軍始安王遥光為開府儀同三司六月己酉新除右衛将軍崔恵景為䕶軍将軍癸亥以始興内史范雲為廣州刺史甲子詔原雍州今年三調秋七月丁亥京師大水死者衆詔賜死者材器并賑䘏八月乙巳蠲京邑遇水資財漂蕩者今年調稅又詔為馬圏戰亡将士舉哀丙午揚州刺史始安王遥光據東府反詔曲赦京邑中外戒嚴尚書令徐孝嗣以下屯衛宫城遣領軍将軍蕭坦之率六軍討之戊午斬遥光傳首己未以征北大将軍晉安王寳𤣥為南徐兖二州刺史己巳尚書令徐孝嗣為司空右衛将軍劉暄為領軍将軍閏月丙子以江陵公寳覽為始安王虜偽東徐州刺史沈陵降以為北徐州刺史九月丁未以輔國将軍裴叔業為兖州刺史征虜長史張沖為豫州刺史壬戌以頻誅大臣大赦天下辛未以太子詹事王瑩為中領軍冬十月乙未誅尚書令新除司空徐孝嗣右僕射新除鎮軍将軍沈文季乙巳以始興内史顔翻為廣州刺史征虜将軍沈陵為越州刺史十一月丙辰太尉江州刺史陳顯達舉兵於尋陽乙丑護軍将軍崔慧景加平南将軍督衆軍南討事丙寅以冠軍将軍王鴻為徐州刺史十二月癸未以前輔國将軍楊集始為秦州刺史甲申陳顯達至京師宫城嚴警六軍固守乙酉斬陳顯達傳首丁亥以征虜将軍邵陵王寳攸為江州刺史二年春正月壬子以輔國将軍張沖為南兖州刺史庚午詔討豫州刺史裴叔業二月癸未以黄門郎蕭寅為司州刺史丙戌以衛尉蕭懿為豫州刺史征夀春己丑裴叔業病死兄子植以夀春降虜三月癸夘以輔國将軍張沖為司州刺史乙夘遣平西将軍崔慧景率衆軍伐夀春夏四月丁未以新除冠軍将軍張沖為南兖州刺史崔慧景於廣陵舉兵襲京師壬子右衛将軍左興盛督京邑水歩衆軍南徐州刺史江夏王寳𤣥以京城納慧景乙夘遣中領軍王瑩率衆軍屯北籬門壬戌慧景至瑩等敗績甲子慧景入京師宫内據城拒守豫州刺史蕭懿起義救援癸酉慧景棄衆走斬首詔曲赦京邑南徐兖二州乙亥以新除尚書右僕射蕭懿為尚書令丙子以晉熙王寳嵩為南徐州刺史五月乙巳以虜偽豫州刺史王肅為豫州刺史戊申以桂陽王寳貞為中䕶軍己酉江夏王寳𤣥伏誅壬子大赦乙丑曲赦京邑南徐兖二州戊辰以始安王寳覽為湘州刺史六月庚寅車駕於樂逰苑内㑹如三元京邑女人放觀戊戌以新除冠軍将軍張沖為郢州刺史守五兵尚書陸慧曉為南兖州刺史秋七月甲辰以驃騎司馬張稷為北徐州刺史八月丁酉以新除驃騎司馬陳伯之為豫州刺史甲申夜宫内火冬十月己夘􅊣尚書令蕭懿十一月辛丑以寜朔将軍張稷為南兖州刺史甲寅西中郎長史蕭穎胄起義兵於荆州十二月雍州刺史梁王起義兵於襄陽戊寅以冠軍長史劉繪為雍州刺史三年春正月丙申朔合朔時加寅漏上八刻事畢宫人於閲武堂元㑹皇后正位閹人行儀帝戎服臨視丁酉以驃騎大将軍晉安王寳義為司徒新除撫軍将軍建安王寳寅為車騎将軍開府儀同三司甲辰以寜朔将軍王珍國為北徐州刺史辛亥車駕祀南郊詔大赦天下百官陳讜言二月丙寅乾和殿西廂火壬午詔遣羽林兵征雍州中外纂嚴乙酉以武烈将軍胡元進為廣州刺史三月己亥以驃騎将軍沈徽孚為廣州刺史甲辰以輔國将軍張欣泰為雍州刺史丁未南康王寳融即皇帝位於江陵癸丑遣平西将軍陳伯之西征六月京邑雨水遣中書舍人二縣官長賑賜有差蕭頴胄弟頴孚起兵於廬陵戊子曲赦江州安成廬陵二郡秋七月癸巳曲赦荆雍二州甲午雍州刺史張欣泰前南譙太守王靈秀率石頭文武奉建安王寳寅向臺至杜姥宅宫門閉乃散走己未以征虜長史程茂為郢州刺史驍騎将軍薛元嗣為雍州刺史是日元嗣以郢城降義師八月丁夘以輔國将軍申胄監豫州事辛巳光禄大夫張環鎮石頭辛夘以太子左率李居士總督西討諸軍事屯新亭城九月甲辰以居士為江州刺史新除冠軍将軍王珍國為雍州刺史車騎将軍建安王寳寅為荆州刺史以輔國将軍申胄監郢州龍驤将軍馬仙琕監豫州驍騎将軍徐元稱監徐州是日義軍至南州申胄軍二萬人於姑熟奔歸戊申以後軍參軍蕭璝為司州刺史前輔國将軍魯休烈為益州刺史輔國長史趙越嘗為梁南秦二州刺史丙辰李居士與義軍戰於新亭敗績冬十月甲戌王珍國與義軍戰於朱雀桁敗績戊寅寜朔将軍徐元瑜以東府城降青冀二州刺史桓和入衛屯東宫己夘衆降光禄大夫張瓌棄石頭還宫於是閉宫城門自守庚辰以驍騎将軍胡虎牙為徐州刺史左軍将軍徐智勇為益州刺史㳺撃将軍牛平為梁南秦二州刺史李居士以新亭降琅邪城主張木亦降義師築長圍守宫城十二月丙寅新除雍州刺史王珍國侍中張稷率兵入殿廢帝時年十九帝在東宫便好弄不喜書學髙宗亦不以為非但朂以家人之行令太子求一日再入朝發詔不許使三日一朝嘗夜捕鼠達旦以為笑樂髙宗臨崩屬以後事以隆昌為戒曰作事不可在人後故委任羣小誅諸宰臣無不如意性重澀少言不與朝士接唯親信閹人及左右御刀應敇等自江祏始安王遥光誅後漸便騎馬日夜於後堂戯馬與親近閹人倡伎鼓呌常以五更就臥至晡乃起王侯節朔朝見晡後方前或際闇遣出臺閣案奏月數十日乃報或不知所在二年元㑹食後方出朝賀裁竟便還殿西序寝自已至申百僚陪位皆僵仆菜色比起就㑹怱遽而罷陳顯達事平漸出逰走所經道路屏逐居民從萬春門由東宫以東至於郊外數十百里皆空家盡室巷陌懸幔為髙障置伎人防守謂之屏除或於市肆左側過親幸家環回宛轉周遍京邑每三四更中鼓聲四出幡㦸横路百姓喧走相隨士庶莫辨出輙不言定所東西南北無處不驅人髙障之内設部伍羽儀復有數部皆奏鼓吹羌胡伎鼓角横吹夜出晝反火光照天拜愛姬潘氏為貴妃乘臥輿帝騎馬從後著織成袴褶金薄帽執七寳縳矟戎服急装不變寒暑陵冒雨雪不避坑穽馳騁渴乏輙下馬解取腰邉蠡器酌水飲之復上馬馳去馬乘具用錦繡處患為雨所沾濕織雜綵珠為覆䝉備諸雕巧教黄門五六十人為騎客又選無頼小人善走者為逐馬左右五百人常以自隨奔走往来畧不暇息置射雉場二百九十六處翳中帷帳及歩障皆袷以緑紅錦金銀鏤弩牙瑇瑁帖箭郊郭四民皆廢業樵蘇路斷吉㓙失時乳婦婚姻之家移産寄室或輿病弃屍不得殯葬有弃病人於青溪邉者吏懼為監司所問推置水中泥覆其面湏㬰便死遂失骸骨後宫遭火之後更起仙華神仙玉夀諸殿刻畫雕綵青􅀢金口帶麝香塗壁錦幔珠簾窮極綺麗縶役工匠自夜達旦猶不副速乃剔取諸寺佛刹殿藻井仙人騎獸以充足之世祖興光樓上施青漆世謂之青樓帝曰武帝不巧何不純用瑠璃潘氏服御極選珍寳主衣庫舊物不復周用貴市民間金銀寳物價皆數倍虎魄釧一隻直百七十萬京邑酒租皆折使輸金以為金塗猶不能足下揚南徐二州橋桁塘埭丁計功為直斂取見錢供太樂主衣雜費由是所在塘瀆多有隳廢又訂出雉頭鶴氅白鷺縗親幸小人因緣為姧利課一輸十郡縣無敢言者三年夏於閲武堂起芳樂苑山石皆塗以五采跨池水立紫閣諸樓觀壁上畫男女私褻之像種好樹美竹天時盛暑未及經日便就萎枯於是徴求民家望樹便取毁撒牆屋以移致之朝栽暮拔道路相繼花藥雜草亦復皆然又於苑中立市太官每旦進酒肉雜肴使宫人屠酤潘氏為市令帝為市魁執罰争者就潘氏决判帝有膂力能擔白虎幢自製雜色錦伎衣綴以金花玉鏡衆寳逞諸意態所寵羣小黨與三十一人黄門十人初任新蔡人徐世檦為直閣驍騎将軍凡有殺戮皆其用命殺徐孝嗣後封為臨汝縣子陳顯達事起加輔國将軍雖用䕶軍崔慧景為都督而兵權實在世檦及事平世檦謂人曰五百人軍主能平萬人都督世檦亦知帝昬縱宻謂其黨茹法珍梅蟲兒曰何世天子無要人但阿儂貨主惡耳法珍等争權以白帝帝稍惡其凶强以二年正月遣禁兵殺之世􅋆拒戰而死自是法珍蟲兒用事並為外監口稱詔敕中書舍人王咺之與相脣齒専掌文翰其餘二十餘人皆有勢力崔慧景平後法珍封餘干縣男蟲兒封竟陵縣男及義師起江郢二鎮已降帝逰騁如舊謂茹法珍曰湏来至白門前當一決義師至近郊乃聚兵為固守之計召王侯朝貴分置尚書都座及殿省又信鬼神崔慧景事時拜蔣子文神為假黄鉞使持節相國太宰大将軍録尚書揚州牧鍾山王至是又尊為皇帝迎神像及諸廟雜神皆入後堂使所親巫朱光尚禱祀祈福以冠軍将軍王珍國領三萬人據大桁莫有鬭志遣左右直長閹竪王寳孫督戰呼為王長子寳孫切罵諸将帥直閣将軍席豪發憤突陣死豪驍将既斃衆軍於是土崩軍人從朱雀觀上自投及赴淮死者無數於是閉城自守城内軍事委王珍國兖州刺史張稷入衛京師以稷為副實甲猶七萬人帝烏帽袴褶備羽儀登南掖門臨望又虚設鎧馬齋仗千人皆張弓拔白出東掖門稱蒋王出盪素好鬭軍隊初使宫人為軍後乃用黄門親自臨陳詐被創使人輿将去至是於閲武堂設牙門軍頓毎夜嚴警帝於殿内騎馬從鳳荘門入徽眀門馬被銀蓮葉具装鎧雜羽孔翠寄生逐馬左右衛從晝眠夜起如平常聞外鼓呌聲被大紅袍登景陽樓屋上望弩㡬中之衆皆怠怨不為致力募兵出戰出城門數十歩皆坐甲而歸慮城外有伏兵乃燒城傍諸府署六門之内皆蕩盡城中閣道西掖門内相聚為市販死牛馬肉帝初與羣小計議陳顯達一戰便敗崔慧景圍城退走謂義師逺来不過旬日亦應散去敕太官辦樵米為百日糧而已大桁敗後衆情兇懼法珍等恐人衆驚走故閉城不復出軍既而義師長圍既立壍栅嚴固然後出盪屢戰不㨗帝尤惜金錢不肯賞賜法珍叩頭請之帝曰賊来獨取我邪何為就我求物後堂儲數百具榜啓為城防帝云擬作殿竟不與又催御府細作三百人精仗待圍解以擬屏除金銀雕鏤雜物倍急於常王珍國張稷懼禍及率兵入殿分軍又從西上閣入後宫斷之御刀豐勇之為内應是夜帝在含徳殿吹笙歌作女兒子臥未熟聞兵入趨出北戸欲還後宫清曜閣已閉閹人禁防黄泰平以刀傷其膝仆地顧曰奴反邪直後張齊斬首送梁王宣徳太后令曰皇室受終祖宗齊聖太祖髙皇帝肇基駿命膺籙受圖世祖武皇帝係明下武髙宗明皇帝重隆景業咸降年不永宫車早晏皇祚之重允屬儲元而禀質凶愚發於稚齒爰自保姆迄至成童忍戾昬頑觸途必著髙宗留心正嫡立嫡惟長輔以羣才閒以賢戚内外維持冀免多難未及期稔便逞屠戮宻戚近親元勲良輔覆族殱門旬月相係凡所任杖盡慝窮姧皆營伍屠販容状險醜身秉朝權手斷國命誅戮無辜納其財産睚眦之間屠覆比屋身居元首好是賤事危冠短服坐臥以之晨出夜反無復已極驅斥氓庶巷無居人老細奔遑寘身無所東邁西屏北出南驅負疾輿屍填街塞陌興築繕造日夜不窮晨構夕毁朝穿暮塞絡以隨珠方斯已陋飾以璧璫曽何足道時暑赫曦流金鑠石移竹藝果匪日伊夜根未及植葉已先枯畚鍤紛紜勤倦無已散費國儲専事浮飾逼奪民財自近及逺兆庶恇恇流竄道路府帑既竭肆奪市道工商裨販行號道泣屈此萬乘躬事角抵昂首翹肩逞能橦木觀者如堵曽無怍容芳樂華林並立闤闠踞肆鼓刀手銓輕重干戈鼓譟昏曉靡息無戎而城豈足云譬至於居䘮淫讌之愆三年載弄之醜反道違常之舋牝雞晨鳴之慝於事已細故可得而畧也罄楚越之竹未足以言校辛癸之君豈或能匹征東将軍忠武奮發投袂萬里光奉眀聖翌成中興乘勝席卷掃清京邑而羣小靡識嬰城自固緩戮稽誅倐彌旬月宜速勦定寜我邦家可潛遣閒介宻宣此㫖忠勇齊奮遄加蕩撲放斥昬凶衛送外第未亡人不幸驟此百罹感念存没心焉如割柰何柰何又令依漢海昬侯故事追封東昬侯茹法珍梅蟲兒王咺之等伏誅豐勇之原死史臣曰漢宣帝時南郡獲白虎獲之者張武言武張而猛服也東昬侯亡徳横流道歸拯亂躬當翦戮實啓太平推閹竪之名字亦天意也贊曰東昬慢道匹癸方辛乃隳典則乃弃彛倫玩習兵火終用焚身南齊書卷七南齊書卷七考證東昬侯本紀永元元年二月太尉陳顯達敗績於馬圈臣宗萬按杜佑曰馬圏城去襄陽三百里在今南陽郡界秺縣北又曰後魏馬圏鎮漢湼陽縣地二年四月乙夘遣中領軍王瑩率衆軍屯北籬門臣祖庚按崔慧景傳帝遣右衛将軍左興盛率臺内三萬人拒慧景於北籬門與紀異十二月梁王起義兵於襄陽臣祖庚按通鑑云十一月乙巳衍集僚佐謂曰當與卿等共除之是日建牙集衆又云帝遣劉山陽将兵就蕭穎胄襲襄陽然則是時梁王尚未起義矣故考異曰齊紀誤也以武烈将軍胡元進為廣州刺史武烈諸本皆作威烈臣承蒼按宋百官志有武烈将軍無威烈将軍齊世官名多循宋制今定作武三年三月丁未南康王寳融即皇帝位臣祖庚按和帝紀三年正月乙巳王受命大赦據此則正月乙己南康王已即位江陵矣此云三月丁未者通鑑考異曰盖是日建康始聞之耳南齊書卷七考證
