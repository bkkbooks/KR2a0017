body:
  text: 南齊書卷二十一梁蕭子顯撰列傳第二文恵太子文恵太子長懋字雲喬世祖長子也世祖年未弱冠而生太子為太祖所愛姿容豐潤小字白澤宋元徽末隨世祖在郢世祖還鎮盆城拒沈攸之使太子勞接將帥親侍軍旅除祕書郎不拜授輔國將軍遷晉熙王撫軍主簿事寧世祖遣太子還都太祖方創覇業心存嫡嗣謂太子曰汝還吾事辦矣處之府東齋令通文武賓客勅荀伯玉曰我出行日城中軍悉受長懋節度我雖不行内外直防及諸門甲兵悉令長懋時時履行轉秘書丞以與宣帝諱同不就改除中書郎遷黄門侍郎未拜昇眀三年太祖將受禪世祖已還亰師以襄陽兵馬重鎮不欲處他族出太子為持節都督雍梁二州郢州之竟陵司州之隨郡軍事左中郎將寧蠻校尉雍州刺史建元元年封南郡王邑二千户江左未有嫡皇孫封王始自此也進號征虜將軍先是梁州刺史范栢年誘降晉夀亡命李烏奴討平氐賊楊城蘇道熾等頗著威名沈攸之事起栢年遣將隂廣宗領軍出魏興聲援亰師而候望形勢事平朝廷遣王𤣥邈代之烏奴勸栢年據漢中不受命栢年計未決𤣥邈已至栢年遲囘魏興不肯下太子慮其為變乃遣說栢年許啓為府長史栢年乃進襄陽因執誅之栢年梓潼人徙居華陽世為土豪知名州里宋泰始中氐寇斷晉夀道栢年以倉部郎假節領數百人慰勞通路自益州道報命除晉夀太守討平氐賊遂為梁州栢年彊立善言事以應對為宋眀帝所知既被誅巴西太守栁引稱啓太祖勅答曰栢年幸可不爾為之恨恨時襄陽有盜發古塚者相傳云是楚王塚大獲寳物玉屐玉屏風竹簡書青絲編簡廣數分長二尺皮節如新盜以把火自照後人有得十餘簡以示撫軍王僧䖍僧䖍云是科斗書考工記周官所闕文也是時州遣按驗頗得遺物故有同異之論㑹北虜南侵上慮當出樊沔二年徴為侍中中軍將軍置府鎮石頭穆妃薨成服日車駕出臨喪朝議疑太子應出門迎左僕射王儉曰尋禮記服問君所主夫人妻太子嫡婦言國君為此三人為主喪也今鸞輿臨降自以主喪而至雖因事撫慰義不在弔南郡以下不應出門奉迎但尊極所臨禮有變革權去杖絰移立户外足表情敬無煩止哭皇太子既一宫之主自應以車駕幸宫依常奉候既當成服之日吉㓙不容相干宜以衰幘行事望拜止哭率由舊章尊駕不以臨弔奉迎則惟常體求之情禮如為可安解侍中上以太子哀疾不宜居石頭山障移鎮西州四年遷使持節都督南徐兗二州諸軍事征北將軍南徐州刺史世祖即位為皇太子初太祖好左氏春秋太子承㫖諷誦以為口實既正位東儲善立名尚禮接文士畜養武人皆親近左右布在省闥永眀三年於崇正殿講孝經少傅王儉以擿句令太僕周顒撰為義疏五年冬太子臨國學親臨䇿試諸生於坐問少傳王儉曰曲禮云無不敬尋下之奉上可以盡禮上之接下慈而非敬今總同敬名將不為昧儉曰鄭𤣥云禮主於敬便當是尊卑所同太子曰若如來通則忠惠可以一名孝慈不湏别稱儉曰尊卑號稱不可悉同愛敬之名有時相次忠恵之異誠以聖㫖孝慈互舉竊有徴據禮云不勝喪比於不慈不孝此則其義太子曰資敬奉君資愛事親兼此二塗唯在一極今乃移敬接下豈復在三之義儉曰資敬奉君必同至極移敬逮下不慢而已太子曰敬名雖同深淺既異而文無差别彌復増疑儉曰繁文不可備設略言深淺已見傳云不忘恭敬民之主也書云奉先思孝接下思恭此又經典眀文互相起發太子問金紫光禄大夫張緒緒曰愚謂恭敬是立身之本尊卑所以並同太子曰敬雖立身之本要非接下之稱尚書云惠鮮鰥寡何不言恭敬鰥寡邪緒曰今别言之居然有恭恵之殊總開記首所以共同斯稱竟陵王子良曰禮者敬而已矣自上及下愚謂非嫌太子曰本不謂有嫌正欲使言與事符輕重有别耳臨川王暎曰先舉必敬以眀大體尊卑事數備列後章亦當不以總略而礙太子又以此義問諸學生謝幾卿等十一人並以筆對太子問王儉曰周易乾卦本施天位而說卦云帝出乎震震本非天義豈相當儉曰乾健震動天以運動為徳故言帝出震太子曰天以運動為徳君自體天居位震雷為象豈體天所出儉曰主器者莫若長子故受之以震萬物出乎震故亦帝所與焉儉又諮太子曰孝經仲尼居曽子侍夫孝理𢎞深大賢方盡其致何故不授顔子而寄曽生太子曰曽生雖徳慙體二而色養盡禮去物尚近接引非隔𢎞宣規教義在於此儉曰接引非隔𢎞宣雖易去聖轉逺其事彌輕既云人能𢎞道將恐人輕道廢太子曰理既有在不容以人廢言而况中賢之才𢎞上聖之教寧有壅塞之嫌臨川王暎諮曰孝為徳本常是所疑徳施萬善孝由天性自然之理豈因積習太子曰不因積習而至所以可為徳本暎曰率由斯至不俟眀徳大孝榮親衆徳光備以此而言豈得為本太子曰孝有深淺徳有小大因其分而為本何所稍疑太子以長年臨學亦前代未有也眀年上將訊丹陽所領囚及南北二百里内獄詔曰獄訟之重政化所先太子立年作貳宜時詳覽此訊事委以親決太子乃於𤣥圃園宣猷堂録三署囚原宥各有差上晩年好遊宴尚書曹事亦分送太子省視太子與竟陵王子良俱好釋氏立六疾館以養窮民風韻甚和而性頗奢麗宫内殿堂皆雕飾精綺過於上宫開拓𤣥圃園與臺城北塹等其中樓觀塔宇多聚奇石妙極山水慮上宫中望見乃傍列修竹内施髙鄣造游觀數百間施諸機巧宜湏鄣蔽湏臾成立若應毁撤應手遷徙善製珍玩之物織孔雀毛為裘光彩金翠過於雉頭矣以晉眀帝為太子時立西池乃啓世祖引前例求東田起小苑上許之永眀中二宫兵力全實太子使宫中將吏更番役築宫城苑巷制度之盛觀者傾亰師上性雖嚴多布耳目太子所為無敢啓者後上幸豫章王宅還過太子東田見其彌亘華逺壯麗極目於是大怒收監作主帥太子懼皆蔵匿之由是見責太子素多疾體又過壯常在宫内簡於遨遊玩弄羽儀多所僣儗雖咫尺宫禁而上終不知十年豫章王嶷薨太子見上友于既至造碑文奏之未及鐫勒十一年春正月太子有疾上自臨視有憂色疾篤上表曰臣地屬元良業微三善光道樹風於焉盖闕晨宵忷懼有若臨淵攝生舛和構離痾疾大漸惟㡬顧隂待謝守器難永視膳長違仰戀慈顔内懐感哽竊惟死生定分理不足悲伏願割無已之悼損既往之傷寳衛聖躬同休七百臣雖没九泉無所遺恨時年三十六太子年始過立久在儲宫得參政事内外百司咸謂旦暮繼體及薨朝野驚惋焉上幸東宫臨哭盡哀詔斂以袞冕之服諡曰文恵葬崇安陵世祖履行東宫見太子服翫過制大怒勅有司隨事毁除以東田殿堂為崇虚館鬱林立追尊為文帝廟稱世宗初太子内懐惡眀帝宻謂竟陵王子良曰我意色中殊不恱此人當由其福徳薄所致子良便苦救解後眀帝立果大相誅害史臣曰上古之世父不哭子夀夭悠悠尚嗟恒事况夫正體東儲方樹年徳重基累葉載茂皇家守器之君已知耕稼雖温文具美交𢎞盛迹武運將終先期夙殞傳之㓜少以速顛危推此而論亦有冥數矣贊曰二象垂則三星麗天樹嫡惟長義匪求賢方為守器植命不延南齊書卷二十一南齊書卷二十一考證文惠太子傳我雖不行内外直防及諸門甲兵悉令長懋時時履行汲古閣本長懋下旁注宋本無已上十六字史臣論雖温文具美交𢎞盛迹汲古閣本無雖字温文下旁注三字宋本闕南齊書卷二十一考證
